front:
  text: 上清靈寶大法卷之三十八驚五
  hash: sha256:edee93fec6aa08b26c4e2bc56aa08882baa18c1e091d32fe5be8f2acb26f57da
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5g0030_HFL_038-001a, image: hfl/0953/0953-004.png}
body:
  text: 洞微髙士開光救苦真人寧全真授上清三洞弟子靈寶領教嗣師王契真纂神虎玄範門玉府監魂童子符真都元暢紫光之童回光洞映無逺不通通幽達靈齊契元宗王府引魂童子符太上元都始青之童幽微顯徹威振羅酆死戶閉塞九孔肅通四大九維三界滅雄亡魂隨步躡景無蹤周景回旋與道日隆元始速古二符取北魁氣吹筆三作書之監魂童子專監守亡魂毋令散失引魂童子判引魂入壇沐浴朝真領受功德度橋接引脫化也神虎追魂符神虎攝魂符神虎引魂符神虎聚魂符神虎取魂符神虎驅魂符右六神內篆是清清冷冷尋魂神將精光大史統制百節大神用攝一切沉陷鬼魂應如影響神虎追攝符混元一氣分形化身足蹈招搖首冠三清北魁玄範聚攝魂神陽𩲸隂尸返尸出冥五行具足敕攝來呈神虎信帛符圓象天元八卦合形五嶽含煙風逹巽乾日月為爐黃道居中分居四象戴履澄明爽靈胎光幽精念七𩲸名書之右二符用素帛二尺書之捲神虎牒內并五道牒符焚之五道牒符三氣陽光日月並照王敕告下元始玄冥三官北鄷明檢鬼營巨天力士普開泉扄渺莾九醜天道貴生覺元洞虛辭參髙真髙上清爽分配五行七政均施萬氣齊仙明氣四騫上元侍并三官九府咸聽玉文神虎玉尺五道奉迎攝魂速至風火無停神虎追魂符神虎追魂符神虎夫人敕神虎大聖敕地方陷隅攝赴北獄化元聿𩲸星飛澤追魂使者侯魏張𧪵追攝魂神付監獄使者劉令急急現形祝呪太一玄𡨋天一北祚北斗天蓬敕神虎戟飛運招搖一統隨神虎到處十方精光都一吸急急如律令功德金色光輝輝開暗幽華池流真香蓮蓋隨雲浮仙靈沖元和常居十二樓急宣靈寶旨自在天堂遊右符天皇訣玉清訣北氣白紙黑書焚水盂中噀攝魂壇內及四維立現形神虎現形符左神虎大聖敕右神虎大聖敕神虎夫人化元聿白星飛澤神虎玉女蔣仁貴等速攝魂𩲸神虎攝魂吏一十五人攝魂現形稟敕奉行使者劉急攝赴身來神虎戟飛運招搖一統隨普告三界無極神鄉泉曲之府北都羅酆三官九府十二河源上解祖考億劫種親疾除罪簿落滅惡根不得拘留逼合鬼群元始符命時刻升遷北都寒池部衛形魂制魔保舉度品南宫死魂受煉仙化成人生身受度劫劫長存隨劫輪轉與天齊年永度三塗五苦八難超凌三界逍遙上清右符黃紙一寸四分朱書玉清訣鬼戶氣沈北流水噀壇內想亡魂至可自服一道或亡人不記生死年月日時以符灰擎手中祝亡人現形吹灰于鬼戶立現神虎通現使者符神虎神君敕左右衛聖追魂神吏引魂童子遵奉神虎敕命急急如律令急召神虎使者劉立赴合身形急急如律令右符黃紙朱書燒水中噀灑隂壇中通幽釋變符神虎飛符攝魂吏一十五員地方陷隅攝赴北獄左七匝魂飛玉律大力攝右七匝靈飛玉女天靈攝天道蒼蒼幽靈萬變天帝所敕急急奉行右符東南氣焚水中灑之立現通語符太一紫元覆魂真君霄輔助精大神天一北祚元君上帝敕神虎令魂𩲸勿走現體露形急急如上帝敕上帝勑令神虎神將亡魂可飲液急濟疾速通言急急如律令謹請大道君大道貴生景化霄然洞鏡大霞鑄魂神仙喉開咽利枯竭生全靈津速降返復玄元急急如律令右符東氣燒吹人身及壇內令見亡魂及通言語通目普現符神虎使者神虎大將神虎玉女神虎功曹稟勑急召魂急急現真形化元聿白星飛澤勑攝急魂真神全𩲸正再聚魂𩲸速通元真太上降慈悲令救世間人獨隂與獨陽耳目有靈光速令現真形速令聽人言謹請護法靈童明彰報應急急如太乙神虎夫人命太上追魂符東方追魂大使南方追魂大使西方追魂大使北方追魂大使上方追魂大使下方追魂大使左三魂急降右七魂速來升天追魂攝𩲸大使入地追魂攝𩲸大使入火追魂攝入水追魂𩲸大使攝𩲸大使陽間追魂攝𩲸大使飛空追魂攝𩲸大使三魂急赴七𩲸順道者生俱來逆道者亡無所不收無所不攝火光萬丈準三天上帝勑命萬里火雲飛空如箭敕差關九萬疾疾準三天上帝敕命火急攝赴玄壇祝發呪上清律令制召大神追魂攝𩲸速赴現形承天帝命時刻無停太上玉符疾速無情敢不依律上奏帝廷急急如元始上帝敕大煞四門罡訣南氣右符專攝沉陷鬼區之魂急遣五行追魂大神同神虎雷部雙行追取全足到壇太乙普召亡魂符祝呪太上神符攝汝諸鬼呼名立至現形歡喜青龍在左白虎在右頭戴天冠足履玄武萬邪速離諸鬼速至急急疾敕攝急急如神虎大聖律令召魂符又曰五行祕章又曰四直使者追魂符三皇元君天洞天真金玉之光照撤十方攝召魂爽來詣玄治察命定録溟漠開通正定本心五府開明敕符一道隨呪急來符皆墨書只敕字用朱書九轉塗之玉清上帝敕上清大帝敕太清大帝敕金木水火土五星尊神攝召亡過某人赴玄壇吾奉太一救苦天尊敕行靈寶符命拔度某人魂𩲸出離地獄五苦三塗不得拘留逼合鬼群落死斷名急急如律令右符東南神霄氣吹太隂混化三界追魂符玉清追魂使者符天一北祚太一玄𡨋嚴攝北鄷死魂受煉方昭玉清追魂使者方昭急攝亡過某人魂立至上清追魂使者符上天度人列言上清追魂聚𩲸濯質完形張昉上清追魂使者張昉急急追亡過某魂立至太清追魂使者符天真經法全其本年拔命玉帝受度太清追拔幽翳死骸流光郭太清追魂使者郭追亡過某魂立至右三符玉皇訣取中央玄元始三氣吹之北斗七靈符右七符用白紙長二寸四分闊一寸四分書之於斗降日向七星之下備香花燈燭茶酒餅果供養以大指恰左手三指上二節倒大指根上香三拜向北斗上存某星君聖容下降書符之所叩齒三通上香再拜以朱書符作丸子用北斗訣凡神虎攝召乃北斗司掌録也當面北存北斗以水吞此符畢次啓祝曰今月某日伏遇北斗某星君下降之辰臨壇吞服靈符伏望洪慈允兹所懇凡遇行持役使神虎攝召魂儀分明報應齋功成就魔障不干臣干冒真威無任激切之至陽靈通真符隂靈降真符右符以紫楓木或桃木長尺二寸闊二寸四分朱書遇月旦上七日用茶酒餅五殳章栁脯錢馬二分祭之置醮壇中則萬真俱臨日久功曹自然通報太上五嶽破幽引魂寶籙太上三清敕降鄷庭三清惠光破幽啓關光照十方回二陽肇慶巨靈使光起死枯朽發榮者劈破山嶽受命天尊使者引魂萬神敬諾敕到奉行攝召諸符鬼器符謹請無上救苦真人在玄真人右玄真人搖動玉女金精照見天上地下即使亡某速現形急急如玉帝敕通天目符天目神君急速降靈流布真氣助吾眼明立見神鬼役使六丁鬼神受命不得隱形急急如玉帝敕先焚鬼器符於香爐中次焚通天目符於水盂中念焚呪以水灑壇及召魂幡併童子身次瞑目存神左紫微印右劒訣變身為太一存天兵列左右凡道衆皆化為救苦真人祝官將里社速攝亡魂前來附幡現形恰上帝訣取西北氣吹空中想太一睿相在空中變身呪曰靈童靈童出你神靈童靈童入我神你藏我隱身光明護身保命得安寧急急如上帝敕取北氣吹水盂令童子喫一口仍與左右人洗眼次左手午文默念開光呪天之靈光日月之光上聖威光五色神光速赴光中表裏通徹分明現形急急如圓光童子律令敕午文南氣吹幡上方步罡行持焚符作用三界使者召魂符天道蒼蒼幽靈萬變上帝敕下火急召魂三界召魂使者侯魏張𧪵火急召魂來現形天皇訣東南氣召魂符右符左七匝謹召飛符總管趙侯右七匝急領兵隨符勾管要亡人書符呪太上神符攝汝諸鬼呼召立至現形歡喜青龍在左白虎在右頭戴朱雀足履玄武符使召魂無有不至急急如律令元始符命時刻現形火急疾速三尸魂𩲸精分明速現形急急如律令唵吽吒唎以天罡氣入筆書之焚時亦用此呪喝云追攝某魂疾速現形行符呪火為朱雀水為玄武肝為青龍肺為白虎攝提使者逺神近鬼陽魂隂𩲸急召急至咸稟符命附幡歸位面奉髙真南宮度世急急如律令左卯文右子文追攝生字符上清大帝玉清大帝太清大帝太一救苦天尊玉皇上帝降戴通天之冠下天河之帶天地水官奉金書玉詔拔度亡過某前來現形急急如律令乾象天靈日月齊明攝土宿參沙計都攝滅三魂再至七𩲸上驅急急如律令神虎符上台虛猜星君中台六淳呈君下台曲生星君天帝敕神虎二大將神虎二使者魂速現形化元聿白星飛澤急急如神虎大聖敕神虎訣東南氣唵嗚吽吒烏輪荼義速赴來七遍烏龍遲皂墨膝黑唵帝敕虎吽薩婆訶辰文面西北取東氣一氣念三遍喝二聖三部使者火急引魂附幡現形取東南氣吹幡下現形符天三竒日月星地三竒乙丙丁人三竒精氣神青帝護魂攝赤帝養氣攝黃帝中主攝白帝侍𩲸攝黑帝通想自已五內五色氣血攝藏於符中想成人焚時亡人本命訣東氣想四象五行成其形返魂符隂鬼聚衆天靈攝幽幽冥冥無路可通非吾神將能追汝魂催上亡某魂𩲸不移時刻急急如玉帝敕唵啉吽七遍北氣天地閉隂陽行魂速返急急行急急如女青律令西南氣吹旙下現形符通現符通幽符通目符巳具在前亦附此用召魂附幡符天門照地戶通人門留鬼路攝魂攝𩲸倒生催魂攝尹文東北氣大力速攝魂神將速降靈三魂火急附疾速現真形急急魁至魒出筆神虎提魂攝𩲸使者劉青神虎不離一斬滅亡萬千形影飛行急十萬精光都一吸左行三尸不得住右治七𩲸獨飛行天印敕下火急奉行神虎之令急急如律令唵吽吒唎亡靈速附準內書至尊敕將名上帝敕命亡靈速附五方童子引魂將軍金闕律令某人立到壇附體通靈急急奉太一至尊律令神將趙公明疾速現形水噀之立附上清靈寶大法卷之三十八
