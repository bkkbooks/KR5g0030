front:
  text: 上清靈寶大法卷之二十五飛一
  hash: sha256:ffd86f504f9a0073a5b9e4acbb40b827aef0e984743da15a6346695a1d07b59d
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5g0030_HFL_025-001a, image: hfl/0950/0950-004.png}
body:
  text: 洞微髙士開光救苦真人寧全真授上清三洞弟子靈寶領教嗣師王契真纂經句分類門師曰靈寶大法有大梵隱語六十四句合於太陽經數出於天地之先有卦之前古今隂陽之象也語大梵開圖之時有數之始巳顯坤母東覆九日導乾兩卦之名至漢武帝時王母下授此經以開圖之祕言顯六十四卦之象通貫六十甲子乾坤坎離出於六甲之表不在甲子之限經中止有一婦人字火字並無水字別有泉字以顯真水也其理幽深故有數之始者出於未有天地之先呼吸之息契合隂陽是不息中息也息之所定萬㑹朝宗八冥細微之脉脉之所定一息四朝一呼而宣令一吸而朝宗一呼三寸一吸三寸三氣之祖大行梵氣周流也一朝一十五分九六天地隂陽縱橫大數以此推之可至丈尺於是積分為寸纍寸作尺以尺成丈故以指為寸因肘象尺以見於物然後律曆度量權衡推遷五緯七政八卦九宫二十四氣七十二候自此而生聖人則之制器之道萬範開成實因虛中有寶元始一氣所化是也經內備有萬法如隂丹陽丹天文禁戒卜筮吉凶象影占往知來之術莫不隱焉內又明大道元氣之毋鉛汞指歸之法三氣生根西元坤毋祕諱玄𡨋之妙大洞回風脫死混合成真之道致於濟生度死招真致靈福國寧家康時阜物鎮禳保度悔謝請祈莫不備焉又有禮樂器用之物形名服色兵革鬼魔之度五常俯仰科條之道皆先天巳備也並元始天尊所說故道君循體而撰次是天真皇人所書也中古儒作治世之教獨顯仁義益其一流大道於是乎隱殊不知其源出於先天也本生一源分流萬派色盡歸無色百川復混海終歸於元始祖也此經知之者為帝王師洞其奧為天真也依玄科四萬劫一傳天人昔西靈王毋將天象譯以世書傳授于漢武帝用顯制器立象萬物以傳人世經中所類有四十七品普依聖人訓㫖皆上古巳定儀式今從漢制庶明元始祖氣也經文序例藏金玉以鎮五嶽投龍璧于海淵鑄九鼎以安九州右三條上為帝王行道安鎮國祚之例也天地運終星辰錯度日月失昏四時失度隂陽不調右五條上消天災之例也除病謂依法以康和也解毒害謂消禳分野刑害之氣也度尸謂九煉之法以遷升也右三條下禳毒害之例也上升朱宫飛升金闕飛升南宫遊宴玉京遊行太空度上南宫飛升上清逍遙上清度品南宫名度南宫飛升太空魂度朱陵遊行三界右十三條升舉之例也咸得長生全其本年皆得度世劫劫長存門户興隆曽祖受度便得神仙延壽長年尸解得為九官真人國祚太平位登仙翁魔王敬形太隂煉形為聖君金闕之臣萬神朝禮魔王保舉右十七條功德應感之例也齎金寶質心告盟十天右一條傳度之例也按舊書以齎金寶效心盟天而傳度依玄科四萬劫一傳又告盟十天而傳分為三條蓋在經序則言上天所寶不傳下世至士齎金寶效心盟天而傳乃謂受傳合應如此至經中則言依玄科四萬劫一傳若有至人齎金寶質心依舊格告盟十天然後而付焉此正言傳度之格也不應別出今止存一條身則被殃殃及九祖泄慢墮地獄右三條獲罪之例經言不齊戒沐浴行香誦者獲被殃之罪若輕忽科禁妄泄非人漏慢玄奧不依年限而不齊戒盟受漏祕禁與非人使輕慢不信玄文皆入中科殃及九祖若漏慢不以為然巧僞求竒評論聖典訾毀玄文竊盜天寶皆入此條禍及七祖翁分別經中品類天品三十條原缺二條始青天諸天上天保天三十二天天根天中之天十方飛天臣天與天上清之天天帝天中天門五天負天橫天乘天天上天下使天天道飛天法輪天地天文天真天無氛穢天尊盟天地品十條地上地藏發泄地還地祇地獄斷地建役地根天地地戶地無妖塵國品十五條大浮黎土山海一國地土山川林木髙下土一國男女迮國一半傾土國安一國以道河海山嶽國王國祚國主尊品三十一條元始天尊髙尊諸天上帝萬帝五帝尊妙帝王太上道君元始上帝至尊南極長生之君韓君南上司命司録延壽益算度厄尊神天帝至真三十二天帝天中之尊青帝赤帝白帝黑帝黃帝五帝大魔太皇上帝長生太君無英公子白元尊神太一司命桃康合延諸天上帝聖君帝前聖品五條上聖諸天大聖長生大聖至聖神人聖君真品二十四條天真大神妙行真人至真大神巳成真人洞真上真九宫真人十方至真監真玉真真定光梵上真招真神真拒遏上真髙真金真成真真中有神何能別真保真洞妙自真天真皇人衆真仙品一十八條原缺五條神仙羣仙仙化萬仙齊仙仙道貴生仙道莽莽仙道貴實樂仙道仙公仙品便得神仙招集羣仙靈品十四條百靈魔靈靈寶本章神靈靈幡靈章至靈天中之靈靈風十轉回靈清靈靈篇靈書萬靈神品二十七條大神天真大神飛天神王萬神朝禮神真不死之神司馬大神尊神飛天神王監生大神神鄉總監鬼神天中大神敷落神真萬神無越萬神之宗神公萬神咸聽真中有神混合百神無量大神至聖神人便得神仙神纓自宫浮羅合神萬神朝禮神文王品一十三條魔王國王神王太玄魔王五天魔王我位上王魔王歌音魔王保迎魔王敬形至靈魔王帝王天中魔王大勳魔王公品三條神公仙公七祖公官品十二條侍經五帝玉童玉女君臣功曹使者直符香官五老諸天丞相三官鬼官金闕之臣人品五十條度人真人男女老者壯者少者強者婦女成人天人巳成真人白骨成人至學學士度人無量得為貴人世人上學之士一切天人至士至人二十四人父子常為人君三十二人無量度人十回度人中有度人韓君丈人仙化成人普度天人上天度人下鎮人身人道眇眇當人生門不欲人道窮遏人算斷絶人命門阿人度者幾人人道者心人道貴華至聖神人同學至人兆民師友右別至人紀人功過幽寂度人皇人親品十三條異骨成親億曽萬祖九祖父子祖考種親醜伯神公祖公公子七祖師友坤母天界類洞煥太空日月星宿璇璣玉衡天無浮翳空玄之中日月停景璇璣不行獨步玉京上升朱宫飛升金闕遊宴玉京飛升南宫即得返形遊行太空上天所寶度上南宫身得神仙諸天書名名書上天飛升上清上聞三十二天上徹徑御無上大羅玉清浮空而來浮空而至度品南宫超淩三界逍遙上清上清之天無色之境天中空洞太玄東斗南斗西斗北斗中斗飛天法輪飛行太空上無復色金剛乘天遼廓梵氣彌羅元綱流演輪轉無色周回十方旋斗歷箕總氣上元氣入玄玄泛景太霞上遊上清上開八門上聞諸天中有空洞欲界諸天氣蕩蕩色界落落髙章明氣四騫梵行諸天三界樂兮體入自然變化飛空眇眇大羅上無色根雲層峩峩浩劫之家統乘玄都身入玉虛空中飛空朱陵玄都紫微上宫金闕玉都九都太渺上元九日道乾升入金門天無氛穢空歌碧落地界類髙下上皆作碧玉土皆偏陷去地五丈地還平正傾土歸仰可伏御地祇不經地獄斷地逮役無極神鄉北都羅酆北都寒池三途五苦八難三惡地根五戶北酆金馬驛程下無復淵風澤天下地祇拔出地戶太隂琳琅山嶽吞煙魔界類魔王內諱羣魔束形魔精喪眼束縳魔靈百魔隱韻制魔保舉天中大魔五天魔王五帝大魔魔無干犯魔王靈篇色界魔王無色界魔王妖魔精匡御衆魔魔王歌音魔王保迎至靈魔王天中魔王明魔大勳魔王鬼界類枯骨更生鬼精滅爽回尸起死白骨成人垂死鬼妖滅爽幽魂苦爽尸解魂神暫滅長役鬼官回骸起死逼合鬼羣死魂總監鬼神總領鬼兵鬼爽鬼無妖精明檢鬼營鬼道妖魔精六鬼鋒鬼道易邪永離鬼官尸形魂神羣魔束首鬼精自亡妖塵幽魂苦爽水界類細雨河海靜默香湯沐浴淨霐泉曲之府寒池復淵風澤洞虛十二河源龍漢蕩蕩飛灑善類同時稱善莫不傾心咸行善心齊同慈愛異骨成親與善因緣吉慶長齊自吉卻死而巳惡類自凶惡聲穢氣未消體未洞真惡根三惡遏人算斬絶人命門毒惡死復傷病類聾病耳皆開聰盲者目明喑者跛痾積逮久病痼疾髮白齒落中傷垂死休否疾傷災苦類懷妊含胎苦惱三塗五苦八難天地否終日月五星虧盈聖神休否此失不祥運應滅度身經太隂天地運終星辰錯度日月失昏四時失度隂陽不調國主有災兵革四興疫毒流行兆民死傷師友命過天炎毒害有災之日罪類束形滅爽喪眼束縳伏御不得更生身則被殃殃及九祖長役鬼官逼合鬼羣嚴校疾除落滅請滅斬絶嚴攝普掃吐毒前驅前戮後刑屠割截首剪形明檢斷絶以攝北羅酆束送斬馘匡御束首自亡墮地獄禍及七祖翁滅度虧盈記人功過振伏逮役福類皆起成人枯骨成人皆得生成皆受護度咸得長生普得濟度全其本年無有中傷國安民豐欣樂太平皆得度世絶而得生却死而巳門户興隆世世昌熾萬災不干神明護門受化更生得為貴人皆得神仙皆即受度延壽長年不經地獄莫不受慶無量之福保護受經者身生死蒙恩度上南宫身得神仙削死上生保天長存世世不絶長為人君安鎮其方民稱太平萬氣長存不經苦惱三界侍衛五帝司迎名書上天疾除罪簿落滅惡根度品南宫仙化成人生身受度劫劫長存與天齊年超度三界永度三塗五苦八難普度天人今日欣慶受度請滅三惡斬絶地根飛度五戶名列太玄注算紀名落死上生護魂侍𩲸飬氣通血上天度人保制劫運使天長存回度五常千和萬合自然成真中理五氣混合百神萬氣齊仙仙道貴生普受開度身得受生各有生門天道貴生仙道常自吉不欲人道窮我道日興隆仙道貴度名度南宫拔出地户五苦八難受煉更生福德立降消諸不祥徑上南宫計日而得更生上消天災保鎮帝王下禳毒害以度兆民生死受賴其福難勝普度天人保舉上仙升入金門遊行三界無所不禳無所不辟無所不度無所不成飛升類獨步玉京上升朱宫飛升金闕遊宴玉京飛升南宫遊行太空度上南宫飛升上清超度三界逍遙上清飛度五戶飛行鼓從遊觀太空上遊上清飛空步虛身度我界體入自然有過我界身入玉虛飛升太空過度三界度上南宫遊行三界升入金門受度類受元始度人無量上品皆受護度衆真監度普得濟度皆得受度濟度垂死度人無量普度無窮莫不受慶度上南宫無量度人十回度人中有度人中有度世度厄尊神長生度世監真度生隨所應度度品南宫生身受度永度度內鮮霄度梵度普度天人今日欣慶受度飛度五戶上天度人回度五常普受開度仙道貴度身度我界我界難度度者幾人笑爾不度過度三界魂度朱陵天地運度以度尸形如法星宿錯度運應滅度四時失度以度兆民柏空度仙幽寂度人無所不度名度南宫仙類皆得神仙身得神仙羣仙翼轅仙化成人輔翼萬仙位登仙公保舉上仙長生類齒落更生巳生未生皆得生成枯骨更生咸得長生受生延壽長年生死蒙惠轉經受生好生韓君南極長生之君長生大聖長生度世度生上生監生生身受度南斗上生長生大君保命生根貴生受煉更生飛生自騫死類枯骨回骸起死白骨成人濟度垂死却死而巳幽魂尸解魂神暫滅生死亡魂削死不死之神回骸形魂死魂死傷北斗落死身經太隂尸形命過禮類以召十方始當詣座衆真侍座玄坐浮空五色獅子之上莫不傾心傾心皈仰元始登引說經都竟衆真監度當說是經周回十方傾土歸仰宗奉禮敬萬神設禮五帝侍衛三界稽首神明護門齎金寶效心盟天而傳營衛神文保護受經者身國王帝主君臣父子三界侍衛五帝司迎萬神朝禮上聞三十二天行道之日皆當香湯沐浴齊戒人室東向叩齒心拜閉目靜思身坐三色雲氣羅列左右日月照明項生圎象光映十方如此分明密呪召出臣身中關啓所言上徹徑御引氣三十二過東向誦經今日校録諸天臨軒並乘飛雲參駕建九色之節啓途翼轅傾光回駕齊到帝前部衛形魂列言上清魔王保迎魔王敬形侍衛送迎質心告盟十天齊心修齊六時行香十遍轉經為其行香誦經十過以度尸形如法亦當修齊行香誦經為天地帝主兆民行是功德有災之日發心修齊行香誦經萬神侍衛保衛爾身能齊而誦之者遣飛天神王下觀萬神朝禮地祇侍門保舉上仙飛天下觀上帝遙唱三界侍軒萬靈振伏供養尊禮樂類碧落空歌隱韻之音諸天遙唱百魔隱韻前嘯九鳯齊唱後吹八鸞同鳴嘯歌雍雍諸天隱韻天中之音鼓節嘨詠洞章金真朗郁玉音飛空之音空洞謡歌之章辭參髙真悲歌歌洞章我有洞章色界魔王歌曰魔王歌音音參洞章有聞靈音隱祕之音非世之常辭非世上常辭言無韻麗曲無華宛無量之音觀音流音曲麗空歌正音有知其音此音自然之音上帝遙唱宫闕類碧落朱宫金闕玉京南宫九宫上清鬱羅蕭臺玉山上京大羅玉清三華離便大有妙庭金闕玉房森羅淨霐南昌上宫韓司北都泉曲之府九署三官寒池劫輪歷關諸天五戶天門太空北鄷鬼營華房絳宫八門雲宫飛天法輪土門命門玄都朱陵紫微上宫金闕華都玉都上門菩臺九都自宫大渺之堂三界乘類緑輿瓊輪羽蓋玄座空浮五色獅子身坐青黃白三色雲氣丹輿緑輦並乘飛雲參駕朱鳯五色玄龍建九色之節十絶靈幡億乘萬騎麾幢鼓節伏幡擲火流鈴金鉞金馬神纓光氣類飛雲丹霄流精玉光五色鬱勃洞煥太空神風靜默山海藏雲天無浮翳四氣朗清密霧勃勃萬氣長存身有光明三色雲氣日月照明洞煥室內項生圎象光映十方引氣三十二過開明三景無文不光無文不明大行梵氣五色九色傾光玉明太明清明元明上明定光赤明玄明曜明光明靈虛明觀明玄明帝明擲火復明復淵天光赤明梵氣無色總氣氣入玄玄太霞雲營攝氣靈風聚煙紫虛鬱秀混合百神同氣洞明慶雲散煙吞煙氛穢妖塵冥慧洞清寶類瓊輪玉光碧玉金玉寶珠金寶靈寶金闕玉房玉山玉京玉真玉清流鈴九色之節十絶靈幡玉字龍文黃籙白簡金真玉音上天所寶玉都金門琳琅禽類朱雀朱鳯九鳯八鸞白鶴獸類五色獅子鳥獸舍胎青龍白虎億乘萬騎八威猛馬金馬龍文物類門戶室軒堂門斗鼓麾幡節鉞輿簡輦火鈴營馬澤剛圖輪箕桃房山林地土座家洞眸臺鏡纓蓋桑柏刀沙嶽身類耳目形髮齒老少壯強妊胎骨男女心口眼體身父子魂身精氣𩲸血項首壽算祖考名力命泥丸絳宫翁夫諱言類歌說經聰明能言喜慶難言法事經法言無華綺口無惡聲經中所言名諱辭唱誦修誦受誦密呪曰關啓所言唱吹嘯嗚音歌韻列言上清告範謡曲吟惠道類一國以道萬道之宗尸解之道太上道君行道之日惟道為身仙道貴生人道渺渺天道貴生鬼道貴終仙道莽莽仙道常自吉鬼道常自凶不欲人道窮惟願仙道成我道日興隆仙道貴度鬼道相連仙道難固鬼道易邪人道者心仙道貴華爾不樂仙道其欲轉五道末學道淺得道者乃當洞明道備德類功滿德就德難可勝福德立降德可伏御地祇功德甚重行是功德忠類一國是男是女莫不傾心一國男女傾心皈仰傾心皈仰咸行善心齊同慈愛異骨成親國安民豐欣樂太平一國以道預有志心為國王帝主安鎮國祚保天長存安鎮其方民稱太平保制劫運使天長存天地否終日月五星虧盈至聖神人休否為天地否終星宿錯度日月失昏為四時失度隂陽不調為國主有災兵革四興為疫毒流行兆民死傷行香誦經上消天災保鎮帝王下禳毒害以度兆民為天地帝主兆民行是功德有災之日發心修齊燒香誦經孝類億曽萬祖幽魂苦爽皆即受度上升朱宫為上世亡魂斷地逮役度上南宫七祖升遷永離鬼官為父子上解祖考億劫種親疾除罪簿落滅惡根師友命過亦當修齊行香誦經文類神文黃籙白簡名書上天混洞赤文五文開廓無文不光無文不明無文不立無文不成無文不度無文不生今日校録執籙把籍普告三界疾除罪簿元始符命文舉天神公受命敷落五篇赤書玉字八威龍文故作洞文告盟十天記人功過元始靈書中篇昔書其文書其功勤上奏諸天武類束形滅爽喪眼伏御束縳殃及長役斷絶嚴校疾除落滅拘留逼合部衛敷落請滅斬絶負天擔石反山橫天擔力鬼兵嚴攝普掃吐毒四張前驅拒遏前戮後刑屠割風火截首剪形明檢金馬不得容隱保制遏人斷絶以攝束送斬馘部制統乘匡御敕制兵革已上品類莫非靈寶祖氣本生一元分流萬派此經知之者為帝王師洞其奧為天真也上清靈寶大法卷之二十五
