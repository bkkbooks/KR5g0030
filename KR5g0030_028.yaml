front:
  text: 上清靈寶大法卷之二十八飛四
  hash: sha256:b5aad9a3406e505202e3cd4079e50625aebb8e94f8bc40deb0864e21a456f881
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5g0030_HFL_028-001a, image: hfl/0950/0950-168.png}
body:
  text: 洞微髙士開光救苦真人寧全真授上清三洞弟子靈寶領教嗣師王契真纂傳度儀範門師曰夫靈寶大法者三洞三品之上道萬百千篇之靈章受者不論仙凡而在於有經者為師授者不擇貴賤而在於有求者為弟子也按玄都定録四萬劫一傳者非下元神洲品格乃三天之年限蓋禁泄之於非人倘有仙才豈論四萬劫一出也神洲條禁四百年一出其文亦許聽至人四十年付一人四百年不得過七人但盧後學傳習之者衆叛道背師違盟負誓不明至理侮弄道法輕泄漏慢觸冒玄憲不惟毀敗至教而且負於師資削降階職終難歸復上宫兼無骨相之子纍及玄祖不可不戒也又有狂妄之師偶遇其文外以髙邁清德內以好貪資貨不擇賢智多示不肖之子混淆至教是致三宫鼓筆四司録愆遂使道妙不符靈玄比空而上玄好生惡殺普度沈淪曲出度人無量之旨接引後學之士別出授度科格使和陽降光不生隂殺兆宜遵守翊贊玄化則普天懷德同證大羅之果太極真人曰吾自昔劫以來備經歷化富貴貧賤無不周旋師資付授一言一句不生真假之念以假為真自獲真應若以真為假其真自失自生真假之別故曰萬法真假之念丹宫亂氣萬劫難明一心奉真無假立獲真應妙果梵空真人曰凡授受之始質心盟科之理者以學道之子澆薄淺見不得純白之志故有金寶質心之格重道輕財亦有多失於真受亦有好利量度輜銖而失於其人嗣法皆非消磨本心明譴未及安逃鬼神剪戮矣師曰授受之科當選擇其人神真內固威德儼然言行有信慈憫忠孝謹節正已操心端直志慕希夷如此之人方可修持上法濟度死生若隂謀潛害言行有虧忠孝不立心行邪佞諂曲詐欺內無德行外失威嚴則福淺惡逆之人或三途中世屠劊將兵刑戮之家豈可洞逹天地神秖者哉當審賢愚分別仙姿然後方可受詞立誓依玄科年限備詞心章取大帥口命即元始天尊也次求宗師保舉與度師同壇之宗也即申三天上相付下三官府獲其吉報方擇吉日一依科格盟天而傳又曰大凡受持之師行持半紀許度五人一紀之後度十三人不可再度然靈寶之文非他法之比切宜慎之效心盟天經曰至士齎金寶效心盟天而傳又曰若有至人質心依舊格告盟十天然後而付焉此所以質心而貴道也告盟之格且諸侯公卿欲濟世扶危保鎮國祚受此大法當以上金一百二十兩五色綾羅各三十六匹朱砂青絲各十二兩鎮信祿米一百二十石命錢一百二十貫誓香三十六斤若士庶欲濟度存殁超升玄祖當以上金三十六兩五色綾羅各十匹朱砂青絲各九兩鎮信祿米十二石命錢十二貫誓香六斤若肥遁山林長齋岩谷修錬有道之士當以上金九兩紫羅一端青絲朱砂各一兩誓香一斤以案𥿄一百張代幣帛五方筆墨各一件以代錢米如無力行道之士亦可用三分之二不可缺也或寒棲之士無力亦可割髮以代金上告三十二天天帝以盟十天也又以五色布三尺六寸效質心或剌血以代之效心五帝以給玉童玉女也青絲者以代割髮丹砂者以代剌血今雖有明質信幣未嘗能割髮剌血者大抵質心要在割一身之肥肉截九天之靈寶不以恥痛為念結萬劫因緣以顯精𠂻誓不妄傳無疑忽之誠乃其人也何用世財耳蓋此法祕於上天其禁至重至於天人詣玄都上宫而受傳亦齎金寶而受是以不可輕泄故也若有道之士所以法信度法師當一一具奏天廷傳度按法應千傳用之物不可私心隱匿如弟子外惜財貨而輕道內惜髮膚而恥痛難苟從質心傳受之後其道不行神真不侍經法百魔所敗度師弟子俱獲深殃纍祖負玄切宜戒之如遵科格則諸天欣慶群魔束形萬神敬禮開壇之時授度之日自有衆真監度以授於我道法流行百魔隱韻離合自然呼聖集真濟生度死積功纍德不日成之受法之人要在忠孝君師父母慈悲幽冥苦爽心奉三寶清貞修巳含光默識密行隂德一心本末終不忘信求師匠之微言篤實任淳而遵守在品祿無妨於仕君養親居山林者無嫌於修錬形神樂江湖者無愧於逍遙逸散務耕耘者不廢於農桑稼穡大隱於行商坐賈者不阻於經營謀運小隱於醫卜工巧者不抑於精專藝業韜於暗持而必成顯於光耀而必墮苟奉上忽下妄佞隨勢姦狡多機輕於易倦評論端緒傲慢一切好華務利浮浪播美淫醉貪怒志行不建有犯有條必置於幽極之所若遵教戒立保升騰仙階可躋矣此吾門之訓不示凡子勉守慎之明詳於此師曰凡拜心章巳承上玄之命許行付度即再用心章下通於靖中或髙山之上露章分十天寶劵合同職劵玄都誓劵告盟十天玄泉芝草或竒花珍果名香禮師三十二拜為表餘批報補受職任皆在洞視百靈神朝玉陛而洞明方能入七經之旨然後醮謝諸師或心章巳逹玄命許度立盟結誓禮師分契巳畢餘皆許立上天玄中之師入七經之道建壇自度也不必一一在於度師攝行又須假世中經師而逹於玄師是無師不度者經師也無師不成者玄師也經師與玄師無異稍有乖奉二官奏劾降職罰算餘如玄憲仙格受度如畢即以黃繒九寸丹書流金錬身長生靈符背書九戒以絳囊盛之懸映心前遵持九真大戒受行法職十戒十二天人之行誦靈書歌章萬遍方入七經後持八緯必致真人之位雖功漏不滿數合入冥亦得暫遁太隂尸解得道上升仙宫奏格玉清上清太清昊天聖祖天皇北極后土元天東極九幽十方諸天尊朱陵大帝南極洞淵九宸三十二天九天帝東華五老上帝西元都省靈虛宫天仙內院日宫月府天罡五星四曜五斗三台南斗二十八宿北斗南昌三官四聖經籍度師玄師天師監齋申狀式三真人妙行真人三籙院九天三洞宗壇三洞寶經天樞院天曹天真皇人靈寶主帥十方無極大神三元道化東嶽四嶽水府酆都十王都水監九壘太嵗牒九州社令都大城隍州城隍縣城隍靖治官將靈寶官將當境劄住居土地司命等神傳度表青詞繳印單保舉狀監度狀三代立盟狀奏狀翻黃倚黃請醮奏申狀醮關申發關表關詞關醮筵進龍車表祭將疏設醮衆真獻狀奉安疏收補帖傳度仙誥三天劵合同劵環二箇思微版劵告盟十天劵謁簡三十片青絲一兩䇿杖一條交將帖戒牒補職帖保舉師狀保舉師具位姓某右據嗣法弟子某人本貫入意投詞乞行保舉傳度事契勘某人律身端謹慕道恪恭堪受靈寶職任謹具狀申靈寶大法師某君壇下伏乞法慈特賜謄奏天廷依科傳度如某人受持之後或有違盟誓某甘同俟玄憲伏候法旨年月日保舉師狀監度師狀監度師具位姓某右據嗣法弟子某人詞稱本貫入意乞行監度事契勘某沖虛心存利濟堪受靈寶法職合與監度未敢擅便謹具狀申靈寶大法師某君壇下伏乞法慈依科奏盟開壇傳度伏候法旨年月日監度師狀三代出身立盟誓狀具弟子位姓某今開具三代出身鄉貫等于後一本貫某州某縣某鄉某保某靖焚修一髙祖某具生死年月日時有官受籙並依實具列髙祖妣某氏曽祖某曽祖妣某氏祖某妣某父某生死年月日時母某生死年月日時一某見年月日時生上屬北斗某星主照一某於某年某月日就龍虎山正一天師門下參受某籙一某於某年月日詣某君壇下傳受某法見今奉行一某四代即不係將帥屠劊之家及不係十惡五逆之人亦不犯不忠不孝不曽經罰一某今來乞傳授靈寶大法受持之後誓願代天行化修齋立功普濟幽明保安家國不敢叛道背師始勤終怠輕泄祕典妄傳非人及不忠不孝不仁不義傲忽至真違越科禁如有似此等罪甘以身謝三官禍延七祖一如玄科令一某今請到保舉師某人監度師某人右謹具如前如有異同甘俟天憲謹狀年月日具位姓某狀投詞式具法職某右某本貫某州某縣某保某靖椘修見年幾歲某月日時建生上屬北斗某星君主照伏念夙承妙廕叨處玄門佩符籙而護命鎮身受經法而承流宣化進修未至愧及物之無功蒙昧何知恐未明於玄奧靖惟寡德徒玷真風是用齋沐身心齎持香信躬詣度師某君壇下乞奏授上清靈寶大法經文祕訣符圖印章一宗誓願行持章奏普濟幽明修錬形神保安家國興利除害建德立功不敢怨道咎師始勤終怠輕泄祕典妄示非人如違殃流一身禍延七祖風刀立考永失人倫謹具狀拜㱼度師三洞宗師真人某君壇下伏乞師慈俯垂俞允特賜謄奏天廷依科傳度施行伏候法旨年月日具位姓某狀奏玉清具法位小兆臣姓某右臣不避誅夷僣干天聽深知躐越首丐寬容臣謹據入詞永失人倫事臣智識凡庸業行淺薄未通真奧安可接人恩惟太上垂科靈文降世許以汲引後學繼襲宗風所領來詞不容抑絶謹卜今月某日就某處冒禁盟天謄詞請命取某曰恭依科格開壇傳度謹遵師範付授靈文裂劵分環結盟立誓至夜修設清醮若干分位上謝天恩祈奏補某人名䘖及奏請壇額靖名刋造合用印篆心印開具式樣單子繳連在前臣昧死謹録狀上奏玉清上帝元始天尊陛下恭望道慈允臣所奏特降勑命告下三界十方諸天曹局陽庭隂治應干合屬去處照應弟子某人所受法職印式咸使聞知即為某赦宥宿愆削除罪簿標名玉格列籍玄都其或為國為民祈禳請禱濟生度死修齋立功應有符檄關盟所至悉無阻遏速獲施行仍乞降賜玄元始三氣靈寶妙光流注某人混元神室之中即使存念施為呼吸修用洞符玄妙通逹真靈無所不度無所不成設醮至期恭俟恩光鑒臨醮席證眀修奉臣凡愚濁質濫厠仙階冒瀆宸威罪當萬坐謹具狀奏聞伏候勑旨謹狀年月日具位臣姓某狀奏三清四帝並同前奏於內除三清玄元始三氣一氣攺之餘外不用奏九幽十方靈寶具位小兆臣姓某右臣不避誅夷入意上謝天恩除具奏三天上帝及關盟三界普告十方外所奏補某人見前上奏九幽拔罪天尊道前恭望見前伏候勑旨年月日具位臣姓某狀奏奏南極朱陵具位小兆臣姓某右臣不避誅夷見前至上奏南極朱陵大帝太微南極注生大帝御前恭望睿慈同前至速獲施行仍乞勑降丹天世界朱陵火府南昌上宫受錬司合干仙官將吏一合下臨某人靖治之中輔助教法拯濟幽冥使無所不度無所不成運念施為克彰靈應伏候勑旨謹狀年月日具位臣姓某狀奏奏洞淵具位小兆臣姓某右臣不避誅夷見前上奏洞淵三昧無量上上太一天君三洞天尊御前恭望𧇖慈允臣奏懇特降勑命告下三界十方重泉九壘風梵綱維之境朔單鬱絶之鄉地水職曹冥司去處照應弟子某同前伏候勑旨年月曰具位臣姓某狀奏奏九宸具位小兆臣姓某右臣不避誅夷同前上奏髙上神霄玉清真王長生大帝東極青華大帝九天應元雷聲普化天尊九天雷祖大帝上清紫微碧玉宫太一大天帝六天洞淵大帝六波天主帝君南昌上宫可韓司丈人真君九天採訪使應元保運真君御前恭望𧇖慈允臣所奏特降勑命宣告九霄三十六天雷霆三省四院四司東西華臺四曹四局六部八寺諸司館閣及諸曹院子司照應弟子某所受法職印篆咸使知聞其或為國為民禳災除害祈禱雨暘輔正除邪濟生度死應有符檄關盟所至悉無阻遏速獲施行仍乞頒下三界真司從臣所奏依應施行臣凡愚伏候勑旨年月日具位臣姓某狀奏奏生神上帝具位小兆臣姓某右臣不避誅夷同前上奏靈寶自然九天生神大帝御前恭望睿慈允臣所奏特賜勑命告下三界十方諸天曹局陽庭隂治應干合屬去處照應弟子某所受法職印式咸使聞知即為某赦宥宿愆削除罪簿標名玉格列籍玄都其或為國為民祈禳請禱濟生度死修齋立功應有符檄關盟所至悉無阻遏速獲施行仍乞遙降九