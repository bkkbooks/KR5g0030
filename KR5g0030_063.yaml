body:
  text: 洞微髙士開光救苦真人寧全真授上清三洞弟子靈寶領教嗣師王契真纂正申門申日宫具位姓某謹據入意至同遂生方事某據詞難抑巳於某月某曰先具奏聞祈恩赦宥今依科格建立玄壇次第進表上章請符頒赦朝真懴謝破獄召魂普施夜齊奉行冶煉給籙分劵保舉超升事畢拜表言功解壇滿散至某日夜祗設清醮三百六十分位上答天恩今者開壇之始所有合干事務欲得按式關行除再具奏天廷申牒合屬真司外須至申聞者右謹具狀申日宫炎光鬱儀太陽帝君聖前伏望聖慈俯垂省覽大布陽光燭開長夜特賜聖㫖下三界考校真司拔度亡過某等洎下元苦爽其有觸犯三光諸罪普該赦恩俾獲受度仍乞分輝降氣灌溉斛食充滿十方廣濟無極至期恭行大煉願得差降仙靈童女應召下臨請以太陽真晶密符運用變煉所薦隂魂俾業纍銷鎔成人仙化干冒聖威某下情無任惶懼之至謹具申聞謹狀年月日具位姓某狀申月宫具法位姓某謹據入意同前除再具奏天廷申牒合屬真司外須至申聞者右謹具狀申月宫黃華素曜元精聖后太隂皇君聖前伏望聖慈俯垂省覽特賜聖㫖下三界真司原赦亡過某等洎幽塗苦爽觸犯天光之罪出離重隂獲承薦悼次乞分輝降氣攝化斛食普濟飢魂至期恭行大煉願得頒下仙靈童女上請黃素真晶密契存思澡煉沉魂蕩濁流清返形升化干冒聖威某下情無任惶懼之至謹具申聞謹狀年月日具位姓某狀申天罡具法位姓某今據同日宫狀至申牒合屬真司外須至申聞者右謹具狀申天罡大聖星君聖前伏望聖慈俯垂省覽特賜聖㫖下三界冥曹去處開度所薦亡魂洎下元苦爽原其觸犯諸愆得覩瑶光臨壇受度至期乞降純陽生氣治煉死魂俾枯骨再生登真度命冒犯聖威某下情無任惶懼之至謹具申聞謹狀年月日具位姓某狀申五星具法位姓某今據同日宫狀至申牒合屬真司外須至申聞者右謹具狀申東方木德歲星重華星君南方火德熒惑執法星君西方金德太白天皓星君北方水德辰星伺辰星君中央土德地候鎮星星君聖前伏望聖慈俯垂省覽特賜聖㫖宣示冥曹拔合㑹之亡魂銷積生之罪籍俾乘慧燭獲受天恩仍祈希十極之祥光變煉斛食攢五行之真氣灌注華池使枯朽發生魂神備具得成仙質逍遙上清干冒聖威某下情無任惶懼之至謹具申聞謹狀年月日具位姓某狀申四曜具法位姓某今據同日宫狀至申牒合屬真司外須至申聞者右謹具狀申神首羅㬋星君神尾計都星君天乙紫氣星君太一月孛星君聖前伏望聖慈俯垂省覽特賜聖㫖告下冥曹咸齊拔於沉魂盡原除於罪犯乘光所燭聞召而來至期併乞瑶光布流玄墠妙隂陽而既濟煉魂爽以更生建齊以後願得三景開明羣隂屏息凡朝修而懴謝冀典者以歷關庶伸齊功不經魔試干冒聖威某下情無任惶懼之至謹具申聞謹狀年月日具位姓某狀申五斗東斗注算星君南斗上生星君西斗記名星君北斗落死星君中斗大魁星君申二十八宿東方七宿星君南方七宿星君西方七宿星君北方七宿星君周天三百六十五度𨇠度星君申三台上台虛精星君中台六淳星君下台曲生星君右三狀並同四曜申五方五帝具法位姓某今據同日宫狀至申牒合屬真司外須至申聞者右謹具狀申青帝護魂真君赤帝養氣真君白帝侍𩲸真君黑帝通血真君黃帝中主真君聖前伏望聖慈俯垂省覽特賜聖㫖告下冥司開度苦魂俾承睿澤仍冀降五靈之真氣煉十池之枯骸內長靈芝外全仙質咸輔神而入妙獲證果以登真干冒聖威某下情無任惶懼之至謹具申聞謹狀年月日具位姓某狀申南斗具法位姓某今據同日宫狀至申牒合屬真司外須至申聞者右謹具狀申天府司命上相真君天相司録上將真君天梁延夀保命真君天同益算保生真君天樞度厄煉魂真君天機上生大理真君南上朱陵火府君聖前伏望聖慈俯垂省覽特降太上敕赦生天寶籙符合凡篆宣告三界十方天牢地獄去處拔度亡過某等及下元苦爽咸奉赦恩脫離業報祗受齊功至期仍乞差降南上水火二司受煉一行官吏上清洞陽流金之精下臨玄壇陶鎔滯爽銷爍罪根具質生神超升福境干冒聖威某下情無任惶懼之至謹具申聞謹狀年月日具位姓某狀申北斗具法位姓某今據同日宫狀至申牒合屬真司外須至申聞者右謹具狀申北斗髙上玉皇尊帝太微玉帝北極玄卿大帝天英貪狼真皇君天任巨門真皇君天柱祿存真皇君天心文曲真皇君天禽廉貞真皇君天輔武曲真皇君天衝破軍真皇君天內左輔洞明真皇君天蓬右弼隱元真皇君聖前伏望聖慈允兹申懇再賜聖㫖下玉府玄曹宣告元差神虎一行官吏遍詣十方三界天牢地獄無間苦處根刷亡過某及在㑹該度亡爽不問罪業淺深巳未報對咸禀赦恩盡行追攝赴壇受度至期乞降玄皇正氣併頒下煉度官君契臣修奉斡旋造化胚冶隂魂使萬罪蕩除一靈不昧超凡入聖悟道登真干冒聖威某下情無任惶懼之至謹具申聞謹狀年月日具位姓某狀申夫人北斗九皇夫人北斗玄冥太一夫人右一狀同北斗申斗府具法位姓某今據同日宫狀至申牒合屬真司外須至申聞者右謹具狀申黑律攝魔帝君擎羊陀羅二使者聖前伏望聖慈俯垂省覽告中天之斗極降太一之隱書分敕吏兵遍通冥府追尋魂爽照㑹姓名來赴玄壇皆承道果干冒聖威某下情無任惶懼之至謹具申聞謹狀年月日具位姓某狀申天官具法位姓某今據同日宫狀至申牒合屬真司外須至申聞者右謹具狀申上元天官紫微大帝聖前伏望聖慈俯垂省覽特降天官玉簡真符告下上元三十六曹水火風刀考官併三界考校去處拔度亡過某等及囚徒苦爽咸禀天恩並與斷地逮役俾詣玄壇得霑妙果受煉更生某