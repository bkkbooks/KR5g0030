body:
  text: 洞微髙士開光救苦真人寧全真授上清三洞弟子靈寶領教嗣師王契真纂正奏門奏玉清具位臣姓某昨據入意至同遂生方事臣據詞難抑巳於某月某日先次奏聞祈恩赦宥今依科格建立玄壇次第進表上章頒符錫赦朝真懴謝破獄召魂普施無礙夜齊奉行水火大煉給籙破劵保舉超升事畢拜表言功解壇滿散某日夜祗設清醮三百六十分位仰答天恩今者妙範初陳玄綱將舉所有合干事務按式關行除再具奏諸天帝尊申牒三界真司外須至奏聞者右臣謹録狀上奏玉清上帝元始天尊陛下恭望道慈允臣所奏特賜敕命左右二真開函啓藴頒降元始諸真符籙誥命契臣凡篆普告諸天諸地陽庭隂治一切主司赦拔亡過某等及下元苦爽無邊大罪出離重隂俾進瑶壇躬承開度仍乞頒下玉清靈虛宫天仙內院升度玄局執職萬神如期應臣請召顯助宣行臣於修齊行道請命祈恩願賜鑒觀以副祈禱冒犯天威臣誠惶誠恐稽首頓首謹具狀奏聞伏候敕㫖年月日具法位臣姓某狀奏奏上清具位臣姓某昨據入意同前須至奏聞者右臣謹録狀上奏上清大帝靈寶天尊陛下恭望道慈允臣所奏特命左右侍真開函啓藴頒宣太上敕赦生天寶籙併洞玄齊法契臣修用普告諸天諸地隂陽曹局合屬主司赦拔亡過某等及囚徒苦爽億劫𡨚愆脫離苦趣俾臨壇墠受化更生臣三日正齊九時朝奏願垂鑒證以遂齊功冒犯天威臣誠惶誠恐稽首頓首謹具狀奏聞伏候敕㫖年月日具法位臣姓某狀奏奏太清具位臣姓某昨據入意同前須至奏聞者右臣謹録狀上奏太清大帝道德天尊陛下恭望道慈允臣所奏特賜敕命頒降泰玄都省宣付三界十方合屬去處赦拔亡過某等及囚徒苦爽億劫𡨚愆脫離苦趣俾臨壇墠受化更生仍乞睿㫖宣示上章曹治千二百官照應凡章詞上御毋致遣命從臣所請速為頒行冒犯天威臣誠惶誠恐稽首頓首謹具狀奏聞伏候敕㫖年月日具法位臣姓某狀奏奏昊天具位臣姓某昨據入意同前除再具奏三天請頒符命專行拔度外須至奏聞者右臣謹録狀上奏太上開天執符御曆含真體道昊天玉皇上帝陛下恭望天慈允臣所奏再賜敕命頒下泰玄都省宣告三界合屬真司咸遵符命開度亡過某等及下元苦爽並與原除大罪拔出重隂俾進瑶壇躬承妙果臣三日正齊九時朝奏願乞恩光下逮鑒證熏修冒犯天威臣誠惶誠恐稽首頓首謹具狀上奏以聞謹狀年月日具法位臣姓某狀奏奏道祖具位臣姓某昨據入意同前除再具奏天廷請頒符命專行拔度外須至奏聞者右臣謹録狀上奏道祖上靈髙道九天司命保生天尊御前恭望道慈允臣所奏特賜敕㫖告下三界合屬真司咸遵符命開度亡過某等及下元苦爽並與原除大罪拔出重隂俾進瑶壇躬承妙果臣三日正齊九時朝奏願乞恩光下逮鑒證熏修冒犯天威臣下情無任惶懼之至謹具狀上奏以聞謹狀年月日具法位臣姓某狀奏奏天皇具法位臣姓某昨據入意同前除再具奏三天請頒符命專行拔度外須至奏聞者右臣謹録狀上奏勾陳星宫天皇大帝陛下恭望天慈允臣所奏特賜敕㫖告下諸天星府洎三界合屬真司咸遵符命開度亡過某等及下元苦爽並與原除大罪拔出重隂俾進瑶壇躬承妙果臣三日正齊九時朝奏願乞恩光下逮鑒證熏修冒犯天威臣下情無任惶懼之至謹具狀上奏以聞謹狀年月日具法位臣姓某狀奏奏北極具法位臣姓某昨據入意同前除再具奏三天請頒符命專行拔度外須至奏聞者右臣謹録狀上奏紫微中天北極大帝陛下恭望天慈𠃔臣所奏特賜睿㫖再下中天斗府宣告元差神虎官吏根刷上件亡魂其有未得釋放者咸遵符命盡行追攝赴壇親承開度仍乞頒付三界十方遵禀施行更祈玉音宣降陽晶隂𩲸水火二司如期差撥受煉一行仙吏應召下臨顯助宣行煉魂升度臣登齊朝奏願得分輝應感昭著元勳冒犯天威臣下情無任惶懼之至謹具狀上奏以聞謹狀年月日具法位臣姓某狀奏奏后土具法位臣姓某昨據入意同前除再具奏三天請頒符命專行拔度外須至奏聞者右臣謹録狀上奏承天效法厚德光大后土皇地祇殿下恭望宸慈允臣所奏特賜睿㫖告下三界十方九壘重隂土皇土府冥曹幽獄去處咸遵符命拔度亡過某等及囚徒苦爽瞻覩慧光出離黑暗臨壇受度證果超生至期登齊朝奏上願分輝下燭俾遂修崇冒犯宸威臣下情無任惶懼之至謹具狀上奏以聞謹狀年月日具法位臣姓某狀奏奏元天具法位臣姓某今據入意同前除再具奏三天請頒符命專行拔度外須至奏聞者右臣謹録狀上奏元天大聖后殿下伏望宸慈允臣所奏特賜睿㫖告下三界真司咸遵符命開度上件亡魂并及苦爽出離幽隂獲承道果受煉更生至期登齊朝奏上願分輝下燭俾遂修崇冒犯宸威臣下情無任惶懼之至謹具狀上奏以聞謹狀年月日具法位臣姓某狀奏奏東極具法位臣姓某昨據入意同前除再具奏三天請頒符命專行拔度外須至奏聞者右臣謹録狀上奏東極宫中大慈仁者尋聲赴感太乙救苦天尊御前恭望道慈允臣所奏再賜睿㫖頒下三界十方天牢地獄一切去處咸禀符命赦拔亡過某等及應係囚徒苦爽其有纍劫未原之者普行釋放赴壇受度臣代天行道開破幽牢恭乞分形應化密助神功更祈敕降南北兩宫煉度主者至期火飛陽候水注隂符煉化枯骨上升福境臣登齊朝奏上願隨機赴感普濟幽明冒犯宸威臣下情無任惶懼之至謹具狀上奏以聞謹狀年月日具法位臣姓某狀奏奏南極具法位臣姓某今據入意同前除再具奏三天請頒符命專行拔度外須至奏聞者右臣謹録狀上奏南極長生大帝御前伏望天慈允臣所奏特賜敕㫖告下三界真司拔度所薦亡過某等及一切囚徒苦爽不以罪業深重使出離幽扃臨壇受度仍乞宣降丹天火府南昌上宫水火二司煉度官典至期上請隂陽真晶應召下臨付臣運用變煉死魂俾業纍銷除形神俱妙冒犯天威臣下情無任惶懼之至謹具狀上奏以聞謹狀年月日具法位臣姓某狀奏奏九幽具法位臣姓某今據入意同前除具奏三天請頒符命專行拔度外須至奏聞者右臣證録狀上奏九幽拔罪天尊御前恭望道慈允臣所奏特賜睿㫖下三元九署五嶽九州羅酆宫洞九幽十方諸大隂獄長夜泉扃一切考官掾吏照應原赦亡過某等及下元苦爽之衆歷劫以來無邊大罪咸承帝命並與勾銷過目焚毀業籍俾離幽暗獲受齊功至期奉行大煉恭乞分輝應感布氣周流幽夜開光羅酆罷對永離惡趣咸沐善緣冒犯天威臣下情無任惶懼之至謹具狀上奏以聞謹狀年月日具法位臣姓某狀奏奏十方天尊具法位臣姓某今據入意同前除具奏三天請頒符命專行拔度外須至奏聞者右臣謹録狀上奏東方無極太上靈寶天尊御前恭望道慈允臣所奏特賜睿㫖下十方無極世界地水冥司一切去處照應恭乞運慈悲慧力放靈寶妙光洞燭幽扃拔度亡過某等及囚徒苦爽出離長夜獲領薦修臣然燈破獄之際更願分形散影拔領無邊及建齊之日仍望敕勒仙靈官衆臨壇鑒證逹悃書功三日趍朝九時懴謝等祈恩霈普利存亡冒犯天威臣下情無任惶懼之至謹具狀上奏以聞謹狀年月日具法位臣姓某狀奏南方無極太上靈寶天尊西方無極太上靈寶天尊北方無極太上靈寶天尊東北方無極太上靈寶天尊東南方無極太上靈寶天尊西南方無極太上靈寶天尊西北上方下方此九位各一狀並同東方式奏朱陵朱陵度命天尊右一狀同南極奏九煉天尊具法位臣姓某今據入意同前除具奏三天請頒符命專行拔度外須至奏聞者右臣謹録狀上奏罪消北簿天尊朱陵度命天尊法橋大度天尊火煉丹界天尊轉輪聖王天尊道遙快樂天尊御前恭望道慈允臣所奏特賜睿㫖下三界十方冥曹隂獄去處咸乘太上慧光開明幽暗赦拔亡過某等洎囚苦罪魂並離業報顯受齊功至期奉行大煉恭乞攝二儀祖氣運九煉神功起白骨以成人即朱陵而度命冒犯天威臣下情無任惶懼之至謹具狀上奏以聞謹狀年月日具法位臣姓某狀奏奏洞淵具法位臣姓某今據同昊天狀至請頒符命專行拔度外須至奏聞者右臣謹録狀上奏洞淵三昧無量上上太乙天君三洞天尊御前恭望道慈允臣所奏特賜睿㫖下三界十方重泉九壘風澤洞虛之境一切冥曹咸仗慧光開明隂翳拔度亡過某等并及幽囚罪爽俱離惡趣上沐道恩俾獲升遷無縈沉滯冒犯天威臣下情無任惶懼之至謹具狀上奏以聞謹狀年月日具法位臣姓某狀奏奏神霄具法位臣姓某今據同昊天狀至請頒符命專行拔度外須至奏聞者右臣謹録狀上奏髙上神霄玉清真王長生大帝御前恭望天慈允臣所奏特賜睿㫖下三界十方合屬冥曹去處拔度所薦亡魂下元幽爽咸從原宥俾離業報顯受齊功至期奉行大煉恭乞降韓司之仙吏開丹霍之神庭匹配坎離斡旋造化陶魂鑄𩲸易質生神克成九轉之功允契十回之妙冒犯天威臣下情無任惶懼之至謹具狀上奏以聞謹狀年月日具法位臣姓某狀奏奏三甲具法位臣姓某今據同昊天狀至請頒符命專行拔度外須至具狀奏聞者右臣謹録狀上奏甲子天皇君甲寅地皇君甲申人皇君御前恭望天慈允臣所奏特賜睿㫖下三界十方合屬去處咸承帝命開泰幽關赦拔亡魂解消罪對俾沾妙果均獲受生冒犯天威臣下情無任惶懼之至謹具狀上奏以聞謹狀年月日具法位臣姓某狀奏奏九天具法位臣姓某今據同昊天狀至請頒符命專行拔度外須至奏聞者右臣謹録狀上奏鬱單無量天帝上上禪善無量夀天帝梵監須延天帝寂然兜術天帝波羅尼密不驕樂天帝洞元化應聲天帝靈化𣑽輔天帝髙虛清明天帝無想無結無愛天帝御前恭望天慈允臣所奏特降睿㫖下三界十方九幽九壘九土九隂一切冥司俱覩陽輝開明長夜拔沉淪之苦爽俾領受於齊修至期恭乞恩光證盟大煉媾隂陽之妙用煉魂𩲸之隂司九氣結形三元育質解結散滯聚氣凝神再憑生化之真仙咸與完全於性識永辭北府徑上南宫冒犯天威臣下情無任惶懼之至謹具狀上奏以聞謹狀年月日具法位臣姓某狀奏奏三十二天具法位臣姓某今據同昊天狀至請頒符命專行拔度外須至奏聞者右臣謹録狀上奏東方八天帝君南方八天帝君西方八天帝君北方八天帝君御前恭望天慈允臣所奏特賜睿㫖下三界十方合屬真司咸乘梵氣真光洞燭隂翳開度亡過某等及下元苦爽滅罪除𡨚臨壇受度仍乞敕命飛天使者捧持諸天玉字真文敷鎮玄壇召迎善瑞消除氛穢成就齊功至期加持斛食變煉亡魂並願恩霈照耀攝化無邉俾其陶沐陽精灌溉胞命聚神返本受化更生冒犯天威臣下情無任惶懼之至謹具狀上奏以聞謹狀年月日具法位臣姓某狀奏奏五老具法位臣姓某今據同昊天狀至請頒符命專行拔度外須至奏聞者右臣謹録狀上奏東方青靈始老蒼帝九氣天君南方丹靈真老赤帝三氣天君西方皓靈皇老白帝七氣天君北方玄靈元老黑帝五氣天君中央元靈元老黃帝一氣天君御前恭望天慈允臣所奏特賜睿㫖下十方三界地水冥司一切去處開度亡過某等及下元幽爽並與除愆削罪落滅惡根俾乘慧光臨壇受度仍乞敷落五篇安鎮玄壇召迎樣瑞延格真靈臣三日登齊九時懴悔並請靈官仙宰逹懇傳誠至期恭行大煉願降五等真氣餔飴亡魂俾內沃靈滋外招和氣百神混合十轉回靈冒犯天威臣下情無任惶懼之至謹具狀上奏以聞謹狀年月日具法位臣姓某狀奏奏木公具法位臣姓某今據同昊天狀至請頒符命專行拔度外