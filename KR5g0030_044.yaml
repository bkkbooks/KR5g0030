front:
  text: 上清靈寶大法卷之四十四圖二
  hash: sha256:44eac814f0961e189bdb6608a1fd0e5cea49aa72a7121495b49bceda4884993f
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5g0030_HFL_044-001a, image: hfl/0955/0955-084.png}
body:
  text: 洞微髙士開光救苦真人寧全真授上清三洞弟子靈寶領教嗣師王契真纂齊法符篆門赦拔亡魂章師曰凡欲修建大齊普度幽冥須奏告上玄先行赦拔之法惟在上章拜表肆赦頒符然後方可開壇行事蓋法中有赦有籙有簡有誥有符有劵皆依次而告行是故於預告之時則上救苦表頒九龍符青宫誥以次上素車白馬章則頒普告三界誥上破酆都開業道章則頒酆都拔贖誥元始符命誥太上敕赦救苦符破地獄符拔幽魂符三官簡九幽玉白二簡等齊事扣期則上開通道路章頒玉皇誥敕制地祇誥建齊之後上沐浴煉度章頒金液煉形誥雷文誥生天籙長生符等以次上升度亡魂章頒歷關諸天誥凡諸符誥皆可依類告行不可混雜先後冝以意消詳况符契乃上天之真命幽冥得之莫不遵承今按齊法條具如左太上敕赦生天寶籙法曰先於靖室冥心靜坐依法內煉畢方上香面北長跪默奏玉晨道君南斗星君南上諸真乞降生天敕赦容臣書篆按式頒行如法口奏畢心存九拜想天門三重金光煥然中有金闕見玉晨雍容左右侍真羅列方默奏九拜良久見慈顔歡恱敕玉童玉女捧寶匣自百寶光中下降案前光芒如日照徹天地次啓匣敷開寶籙一如請降之數便吸入籙紙中合而為一存朱筆硯中皆有光明方叩齒三通三拜而退面東平坐小息令神氣俱定次左手掐都監訣四指中文右手執筆香上呪曰無上玄元太上道君教臣行符照破幽獄死魂出離得覩光明急急如律令右呪五千遍吸天門青黃白三氣入筆及朱紙之中先書無上等篆二十八字次左手掐南斗訣魑子丑𩲕中中𩲓四中四上中上午出存六星如日輪初出之狀自南而下光明無極剔訣入籙中存六星光芒透入籙中與籙之六星合而為一透底有光次左手掐離文取真光入筆先書六星諱運處離宫明同日曜宰御火帝禀質隂陽位尊南極陶魂鑄魄威勝無方曲赦九幽魂次用六宫真號塗之每星六轉天府司命真君天相司録真君天梁延壽真君天童益算真君天樞度厄真君天機上生真君次叩齒一十二通引氣祝曰大行梵氣周回十方中有度人不死之神止無量度人急急如上帝律令敕右念此呪以筆述星罡筆盡呪盡吹氣剔訣次書下四字念唵吟吒唎九遍搯中文存天門金光如長虹入籙透底光明次下筆唵吟吒唎右念此四字為呪不計其數又念四字每一字四轉塗之共一十六轉剔筆上出次以一筆挑上蓋之呪曰元始符命時刻升遷亡魂受度立便生天急急如元始上帝律令敕取天門金光入桃玉清訣發筆存金光道氣自設迸出符金光燦於十方度生濟死隱書每一字念太上慈悲呪三遍又有天覆地仰二筆蓋每字上又於此二筆上轉筆九次呪曰吾奉太一救苦天尊敕行九插筆再取青玄氣吹巳上四字或真書或對書或疊書皆有說此乃玉晨祕諱元始乃玉晨之師故用元始律令亡者得之無不生天故為生天寶籙書訖祝之祝呪南上六星出幽入冥吾奉帝敕速監生靈南昌上籍即得返魂急急如律令總呪太上道君敕付崑崙神符一下拔度死魂急急如律令右此呪不以遍數多念為妙更加前面祕諱符呪祝之再吸天門金光萬道入籙中剔中文存星光交纏朗然如日內外洞徹再上香叩齒九通三拜跪奏重行請降亦依前存用若臨壇告行亦如請降存用祝遣焚之存籙中金光照徹十方九幽泉曲無不煥赫一切罪魂俱覩光明離苦登真矣籙總式無上玄元太上敕赦生天寶籙告下十方三界天牢地獄主者度人不死之神南極長生之君度世司馬大神好生韓君丈人無上玄元玉晨道君教臣行符照破幽獄死魂出離急急如太上律令敕具法位臣姓某據入意據詞難抑除巳節次飛奏天廷取㫖頒行外尚慮所薦亡魂宿愆深重未該赦原拘繫冥曹難已受度乞宣降太上敕赦生天寶籙拔贖罪魂出離苦趣今準敕命告行者右奉太上敕赦生天寶籙告下十方三界天曹地府山川海嶽泉曲冥關北都羅酆六洞十宫三宫九府百二十曹鬱絶之鄉幽塗之境諸大地獄九州分野福地名山城隍社令神物司臨之所仙曹典録之墟較量罪福考察功過一切天牢地嶽主者咸領符命敕赦亡過某及受度亡魂九州孤爽冥司地獄陰曹幽扄罪魂苦爽生前所造三業六根塵勞諸罪殁後受報𡨚愆應是故為誤犯或手弒君父不孝二親或誹謗大道背真就僞或殘傷兄弟謀反師尊或六親通同淫犯骨肉或為劫賊殺害人命或屠割衆生自饒一身或以强淩弱以貴虐賤或浮好三寶執心不專或輕慢法師穢賤靈文或心懷隂賊安忍嫉妬或惡口兩舌鬪亂善人或殺生淫祀祼露三光或心生或口語或自作或教他積劫以來所有諸罪承此太上慈恩並與疾除罪簿落滅惡根不得拘留徑出地獄永離幽隂皆證妙果如擔砂負石漣汲溟波之衆驅雷役電掃山穿地貫天引水之徒並與斷地逮役永使逍遙即令上件亡魂七氣成真六儀運虛五靈續絶二曜扶衰旋綱躡空飛步雲宫胚胎有始塵劫無終金城孕質玉洞凝神真氣內養以成真人上入太虛下洞幽泉雲宫寶闕中有真魂出入福鄉周旋生門咀嚼靈芝灌漱金泉甘露川流懸澍丹田紫霞朝映三氣凝煙瓊室化仙安座金蓮真儀掩日塵劫為年一如告命太歲年月日吉時告下具法位臣姓某承誥奉行天樞上相天機內相泰玄上相天機上相東極宫中太一救苦天尊萬劫應化真元教主太上老君內封式太上敕赦生天寶籙具位臣姓某奉行謹封內封背書敕赦亡過某等魂外函式太上敕赦生天寶籙告下三界十方天牢地獄主者具位臣姓某謹重封右籙告下隂曹釋赦無間罪業籙用黃紙朱書髙九寸後用白紙繳告文大字墨書內外封函並用青紙朱書於拜酆都赦罪章後告行赦文式今月某日奉太上玉晨元皇大道君靈寶天尊敕降下為髙功某奏乞為列詞請降太上敕赦生天寶籙開光長夜原赦罪魂今奉太上敕命告下者右籙同前用黃紙朱書赦文用黃素墨書並用黃紙作內外封告二十道九州用九道十方十道一道專度亡魂姓名讀訖焚之即得赦宥萬罪千愆受煉更生又一法凡普度衆魂及六道孤魂以黃紙長九寸闊三寸亦依前書敕赦生天籙别有告文作五行書隨所度名數出給多少依太極仙翁祭煉法行生天寶籙救苦天尊寶劵青玄救苦敕命告行大慈憫赦九夜咸原分身散形隨念尋聲三光真精普度罪魂玄神氣君太乙救苦天尊九聲丹天三氣北府消名玄元祖氣灌溉身形二象四顧紫雲覆身亡魂秉敕時刻升遷天門氣吹再書念四字為呪疊書每字各轉筆九匝元始符命時刻升遷亡魂受煉立便生天天門氣覩見光明速生天界急急如救苦天尊敕轉等十匝拂筆十次再念十玉寶皇上天尊卯方天尊號隨方搯訣玄真萬福天尊午太妙至極天尊酉玄上玉晨天尊坎好生度命天尊已太靈虛皇天尊申度仙上聖天尊寅玉虛明皇天尊乾元量太華天尊亥真皇洞神天尊巽三匝玉清大帝敕慧光一到幽牢罷對速生天界三匝上清大帝敕慧光一到幽牢罷對速生天界三匝太清大帝敕慧光一到幽牢罷對速生天界存光芒照曜天地度亡魂告文右太上生天寶籙給付某人收執徑詣所屬請乞主者遵依太上敕命即使時刻升遷一如告命度孤魂生天籙式太上生天寶籙超度合受度孤魂出離幽夜隨果往生主者遵依符命施行太歲年月曰告下具法位姓某奉行又式太上生天寶籙右奉寶籙給付合受度孤魂徑詣所屬曹局請主者遵依太上敕命即與隨品受生託化人天一如告命太歲年月日時告下具法位臣姓某承誥奉行度師東極宫中大慈仁者太一救苦天尊牒式泰玄都省牒九幽掌宰何都承子舉當省奉帝敕四大幻骨肉之軀儔能不死一元攝形氣之㑹莫大好生故凡玄範之昭回翳匪皇風之滲漉幽都黑壤蓋警背正以趨邪上宫紫微以待超凡而入聖限界本别趨向奈差驟意馬而逐心猿七情不返溺愛河而淪苦海萬劫彌深彼爾林林抑何昧昧經科三十六部明如幽室張燈職守百二十曹詳於廣幅施尺無非與物為作好因今有具位某奏為入意附薦宗親外姓往化願度十方旁資六道報本反始既知存誠以事天錫類推恩冝與舉斯而加彼用頒符籙大示寵綏除犯非天毀道叛君逆親不以赦原減外其餘在水在陸若顯若幽或故或新無小無大準今元始符命並與等差減降原免者一齊官某所正薦某或生前有念慮差忒行事違誤處準今符命時刻升遷一齊官某所同薦某既已數該赦宥無罪可原準今符命更與進升仙品一齊官某所附薦本宗自髙曽以下止于弟姪應自死而未得解脫或已生而復墮輪回者準今符命並與品量該度超升一齊官某就壇普度一切男女等魂不論逺近準今符命並與赦罪往生一應恃勢作威陷人於死妄開邊隙以殺無辜貪財劫掠貨藥毒人悖亂人倫淫犯六親準今符命並與減降一等一應犯三光厭惡風雨故殺物命隂私設謀損害人命誅降殺伏侍師失律辜法妄殺負財缺命見坐報對者準今符命並與品量故誤照赦原減一應一切魂𩲸死於非命無辜國法天憲戰鬪桎梏沉溺懸墜瘟疫螫毒産難自殺吞噬傳疰迷戀驚畏殘廢血光十相不完等衆及其他色目條列不盡不論有主無主見在沉淪者準今符命並與釋放隨品開度一應飛走潜動元是人身今墮輪回未正本相準今符命並與品量託化一應山林廛洞有學道煉形以符籙藥石救人元功未就竟歸鬼録者準今符命所屬保明特與升度一應村疃里社忠臣孝子山林廟食祀典諸神能徇民祈禱保護福澤者準今符命許所司保明例與升遷一應黃籙齊壇受事奉命隨法輔教神將官兵功曹上地等神及中下界有預曹局準今符命例與進升一品其餘所犯自今月某曰昧爽以前已發覺未發覺已報對未報對咸赦除之於戲上天之載無聲扣之則應下民之孽匪降昧者自貽期務小心以將大賚赦書到日主者施行牒奉敕書如右倐到請翻録遍牒合屬去處疾速遵照施行其有奉命不䖍並依律論故牒又牒泰玄都省牒九幽掌宰喬知府幼聞敕門下撫御有形之衆類廓垂無劫之丕基陽冥在覆露之中生死屬權綱之下物所尚者人為貴焉始𢌿性之善良終流心於頑獷徇六情積成三業差一念遽入九幽天網恢恢憲章凛凛羈留惡圄囚繫幽牢赦未該原恩無踈放庸示勸懲之道特頒拯拔之仁眷大教之宣行憫衆生之淪滯匪加黜陟曷表生成錫命玄都分符曲府勑萬神而敬聽付主者以奉行當省據髙功某奏為齊官某人報薦某開建升度九幽大齊修設冥陽淨醮廣崇善利普拔沉淪仰祈天恩俯垂升濟伏取敕㫖事牒奉三天門下敕大德本於好生用廣滌瑕之澤至誠可以事帝俯從濟衆之求下寬大之敕文布昭慈之宸貺頒符曲府昧爽咸恩播告於先要約記後一赦文自今月某日昧爽以前除犯誣天毀聖冒律違科反道亂常隂謀劫殺罪大惡極律所不赦其餘罪衆已結正未結正巳發覺未發覺已受苦未受苦已報對未報對並準元始符命咸赦除之一應囚繫去處久被嚴刑深沉惡趣雖霑恩霈未沐赦原或能悔過自新屏惡向善不以罪業深重準今敕命特令隨品受生一應五嶽大川九幽都府城隍社令泉曲河源郊野址墟邪途異域棲棲滯𩲸總總孤魂百家九流四生五道血湖罪爽夭橫傷亡無倚無依難名難狀漂流幻海沉溺愛河展轉輪回未能解脫準今符命悉與超升一應陽間𣗥寺州縣獄司廂幕市曹戰場土寨其有罪衆拘縳致殞𡨚對而終犯憲遭刑被兵殁陳留連未釋超脫無由照準敕文咸令受度一應諸遊奕之神五通木野之類依憑草木淫亂生靈假借妖精妄求血祀致干天律收攝玄司知過能悛並與比附原情咸從釋放仍仰所在里域神司昭論俾歸正道以俟寵綏一應靈壇社廟血食神祇衛護人民匡扶境域恢張山嶽主理川源顯立功勛徇民祈禱準今敕令仰逐部保舉例與推恩一應山林巖洞幽谷異人訪道求師修真錬性拯幽拔滯濟苦恤貧上類天心下賙人急至於忠烈孝義威武仁慈廣積隂功衆所推敬雖終上壽未陟仙鄉準今敕令冝令所屬遍行根刷速與保奏照格升遷一應崇修黃籙廣濟無邊仰三界司察靈官黃籙院升度主者紀録功勳超乎正薦併資祖禰內外宗姻旁及附薦異姓亡靈均被宸恩同登道境無拘地戶升陟仙階一應臨壇將帥效職官君監衛齊壇輔贊道法神功受命隨事立功照準玄科並與遷爵一品一應三元九府五嶽四司酆都九幽泉扄以下掌生死罪録之官主典刑執罰之吏城隍社令里域土司地道驛傳等神諸處管押將佐依準玉格各與進秩一階一應赦文該載不盡名目繁多律無明文並與比類放行一應冥司去處輒以赦前事再舉拘連亡者以其罪罪之於戲奉天光而頒帝命有感必通塞死戶而開生門無所不度赦書到日主者施行右牒奉敕赦如前宣令九幽掌宰疾速翻録行下合屬去處遵依敕令施行故牒太歲年月日具法位臣姓某準行具列天省八相敕赦二字一玉清上帝廣救無邊上清大帝釋宥讎𡨚太清大帝普掠重泉玉皇上帝罪考俱原諸天降詔羅山絶然三途五苦九幽酆泉普皆解脫釋絶攀緣急急知玉清上帝敕無主孤上升三天有𡨚有結普皆除蠲廣救重隂與天齊年左原沉墮男女隂魂右赦冰城悉皆開宣冰城爐炭雪扄幽泉陽光破燭並赴十天有功有命上奏三天有惡有逆準命赦原今日敕命時刻升遷北都寒池部衛形魂制魔保舉度品南宫十天告命風火無停幽關罷考爐炭絶煙不得有違冥曹合同準敕遷神急急如元始上帝敕右三宫訣午文出放筆了發十天訣捧赦赦書泰玄都省牒本省奉三天門下朱書據髙功某奏為入意今準帝㫖代天奉行者書符道言元始符命自龍漢之劫方傳隱韻祕文乃浮黎之天受度回骸起死白骨成入煉氣保真丹書列字爰從沉淪之苦貪逐世緣遂將澄湛之機浸成業海千生萬死受報隂關十地九泉不開長夜致真司之列奏祈恩霈之普施我道至慈在深憫惻冝從所請用示洪私可頒赦下酆都應亡過某等從前或有所犯違天負地不孝不忠不仁不義故殺誤傷六情六欲之罪不以輕重咸赦除之一依符命出離幽隂上登福境應九泉罪魂三途苦爽違天毀聖故作悮為為臣不忠為子不孝縱傷物命隂毒損人罪無輕重已未發覺曽未結正咸赦除之其餘六道四生無主孤魂等衆隨緣升度趂福受生解釋𡨚仇永資逸樂其臨壇靈官典者將佐小吏直符直吏各遷爵一品酆都長夜牛頭獄卒諸大鬼王九幽都司城隍里社在時用事官將主者各進秩一階從今以去如遇修建黃籙大齊濟度幽𡨋一如今來格降施行赦書行周天界遍詣重泉敢以赦前事告者以其罪罪之主者施行於戲大道之靈在神明之顯化至仁之德庶幽暗之普霑几厥有情禀兹元造母或自怠以取譴訶施行牒奉赦書如前冝令酆都疾速遍牒施行仍關申合屬去處牒至準敕故牒太歲年月日告下法位臣姓某承誥奉行列八相位封式泰玄都省牒九幽掌宰詔書泰玄都省敕門下罪疑惟輕功疑惟重自昔帝者之世訓迪士師之官以虞舜之宅心體臯陶之邁德尤重人命深用哲刑民協于中欲從以治繄爾士庶職在地司間召二三之臣以較大小之獄猶慮簡戒未授新故相仍稍加煆勵之威莫測生成之德悉宜肆赦咸與惟新俾㑹觀闕之前獲聞道德之要惟爾典憲體豫至懷故兹詔示想冝知悉據某人入意切盧亡魂生存之日旋積罪尤亡殁之後必拘幽夜雖屢伸於薦拔恐未遂於超升一正薦某一附薦某等一普薦五姓孤魂陳亡官兵等衆男子三魂七𩲸女子三魂一十四𩲸告下考官之庭者右奉敕冝今三界所屬考校罪魂諸司特與省罪疾速津發前項亡過其等魂以今月某日前來齊所面覩慈尊親受開度蓋元始上帝度人功大風火不停準敕如右牒至準式奉行故牒太歲年月日時告下法位臣姓某承誥奉行省主三天扶教正一靜應真君封式泰玄都省牒酆都主者右詔書赦書二件非齊法所載往往後人自撰既諸方流傳久矣不用刪去今併存之若用時當於預告先行詔書了扣期却行赦書與敕赦同時頒告其詔赦並用髙頭黃紙大字書內有字與符命及篆文朱書都用繳赦牒遣赦牒發赦關之類並見章奏門東極青宫太乙寶誥長樂天中東極宫赤玄光內紫金容大聖神道廣度沉淪九幽教主大慈仁者尋聲赴感應念垂慈億億劫中無量度人大慈大悲大智大慧太乙救苦天尊右奉太一寶誥伏請地獄諸司𡨋曹主者遵承敕下開度亡幽俾令受度主者敬聽恭禀誥命準此奉行太歲年月曰吉時告下法位臣姓某承誥奉行東極宫中大慈仁者太一救苦天尊金闕玉皇寶誥靈寶大法司今月某曰恭奉玉皇𧇖敕頒下玄文寶誥度脫罪魂超升玉京者金闕仙籙監真度生玉皇寶誥太上彌羅無上天妙有玄真境渺渺紫金闕太微王清宫無極無上聖廓落法光明寂寂浩無宗元梵總十方湛寂真常道恢漠大神通玉皇大天尊玄穹髙上帝右奉金闕仙籙玉皇𧇖誥伏請靈寶至真十方上聖依靈寶度人之典施回骸起死之功敕下九幽俾苦魂行開泰誥行諸地令滯爽以霑恩主者奉行恭禀誥命準此奉行太歲年月日時告下法位臣姓某承誥奉行玉皇大天尊玄穹髙上帝靈寶酆都拔罪真誥靈寶大法司今月某日恭奉玄誥拔贖罪魂往生南宫者酆都受制令茫茫酆都中重重金剛山靈寶無量光洞照炎池煩七祖諸幽魂身隨香雲輿定慧青蓮花上生神永安功德金色光微微開幽關華池流真香蓮蓋隨雲浮干靈重元和常居十二樓急宣靈寶旨自在天堂遊右奉太上玉文酆都符命拔除衆罪贖命幽都萬神敬從永無執繫乘天尊之慧命脫地獄之拘留託質仙都常居樂境準此奉行太嵗年月日時告下法位臣姓某承誥奉行右諸誥命並用黃紙朱書告文墨書外用封函如式上清靈實大法卷之四十四
