front:
  text: 上淸靈寶大法卷之二十三觀八
  hash: sha256:d697af1c7d939190b3bbc24acbabf85b0aa3228cf87f5e6715aa841a42d2092a
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5g0030_HFL_023-001a, image: hfl/0949/0949-066.png}
body:
  text: 洞微髙士開光救苦真人寧全真授上清三洞弟子靈寶領教嗣師王契真纂經句符書門書符敕朱墨咒上清訣朱南氣墨氣太玄殺氣朱丹流光入於其中萬惡逃亡急急如靈寶符命律令敕筆咒神筆通靈上合玉淸書符殺鬼治病安寧凶災萬禍所向摧傾符到奉行發符咒玉清訣天門氣靈寶大法元始真文虛旡大道結化三淸氣降入符符到安寧人生鬼殺永保無終急急如律令開印咒玉清訣視印取用太上玉帝真命河魁玉淸至靈上淸寶勑太淸奉行萬無不辟急急如律令用印咒玉淸神印丹霞赤文開光十天召真致靈印之所到萬神敬從急急如律令右法叩齒三通存靑黃白三氣自天門下覆印右手擎印使之收印咒九靈九真九仙九聖九天九氣覆蓋神印玉女玉童侍衛交並靈官力士常保萬真急急如律令濟生心印咒玉淸有命總氣虛無雲龍交篆立注丹書急急如元始上帝勑中文度死心印咒虛皇祖氣大梵飛行靈光注筆塗苦罷對幽暗罪魂普監上生急急如元始上帝勑燒香咒諸天十方旡極至真大神王右法以東方為始召降如五老啓途群仙翊轅之類下降於十方然後從心中所陳祝之次上香定心定心咒魂神澄正萬氣長存不經苦惱身有光明三界侍衛五帝司迎萬神朝禮名書上天功滿德就飛升上淸右一十句取本命方氣咽之行事隨氣所願無不上達治萬病咒大行梵氣周回十方中有度人不死之神中有南極長生之君中有度世司馬大神中有好生韓君丈人中有南上司命司録延壽益算度厄尊神回骸起死無量度人右九句凡氣血凝滯體有小疾即端坐𩀱手玉淸訣念一遍取東南氣入口中閉氣存氣如黃霧之狀自五臟穿入骨節皮毛之中皆為黃氣良久體有小熱其病即愈凡治疾布氣並用生真氣咒混洞赤文無無上真元始祖劫化生諸天開明三景是為天根上無復祖唯道為身五文開廓普殖神靈無文不光無文不明無文不立無文不成無文不度無文不生右一十五句每日早𩀱手玉清訣面東南念五遍存天降五色雲以鼻引入口咽之存歸三田如此五藏充實三田盈溢皆成真氣萬邪不干五嶽持身咒混沌分光開元祖劫三台四聖南北九天八卦大神五星三皇三天師真五嶽持身三塗六丁六甲神仙神虎四直上帝降氣內錬化成玄女通真雲雷發震生化自然急急上奏與天齊年右法子午訣五方氣𦋇身安神定志咒青帝護魂白帝侍魄赤帝養氣黑帝通血黃帝中主萬神無越青天魔王巴元醜伯赤天魔王負天擔石白天魔王反山六目黑天魔王監醜朗馥黃天魔王橫天擔力五帝大魔萬神之宗飛行鼓從總領鬼兵麾幢鼓節遊觀太空自號赫奕諸天齊功上天度人嚴攝北酆神功受命普掃不祥八威吐毒猛馬四張天丁前驅大師仗幡擲火萬里流鈴八衝敢有干試拒遏上真金鉞前戮巨天後刑屠割鬼爽風火無停千千截首萬萬翦形魔無干犯鬼無妖精三官北酆明檢鬼營不得容隱金馬驛程普告無窮萬神咸聽三界五帝列言上清右呪每日早持一遍不問出入行藏此為泰定心神通暢血脉運化無滯同行世界治疼痛呪青帝護魂白帝侍魄赤帝飬氣黑帝通血黃帝中主萬神無越右呪六句震文東氣離文南氣兊文西氣坎文北氣中文中氣並呪一遍吹病人疼處令咳嗽一聲不過三次疼即止五斗保生命呪東斗主算西斗記名北斗落死南斗上生中斗大魁總監衆靈右六句每遇夜星朗時向五方各呪一遍取五方氣吹身佩五斗符萬邪不干千災去矣治病驅邪法凡驅邪止奏心章與之分别人鬼不得妄入鬼神情罪先用五斗五魔符與之安鎮五臟保命生津驅逐邪氣半月日後却朝元奏請中理五氣混合百神符付之吞服鎮守黃庭治顚邪法凡顚邪之類即存三宫天尊升在泥丸宫列玉局坐呼召身中五臟正氣升天中五星正氣各化為帝者各方服色執玉圭後更將五臟五星變為五斗每星如道士之狀各方服色依方住立執靑簡更將五臟五星變為五天魔王如人間武士之狀各方服色執㦸佩弓劒依方位立却存巳神將升五帝五斗五魔直前擒下鬼賊到天尊前約束押赴三官都司聽斷仍念呪曰神公受命普掃不祥八威吐毒猛馬四張天丁前驅大帥仗幡擲火萬里流鈴八衝敢有干試拒遏上真金鉞前戮巨天後刑屠割鬼爽風火無停千千截首萬萬翦形魔無十犯鬼無妖精三官北酆明檢鬼營不得容隱金馬驛程右呪九遍給五帝五斗五魔符與患人服一月若欲求報應於病人夜卧時用各符一道令吞用一道安頭髻上又一道貼帳帶上又一道同劄焚竈中告示六神同三五將軍追攝報應凡用符須先朝元請降方行如報應了收前符於淨處焚之禳鎮法凡有大不祥用鐡板五片闊三寸長九寸書五魔符背後寫因依年月日時法位奉行先具心章密奏上玄請降符命方可行之佩符呪侍經五帝玉童玉女各二十四人營衛神文保護受經者身右呪凡木命人取東氣火命南氣金命西氣水命北氣土命上方氣吹符上淸訣度一切亡魂呪普告三界無極神鄉泉曲之府北都羅酆三官九署十二河源上解祖考億劫種親疾除罪簿落滅惡根不得拘留逼合鬼群元始符命時刻升遷北都寒池部衛形魂制魔保舉度品南宫死魂受錬仙化成人生身受度劫劫長存隨劫輪轉與天齊年永度三途五苦八難超凌三界逍遙上淸右呪並玉淸訣東氣安宅祝土呪七日七夜諸天日月星宿璇璣玉衡一時停輪神風靜默山海藏雲天無浮翳四氣朗淸一國地土山川林木緬平一等無復高下土皆作碧玉無有異色衆真侍坐右一十五句凡動土丁罡七步取旺方土一合面北搯玉淸訣念七遍取西北氣吹土上於所造方上置土供飬畢以水調塗於中庭即萬殺千怪並皆回避如犯土家宅不寧依法呪土以水調灑一宅中元洞呪水元洞玉曆龍漢延康眇眇億效混沌之中上無復色下無復淵風澤洞虛金剛乘天天上天下無幽無冥無形無影無極無窮溟涬大梵寥廓無光赤明開圗運度自然右一十六呪汲東流水置器中存神為靈寶真人三淸居三田之中左日右月五星居五方五帝侍水五星日月降光輝入水五靈衛水玉童玉女立于左右斗罡指水即叩齒三十二通念呪三十二遍取五方氣入水雖盛夏久停亦無蟲穢凡治病可用吞符或煮粥煎藥皆可如時疫流行可呪此水以楊竹枝遍灑其瘟毒自散立得痊安命魔驅邪氣呪靑天魔王巴元醜伯赤天魔王負天擔石白天魔王反山六目黑天魔王監醜朗馥黃天魔王橫天擔力五帝大魔萬神之宗飛行鼓從總領鬼兵麾幢鼓節遊觀太空自號赫奕諸天齊功上天度人嚴攝北酆神公受命普掃不祥八威吐毒猛馬四張天丁前驅大帥仗幡擲火萬里流鈴八衝敢有干試拒遏上真金鉞前戮巨天後刑屠割鬼爽風火無停千千截首萬萬翦形魔無干犯鬼無妖精三官北酆明檢鬼營不得容隱金馬驛程普告無窮萬神咸聽三界五帝列言上淸右法玉淸訣凡給符治人身一切邪氣皆以北氣治之布氣呪真中有神長生大君無英公子白元尊神太一司命桃康合延執符把籙保命生根上游上淸出入華房八冥之內細微之中下鎮人身泥丸絳宫中理五氣混合百神十轉回靈萬氣齊仙右一十八句玉淸訣叩齒三通呪三遍北氣吹病身吸氣後揉痛處即安和合百事呪千和萬合自然成真右法凡和合托木面北呪七遍南氣吹水祝心中事七次噴其方即和合治眼疾呪諸天日月星宿璇璣玉衡一時停輪神風靜默山海藏雲天無浮翳四氣朗淸右七句取淨土一塊面東南呪九次吹土併呪水洗赤眼立安凡治目疾符水用治瘟疫呪束送妖魔精斬馘六鬼鋒諸天氣蕩蕩我道日興隆右四句凡入瘟家治病勑水布氣用黍米呪於是元始懸一寶珠大如黍米在空玄之中去地五丈元始登引天真大神上聖高尊妙行真人十方無極至真大神無鞅數衆俱入寶珠之中天人仰看唯見勃勃從珠口中入既入珠口不知所在國人廓散地還平正無復欹陷元始即於寶珠之內說經都竟衆真監度以授於我當此之時喜慶難言法事粗悉諸天復位倐歘之間寂無遺響是時天人遇值經法普得濟度全其本年無有中傷傾土皈抑咸行善心不殺不害不嫉不妬不淫不盜不貪不欲不憎不𡜍言無華綺口無惡聲齊同慈愛異骨成親國安民豐欣樂太平經始出教一國以道預有志心宗奉禮敬皆得度世右法左手托赤黍米不以多少右玉淸訣自東方為始至下方每一方呪十遍存一方天真大神飛天神王千乘萬騎並入黍中十方計一百遍呪了取西北氣吹治一切疾呪靈寶水天真天津寶液神淸一呪斬鬼永辟妖精天罡真氣斬殺邪癘真陽之水永去萬里右法左手上淸訣托水右玉淸訣指水先念前呪七遍次念後呪三遍取東南氣入水剔訣水中隨水有靈官侍水行之靈寶針以神桃枝長五寸作針玉淸訣五方氣吹針針病處令患人三吸三咳嗽出針誦靈書大凡治大事存身為元始坐五色獅子又存頂中有元始金容玉相即左搯玉淸訣右上淸訣密誦不拘遍數取東南氣吹一切符水中隨意用之凡一切符除本呪外並用此祝於正經內略出諸呪凡諸符隨事用本呪本訣或有專祝香呪更用之訖方念中篇並玉淸訣先取東南氣吹又念玉淸大呪取西北氣吹之呪曰三十二天三十二帝諸天隱諱諸天隱名天中空洞自然靈章諸天隱韻天中之音天中之尊天中之神天中大魔天中之靈九和十合變化上淸無量之奧深不可詳敷落神真普度天人今日欣慶受度歷關諸天請滅三惡斬絶地根飛度五户名列太玄魔王監舉無拘天門東斗主算西斗記名北斗落死南斗上生中斗大魁總監衆靈靑帝護魂白帝侍魄赤帝養氣黑帝通血黃帝中主萬神無越靑天魔王巴元醜伯赤天魔王負天擔石白天魔王反山六目黑天魔王監醜朗馥黃天魔王橫天擔力五帝大魔萬神之宗飛行鼓從總領鬼兵麾䮵鼓節遊觀太空自號赫奕諸天齊功上天度人嚴攝北酆神公受命普掃不祥八威吐毒猛馬四張天丁前驅大師仗幡擲火萬里流鈴入衝敢有干試拒遏上真金鉞前戮巨天後刑屠割鬼爽風火無停千千截首萬萬翦形魔無干犯鬼無妖精三官北酆明檢鬼營不得容隱金馬驛程普告無窮萬神咸聽三界五帝列言上淸上淸靈寶大法卷之二十三
