body:
  text: 洞微髙士開光救苦真人寧全真授上清三洞弟子靈寶領教嗣師王契真纂傳度儀範門牒靈寶法部官將靈寶大法司據貫屬某入意同申奏內至丐行傳度除具奏帝廷申聞三界牒劄合𨽻真司外為此今將本人所奏法職印文另具單帳連黏牒前合行備牒請靈寶大法萬司如意大將軍諸天赫奕萬神玉女玉童靈官將吏神虎北魁玄範府左右二大聖七真玉女三部使者追魂攝魄吏兵南昌錬度司丹天左右侍衛大將軍水火二司受錬一行官典黃籙院諸司考較合干官屬發遣章奏運神會道官將吏兵天醫院靈官仙宰靈寶部屬諸司府院金童玉女使者吏兵合干將佐恭稟上天命令潛分應化真身於某日一合下赴某靖治之中列職分司按營治事自今而後凡遇某為國為民祈晴禱雨扶持疾苦濟拔幽冥超度玄祖鍊氣服形洞視朝元飛章貢表修齋行道建德立功並請前遵後從左挈右提坐呼立召而響答隨形意想心存而入無出有聖凡交感神氣密符令在必行動無不應永佐玄元之教同推利濟之仁誓盟金石終始股肱積濟生度死之功勳成學道修真之行願闡揚大化宣布真風祗懋爾勤益振乃職苟宣勞而無怠期嘉續之有成更祈照應某所受法職印式應干行持符檄關盟所至即為遵行大彰報效牒請依應母輒慢違謹牒某年月日時牒具位姓某押祖師三天扶教輔元大法天師真君牒靖治官將靈寶大法司牒上某靖某治諸大官將吏兵據某同前入意至合行備牒各典攸司恪守厥職會同壇所請降靈寶諸司官屬一合駐劄分神治事輔助教法共積隂功自今而後凡遇某行持請禱存念施為即使通逹真靈密符嘉應佇昭成績同進仙階謹牒某年月日時牒具位姓某押三天扶教輔元大法正一天師真君牒都城隍靈寶大法司牒上天下都城隍之神據某入意同前至除具奏天廷申聞三界合屬照應外為此所合備牒請詳前事理即與指揮祠下曹案官典行移合治諸路大小城隍里社祀典神司咸令知委稟奉上帝勑令照應某所受法籙印式而後將來其遇請祈公文所至即與遵行母令阻遏牒到準式奉行謹牒某年月日時牒具位姓某押牒九州社令靈寶大法司牒上九州社令主者據某入意同前至合行備牒請詳前事理即與移文轉行所𨽻分野祀典神祠阡陌道路山川林木神鄉鬼營合干去處咸令知委稟奉上帝勑命照應弟子某所受法籙印式而後將來其遇某應有請祈公文所至悉為遵行母令拒抑牒到準式奉行謹牒某年月日時牒具位姓某押牒府城隍州同靈寶大法司牒上某府州城隍司主者據某入意同前至除具奏天廷申聞三界牒劄合屬外為此備牒請詳前事理即與轉行所𨽻縣鎮城隍社令廟貌神祠合屬去處咸令知委稟奉上帝勑命照應弟子某所受法職印文將來其有請祈公文所至即與遵行母令阻遏牒到準法奉行謹牒某年月日時牒具位姓某押牒縣城隍靈寶大法司牒上某縣城隍司主者據某入意同前至除具奏天廷申聞三界牒劄合屬外為此所合備牒請詳前事疾速移文所𨽻社廟神祠鄉坊里域合干去處咸令知委稟奉上帝勑命照應弟子某所受法職而後其遇請祈公文所至即與遵行母令阻遏牒到依奉施行故牒某年月日時牒具位姓某押牒當境廟貌本處土地等神靈寶大法司牒上本境廟貌土地等神據某入意同前至除具奏天廷申聞三界牒劄合屬外為此牒請詳前事理疾速關報合干神祠去處咸令知委照應弟子某所受法職而後其有一應公文所至即與遵行母令阻遏仍為肅清境土掃蕩妖氛祗奉上真證明傳度牒到奉行母輒違慢謹牒某年月日時牒具位姓某押劄社令靈寶大法司據某入意至除具奏天廷申聞三界牒劄合屬外為此劄仰爾神疾速關報境內係干去處咸令知委照應施行立便肅清境界掃蕩妖氛祗奉天真鑒明傳度須至劄下者右劄下某處社令司之神準此某年月日時劄具位姓押劄司命靈寶大法司據某入意至除巳奏申天省真司備牒合屬外為此劄仰爾神疾速關報里域干係去處知委照應施行立便肅清內外祗奉天仙下顧壇庭鑒明傳度母輒慢違須至劄下者右劄下本音司命等神準此某年月日時劄具位姓押奏狀前貼黃分作五行寫臣奏為弟子某丐傳受靈寶大法一階皈身受持宣行教法普濟幽明乞頒勑命告下三界真司照應施行事取進止交兵給法仙帖靈寶大法傳度玄壇本壇今月某日先據某入意同奏申至永失人倫等因本壇領詞虔切巳於某日謄詞飛奏三天關盟三界普告十方咸使知聞以今恭按玄科開壇傳度修崇醮禮仰謝天恩恭對道前遵承師範付授靈文裂劵分環受戒領職結盟立誓分撥將兵須至給帖者一給授上清靈寶經法一部上清靈寶符圖一部上清靈寶符訣一部上清靈寶玉劄一部上清靈寶儀格一部靈寶大法司印泰玄都省印飛玄三氣玉章印九老仙都印通章印黃神印越章印北魁玄範府印神虎總攝印神虎玉札印神虎雄左印神虎雌右印仙誥一軸戒牒一道版符一面環劵一付誓劵一道十天劵一十道五帝靈符䇿杖一付一請降靈寶大法司十方飛天神王萬司如意大將軍玉童玉女靈官功曹將吏北魁玄範府左右二大聖七真玉女三部使者追魂攝魄一行將佐南昌鍊度司丹天左右侍衛大將軍水池火冶神將受錬合干官將黃籙院諸司考較合部曹屬發遣章奏司運神會道功曹官將吏兵天醫院靈官仙宰右帖付某真士遙瞻金闕祗拜宸恩所宜勉勵修為始終端謹闡助國救民之道推濟生度死之功行業不虧幽明普濟當思人能弘道道不負人誓謹千金功全一簣恪遵戒律母戾典刑故帖年月日帖保舉師具法職姓某監度師具法職姓某度師具列法䘖姓某補職帖靈寶大法傳度玄壇本壇據嗣法弟子某齎寶質心歃血盟誓持金石之志露飢渴之求告盟十天願參大法巳奏聞於帝闕及播告於真司恭按玄科奉傳祕典今沐師尊監度衆聖光臨帥將到壇吏兵就列宜補職任俾正仙階可特受某籙弟子南宫執法仙士為職須至給帖者右帖付某真士嚴恭寅畏誕膺天命之惟新齋栗端莊常懼帝心之簡在恪振乃職母曠厥司當不替承流宣化之勤庶可格通真逹靈之應惟精惟一母怠母荒勳績有成形神俱妙故帖年月日帖具列保舉監度師三法職姓靈寶修真誓戒牒靈寶大法傳度玄壇付嗣法弟子某受持謹遵大法合授誓戒開具于後靈寶十願一願志樂長生二願出死入生三願錬氣固形四願度諸衆生五願天下太平六願衆生悟道七願祖禰升遷八願永離鬼官九願形神俱妙十願與道合真靈寶五戒一戒惡殺去害常行忍殺二戒嫉妬莫興常守成人三戒莫生淫盜常施正直四戒勿起貪汙常生知愧五戒斷諸憎嫉華綺常修慈儉靈寶十誓一誓不得大醉生諸嗔怒二誓不得飢飽勞役形體三誓不得廣志逺願四誓不得妄交非人五誓不得取非義財物六誓不得怨道咎師七誓無故不得輒入神廟八誓不得亂行靈文九誓不得輕泄祕典玄文十誓不得無故亂害鬼神靈寶十善一矜老恤孤二憐貧援寡三救濟幽冥四散施丹藥五敬重一切六勤行符水七常誦經呪八廣造經像九勤持齋戒十放續生命右牒付嗣法弟子某持其誓戒終始無虧身心不退即得拔度三途不涉六趣諸天衛護萬聖欽皈宜當勤行持齋奉戒夷心端謹志念分明一心皈向專想不二內外清虛每合自然鑑應爾心如戒行道為三界所範鬼神所瞻通真逹靈形神俱妙道不負人切宜遵奉勤行諦受以闡玄風故牒年月日牒具列保舉監度度師䘖同前環式環可用銀一兩二錢為之中刋符文以朱填畫中開一竅每用二箇以青絲結之臨壇以刀割斷師與弟子各收一環用黃絹袋盛之與合同劵同貯之思微版劵式維某年太歲某某月某朔某日某辰某州某貫屬某處某人即日謹齎金寶質心依玄都品格盟告十天稽首拜手傳受上清靈寶經法章奏隱祕之文依儀行道消諸不祥普度無窮受道之日名度南宫萬神侍衛身度三界位登仙翁魔王保舉衆真監度度師臣謹遵大法敷落神真普度天人不敢隱祕而傳以天中之天為盟弟子得法之後不宜輕泄以示非人如違告盟身處鬼宫減算除年萬劫受考永墮輪回禍及七祖今立劵文以為信約嗣法弟子某行年幾歲某命年某月某日某時上屬某嶽稟某天某氣君召謹請元始天尊度太上道君度太上老君度天真皇人度妙行真人度諸天大聖度五老上帝度飛天神王度五帝大魔度三官五師度周天星宿度今日欣慶受度某歷關諸天請滅三惡斬絶地根飛度五戶名列太玄魔王監舉無拘天門東斗主算西斗記名北斗落死南斗上生中斗大魁總監衆靈青帝護魂白帝侍魄赤帝養氣黑帝通血黃帝中主萬神無越五帝大魔萬神之宗普告無窮萬神咸聽三界五帝列言上清右劵付弟子某收執持為身寶以致飛天下觀上帝遙唱萬神朝禮三界侍軒群妖束首鬼精自亡萬靈振伏招集群仙冥慧洞清大量玄玄急急如靈寶大法盟傳版劵律令勑銘曰始青之玄化兆成身母之血父之精血為鉛汞為精血為氣汞為神鉛為陽汞為隂鉛汞便為隂陽門造化為日月根汞主情鉛主性神性地靜永無輪神荒鉛降汞離根性亂汞走鉛失真群魔變幻生三宫性躁神飛失了靈寶莫尋真如何得兆至飛升深尋鉛汞辨濁清餘迤邐推之悉其圖乃修錬之密旨明其文乃大道之門戶若將萬種非類配合望靈寶丹成脫胎神化白日飛升試亦難矣若亂泄之於非人風刀立考永劫不原右劵以梓木版長一尺二寸以青為地朱書符及字以黃袋盛之師曰思微定志符乃大道之要旨靈寶之至訣悟之者長生修之者成仙今提綱序之兆宜詳細合同劵式維某年太歲某某月某朔某日某辰某府某縣嗣法弟子某即日謹齎法信恭依科格拜受靈寶大法符訣一宗誓願代天宣化助國救民濟死度生永依三寶今對道前盟約而傳師不敢隱真出偽弟子不敢怨道咎師如有違盟並依冥譴其道不成一如玄科律令當中分作兩片右劵以黃絹為之朱符墨文傳度時恭對上真前當中剪破師留一半弟子收一半各以黃袋盛之版劵封皮式正面度師法位姓某押封用印三背面思微版劵給付嗣法弟子姓某受持靈寶告盟三天合同劵式靈寶合同職劵式右二劵並如後十天劵式書於中間左右並同後式二劵作一袋同環子盛之師與弟子各收一半靈寶告盟十天寶劵式右十天劵以黃繒長九寸篆文朱書兩邊告文墨書却於中間篆文某氣某方天尊並隨方換易十方共十道臨壇面十方分之十劵共作一袋封之各方篆文式仙誥式三天門下誥伏以混沌一判元始開圖真文洞煥於神霄玉字敷宣於碧落神靈降質氣寶聚形含元氣於太虛運隂陽於寒暑統攝三界拘制群魔寶笈瓊篇琅函蘂簡經號稱於上品法獨冠於中宫是為萬物之宗玄機之祖諸天至重勤苦而聞審察賢愚方遵舊格盟十天而奏信齎金寶以參傳輕露祕文禍延九祖以今某即日謹齎上金九兩紫綾一端青絲一兩誓香一斤肘步投壇伏為自身行年某命某月某日某時生重念某素心潔志守道純誠謹按太上玄科告盟傳受既獲吉祥之報宜加仙爵之褒保舉師十方至真飛天神王長生大聖無量大神監度師三十二天帝君妙行真人度師十方靈寶天尊虛皇道君經師九天髙明大使神功妙濟真君籍師三天大法師正一靜應真君度師玄中大法師虛皇靜老天尊東斗注算君度南斗上生君度西斗記名君度北斗落死君度中斗大魁君度謹按靈寶本科某人宜補授奉行上清靈寶大法某嶽先生某帝真人充南昌上宫受錬真官主管黃籙院事右遵盟真玉格欣慶受度請列仙班奉三清玉帝勑符到奉行年月日告下具位姓某度上清靈寶大法卷之二十九
