front:
  text: 上清靈寳大法卷之二十觀五
  hash: sha256:6f6aef32c50c3a8a33d98c24c775ab05e332052158d2d1e3c894499a44dac620
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5g0030_HFL_020-001a, image: hfl/0948/0948-066.png}
body:
  text: 洞微髙士開光救苦真人𡩋全真授上清三洞弟子靈寳領教嗣師王契真纂經句符書門三十二天符東方八天太皇黄曽天右符主午生人太明玉完天右符主午生人清明何童天右符主未生人玄胎早育天右符主未生人元明文舉天右符主申生人上明七曜摩夷天右符主申生人虚无越衡天右符主申生人太極濛翳天右符主酉生人南方八天赤明和陽天右符主酉生人玄明恭華天右符主戌生人曜明宗飄天右符主戌生人竺落皇笳天右符主戌生人虚明堂曜天右符主亥生人觀明端靜天右符主亥生人玄明恭慶天右符主子生人太煥極瑶天右符主子生人西方八天元載孔昇天右符主丑生人太安皇崖天右符主丑生人顯定極風天右符主寅生人始皇孝芒天右符主寅生人太皇翁重浮容天右符主卯生人無思江由天右符主卯生人上揲阮樂天右符主辰生人无極曇誓天右符主辰生人比方八天皓庭霄度天右符主辰生人淵通元洞天右符主午生人太文翰寵妙成天右符主酉生人太素秀樂禁上天右符主巳生人太虚元上常融天右符主巳生人太釋玉隆騰勝天右符主巳生人龍變梵度天右符主巳生人太極平育賈奕天右符主寅生人九和十合右符和合夫婦變化上清右符鎮鬼請滅三惡右符斬邪用斷絶地根右符治肝病萬神之宗右符治客鬼總領鬼兵右符治血尸鬼麾幢鼓節右符治五通山魈遊觀太空右符治惡夢自號赫奕右符治山魈附人神公受命右符治身厭邪普掃不祥右符治鬼炁臨身八威吐毒右符治牢瘟猛馬四張右符治伏強盗天丁前驅右符治夢與鬼交大帥仗旛右符治夜夢驚呌擲火萬里右符治鬼降魔流鈴八衝右符治尸鬼現形敢有于試右符治夙鬼拒遏三炁右符治鬼火金鉞前戮右符治鬼盗物臣天後刑右符治鬼火摸物死風火光停右符鎮巳驅疫十千截首右符書地上縳鬼萬萬剪形右符書地上枷鬼祛疾魔无干犯右符治小兒天弔鬼鬼無妖精右符治小兒驚風三官北酆右符治小兒夜啼明檢鬼營右符治人睡中語不得容隱右符治百物成精金馬驛程右符治六畜疫普告无窮右符治蠱炁萬神咸聽右符治耳内起光風澤洞虚右符治耳内鳴金剛乗天右符治甑鳴玄中太皇右符治釡鳴上帝髙眞右符治甑鳴紫虚鬰秀右符治人驚悸輔翼萬仙右符治鷄作人語千和萬合右符主利市招財自然成眞右符主和合衆事眞中有神右符和合男女長生大君右符治門户自開閉无英公子右符服三百日能還精𥙷腦白元尊神右符乆服可休粮太乙司命右符能絶粒无文不成右符鎮貼四方富盛无文不生右符下死胎桃康合延右符絶粒下鎮人身右符同上泥九絳宫右符布炁通流中理五炁右符佩服安神混合百神右符能招遊魂我界難度右符辟惡鬼故作洞文右符解呪詛變化飛空右符解𡨚業以試爾身右符解負命厄度者幾何合右符治男女鬼執符把籙右符治井泉沸保命生根右符佩服利見大人故爲歌音右符佩帯祛離灾横上清靈寳大法卷之二十
