front:
  text: 上清靈寶大法卷之二十觀五
  hash: sha256:cfb5723a2959f0695f0d44a8a9ab81c8ca97d490bd636cecd3416e8c0b50bf3b
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5g0030_HFL_020-001a, image: hfl/0948/0948-066.png}
body:
  text: 洞微髙士開光救苦真人寧全真授上清三洞弟子靈寶領教嗣師王契真纂經句符書門三十二天符東方八天太皇黃曽天右符主午生人太明玉完天右符主午生人清明何童天右符主未生人玄胎早育天右符主未生人元明文舉天右符主申生人上明七曜摩夷天右符主申生人虛無越衡天右符主申生人太極濛翳天右符主酉生人南方八天赤明和陽天右符主酉生人玄明恭華天右符主戌生人曜明宗飄天右符主戌生人竺落皇笳天右符主戌生人虛明堂曜天右符主亥生人觀明端靜天右符主亥生人玄明恭慶天右符主子生人太煥極瑶天右符主子生人西方八天元載孔升天右符主丑生人太安皇崖天右符主丑生人顯定極風天右符主寅生人始皇孝芒天右符主寅生人太皇翁重浮容天右符主卯生人無思江由天右符主卯生人上揲阮樂天右符主辰生人無極曇誓天右符主辰生人比方八天皓庭霄度天右符主辰生人淵通元洞天右符主午生人太文翰寵妙成天右符主酉生人太素秀樂禁上天右符主巳生人太虛元上常融天右符主巳生人太釋玉隆騰勝天右符主巳生人龍變梵度天右符主巳生人太極平育賈奕天右符主寅生人九和十合右符和合夫婦變化上清右符鎮鬼請滅三惡右符斬邪用斷絶地根右符治肝病萬神之宗右符治客鬼總領鬼兵右符治血尸鬼麾幢鼓節右符治五通山魈遊觀太空右符治惡夢自號赫奕右符治山魈附人神公受命右符治身厭邪普掃不祥右符治鬼氣臨身八威吐毒右符治牢瘟猛馬四張右符治伏強盜天丁前驅右符治夢與鬼交大帥仗幡右符治夜夢驚呌擲火萬里右符治鬼降魔流鈴八衝右符治尸鬼現形敢有于試右符治夙鬼拒遏三氣右符治鬼火金鉞前戮右符治鬼盜物臣天後刑右符治鬼火摸物死風火光停右符鎮巳驅疫十千截首右符書地上縳鬼萬萬剪形右符書地上枷鬼祛疾魔無干犯右符治小兒天弔鬼鬼無妖精右符治小兒驚風三官北酆右符治小兒夜啼明檢鬼營右符治人睡中語不得容隱右符治百物成精金馬驛程右符治六畜疫普告無窮右符治蠱氣萬神咸聽右符治耳內起光風澤洞虛右符治耳內鳴金剛乘天右符治甑鳴玄中太皇右符治釡鳴上帝髙真右符治甑鳴紫虛鬱秀右符治人驚悸輔翼萬仙右符治雞作人語千和萬合右符主利市招財自然成真右符主和合衆事真中有神右符和合男女長生大君右符治門户自開閉無英公子右符服三百日能還精輔腦白元尊神右符久服可休糧太乙司命右符能絶粒無文不成右符鎮貼四方富盛無文不生右符下死胎桃康合延右符絶粒下鎮人身右符同上泥九絳宫右符布氣通流中理五氣右符佩服安神混合百神右符能招遊魂我界難度右符辟惡鬼故作洞文右符解呪詛變化飛空右符解𡨚業以試爾身右符解負命厄度者幾何合右符治男女鬼執符把籙右符治井泉沸保命生根右符佩服利見大人故為歌音右符佩帶祛離災橫上清靈寶大法卷之二十
