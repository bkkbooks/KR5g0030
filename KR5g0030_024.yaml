front:
  text: 上清靈寶大法卷之二十四觀九
  hash: sha256:ec5ee53b780a94e54c98f10bde6bfa0c19ee486857a05ea2b6c2f344ecb3199a
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5g0030_HFL_024-001a, image: hfl/0949/0949-094.png}
body:
  text: 洞微髙士開光救苦真人寧全真授上清三洞弟子靈寶領教嗣師王契真纂修齋轉誦門誦經科條經曰上聖巳成真人通玄究微此條非凡世之人誦詠謂通玄究微能悉其章者獲十品功德也至學之士謂至人學士誦之獲六品功德學士謂世學之士誦之獲三品功德也供養尊禮謂一切學士行此功德獲五品善果凡誦是經亦謂巳成真人再言自然功德果報度萬祖苦爽上升朱宫依朱陵品格九年更生受化得為貴人自身功德滿日飛升上淸金闕遊宴玉京也乃至學也止得自身受度飛升南宫不能功及曽祖也世人受誦止得延壽尸解返形太空一身不獲上度朱陵之福曽祖難生受化也魔王歌音百遍名度南宫千遍魔王保迎萬遍飛升太空此是三界歌章非餘文也有聞靈音心形歸信諦聽誦者獲九品善果行是功德發心修齋燒香誦經者獲三品善果右别至人至學之人行是功德克獲為上清後聖帝君金闕之臣有知其音中篇也謂如曉其文功力齊而獲八品福報此音中篇之音有辟禳度成四種無量威神之力誦者獲十六品祥應齎金寶效心盟天而傳依玄科四萬劫一傳齎金寶質心依舊格告盟十天此三條乃傳付授受之條上天之科立四萬劫乃舊劫之格自黃帝受圗大禹受符高辛受天經至太極下教豈有四萬劫也依阿母降世新格下教之科四百年一出有其人四十年聽傳再付四百年共不得過七傳四年中有至人亦許一授而三條付受之科言二章大法及誦經之式也長齋修誦例道言正月長齋誦詠是經為上世亡魂斷地逮役度上南宫正月者上元天官會地水二官於上元紫微宫校諸功德名舉仙賞會之月役者有三塗役天塗驅雷役電即天官役也地塗擔砂負石即地官役也水塗漣汲溟波即水官役也有長役鬼官者五嶽掃山酆都役逮𨽻山河壘治此鬼官之役也恐上世亡魂受諸塗役故此月冝長齋誦經度魂神上南宫也七月長齋誦詠是經身得神仙諸天書名黃籙白簡削死上生七月者中元地官會天水二官於中元陽臺宫校勘功過名慶生中會之月黃籙者天之金籙上生名也白簡者死籙也所謂金簡籙書生籍白簡削死字是也神仙所書之過名丹簡罪簿世人所書死籍名黑簿皆死名之部也故此月冝長齋修誦以度已身諸天書名告命黃籙白簡削北都死籍上生名而得神仙也十月長齋誦詠是經為國王帝主君臣父子安鎮國祚保天長存世世不絶常為人君十月者下元水官會天地二官諸天諸地諸水真聖仙靈星宿官曹鬼神主宰普校一切功過善惡於東極天之尾閭泄水之源淸泠府中名普校建生太會之月冝長齋誦經為國王帝主君臣父子繼世不絶常為人君也行此功德則諸天保舉紀其善功也師曰世有冢訟纒身乃先亡訟於隂司逮及生人計運不利乃考後裔既為道子先於上元度七祖九玄斷其逮役度上南宫次於中元自度其身削死簡上生籍紀名諸天身得仙道然後於下元為國祝安帝王聖祚及依法安鎮有災之方謂以三十二天玉字安鎮其方則召諸天和氣以致民稱太平若學仙之士自身先亡長役三官逮考延及其身死名注於黑簿既自無仙名又何暇為國為民行其功德所以三元之首自上及中次下皆須行道誦經則無玷科式矣八節之日誦詠是經得為九宫真人八節者四立二至二分也至日皆當面本方修誦以消禳半季災數及消鎮其九州地分水火刀兵旱潦之厄得行是功可證九宫真人之位也本命之日誦詠是經魂神澄正萬氣長存不經苦惱身有光明三界侍衛五帝司迎萬神朝禮名書上天功滿德就飛升上淸本命者乃本生造化之日諸天所重今之下元生於五濁之世五情交攻六欲纒縳七魄得志三魂悲泣神氣兩亡空尸動作百邪競湊况三魂上屬三台總氣太玄生府性好遊逸飛騰三界既遇生根立始本命來歸形中能於此日誦經拘制魂魄故魂神澄正而寧靜萬氣不散而長存邪不外撓身有光明則三界神祇侍衛五帝靈官司迎但非止誦經如大洞諸法上淸上道及養命法術皆用此日修誦乃為良日必無諸魔試之患能行如此功德則萬神朝禮名書上天若功滿德就則魂飛上淸其説三淸天者四梵天之上太極宫所治太淸十二天九仙所居九老所都後聖金闕所治次上淸十二天九真所居玉晨道君所治次無上大羅玉淸十二天九聖所居元始所治是天中之天三十六天也上淸者太淸之上玉淸之下也正月誦經長生久視太微玉符玉几玄珠流降三田百神拱衛萬聖臨軒飛梵綱輪通幽達靈右符正月佩服召東華真火齊滿之氣下入身中長生久視後天無窮七月誦經長生久視九仙玄籙金簡龍章煥照太玄萬帝設禮五行回旋金泂玉房受命延生右符七月佩服召靈真毋湯色之氣下入身中以生金木土之氣長生久視久而行之身飛上淸十月誦經長生久視玉帝寶籙真元散敷朗煥九衢神變帝臺梵響太虛周行六合真氣濳扶右符十月佩服召北方五氣五君萬賢之氣下入身中以生水木之氣長生久視後天無窮八節誦經長生大帝久視之章真氣羅絡虛上玄華三關通徹八景陳敷與日合并得輔真人右符八節佩服召黃帝君務猷收之氣入身中以生土火之氣即得長生神朝玉真本命誦經神霄玉淸仙王降真寶籙胎仙上景澡煉精神左命玉華右嘯金晨役靈使神常保利貞巳上符素地朱書密地行持勿以語人修真之士長生日面東南火化淨水服之三宫密誦師曰度人上品鬱秀光芒上消天災下禳地禍外濟庶物內練百神行用之門以精專為首修誦之法以存念為先故使氣息調和音聲和暢想三氣之蓊鬱會百神之森羅可以內錬其躬外浹於物修誦之旨入靖焚香定心平氣收光內現萬慮不干端坐直身毋倚側毋僂曲俾牛車之路不屈龍虎之氣綿綿然後誦經各有所主有神誦心誦氣誦此外有意誦也若為天地國主及天象可以神誦為災厄及他人祈禳可以心誦若度一切亡魂可以氣誦凡有緊切須於密室中默誦神文方行章醮自始及終並合如法存思初一遍誦序第二遍止自經始十遍為一過誦畢納官密陳情悃出宅升神也訣曰正月為上元行持在上宫存自已嬰兒自丹田中隨三色雲氣升歸上宫止六月一同凡七月為中元行持在中宫存嬰兒在中田止九月一同凡十月為下元行持在下宫存嬰兒在下田止十二月一同凡祈禳在上宫凡鍊氣在下宫凡為亡靈在中宫也凡行九種隂功及消禳災厄拜自已度厄立功存身為元始懸坐空浮五色獅子之上居日光中每為人誦經須存泥丸中宫元始下在絳宫仍攝祈禳人陽魂來受經如元始授經與道君一例至誦經時須行定法方著耳徹聽天尊誦經琅琅如鐘聲下丹田氣誦三千遍中田三千遍上田四千遍周一萬遍功也行道修誦經曰行道之日皆當香湯沐浴齋戒入室耳師曰行道之日者謂應是誦經之日皆當香湯沐浴也香湯者五香之湯也五香湯沐浴法青木香白芷沈香白檀香甘松右各以二十四銖治下篩用東流長泉一石煎數沸靑木香者阿母大有三竒經云乃五節之淸香開塵濁之穢如誠奏上玄得以焚之開通塵穢五丈使通霄漢訣曰以器盛五香湯先當解衣燒香於左就座存日月光華五色交錯入於五香湯中次存五色仙童五人玉女五人從五方來燒香散花執巾執水在左右即以杓攪湯三十二下呪曰五香玄水日月華英澡鍊身形去濁流淸尸塵滅落穢氣蕩除胎結散根䇿空乘虛飛入上淸咒畢即叩齒再呪曰太玄真液鍊氣生靈沐澤蒼華誦詠洞經七祖飛仙我騰上淸咒畢叩齒三十二通先取飲一器溫涼自適次以别器沐髮先念解髮咒曰神宫振天黑雲散開流金火鈴煥擲無邊使我通真遊行諸天無量度人招靈命仙解了沐髮呪曰日月之華流晶泥丸沐養九官百神欣歡尸祁滅落真師下觀賜受神虎得為帝賔結了就浴解衣呪曰五斗配衣龍虎侍真開明三景上登玉宸解衣成仙使我長生解衣畢就浴咒曰霐池玉泉灌我身形內鍊五臟外通九門使氣開通尸穢蕩淸萬遍保舉入登帝庭浴畢戴冠呪曰雲層碧玄使我通真冠髻召仙五氣攝真神華發光上升帝庭冠畢著衣咒曰神童侍衣玉女燒香登拜經室玉音琳琅度我七祖滌滅禍殃延年長存雲根寶漿飲湯咒曰黃神守關靑帝護魂天騶咆哮萬魔喪精尸血盡滌靑蟲滅形七魄鍊化紫雲自生遊宴太玄高真併軿入室修誦例經曰入室東向叩齒三十二通上聞三十二天心拜三十二過閉目靜思身坐青黃白三色雲氣之中內外蓊冥有青龍白虎朱雀玄武獅子白鶴羅列左右日月照明洞煥室內項生圎象光映十方如此分明按道君皇帝御注度人經云東向者人間望玄都即玉晨在東又始靑在東北東為生氣故行道入室迎而向之用以招延靈氣者也叩齒之法左為天鐘伐鬼靈也右為天磬集百神也中為天鼓朝真聖也入室誦經思真念道叩齒三十二通心拜三十二過內以盡其誠外以應其數內以集神靈外以滅邪精旁以周至理上以格髙真修存上法無所不該者焉心拜之法當存見天宫帝君下灌一天真氣如玉霞之輝入我身中咽納周布心拜神感誠念至極故曰心拜過於形拜又曰修存上道止以心拜則不傾側腦宫正此義也主於召出巨身中功曹使者等神俱我身中道氣所化與道相通當運至真召出應妙關告天境洞徹志意以契大道焉修誦內用師曰凡修誦先如前沐浴更衣畢凝神思道入靖室前先叩齒念入户咒四明功曹龍虎使者正一生氣侍靖素女願得開明童子上玄少女俱入黃房之內通逹所啓皆得上聞急急如律令次先入右足至案前設經東向上香叩齒九過念心香呪道由心合信假香傳手執玉爐心存帝前真皇下盻仙佩臨軒令臣關告徑逹重玄次平坐先念淨口咒丹朱口神吐穢除氛舌神正倫通命養神羅千齒神卻邪衛真喉神虎賁氣神引津心神丹元令我通真思神鍊液正氣常存次念淨身呪靈寶天尊安慰身形弟子魂魄五臟玄冥靑龍白虎隊仗紛紜朱雀玄武侍衛身形又呪吾以日洗身以月錬形仙人輔我玊女衛形二十八宿與吾合並千邪萬厭逐呪而清次瞑目靜心存東方青龍口吐雨合月華白氣及腎水如大海中浴身洗去五臟穢濁艮久却自南方降真火同日精赤氣合於心火燒身并靖室內外並無一毫煙穢即覺大風吹盡塵垢存丹田中有嬰兒自地戶步斗登壇來合我身默念淨天地呪洞中玄虛晃朗大元八方威神使我自然靈寶符命普告九天乾羅答那洞罡太玄斬妖縳邪殺鬼萬千中山神咒元始玊文持誦一遍却鬼延年按行五嶽八海知聞魔王束首侍衛我軒𠒋穢消蕩道氣常存微吸四方真氣略吹遍身即想天地淸淨再存嬰兒變我身為元命真人冠裳簡履如元辰本命納音服色存想既定然後凝神就座次存自身威儀整肅心禮十方自東為始每方心拜一拜訖東向平坐默念開經玄藴呪雲篆太虛浩劫之初乍遐乍邇或沈或浮五方徘徊一丈之餘天真皇人按筆乃書以演洞章次書靈符元始下降真文誕敷昭昭其有冥冥其無沈痾能目痊塵勞溺可浮幽冥將有賴由是升仙都即從頭誦經序至受經者身存五方五帝玊童玊女每一方氣有二十四人合一百二十人下降侍經案側次誦至飛升上清訣曰閉目靜思三十二天自北維起太黃皇魯天由東入南以次周回四方每方各有八天在青霄之中紫雲之內想東方八天在左耳上𦂩西方八天在右耳上𦂩南方八天在額前面北方八天在腦後面每天有各色雲氣交沓各存天宫樓觀中有帝君儼然而坐東八天靑冕旒靑服靑裳自北始向南行南八天靑冕赤旒朱服黃裳自西始車行西八天靑冕金旒白服白裳緋襈自南始西行北八天靑冕白旒朱裳皂服自西始東行各各侍衛羅列次存神自太皇天起每一天先默叩齒一通令響應一天密誦帝諱運心誠上聞一天心拜一拜形不可動但隨其心屈伏如身禮也周回十方三十二過畢即運化上丹田印堂出靑色玄氣中丹田心出黃色元氣下丹田臍下出白色始氣初出如絲漸漸濃厚與外東靑氣南赤氣西白氣北黑氣自逐方降混合玄元始氣為三色雲氣先次交絡一形次映滿室所坐几席無不周遍兆身坐百寶光中雲氣洞徹于一身五臟之中內外蓊鬱旋繞一室然後出外圍布一方兆咽液三過送氣一口俱入丹宫化作一條金梁三色直透泥丸分布運發一真上朝元始上帝端坐于中一氣化玉晨在左一氣化老君在右如此分明良久冥合天地次運左手玉淸訣直至辰文運肝氣自一云左目一云左耳出化靑龍侍左一本云氣上青衣真人駕乘上朝三天次運肺中白氣一云鼻又云右耳出為白虎衛右一本云氣上白衣真人駕浮上朝三天次運心中赤氣自一云口又云頂門出為朱雀導前一本云氣中有君王相輔之服端圭朝三天次運腎中黑氣自一云耳一云足出為玄武從後一本云氣上黑衣真人上朝三天次運脾中黃氣出下丹田臍下為獅子立下丹田上載真人升舉仰頭上朝一云舌根出一十二隻列於左右前一云膽中碧氣自右眼出化成次運淵玄宫白氣臍出以左乎剔一十二氣訣回至午上作瑞鶴六六隻羅列四向一云自泥丸出隻在獅子之外九次雙手剔已午未三宫訣于天廷之上髙奔雙目日月光華金素之氣一閃發出六鶴分布雨眉前天廷之上乘氣而浮次存六合之府眉後兩小穴有日月出日有紫赤九芒月有黃白十芒去面九寸洞煥一室燦若金碧之色次存日月光華灌我鼻中入金華宫腦後四寸却自紫微玉枕之宫光凝景圎項上發出九色圓象芒如虹霓大如車輪照徹十方存想一一分明訖次默念密咒貪羅鬱羅默者謂語不出口耳不聞聲也次口動微音出音無上玄元云云至關啓所言即具位默奏盡心中所欲言也至今日吉慶長齋隨其日言之如非長齋即依本日至淸堂修行至經如行三洞中盟之道即言修行如常誦經則云淸堂誦經至無量度人或普度幽明可言無量或為一事則言為某事至臣及甲乙若自己不冝云及甲乙但稱臣轉經受生或為人看却稱為某人或為自己及人乃依本文轉經者周回十過之旨也至願所啓上徹徑御無上三十二天元始上帝至尊几前畢一云至此或朝三天九天皆自此上朝凡引氣三十二過依前自太黃皇曾天為始再天想降真氣如玉霞之輝下灌兆身皆以鼻而吸咽之如東八天氣存歸肝膽筋脈之間其精化生無英公子住於肝中南八天氣存歸心胞神府之間其精化生司命君住於心中西八天氣存歸肺腑脾胃之間其精化生白元尊神住於肺中北八天氣存歸腎臟骨節之間其精化生桃康君住於臍下也引氣周竟十方想真人在丹田中微音誦經初一遍自道言昔於始靑天中起至序末存思訖次從元始洞玄誦起直至經末每十遍一存思以十遍為一過十過為一轉也十過既畢存神納官如式師曰誦經之法各有所主有心祝微祝密祝故心祝則心中神存意而祝也微祝則自已可聞其聲也密祝口言而巳使外人莫曉其聲也又有神誦心誦氣誦所謂上中下三田也此外有意誦各隨事之輕重分所誦之內外耳誦則下聲而誦之詠則朗吟以詠聲十言一咽津則養氣而潤澤內宫也一百言一啄齒則集真和神外保不空尸竭神也如錯一字則上前三十字以誦之如越一字更覆五十字以誦之未過二章不得起居十遍一存思終章可食息也凡食息移時當即如前法思之不可言混淆俗心馳他境意不宗為上道高聖必真之法心不奉為三寶君師父母之文志不敬為翠玉華珍寶章形不禮於香火朝修拜跪口誦心驅形聲志別徒音聲以取德逞捷利以數敷差前説字輕誦神文何萬遍而望駕雲軿雖億數而反沈酆憲則空尸誦經也徒咎道為虛語豈不知之自致須在受於師匠必然誦合天規若萬遍不登太空我道自招誑兆之尤終無仙真之位可證也受誦之子冝勉志哉無犯輕誦輕泄之愆犯之非道不慈天有明憲神不敢私修誦旨訣上品妙經中指中上香心存三拜道言搯中指上節心拜上香昔於止咸得長生秉簡起道言至浮空而至上香心拜一拜十方一一上香一拜十方至去地五丈上香心拜三拜元始至飛升上淸上清訣道言止沐浴齋戒中指中上香秉簡立入室至如此分明心想拜三十二天密呪曰三拜上香密呪無上玄元出官入事陳祝元始上帝至尊几前三拜引氣三十二遍心拜三十二拜元始洞玄至周回十方艮文訣中有至臨軒上香三拜東方無極至無量度人震文南方離文西方兊文北方坎文東北艮文東南巽文西南坤文西北乾文上方中指上節下方中指中節每一方上香心拜一拜在本方神王峩冠朱服皂襈環佩玉圭通情旨宣白文焚符一道於香爐中存神王稽首十方至真至嘯歌雍雍酉文五老啓途中指中群仙至傾光回駕未文監真度生寅文諸天至上解臣某祖考臣為某云云至伏願云云無色之境梵行東靑西素南丹北玄四維五色雜霞上下黃玄名飾護守其太上羽符千乘萬騎隨其方色口誦期玄神存玄像三拜念呪再拜想朝東方八天存帝君服色心拜上香念天名太黃皇曾天帝默念止八天畢上香次九拜鬱繿玉明九氣靑天自北始南行念畢三拜餘八天一同南方八天存帝君服色心拜上香念天名赤明和陽天帝默念止八天畢南方八天咒在前上香告白云云次九拜理禁上真三氣赤天自東始南行念畢三拜八天一同西方八天存帝君服色心拜上香念天名元載孔升天帝默念止八天畢西方八天呪在前上香告白云云次九拜存想開真定光七氣素天自南始北行念畢三拜八天一同北方八天存帝君服色心拜上香念天名皓庭霄度天帝默念止八天畢北方八天咒在前上香告白云云次九拜存想惠覺昏五氣玄天自西始東行念畢三拜八天一同三十二天至欣慶受度辰文歷關至請滅某三惡臣為追修某事至東斗主算卯文西斗記名酉文北斗落死子文南斗上生午文中斗大魁中指中靑帝護魂卯文白帝侍魄酉文赤帝養氣午文黑帝通血子文黃帝中主中指中靑天魔王卯文赤天午文白天酉文黑天子文黃天中指中五帝大魔中指中存魔王冠冕裳服如五帝之形至嚴攝北酆子文神公受命紫微印普掃不祥八威吐毒酉文猛馬四張午文天丁前驅中指中大帥仗幡辰文覆手擲火萬里寅文流鈴八衝申文至金鉞前戮午文巨天後刑子文至溟涬大梵辰文至元始安鎮雙手午文至三十五分總氣上玄至辭參高真焚魔王符存三界魔王如五帝冠服第一欲界二指上節第二色界中指上節第三無色界四指上節凡誦經十過畢叩齒三十六通咽液三十六過心拜十方而起南面下座次東向立心禮三拜瞑目密祝曰臣某謹誦金書玉經十轉既竟乞發龍軿天神下降役使六丁九祖飛升我騰上淸次閉目叩齒九通咽液十過再北向心禮三拜密咒曰上皇太真使我升真淸齋澡錬誦詠金書七玄拔散上朝太虛延年長存克名籙書閉目叩齒九通咽液十遍再東向密咒曰臣誦經已竟向來所出身中三五功曹左右官使者侍香金童傳言玉女五帝直符直日香官各三十二人各還入臣身中復於宫室毋令差互後召復到一如故事精思還宫訖叩齒三通咽液三過上香瞑目密咒曰向來聽經衛經聖衆散壇解席各還所司神風靜默山海肅淸千邪伏匿百靈護形存十方天真上聖各騰雲上天自東方為始每方叩齒三通心禮三拜即以鼻引三色雲氣吸入五藏次收神先收朱雀次靑龍三白虎四玄武五獅子六白鶴方總吸一吸納真入泥丸想復本位叩齒三通咽液三過畢閉氣呪天靈九宫太一守房百神混合魂魄安康長生久視日月同昌中指子午斗朝謁誦詠升降寶境訣曰九色圓象乃元始內觀之道有力色圖五色獅子運化五內五色毫芒合成碧玉之色咽液一下瑞氣結成五色獅子立下丹田心是蓮花上絳府真人乃身中元始天尊懸座空浮者則真人乘花懸坐獅子是道也誦內音訣按靈寶玉字經云凡誦靈書中篇每方有祝想之法凡誦東方六十四字亶婁阿薈云云叩齒九通思九色之龍導引前後靑雲九重覆罩身形念東方密呪曰赤明開圗九氣回真總統元關靑帝大神流化九外纒綿我身靈音八書六十四篇洞明天地與我合仙運致龍駕上升帝轅呪畢引氣九咽止行之九年八天各以靑腰玉女靑華玉童各八人侍衛身形致靑芽九氣之精生神光明徹見虛旡萬遍道備即得飛行七祖同福皆升南宮也凡誦南方南閻洞浮云云叩齒三通思朱雀鳯凰翔於前後絳雲三重覆身念南方密咒曰三氣徘徊靈鳯朱飛玉音八字煥爛紫微吉日大慶我道洞開朱丹哺飴仰吸靈暉身生水火絳帔羽衣登空飛步足踐鳯梯周旋八天七祖相隨呪畢引氣三咽止行之三年八天各以太丹玉女太陽玉童各八人侍衛身形降致朱丹三氣之精及白留容萬劫不傾七祖超升上入福堂反胎仙家即得長生也凡誦西方刀利禪猷云云叩齒七通思白虎獅子道引左右素雲七重覆身念西方密咒曰七氣金靈八天尊神白虎䇿輦獅子捧轅七氣纒綿錬我成仙身登金光映照素雲內外變化升入金門七祖出夜九幽旋魂億劫開度隨運長存咒畢引氣七咽止行之七年八天各以素靈玉童八人侍衛身形降致太素七氣之薰停年留世萬劫童顏慶及七祖升度南宫反胎更生世世仙家也凡誦北方玃無自育云云叩齒五通思飛龍玄武羽蓋蓊鬱左右覆匝身形神童玉女羽衣飛裳侍衛身形念北方密咒曰玄天徘徊流景上淸大有啓運八字高明飛玄澄空洞隂自生五氣纒綿灌我身形冠帶北單受錬洞靈腎府北出內外光精飛行三界遊宴紫庭七祖同慶歡樂劫齡七寶林中反胎更生長夜出離南宫記名黃籙白簡世世仙生咒畢引氣五咽止行之五年八天各以太元玉童八人侍衛身形降致靈滋五氣之精還年留景保命三淸慶及九祖世世仙生也右四方內音若能依訣持誦則無所不辟無所不禳無所不度無所不成飛天下觀上帝遙唱萬神朝禮三界侍軒振伏群靈肅淸十方道備功成臣事三境矣內誦師曰凡一切修誦度厄消災制伏救治咒祝百物摧滅凶妖禳鎮不祥辟斥光怪召龍致雨請晴開光止水去火除瘟去害發符咒水收束毒獸求仙修其七經八緯降真召靈並須密誦靈書萬遍之後所欲立至神通漸及十萬遍坐致自然造化無方如遇大事書隱語火化吹揚或安岩谷石上書寫或埋地中或沈水中採擇仙藥救病皆用此靈書誦持之者依口訣白元尊神誦千遍太乙誦千遍司命誦千遍桃康誦千遍無英公子誦千遍上淸靈寶大法卷之二十四
