body:
  text: 洞微髙士開光救苦真人寧全真授上清三洞弟子靈寶領教嗣師王契真纂文移雜用門結盟狀用三本無上黃籙大齊結盟今奉齊官姓某謹備法信之儀請道士一壇修崇無上黃籙大齊三晝夜集兹冥神普濟幽沉竊以下元簡文著靈仙之品格洞玄經法敷度死之科條功普人天惠覃家國故太極宗師廣宣禁戒示威儀罰簡使飭身心典刑具存古今不泯今齊官某儀形報薦志切精專㳙此剛辰建兹良果由是法天像地立纂舒壇格三境之帝真修九朝之紀事玄綱斯舉妙範聿陳重惟庶務之至繁全藉同齊之力贊依欲通靈逹妙在乎潔巳齊心齊心所以抑口味鼻香之貪潔巳所以絶視聽色聲之好抱神以靜正氣自澄注念不移立功可待某材非超世職忝具貟叩五帝以投誠對三官而立誓期相率勵共罄夤恭當使性若氷清心如月皎修用㸃符於至理始終無曠於玄規庶使功勤以弘吾教其或至違科越禁按法紏彈尚不能及巳自求受天譴罰今請各僉法位作合同盟三本一本歸五帝府一本上三官府一本留泰玄都省照應謹啓以盟年月日時次從下列行壇道衆次列六職可陋五方五老上帝御前具位臣姓名狀奏謹封三元三官大帝聖前具位姓名狀申謹封三天大法師真君聖前具位姓名狀申謹封方函三黃籙齊壇結監狀奏請五老上帝闕下具位姓名謹重封黃籙齊壇結盟狀申三官大帝府具位姓右謹重封黃籙齊壇結盟狀申泰玄都省具位姓名謹重封職狀無上黃籙大齊壇今為某人崇建無上黃籙大齊謹集見前法衆克取今辰依科修奉擬補職事下項髙功大法師具法位姓名都講具法位姓名監齊具法位姓名侍經具法位姓名侍香具法位姓名侍燈具法位姓名右具如前各冝守職謹狀年月日具髙功法位姓名狀十方謁劄具位臣姓某不避誅鉏冒干天聽臣昨據齊官某乞取今月某日崇建無上黃籙大齊五晝夜追悼亡過某等魂及下元苦爽同遂生方事臣除巳列欵謄詞祈恩開度今者玄壇肇啓法信嚴陳敷露天章召迎道氣恭依科範普濟存亡伏望天慈特垂省覽敕下天省玄都洞陽仙館降解𡨚之童子命赦罪之靈官宥齊主之宿愆解亡魂之業報特降至此隨方換易東方九氣天官青靈始老洞陽大將和安使者太黃天真宰木地神君一合來下鎮守東方祇延上帝降真文而和天安地啓迷塗而導𩲸提魂隔穢驅魔迎祥集瑞伺作成於齊事當回復於天經躬謁清場仰祈真應臣謹具劄奏謁以聞冒犯天威下情無任俯伏俟命之至右謹具奏呈東方無極太上靈寶天尊九氣天君御前伏候睿㫖年月日具位臣姓某劄奉九天聖位於中間隨方換易南方三氣天官丹靈真老元和真宰定安靈君赤明天上聖火地神君一合來下鎮守南方西方七氣天官皓靈元老平安上君和諭神君協助神君元載天上宰金地元君一合來下鎮守西方北方五氣天官紫虛玄老君守鎮洞神通和安諸君協和總禦君逹慶安命君皓庭天真宰水地神君一合來下鎮守北方東北方玄靈真氣天官玄靈英老君統領神君覆護天官安定福生君黃華秉鉞君守元神應君元明天上聖寶地神君一合來下鎮守東北方東南方青玄真氣天官華靈真老君廣化生君總攝萬安君覆守天皇玄神安鎮君觀明天真宰后地元君一合來下鎮守東南方西南方丹靈真氣天官洞靈景老君元守鎮安君萬福和淳君三真護守君元皇真定君太皇天上宰總地神君一合來下鎮守西南方西北方皓靈元真氣天官素靈虛老君安諭始文君天真應命君鎮安平定君洞安覆生君元載鎮守君太虛天真宰伏地元君一合來下鎮守西北方上方梵氣天官黃靈明老覆守安和君鎮定協眀君總禦萬安君福緣總應君上明天真宰玄地靈君一合來下鎮守上方下方靈元紫氣天官虛靈應老君上明覆鎮君安定守元君十真慶鎮君安方洞明君化元崇道君太極天上聖翊地元君一合來下鎮守下方十方謁謝劄具位臣姓某不避誅夷洊干天聽臣昨於今月某日具劄奏為齊官某崇建無上黃籙大齊超度亡過某等魂同遂生方事臣肅遵科典恭啓齊修敷露真文和安天地請降官吏鎮守壇場舉蒙覆護之恩獲遂圓成之果今則解壇散席進表言功捧劄告䖍隨方禮謝伏望天慈俯垂省覽敕本方之神吏下太極之神鄉升度亡靈昭明善果福流齊主慶及邦家所有元降真仙理當復始乞與計功推賞進爵褒崇臣等齊法未明科條有紊等祈寬貸免置嚴誅庶覃優渥之休以畢始終之惠臣謹具劄奏謁稱謝以聞冒犯天威下情無任戰栗待罪之至右謹具奏呈東方無極太上靈寶天尊九氣天君御前伏候睿㫖年月日具位臣姓某劄奏十方聖位隨方換易謁劄函謝劄同謁劄謹上詣某方宫請進具位姓某謹重封十方靈官疏具位姓某檢㑹昨據齊官某投詞乞薦亡過某等魂就某處崇建無上黃籙大齊總集隂功用資超度事某據詞難抑除巳録奏帝廷祈恩開濟今則初開玄墠敷露真文謹以龍璧紋繒紙筆墨硯分方安鎮效信盟真欲得傳誠上祈玄感須至具疏告聞者右伏以梵氣彌羅落落九霄之境真都寥邈巍巍十極之鄉欲丹悃之升聞仗洪慈而謄奏恭惟十方無極世界日月星宫經寶五嶽水府十鄉神仙諸靈官傳奏聖衆聖前真常善應神化無方凡度死以濟生毋分靈而降世伏願歷關懇願鑒察齊修九奏雪愆冀宣慈而宥過一期闡事丐秉筆以書功庶沐恩休普覃幽顯某下情無任激切之至謹具疏申聞謹疏年月日具位姓某疏開經疏大明國某鄉貫居具位臣姓某敬露丹誠上干洪造臣伏為入齊意至醮用物儀具狀投某人門下乞請道士一壇就某處崇建無上黃籙大齊三晝夜冀集隂功總資超度謹㳙某月某日開壇蕆事請命祈恩所有太上諸品真經天尊睿號欲預取某日為始開函看誦今先具品目敷奏如後一請道士看誦太上洞玄靈寶無量度人上品妙經若干卷太上洞玄靈寶升玄消災護命妙經若干卷已上並用普伸回奉上獻三界十方聖真仙衆醮筵列班真宰一請道士看誦太上靈寶天尊說救苦妙經若干卷已上並用回奉上獻冥府係醮一切聖衆一請道士看誦太上洞玄靈寶無量度人上品妙經若干卷太上洞玄靈寶九天自然生神章經若干卷太上洞玄靈寶九真妙戒金籙度命妙經若干卷太上靈寶天尊說救苦妙經若干卷太上元始天尊說生天得道經若干卷元始靈書中篇若干遍玉皇大天尊玄穹髙上帝寶號若干遍太乙救苦天尊睿號若干聲九幽拔罪天尊睿號若干聲十方洞靈睿號㑹巳上功德並用資薦亡故某魂超生仙界普薦云在㑹係薦一切魂儀各超仙界一請道士看誦太上洞玄靈寶無量度人上品妙經若干卷太上洞玄靈寶九天自然生神章經若干卷太上洞玄靈寶天尊說救苦經若干卷太上元始天尊說生天得道真經若干卷元始靈書中篇若干遍某經某號逐頊子細開列巳上功德並用資薦門中逺化宗親各超仙界或有附薦名位依此逐項開列一請道士看誦太上洞玄靈寶無量度人上品妙經若干卷太上洞玄靈寶九天自然生神章經若干卷太上洞玄靈寶九真妙戒金籙度命妙經若干卷太上洞玄靈寶天尊說救苦妙經若干卷太上元始天尊說生天得道真經若干卷元始靈書中篇若干卷玉皇大天尊玄穹髙上帝號若干聲太乙救苦天尊睿號若干聲九幽拔罪天尊睿號若干聲朱陵度命天尊睿號若干聲巳上功德並用資薦六道四生孤魂滯𩲸各各離苦同遂生成右伏以無上真詮乃人天之梯級大慈睿號作生死之津梁德難可勝善無不應切念亡過某等魂歸九夜靈昧一真非仗指迷曷超沉滯願假金口敷宣之妙直悟玄微恍見氷壷瑩潔之明永除染著將開寶藴首露丹忱仰祈洞鑒之私𠃔副薦修之請臣無任瞻天望聖激切屏營之至謹具疏上奏以聞謹疏年月日具齊官位臣姓某疏外可漏黃籙開經文疏上奏三界聖真十方主幸具齊官位臣姓某謹封功德都疏大明國某鄉貫居具齊官臣姓某謹露丹誠上干洪造臣伏為入齊意至醮用物儀具狀投某人門下乞請道士一壇於某月某日就某處崇建無上黃籙大齊三晝夜滿散祗設謝恩清醮三百六十分位仰仗道恩普超亡爽旁資沉滯俱遂生方以今修奉良因巳諧圓滿所有回獻并資薦諸品真經睿號開具品目敷奏于后一請道士看誦某經並逐項一一具列依開經疏開之右伏以蘂笈琅函道祕精微之奧金書玉字功宣開度之儀無文不成有緣皆遇伏念臣亡故某及祖禰姻親顯幽靈識冥程寖逺覺路難尋思出離以無由致輪回而不返式嚴齊㑹用集隂功冀仗真乘以開智慧伏願恩光洞照奩舒寶鑑之明道岸旁通境入壷天之勝含靈均濟法界同資臣無任瞻天望聖激切屏營之至謹具疏上奏以聞謹疏年月日具齊官位臣姓某疏內封上帝髙真三界十方主宰具齊官位臣姓某疏奏謹封方函功德疏一函上詣三天門下請進具髙功位姓某謄奏謹重封三官考功狀具位姓某檢㑹先據齊官某狀稱伏為亡過某等魂崇䢖無上黃籙大齊用資超度今則設醮謝恩巳諧圓滿所有同齊道士并承受諸神在壇效勤委有勳績謹按太真之儀合行投録推賞除巳具表奏聞三天外須至逐一開申者一同齊攝職道士除某外開具下項開列六職道衆姓名一承受諸神天下都大城隍主者某州城隍主者某縣城隍主者某廟某侯王當境某監壇十方道都大主者九州社令主者九幽諸大地獄主者操章將軍僕射天下都官使者功曹從事直事君符吏郎决吏驛龍吏收食吏庭令丞小吏等捧香驛龍騎吏三五功曹左右官使者侍香金童傳言散花玉女五帝直符直日香官監齊功曹使者四靈神君靈寶大法司玉女金童靈官功曹丁甲吏兵合干天神將吏某靖諸司院府帥將吏兵神虎二聖玉女使者承行追取一行官吏等南陵樞府朱陵火府南昌上宫煉度一行官吏仙衆上清黃籙院一行官吏三界直符四直功曹六十甲子輪直日時功曹七道功曹九龍使者金龍茭龍驛吏地府火府齎簡童子傳符一行官吏五嶽地水城惶司十方道諸處沿路承受土地等神某家司命土地等神東嶽城隍司及本境廟宇差來防禦一切神兵巳上衆神並在壇監臨翊衛傳送追攝效勤本職並無違缺右謹具狀申上元賜福天官紫微大帝中元赦罪地官清虛大帝下元解厄水官洞隂大帝御前伏乞聖慈特賜聖㫖下三界所屬真司計功酬賞施行謹具狀申聞謹狀年月日具位姓某狀拜章引進狀無上黃籙大齊壇檢㑹今月某日奉為齊官某乞薦亡過某等魂崇䢖無上黃籙大齊總集隂功用資超度進拜天官某章一通內外函封印全徑詣太上某宫某曹治請進今隨狀見到欲得依時奏呈須至申聞者右謹具狀申三天門下省伏乞垂允不候諸處章詞類進徑為先次通奏取㫖頒行謹具申聞謹狀年月日具位姓某狀發請醮引進狀靈寶大法司檢會今月某日奉為齊官某乞薦亡過某等魂崇䢖無上黃籙大齊總集隂功用資超度今者已行滿散謹取某月某日夜祗設清醮三百六十分位上謝天恩今發奏請狀一十函重封印全須至開具申玉清上帝元始天尊陛下上清大帝靈寶天尊陛下太清大帝道德天尊陛下昊天玉皇上帝陛下勾陳星宫天皇大帝陛下紫微中宫北極大帝陛下太微南極長生大帝御前十方救苦天尊御前東極宫中大慈仁者尋聲赴感太乙救苦天尊御前后土皇地祇殿下右謹具狀申三天門下上清天樞院伏乞徑為通奏施行謹具狀申聞伏候昭報謹狀年月日具位姓某狀謝恩詞引進狀靈寶大法司檢㑹今月某日奉為齊官某乞薦亡過某等魂崇䢖無上黃籙大齊總集隂功用資超度今者巳行滿散克取今宵祗設清醮三百六十分位上謝天恩所進拜青詞一通重封印全合行繳發前去須至申聞者右謹具狀申三天門下省伏乞引進徑為通奏施行謹具申聞謹狀年月日具高功法位姓某狀黃素表引進狀無上黃籙大齊壇檢會今月某日奉為齊官某乞薦亡過某等魂崇䢖無上黃籙大齊總集隂功用資超度今則功圓果滿解席散壇所有進拜言功謝過黃素朱表一通內外函封印全謹謹上詣三天曹門下請進欲得引進奏呈須至申聞者右謹具狀申三天門下伏乞垂允徑為通奏施行謹具申聞謹狀年月日具髙功法位姓某狀發禮物引進狀靈寶大法司本司奉為齊官某滿散黃籙大齊修設謝恩清醮所有進獻車輦九乘進狀九函各封印全今隨狀見到須至申聞者右謹具狀申三天門下省伏乞經為通進施行謹具申聞謹狀年月日具髙功法位姓某狀請醮狀式奉醮具齊官位臣姓某右臣伏為亡過某等魂崇䢖黃籙大齊巳行滿散謹取今宵祗設清醮三百六十分位上謝天恩合預具狀奏請者右臣謹昧死具狀上奏某位尊帝陛下恭望道慈允臣奏請是夜特賜恩光鑒臨御座冒犯天威臣誠惶誠恐稽首頓首謹具狀奏請以聞謹狀年月日奉醮具官位臣姓某狀奏可陋某帝尊陛下奉醮具官位臣姓某狀奏謹封方函謹謹上詣三天門下上清天樞院請進具髙功法位姓某謹函封諸帝尊請醮狀奉醮具齊官位臣姓某右臣伏為追薦亡過某等魂崇䢖黃籙大齊巳行滿散謹取今宵祗設清醮三百六十分位上謝洪恩須至具狀奏請者右臣謹具狀奏請伏望天慈於是夜俯賜恩光鑒臨御座冒犯天威臣無任惶懼激切屏營乏至謹具狀奏聞謹狀年月日奉醮具官位臣姓某狀奏三界列班申請狀奉醮具官位姓某右某伏為追薦亡過某等魂崇䢖黃籙大齊已行滿散謹取今宵祇設清醮三百六十分位延奉飈馭仰謝洪恩合預具狀申請者右謹具狀申聞伏望聖慈於是夜降臨醮座干冒聖威某下情無任惶懼之至謹具狀申聞謹狀年月日奉醮具官位姓某狀上帝進狀式奉醮具齊官位臣姓某謹備龍車一乘右謹隨狀上進恭望天慈俯賜昭鑒冒犯天威臣誠惶誠恐稽首頓首謹具狀上奏以聞謹狀年月日奉醮具位臣姓某狀進可陋某帝尊陛下奉醮具位臣姓某狀進謹封方函進狀一函謹謹上詣三天門下請進具髙功法位姓某謹重封諸帝尊狀式奉醮具位臣姓某恭備龍車一乘右謹隨狀上進伏望天慈俯垂洞鑒冒犯聖威臣誠惶誠恐稽首頓首謹具狀奏聞謹狀年月日奉醮具位臣姓某狀三界朝班單狀式奉醮具位姓某恭備太上洞玄靈寶升玄消災護命妙經金錢一分寶馬一匹右謹隨狀上獻伏望聖慈俯賜鑒納謹具狀申聞謹狀年月日奉醮具位姓某狀施斛開通五路牒無上黃籙大齊壇牒上東方飛道大神本壇見為齊官某崇䢖黃籙大齊開度亡過某等魂巳節次謄詞敷奏請命頒行以今恭依科式普施大獻夜齊廣濟六道幽靈九州孤爽切慮冥陽有殊關原為阻須至牒者牒請飛符迅速奉令奔馳從青騎之天官旁開障塞啓艮方之鬼户不礙去來牒至准式時刻毋停立希照應謹牒年月日牒南方橫道大神無上黃籙大齊壇牒上南方橫道大神本壇見為齊官某崇䢖入意同前須至牒者牒請橫天擔力震地宣威助離以騰光燭開隂翳向南而啓道接引幽魂牒至准式時刻毋停立希照應謹牒年月日牒西方直道大神無上黃籙大齊壇牒上西方直道大神本壇見為齊官某崇䢖入意同前須至牒者牒請直道而行持幡前導輔兊卦大神而假勇普掃不祥由西方捷徑以提魂廣揚至化牒至准式時刻毋停立希照應謹牒年月日牒北方遏道大神無上黃籙大齊壇牒上北方遏道大神本壇見為齊官某崇䢖入意同前須至牒者牒請塞遏邪源申嚴正令剪除凶勃開朔易之遐方部衛形魂赴精嚴之法㑹牒至准式時刻毋停立希照應謹牒年月日牒中央都道大神無上黃籙大齊壇本壇見為齊官某崇䢖入意同前須至牒者牒請都攝百神肆開五路坦然明白俾斯須可舉而行滯𩲸疏通庶逺近無所不度牒至准式時刻毋停立希照應謹牒年月日牒上清靈寶大法卷之六十六
