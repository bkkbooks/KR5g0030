body:
  text: 洞微髙士開光救苦真人寧金真授上清三洞弟子靈寶領教嗣師玉契真纂齊法符篆門書符行持師曰凡書篆合用符命須依法入靖存思室中列三境帝師天真皇人黃籙真宰符籙中典録靈官等香花几案筆硯朱墨一一備具當先行內鍊之法洞陽內錬飛神八景法曰取六陽時入室端坐叩齒三通閉息靜默存下丹田火如彈九左九轉升上絳宫漸升十二樓登玉房泥丸中端坐左執日右執月號大洞太一尊帝呪曰魂神澄正萬氣長存不經若惱身有光明三界侍衛五帝司迎萬神朝禮名書上清功滿得就飛升上清右呪念三通引火三口咽之又呪曰金液鍊形與道合真開明三景是謂天根無幽無極無始無終元皇九醜靈魂絳宫紫雲飛天身乘六龍水上火下流入三宫神歸陽明大道自通右呪三遍咽液三過良久項生圓象光映十方無上玄元太上道君當出臣身中三氣正神司命司録司功司殺君桃康精延二君臣今內錬真元光映九天豁蕩陽精洞映九門即使死魂受錬返胎更生若自錬只攺日形神俱妙與道合真引火氣九咽凡書符並先行之久久神光自現書符式法曰凡書符設香几望天門陳合用法器於前存朱硯水盂為日月紙為金版筆為青龍香烟為白雲符吏在其上符法中官將童女並分列左右訖手結斗印存五斗纒身步豁落斗搯上帝訣存身入三台北斗中雙手剔斗端簡三拜上香叩齒跪奏曰具位臣姓某焚香奏啓太上無極大道金闕七寶至尊東極慈父尋聲赴感太乙救苦天尊十方救苦天尊九幽拔罪天尊九天生神上帝三十二天帝君五方五老帝君日宫月府二曜帝君南斗六司陶魂星君北斗七元鑄𩲸星君三元三品三官大帝靈寶啓教五師真君天真星人妙行真人南昌上下宫主錬真宰三籙院臣所受諸法籙中真宰伏望道慈俯垂洞鑑臣螻蟻賤品草芥微生夙有善緣叨行大教深期濟物覬立微功既奉來詞豈容抑絶臣今奏為齊主某投詞入意今則崇嚴靖室恭依靈寶齊法書篆應干待籙誥劵以俟至期按格施用伏念臣凡愚腥穢罔造玄元仰乞天恩俯垂矜憫特賜大道妙光十方正氣流注臣身心豪竅之中朱墨器用之內使結節解釋胎根肅清存念感通真光發越一筆一竅合道合真凡有施行克彰嘉應俾𢍆上玄之妙臣全濟度之功臣干冒天威無任激切俟命之至謹言祝畢存太上在天寶臺中真仙森列帝命侍真頒降符篆下降又見十方天尊放大光明浮空下臨童女捧寶匣在百寶光中赴兆案前啓匣宣付與所篆者合而為一光明奪目變身作青玄左右二真人童女侍衛方入室東向叩齒三十二通上聞三十二天心拜三十二過閉目靜思身坐青黃白三色雲氣中內外蓊冥有青龍白虎朱雀玄武羅列四圍日月洞煥室內項上生九色圓象光映十方次祝曰無上玄元太上道君召出臣身中三五功曹左右官使者侍香玉童傳言玉女五帝直符直日香宫各三十二人關啓所言今日吉慶奉為某崇建大齊追度某書篆符籙拔濟幽魂願所啓上徹徑御無上三十二天元始上帝至尊几前次引氣三十二過入座書符敕筆呪溟涬大梵寥廓無光赤明開圖運度自然元始安鎮敷落五篇赤書玉字八威龍文保制劫運使天長存急急如元始無量度人律令右法玉清訣天門氣一口又東南氣一口旺氣一口念合明天帝日卓筆三下敕墨呪玉音攝氣靈風聚煙紫虛鬱秀輔翼萬仙千和萬合自然成真急急如元始無量度人律令磨墨呪梵氣彌羅萬範開張元綱流演三十二天輪轉無色周回十方旋斗歷箕回度五常三十五分總氣上元八景𡨋合氣入玄玄急急如元始無量度人律令右法搯子丑順至亥入中指根丑上為訣玉清大呪三十二天三十二帝諸天隱諱諸天隱名天中空洞自然靈章諸天隱韻天中之音天中之尊天中之神天中大魔天中之靈九和十合變化上清無量之奧深不可詳敷落神真普度天人今日欣慶受度歷關諸天請滅三惡斬絶地根飛度五戶名列太玄魔王監舉無拘天門東斗主算西斗記名北斗落死南斗上生中斗大魁總監衆靈青帝護魂白帝侍魄赤帝養氣墨帝通血黃帝中主萬神無越青天魔王巴元醜伯赤天魔王負天擔石白天魔王反山六目黑天魔王監醜朗馥黃天魔王橫天擔力五帝大魔萬神之宗飛行鼓從總領鬼兵麾幢鼓節遊觀太空自號赫奕諸天齊功上天度人嚴攝北酆神功受命普掃不祥八威吐毒猛馬四張天丁前驅大帥仗旙擲火萬里流鈴八衝敢有干試拒遏上真金鉞前戮巨天後刑屠割鬼爽風火無停千千截首萬萬剪形魔無干犯鬼無妖精三官北酆明檢鬼營不得容隱金馬驛程普告無窮萬神咸聽三界五帝列言上清右法西北氣諸符並用敕之受鍊押字呪疾除罪簿落滅惡根不得拘留逼合鬼羣元始符命時刻升仙度魂敕印呪億曽萬祖幽魂苦爽皆即受度上升朱宫大凡書簡用隱語封簡用敷落神真四句度簡用黃籙白簡削死上生諸符總祝遣呪普苦三界無極神鄉泉曲之府北都羅酆三官九署十二河源上解祖考億劫種親疾除罪簿落滅惡根不得拘留逼合鬼羣元始符命時刻升遷北都寒池部衛形魂制魔保舉度品南宫死魂受錬仙化成人生身受度劫劫長存隨劫輪轉與天齊年永度三途五苦八難超凌三界逍遙上清右法並玉清訣東氣書符畢再啓奏具位臣某焚香重誠奏啓太上無極大道金闕七寶至尊聖位前伏望道慈俯垂洞鑑臣聞大道宣慈開八門而救苦至真演教闡三籙以度人凡啓薦修必蒙極拔臣上來恭依齊法書篆太上諸真符籙臣雖已按法行持尚慮存念差錯呪訣舛訛或假手於他人筆畫漏誤或未明於至理不合玄規再乞天恩下濟真氣流通灌注所篆符籙之中使遺缺𥙷足璀璨飛揚皆成功德之光洞𢍆上玄之妙隨臣頒告無不遵行開泰沉魂悉離苦趣上明好生之德下符度死之誠臣干冒天威下情無任之至謹言三拜收符藏匣中諸香章師曰凡齊修之事憑香達誠固當以捻香為首每一上香並有一符主之總一十五符今具如左道德香符上帝訣天門氣道德竒香遍滿法界徹達三境事誠通感長生度世與道通真急急如元始上帝敕超三界香符香超三界遍滿虛空徑達御前浮結供養所禱應誠上奏玉清急急如律令尋聲救苦香符東氣太一救苦尋聲拔度三宫九夜普願生天右符一㸃一畫並念太乙號祝之用黃紙七寸闊三寸六分書之搯太一救苦印大指壓中指搯坤豎四指直二五指普度亡魂香符普度印存青玄大道慈悲尋聲赴感一切亡魂隨香普度開徹九幽飛騰太空不可思議功德無量度人香符上帝訣東氣中有度人不死之神中有南極長生之君中有度世司馬大神中有好生韓君丈人中有南上司命司録延夀益算度厄尊神回骸起死無量度人急急如上帝律令破九幽獄香符九幽印大指恰子曲三指押豎四指直二五指金光玉煙燌燌帝前符命疾傳通逹九幽幽關諸部悉開罪魂𡨚仇和釋徑上南宫急急如律令召魂赴壇香符玉訣東氣元始真文呼召靈魂速赴吾壇領無上道沐浴香符辰戌文北氣呪曰玉泉瓊煙鍊浴飛升快樂自在立時玄明急急如上帝律令變衣香符玉清訣東氣百色之衣流光飛霞服之飛升上步玄空飛游太極領鬼受衣急急如元始上帝敕呪施法食香符五嶽印東氣食滿十方通關百飽食之無盡飛升玉都急急如律令領魂受經香符中氣呪曰金口所宣玉文所司三界九幽悉皆罷對超度亡魂時刻升天急急如上帝律令傳符告簡香符上帝訣東氣元始符命普度亡魂金龍驛傳不得留停急急如律令授戒香符𩵄䰢魓𩳐魁𩲃魒星神歸后土戒定逍遙無忘九戒定慧超升急急如上帝律令錬度生天香符上帝訣東氣洞慈洞明濯鍊九尸徑度玄天逍遙自然急如律令普度法橋香符普度印北氣大橋大度法橋普度急召急升步虛玄靈急急如律令罡步章師曰凡步一罡內有一將主之須先焚香以黃紙朱書靈寶召役十四罡符凡遇行事隨事步罡畢焚於爐中其官將立至此是元始祖氣結成自然之章降付學仙之士祕而行之靈寶召役十四罡符總呪唵俱魯祇拘帝嗚𠰢俱嚧羯波爍言帝訶摩吽攝召十方飛天神王罡符先左足單步丁立召錬度司官吏罡符左右手恰三塗五苦訣自震起入中中止召靈寶君吏罡符召黃籙院官吏罡符召三界魔王罡符雙手恰中指三節自坎起交步至未主召五帝罡符雙手恰金木訣自東步至西立召八方威神罡符雙手八卦訣自坤步至乾立回尸起死罡符雙手自四指中過中中至二指中挑自北步至南立伏御地祇罡符雙手恰中甲挑甲出自子涉至南再返身入中立羣魔束形罡符雙手子至午挑自震步至乾立鬼精滅爽罡符雙手子亥至申寅挑自坎步起至巳立束縳魔靈罡符雙手寅申巳亥挑自坎步至未立普掃不祥罡符雙手二指恰大指二節挑自酉步至震上旋斗歷箕罡符摩轉隂陽斗自地戶單步回身入天闕共二十一步入中官發奏章師曰凡建大齊全憑文檄先則預告次則催申扣期則正奏諸天帝尊關盟三界神司遍逹情悃當以符召役功曹神吏使稟命宣傳期於通感也召三界萬靈符四方拱極刀利尊天玉帝臨御日月光全玉清詔命玉璽急宣太上治職詔告鬼神莫敢遲延萬神萬鬼符到擎拳敕呪唵吽咈囉吽咈囉俱利吒娑訶玉清始青玉符告盟總御三界統攝萬靈符到速追符到速行女青詔書如玉帝親行上元中元下元三元之精天魔地妖水怪山精敢有不順拒逆張鱗萬神稽首不得留停符召某神速隨符來玉帝有敕仰行萬程玉帝敕書守待施行急急准玉清詔書律令敕攝玉清寶璽敕付仙卿秉符持節召集天星三界齊到萬神同欽天真上帝梵氣流晶金光四集曷敢不臨違符逆命上有憲刑速依玉清元始上帝本章律令遣呪玉清訣天門氣玉皇敕命急召萬靈上窮天界下徹寒扄應時感召速詣玉庭一切靈府不得留停急急如律令告文式靈寶大法司太上降真召靈符命召攝萬靈書符於此玉清始青至急急如元始召萬靈敕攝太歲某年某月某日某時告下法位姓某承誥奉行封皮式太上符命召攝萬靈具位姓某謹封右符以黃紙朱書告文墨書外作可漏取自己混元氣行持召役內有二將主之二將名元始上帝招真召靈大夫武卿崔文子發放三界功曹所金闕上佐史圭璋二將並上清冠真人法服手執玉圭召二將呪九天有命上告玉清促召千真俱㑹帝庭太一下觀雙皇翊形監察萬邪理氣攝生若有不祥干試神明青帝之道整飭神兵七神秉越天蓬右征神劒前驅煥擲火鈴檄命甲騶武卒天丁風火齊戰伐邪絞精上威六天下攝萬靈既威既攝萬凶滅形神戈電掃妖奸無生仙皇秉節有命敢停拒節違令是誅汝形各警各慎保爾黃寧九天誥命萬神敬聽謹召某神聽吾指陳敢違吾令如違上清急急如元始敕萬神律令攝右法存天門開黃雲匝繞二真人在雲中手執玉圭上有金匣下來吸入符中次以右手焚符吹于左上界直符使者符亥文天門氣三清三境天帝金闕斗府星宫年直月直功曹使者日直時直功曹使者急急奉行上界直符使者焦公奴驛龍騎吏星奔火衝九陽灝氣擊散魔王反掌應命上逹琳宫中界直符使者符巳文北氣太山五嶽仙官洞府龍王宫穴后土地祇里域正神即行萬程疾速通傳中界直符使者鄭元喜翻山撼地直符神兵檄傳地府告命不停玉符所告地祇送迎下界直符使者符申文斗氣海江河湖淮濟扶桑水界天柱泉源潭洞出入自在不棏遲延下界直符使者張宗伯帝靈敕命速下壬癸奔電迅霆神威赴水承領符命火急無止召四直功曹符年直飛天擲火將李煥月直震天將郭炬日直力符驅行將趙濛時直飛天炎𤔵將張炳四符篆祝呪玉皇訣午氣炎帝火令炎君禀令急降力士李煥郭炬趙濛張炳急急如南極帝君律令右四直乃南極將吏召辰直功曹符玉訣天門氣飛雲馭駕道徹九霄出入二景傳命隂真九天敕下火急風奔草劒待來勿違令旨急急如律令飛天走地甲子之神威明正直劒刃隨身降臨正氣為吾法靈急急如律令今日今時功曹聞吾急召身騰紫雲驟馬疾到恭禀符命輔佐大道持章飛奏取速回報時刻莫停雷司猛操急急奉上帝敕召日直功曹符本日訣天門氣神霄令下韓君降臨日遊神吏牧擒四野疾應十方上通玉闕下及仙宫部領丁甲統攝四靈執符奏命面現玉宸急急如律令陽晶飛耀景輝神庭隨氣一召上徹丹霞召遣呪玄曹玉文立功之官主治玉清奏報三天上帝敕命速下神光謹召某日功曹依律奉行召功曹主吏符寅文正氣髙上玉清大洞靈章宣召功曹徑赴玄壇萬神敬聽與道宣揚事畢復位立彰玄皇玉府召直符符辰文巽氣氣分左右日辰承命萬法宣布承符所部召六甲神將符丙文甲大將隨氣宣行玉符宣召徑赴玄壇召六丁玉女符未文九天召命六丁奉行玉女承化速降帝庭急急如律令度火符午文南氣符使升真速降威靈擲火萬里使我通神天火地火五雷真火燒殺一切無道斷絶公文之神火急奉行升霞散真五雷備明前行明道掃蕩除氛急急如上帝敕發放符辰文南氣無上三天三無下降玄元始正神真氣徑御罡風驅却邪魔敢有逆者送下北都疾疾奉行天洞天真速降威靈急急如律令焚符呪上帝訣天門氣乾坤定位二儀合形左使李昻撥開天門右使吳昉逹道通真金門玉閣與吾取奔微塵界內方圓逹名照我心膽㑹我精靈赤子上升萬神咸聽急急如上帝律令擲火萬里符存南方火鈴大將擁萬丈真火降取氣入符中三清道㫖敕下玄司南方火將禀令而行驅使罡風速逹天門敢有違逆送下風刀考滅真身驅使罡風符太上合真三真合真天樞正敕驅使萬邪各皆拱手如有遏截永墮酆都急准如令罡風驅魔符午文火氣三台呪吾奉太上敕令魑𩲕𩲓魁𩲃𩵄䰢魓𩳐魒太陽帝君太隂皇君滅鬼除魔敢有不順上帝敕下風火不停急急疾疾流金火鈴大將速現真形九天雲路正一功曹速現真形驅逐妖魔風火不停右符凡發文字多有邪魔遏截須先焚此符次化文字行持存罡風處有符使擁萬丈真火爍破罡風萬邪不敢干犯即得上逹矣火鈴度道符南斗六司星君下降真火火鈴將軍降三昧真火南方閼伯君太陽帝君火謹請南方太陽火君二請南方火惠君三請西方火山神四請北方大火輪燒鬼身不存右符凡發文多有邪魔怕懼刑法恐法師具奏即計㑹沉匿不令上逹或人家不祥觸汚文字難以上御當用此符護送徑過天門有萬丈真火燒空也驅使罡風呪火鈴火鈴助吾威靈神水一噀母輒容情發奏火鈴符火鈴炎熾變化八方萬神侍衛永斷不祥急急如律令開天符又曰透天門符上帝訣天門氣天洞天真速降威靈上通天門開道無窮三部使者玉女靈童隂陽決吏持火當胸衝除浩氣大破罡風玉皇有命敕下罡風萬仞摧毁九天潜通承符奉令黃道無窮急急如上帝敕天門四明黃道正平承符奉令敢有稽停符中從吏速逞威靈罡風浩氣金馬驛程急急如上帝敕符誥式泰玄都省謹發開天符命使者火龍驛吏正一功曹流金火鈴大將賫持奏文或表詞章速令上御所過罡風等處不許妄有遏截即使攝赴天獄治罪以明玄憲施行書前符於此黃中䇿氣馘滅邪踪罡風九醜浩氣群凶開天符命九天徑衝儻遏詞奏速送羅酆流金火鈴照徹黃中龍火騎吏執奏雲宫普天同慶萬劫無終一如告命風火驛傳太歲年月日時告下法位姓某承誥奉行祖師三天大法師正一靜應真君封皮式太上開天符命具位姓某謹封右符黃紙朱書外作封套隨奏焚之又一式連書四符於中後用告文太上開天符透天關符只前面開天符開天門符度罡風符告文式右請符中通真使者同承受玉女玉童上奏靈官功曹符吏即今齎捧奏文章表詞徑詣三天所過三界罡風灝氣之中六天外魔無道等神不得遏截仰正一功曹流金火鈴大將攝赴天獄依律治罪施行檢並同前式若用前面者則不用此告文不然併以四符書在前面亦可酌量行之祝遣呪訣同前上清靈寶大法卷之三十九
