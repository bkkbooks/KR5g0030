門丞户尉十二禁忌五道六神及内外香火干係等神同監壇官將境域廟貌一切神祇上体齋功各相率勵恐有棺留伏尸飲食男女精魅潜伏葷腥徃來塵凡鬱結種種氛穢先與掃蕩肅清祗伺光駕應齋饌斛食法用儀物常行守護不得縱令鷄犬猫䑕暗有侵汚及非心之人偷竊破壞其故犯之者檢舉關聞監臨官將明行顯罰以戒將來若夫火燭及應干不料之虞常常廵警並合預期驅遣中間恐措置未辨事件更仗隂與維持使無障礙凡登齋朝奏元藉傳香逹懇通感上玄所有諸處發到亡䰟孤爽須是彈壓整肅毋容撓亂次第引至祗領薦修遇有咨聞即仰依時承受庶得始終條理幽顯同資旌賞有儀尚容録奏等希遵奉勿戾憲章須至劄者右劄下齋官某家司命土地等神准此年月日劄發公牒符使關靈寳大法司當司今發公牒通落去處開具下項一公牒各一道摺角封印全詣天下都大城隍主者某州城隍主者某縣城隍主者當境某廟某侯王近逺郷井諸祠廟正神當處土地里域正神九州社令主者十方道都大主者五方五道大神冥關幽路主者東嶽蒿里相公十方境界水陸神祇某州某處沿路祠廟水陸關津神祇泰山沿路土地五道五傷三十六傷神司某宫觀土地里域眞官内外香火正神證察某處土地里域眞官守願證察神祇某山墳所土地一切山靈神虎何喬二大聖攝召官將某靖諸司院府天神將吏靈寳大法水火二司煉度官將上清黄籙院十方飛天使者七道功曹持赦大將軍聚䰟府功曹神將天醫院執職官衆靈寳玄局主生産功曹將吏察命童子護戒威神直年太嵗之神無極神郷主者北都羅酆主者泉曲之府主者三元九府掌生死罪録考官東嶽七十五司泰玄眞一本際童子九幽地獄都司主者酆都三十六獄主者酆都三元二十四地獄主者酆都大鐵圍山有間無間地獄主者酆都内外宫洞諸獄主者五嶽地獄主者三塗五苦主者血湖内外諸大地獄主者硤石地獄主者凈波大神東嶽掌亡人案四嶽掌亡人案東嶽掌孤䰟案東嶽掌𡨚仇案東嶽掌呪咀案東嶽掌亡人功德案東嶽掌托生案六道都府案酆都變生府善惡二部判官童子轉輪六道大將軍分配四生使者酆都掌亡人案地府十宫掌亡人案水府掌亡人案水府掌孤䰟案十二河源主者南嶽掌飛禽案酆都上下六宫大魔王酆都地府察吏酆都司命司録諸君太玄夜光玉女溟泠大神六甲開導使者巳上公文逐一通放須至關者右關年直功曹使者月直功曹使者日直功曹使者時直功曹使者上界直符使者中界直符使者下界直符使者等神仰照數交管前去分路徑詣各處眞司分明投放沿途勿滯立伺昭報故關年月日關上清靈寳大法卷之六十四
