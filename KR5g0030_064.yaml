front:
  text: 上清靈寳大法卷之六十四禽四
  hash: sha256:e5e75682d5e3e4654e06f7dd332b107ee4031254b2a8d3b70bee1b0de6bba810
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5g0030_HFL_064-001a, image: hfl/0962/0962-004.png}
body:
  text: 洞微髙士開光救苦眞人𡩋全眞授上清三洞弟子靈寳領教嗣師王契眞纂齋法章奏門正牒都大城隍靈寳大法司牒上天下都大城隍主者當司昨據入意至生方事當司據詞難抑巳於某月某日飛奏天廷預祈赦宥併牒報貴司依應施行今依科格建立玄壇次第進表上章請符頒赦朝眞懴謝破獄召䰟普施夜齋奉行冶煉給籙分劵保舉超昇事畢拜表言功解壇滿散至某日夜祗設清醮三百六十分位仰答洪恩除具奏天廷申牒眞司外須至再行專牒者牒候到請詳事理疾速指揮祠下當行曹案再移文行下諸路郡縣城隍祠廟應干去處及九州社令知委遵依敕㫖放遣合㑹受度男女亡䰟及六道孤爽前來齋所應召赴壇承恩超度言功遷賞用報勲勞科禁有嚴幸勿慢易謹牒年月日牒牒州城隍靈寳大法司牒上某州城隍主者當司昨據同都城隍牒至甲牒眞司外須至專牒者牒候到請檢照先牒事理疾速移文關報管下諸縣城隍及應係廟食正神互相知委開關啓路放令亡過某等䰟及六道四生諸處發到孤䰟苦爽關報沿路水陸關津不得阻遏即行護送前來伺候召攝次第入壇躬受開度至期仍請部集神兵親臨駐劄馘魔掃穢止惡防非衛護壇場祗迎帝駕更望轉聞本境潭洞主行風雨去處凡建齋以後其界分合行風雨權令倚閣庻得三景開明人天慶㑹言功旌賞圖報神休青律有嚴即請依應奉行謹牒年月日牒牒縣城隍靈寳大法司牒上某縣城隍主者當司昨據同都城隍牒至申牒眞司外須至專牒者牒候到請檢照巳牒事理移文關報管内係祀典正神應干去處互相知委疾速開啓關津釋放亡過某等䰟毋論𡨚對拘留邪黨固執盡行根刷前來壇下祗候召攝祗受齋功其九州十道發到孤䰟苦爽並仰攅𩔖津發團聚一所常切鈴束務令齊集切待本壇普召悉到法筵同承開度受煉更生至期專整聖威部轄神兵赴壇駐劄監臨紏察普掃不祥懲惡禦凶明彰典憲自建齋以後所有社令合行風雨權令停止俾遂開晴祗伺帝眞鑒觀齋事奏勲遷賞當效報酬牒至請遵玄律速爲施行謹牒年月日牒牒别州縣城隍靈寳大法司牒上某州縣城隍主者當司今據同都城隍牒至申牒眞司外須至專牒者牒候到請詳事理移文管内神祠去處知委其本壇受度亡䰟中間或係部封咸准赦恩釋放仍關報沿路水陸關津次第護送前來躬承開度應諸處孤爽俾遣到壇共沐齋功克期昇化牒至遵玄科玉律奉行謹牒年月日牒牒當境諸廟靈寳大法司牒上當境某廟某侯王當司今據同都城隍牒至申牒眞司外須至專牒者牒候到請詳事理疾速關報本境土地合干神司開通道路部衛亡過某等䰟前來伺候召攝祗受齋功所有諸處發到孤䰟滯𩲸囚徒苦爽分作隊伍攅聚一所切待普召次第遣至同承開度務要常加管束毋令妄起邪心恣生紊亂或恐𡨚讎相遇各與和諭俾悔前非其所化冥衣及散壇之夕焚燎經財公平分俵須令周遍受煉事畢指示託生仍委神威部帶精兵守護壇禁驅遣伏尸厭穢斥逐葷酒不仁火盜不祥例與禁戢仍不得縱容飛禽之𩔖巢宿㕔堂之上雞天猫䑕侵汚法用儀物常當覺察謹於未然若有干犯者明正典刑庶使内外肅嚴帝眞降格功圓果滿如律褒陞牒至火急依應施行不諸違滯謹牒年月日牒牒近逺郷井諸祠廟正神靈寳大法司牒上近逺郷井諸祠廟正神當司今據入意同都隍牒至申牒眞司外須至專牒者牒候到請詳事理火急互相關報知委上遵敕㫖以時開關啓道部衛亡過某等䰟赴壇受度其諸處發到孤䰟苦爽仰沿途護送前來攅聚地分待候普召同領齋功牒至准令奉行謹牒年月日牒牒當處土地靈寳大法司牒上當處土地里域正神當司今據同都城隍牒至申牒眞司外須至專牒者牒候到請關集本處五道干係等神接引亡過某等䰟赴壇受度其諸處發到孤爽並與分𩔖團聚一所聽候召攝次第遣至同領薦修切恐𡨚結未分非心撓亂請多方善誘開釋邪迷免致沉滯將來所化冥衣經財之𩔖併希攝化分俵惟均毋容强弱相凌以敗善果仍望同本司官吏在壇受事凡登齋朝奏發放公文並仰傳香逹誠宣勞效職更須掃蕩妖氛檢察庶務貴使威儀整肅帝鑒溥臨竣事奏功用酬神貺女青有律毋輙故違謹牒年月日牒牒九州社令九道靈寳大法司牒上冀州社令主者當司今據同都城隍牒至申牒眞司外須至專牒者牒候到請詳備去事理行下本州分野所管郡縣合屬幽隂去處上遵敕㫖根刷合㑹係薦亡䰟不以罪報拘留並請發放前來祗受開度其分野合度應干孤爽毋問新久近逺各以𩔖集津遣到壇伺候召攝同領齋修盟眞禁重速爲施行謹牒年月日牒兖州社令主者青州社令主者徐州社令主者梁州社令主者楊州社令主者荆州社令主者豫州社令主者雍州社令主者右八牒並同上文牒十方道靈寳大法司牒上東方道都大主者當司今據同都城隍牒至申牒眞司外須至專牒者牒候到請詳事理行下管内諸道應干神司咸准敕命根刷合㑹該度亡䰟或有𡨚愆執對未得釋放者並脫拘日併括責諸處沉滯孤䰟罪爽交付承行官將同泰山神吏仍傳報沿路水陸關津凡所經由仰速與護送前來祗領齋修各諧昇度請毋違滯即爲奉行謹牒年月日牒南方道都大主者西方道都大主者北方道都大主者東北方道都大主者東南方道都大主者西南方道都大主者西北方道都大主者上方道都大主者下方道都大主者右九牒並同上文牒五道大神靈寳大法司牒上東方飛道大神當司今據同都城隍牒至申牒眞司外須至專牒者牒候到請詳事理關報本方諸道土地界分冥司隂獄應干經由水陸橋梁關津等處咸乗太上慧光燭破昏冥開通道路引導合㑹係薦亡䰟併六道孤爽盡詣齋所聽候召攝祗領薦修或有猖獗强梁邪道阻遏仰攝付近獄依律治罪牒至准令火急奉行謹牒年月日牒南方横道大神西方直道大神北方遏道大神中央都道大神右五牒並同上文牒冥關幽路主者靈寳大法司牒上冥關幽路主者當司今據同都城隍牒至申牒眞司外須至專牒者牒候到請關報冥關諸路水陸橋梁津渡應干去處咸遵敕㫖乗太上慧光燭破幽暗㧞度所薦亡䰟及五道幽䰟苦爽疾速開通冥路逐界傳逓發放前來赴壇承功超化凡沿路經由所至不請稽留恐妨齋事牒至准玄科律令奉行謹牒年月曰牒牒蒿里相公靈寳大法司牒上東嶽蒿里相公十方境界水陸關津神祇當司今據同都城隍牒至申牒眞司外須至專牒者牒請照應疾速遍告十方幽隂界分水陸橋梁津渡干係去處咸仗恩光開闢道路引導所薦亡䰟及幽䰟苦爽來詣玄壇躬承開度牒至毋得稽阻依時放行科律至嚴幸勿住滯謹牒年月曰牒牒某州某處沿路祠廟靈寳大法司牒某州其處沿路祠廟水陸關津神祇當司今據同都城隍牒至申牒眞司外須至專牒者牒候到請詳事理互相關報沿途去處遵承敕㫖啓道開關凡所薦亡過某及應干係薦亡䰟六道幽爽經由界分去處即與傳遞護送承流交付至本處管内引領到壇承功超化冀無邀阻速爲施行謹牒年月日牒牒泰山沿路土地靈寳大法司牒泰山沿路土地當司今據同都城隍牒至申牒眞司外須至專牒者牒請照應火急遞相關報上遵帝㫖啓道開關有路即通有津即渡引導亡爽部衛幽䰟有𡨚對不得拘留經過界分毋容阻滯依時發放前來祗領追修各詣超度不請稽緩速爲施行謹牒年月日牒牒五道五傷靈寳大法司牒五道五傷三十六傷神司當司今據同都城隍牒至申牒眞司外須至專牒者牒請詳備去事理遵承敕㫖括責在㑹係薦男女亡䰟并九州孤爽不問死於非命䘮於天年凡𨽻拘録者例行釋放其間或𡨚債相仍因報仇讎積累未解展轉沉迷並仰隨事和釋永斷執連發遣前來躬承開度咸得受生謹牒年月日牒牒土地里域眞官靈寳大法司牒上某宫觀土地里域眞官内外香火正神當司今據同都城隍牒至申牒眞司外須至專牒者牒請照應疾速關報本境干係等神咸遵敕命整肅威儀掃蕩妖氛肅清内外驅除禽畜徃來觸汚之𩔖斥逐火盜非横不測之端禁戢葷酒猖狂之徒殄絶口舌是非之撓召迎佳氣延格帝眞導𩲸提䰟傳香逹懇盡消魔障克就齋功進爵褒崇敢忘效信請准玄律速爲奉行故牒年月日牒牒監齋聖者厨司等神靈寳大法司牒上監齋聖者厨司等神當司今據入意同前須至專牒者牒到仰体齋功無量照應今來見就本所置厨營造諸天妙供大獻斛食專望㑹集當處合干神明同共監䕶常加檢察驅除蟲䑕侵汚之患警罰非義偷竊之人殄滅火盗不料之虞禁止葷酒徃來之犯並請嚴施號合懲戒不仁庶使精潔豐臻天人鑒享齋修圓備遷賞效酬牒至速希依應施行謹牒年月日牒牒證察某處土地里域眞官靈寳大法司牒上證察某處土地里域眞官當司今據入意同前須至專牒者牒請垂神拯濟應念來臨願資樾䕃之敷共闡瑶壇之教分靈恊賛隨事作成俾功果之周圓庶幽明之倶利仰希眞造曲副懇誠謹牒年月日牒牒守願證察神祇靈寳大法司牒上守願證察神祇當司今據入意同前須至專牒者牒請詳備去事理疾速關報當時受願所屬掌管去處上遵敕㫖仰体齋功檢詳啓諾之因依勾抺巳償之條目免貽逋欠俾遂圓成願集眞功總資亡者獲超昇之有自皆休德之所覃故此告聞敢祈依應謹牒年月日牒牒某山墳所土地靈寳大法司牒上某山墳所土地一切山靈當司今據入意同前須至專牒者牒請詳事理關告本山禁忌百神蒿里丈人土下二千石官等衆各安厥位潜護其靈奠馬鬛之新阡形藏於地拱龍神之外從䰟歸于天願時發於幽光俾永昌於後裔敢希遵奉無有稽違故牒年月日牒牒神虎靈寳大法司當司今據入意同前須至專牒者右牒請神虎何喬二大聖七眞玉女三部追䰟使者等神遵承救㫖廣運神通再部追䰟吏兵遍詣三界十方天牢地獄有間無間去處根刷合該度男女亡䰟子細檢照郷井姓名其或罪業深重邪黨拘執未得出離者並與研窮追攝前來壇下伺候攝召隨旛現形皆得受度無邉苦爽併行括責如期普集法筵同領齋功俱承煉化度人功大風火不停疾速奉行毋致違戾謹牒年月日牒牒攝召官將靈寳大法司當司今據八意同前須至專牒者右牒請某將上遵帝敕再隨從神虎吏兵遍詣合屬冥曹幽獄去處根括合㑹衆䰟或恐罪重𡨚深尚淪報對沉迷邪道未測蹤由逐一檢照姓名盡行追攝前來以伺召請勒令附旛顯現躬受薦修法令昭然不請違滯奏功旌賞用答神休牒至火急奉行謹牒年月曰牒牒神虎不審奏用靈寳大法司當司今據入意同前須至專牒者右牒請某將禀奉敕命部帶追䰟吏兵齎持太一玄冥混元玉札俓詣三界十方冥曹幽獄主罪主考主録去處根㝷亡過某及該度男女亡䰟見今被因何所不論有無𡨚業巳未報對照甲狀備去姓名逐一追取親䰟正𩲸疾速管押前來聽候召攝即令隨旛顯現形儀赴壇朝叅祗承妙果副齊官之願見昭神化之有靈惟仗奔馳火急回報有功之曰列言上清牒至准令奉行謹牒年月日牒牒監壇靈寳太法司牒上監壇某將當司今據入意同前須至專牒者牒請部轄將兵駐劄齋所同本屬城隍廟貌等神法部官將併力作福作威馘除非道妖魔之精掃蕩伏尸氛穢之氣或有婦人血厭葷酒惡氣輒犯壇場須明典憲屏逐猫犬徃來之汚驅遣禽鳥喧噪之聲使内外肅清眞靈降格火盗非横常當禁戢局務措置惟籍匡持仍請彈壓孤䰟各安其分㗸𡨚者與之和諭負命者與之解除俾釋邪迷免相干執冥衣斛