front:
  text: 上清靈寳大法卷之四十三圖一
  hash: sha256:bbf331c39fc4fe41f01d3c40cba5657e5f60f96715bf61cda7446c928b16715f
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5g0030_HFL_043-001a, image: hfl/0955/0955-004.png}
body:
  text: 洞微髙士開光救苦眞人𡩋全眞授上清三洞弟子靈寳領教嗣師王契眞纂齋法符篆門授戒章師曰按金籙度命經亡過之人須當受持九眞妙戒長生救苦眞符即得名標金格字列玉清是故召神有符使其覆護德難可勝矣戒光復性符召察命童子符呪曰察命童子監察身形勿生執見滅妄除淫神清氣爽不入幽𡨋急急如元始符命律令召護戒威神符呪曰護戒威神監身受生符命元誓勿泄勿輕祕受通仙泄慢祖迍急急如律令召五帝直符符呪曰五帝直符内外通靈違誓者考順誓者生明注陽籍落滅惡根元始符命急急奉行召六宫掾吏符呪曰六宫之炁普度生身受化之日不經幽庭落滅罪業自有光明急急如上帝律令大獻章師曰大抵濟度不廣豈得謂之大齋故齋法惟在普度無間幽魂施河沙鬼衆大獻斛食全憑符命變錬之功是謂無量度人之大也開通五路符符用黄纸朱書告文墨書中文東炁告文右符告下十方三界五嶽四瀆九州東夷南蠻西戎北狄中華境土五方諸道水陸關津黄泉蒿里丈人天門庭長阡陌道路主者冥關幽路主執神祇咸遵符命疾速開通五路釋放亡過某人及六道四生幽冥魂爽徑離隂暗得覩光明齊赴玄壇獲霑睿澤乘兹妙果上生天堂一如告命玉清天皇寳誥符告用法如前篆祝呪玉清大梵輝耀三塗提擕六道雲章寳笈紫鳯丹書急急如元始上帝命告文元始符命普告十天三官九府五嶽五川河伯水府九幽無邊超度六道四生九州分野孤魂滯魄已化未化受苦綿綿今日大化天地長年元皇廣度大施福田生化普濟萬罪咸蠲今日受錬脫苦升遷天皇符命速照奉行升接隂魂與道自然霑享天廚甘露流川咸登錬化俱歩金蓮上朝玉闕一如告命太歳年月日時告下具法位臣姓某承誥奉行召六道四生符召孤魂符呪曰玉清靈符拔度孤魂茫茫酆都累累鐵城升度亡者上登朱陵唵嚕波攝玉旛符召六道輪廻符召四生輪廻符召天道符呪曰玉清梵炁普召天仙叅馭飛雲咸赴法筵急急如元始上帝敕元始攝召汝符命告十方咸聞法音㫖天道應福堂急急如律令召神道符呪曰玉清宣化上攝神明靈寳慈惠悉離幽庭急急如元始上帝敕成功利萬物利物應諸天金符攝召汝神通徧河源急急如律令召人倫道符呪曰玉清大化梵炁氤氲普徧接引攝召人倫急急如元始上帝敕三界法元主應物享無邊聞㑹上眞語人道俱成仙急急如律令召三善道赴筵呪玉清大獻廣布酥酡髙際九霄香環十極咸令濟化普度法食急急如元始上帝敕召地獄道符呪曰慧光洞徹幽塗煥明地獄悉開永離寒庭眷屬業道咸遂安寧急急如元始上帝敕符命應三界攝召神靈紛法音含妙藴地道開光明急急如律令召鬼道符呪曰慈愛普度慈悲生神餓鬼一衆咸享豐珍急急如元始上帝敕焦枯難度却晝夜分重輕元始告符命鬼道成仙形急急如律令召畜生道符呪曰元始大化普濟含靈畜生情𩔖來赴蘭房急急如元始上帝敕浩劫飄蕩蕩苦惱日夜縈黄華灌東井畜生獲清平急急如律令普攝三惡道赴筵呪玉清萬化解宣惡對善道成仙業道開通玉皇降命急召時升受霑供養上朝帝庭急急如元始上帝律令召亡魂符呪曰隂陽分部景炁潜敷所部亡魂符召幽魂同享甘澍華光徧布漑錬隂尸消化愆尤平歩昇天急急如元始上帝命捉魂訣分班攝召符拔度符召魂符捉魂符召溟涬大梵神王符此符已見經句符書門却無呪訣呪曰天皇交布四象吁員内有圓羅大梵彌羅日月煥明化鬼爽形左眼虚皇君右耳大羅尊鼻息轉輪道化甘澍普降眞王濟度幽冥穹旻攝化普度無窮身分五炁與道興隆細雨飛化宻霧廣布津生五内妙降三宫眞中有眞名曰溟涬四天門王八大神王玉皇降詔十極分耀流光下注大梵無邊敕耀八極降醴九泉沈魂飢渴甘露流川神慧潜滋玉皇普度青玄濟拔左營眞人分炁上昇玉字靈轝普濟沈綿百飽通虚溟涬生晶永絶飢虚食之無盡炁冠天廚玉清大有三寳金書死魂受度玄歩天衢急急如三寳上帝律令祝呪唵吒哩吒哩喰哩喰哩急急如律令告文右請溟涬大梵靈官一百二十人上請玉皇慈悲吉祥甘露飛行變化變錬五行造用斛食充滿十方廣大無礙光明灌漑香味豐盈餔飴今來合受度大地一切幽魂河沙鬼衆使枯腸頓實生意清新永絶飢虚咸登錬境萬神禀令奉行太歳年月日時告下具法位臣姓某承誥奉行封皮式玉清符命告下溟涬大梵靈官法位姓某謹封右符黄紙朱書告文墨書五方炁焚符變錬依法存用行持靈寳生天甘露法食呪太上法水變少成多粒食如山滴水成河孤魂滯魄永免沈痾乘兹道力托化娑婆悉爲衆生開法路十方上品度神人急宣符命六道趣即召亡靈赴几筵救苦天尊宣宻語甘露符呪曰浩浩渺渺太上靈泉潤枯育物流注自然神華玉液澄清太玄生魂育魄靈𣲖源源清泠保命猛火絶煙華池渺渺莫測其源急急如上帝律令洒甘露符大獻玉篆呪曰酆都夜壑忽以光輝照徹幽暗來飴香糜靈寳錬符百骸自飛得見妙㑹仙歧知歸急急如律令萬劫難遇功縁可崇開闢幽處全仗眞風梯航彼岸濟㑹無窮念念生因駕景飛空急急如律令焚符化食呪謹化甘露法食一斛爲十十爲百百爲千千爲萬各各普徧以少爲多以隘爲廣速化無遮廣大供養赫赫煌煌戴天地履隂陽含四炁合三光太一敕命増長急急如律令東北炁吹食中離怖畏符呪曰上帝敕命赦汝罪魂九幽罷對羅酆開昏萬鬼生滅黄華蕩形道合自然受錬更生急急如律令離寒庭符呪曰太上九光眞華之炁流光下照洞徹九幽上帝有敕普救幽魂幽牢苦爽速離寒庭急急如律令先變神爲青玄存東方青炁而下左右青玄童子青華玉女青衣朱履持破地獄符玉旌至頂上執筆念前呪書了祝呪當願亡魂衆永辤長夜苦寒庭摧刀劔光明普皆覩太一大慈尊哀憫長夜苦幽魂離寒庭法橋當大度右法玉清訣艮炁吹想幽魂出獄也破地獄符先存鬼戸天一北獄酆都羅山黄道開明次左手卯文太陽光明直四指垂手光照破地獄衆魂覩見光明變錬形質收手曲入掌胷想衆魂隨光皆到道塲左手搯寅文念酆都呪存山髙黒暗幽魂悲呌師運寳光燭破七祖九玄隨光悉到並乘香雲輿坐青蓮座乘光生天開業道符又生魂符育魂符靈芝無根三光法炁符浩晶生法氣三光八會流精符妙道生一炁二光降嬰符玄絶九炁中三光玉陽符玉陽正眞炁三光雲華符呪曰引炁鬱羅外九芒結雲華七神髙上道三景耀朱霞捧香服晨精功滿解世羅錬化塵劫盡億齡不爲多落籍三界庭結友太上家控景御玄斗八極何足賖急急如律令三光導仙符呪曰自然至眞道妙極玄華玄萬天朝玉陛九老參華軒三光有靈炁所度惟聖賢勤行道仙業燕御吞華根神形合三象渺渺歸本原皇烏翔于天飛舉不願還急急如律令三光九玄符呪曰迢迢三天上落落九玄臺眞童採芝集玉女持華回天賔挹仙家俯仰升瑶階天河處東井寳炁縈空來嚥納𠻳玉津此劫不復哀矯首三清路振衣何足哉急急如律令三光定光符呪曰至矣上眞道妙哉靈寳言吸景道玉皇嚥𠻳存華芒流晶灌百體皓晶凝雪霜洞達照關外塵滓都消亡豐肌不復老契此名定光爾宴大明舘斯爲不夜郷攝迹歸本根九轉凝空常急急如律令變斛符化食符呪曰天然眞味妙用無方食之無盡永作威光急急如五帝眞老律令隂陽炁助衞拘千靈變化多方普周法界急急如律令除熱惱符右符書時念玉皇大天尊變食符食食手手食食手手食食手手又右二符書時念靈書中篇太上九變食符中黄炁呪曰太上神光九變無方上朝大羅下及泉郷無窮法味甘露難量變化億千上朝玉房唵嗡囉哩長參陀他尼佗耶多伽㢮彌陀急急如律令變酒寳漿符呪曰冥冥長夜幽幽罪魂飲之還生速登上境急急如律令解𡨚章師曰凡人處世多因燥心害物或欠命負財積諸𡨚結以致隂訟牽連無由托化旣承天恩開度得領薦修但其間怨炁切齒因邂逅恐生紊亂當依齋法用符文隨事與之解釋使回心向道解結和𡨚庶可同登樂土矣和釋𡨚對符解𡨚符呪曰𡨚結解脫罪苦咸寧願早化生大慈廣敕急急如律令以神合形五行相并脫彼幽冥處此家庭領受符命遊宴玉京急急如律令解𡨚符上帝訣天門炁焚符水内洒呪曰大羅慈悲主消滅此𡨚尤㝷聲得救度飄飄神郷遊急急如律令瑶泉之水百全之清洒滌身光出穢變澄急急如律令解釋𡨚債符卯文比炁吹以劒劃地三星煌煌解赦𡨚憎七祖幽魂解𡨚和對敕命不停呪曰元始開化天尊齊軿青玄正機𡨚仇和釋急急如元始符命時刻和𡨚解𡨚釋結符幽精台光爽靈玉皇上帝唵吽吽衆魂稽首鬼魂歸正敢有拒逆化作微塵天寳君靈寳君神寳君太一中宫十方救苦天玉清上帝敕上清大普降眞尊帝敕太清大帝敕靈照耀亡魂救拔苦識蕩滌𡨚愆永不執對各各自然承禀符命隨果受生設有違逆萬劫不原永離寒庭急急奉行呪曰神符告下解𡨚釋結永脫仇讎執對分别釁縁俱盡不生惡業出離寒庭罪根消滅急急如律令解𡨚結眞符三清上帝三天法主太上解𡨚眞人慈風掃蕩萬業消除宿𡨚枉咎應念消釋呪曰汝等諸罪魂宿業深厚故常懷忿怒心念念無休息我今稽首無上尊願汝𡨚仇俱解釋急急如律令右符斗訣焚時存太一在頂上放五色光明洞照道塲乃是解釋也靈寳解𡨚釋結升度眞符右法用中篇祝之搯三指根以三指倒手中心黄紙朱書解𡨚符告文太上解𡨚結眞符符右奉太上敕命告下十方三界天牢地獄主者冥曹岱嶽酆都城隍社令無極神郷拔度亡過某及九州孤爽速爲解散𡨚讎和釋債主各生善念脫離幽關釁縁俱盡執對分别善念長存不生惡業萬神禀命母容滅裂善導前來聽兹戒說逍遥自然獲升帝闕一如告命太歳年月日時告下具法位臣姓某承誥奉行東極青玄上帝靈寳淨明解十傷符解殺傷符解自縊符解溺水符解中藥符解死胎符解伏連符解塜訟符解獄死符解邪妖拘執符解𡨚債符十傷符總告文太上解殺傷符符餘符並依次列于此右符告下酆都六洞内外夫宫三十六獄阿鼻地獄十二河源泉曲水獄大鐵圍山無間地獄長夜考校冥關等處萬神敬聽符命眞文普度幽爽滯魄沈魂疾除罪簿落滅惡根𡨚仇和釋債訟消平不得拘留逼合鬼羣承兹誥命上登朱陵一如告命太歳年月日時告下具法位臣姓某承誥奉行右十傷符出淨明法中自有二章梵音書符篆兹不再述黃紙朱書告文墨書先焚香啓奏太一慈尊玉帝訣五方炁總敕呪符命追攝神虎奉行𡨚仇執對和釋來臨明承天帝不敢留停長夜開泰悉覩光明符命到處急急現形急急如元始上帝命血湖赦符章師曰按靈寳玉籙謂大小鐵圍山赦亦能到惟硤石之獄其形皆黒旁有火𤔵下有血湖在大鐵圍山之南處東南一大石間上大下尖中開一縫罪人出入自有百藥毒汁灌其身心總名血湖獄專囚産死婦人億劫不覩光明獄中有百萬鬼卒晝夜考掠罪人曰飜體大神擲尸大神食心㗖腦鬼王等其中穢汚苦楚實可哀憫若有似此之魂宜以别法追度乃太上垂教專救産亡之苦者與他法不同惟在遵行其功莫測元皇敕赦泰玄都省恭奉敕命謹據入意仰血湖神儀速出幽關須至專行赦文者右奉上帝敕血湖女衆自昔劫以來至于今日或爲子刑之害乃生前不孝父母之因子母俱亡實係仇讎執對遞相纏結無由解釋恭惟元皇慈悲特爲原赦即使亡過某人及血湖鬼衆巍巍煥層虚梵羅屯碧霄元始九龍駕皇人按青軺靈光集萬眞珠景開陽寥出示靈寳篇福德由是招洞玄隱髙嚴玉音泛雲璈無量匪德思道海生波濤法義同涓流釋放血湖牢保守三田固錬質自飄颻咀嚼玉靈芝逍遥玉京遊血湖大神照赦奉行太歲年月日時告下具法位臣姓某承誥奉行天樞使相天機内相泰玄上相天樞上相靈寳三炁流光救苦眞符元始上帝虚皇天尊無極大道太上老君玄元始炁九天眞文鬱儀孕珠結璘含輝三光朗耀七元流珠恩覃泉曲澤及血湖胞源散結穢累蕩除慧光接引上升天衢祝呪靈寳玉籙救度眞符流光普照蕩滌穢軀天符告下俓上南都急急如元皇律令敕太一救苦天尊敕三十二天帝君敕十方無極神王敕隂陽正炁三炁流輝下映幽關血湖北獄覩見光明眞符在手來救血湖巳往𡨚債一錬消除急急如元皇律令右符后妃用玉簡簧袋命婦用梓木簡庶人婦用栢簡青袋制度如救苦符式告文靈寳符命流光救苦眞符符右符告下十方世界九幽地獄大小鐵圍有間無間地獄溟泠血湖北隂之府符光所燭摧破幽隂火山息𤔵寒池摧冰刀作寳樹劒化騫林乗此靈寳符命拔度亡過某人及獄内罪魂等衆出離北府俓上南宮時刻昇遷一如告命太歳年月日時告下具法位臣姓某承誥奉行靈寳三炁流光救苦眞符告下九幽無間血湖硤石地獄主者具位姓某謹封追産死亡魂符右符黏牃前須先差將追攝血湖燈檄符先存身爲太乙取炁吹筆呪曰子文北炁昊天無上天令巳降法筵酆都内血湖海嶽破並無速化血爲水清水化清塵隨煙普度岸疾速付帝宣急急如九天律令敕眞炁破九幽當破血湖獄今得眞帝㫖承誥祝此符先蕩斥邪穢後入破血湖旣巳破湖入眞炁徧湖周不問何鬼衆不得並留停咸承帝命須免血湖急急如九天律令玉清降寳籙昇度産亡魂拔出長夜府超上化生門解除累劫罪削去積愆身乗符往朱府受錬變成人急急如律令元皇蕩淨血尸符太上眞人上昇南宫三宮昇化保合自然日宫帝君月宮皇君列照下土除蕩血湖元炁下降灌漑羣生對司侍晨罪滅三塗洪流蕩穢叨濯冥津三界所舉骨像合仙元陽玉曆積善建功善功徹天幽夜開光隂陽交炁斬斷死户急急如元皇上帝敕天河神水洗滌凡軀普滌腥穢宿罪蕩除玉籙符命徑上南宫急急如无皇上帝敕天帝有敕曲赦幽魂蕩除血穢俱合至眞流光洞照體合萬神急急如律令魄錬魂更生身俱完復回人世面禮慈尊急急如律令右符黄紙朱書先存身爲太一頂出青炁灌其罪魂蕩滌血湖告交右符告下無間硤石血湖地獄主者飜體大神擲尸神王食心㗖腦鬼王拔度亡過某人及血湖罪爽速離穢惡覩見光明赦除罪業澡錬身形上昇南宫受錬更生一如告命靈寳玉光蕩滌血湖符玉帝告律脱釋冥關赤帝佐助昇眞紫府九隂九地俱來合形上帝敕命普度幽途救苦眞人拯濟元君神眞俱集三台下臨九陽俱照廣布南宫天眞捧命排列在庭元始敕命玉皇降宫乾坤覆育速離幽獄衆眞拱布免滯幽途玉音振響萬劫永離鬼魂滅爽神爽自然急急如元皇上帝敕玉皇敕命普濟幽塗靈寳内篆度脫血湖神清保護俓上南都急急如元皇上帝敕大慈二眞人能救産死苦放光照世界地獄悉停住刀山向巍巍鑊湯飛炎炎志心念眞人罪魂宿𡨚解晝夜心不離脫解全爾身歸心發回向同上七寳林急急如律令右符碧紙朱書於符邊寫拔度某人神魂若普度亦可披無間大地獄血湖獄罪魂告文右符告下酆都血湖主者伏波大神血湖考官掾吏執罰神兵巨天力士甲卒各獄神王血獄大魔行穢童子血獄鬼官乗此符命屏斥穢氛肅清血獄𡨚仇和釋債訟消平拔度某人等及獄内罪魂永離長夜覩見光明萬罪蕩除上生天堂一如告命太歳年月日時告下具法位臣姓某承誥奉行淨血尸清神符玊虚之炁道運御世百神侍側五帝列朝下官所攝善惡分判修齋千日德重山海寂然無色鬱鬱玉葩開度幽魂敕天符命吾奉元老神超上宫感應常通玄音徹淨明三界霄逍遥玉京神清炁化錬質形軀内符所授保舉帝書經絡存布徑昇南都急急如元皇上帝敕東井天河水日月結精英五方洞五炁石景玉池傾眞靈鬱結合齊登上清靈五濁今已清奔飛流火庭一如元皇上帝敕右符青紙朱書用時念通靈淨魄呪五行之炁普周流三光之炁變飛浮靈漿下灌滌血穢玉液蕩神出九幽魂澄魄正皈上天㑹合萬神玉京遊滌血穢通神淨炁呪混沌開化三景齊臨仙人化育錬炁蛻形元始有命蕩滌穢炁神全受錬五帝鑑映元精流景六腑速明急急如青玄上帝律令右用前符於沐浴時别立一水盆念前呪焚於水中上清靈寳大法卷之四十三
