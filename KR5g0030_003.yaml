front:
  text: 上清靈寶大法卷之三鬱三
  hash: sha256:b793564888bdb9da3e76ca7cf01123b9a41787c8083229870fb8c217ff05009c
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5g0030_HFL_003-001a, image: hfl/0942/0942-102.png}
body:
  text: 洞微髙士開光救苦真人寧全真授上清三洞弟子靈寶領教嗣師王契真纂經緯修用門洞視式入局謂定息入重堂坐謂已坐案機面前懸鏡於壇上鏡面水盆陽神在鏡隂神在水靈寶真人仰某神於此速現形急急如律令局榜式神虎洞視局仰本局應干吏兵功曹使者玉女伺當朝元罷常切於此祗候分明現形衛集聽候本局使喚右以牌一面兩面寫之今日入局今日不入局洞視默表式具法位臣姓某稽首再拜上言伏念臣生居下土夙植良緣叨佩靈文獲親道域濫司三洞法職誓以濟死度生洗滌塵根精思至道終始修錬遵守戒條況以穢質凡軀未達玄元至理耳目閉塞身心昏蒙何由徹視鬼神罔能洞達幽顯昨蒙度師某傳授靈寶大法混元玉札洞視隱文臣今者恭遇某日之辰依法吞服內諱徹視真靈伏望祖師上帝三寶真靈赦原瀆犯之愆迄遂陶成之妙特降正真生氣大道慧光三寶法澤六通真氣流入臣身田之中內滌心鏡塵障外除耳目穢氛開通臟腑之光明銷鍊百關之隂滯摧伏妖魔罪厄斷除結節胎根令臣吞服內諱神文立照萬方坐觀三界洞明幽顯徹視鬼神度死濟人修真學道所欲所向無願不從期贊真風上禆玄化不敢輕泄漏慢叛道背師如負盟誓甘依玄憲臣謹伏地密奏心章一通上詣三天門下三寶上帝至尊几前臣無任祈恩激切屏營之至內鑄六丁師曰於每月上六日午時以黃素丹篆六丁真諱六字面當旬之方者為首以次從之各吸氣布之每二字作一符共為三符至上七日五更丑初時睡覺披衣面丁立方取一符九之次况其名以淨水吞下候其時聞初有人作聲時急望本方吸氣六口咽之至中七日下七日三旬並同此法一月受持足後自此凡有一切事面本旬方祝名吸氣咽之暝日良久六丁告於心神知意中所起所出言語皆是未來之事無不應者或有邪鬼纒惑之者亦同上法其六神即告以鬼神作禍之由至於服色人數一一皆合其驗外直六甲師曰於每月六甲日卯時以白素朱書六甲名面本旬方以西流水吞下或不見三光以井水吞訖雙手握固端坐嗚天鼓三十六通叩齒二十四下兩手相義鶴啄六度搖轉三關九次手分項水心存丹田有日光赫赫一身洞然如火內外通赤祝名三十六度吸氣吹身常存六神侍之六甲定日未然之事蘿中告詣六甲常衛其形久久可見役召任意凡小小妖魔作過朱書其符同金錢火化其邪立被六將遣出海中通章合契師曰於每年除日預於前一日沐浴更衣至來日平旦於密室中端坐面天門持誦三天隱諱霐䨜至十二時足滿三十萬遍來日元正曰不語一日自此之後應章詞表奏念法一遍取東氣吹文字上立致通達自有玄報又曰常於晦日要誦十萬遍奏章立達三天矣急厄救護師曰自八節日清齋於戌末亥初入靖端坐持念三天內諱防中表德盤纍及十萬遍每遇虎狼毒物閉氣七息念三十二遍萬毒潛伏不為害矣又曰於月朔曰要誦一萬遍三月應一切災一切急厄默念三十二遍某災厄自然解五嶽持身師曰於立春後九日立夏後三日立秋後七日立冬後五曰每土旺一日後面逐方於子午卯酉寅申已玄時叩齒如方數存東嶽領四嶽君官吏面前掐五嶽訣念五嶽諱吸五方氣咽之一年功足遇求事或恐懼急厄謂賁入山度水也先叩齒五通祝名吸五方氣咽次又吹身又布方即脫厄所向元言如願洞明萬慧師曰於五月五曰朱書北斗諱不計其數以朱臘丸之置青竹筒中重紙封固安抱雛雞栖中同成取之服一日誦萬言洞明智慧也或於上七日以黃索朱書用臘袞丸之七粒一日一服清心淨水吞下七七日外百事預知智慧通神日誦萬言開口不忘又曰於上七日夜用乳香一粒朱砂一粒如豆大以西流水或井水一盞浸香朱於中并朱書斗名入水中面東念青童奉命况取香砂細嚼以水送下次面北念斗名并况曰北斗太一靈童一吸百應念七遍取斗符九之以水送下次又念呪曰青童靈明神光玄明念九遍東氣吹餘水中洗目來曰是八日不用香砂止可用斗名并念前三呪呪水洗目凡有人投詞只用前三况取東氣咽了閉門少時心中自覺巳意所起信口所言並皆合其來意祕之行持逐曰吞符師曰以黃紙朱書一寶字計二十一畫念欽敬全收墨漆黑魁至魒食至破計二十一字呪一畫一呪書之逐日吞服想靈字在心寶字在頭師曰應毒物所傷并癰腫丹瘤五臟大小之疾書四直隂陽諱於病所或內吞外貼不過三字即安師曰凡一切疾病書南斗諱服之黃上朱書五嶽安鎮符籙師曰凡書符先念魁罡呪掐辰文取魁罡氣吹硯中次念乾元呪入筆又念太一况吹墨上良久左右研墨四十九匝東南氣吹硯中次念五嶽持身况掐中指中吹紙上以朱書籙默呪一次取西北氣放訣籙中如法封印了令病人將籙焚香禱祝焚烈焰中即有報應其有輔正籙行持一同上清妙行真人歲破籙天地諱曰月諱五星諱四直諱陽日六丁隂日六甲諱道寶法寶及真武聖勑攝羅天大將奉請某神依勑攝太歲年月日時告下法位姓某奉行五嶽安鎮符師曰應一切凶邪精怪壇席邪廟復連惡地水魈蛟螭朱書於大石上沈之或安埋之五嶽安五方天塗西北地塗西南人塗東南功都東北書時掐五嶽三塗訣取五嶽三塗氣吹之九宫洞視鬼神師曰兆未有定力見一切無道鬼神可依九宫法男起離宫一歲順行初不用二宫入於坎宫起一歲逆行不用艮並一歲一陽宫至何宫分於年中起月月中起日日中起時又於時上起得病作過鬼神發作歲支月支日支及方即知鬼神情狀乾象主頭沉舉體重難任兩足俱冷痛祟是一陽人惡病纒身死西北是沉淪幡香有願誓皂衣乃邪魂坎宫身悶亂懶語腹腸鳴水蠱或肢滿溺死語難伸正北因遊走怪夢足悲吟一鬼隂陽祟細問見其因艮方心脅滿喉中哽塞傷狂言并怪行悲笑罔難量群鬼須八數廟社行不臧更有石金怪東北審形光震位瘟黃病寒熱傳四肢食厭并况罵犯罪天使之刑傷疫死鬼青碧死魂隨紅黃女鬼現三日有傾危巽宫顛狂語盲謎不能明家先為隂語外厭是女人魂魄拘鬼手晝夜使呻吟潔齋求大道方始保康寧離禍正南地癰癤火燒瘡上熱多黃疸血鬼産傷亡緋紫橫死客占親魂是陽正向火位討邪鬼見行藏坤鄉脾胃疾痢下體尫羸久須難治療西南有伏尸動土傷歲煞光怪顯其時勾引家先母淹廷死魂隨兊意勞尸疰喘嗽足迍遭葬埋生不利刑傷有復連橫天求功德古器在宅邊鬼邪三人伴同共致𡨚愆師曰此法齋戒吞服尅日成真周而復始洞視之訣定目如暗窗之中穿度鼠穴百步之外視霧之中物瞑目久而視之一意稍失目神引視則靈光不現初如簿霧次如亂色輝照四七之外如影五七日漸明七七曰外有形容服象九十日可聽語音百日外可以役使仙靈尤務清靜如不及行此當行內觀中藏法夫靈寶之道有三上則有帝一徊風之道中則有中理五氣混合之法付於五帝下則有十轉回靈之文付於諸真三品之外餘緒之者以濟生度死為功以招真致靈之法夫學上道希慕神仙者莫不載於斯文內視中藏師曰未能百曰入室於六甲曰平明面南端坐以白素黑書玉札內諱置淨瓶中仍取旬中六旬方土各六合亦覆於瓶內玉札之上置瓶於甲方封閉如法次端坐雙手巡五嶽三塗訣一遍念况一吹吸六方氣咽之次又祝一遍取甲方氣咽之午時滌滓乃驗十日定至次甲日取前玉札火化用青玄水調服之以前旬之土棄長流水中再書玉札復如前取土置瓶中然後巡訣誦况滿六十甲日內視見五臟瞑目可以通神洞靈如犯色淫氣則前功並喪促壽一百二十存神參斗師曰參斗之法檡不經生死穢地取青竹作棚架之貌其上置曲尺象布斗罡形於曲尺之要處懸明鏡八面使光照下隨斗罡建以時指方地下以白堊土𥁞斗形於星上明置其燈在地隨鏡光相照鏡以赤繒七尺晝七星內名抹於額下服淨衣仗劒依圖式排列師真擇天色清明兩霽之後為妙凡參斗自斗罡交乾而步每一星點况四十九次覷三光相合吸氣咽之以水送下擲盞吸水噀鬼門喝攝以劔斫盞如四十九次况畢方步第二星至七星每星皆如此畢歸斗口存伏良久定神七拜視斗口中有二星得見一星即得割移死籍也是夜天真二界萬神並臨於席上卧斗待報參斗符右此符以緋繒七尺丹書參斗時抹於額腦後繫符向外參斗呪俗居小人好道求靈常見尊儀願賜長生髙上玉皇紫微帝君三台生我來三台養我來三台護我來魁𩲃𩵄䰢魓𩳐魒急急如律令又呪中斗大魁總監衆靈中有髙聖尊帝二星臣今參斗願見真形除落死籍斷滅惡根飛度五戶名注玉清衰病墓絶不干二身北都勾罪録南曹書長生百魔來受事功畢朝至尊大帝付之功玉帝令施行急急如上三天玄都律令勑存神參斗師曰如女子及氣血弱懦不能久立即飛神二真存魂參斗或不及運身步斗當於月三七日亥末入靖面北設席端以香置頂中存神意隨香煙徑朝斗中思七星煥明北斗一時久即叩齒七通依星誦呪一如參斗遍數畢寢於靖中席上再存斗中尊帝二星明輝照朗即已是夕有異報如未見感格次候更遇一吉日依訣朝斗以待報應方可行持餘經七次不明其報更不許參斗乃罪業重大不得割移死籍兆宜端潔精確以伺感通方為效信此法乃召靈之經緯修誦之訣法宜在閉口奉行參斗畢七日勿返凡室使人口恐懼以分化凡之氣也參斗訖方擇日朝元朝元師曰朝元之法定其魂去思慮入於玄妙微化之境方可朝元先用明鏡七寸或四寸九分以新法銅錬九火陶冶鑄之於每日六陽之時面東整肅衣冠端坐靖中以鏡照之存思巳形如此七日形存照巳明爽無别夜半即思己形在泥丸日中存居心中晡時存居下丹田七晝夜上下分明即至其夜關告天門及奏三天玉帝東西二氣王母青君方始朝元其法於夜半子時入靖祝運神會道功曹十天承受玉女飛天傳言上吏二官直使正一功曹左右官使者隂陽神決吏科車赤符吏罡風騎置吏驛馬上章吏飛龍騎吏收神食神吏收氣食氣吏收邪食邪吏三十二天傳奏吏甲子官君玉文功曹辨魔玉女捧香玉女天騶甲卒天丁力士治中仙曹執職玉女金童驛吏龍騎鳯車紫羽芝蓋天丁協佐羅列在前一一分明即手握升度罡風符身佩玉清朝元符頂戴升天合同大劵次端坐以舌抵上腭存三元正宫中有三氣三氣中有真人一如已形先閉氣十二息存下元白氣中真人升入心中與黃氣中真人混合為一又閉氣九息存中黃白氣中真人并氣上升泥丸與青氣中真人混合為一真人青衣皂襈帔有五嶽四瀆次左眼出紅氣右眼出白氣二氣交合作一團真氣化為車見前有丹瓊羽輦如大車之狀又閉氣三九息存真人自頂門出登車忘形如夢寐之間乘紫氣金光漸漸而上神真引從至罡風界見罡風吏乘天獸執器仗兆以罡風符畫車前良久罡風車神引車度罡風如雲氣翁鬱旋回九次而出罡風至星界有日月黃道光明如長虹之狀兩邊多有琪花寶樹如松杉青葉黃赤之花碧枝絳實風動自然成金玉之音逺望四方金樓玉闕在寶雲之中皆星宫仙府也時有乘軒乘車乘鳯乘鶴駕龍麟乘雲皆仙真之子也須掩面避道半時覺車登盡萬里長虹之路見紫雲隱隱中有天門侍衛天人止是門內威神守衛甚威天門相對乃欲界魔王之境乃太清欲界天也自此後分大劵付守衛之神入進天門適意而朝升度罡風符三天朝元符碧繪朱書黃囊九寸佩之升天合同大劵分神治事師曰朝元巳畢即知所領仙職曹局預於前三日關告所治之神尅取某日分神治事參謁之禮稍同世務版剌名位一一預告至期一如朝元之禮點檢神真儀衛以印置面前并劵簡亦同良久見所治之所神靈迎引方始如前法混合出神自然乘車至治所判領職務凡每日朝元畢須往治事如有凡事不便者宜申三天及治局方許不赴若有責即三天呵阻治曹神歸或未能治領玄局即仙曹建邸焚修立靖分神治事仙曹建邸師曰受行大法宜崇靖所立名靖局前建仙曹後崇髙聖名曰靖局每日朝元罷會仙曹入靖治事凡有所治即於靖內施行凡係靈寶洞玄仙官皆屬西元王毋內禁靈虛宫兆既司仙階即申天機都省於此中建邸仍立司儀司麾司衛左右府給賜仙衣並服三十二條青帔皂朱履冠三辰交泰冠帔用五色彩畫五嶽真形但王母宫中皆服此衣也非朝元治事不許輒用功滿迎神上登仙邸下謁童初受書而成三界仙真之官矣超度玄祖師曰前之五經既備方許超度祖玄寄治南昌具有靈寶黃籙齋法更不重敘若能於上元長齋五臘專行拔度誦經告符其功最重不必伺大齋功德也若一身大惡故作重愆則祖考墮落復入鬼趣有功更升入青陽仙境兆宜審思之選應玄舉師曰玄舉之道有二十四品大道正法乃上帝玉司皆南司火府天機內省主之內有主者乃元明文舉天帝平育舉清左相靈虛玉嬰大君中央黃老教主主之上帝司舉語詔曰元景丹天三界之教我司主之孰能志髙萬類堪授中主者惟中和獨曹億司舉靈虛大君化元廣教授二十四庭仙品若非立成功德無以應真師曰既有凡質神任真階無功乏行不能名録丹臺升降不㝎賞罰不時夫舉一選便得位封真人二十四階玉司太清玉司上院正法中央黃老君主之天童經為司舉治經髙上玉清太極院正司正法髙上老君主之消災經為司舉長生保命元生府玉司正法長生保命天尊主之護命經為司舉五帝育物天皇玉司正法天皇上帝主之祕授經為司舉青羅消災玉司正法青羅真人主之十一曜消災經為司舉上清護命玉司正法後聖玄元教主主之通神護身經為司舉靈寶延壽益算玉司正法延壽益算天尊主之益算經為司舉青玄左府玉司正法太一救苦天尊主之救苦經為司舉三元寶簡玉司正法太一救苦天尊主之九幽拔罪經為司舉太一神局玉司正法中皇帝君主之太元真經為司舉太清伏魔天寶壇玉司正法五靈玄老君主之伏魔經為司舉大平護國壇王司正法太平護國天尊主之五老真文經為司舉上清洞淵內院玉司正法洞淵天尊主之洞淵龍帝經為司舉上清天樞院玉司正法南斗六司真君主之南斗經為司舉上清天機內院玉司正法北極紫微大帝主之北魁玄樞經為司舉治經紫微訣金玄羽章是也太清八威治魔玉司正法中央黃老君主之老君伏魔經為司舉治經乃化胡經祕訣是文始尹先生集次也靈寶保運玉司正法佑聖真武大神主之玄武經為司舉上清九天生神大混玉司正法飛天神王主之九天生神章經為司舉靈寶度厄天仙內院王司正法靈寶天尊主之度厄經為司舉九老仙都府玉司正法九老仙都君主之九真真經為司舉元始制魔玉司正法元始天尊主之元始制魔經為司舉靈寶升玄玉司正法元始天尊主之升玄消災經為司舉靈寶天仙玉司正法上清道君主之三皇金紫元神經為司舉太清枕中延壽玉司正法中央黃老君主之枕中經為司舉師曰巳上二十四階玉司有經法俱降於世者有經法俱未降於世者有以法降而經未降者有經巳降而法不降於世者但洞視參斗朝元分神治事仙曹建邸超度玄祖之後須當選應玄舉奏詣三天乞降真授經法兆巳攝領王司上天委任治職實有大功冠絶方得位登真人之品修誦八緯師曰修誦之科有八緯密旨泄之一緯餘俱不神倘因輕慢永無仙冀豈惟一身立致蟲癩玄祖速送火官兆宜內緘於心斧鑽湯火所臨寧甘赴蹈瘖默勿言雖適其禍身太一五老百神立化景雲迎神赴上清也若無信吾言兆試泄之看上玄之影響邈邇災害于泄緯者滅族百世受風刀立可得也第一寶珠玄化緯師曰寶珠玄化緯者太一含華玉露凝珠是也兆存之誦之不待萬遍而登真矣心中元始天尊露珠中自巳形如華含露第二獅子威神緯師曰獅子威神緯曰司命化生降而復升是也兆存之誦之萬遍馳雲駕龍白日上升太空頂中元始天尊心中獅子己乘獅子在心中立下五色丹田第三上宫妙乘緯師曰上宫妙乘緯者帝宫分身三元功成是也兆存之誦之萬遍足備舉身升仙頂中九宫上四宫下五宫上四宫中第二宫內有己形四千遍功滿第四中禁證真緯師曰中禁證真緯者丹臺內坐中禁成真六十積功德同九真者是也心中丹房內有巳形誦三千遍第五下元初學緯師曰下元初學緯者丹谷潛志神氣俱存三千之行名籍玉真者是也下丹谷中內有已形誦三千遍第六立應神通緯師曰立應神通緯者三氣生三上合三天造兆一身分形十天形同大帥儀範自然坐御獅子在於空玄日光寶珠五丈宗元十過周回應通玄變是也三氣中有十方天尊元始坐獅子居日中去地五丈也第七玉音萬靈緯內服外誦二十二音心存玉尊泥丸帝君神誦玉章俯仰元君萬遍巳畢無所不功四方三十二天泥丸宫元始天尊心中自己之形朝仰也第八三界招靈緯師曰三界招靈緯者三界三元百千萬遍三界可度仙合雲軿是也上界青雲氣上丹田己形五千遍上元中界黃雲天谷氣中丹田己形千遍中元下界白雲神各氣下丹田己形百遍下元丹谷師曰八緯真科得一緯而成仙必待如掌運指泄一緯而望飛不及返沈非道兆宜詳悟通究勿妄議泄勤而行之三天至真待子登仙也上清靈寶大法卷之三
