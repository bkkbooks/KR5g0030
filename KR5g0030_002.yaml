body:
  text: 洞微髙士開光救苦真人寧全真授上清三洞弟子靈寶領教嗣師王契真纂經緯修用門七經師曰修用之法而有七經一則洞視百靈吞服混元玉札髙玄內諱行元始內觀之道如不及行此當行內視中藏法二則參斗割移死籍注生南曹所謂北斗落死南斗上生也三則朝元四則分神治事五則仙曹建邸六則超度玄祖寄治南宫七則選應玄舉也吞服玉札洞視隱文師曰上清三洞九品之文分四輔萬篇惟靈寶三階有餘緒神章則救死濟生為上下奉真之士往往萌始之勤終未見替止緣塵根暗識六慧不通被六天魔惑四邪妄興作諸變化不能洞了故三洞之文上曰洞真以凡修真洞合形神目覩真人與道合契逮乎中下洞玄洞神乃萬法之祖六通之本是以天尊證道眼慧眼真人定法眼慈眼故觀三界如居掌中天尊設法以明內觀外作洞視以效道慧之眼洞視徹視遙觀以體法慈之目是以三洞凡學洞真洞見真人然後成真既曰洞神目擊神真然後通神而作神仙凡三洞之萬法無不先要三洞自明然後可以通神神靈降身至於洞神洞淵洞靈大洞八史六丁靈飛六甲與光洞觀並設通目之道男士之淫女士之邪六根不淨耗失真元豈洞神純陽則神仙不隱純隂則鬼現形是乃真祕授玉札一卷之祖修之百日真仙現迹見之可以役使可致天真功德備合白日飛升三洞召真現形無此玉札徒勞施用終不洞明昔者不傳下世因靈寶教行鬼邪出隂以此洞之不能隱形免惑道士玉札皆上真內諱隱名依法用之克日成真授受之者擇三元十直八節之日齎玉簡二枚上金九兩命素千尺信財百千以盟三官師授無不盟信妄泄天寶師伐以風刀之考弟子修之終無所成折算一紀詳其士之豐儉勿失其人不以非材泄之非道罰亦如之耳天地玉字內音防中之真合氣玉京太華袁德轉輪不停丘紅妙樂圎羅肓靈音曜清都元始坤道化形嶽麓所制鬱成煥壘造化無窮黃中理氣衆妙之宗音壘右二符並中指中文日吞二枚召二氣父母用日月玉字內音日月帝皇內諱曜道枝正薈條將軍梁髙騫爽天皇君內音泛景太霞嘯詠洞章甲子元君白素天皇魂氣元玄解乘胎仙六轉六合八遼玄𡨋逐字塗之乾文地皇君內音溟涬大梵寥廓無光甲申地皇萬氣絶真黃素元君九華元陽六轉巴元靈曜氣生逐字塗之坤文人皇君內音無形無影無極無窮甲寅元君太微玄晨紫素人皇碧落混沌六轉洞幽迦摩梵惠逐字塗之中文為訣服符呪天地人皇三素元君解結散滯閉塞死門辟非去尸心神寧間五星諱三天隱諱玉清始青玄元凝結上清禹餘混芒降固大清大赤流焰騰晶鼻引玄元始青黃白三氣黃紙朱書厚載無私化形玉虛卯五嶽坤輿上達帝居辰九壘祖土三氣洞元寅鼻引九地黃紫二氣朱書千靈變化攝伏羣魔酉元皇列真凝結雲芽中中黃內象感化嬰見辰鼻引東方九氣朱書服符呪元父合雌玄毋歸雄天地混合人道居中玉符保命五臟光衝耳目開爽我道興隆急急如律令三真內諱太一天真諱森羅淨霐霐持無鏡祖劫化生上清訣太初天真諱阿陀龍羅堅敷澄宗四象吁員玉清訣真仙真人諱流羅梵萌浮羅合神柏空度仙太清訣鼻引三天氣書成上帝內諱神户纒絡真元散清子文皇道含明氣晶育魂洪綱告寧午洞潛洞虛宸洞開微酉入中指中鼻引子午中宫之氣書成服符呪太一捧將太𥘉命靈真仙護命三帝司迎氣通玄關魄煉魂英服氣合符洞徹萬靈急急如律令七曜諱赫赫陽衆陽宗辰太隂理化廣帝理生酉皓景金華庚辛洞光酉扶桑鬱華九氣令華卯朔單五氣元老化形炎帝赤明奔飛火鈴一氣靈寶中黃肇玄中中每日吞七丸召七曜也此日月五星內諱各掐本訣書取本方氣隨其方色服符呪東連扶桑西貫咸陽五行相配混合中央急急如律令南斗六司諱離宫之祖日陽餘氣三氣炎炎丹天朗耀四明尊帝騰勝威天急急如上帝勑六字疊書塗之離文逆至子取南氣書之北斗七元內諱河變恬懀紫精陀丘觚亶琅璨岺昺太行幽微畢雷明陀唵痡梵秦貫標急急如上帝勑七字疊書子文至午剔取北斗氣書之服符呪南司七政陶魄鑄魂順道而造逆天法輪周旋玄象回死作生七辰內妃夫人隱諱玄玄所化元氣所運應變無窮魂魄澡煉衆星所拱飛天遵奉馳驛風傳玄元應化星飛驛程七字疊書子亥文取魁星氣書之日吞七枚召七妃也神虎神吏內諱卓雲青府寅混元覺緣丑業覩般基中中玉玄演侯卯寂無眇凝辰極中昆清中皇達元靈午七匝昌荀逵迪恙信貴七字疊書取東北玄範𩲃司之氣書之服符呪魁張玄範應化無邊掌持青律度魄魂遷飛度五戶驛馳風傳元皇九醜樂秀三田逵迪察命變攝昌言荀恙持金不信通玄三界總司盡秉吾權三台祕諱太清佐命三氣元君乾為天坤為地靈為人中皇氣絡氤氲虛皇總氣精元有英天寶妙色終升太虛四指上六氣混康停華育魂靈寶化生至道元宗罒指中曲密華房延生度世神寶守宗萬神護攝四指下服符呪上部八景胎結泥丸中部八景胎盤絳宫下部八景胎解胞根三元輝映台魂鮮明急急如律令中斗正使祕諱罒景回樞灌形天河旋斗歷箕回度五常太玄璣渠玄君斬尸天王秉權五帝命魔太陽四正斬根斷死控適天元回盻帝堯遊行太空俯仰玉衡玉文八威正氣所臨八匝中斗大魁總監衆靈八字沓書中指中文取中斗氣二始祕諱太一之宗三匝遊宴太阿夫一之宗五匝遐想天帝五字分二重沓書共八轉筆中指中文中氣日吞三枚服符呪中斗大魁旋斗歷箕回度五常逃形天關太一天一二始分張八景𡨋合司命桃康急急如律令玄女祕諱八景冥合氣入玄玄梵氣彌羅萬梵開張玉音攝氣靈風聚煙三匝玄運珠三師正音祕諱真定光慧大羅智翹真妙流音梵景空瑶中指甲隨氣田轉逐字轉吹彈四聖祕諱暗咀嚕嗂嘧囉啘嘰喁𠰉九區六甲祕諱甲子護我身甲戌保我形甲申固我命甲午守我魂甲辰鎮我靈甲寅育我真天地日月星勑六丁祕諱丁丑延我壽丁亥拘我魂丁酉制我魄丁未却我災丁巳度我危丁卯度我厄隂氣雲雷電雨六匝塗搯十二宫訣取十二官氣四直功曹陽神內諱俱曽直年嚧眚直月詵季直日瑞夷直時四匝鳴囀嗏嘆四直功曹隂神內諱旭斯直年晨濫直月馥淵直日蜒渺直時四匝唵㖡嗏已上八卦訣甲陽卦丁陰卦方氣書之五師祕諱延生固精注祿保命固靈固神中體存真煉形鎮身五匝金木水火土五行訣五方氣三將祕諱上部三田暢中部八景分下部九陽靈三匝玄元始三塗玉諱太霞扶桑乾下鎮酆都坤韓君丈人度人不死中指甲鼻引三天氣八口閉氣書吹呵各三次五嶽玉諱太華木司九氣元君衡霍火官三氣元君金華金主七氣元君恆山水帝五氣元君嵩山土帝一氣元君五方訣五方氣雷神祕諱嘔嘻𡀎咁咳吒嚙唵臨十一臣念十一字掐辰義念呪曰雷一雷二雷三雷四雷五子上局巽氣書之總服符呪玄女內妃隂陽合配三師紀律四聖分鋭六甲陽神六丁隂吏四直元君五司都帥三塗五苦鎮輿坤地巽震雷霆隂陽拘制兊乾施光坎離交位下辟鬼門滌垢蕩穢飛付仙家獨步無畏元亨利貞逆順神氣師曰凡受持此法於元旦入靖面北設香几以朱砂雄黃用輕黃紙依前式書髙玄內諱畢再拜收安淨匣中各打密記母令差互以甲子日服三天隱諱天地玉字三真內諱上帝內諱甲寅日服七曜南北二斗三台中斗內諱甲辰日服三皇內諱五帥三將二始諱三師諱甲午日服六甲六丁四直諱甲申日服神虎神吏玄女內妃諱甲戌日服雷神內諱凡欲服符須隔夜預備香火水盂劔子帝鐘各一及盥潄之具一一周備不使臨用有缺方就寢至夜子時後丑時前起行事整肅衣冠盥潄畢入靖焚香明燭汲井花水一盞置在聖前次取玉札內諱符於案上分記之退身入戶朝真雙手掐玉清訣步斗至聖前春夏自魁步起秋冬自魒步起至魁上香望天門九拜畢長跪密奏上洞視默表一通焚於爐中畢再拜雙手玉清訣面北呪水依後法服符朝真密奏維太歲年月日時真位臣姓某謹焚香皈命奏啓三清上帝玉皇上帝紫微大帝日月五星南辰北斗三台星君三天上真四聖元帥五嶽五帝七晨內妃南昌丈人六丁玉女六甲神君雷神雨部神虎大聖使者四直功曹四直神將洞觀神將徹視童子臣謹依靈寶大法混元玉札上清隱文每遇六甲之日合服上真內諱隱名玉字齋戒吞服所祈洞視神真役使仙靈追魂攝魄伏望真慈不以瀆犯賜譴許臣服食行持兹值甲子之辰謹當依式吞服上真某玉字隱諱乞降正真道氣灌注法眼俾令徹視百靈役使千真左呼六甲右召六丁坐致行司預知未然身生水火變化無方臣無任祈天望恩之至祝畢焚默表於爐中又九拜次以左手掐五嶽訣至中嶽搯定上香以右手取水香上度過左手把帝鐘搖撼七次以右手傾水七次入盞內念呪七遍傾水北魁呪魁罡靈魁罡聖逢著邪氣必須應勑攝右呪七次取北氣七口吹水中止次掐五嶽訣托水仗劒念後呪太一神呪謹請太乙天真太初天真真仙真人上應乾位六丁左神六甲右軍為吾上受天心普救萬靈太一神呪南方火輪除邪去病取水勑攝右呪畢存日在水中轉念呪七遍取南北氣各一口吹水中以雙手持水香上度念呪乾元呪乾元亨利貞日月與吾明靈泉入五臟六腑得安寧神仙同羽化飛升朝上清右呪七遍取天門氣七口吹水中放水次以雙手自子巡先訣彈水後巡十二支念後呪五嶽持身呪五嶽持身天地同生日月斡運配分五行周天上真玉諱分明各降真氣灌溉胞根神清氣爽洞徹玄𡨋急急如律令再拜丁立執符逐句看甚字取氣而吞之取氣例臣謹依大法但遇六甲之日服諸真氣臣受天氣仰乾方吸臣受地氣俯坤方吸日氣東方吸月氣西方吸五星氣五方五吸三皇梵氣子申寅三方三吸南斗氣南方六吸北斗氣北方七吸三台氣北斗魁頭之上三吸三天真隱內氣天門三吸三師度我神氣西北方三吸五嶽持身妙氣五方五吸三途總司氣南方三吸北隂天門六丁柔和真氣丁旬方吸各一六甲武罡之氣甲旬方吸各一太一神變之氣太一寅方吸二神虎七隂真氣西北方吸四直所主正氣年月日時建方各一吸上帝正真生氣天門三吸內煉三元之氣天門三吸九天玄女真氣西南方三吸雲雷雨部之氣巽方十一吸右吸氣畢再呪曰天為我蓋地為我載南辰北斗為我衣裳吾藏身於三界之內太虛之央干不能侵支不能傷即令天地不能見我質日月不能見我形鬼神不能見我身飛行太空出幽入𡨋千邪萬怪逆道魔殃當我者死值我者亡急急如律令攝右呪畢取十方氣掐十千訣彈入水中然後面天門存身為元始天尊默念玉札隱諱以左手取玉札以水吞下吸水三口餘水噀天門上右法吞符訖次取神虎玉札七字入左手中右手掐五嶽三塗訣至中嶽掐定呪曰勑化元聿魄星飛睪降真氣入臣身中急急如律令右呪畢取五方氣各一口欲入水中想七隂夫人降玄光氣入水以左手拋玉札入口右手取水送下次吸餘水噀鬼門喝云攝再拜退次置水劒不用却吸鬼門氣一口閉息於靜室面南端坐行元始內觀之法三塗五嶽印五嶽印以左右手小指四指仰手相叉各以二中指左右互勾二小指以左右第三指各勾左右手四指直於左右二中指以大指掐中中元始內觀師曰凡行此法於靖室面南端坐焚香以鏡一面對面前安吸鬼門氣一口吹鏡中次閉室行元始內觀須端坐行之先聚卦氣先存五臟心如含蓮花如縞英紅在肺中下肺如華蓋如縞英白肝如金鍾八華居左如縞英紫膽如綴珠色如縞英