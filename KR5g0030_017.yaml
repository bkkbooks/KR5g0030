front:
  text: 上清靈寶大法卷之十七觀二
  hash: sha256:d0b590bae1e6c39e820be3be5e2219e1cc5ae881aaff0d446a5e75cf8efa8f6b
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5g0030_HFL_017-001a, image: hfl/0947/0947-050.png}
body:
  text: 洞微髙士開光救苦真人寧全真授上清三洞弟子靈寶領教嗣師王契真纂鎮禳攝制門大梵正音章師曰大梵正音乃元始自然飛輪之氣結成誦詠者可以制伏萬靈超度五苦行法之士能於六丙日面東以黃素朱書佩負兆身則祛制羣魔消却萬災當存身為靈寶天尊掐上清訣取元始祖氣入筆書之書篆祕呪元始祖輪結梵彌羅自然靈妙無始無終洞杳菩猷捉渠廓崇爽邈神靈峯道達聰超冀無窮急急如靈寶上首律令東方正音廣生髙映覺元洞虛應玄九真化交肇圖文靈運搆宗範玄都咸變總括威昭自成緑岑遷景皇道含明天林耀權氣精育魂融羅負立圎英隱旻期巨神色洪綱告寧南方正音章炎通泛竪敷澄宗虛象玄華龍陽舞穹微正霄艷淵太凝冲玄關三紐大梵飛空隱覺隆益天倫慶呈神户纒絡真元散精淨握明照徊合升遷導騫宴雲靈應騰天西方正音剛譯微控隂峻孤儀貫氣冥素宸洞開微周化幽應澄輝帝臺平遐挹虛恢茂童池結飈臨育麓無散開陽通百六沈芒隱階幽廓冥默真風宴靈堅不順道告命騫林北方正音龍安洞變純陽隱玄方本還氣象伏髙貟神變東凡解鍊靈根赤精純道成號威尊利雲友當億仞中丘鬱城瓊壘謡音慶流受位玉室天憲道幽玄章煥落綱輪乃周流金演玉鳯氣龍文之譜一百六十六畫師曰龍文鳯氣之書皆三天錬玉流金之文可以集而成符或聚而作字既司真階靡事不究呪符書矣不得輒將他用三官司察事同泄漏天禁祕之一又二三四五六七八九十百千萬曰月年時刻金木水火土從金從木從水從火下土撒火從土門女從女草頭竹頭山穴廠又走疒上彳人言犬幸頁日音大太辛見阜丸廣口寸王生豆大才下上夭山土九木立卒鬼申兀白黃易开斤𠕋勿彡夕力百又止尹車又回皿召癶王玉聿七刀升丹舟者耂南韋台日水古直真不亟力無極亟介幽廣立巾帝也巨臣衣司同命度非離張夜光余畢乘心惠必堂巳弄籙録靈羊夌宫馬丑尊奠日骨亥監東紫之五嶽山真形圖太極真人曰元始禁書云凡授靈寶靈虛骨髓之要須識五嶽山形若不知則學道無成不能希仙魂神沉昧難造上道學道當圖其形置於淨室則魔試不生萬鬼滅爽幽原開泰此文載在法籙以正人天之分野也師曰黑者山形赤者乃水之源黃㸃洞穴口也畫小則丘陵微穴則隴岫宗形謂髙下隨形長短取像家有此圖者亦有善人守護邪鬼災患皆自滅也若上士佩之則萬神朝禮矣東嶽泰山周回二千里在琅琊界所領仙官九萬衆南嶽衡山周回二千里在長沙界東所領仙官七千七百人中嶽嵩山周回一千里在洛陽界所領神童仙女三萬人西嶽華山周回四千里南北長在長平東界所領仙人玊女七千人北嶽𢘆山周回三千里在常州界所領仙童玊女二萬人山跖泉脉源流上下昔王母授漢武帝武帝傳授禁限其科嚴重不可輕泄也上五嶽真形東嶽靈威仰西嶽白招矩南嶽赤熛怒北嶽叶光紀中嶽含樞紐下五嶽真形東嶽泰山真形西嶽華山真形南嶽衡山真形北嶽𢘆山真形中嶽嵩山真形酆都山真形謹按元始六天制魔經凡授上清大洞之道及三洞三真大法之要而不知酆都山之真形七祖不得長謝鬼官尸血不得蕩穢於胎門也又曰六天玊册文以石刻玄堂臺基之宫苦魂受度朱陵學士佩之及置於靖室中萬鬼滅爽幽原開泰此文書在上清北闕以正六天之紐分也若度亡可以丹書真形墨書誥文及亡人姓名火化揚煙於風中則北帝解縳三官釋結上升北堂矣度亡燒灰呪元始符命制魔奉行保舉亡魂度品南宫酆山消燼三官解形散縳閉業受化更生隨品錬度上登福庭右呪訖以舌拄上腭存身為元始意誦隱語一遍思金光滿口𩀱手玉清訣吹往東北方放訣其魂立得上升朱宫隨品受鍊返生福庭酆都山真形圖度亡告文右給付亡過某人永為身寶伏願敬受之後苦魂受度簡記朱陵一如告命風火驛傳上清靈寶大法卷之十七
