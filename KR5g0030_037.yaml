front:
  text: 上清靈寶大法卷之三十七驚四
  hash: sha256:e7ac66d1a9e1744c3bf051a49894fdf616232be8ddd9b0d8cf34542311ffa39a
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5g0030_HFL_037-001a, image: hfl/0952/0952-136.png}
body:
  text: 洞微髙士開光救苦真人寧全真授上清三洞弟子靈寶領教嗣師王𢍆真纂神虎玄範門十五使者追魂符書時先念北帝呪取東南氣入筆書之念呪曰覆天嗻速震萬靈敕命一下鬼爽離營覆降真真氣所成急急如律令覆者神虎之名天嗻者北帝之諱也符以黃紙朱書第一符并賚寅文儲彪卯威綽酉肇宏辰貪巨執符追魂急急火令巳上桃第二符浮章辰濯凝未逈圖中亶渾申魏追取魂攝火令申上桃第三符幽寂坎廓奕子澄期丑魓𩳐執符追魂急急火令寅上挑第四符纒魁丁忠多昺和哲華纒魁丁午忠多亥昺和寅哲華酉丁仲執符追魂急急申第五符芒烗己益亶辰涓湟卭明乙午追魂急急寅第六符混雷丑皇元子鎬濟亥極中戌卓申之執符追魂急急酉第七符神寬申湮堅未玄寥王滸執符追魂急急午第八符聖寬巳侈宜辰時畎卯寵汾寅沈魔五轉丑婆泥王彚執符追魂急急子第九符票鐸寅匪庸卯薦時辰呅逭劉子和執符追魂急急巳第十符洞涸申飛天酉濯矅戌育瑛亥仔天同執符追魂急急子第十一符騫鬱子景常丑騰精寅蕭嵎巳運量午曽元真執符追魂急急第十二符霄嵎未秀磐亥樂禁酉陀丘坤任水執符追魂急急來疾未第十三符豁蠻四指上總獸四指中儲雲中指下邵公權執符追魂急急第十四符鹿機四指下碧提中指中慶雲中指上魂精巳陵飛真執符追魂急急卯第十五符靈羅中指中綽雲四指中四明酉衛肇亥孔𩳍持符追魂急急右一十五符不問亡者罪業重輕皆可追欇前來可用此符祝使者持玉札攝之內誦洞章祝發而行七玉女隂符上段散形七符一同三清敕命告下北辰化元聿白星飛澤七轉塗之七元秉勑分身化形十方世界普救罪人真元正氣照徹幽隂第一玉女符豁落流鈴攝𩲸提魂真符救苦急召汝形玄司火令仁貴速行第二玉女符玄魁旋運飛星致雲符命所攝正病之魂去痾聚𩲸仁喜速呈第三玉女符飛光一攝疫瘴解除蟲毒蟲疰妖穢滅殂魂𩲸聚形急攝赴壇來第四玉女符飛罡玄運靈寶通真調和瘵疾惡患愆縈攝完魂𩲸火急赴壇第五玉女符飛星化元運動天衢續形接骨蕩滌嚚凶追聚魂𩲸火急攝赴壇來第六玉女符飛火奔燌蕩穢除腥魂淨𩲸寧速攝赴壇來呈第七玉女符飛星招搖懴解宿愆符命所告魂聚𩲸全速破幽隂火急到壇右七符黃素朱書上帝訣天門氣凡亡者不記生死年月日時皆可用此符追攝罔有不知須是隂陽二道雙行七玉女陽符書時先念神虎內呪書之第一玉女符第二玉女符第三玉女符第四玉女符第五玉女符第六玉女符第七玉女符右七符長二寸四分闊一寸四分朱書上帝訣天門氣於未建齊之先法師每日清旦面東書搯七真訣逐日服一符自第一至第七道次第服之用茯苓朱砂煎湯服之凡攝召先用此符為首十五使者并七玉女符檄文元氣徑開地府重牢救度亡魂某人等普承符命滅除應犯諸罪元輕者速放前來敕令疾太歲年月日時告下法位凡用符攝魂不至者多是亡人業重罪大隂府囚執當飛神謁帝拜表上章求降曲恩方以符檄攝取當內誦洞章行總破重隂之道使羅酆破蕩寒庭罷考苦魂脫離得領齊功神虎之道足矣七道功曹符書時先召降取東南氣七口入筆書之呪曰吾召某道功曹立降壇天道功曹符玉皇上帝敕靈寶上帝敕郜天真急降天道貴生敕令飛龍光明映煥𩲸爽魂中地道功曹符冉文仲急降坤以運載隂施陽上敕令不停神火真氣束制土宫奔激遍空人道功曹符胡當急降人道渺渺當人生門髙清靈爽不欲人窮仙道功曹符索忠急降仙道莾莾以攝北酆仙道常吉歌朗太空願仙道成我道與隆神道功曹符祖公弼急降無量大神皆由我身變化飛空過之長存匡御衆魔體入自然鬼道功曹符翟尚急降鬼道貴終元始符命斬馘六鋒統乘玄都轉道混中業道功曹符葛贇急降龍漢蕩蕩何能别真火司有命以發歌音令下不停薄由我恩功曹符檄文敕召玉府直道功吉火急至壇受領符命疾太歲年月日吉時符召右七符黃紙朱書玉皇訣東南氣召功曹隨玉札同燒功曹立降也凡召到天道神道功曹可於散壇言功發歸天府上清靈寶大法卷之三十七
