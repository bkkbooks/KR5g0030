body:
  text: 洞微髙士開光救苦真人寧全真授上清三洞弟子靈寶領教嗣師王契真纂齊戒禁忌門師曰修奉大法依諸天吉日淨齊則天帝書名九玄七祖俱登南宫一身清吉長生不死功滿成真慶及宗門所向如願鬼神稽首萬真朝身三元正月十五日七月十五日十月十五日三會正月初七日天曹舉遷賞會七月初七日地府慶生大會十月初五日水府建生大會已上三元三會皆普度考校之辰五臘一正月初一日天臘五月初五日地臘七月初七日道德臘十月初一日民歲臘十二月內遇臘日為王侯臘乃納音五墓用凡臘日按天尊所說父母恩重經此日宜齊戒祭祀先亡祖考誦經行道拔度亡者名為孝子餘日祭祀非緣淫祀亦亡者不祭所祀不獲其福小三會日庚申尸神白人過甲子太乙簡閲神祇本命日百神朝身計人功行八節日立春春分立夏夏至立秋秋分立冬冬至巳上日八方天真朝集校量罪福功過於上元八景宫中按真誥云此日皆當淨齊謀善以營於道之方內秋分日不謝過也不可以其日忿爭喜怒及行威刑皆天人之大忌也節㑹日甲午天節㑹甲申地節會甲辰四時節會甲子人節會甲戌五行節會丙午天會壬午地會庚午日會庚申月㑹辛酉星辰會丁卯仙真會三日斗辰會本生日本命神會巳上節㑹宜醮祭作福誦經即真降福應也五卯日乙卯丁卯已卯辛卯癸卯凡卯日受齊入室東向心拜存神飬氣期感神明亦通意而陳常行則玉女降符十方天尊天君下降日初一日東方天尊并九氣君降初八日南方天尊并三氣君降十四日西方天尊并七氣君降十五日北方天尊并五氣君降十八日東北天尊并梵氣君降二十三日東南天尊并梵氣君降二十四日西南天尊并梵氣君降二十八日西北天尊并梵氣君降二十九日上方天尊并一氣君降三十日下方天尊并九壘皇君降小月退二十七日諸真下降日初一日西北方北斗降初八日北斗月煞君降十四日東北方太乙使者降十五日三官降十八日東南方太一降二十三日南方太一八神使者降二十四日西南方北辰降二十八日西方太一降二十九日下方申太一降三十日上方太一降巳上出業報因緣經凡此日宜祭祀真靈四始日正月初一日四月初一日七月初一日十月初一日旦望日初一日旦十五日望或十四十六日合朝修太上大道君登玉霄琳房日正月初四日二月初八日三月十五日四月初八日五月初九日六月初六日七月初七日八月初八日九月初九日十月十五日十一月初三日十二月十二日已上日乃太上大道君登玉霄琳房四盻天下有志節逺遊忘者至其日平旦日出時北向再拜亦可於靖中自陳本願了咽液三十六過又云東海青童君常以丁卯日登方諸東華臺四望以此日向日出時行之可因此以服日精避忌日三月初九日六月初二日九月初六日十二月初三日已上日當入室不可見女人六尸亂則藏血擾潰飛越三神失守神凋氣逝積以致死所以忌此日非但遏塞淫泆而巳將以安女宫女宫在申男宫在寅寅申相刑刑殺相加是日男女三尸出於目朱瞳之中女尸招男男尸招女禍害往來喪神汙正雖人不自覺而形露矣損由三尸戰于眼中流血于泥九也子至其日雖至寵愛之女親愛之令婦固不可相對我先師但修此道而仙矣復不至親無心者此乃仙人劉搖妻女仙也口授之訣又别條云凡甲寅庚申之日尸鬼競亂精神躁穢之日也不可與夫妻同席及方語會面當清齊不寢警備其日遣諸可欲月忌日正月初二日又庚申二月初九日又辛亥一云辛卯三月初十日又甲戌庚戌四月初一日又癸亥五月十一日又壬子六月初十日又癸壬七月十二日又甲寅八月十二日又乙卯九月十三日又甲辰十月初八日又丁己十一月十五日又丙午十二月十三日又丁未一云乙未巳上忌燒香每日常行者不拘帝煞日巳小字注在前聖忌日丙寅丁卯道父忌壬辰丁酉道母忌丙申壬戌北帝忌戊辰戊戌南帝忌鬱八五絶日本命絶日歲星行年到日六害本命對日月晦日月窮日巳上日不宜行道燒香受死日正月戌二月辰三月亥四月巳五月子六月午七月丑八月未九月寅十月申十一月卯十二月酉龍虎日正月巳二月亥三月午四月子五月未六月丑七月申八月寅九月酉十月卯十一月戌十二月辰月將選時天罡太乙勝光小吉傳送從魁河魁登明神后大吉功曹太衝巳上陽日起大吉順行隂日起小吉逆行皆以本日支遁起空亡日甲巳日申酉乙庚日午未丙辛日辰巳丁壬日寅卯戊癸日子丑戌亥天門開閉時陽日隂時開陽時閉子寅辰午申戌為之六陽隂日陽時開隂時閉丑卯巳未酉亥為之六隂巳上時上章奏選開時用按古科齊直之日禁忌之條散諸經誥不可備述但切於修用略出而已設醮祈恩登壇啓事上章拜表首過謝愆皆可以其日行事若無請禱因此檢制行為去非寡過亦請修之一助也有如不可親之事不當食之物昏神亂氣濁穢身形豈可不屏斥也若躬行於道德之域心宅於沖靜之鄉夢寐不忘造次母失當此之際無時非齊又何日分拘耶倘身之不修行之不檢僣冒法籙違越禁忌則三官考罰五帝紏愆九祖同罪一身受考非道不慈戒之四等持齊一曰心齊謹守天戒心意同符內外合儀無思無欲無慮無恐翛然坐忘德同真人道合仙格二曰常齊絶辛去厭斷葷戒欲三曰清淨齊斷五榖絶人事居山川飲元氣持戒律忘塵根散胞胎杜交友四曰長齊乃是持巳上之三齊或一月兩月一年二年二十年是也以至始於立意終於飛升亦是也忌食五辛生葱韭大蒜小蒜葫萋按玄都定罪律太極科曰五辛食之念誦條戒內為第一罪謂修持諷誦觸犯神靈忤穢真氣獲毒蛇穿心獄報大槩以此等物辛臭烈甚食之經日尚臭出口對語於人尚且厭之而況朝真行事乎此外凡薤蕌似葱之類皆勿食也忌食三厭鴈天厭犬地厭鯉鱔鱉水厭科曰三厭食之永無仙冀外有鱔鱉之類皆腥穢之氣難退並不宜食又六畜肉禽畜胎卵不可食之食則傷生伐命尤忌猪犬不惟破犯齊戒科禁使人雖功德足備天門阻遏不令進驛章不達上玄惟道士病患食乳脯獐鹿鵝鴨魚脯而巳病安得不食亦佳矣局報禁忌師曰夫大法旨要有三局四報七禁五忌學士無犯則可造玄門之閫域矣三局一曰行呪者上天之密語也群真萬靈隨呪呼召隨氣下降也二曰行符者上天之合契也群真攝召下降也三曰行法者主其司局仙曹自有群真百靈各效其職不假符呪呼之而來遣之去也四報一曰智報智慧日生二曰神報神靈通達三曰意報意識不凡四曰仙報致於仙報七禁一曰禁口夫口不罵詈作穢言則呪法通靈也二曰禁目夫目不覷穢汙則目可視真靈三曰禁耳夫耳不聽淫聲則耳能聽八聰四曰禁手夫手不親穢物則訣目可通神五曰禁足夫足不履穢惡則躡罡可飛升六曰禁意夫意不起穢識則可以招致真靈七曰禁思夫思不起雜亂則存思致神明五忌一忌抱嬰乳小兒使法力不行二忌無事姮娥好事多成魔三忌凶悖怒神真只逺去四忌心不普功德無仙簿五忌不敬信則邪混於正戒律禁忌師曰凡修齊朝真皆當依式平時常檢飭躬行巳養成德性然後可以上通誠悃淪惑自戾殃及七玄慎之無上十戒一曰執心平等不得自欺二曰忠事君師孝敬天地父母三曰慈仁及物貪儉節身四曰清淨端直不得阿黨五曰敬遵上法深信修身六曰敬重鬼神不得輕侮七曰凡所衣食皆是元始祖氣不生外想八曰灰水蕩穢不用修飾九曰口誦心拜母使形勞十曰七日大定神光湛然見玉清境十二大戒第一善德不殺心生意想口言假手勸助教誘殺戮一切衆生皆謂之殺第二善德不害隂謀內譛諂賊外施穽陷網籠酷毒非法損害衆生皆謂之害第三善德不嫉懷怨用機乘勢說非願彼遭惡設方取物嫉害衆生皆謂之嫉第四善德不妬暗使私情願望勝巳色想欲擬陷害力去未能恨恨衆生皆謂之妬第五善德不淫非色非財不正真意六親通私淫犯骨肉不以私交私心意慕不論妍皆謂之淫第六善德不盜穿窬墻壁移號拆函開封擊鎖攺換印章私心隱匿貸借不還欺昧侵竊皆謂之盜第七善德不貪意無限情量度闊狹覩於萬物皆於尼有無足無厭更實其情不量分定求而無厭皆謂之貪第八善德不欲心猿欺耍意馬駿馳六根盤運使作七情慕生於愛擬定欲心皆謂之欲第九善德不憎偏見執著香臭淨汙妄想分别髙下貴賤不為一等皆謂之憎第十善德不𡜍情量疑慮過與不及心生狡佞邀阻不遂皆謂之𡜍第十一善德言無華綺第十二善德口無惡聲見行大定之道宜在定中觀心無心乃是真心觀形無形乃是真形心形既忘自入無形之道乃是白日上升之法九真妙戒一者敬讓孝養父母二者克勤忠於君主三者不殺慈救衆生四者不淫正身處物五者不盜推義損巳六者不嗔凶怒凌人七者不詐諂賊害善八者不驕傲忽至真九者不二奉戒專一凡欲尊敬上法濟生度死摧伏凶魔統制百靈須受如上諸戒當先歸身歸命無上三寶不得信從邪師影響幻惑妖妄外道魔鬼教法事類巫者歸依三寶第一歸依無上道寶第二歸依無上經寶第三歸依無上師寶如上諸戒皆金口所宣授受無犯諸天稱慶滅諸魔試克應飛仙若犯之地司飛奏三官紏劾五帝書過小則折算中則考校生魂大則罰功墮事除壽減祿退品仙階若非故違尚許懴罪惟忌秋分謝了勿得再犯再犯不原忽覺神意恍惚遍身沉熱四肢壯悶昏塞不安急須首謝三負不原所當戒之法門開度經曰仙道貴生無量度人上開八門飛天法輪罪福禁戒宿命因緣罪門十八條身則被殃殃及九祖長役鬼官金鉞前戮巨天後刑屠割鬼爽千千截首萬萬剪形墮地獄禍及七祖束首自亡束送斬馘束縛束形滅爽喪眼福門六十二條聾病開聰盲者目明喑者能言積逮起行痼疾復形髮白返黑齒落更生老壯少強皆得生成金玉露形枯骨成人全其本年真人誦經三條三元十過六條本命八節二條二章二條三界三條齊戒六條中篇前八條中篇後二十條禁門獨步玉京不傳下世有祕上天文諸天共所崇非世上常辭告盟十天而付上天所寶祕於玄都非世之常辭四萬劫一傳自然之章戒門異骨成親戒十二條齎金寶效心輕泄漏慢四條行道一條宿命門一國以道預有至心世世昌熾因緣門宗奉禮敬皆得度世供養尊禮與善因緣玄憲科格師曰功過罪福大則增減年壽小則促延齡算有三品九等皆太玄都天省禁文兆宜遵奉上等上格除增三紀上等中格除增二紀上等下格除增一紀中等上格除增十年中等中格除增九年中等下格除增七年下等上格除增半紀下等中格除增五年下等下格除增三年上等上格減益二百四十算上等中格減益一百二十算上等下格減益百算中等上格減益九十算中等中格減益五十算中等下格減益四十算下等上格減益三十算下等中格減益二十算下等下格減益一十算師曰凡小善小惡更有減益自十算巳下至一算者太極玄能真人曰能造三品上等之功不可冒上等上品之罪凡小善須令一日一注凡小惡須令一日一消積小善成大功消小惡成大善上等之功難造上品之罪不原學士誦之則享丘山之福慢之則獲萬劫之苦矣玄憲上品上格弒亂悖逆背叛蒸謀玄都律曰弒君弒父毒害師尊亂於天地五常道德綱紀毆悖君師父母怒毀違背師尊父母棄正入邪歸誠妖巫淫犯骨肉六親通同隂謀殺害並削名仙録罰功毀事上負九祖下及九玄中及一身永受風刀之考萬劫不原後生禽獸之身非人之報永無仙冀除壽三紀上品中格輕泄漏慢毀惡敗奪玄都律曰輕忽君師父母三寶尊像靈文又不依年限妄泄三寶三洞禁經祕奧法籙符圖漏泄天地五行䜟諱未然神真天機密諱禍福不恭敬君師父母典禁靈文毀壞三寶尊像君師父母常住一切之物毆罵謀害弒戮道德五功六親之人敗毀教業生不信心背奉面毀面奉背毀攺其節志奪劫奸巧攻取三寶聖典君師父母七德之人物色衣具並削名仙格罰功墮事負纍七祖九玄中及一身死入長夜三塗苦報永於千劫不原後生蟲癩非人不相之形除壽二紀上品下格殺害淫盜玄都律曰殺滅一切物命陷害一切生靈淫色無度夫婦不以禮交偷盜一切萬物並削退仙品罰功墮事負於祖考子孫中及一身死沉地獄三赦不原見世招盲聾喑顛不疼之相折壽一紀中品上格破齊犯戒貪欲嫉妬憎𡜍玄都律曰啖食五辛三厭飲酒過度故嗜六畜禽蟲之肉破齊私情茹飱葷穢入齊喜怒賞罰不節巧僞貪求無厭所欲紛紜無足妬於勝已憎其不及嫌害善人擬願沉惡狠恨𡜍懷力不勝彼常操願心並退落仙品三等罰功墮事九年除壽六年退齊一年補過善功一百二十贖罪中品中格狡佞苟妄惡聲華綺穢汙呪罵玄都律曰狡心百曲嫌疑多端苟欲施為奉上忽下佞於一時妄僞百條語言不實怒聲衝吼自尊自大背正信邪不明真假喜曲憎直細察求祈評論一切是非真假行住坐卧務於華綺性志不能返於朴素穢汙清淨五行葷穢淫語交集諸事呪罵誓怨天地風雨五行鬼神行諸惡呪並退落仙階二品罰功墮事五年折二百四十算退齊二百日𥙷過善功九十贖罪中品下格竊詐欺昧意欲諸惡玄都律曰暗中竊物負缺不還因借不償因便取匿拾遺巧智因公為私詐吉詐文取浮取實以僞作真幻妄鼓惑憍於天人欺心欺神暗中恣為內昧三光天地善人心思意想欲為諸惡並退落仙階一品罰功墮事三年除算一百二十退齊百日𥙷過善功五十贖罪下品上格玄都律曰賤毀五榖拋棄恩仁負盟負誓前汙絹帛不信不義不仁不慈無推讓之心無拯救之念無的實之約無和睦之情並退仙格三品罰功墮事一年退齊七十日𥙷過善功三十贖罪下品中格玄都律曰輕賤孤貧老幼不濟山林寒栖道士不修破壞未成功德不助善人困病衣食毀撅山林塜墓自安以勢逼脅危人不救斫伐生旺草木將有作無昧心罔人占卜天地星辰祥異侵近王侯勢力以智網羅生物奉上有乖撫下有缺香花自用崇修不專並退仙格二品罰功墮事半載退齊五十日𥙷過善功二十贖罪下品下格玄都律曰妄言天司真靈之言假說自巳德行希求恩福恐嚇世俗漏言行道取於人知移攺簽緘印章符書窺人私事啓封擊鎖記録小過踐踏按捺細微衆生罵辱卑賤醉酒呌呼寒餓傭使許願不償毒害敗毀五行之物橫入是非飲食務精鞭考六畜籠擊禽蟲香火不潔禮拜草創醮祭不潔章檄不謹敬尊失禮科章失儀並退落仙階一品罰功墮事九十日退齊一月𥙷過善功一十贖罪修真六忌臨尸吊喪新産刑殺所屠坊淫舍巳上處皆不可入李少君口訣云道士求仙不欲見死人尸損壞神氣之極人君師父親愛不得巳而臨之所以道士去世不事王侯是無君也塊然獨處是無友也惟父母師主不得不臨喪致感極之哀不吝性命之傷苟以此故而傷是無傷也吾其祕之故口傳焉太上視生隱朝元之道以本命日向本命方叩齒三通心存再拜呪曰太一攝生三氣合真宣胎上景毋玄父元生我五藏攝我精神下灌玉液上朝泥丸夕煉七魄朝和三魂右本玉華左嘯金晨令我神仙役靈使神常保利貞飛行十天呪畢心拜四方叩齒三通咽液三過若常行令魂魄保守長生神仙矣又法學道之士當先檢制魂魄消滅尸鬼常以晦朔之日庚申甲寅日清齊入室沐浴塵埃正席而坐得不眠者蓋善之真以朱筆㸃左目下以雄黃筆㸃右鼻下令小半入谷裏㸃時先叩齒三通念呪呪曰上景飛纒朱黃散煙氣攝靈邪尸穢沉泯和魂錬魄合體大神令我不死萬壽永聰明徹視長亨利貞呪畢又叩齒三通咽液三過以右手第二指鑷右鼻孔左手第二指鑷右目下各七遍盡隂按之勿舉手也如是畢況此二處乃七魄遊尸之門戶越精賊邪之津梁矣故受朱黃之精塞尸鬼之路引二景之薰遏淫亂之氣也此太極上法常行則魂魄和柔尸穢散絶長生神仙通氣徹視行之三年色念泯矣此太靈真人法淨穢法凡履厭穢諸不淨處當浴解之故三清諸法及仙人下遊有鍊尸之素漿其法用信葉十兩桃枝削去白皮四雨內白淨清虛之物以清水一斛二斗煎一沸出適寒溫以浴形體即萬穢除蕩次瘵濕痺瘡癢之疾竹者中虛內白桃者却邪折穢所以消形中之滓濁也天人下游未嘗不用此法至於世間符水呪漱升合之近術皆莫比此方也若淡者益住但不用此水以沐耳真竒妙也紫微王夫人授解穢符右符又曰攝穢符以梓木簡如朝謁簡樣但放微小耳刻符於上常護淨之遇食葷履穢或急切行持不暇洗浴當先用茅香煎湯七合潄口了㸃七㸃於左右手心內將兩手拭目念呪呪曰積穢隨水行盡從神聰出急急如律令次於聖前焚香叩齒四十九通執簡以攝穢符向身對口躬身呵氣符一呪曰穢氣出正氣入正氣存穢氣去三十六厭三十六穢神符攝盡絳宫寧一朗清神戶呪畢放簡便回身掐斗訣步斗至罡上吸氣一口剔訣以次府言此備急之法若登壇朝奏事體稍重又當從科沐浴也解生産穢法大抵道士自處琳宫一切生産自合回避俗士修真惟生子義不容逺合終月後方可解穢入靖悉如前法此外並合避忌違者考罰臨喪式假凡行持之士身遭大喪及父母度師並具申三天門下移文將吏閉靖不可焚修如遇事急切不及勒狀則關將吏功曹土地謄啓上玄大喪三年二十七箇月不計閏月此服制也道家惟忌厭穢尸既收殮穢氣巳隔則百日式假聽解穢入靖朝修服制自終三年舊儀大喪止一年既非服制之限不應廢缺朝修一歲之久如尸柩末殯寢處柩傍者不問日限自不應入靖也朞喪一月解穢申牒如式朞喪不臨尸大功以下不臨尸並三日式假解穢入靖朞功之外尸不當臨避之可也弔不可廢隨即解穢沐浴關申合屬收復將吏一如常儀出入遇穢回壇淨身符洞中玄虛晃朗太元三清玉勑光映九衢八方威神使我自然靈寶符命普告九天乾羅答那洞罡太玄斬妖縳邪殺鬼萬千中山神呪元始玉文玄水洗穢却鬼延年按行五嶽八海知聞魔王束首凶穢蕩盡侍衛我軒道氣常存焚符誦玉帝呪神靈天真玉液玄津上清革房元始老君妙入太霞光耀玄文七神飛泉北酆受煙我位上王辟合魔群八威吐火肅爾尊神千千去穢凶惡不存萬萬魔王保命護身急急如律令右符玉帝訣三遍天門氣凡建壇並用灑壇二匝大凡臨喪家值厭穢或生産回壇急書此符燒灰調淨水取東氣入水服之行道沐浴符太上神水真氣流通隂陽合明神燭旁靈穢氛清淨殂落無名安靜三尸久視長生與道合真沐浴三呪三呵攪水呪金醴玉津澡盥身形玄水洗穢清淨元神七靈衛侍萬氣開陳志慕清虛列象玄明急急如律令上清靈寶大法卷之八
