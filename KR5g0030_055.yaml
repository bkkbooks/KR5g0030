front:
  text: 上清靈寳大法卷之五十五寫四
  hash: sha256:581855445faf7778a074b96774b344754e32df416cfdcc0f7219b4eb6e5c3c82
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5g0030_HFL_055-001a, image: hfl/0959/0959-004.png}
body:
  text: 洞微髙士開光救苦眞人𡩋全眞授上清三洞弟子靈寳領教嗣師王契眞纂齋法宗㫖門正奏開齋宗㫖曰兆於靖室與精思堂坐立之初便定志存神化身爲元始天尊左右手剔玉清訣左右瞑目以舌噴炁于兩畔化二真人青衣冠簡裙珮上兆兩邉同行齋事凡舉動存念皆左右真人分治先次出布本司萬神法部官將羅列于壇墠上下聽令宣傳文檄符命次以雙手剔四山廵斗二訣化四驛庭列于壇下宛如陽間公治朱戸庭舍各有力士受事急令之吏持黄令旛旗守待逓傳符檄宣行命令等事凡承命時即駕霧星馳而去餘並准此奉行金龍驛茭龍驛風火驛金馬驛捲簾九清上帝乃虚無百千萬重道炁之上凡陞御座不可以目瞻仰謂如陽間帝王登殿以扇八柄遮之陞御座畢方開扇引班故先垂簾行持想上帝陞殿次宣文儀方許捲簾宗㫖曰兆具威儀詣地戸想壇殿有祥光罩合十方次面天門跪奏請意奏對想十方天真大神上聖髙真千乗萬騎從衛九清御座下臨壇場陞殿次以壇官出班宣通真表兆内運存思奏表朝謁次分序捲之兆上香焚趍玉陛符方隨班入壇行事金鐘玉磬夫金鐘玉磬之法召集髙功身中隂陽二神和合天地驅逐厭穢招集真靈啓格十方通幽逹明追攝䰟𩲸調集息度無致妄耗有二神以主之故開壇之初必鳴鐘磬以召集之交鳴者乃互出合爲一所以煉隂成陽秉志純誠無妄想無亂志則可招靈今人云祭金鐘玉磬亦不逺㦲陽神盧㑹之字炎靈身長八尺三梁冠烈火服右仗劒主陽間神祠淨天地穢驅百木精隂神盧同字永夫身長八尺三梁冠素服大䄂仗劒在黒雲中主隂間𡨋司諸獄亦能淨世間之穢絶隂府之考掠論曰鐘之形上圎而勢俯其聲清逺其頂蟠龍其從金鐘曰陽磬之形下圎而勢仰其聲重濁其座虎伏其從磬曰隂斯乃混沌初判則有人人音則爲三才之韻故道場獨用乎此夫龍興而致雲虎嘯則風烈從風雲慶㑹則萬聖咸臻龍虎交鳴則千靈悉降鐘俓九寸髙一尺陽數抱乎隂筭磬俓一尺而髙九寸隂數懐乎陽筭玉柱振鐘則因隂而聲清逺金槌擊磬則因陽而音韻和凡開壇之始金鐘先作二十五下以召陽炁玉磬次作三十下以集隂炁次鐘磬交作三十六下隂陽和合兆存神宣召隂陽通真逹靈等呪畢金鐘再作六下陽位居右則金雲洞虎真炁充於隂祖玉磬再作九下隂位還左則玉風燥龍真炁生於陽木金鐘再作六下陽位居右凡宣科當隔句一鳴大謝則一句一下隂陽之數句由於是遇拜須聞鐘聲拜興則聽磬韻乃升降之道也宣詞不下恐雜專文出官不作慮混其神道衆臨壇則先鐘音謂之左規齋官臨殿則動磬應謂之右矩凡遇法事先鐘而後磬以率衆儀故鐘磬聲韻發於左規右矩矣宗㫖曰兆運神風黙靄祥瑞之炁雙目閉運耳鼻舌祥風出接神風梵炁如水紋綵之狀光當左扣金鐘三十六下以召威兵右擊玉磬二十四下以集真靈中建法鼓十二通以聞上帝黙呪曰主神内列威兵外張雙景入眸口吐靈芒頭建七星足蹈玄綱萬精滅炁千妖自亡急急如律令次召二神焚召隂陽二神符并呪召之須光鳴自身金鐘玉磬當内存二神於身中然後可集也宗㫖曰陽神居兆手中三陽之神乃三天門之官也凡召出先運上頂室中丹府後玉府青紅玉三色炁交結自腦府上出結成芝雲接丹霄之炁一如雲霧内化飛鸞翔舞丹鳳歌鳴列陣齊升于天壇之側次運炁生化真中之真自上泥丸出升上丹霄雲霧之端朝謁虚皇上尊一相同觀方振金鐘以成陽九炁數既定以左耳相訪虚聲有象覺丹霄之中鏘鏘鐘聲分應交感玄壇隱韻鳴徹宗㫖曰隂神居兆右手三隂之官乃隂生梵唱天門之玉女也在身中爲精炁神運化一出升布于前次存三真人玉女各布青玄之炁結成厚炁狀似水沼蓮頃白炁如雲霧盤結交合丹霄之炁濛罩玄壇日月星斗光芒微見次存天廷與兩耳左右鼻穴各出衆色之炁漸升雲霧之際化爲龍虎二形目顧鸞鳳吟嘯齊臨龍虎神君分班上下方擊玉磬合九陽之炁數了跪奏隂神之際以目乍開乍閉微瞻天表耳覺聲鳴其磬下應瑶壇格動十方次行交振隂陽之聲雲炁方始開霽並無一㸃塵翳一聲擊開以成天地破其混沌分相朗然四方靈風鼔奏祥風瑞雲飛結瞻見天樂鈞奏九空之中三境齊升十方朝謁此天炁升地炁騰隂陽判作成功業建立天地之像也鳴鐘磬太真科曰奉行上道講演經典建齋行道悉先叩擊鐘磬非惟警戒人衆亦乃感動群靈仙真神人相關同時集㑹弘道濟物盛德交歸諦心存神與巳相見調槌上擊從微至著數一十二二十四三十六手執鐘磬槌先祝曰圎槌震法器流聲遍十方入下通長夜登髙響玉房九幽聞離苦七祖上仙堂先鳴三下發長芽之音應陽數生於一成於九次引九下震瓊瑶之響三下者上聞清微禹餘大赤之三天又三下中應慾色無色之三界又三下警地獄餓鬼畜生之三塗界也長歛二十七下九下通九天之道君九下覺九宫之真帝又九下招九幽之苦爽合四九三十六下上聞三十六天帝中應三十六部尊経下徹三十六獄若不依法非惟有犯𡨋考一則人聞可醜二則節制失常玄科律云專在都講舉唱如都講行事不唱被紏並同罰香一斤准禮二十拜請光宗㫖曰兆於建壇日午時書請光符二道包末香面離方左持鏡右捧符符鏡相向黙呪曰日䰟朱景照韜緑映回霞赤童玄炎飈象以陽燧火却以符一道蘸油然作炬於香上吹㸃次㸃元始前燭自此三晝夜五晝夜七晝夜終於四十九晝夜皆不可暫滅候欲盡再以燭續之如遇天色隂晦以木攺火爲之故日中真火可以下徹九幽上可以騰輝光於三景光耀福庭也分燈夫欲薦㧞隂靈照破幽暗之燈須得慧光之法方能降三光之慧以接凡火之光方能追攝受度如無此法只是凡火之光不能超脫矣宗㫖曰兆於正齋日午時面南對太陽焚香口奏吸炁吹筆以黄紙九寸朱書慧光符一十二道玉清訣東方炁以䗶封作炬子應發燈光用之欲燭三壇寳燈先以陽燧候日南宫方照華陽念太陽輝神呪曰明哉太陽輝神光洞三清炁散玄漠内靈煙生紫庭控御乗風霞飄飈凌無形急急如律令呪畢以陽輝燧取太陽正炁燭一燈於元始之前宗㫖曰兆運化天壇之中既天地分判天樂龍虎隂陽成象了念重隂拘囚隂翳未覩光明髙功出班至元始前上香三禮黙誦明燈頌畢一人宣科侍燈立左侍香立右髙功執符火炬於元始前請降寳光存元始允奏想金光如杲日流金透徹寳篆之上百色光明混合自兆一身結化大日圎輪金光迸透内外滿壇運元始上宫化一炁如金碧虹蜺上接丹霄元始頂中一炁交合吐口中金光若日升透轉下壇直至玄境之前虚皇之下光隔于側存寳光運動想金樓朱戸龍虎交盤方允所奏易晷日月星斗光輝流于寳光之内煥然開闢金戸朱宫寳光流出洞煥天壇之中次以符炬於中燈光内㸃先運一生二二生三次侍燈三禮受燈於師前㸃侍香亦三禮受符烥遍十方㸃分班㸃畢三師回各三禮納餘炬并爲一髙功三禮焚於元始前爐中存諸天上聖同布祥光迸徹十方内外上下山林河海官舍人門水火隂牢陽治關獄上徹九天下輝九州九地重隂極惡逐處皆承寳光洞照開破悉爲異境致於建齋之所内外人物一切皆在寳光之内所謂十方世界悉皆洞明朔獄幽牢無不煥耀須㬰光炁皎聚於中寳光之内懸浮在天壇中分散燈燭了開啓行事畢旋以鼻目收光徐徐引吸入真中之形回丹房上泥丸之内納真按三元簡文云玄都品格然燈功德可以上徹諸天下照重隂中照八方助三晨之明輝消九土之灾厄回天尊之慧光㧞重隂之苦爽陽光一照萬苦停酸鐵城摧毀蒙光開度矣次黙誦㓕燈頌乃得一生三之道復命歸根之法得一生三者乃侍燈侍香各執一符就髙功手中分光然後㸃也玉清生化分布慧光呪慈悲寳篆玉笈飛烟華燈布散普耀重泉三界朗明輝散十天重昏沐炤惠及無邊今日大慶脫苦升仙道生一炁萬物生全元始威章生化自然急急如玉清上帝律令三光訣然燈了念燈呪太上散十方華燈通精誠諸天悉開耀地獄皆朗明我身亦光徹五臓生華榮炎景照太無遐想通玉京開啓宗㫖曰夫開啓奏告上帝髙真關白齋悃兆出班請水淨壇畢入地戸宻呪至主爐三上香焚降真召靈符運化千真萬聖浮空而至鑒察齋誠存用呪訣同三朝用請牒宗㫖曰開啓巳畢兆隨班詣師幕上香請師再拜跪奏宻運師真恩光下臨鑒觀齋事請降申奏牒文符檄關盟三界普告十方申發正奏宗㫖曰凡發正奏文撽須當召役萬神先化巳形焚香正中立雙手發十天訣擡於天庭上彈去正面吸炁一口布在左右化身爲元始上帝黙祝化形呪元始上靈九度欝青朝謁藏形灌煉生輝宫駕六合使我飛升七神分布永保遐齡急急如元始上帝命三宫訣剔去次取水盂取正炁一口吸在水中想素靄之炁如細雨宻霧流絲之狀注水盂中洶湧次微念淨天地呪周匝洒淨了次黙念發罡呪歩召役萬神罡搯玉清訣於心前陽日先左足隂日先方足靈寳召役萬神罡發罡呪靈寳上聖緫運仙靈罡飛星耀朝謁帝廷急急如玉清上帝命呪畢剔玉清訣次念五帝安神呪青帝護䰟白帝侍𩲸赤帝養炁黒帝通血黄帝中主萬神無越靈罡上奏萬神森列急急如元始上帝命搯本日訣召日直功曹先至靈寳大法司焚香關召日直功曹使者聞今召命速至行壇焚功曹符念呪玄曹玉文立功之官主治玉清奏報三天上帝敕命速下神光謹召某日功曹依律奉行陽晶飛耀景耀神廷隨炁一召上徹丹霞召日旬直功曹呪玉府靈曹伯吏陽精日旬使者聞召速行急急如元始上帝命剔功曹訣本日旬時取西北炁存自天門乗雲炁而下羅列壇前次指揮宣召諸天承受玉女靈官本司萬神赴壇召仙曹大呪玉清有命緫召仙曹三十二天三十二帝青天魔王巴元醜伯赤天魔王負天擔石白天魔王反山六目黒天魔王監醜朗馥黄天魔王横天擔力五帝大魔萬神之宗飛行鼔從緫領鬼兵麾幢鼔節遊觀太空自號赫奕諸天齊功上天度人嚴攝北酆神公受命普掃不祥盟言誓化上奏虚皇急急如元始上帝命右法搯八門至中宫午出召仙曹緫章呪髙上之天玉清爲主玄罡大魁太玄生府中有帝君靈虚玉毋統制嘯詠玉文金符司治仙禁金童玉女校精辯魔統制伯史上逹三天形成司舉博士大夫傳奏教令蠲救疾苦備衛護道囚縛鬼侮流泿諸天濟生度死解厄推恠通逹紫府十天誥命召其所主急急如上清靈命元始上帝律令焚降真召靈符召三界萬靈符召赫奕萬神符召集萬神啓運符召諸天承受玉女上奏靈官呪靈寳大法炁化生神玉女靈官升降帝廷承符捧奏俓升玉清急急如元始上帝律令寅卯二訣右瞻月光之炁靈寳神化呪赫赫煌煌戴天履地隂陽通合四季全合三光緫化太一敕命隨化増長急急如元始上帝命右呪三遍剔中文召本司萬神呪三十二天三十二帝天中大魔天中之光九和十合變化上清聞兹告召速離帝廷天帝敕受急急如律令三宫訣東炁緫召赫奕萬神呪晶晶靈靈炁化真靈虚皇緫炁普降宸廷神升炁降炁合真精急急應吾召急急應吾聲急急如玉清上帝敕金闕玉房大梵穹皇聞兹告召速至感通鼓節麾幢降于雲漢乗風馭炁來自浮空泥丸絳宫玉室金堂三部八景四體百神昻昻而興濟濟而至森然混合羅列壇場承玉清命應化祥光急急如元始上帝敕十天訣發三宫出運化官君上下升降存自丹宫赤靄光華如日光落照迸透孔穴如琉璃之狀奔升至十二樓以舌噴出一炁結如日輪在前萬神麾幢鼓節並在其中矣再呪