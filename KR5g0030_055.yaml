隔爲三幕設三香花案如法遇有叅竭並當中相通行事若如此則東一幕移玄師居中天師左三宫右西一幕五帝居中三師左監齋右盖三幕并爲一則當以中爲尊而左右相次也靖室髙功行持書篆符籙之所中列天真皇人黄籙真宰符籙中典籙靈官等供具如法於預告日先次鋪設誦經堂中設三清三寳之位香花如法畢陳臨齋之期率壇官逐日於此轉誦經呪𧇖號事畢具䟽宣懴十二堂陛夫建大齋當先建十二堂陛召集髙仙真靈建齋行事且十二堂者一曰青華之堂二曰神虎之堂又爲聚魂府三曰紏察堂四曰精思堂五曰冥官堂六曰監生司七曰天醫院蕩穢所八曰受煉司九曰黄籙院十曰受生案十一曰五道都府十二曰通章司又有監臨所監壇所官將所受度堂普度堂各有官將名位行遣儀制悉遵法式行之此乃分司治事青華救苦堂凡受詞之始名爲立誓投誠捨金贖亡者之罪求哀㧞度髙功備詞入靖室寫通天救苦表如拜章法飛神上表預祈恩霈先立青華之堂中設青玄上帝供儀一一具備次颺青玄寳旛以青繒造之長四丈九尺用脚九條各書九龍符命中央一條周回八條湊成寳幢按九州分野申飛龍騎吏虚空鑒察應感靈司焚九龍符命九道赦九州分野焚開壇䟽掛門迎大榜發預告文字如式堂之中安碧落空歌圖毎日焚香誦救苦頌至期開壇九時行道而朝禮之則天尊慈悲尋聲赴感立降玄壇而施救苦之心矣九朝吟救苦頌焚碧落空歌符佩魔王之章青玄救苦頌三首天尊發願大慈心救苦方方化善因五嶽四司皆禀命酆都地府盡停刑真符告下咸䝉赦童子傳宣赦罪人元始化身真妙相度人無量道方成二天尊誓願度衆生說法端嚴坐寳林獅子九頭分瑞相慧光一照廓幽隂刀山劒樹皆摧折火翳風雷悉罷停大惠大慈無量力鄷都地府盡瞻聞三天尊慧力拯隂靈救苦尋聲破鐵城弘濟無垠隨願度光明普照逹幽扃惠風扇處炎相滅法雨沾時發朽榮無量慈悲成救度亡魂俱得面慈尊神虎堂聚魂堂凡建大齋於預告之後或審秦之時或建齋之日前期於艮戸卜一室立神虎聚魂之堂中置神虎聖位攝召官將香花如式堂之左右以新土立陽耀通關壇於左隂靈攝魂壇於右方圎各三尺六寸打令匀淨平正壇中立監獄使者位牌仍以雌雄二印安隂陽二壇之心備玉札關牒文檄仍以綵畫三使者形及符又逐一具受度亡魂姓名甲狀一一周備如期行事如法存神步罡召將請聖㸃酌三獻宣告玉札符牒依式以劒畫隂陽二壇堂之中立入門聚魂壇相去入尺一仞地壇心安水盆浸鐵跡臺光寳章中安名亡旛左立鐵跡旛右立寳光旛遇召亡陽人以鐵跡招之隂人以寳光招之香卓上安淨水香花并安監引童子符及神虎諸符立壇畢方發玉札甲狀焚符存用指揮官將攝魂赴壇現跡並如本法呪訣行持畢發遣宫將噀水以玉札使者甲狀關牒同錢馬焚之次封閉堂門勿得令人物出入門外以榜約東將吏至期名亡畢以追魂現形通現通幽通語等符先用西流水沈在壇了此時却取水噴噀壇之四面一切魂識立見真形與生人通言語歷歷可問不宜悲泣若歡喜盡現其形沐浴朝參受食聽戒傳符訖縁煉度日逺恐亡人怕生人陽炁散亂隂魄再以旛引歸聚魂壇開死門入遇起靈受煉開生門出壇式符篆呪訣行持並見神虎集中紏察司夫置此司盖欲昭掲憲章紏彈愆失警壇衆齋官欲其恪守規範毋障齋功中設五師三官之位香花供養正齋之日先立之兆謁奏㸃酌請聖宣䟽進錢馬如式九朝彈斜焚降真召靈符精思堂凡開壇蕆事此室爲先又曰靜黙堂存真堂盖欲壇官整肅威儀安神定志一念修爲無諸妄想登壇出入不可暫捨中設髙座供養真師列齋法祖師之位及髙座几案髙功居之六職衆官以次兩旁排列宜先立之九朝諷天童經焚召飛天神王符飛天神王呪洞玄宗先靈枝之元太一左史御炁非烟雍雍㑆㑆衮服飛仙一瞬十極緫御萬天阿繿那易婆泥曇延逺落那顧厥淪孛連乗命五晨侍令侍壇爲宣化度如律如編冥官堂凡建齋未破獄之先當設𡨋官醮如陽間獄吏之比也先立此堂中設青玄上帝左右列東嶽酆都十王𡨋府案掾香花如式至期設壇依科行事九朝諷救苦經焚十方救苦天尊符監生司夫普度大齋廣濟沈魂其中如有生存懐孕胞胎不解子母禾分或子存而母亡或子母俱亡似此之徒何縁解脫當先奏聞九天生神大帝申聞九天監生司仙宰正齋之日立監生司兆先詣司請召㸃酌啓祝俟召亡赴幕請上聖監生斯可臨壇受度安監生真文於案上使亡人見之自然百骸流光攘郤尸穢之光矣九朝焚巳生未生符十天玄化符蕩穢所凡受度亡魂其有産亡之者沈墮血湖形骸穢濁雖賴天恩曲赦得赴玄壇血殗未除何由受度又有男女魂衆或生前受疾癰疽膿血王法誅夷刎縊刀兵殺傷屠戮虎啖蛇傷似此之者皆是帶血身殂欲赴天醫監生合先蕩穢宜先請降官吏至期建立此司請聖屯駐㸃酌諷經候攝亡到司焚符運化爲蕩穢血方可監生醫治九朝焚凈天地符清神符天醫院契勘亡魂内有存日受諸病苦盲聾喑啞跛痾拳攣王法刀兵水火刎縊虎狼蠱毒雷馘刑亡䧟穽殺傷碎身殞命一切形相不完致於産死腥血交流子母未解者當先請降天醫下臨救療亡魂兆先立司幕預請天醫官宰俯降靈司依儀安奉候召亡至司兆以符呪運用請天醫拯治完全俾令返本還元赴壇朝真聽法九朝焚召天醫符召天醫呪北帝之上隱元之傍天醫使者下濟黄房拯治亡殁體淨身康承符而召急急赴堂准上帝律令斗訣天門炁受煉司廣成古科無煉度之儀近世此科方盛或别立一處煉度與道場了不相關又有於道場中上帝前行事又有對上帝前行事廊筵相對只加設煉度官將仍設木公金母九天諸位道場中皆巳有了故不别設旣無定式今當遵行師訓於道場中左右列煉度將位次設醮行科煉度或别所設之却於中間立上帝聖位兆先依式建立至期引魂赴司行水火大煉也然古者朝奏之規以壇爲重今既立壇行事豈宜别設稍稍礙理所煉度隂魂誠爲難事所資者祈告真靈請降二炁符乃召炁之信呪乃天中之音然後運一已之神炁合二象之生津煉化枯骸形神俱妙其可他取乎此本科之意也九朝焚盟真玉匱度魂韓君真籙召煉度司官君呪戌亥午訣金晶一化緑靄散陳玉司官吏蕩質煉形急急如元始上帝律令黄籙院九朝焚九幽赦罪超生金籙召黄籙院官君呪元景飛光敭奔上清三元籙使立降無停升度善功耀發幽𡨋上帝有敕升濟通真急急如虚皇上帝律令中文東炁存官君千萬人金甲黄衣功曹上吏乗雲下降受生案九朝諷得道經焚回尸超死符五嶽破幽引魂符五道都府九朝諷中篇焚太一玉帝託生籙通章司凡拜奏寳章須仗從事靈官齎捧引進上逹宸廷兆先立此司中設三天門下諸靈官聖位依儀安奉候登壇拜章並於斯設靈官醮然後上章九朝諷天童經焚開天符召九靈飛歩官君呪光騰萬化飛歩三天陽晶洞華正陽自然玉文視對玉府飛仙急急如上帝敕巳文東炁官將所開壇蕆事威禁森嚴拜表上章騰詞奏檄頒符度籙請命祈恩皆官將之所宣行與夫壇場内外合干事務人物觸犯一切不祥凡有違碍齋功者亦由檢察也兆先建立神司關召將吏駐劄専切監臨明彰報應歷關懇願通逹齋誠接引亡靈赴壇受度事畢言功遷賞依式罷散焚召赫奕萬神符萬司如意大將符靈寳諸司官屬符召三界萬靈符召萬神呪晶晶靈靈炁化真靈虚皇緫炁普降宸廷神升炁降炁合真精急急應吾召急急應吾聲急急如玉清上帝敕右召役並同發正奏用監壇監臨所夫建壇之所無非塵俗之區有諸妖氛故炁及不信大道㐫頑之軰葷酒喧閧干犯壇禁孰能禦之當於外門左右敷列壇場専請威神城隍廟貌及髙功本法隨宜合用官將同共屯駐翊衛禁壇監盟齋事懲戒輕忽斥逐不祥祗奉帝真證明開度使人徃來起敬起慕無障齋功事畢言功如式焚監壇所符召靈寳監齋壇諸神符里域司凡關召敷奏傳感上玄故建齋壇土地爲首宜設位遥對壇前或在壇之西列城隍土地里域正神香花崇奉如式或合監壇官將作一所亦可隨地闊狹施設可也焚召土地符受度堂凡齋主建齋遷㧞九幽先須洗滌玄祖當對壇所設九祖七玄及係薦亡靈之位齋饌奉供逐一具備杜廣成科令立於東南上或就别室亦可不宜執着俟召亡朝真畢引靈受食受戒之後煉度畢方徹之普度堂凡普度幽魂於催申日建茭郭立四門白茅盖頂青幕四向近郊野外近水際爲之尤妙四面作城土硃染畫令匀中作臺要二層用物疊一臺中安水盆浸鐵跡臺光寳章中安斛立六道孤魂之位四門飯食酒果餚饌一一鋪陳宗㫖曰兆立茭郭先須洒淨存身爲元始面東立乗紫雲吸青炁握玉清訣手執旛三召丁罡立念呪旋行遶臺歌斗章引魂遶四門轉三匝沐浴化衣再廵門從西入面天尊朝禮畢立旛於中焚符解穢召將彈壓方依科施斛告戒兆黙運玄元始三炁結交氤氲如金玉光明變食存用如法科畢傳符未要送靈且仍然就内供養直候起靈煉度再往茭郭四門召出東弗于逮南贍部洲西瞿耶尼北欝單越上清靈寳大法卷之五十五
