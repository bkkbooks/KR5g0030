front:
  text: 上清靈寶大法序鬱一
  hash: sha256:050165ed65b318ea0977de4b63dc0e66107d912fb238c75a44500609543f4301
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5g0030_HFL_000-001a, image: hfl/0942/0942-004.png}
body:
  text: 古序昔我祖師元始天尊大慈悲憫廣濟羣生歷劫度人先天立教隨方應物不狗於三境九泉布化流形豈限於人間象外自龍漢淳古之世教之以大乘逮延康朴散之時授之以中法大乘則無為無事任物自然中法則有怠有勤因機善誘洎開皇以後赤明乃還俗變澆漓人隳真素忘緣棄本溺性迷情背妙有之玄功失自然之奧旨由是方諸闕下多虛青簡之名酆都臺中益盛黑書之目淪謝者崇朝接轂升騰者千載比肩大軫聖慈遽兹開度所以三元品誡四極明科三洞四輔之經隱地藏天之籙女青玄都之律八瓊九鼎之文金真八極之書鳯氣龍章之篆柔金水玉之法開明震靈之符五老䇿精之文八海登真之篆大劫洪真之札靈寶召龍之篇正一救世之章洞神開山之印上清八景之訣玄真曲素之辭太平左右之圖洞玄智慧之品乘蹻躡虛之術攀魁據斗之罡或檢制身心或蠲消罪垢或吞芒餌景或錬氣胎元或封山召雲或坐忘遺照開萬塗而汲引垂衆法以提携欲令抱識懷生皆登道岸豈止簮星佩月獨詣仙庭乃出三五章儀河圖醮法拜表上章之訣罡風驛騎之司凡居世間有所謄奏即日月主者里域真官乘彼驛龍聞于天闕雖上天敻逺下土卑凡感而遂通靡踰瞬息矣斯則大道救物巨細無遺請福祈真齊法為大齊有二十七等備在三洞經中則三洞各九品齊也內黃籙齊者遐福羣有廣救三塗報應之期影隨響答古今所驗實繁其人然以精專為先龍綵為上香煙處潔抑又次之苟有一缺亦齊之瑕玷也修奉之士得不慎哉且黃籙之法拯度既多君臣通修人天普福隨其所為理趣多門又經云三洞布化遍滿人間行道修齊因宜立教人間天上久矣流行若帝王國主人民土地一切衆生有諸災厄應當消却召諸道士及以女官或多或寡廣立瑶壇懸諸幡蓋散花燒香然燈照夜行道禮懴晝夜六時勤勤不息克獲靈應福德普臻經曰黃籙者開度億曽萬祖先亡後化處在三塗沉淪萬劫超凌地獄離苦升天救拔幽魂最為第一此經隨世所求即可修設或三日或七日一時九時奏簡馳誠上天無不御逹且靈寶者是大道之根宗元始之妙化虛無挺秀劫化自然隲配隂陽區分造化保安帝祚鎮護天民握運璇璣恢弘妙旨總五帝大魔之法召萬天合元之司濟度存亡統隸三界按梵氣而為符篆敷奧義而作隱章祕在蘂珠之宫禁於華堂神府諸天至重萬劫一傳遵奉明科俯仰有格非宿生之大慶豈造次以能聞得遇進修實為際㑹可以召靈氣於三關靄寶華於九戶功滿德就位列仙翁起死回骸歸真返本人天欽仰變用無方招真召靈洞該三道所謂巍巍大梵萬法度人之上品者也謹序玄序元始祖劫為天地之根宗靈寶開圖總隂陽之樞紐推曰月變通之理統星罡𨇠度之機妙集璇綱提携子午還五行之造化追三氣之魒魁進退乾坤飛旋離坎擒龍伏虎控鳯乘鸞朝飱紫府之英暮食青華之液煉形流火灌質東池六龍飛蹈於層霄九氣攢烹於玉鼎道之生我物無定為棄物流形則氣神交而真自徹釋情養浩則精血通而氣自凝真火髙奔飛扶丘之皎日水金拘制旺玉闕之蟾蜍八鸞同鳴讃空歌之雅韻九鳯齊唱揚十絶之玄音俯仰靈阿十方之天真自集朝參太上萬靈之羽衛飛軒黍米髙懸變通莫測包含虛昧則無鞅數衆咸歸濁競奔趨則萬氣千真盡散集氣為寶聚神為靈乾健純陽坤柔隂質自然之氣無形無名上極九清以氣假名為號下徹九地以形别號為名是知杳杳𡨋𡨋恍恍愡愡寂然不動感而遂通二氣回旋隨天地應時而動三田通妙感隂陽運轉而為靡在他施何勞自逸存神叩齒警初真入道之門鍊氣書符明學士守規之式欲餌吞於九轉當造物於四時回運周天交媾水火烹金鑄鼎錬石𥙷玄盜日月之英華結神真之鉛汞先明子午次辨水金進退抽𣸸知時適候溫調養育烹錬無差勿殺善以欲貪勿嫉妬以淫盜逺憎去𡜍異骨成親濟度天人闡教凡世通玄究微悉章洞慧束魔卻惱斷六根障塞之源捨妄從真滅五苦輪回之戶拘魂制魄養氣藏神身有光明形無影響開明三景離合自然髙晏鬱羅萬劫蕭臺聳冠飛升金闕玉山絶境逍遙飛駕瓊輪十氣飛天自現控乘緑輦諸天五老傾光疾除罪簿之因落滅惡根之道妙乎兹法故品諸經提悟迷荒救携未悟吾昔遇清微丈人授以二氣吐納次遇於玄皇玉帝賜以金丹訣言明天地權輿之數了隂陽生殺之機衆卉百花盡守根而固蒂竒禽異獸咸抱一以含元故知顛倒五行翻覆四象盜元一飛玄之氣守真精妙體之英建寶鼎於崆峒飛金晶於靈洞媾內外之水火合上下之刀圭元氣周流感元黃而玄珠光耀包藏宇宙含金丹而資用無窮是知天地之獨尊變化之無形無質乾坤之妙道生死之無始無終道勿逺求不出戶牗親之者鮮逺之者多棄本妄真甘樂忘於泉壤入邪於正徒度夏以經冬靜以生强安而思極七情鼓扇陽絶隂化而性命危六欲觸耽精散形離而神氣泯五臟搖蕩九竅開關靡知性命之端竒偶相配何明造化豈辨玄機吾啓大慈願提仙子將兹神氣集號玄章故名靈寶之筌蹄以應真經之內法付于妙行出世度人化現十方名號非一編諸經典遍滿恆沙句句為玄頭頭是道悟兹妙理則出生入死而與道俱存了此真機則離合自然而去來無礙遇之者夙生仙骨行之者纍世慶緣誤謫人天慮差覺路指明圎定證悟法門行道祕藏了真可度謹序
