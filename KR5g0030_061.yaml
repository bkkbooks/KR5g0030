front:
  text: 上清靈寶大法卷之六十一禽一
  hash: sha256:5129502959667a8275c027a18bad734f7c551e27d3200b1b6889410507a530ff
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5g0030_HFL_061-001a, image: hfl/0961/0961-004.png}
body:
  text: 洞微髙士開光救苦真人寧全真授上清三洞弟子靈寶領教嗣師王契真纂審奉門奏昊天具位臣姓某昨據齊主某投詞乞就某處崇建無上黃籙大齊追薦亡某等魂及下元苦爽同遂生方事臣領詞難抑巳於某月某日先揚寶幡謄詞上奏預祈赦恩宣示冥陽停囚罷對今者齊事扣期合就齊所建立神虎攝魂壇追取上件亡魂前來受度除具録合㑹係薦亡魂姓名申聞都省嶽府等處乞照應釋放外臣不避誅鉏再具狀奏聞者右臣謹謹具狀再拜上奏太上開天執符御曆含真體道昊天玉皇上帝陛下伏望天慈允臣再奏重頒敕命下泰玄都省宣付三界十方天牢地獄一切神司將亡過某等交付承行官吏部領來詣攝魂壇屯聚以伺建齊承恩超度冒犯天威臣下情無任俟恩之至謹狀年月日具位臣姓某狀奏奏北極具位臣姓某昨據齊主某投詞乞就某處崇建無上黃籙太齊追薦亡某等魂入意同前具狀奏聞者右臣謹謹具狀再拜上奏紫微中天北極大帝御前恭望天慈允臣再奏特賜睿㫖頒下中天斗府宣降太一玄冥神虎混元玉札仍乞敕命神虎大聖玉女使者追魂吏兵齎持告下十方三界主罪主考主録去處追取亡過某等及帳狀內該度亡魂赴臣所立攝魂壇現跡報應以伺建齊上承恩霈受化更生冒犯天威臣下情無任俟恩之至謹狀年月日具位臣姓某狀奏奏東極具位臣姓某昨據齊主某投詞乞就某處崇建無上黃籙大齊追薦亡某等魂入意同前具狀奏聞者右臣謹謹具狀再拜上奏東極宫中大慈仁者尋聲赴感太一救苦天尊御前恭望道慈允臣再奏重頒睿㫖普告三界十方重隂幽獄應干去處其有囚徒苦爽經劫未原之者咸乘慧光開明長夜依時釋放來詣臣所立攝魂壇現跡報應以伺建齊上承恩霈受化更生冒犯天威臣下情無任俟恩之至謹狀年月日具位臣姓某狀奏申北斗具位姓某昨據齊主某投詞乞就某處崇建無上黃籙大齊追薦亡某等魂入意同前須至申聞者右謹具狀上申北斗髙上玉皇尊帝太微玉帝北極玄卿大帝大聖北斗七元星皇君北斗九皇夫人北斗玄冥大一夫人聖前伏望聖慈允兹申懇特賜聖㫖下玉府玄曹頒宣玄冥隱書混元玉札差降神虎大聖玉女使者追魂吏兵齎持告下十方三界主罪主考主録去處追取亡過某等及帳狀內該度亡魂赴所立攝魂壇現跡報應以伺建齊上承恩霈受化更生冒犯聖威某下情無任俟命之至謹狀年月日具法位姓某狀申申都省具位姓某昨據齊主某投詞乞就某處崇建無上黃籙大齊追薦亡某等魂入意同前須至申聞者右謹具狀上申玉清上相大羅無極神公泰玄省主三天大法天師正一靜應真君泰玄上相天機上相天機內相天樞左相天樞右相聖前伏望聖慈俯垂省覽再乞謄奏三天請降敕命併所申玉曆頒下三界十方天牢地獄應干去處照㑹姓名如數釋放交付神虎官吏部押前來所立攝魂壇現跡報應以伺建齊上承恩霈受化更生干冒聖威某下情無任俟命之至謹狀年月日具法位姓某狀申申東嶽具位姓某昨據齊主某投詞乞就某處崇建無上黃籙大齊追薦亡某等魂及下元苦爽同遂生方事某領詞難抑已於某月某日先揚寶幡謄詞上奏預祈赦恩宣示冥陽停囚罷對今者齊事扣期合就齊所建立神虎攝魂壇追取上件亡魂前來受度除再具奏天廷及抄録亡魂玉曆申聞都省乞頒行外所有該度合干名數生死因依今具帳狀一本隨狀見到須至申聞者右謹具狀上申東嶽天齊仁聖帝聖前伏望聖慈再垂省覽特賜聖㫖下嶽府合屬曹案檢㑹帳狀內鄉井姓名傳報冥曹幽獄應干拘囚去處不論業報淺深有無綰擊巳未結正普該赦恩交付承行官吏管押來詣所立攝魂壇現跡報應以伺建齊上承恩霈受化更生干冒聖威某下情無任俟命之至謹狀年月日具法位姓某狀申牒州縣城隍靈寶大法司牒上某州縣城隍主者昨據齊主其投詞乞就某處崇建無上黃籙大齊追薦亡過某等洎下元苦爽同遂生方事本司領詞難抑已於某月某日先揚寶幡上聞齊意請頒帝命普赦幽沉併備牒貴司知委今者齊事扣期合就齊所建立神虎攝魂壇奉行混元玉札追取亡魂赴壇受度除再飛奏天廷及具該度姓名帳狀申聞都省嶽府外須至專牒者牒候到請詳巳牒事理遵奉敕㫖玉札照應神虎官吏備去姓名即今當行曹案轄牒合𨽻去處根刷上件亡魂毋問罪業重深𡨚愆報對普行釋放差神吏同共管領來詣所立攝魂壇現跡報應以伺建齊上承恩霈受化更生牒請依應施行謹牒年月日牒具法位姓押關神虎北魁玄範府昨據齊主某投詞乞就某處崇建無上黃籙大齊追薦亡過某等洎下元苦爽同遂生方事當職領詞巳於某月某日預奏天廷取㫖頒行及備牒神威先次搜訪今者齊事扣期合就齊所建立神虎攝魂壇追攝上件亡魂前來受度除再飛奏三天及抄具玉曆申聞都省嶽府乞照應行下外今准中天頒降太一玄冥混元玉札併將該度亡魂姓名開具甲狀隨關見發須至關者右關神虎提魂攝𩲸倒生玄司玉女蔣等七人七名並用朱書於下塗之雄左玉曹主魂吏何用朱書塗雌右武鸞主𩲸吏喬用朱書塗即請檢校主魂主𩲸簿書部帶三部使者及本壇所差追魂吏兵齎持玉札隱書徑往十方三界生方死府陽庭隂獄應干主罪主考主録去處照甲狀內備去姓名追取亡過某等及下元囚徒苦爽不問前愆往業舊債新𡨚巳未報償有無執對咸該赦恩盡行根刷部衛來詣所建攝魂壇現跡報應或示之影響或形諸夢寐親接陽眷顯訴因依取信愚迷闡揚神化玄科有禁不請稽違故關年月日關關三使者北魁玄範府昨據齊主某投詞乞就某處崇建無上黃籙大齊追薦亡過某等入意同前隨關見發交付玉女大聖承受宣行外須至關者右關神虎三部追魂使者侯魏張𧪵朱書塗之仰隨從主伯主吏玉女等齎持混元玉札遍詣三界十方北都九幽嶽瀆幽扃冥司地獄血湖硤石溟泠泉曲神鄉鬼營城隍社令應干拘留責役去處根尋亡過某等不問業報淺深巳未結正照甲狀內備出姓名併囚徒苦爽盡行追取同本部神首管領來詣攝魂壇現形入夢切待薦修准令火急奉行不請住滯故關年月日關關監獄使者北魁玄範府昨據齊主某投詞乞就某處崇建無上黃籙大齊追取亡過某等入意同前隨關神虎大聖玉女使者追取赴壇外須至關者右關陽耀通關壇使者劉隂靈攠魂壇使者明請遵黃籙儀範敷蕆二壇伺候承行官吏部押該度亡魂苦爽前到即仰分類攢結以男魂聚于左壇女魂聚于右壇各令現跡入夢以明嘉應其間或囚𡨚讎邂逅輒肆紊亂惟仗多方善諭使其省悔前非頓明本性至期開壇攝召次第放令入壇躬受開度仰希依應毋有稽違奏表言功用圖旌賞故關年月日關牒攝召官將隨本法用靈寶大法司昨據齊主某投詞乞就某處崇建無上黃籙大齊追薦亡過某等洎下元苦爽同遂生方事當司領詞難抑巳於某月某日預奏天廷取㫖頒行及備牒神威先次搜訪今者齊事扣期合就齊所建立神虎攝魂壇追攝上件亡魂前來受度除再飛奏三天及抄具玉曆申聞都省嶽府乞照應行下外須至專牒者右牒某將列具仰遵法令疾速部帶麾下吏兵隨從神虎官將同往三界十方天牢地獄拘留責役去處根尋亡過某等魂見今被繫何地追取親魂正𩲸併照甲狀內備去姓名逐一搜攝不問罪業有無已未結正普該赦恩一合部領前來攝魂壇視影現形以伺開度不移時刻火急奉行其或故違自貽典憲謹牒年月日牒關申發總靈寶大法司當司今發審奏公文開具下項須至關者一奏狀三函申狀一函重封印全謹上詣三天門下上清天樞院請進一申狀三函玉曆一本帳狀一本並封印全謹上詣北斗高上玉皇尊帝衆聖前玉清泰玄天機天樞上相真君聖前東嶽天齊仁聖帝聖前申上一公牒關六道摺角封印全下某州某縣城隍主者逐處通下神虎何喬二大聖前神虎三部追魂使者陽耀隂靈通關攝魂壇使者神虎攝召官將逐處通下右關四直功曹使者三界直符使者當處及泰山府沿路土地仰交管前去逐一投進時刻不請稽延如有魔靈遏截攝赴近獄依律䆒治幸希回報故關年月日關申天樞院進奏狀靈寶大法司本司昨據齊主某乞就某處崇建無上黃籙大齊追薦亡過某等魂洎下元幽爽同遂生方事本司巳於某月某日預奏帝廷取㫖頒行今者齊事扣期合要亡魂赴壇受度除巳發亡魂帳狀具申都省嶽府及頒降太一混元玉札追取亡魂外今發奏狀函重封印全須至開申下項昊天玉皇上帝陛下紫微中宫北極大帝陛下東極太乙救苦天尊御前右謹具狀申三天門下上清天樞院伏乞依時進呈取伺敕㫖早賜頒下伏侯昭報謹狀年月日具法位姓某狀申都省玉曆具位姓某今開具係薦男女亡魂姓名下項一正薦亡故某係某甲子命某年月日在某處命過享年幾歲一附薦此却具九玄七祖姻親等逐一列一附壇某州某縣某鄉某里某人附薦亡某逐項列如無附度則去此項右謹具申年月日具法位姓某狀申東嶽帳狀靈寶大法司今具係薦亡魂姓名生死年月去處下項一正薦亡故某乙係某甲子命某年月日在某處命過享年幾嵗一附薦此一項係家廟姻親依前逐一開列一附壇追度亡魂如無附壇之人不列此項依前逐一開列右具如前年月日本司具神虎甲狀北魁玄範府今具係薦男女亡魂姓名下項一正薦亡過某第幾一附薦此却具九玄七祖姻親等逐一列一普薦亡過某逐項列如無附薦則去此項右具如前年月日本司具奏昊天貼黃倚黃臣奏為某人乞崇建無上黃籙大齊追薦亡某等及下元苦爽欲得敕命下泰玄都省宣付三界真司准玉札隱書放遣上件亡魂赴攝魂壇伺領齊修伏候敕㫖臣乞頒付泰玄都省奏北極貼黃倚黃臣奏為某人乞崇建無上黃籙大齊追薦亡某等及下元苦爽欲得敕命下中天斗府頒宣太一玉札差降神虎官吏追取上件亡魂赴壇伺領齊修伏候敕㫖臣乞頒付中天斗府奏東極貼黃倚黃臣奏為某人乞崇建無上黃籙大齊追薦亡某等及下元苦爽欲得敕命頒下三界真司准混元玉札放遣上件亡魂赴壇受度事伏候敕㫖臣乞頒付三界真司施行上清靈寶大法卷之六十一
