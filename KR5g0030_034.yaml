front:
  text: 上清靈寶大法卷之三十四驚一
  hash: sha256:fc9b958fa619481fe4ef5161b4d07b80044133dd58dd3f6f56b21669c45f5886
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5g0030_HFL_034-001a, image: hfl/0952/0952-004.png}
body:
  text: 洞微髙士開光救苦真人寧全真授上清三洞弟子靈寶領教嗣師王契真纂齋法壇圖門獄燈圖像章師曰凡建大齋須當破暗續明開赦諸獄赦諸罪爽當按圖像如法鋪陳今具如左九巵九壘燈圖師曰救拔之格宜如法造燈樹其下立天地輪以圓象天以方象地分三輝而照九壘列八極以居中皇自初終亡至於七七使燈光相續照破幽關建燈之法以梓木作一燈樹上分九巵一巵安一燈下用淨土作壇三級上圓下方上層安燈樹樹上懸幡九首中層立九氣牌安燈九盞下層立九壘皇君位牌安燈九盞三層共二十七盞外立八卦八門然燈八盞使上照九天中照九野下照九壘通光九道外照八極周回十方計三十五盞乃二十五分總氣上玄之法也九氣牌帝真胞命元元一黃演之氣帝真胎命元洞𡨋紫戶之氣帝真魂命元長靈明仙之氣帝真𩲸命元碭尸𡨋演由之氣帝真臟腑命元五仙中靈之氣帝真靈府命元髙真沖融之氣帝真元府命元髙仙洞笈之氣帝真華府命元真靈化凝之氣帝真嶽府命元自然玄照之氣九壘牌第一壘洞淵澤地土皇君第二壘金剛澤地土皇君第三壘石脂色澤地土皇君第四壘潤色澤地土皇君第五壘金粟澤地土皇君第六壘金剛鐵色澤地土皇君第七壘水制澤地土皇君第八壘大風澤地土皇君第九壘洞淵無色澤地土皇君九幽獄圖師曰按法天象地方圓為式九幽曹主罪憲職羅酆東南巳地是其所也按大一聖真之科以砂土作壇九所方闊二尺九壇一同總方六尺以法地之隂極二六之象每壇作四角三曲如獄之形每獄明登三炬九獄共二十七炬九獄之心隨方立牌牌上面書破地獄符見齋法符篆門背寫獄名上懸九幡有式在幡蓋章又式作黃幡九首篆九天生神章符至破九獄燒九幡了却以此幡挂其位仍先立遷神回黃幡使幽魂覩之萬罪皆滅也夫九幽者八卦中宫按九州分野各係社令主守在天為九霄在地為九宫化形為九幽獄其名有九皆一氣所化一念所感凡亡人一念之惡其獄即現其報隨之故太上垂慈拯濟立九齋法超拔苦爽當知其所出也一曰幽𡨋乃東方震卦九氣所化凡發生蠢動莫不待風雷之所驚故曰風雷二曰幽隂乃南方離卦三氣所化凡火數至陽為陽極隂生之道故曰火翳三曰幽夜乃西方兌卦七氣所化凡一日之光並沒酉地為金方殺伐至剛之道故曰金剛四曰幽酆乃北方坎卦五氣所化凡氣候水數至子為隂極陽生水旺於子故曰溟冷五曰幽都乃東北艮卦梵氣所化凡氣候至寅艮為溫柔發施之理木氣所生故曰鑊湯六曰幽治乃東南巽卦梵氣所化凡火至巳為至旺之鄉莫不爍爍鎔銅之熾故曰銅柱七曰幽關乃西南坤卦梵氣所化凡金氣為西南肅殺之候故至人門之鄉多生貪殺之心故曰屠割八曰幽府乃西北乾卦梵氣所化為天輪運轉之象故曰火車九曰幽獄乃中央一氣所化是中宫土皇所掌為中央總制之治故曰普掠大凡建九獄本為普度沉淪之設若建小緣上不祝君王而及寰區下不度九祖而及六道區區只度一二位之魂則上帝豈特為一人而能頒曲赦悉開九獄必無是理地獄未必皆可破幽魂未必皆可度而我之立意無一毫及物之功豈本科之意也倘或專薦止然燈祝贊或建九巵燈之類足矣破獄之科不必舉行庶免僣瀆然孝子報親無非盡誠懴罪足矣豈可以我祖宗必墮地獄而行此科理之所在也若果欲行之却當隨宜設斛食度沉魂不拘多寡隨力建功則破獄一節行之無慊矣蓋無量苦奕沉迷有無一念既差終墮其獄若非祈天請命行符破獄何由解脫故當按法行之九獄牌東方幽𡨋風雷地獄南方幽隂火翳地獄西方幽夜金剛地獄北方幽酆溟冷地獄東北幽都鑊湯地獄東南幽治銅柱地獄西南幽關屠割地獄西北幽府火車地獄中央普掠幽獄九獄燈符九獄形總九獄回耀燈圖師曰盟真科典有回耀降光之格懺除五纍苦門法以梓木作輪如車軸之象上層然燈一十二盞中層一十六盞下層二十一盞中央五纍苦門共四十九數也仍立牌寫諸獄名更造小幡四十九首黃白之色至相交間樹之須先立回耀幡於輪之東南內外相應乃黃籙廣度幽魂用之集兹功德以薦亡魂能回三景之光曲映九泉之户使鐵城鎔解刃毒摧鋒拔度苦魂咸覩三光徑生人天此本科也久廢不用宜倣蔡致虛路時中儀以沙作三圍外方內圓如車輪樣徑九尺外一圍作二十四輻然燈二十四盞立二十四獄牌中一圍作十五輻然燈十五盞立五纍五道五苦門牌內一圍作九輻然燈九盞立三惡門三尸道三徒界牌當心立回耀靈幡一首然燈一盞又以黃白相間造小幡四十九首隨燈布之懴燈畢就燈上化之木軸樣內圍燈牌九并九幡睿號色欲門元靈隱耀天尊上尸道威光寶際天尊天徒界普照幽明天尊愛欲門隨機赴感天尊中尸道虛皇普濟天尊人徒界大慈救苦天尊貪欲門慈悲救度天尊下尸道無邊普度天尊地徒界法力超升天尊中圍燈牌十五并十五幡號人道元洞王晨天尊色纍苦心門普光弘濟天尊太山地獄苦道弘慈廣濟天尊神道通光普照天尊愛纍苦神門法輪開化天尊風刀地獄苦道靈源普潤天尊鬼道慈悲惠愛天尊貪纍苦形門神光廣被天尊摙山負石苦道玄上玉華天尊地獄道寶光通照天尊華競苦精門玉清玄上天尊作江河苦道慈恩萬善天尊傍生門金華慈慧天尊身纍苦魂門玄明梵行天尊吞火食炭苦道玉真隱韻天尊外圍燈牌并二十四睿號監天地獄廣常慈愛天尊玄沙地獄普垂妙澤天尊無上地獄開度無量天尊太真地獄光明寶華天尊虛無地獄隨劫救苦天尊火庭地獄尋聲救苦天尊毒刃地獄無邊普濟天尊寒夜地獄九幽拔苦天尊律令地獄妙化無邊天尊風刀地獄廣常覆護天尊九幽地獄金華廣耀天尊刑正地獄聖力無邊天尊太平地獄廣大慈悲天尊清沼地獄無極快樂天尊玄隂地獄輪轉萬變天尊天玄地獄廣度沉淪天尊天一地獄髙皇玉晨天尊三十六天獄髙靈最妙天尊元正地獄慈教廣度天尊河伯地獄普垂惠澤天尊禁罰地獄廣大無邊天尊黃天地獄大弘普濟天尊纍劫地獄隨念往生天尊女青地獄開度宿障天尊回耀輪燈二十四獄圖師曰按真人二十四戒經尺人生前造二十四種罪惡死後歷二十四報化為二十四獄三塗五苦八難之場八獄共二十四獄按人身中三部八景二十四神之數多因在世貪著情愛設心邪境結節凝滓不能開通故盟真科典有回耀之格假陽光燭破昏衢使鬼官罷對囚苦出離二十四獄牌第一鑊湯地獄第二刀山地獄第三銅柱地獄第四鐵犂耕舌地獄第五銼身地獄第六毒蛇食身地獄第七鎔銅地獄第八爐炭地獄第九鐡輪地獄第十運石地獄第十一鐵床地獄第十二劒林地獄第十三寒氷地獄第十四鐵丁釘身地獄第十五亂考地獄第十六大石壓身地獄第十七針錐地獄第十八鐵丸地獄第十九食炭地獄第二十磑磨碓搗地獄第二十一惡汁灌身獄第二十二拔舌地獄第二十三鐵鎖鎖身獄第二十四鋸解地獄三塗五苦門牌天塗上尸死道色欲之門地塗中尸邪道愛欲之門水塗下尸惡道貪欲之門色纍苦心門愛纍苦神門貪纍苦形門華競苦精門身纍苦魂門血湖燈圖師曰大鐵圍山之南有硤石獄其形皆黑旁有火熖下有血湖在東南一大石間上大下尖中開一縫罪人出入自有百藥毒汁灌身心獄號血湖産死婦人億劫沉墮苦不可勝穢惡之甚獄中有百萬鬼卒晝夜考掠乃翻體大神擲尸大神食心啖腦鬼王之類也血湖燈産死獄酆都燈圖開通五路燈圖師曰凡建大齋當先開通道路釋放亡魂法以泥座五箇插白幡五首按五方安東方飛道大神南方橫道大神西方直道大神北方遏道大神中央都道大神三十二天燈圖師曰燈壇作三層上層為無色界四天立無色界魔王位懸十方飛天神王幡中層一十八天立色界魔王位下層十方天尊立欲界魔王位壇心立一幡幡上書三界大魔王師曰此圖按元綱流演之像上懸三十二天幡外開八門四圍立二十八宿牌九天燈圖師曰九天燈即九巵燈也若不用燈樹未免就地鋪之蓋洞經中以第一天居中正在頭上第二天在南第三天東南四天在西五天在東北六天在西北七天在北八天在西南九天在東是也亦隨方立九氣牌上懸九天幡當依此圖如式鋪設今人以東北起第一天甚悖理也當細考詳生天寶臺上清靈寶大法卷之三十四
