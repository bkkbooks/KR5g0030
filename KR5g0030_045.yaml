front:
  text: 上清靈寶大法卷之四十五圖三
  hash: sha256:fed1f798cd4f0db14d28fd418a241166cb5d477747e7d712876ee58b63b6bb18
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5g0030_HFL_045-001a, image: hfl/0955/0955-150.png}
body:
  text: 洞微髙士開光救苦真人寧全真授上清三洞弟子靈寶領教嗣師王契真纂齋法符篆門東極青玄救苦九龍符命師曰此文乃太一天尊之睿旨拔罪救苦之靈章凡告行以黃素髙九寸朱書其符外用可漏封函亦黃素丹書又法以梓木簡髙九寸闊三寸六分厚三分以頭青裝之正面書符背書告文以青𥿄作封皮或以碧素朱書封題如式法曰凡書符於靖中面東焚香九拜跪奏存太一在青宫百寶祥光殿內九色雲霞絳羽青華龍文之帔頂玉清寶冠乘五色九頭獅子共捧七色金蓮寶座獅子口吐火熖遍繞太一在火熖中現出九色圓光如虹霓狀頃生圓象如日在頂中出白毫相光如劒戟鋒芒座下又有二小蓮花乘太一二足太一左手執碧水晶寶鍾如鼎狀右手執空青花枝金容玉相慈悲慧目左有大惠真人右有救苦真人侍從金剛神王力士天丁金童五女靈官侍從太一八十一位神君五方太一吏兵俱為侍衛兆存在五色雲中分明了次默奉情旨持念太一睿號入十一遍存太一命左右真人開紫陽玉匱九光寶藴出示龍文鳯篆與兆并敕降九龍使者隨身兆受符訖九拜存太一灑甘露於十方良久天地如百寶光明條忽忘形方染朱筆念太一號九遍取東氣入筆書之畢又祝睿號九遍玉清訣東氣入符次於告文後天尊銜位之下書青玄破酆都真形符依散形祝之次念十方天尊號每號九遍共九十遍取十氣吹又祝睿號九遍再取東氣吹方於香上祝遣若臨壇宣告亦如前請降存用宣讀焚之祝九龍使者隨符而行大九龍符小九龍符日出東方青帝太陽左玄太一右玄永昌九天玉皇救若十方五方四維魂離毒湯九龍青簡救苦真光冥獄罷對上朝三皇三天正氣萬氣混康千靈稽首昊天旻蒼練度九龍符東華東極九氣青宮九老仙臺天帝敕命太一天尊救苦符命九龍使者乘駕九龍五方五老煉育死魂九天九氣三寶丈人生氣隨身開度死魂上帝慧光曲湛寒庭重泉主者救苦奉行有違有拒速送天刑有功有濟列言上清元皇誥命萬神破聽善功死魂罪隨此赦乘斯符命超度南宫急急如上帝敕祝呪天尊敕命青玄至尊九龍乘御甘露濟隂幽府地司濟霑死魂無極運化生氣攝雲魂𩲸普度身輕上升急急如青玄上帝敕運真合靈會寶敕召諸神六天壘重隂酆都九幽獄典吏部冥洞三官統九府主典神吏兵一切獄主者拔度善功魂出離三塗苦東宫九龍符照開諸地獄爐炭生青蓮刀劒作騫樹火池化寒池鑊湯為春浦救度長夜魂往生極樂國告文東極青玄救苦九龍符命告下三官九署十二河源五嶽四瀆九州八蠻酆都六洞十宫九幽泉曲河源五道都府九州社令冥關幽扄諸大地獄一切主者咸領符命拔度亡過某等及下元幽爽囚苦罪魂徑度隂翳永離幽冥地獄消苦開泰泉扄火醫滅熖創毒摧鋒下明黑暗上生朱陵超度三塗宿對停輪一如告命太歲年月日時告下法位臣姓某承誥奉行東極宫中大慈仁者太一救苦天尊書真形符內封式面書東極青玄救苦九龍符命具位臣姓某奉行謹封內封皮背書拔度亡過某等魂外函式東極青玄救苦九龍符命告下三界十方九野地司隂曹萬神具位臣姓某謹重封東華青宫生德開光寶符告文上東青林太皇萬福道宫東華青宫生德開光寶符告下十方無極世界三官九府百二十曹五帝考官酆都嶽府泉曲九幽溟泠五道大神河源水官冥關主者拔度亡過某等出離地獄原赦罪尤蕩釋冤愆上生東方太皇黃曽之天一如告命太歲年月日時告下法位臣姓某承誥奉行右簡髙一尺二寸闊三寸二分用青粧朱書元始符命金籙白簡長生救苦二符師曰三天上有無上盟真玉匱金籙玉簡救苦真符乃元始之威章上帝之曲恩實醫救沉淪之法藥開悟愚暗之法音灌沐身心之法雨蔭覆群靈之法雲照燭幽昏之法炬汲引亡人之法門始因北帝啓陳虛皇演教曲湛宸恩廣度無間召千天之合契破九地之靈文承之則徑出昏衢立登霄漢奉之則回骸更生位輔真人度三災九厄於塵世除千罪萬業於北都豈曰小輔之哉玉䇿云泉生領祖太元靈源清淨從虛稟氣搆形受神幸覩晨輝不能自貴氣緣物假妄起塵情神鬼用謀心勞日拙氣凋神逝難復本初五纍牽纏受毒幽壤或在五嶽大川九幽都府城隍社廟泉曲河源或托孤蔭依仗邪物遊蹤野遁附巫興妖執繫妄心罔悟宿命境緣業對形異神遷心與形俱旋循不息巍巍人道推此自窮太上慈仁常善救物頒符曲府昧爽咸恩息熖火山解負宿命宸波曲湛更煉還人皇人曰夫人之淪亡乃三尸九蟲之所制也皆在五行之所運故入五苦輪回之門故太一先用三氣之光破九幽獄書九星之氣以蕩尸穢五藏內明如日則隂陽返其魂𩲸也故書碭尸冥演由之氣然後布八卦之星玄象分形二儀交泰三氣流通以鎮三田心主坎離上朝三清然後九宫羅列真氣充溢萬神敬聽九幽隳毀混成一氣回尸返生故書曲敕皇人曰夫隂靈迷執三塗既蒙道恩拔度須得丹天煉形之符化生寶光超升陽明之境至士當修煉假三田之光而接九天之氣是以隂藉真陽神合太真轉輪不滅便得神仙矣又曰夫罪魂拘閉皆北斗所掌故書無上七元九幽等字吹三光氣照耀十方三台煥爛故書玄象之光以照八獄五嶽五帝監生大神運靈次書合日月之明三光所照紫䇿摽名帝君執符度命華庭泰山天元之氣灌注南斗三官稟敕九地之下九水之中九隂之境皆覩光明師曰自非玄契佩此靈章心純九戒者不得告救苦符如專薦拔非七德九功修真之士不得告長生符固非失慈悲之教蓋多罪下鬼難擅宸恩此由獄囚獲偽赦徒誤幽冥兼非忠孝貞廉仁慈無功及物無升騰南宫之格雖行告下地司只執白簡隨業受化也此簡非憑三寶之力其功不普矣師曰兆巳佩九龍符戒文冝心映南昌錬真之籙乃長生符也蓋髙上靈䇿紫微寶章也練簡丹文明霞結藴神光煥落召降晨華保錬丹心養育赤子凡受者取陽月竒日備青素髙九寸闊二寸五分丹篆其符符成作八壇疊以絳囊方寸懸帶當於心前每日燒香了出戶東向若遇風雨晦冥可就寢靜之所凝心虛形面東圓羅鼻引赤霧洞浹一身髙下三宫一塵不立念極良久乃叩齒三通咽液三過微音呪曰司命受煉相火成罡梁為天宰洞感炎光樞機輔弼星列玄章育精大明赤章淩芒煉化神符表裏俱昌急急如律令呪畢再叩齒三通咽液三口而止如是行之三年後施上法則不陳風飈克御翹暉倒景流軿紫虛盻眷髙清玉京可步也玉䇿云月陽謂六陽月也子寅辰午申戌竒日謂甲陽也後上法謂上法諸法非行䇿三年始營佩符揖景燒香出户謂出庭户行持非依朝真格出巽户也青素明潔非指白為素也如道呼紫青絳為三素雲也玉䇿曰世有救恤貧乏濟度天人奉戒修齋供養三寶或錬真養神功未充足會窮滅度經由太隂者方可曲行赦命告救苦真符次告長生靈符擢簡帝堂錬神火府若罪魂無功於天人者不可濫受錬真之籙但得覩見神暉更生陽界亦幸矣又云若夫普為九幽孤爽億祖宗支大醮天地皈命玄真者師當為啓奏三境申聞玄師關告地司方可告符法曰凡諸濟度以柏木作簡長九寸闊二寸四分厚二分玉䇿云闊二寸五分厚四分柏木者取其芳潔素白有生氣之象玉䇿以梓木作救苦符柏木作長生符九寸者法出九幽重泉而乘九陽九氣以升天也闊二寸四分者象三部八景二十四神靈氣也厚二分者體隂陽全備天地造化之理也尺寸合用古玉尺比今之浙尺每寸當增二分地旨曰凡書篆時先於靖室中焚香朝奏通誠內誦洞章以香案面東置簡案上先面西北長跪啓奏元始至尊存玉相乘五色獅子百寶金臺蓮花之座外映金光口吐瑞氣降入丹砂及簡木之上次起立面東搯震文呪曰玉誕長桑柏空度仙丹華曜木度魂升天氣映白簡金光自然永劫長存安鎮寒泉幽魂開度長保劫年急急如元始上帝律令呪畢取生氣九口存作日華之光吹布簡上如普度簡多可堆疊案上亦如前取氣九九八十一口吹簡上存日華周市無邊方以丹砂染筆搯玉清訣默念三天隱諱霐澄明天地人下筆依散形書之旨曰凡書長生符朝奏法式如前但取甲日或寅日書篆露一宿請降下臨方可行用口訣云木首金頭吉金龍度益通丹光雙運火露宿貫神峯所謂木首者甲也金頭者庚也若然則庚辰日為上也玉䇿云面書符背書告文作五行舊本有六行第六行乃上皇甲申歲運告行猶今所書歲次甲子是也今欲依舊本入年月為六行但以天篆缺支干等字又不敢擅以世書混間真筆不然權移年月告下一行書於簡背青紙封皮之上以元始符命告下十方無極世界作兩行書銜位之左右法曰或普度簡數至多書篆不迭當以金銀葉作鏤空符文之板依法存思染筆隨文塗刷於白簡之上貴使數廣易成不致勞冗神智也若同志之士能協力篆寫不憚勞苦以圖濟拔之功又勝於符板也更或不然則依符文刋為印板以白薄紙以丹砂刷印糊於簡上次依法存思染筆隨符竅念呪而潤色之亦可類於篆寫若苟簡印造不如法行持則徒用心哉玉䇿云凡曲赦魂識并受長生靈符者當尋天篆入亡魂姓名若拔度三數人則簡上書一名稱等字其餘名列酆都狀內其狀只用世之楷書若簡文天篆不可輒廢其真自有殊制故也按真誥載紫微王夫人答楊司命問書云請陳為書之本始如三元八會之書皇上太極髙真清仙之所用也雲篆明光之章今所見神靈符書之字是也華季之世共作巧末趨徑下書皆流尸濁文淫僻之字含本效假是囂穢死迹耳夫真仙之人曷為棄本領之文迹手畫淫亂之下字耶今長生符內四十七字并二符告文舊皆雲篆明光之章後人不知真凡用書之異直以世書代之得不上玷真逸之文下虧有禁之格也今後尋諸經所載神藻以證舊篆今救苦符告文計九十八字內增七字控書亡人姓名每一行篆二十一字分作五行是也長生符告文計九十八字却增七字書亡人每一行篆二十二字分作五行是也若書年辰不得用維字似式當避況重隂得之似朝廷曲赦也凡簡內亡魂姓名不得過六字愼之救苦符度帝王妃公卿將帥散形靈寶君天寶君神寶君朱明景化保素通真后土九壘俱會帝廷五氣混合日月停輪魔王保舉諸天記名三元慶六紀注生注福南辰會齊年司功司勳北極鑄𩲸陶魂中監五嶽下統人倫金輿玉輦朝謁三清九霄斡運紫戶生神陀羅育𨗿氣合雲九州安鎮幽爽完形華都曲麗稟敕奉行度士庶散形三皇氣合景化凝玄九陽朗映冥夜升遷削除罪譴開度宿緣三素皓靈六辨虛凝寶玄流化拔度靈五老啓圖極中混清道守岑為九魂煉精周回加圖開度英魂徊合玄都九夜停刑幽境光舒曲赦北酆髙雲步衢度橫死苦爽散形廣生髙映覺元洞虛九真應元五運華敷訷戶纏絡三官總都六龍舞轅哀救三塗解釋仇對弘慈範樞五行返真清氣濯廬威光逺燦照幽衢慧朗靜明度命南樞圓極湛常九夜續隅幽泉開度福映酆都急如敕命飛步太虛度産亡幽魂散形帝真混合煉神溉胞左右奉人司馬洞謡九壘沉魂惡根化消紫戶定録神降晨霄開度長夜隂貫陽標三張總御合慶幽寥六氣感通明梵演昭司命司録司功司煞延揔三靈明主都府中理五氣混合百神曇誦延越承命三清九陽司化覆靈育靈坤順內營大明合同得天之晶赫奕玉帝九幽齊并泉曲受度赦敕幽扃急急如青玄律令右散形趙道升本上作三星却念元始上帝太上道君太上老君三句在帝真混合之上又以真作君字生身受度散形三魂歸英緑字返生九竅開通五府納靈鬼戶斷絶皇道鮮明三台敷映六儀混成隂陽配合皇達元靈五帝大魔侍衛送迎混本歸一飛步三清九族俱超三景登明身度我界體入自然生身受度劫劫長存九泉不到幽廓難拘曲映馳騁帝阿玉虛東華青宫救苦九龍真符告文凡書元始符命金籙白簡救苦真符告下十方無極世界三官九府百二十曹五帝考官九幽地獄巨天力士執罰神兵司録司命司功司殺牛頭獄卒三界大魔拔度某出離地獄永辭長夜覩見光明萬罪蕩除𡨚仇和釋乘此九龍符命功德上生天堂一如告命太歲年月日時齋壇告下告文天篆祝符呪元始上聖玉帝髙靈真文告命濟死度生金籙妙戒拯護幽冥白簡玉符九真玄經解消罪咎𡨚債和平救苦真人削除罪刑察命童子注上生名護戒威神引詣福庭超離五苦乘駕雲軿輪回得道飛升上清元始符命下入重泉隂關夜府罪苦咸原通幽負信魚龍告宣神魂受度𩲸離冥關乘功往化上升三天急急如律令右法上帝訣取東氣并玄元始三氣吹入符長生符散形元始上帝玄照超品左陽真神右隂靈神化元聿白星飛睪九幽拔罪天尊三聲神珠朗日天地合明黃雲凝靈氣象交元左那仙府玄中澄輪太仙右府台真之神三元上集九夜升騰覃赦五嶽八獄欲書五嶽字先呵氣一口吹云破方下筆罪根欲書八獄字先呵氣一口吹云破方下筆六帝司迎太一司命挑康奉令太極都治胎門八神此一筆望三台之間取太一尊星黃氣一口吹書太極都治下閉之太玄司方召八靈君此一筆亦取太一星黃氣吹書於太玄司方之下閉之天合地合人合日合月合五行併合日月並明南極注生三元四始隂陽合凝玉晨敕下南昌上宫如律度生急急紫字䇿字南昌帝君太極注生帝君紫虛丹元帝君長生大帝會精總統帝府中間通正筆即念未句三叩齒炳煥煜三叩齒了冥心長引𤊞煴熳西南氣一口入筆方書君字呪在上三官北酆九壘重隂九地九水皆覩光中太嶽主帝峩峩丘陵飛龍驛傳南斗上生右吸筆端丹色咽臍下丹田候度魂登橋時復呵出丹田祖氣赤光衝天送魂出五丈之外師伏地如拜小頃起隨車送魂投幡焚之此一筆乃帝命之書也南昌上宫紫微流金煉真之籙告文凡書元始符命金籙白簡長生靈符告下南方丹天世界朱陵火府南昌上宫長生大君韓君司馬司命司録延壽益算度厄尊神回骸起死監生大神超度亡過某上登朱宫流火之庭玉眸煉質黃華蕩形書名紫䇿受化更生乘此金籙度命功德時刻升遷一如告命太歲年月日時齋壇告下告文天篆祝符呪太上開明元始監真五老上帝赤書玉文拔贖一切宿對罪根皆蒙解脫考掠俱停魂升九天𩲸度朱陵今日上告萬神咸聽龍負白簡關盟真靈乞如所願風火驛傳元始上帝赤書玉文解消隂結以證超真刀利南極浮閻之神流火受煉禪猷保生婆尼靈童與滌隂穢表裏瑩徹玉嬰之形飛步禪黎洞陽之庭一如元始上帝金口律令日中赤帝號曰丹靈真符命仙玉精保生虹映玉華煥落上清七世父母纍命重寧越此宿對禍滅幽冥公子執吾符太一居紫房三合地元下拔命上玉京急急如元始上帝敕救苦符封皮式救苦真符告下十方無極世界具位姓某封封皮背書拔度亡過某人等魂長生符封皮式長生靈符告下南方丹天世界具位姓其封封皮背書超度亡過某人等魂救苦符給付天仙道告文元始符命文同攺九幽地獄巨天力士二句作天仙紏校萬氣沖神餘並同長生符給付天仙道告文元始符命文同內攺金籙度命功德時刻升遷二句作元皇廣化天仙彛秩徑獲升遷餘並同救苦符生身受度告文元始符命止三界大魔覆護預修弟子某隨所救度出離幽沉覩見光明因緣輪轉衣食自然得為初學天人一如告命長生符生身受度告文元始符命止監生大神覆護預修弟子某生身受度劫劫長存隨劫輪轉與天齊年永度三塗五苦八難超陵三界逍遙上清救苦簡內符右符紅上黑書子文北氣長生簡內符右符黃上朱書午文南氣茭龍金龍二驛吏符師曰泰玄都省茭龍驛吏一十二萬人主傳命泉曲開光赦罪凡告救苦符每一符用一人齎持也又有金龍驛吏二十五萬人主頒符命魔天道馳信凡告長生符每一符亦用一人也若告行二簡當啓奏元尊玉帝關召此吏隨所告符簡多少請降人數蓋二吏𨽻天猷所部冝先申元景丹天府或併申四聖府請降亦可以天蓬主攝魂佑聖拯沉淪故也但驛吏狀如力士每見世俗多誤作童子形載詳經云若能受持金籙白簡九真妙戒長生靈符救苦真符察命童子護戒威神五帝直符六宫掾吏自當隨逐簡文覆護受戒亡靈若然則不用童子齎簡是亦傳流之失也玉䇿云凡命茭龍金龍驛馳不用文引只以符傳符也今恐未學道淺未能感動玄靈可作請關當遣直日功曹齎關召之或先以符召至却宣玉簡後以關付之齎持也此理亦通當篆驛符於關尾乃銜位之前請詳而行之庶克逹命於寒司也或用新茭縛龍吏如力士狀更納其符於身中使負簡文亦須别作疏狀先期告齋可也若不奏告上玄請降驛吏妄意宣行正若人間赦命非臣下之所可專耶召茭龍驛吏符太上玄洞徹慧光都敕命泉隂遍映幽夜光明永辭五苦斷絶地根九龍符命何敢不隨飛步五戶三官赦原茭龍布信符到速追亡魂開泰性悟神飛風火律令羅酆速依右符黃紙黑書掐玉帝訣以鼻引北極星光繞筆書之存思焚召則驛吏屆前也所取北極星非斗中第六武曲乃天皇之右北極天樞星也師曰氣芒各類清濁異歸凡取三光五星之氣各以鼻引口吐也生旺雲煙之氣當以口吸隨火也引吸時勿使耳聞耳聞則氣芒不降又不可長引長引則喘息失度要在精傾密念馭氣合神於杳冥之間則引吸隨念感降也召符右語右召玄都茭龍驛吏一人齎持元始符命救苦真符開光赦罪一如告命太歲年月日時告下召金龍驛吏符太上玄都敕命通幽徹關金光普照洞煥重泉玉眸煉質黃華蕩形亡魂受煉超度三天真風廣扇慈雲接身告命一下金龍負驛風火交馳一如律令右符青紙丹書玉訣以鼻引太尊星芒繞筆書之如前焚召凡取氣自南北望尊星在斗頭中下台分中微向北也太尊北有四星勢如軍井南有少微如元宿其太尊色黃而明要知在此斗璇璣二星之南也要取北極太尊二星之芒須候入夜星朗時取之方得其真召符右語右召玄都金龍驛吏一人齎持元始符命長生靈符超度亡靈徑詣南宫一如告命太歲年月日時告下若先行符則用此右語若只連符於關子上不必用也關式别具章奏門上清靈寶大法卷之四十五
