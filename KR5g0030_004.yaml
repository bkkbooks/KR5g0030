應滅度身經太隂臨過之時同學至人為其行香誦經十過以度尸形如法魂神徑上南宫隨其學功計日而得更生轉輪不滅便得神仙太隂錬尸三種禎祥天地運終亦當修齊行香誦經星宿錯度日月失昏亦當修齊行香誦經四時失度隂陽不調亦當修齊行香誦經國主有災兵革四興亦當修齊行香誦經疫毒流行兆民死傷亦當修齊行香誦經師友命過亦當修齊行香誦經修齊行道十種禎祥諸天記名萬神侍衛右别至人尅得為聖君金闕之臣諸天記人功過毫分無失天中魔王亦保舉爾身得道行功五種禎祥飛天神王下觀其身書其功勤上奏諸天萬神朝禮地祇侍門大勳魔王保舉上仙知音誦之六種禎祥無所不辟無所不禳無所不度無所不成天真自然之音也故誦之致飛天下觀上帝遙唱萬神朝禮三界侍軒羣妖束首鬼精自亡琳琅振響十方肅清河海靜默山嶽吞煙萬靈振伏招集羣仙天無氛穢地無妖塵𡨋慧洞清大量玄玄也二十四種禎祥說經一遍諸天大聖同時稱善一國男女聾病耳皆開聰說經二遍盲者目明說經三遍瘖者能言說經四遍跛痾積逮皆能起行說經五遍久病痼疾一時復形說經六遍髮白返黑齒落更生說經七遍老者返壯少者皆強說經八遍婦人懷妊鳥獸含胎巳生未生皆得生成說經九遍地藏發泄金玉露形說經十遍枯骨更生皆起成人內誦十種生元始聖胎禎祥隂丹陽丹經曰流精玉光五色鬱勃經曰身有光明經曰上品妙首十回度人百魔隱韻離合自然混洞赤文無無上真元始祖劫化生諸天開明三景是為天根上無復祖唯道為身五文開廓普殖神靈無文不光無文不明無文不立無文不成無文不度無文不生經曰玉誕長桑柏空度仙師曰流精玉光者天之靈寶也可以修錬餌之通真故天真皇人云太空未有一物元始天尊挺生三氣之中混洞赤文冶煉方成玉字開明三景普殖神靈不知今日有此比擬元始之先化生靈寶之氣復採此氣錬而成丹餌之成真訣曰於髙山懸崖之上人跡不及四顧日月通處之照營密一所上圎下方面相去八尺四方一丈離地五尺穿三十二竅布二十八宿之形如窗牖使日光注照於日直角宿之日起首用七寶之器圎面五寸貯西流之水令迎日光下降四十五日之外水中結成五色流精之砂取而餌之面生流精紫光通神致真欲成靈寶大丹於三十二竅之下置三十二器於直宿之日取其方水投以天華四泉四泉者雨露霜雪合之使日照月耀水中四十五日水面生浮砂光明嗇嗇然常須護淨勿令塵翳即安置壇爐八門進火以金十二兩作鼎以鐵二十四兩作釡用陽燧取火晝夜煎之四十五日一開開時以月華灌潤下凝白華取之及一斤即用河上姹女丹山白魂絳陵朱兒各二十四銖置鼎中上以靈丹蔽之隂陽煉火七時飛於蓋之上增及一斤即入九轉九年自然飛凝結胎胞中有絳實朱柯一粒吞之立化飛仙四十五日一沐浴也如金丹之道火煉玉字在於丹谷於本命日依法循竅吞餌日月之華具正氣品中功滿內外感化指日而朝玉清玉誕則玉光之精降育於扶桑柏空度仙於空界亦大洞內三景妙旨丹成濟世後可服之師曰赤文飛落太乙含華似蓮花為祖百花為次亦曰靈寶珠光丹可愈百病起死尸久服長於丙丁戌亥辰巳日時左手採未開白蓮花右手採紅蓮花各三十二朵火焙才乾烈火化成灰次於三月三日七月七日九月九日採百花各一斤同伴次入九節菖蒲人參地黃天門冬蒼术乾姜巨勝各五兩同治下篩以百花醴和如膏丸如大豆大以無灰酒下五七粒採和有祝具修誦品兆日服一粒百日逺知一年無疾永不得死千日五神足立致長生矣大行𣑽氣經曰八景𡨋合氣入玄玄玄中太皇上帝髙真師曰此西元王母八景玄妙之祖氣也亦曰丹皇君此元始上品至道三界真仙莫不因此人身大梵上應於天度故呼吸之氣息至氣行身中合於太陽煉成大藥斯實修真之路進道之階經曰大行梵氣梵氣彌羅溟涬大梵無色之境梵行師曰人自溟涬大梵而生却自溟涬大梵而死若知大行梵氣先修一十二種梵行後别梵氣梵氣之祖者王母也比亦大洞之上道也夫人禀氣而生亦有數之始呼吸之息見於三部四至之脉一呼三寸一吸三寸以尺丈於璣衡合於太陽一日一夜一百刻計六千分每一刻六十分每一時八刻二十分共計一百四十分晝夜計一萬三千五百息每一刻三百六十息一呼一吸脉行六寸定太陽行六十里一晝夜太陽共行九千六萬一千五百里隨天周行照度三百六十五度二十五分半一日得一度半周天是一百八十二度六十二分七十五杪一度計一千四百六十四里六寸四分二十八宿行次𨇠度大道梵氣流演無窮旋斗歷箕回度五常每一刻太陽之真氣流行一萬八百里每一刻六十分三百六十二息定太陽流光每一分得六息而流光三百六十里每一時太陽行流真光八萬六千四里每一時氣侵六千七百五十寸十二時氣血總行七十萬八百九十寸曰月交而隂陽交日月行而營衛行而大藥成於此矣右古鼎九氣氣中集有一小兒楚氣一曰一夜上朝若稍有塵心則失大行梵氣不能彌羅一身則死矣乃死户之首也此乃九氣之根真土之淵府在西北之角戌亥之間與玉清連界通於泥丸也南接通陽絳宮上通肺氣下通肉户日月之門丹房金舍北在內腎方三寸傍穿十二神室中有梵氣之主雌一真母居焉西龜山圖西龜之山一曰龍山言木之道也金毋居之言金之體也乃九天之根本人之九宮之根也紐黃氣之淵府乃梵氣之宫土之正府也在天西北亥子之地嬰孩之生根也周回千萬里是不知其極出常數之量度外也髙與玉清連界上通腦也脉通玉帝宫東南接神虎之門接通肺氣也又與大胃交通矣西北交寒穴與腎宫便穴交氣也南極洞陽協於心北指勾陳踐中皇宫也上充玉京二十四節重樓十二也平三萬里三氣之㑹也湧金為墻結玉為門真土玉液之闕也金臺王殿同前議也十二神室七政九宮三田十二神室也餘云上有流精紫闕金華之堂傍通五穴即是集五臟之精㑹門也有自然紫氣之雲交帶鳯文九色落練四肢八脉五臟六腑赤華紫英是內生五氣也其崖生紫桂嶺秀瓊林結瑚為條植玉為根騫林含實赤子白環氣行無疵而生此寶也三華耀葩於朱景反香流芳於太玄內視接三明五香生五氣也八氣蓊飈玉籟空唱內之無器之音也元綱流演師曰元綱則元氣之路九天之根以天言之在西北之角與玉清連界東南則接通陽之霞上承清宫神虎之門西北則寒谷之野上通金闕神仙之庭南極於大丹浮黎之鄉氣協洞陽之光北則正於勾陳交關華蓋氣踐廣陵中央直充玉京八達交風即西龜之山乃天之靈根也師曰考詳元綱者乃天之根紐氣之經𨇠道源未判元綱巳肇此乃天地之大體妙氣之靈樞羅絡乎三十二天之中貫通二十八宿之分形而上者謂之道流於末者謂之教行之內則配合於身施之用則旋回有法此乃因天地之自然象人身之體用也且人之幻身結形穢濁受質胚胎一髮三毛無用塵有之物獨我之一靈與天地相為終始是均禀祖氣也故頭圎似天足方似地目如日月體象乾坤氣息周流密應天度人能修此以應彼則可以與天長存超然不泯矣昧者不悟其真不考其用乃曰身中備有天地不假外求非也內煉之法散而三千六百傍門要有金丹正訣其始也追二氣於黃道㑹三性於元宫而其成也隂魄消蹤陽神契道隨其功業之重輕第其資品之崇卑效職仙曹受書洞府終不謂我身有天地而外無天地內有神形而外無鬼神得一末術便以為有內而無外何其謬哉近者亦有如此論之非者矣所恨不逢師旨揣量莫得其要既不全內又不專外乃自為之說曰謂之不內不外是又去理逺矣且蒼蒼在上天也日月星辰天之文也博厚無根地也山川河嶽地之理也人之一身四肢五體乃天地間之一物而性靈於萬物爾戴天履地而言外無天地可乎所叙元綱之體乃天之經常也次則叙人一身取法天地配合隂陽言其象也天以剛健而不息故天地以長存也人能會道而澄神人亦可以不泯也此非身中自為天亦不內不外未免誤天下後世矣故不得不明辨之元綱者升神之要諸天階之絶景道源既判神天居崆峒之上非言可盡非見聞可窮悟其真者因真修真而外真自應識其妙者因妙得妙而外妙自臻惟天神之象則元綱之位其逺其近舉可知也人之有元綱氣開通骨脉𩨨空達於頂上一如天上元綱之路人之魂魄在身一如氣在天中知出入則長生飛騰不知則庸愚之夫不學術業未知仕宦官䏈之次而求見君也夫元氣融聚魂魄所養爰有真精真精而本根於右腎右腎為命門在脊骨之窮其下有一大骨骨中之髓透尻骨其穴名龜尾其神為王母面南而治事因帝所向而言之則謂之西龜之山道家託喻為名也又為之金闕以其居西也右為金闕左為玉房言玉在山木潤之居東方也又玉水之所本陽精之化精之所著名曰淨霐此元網之氣根本之所發也寶圖之設髙臺起於此鬱羅蕭臺之中尊直當於心所謂靈臺也上清之境太清之上際則心之下也心之懸垂其下為肝肝之下二分北斗七星居之其氣達心其原上通舌下名曰湧泉其氣下逹右腎氣腎之氣泄者湧泉氣不禁謂之交鋒交鋒者言斗之罡星太魒所照之地其性肅殺其神即欲界也如知其道者以舌柱上腭直運其氣循脊而上以脊通頭頭上者玉京之要路所謂西龜與玉京為鄰界也今人不知便以為西龜在腦後然西龜去玉京之氣四千萬重居中氣直逹在天則火星最低氣先及也又心屬火言上達而相感夫日月與火星齊故遊日月參諸一身則兩乳與心齊兩乳者眼之根源也人之二乳藏精以養目也故年老氣衰目昏而乳無汁腎無精箕斗在天之東北為天關鍵艮之故也於人則右手肩井穴也人之血氣脉以右為始天道之行以西北為始由西行而至牛宿則天事畢矣然未有發生故造化於此起矣言重入火星也人氣雖一周而消息係焉言重入心中心也由火木水金而行者大廢也由心肝腎肺者氣腧也即背脊之穴也取脊穴而觀則上下左右見矣求其妙而推之其喉環通於頂門所以為玄玄之妙難以言而殫不可指而名也無色之界在心之下崆峒之中斗魁之左也復自斗口則以舌拄上腭名曰天橋則超上清而至玉清矣如此則玉清之境頭也上清之境絳宫也太清之境丹田也心為靈臺則靈臺之說可見矣於是而守守之在心於是而朝朝之在頭此三華離便大有妙庭也故天中之天無英白元之會心也自然成真㑹於頭也修靈寶之道於身中至此而事畢矣不可得而容聲矣切謂元綱流演之於天巳叙於前體合於人身荐録于此學者宜深知此身之所以貴重者可以配天地可以煉形神可以㑹神妙乃道家因物象以設比喻法天地以立名稱如已育之身而立有為之法自有為而至於無為以有形而升入於無形然後壽齊天地與道合真其事始於身中而不止於身中也元綱流演圖按真誥中諸真論五星圖所布常南向也以太白在西歲星在東按而施之所以爾者五星隱伏縱橫無常不如北斗列象常在故一以定位於五方不得隨星之所在也二十八宿罡式計一百七十八步訣曰先須存已之神自黃庭乘五色之雲徑從玉樓直上泥丸中飛步七星節節隨星步上覺得身離地上極逺在天雲氣中將身橫步七星旋身入斗口纍步六步存身背北面南行到火星存紅色過火星向東行存過日宫紅色過日宫西行存過月宫白色過月宫向西南行左轉七遍却從北出循歷東南方天星到東北角却折步循歷北西南東四方天星訖再到東北角却望東直從魁星巡一遍徑出向火星上行過西方見金星白色過金星向北行至水星黑色自水星過東方木星青色却從木星再回水宫復西自金星過直向中宫土星位黃色再從土星復向金星水星到木星宫望西北角乘雲直上望見金闕訣曰謁三十二天自太黃皇曽天為始至平育賈奕天而終然後回謁二十八宿每宿一斗自箕起而斗宿旋身回至箕却望斗魒而去謁五星如式升神上境入北斗之中三台六星蓋頂而行步斗一座次六步應三台而出左環四十九步犯火星又東行八十一步至太陽謁孝道仙王復右行六十四步自北入斗至太隂謁孝道明王左旋而出左行復右行七返無色界中定想見諸真仙來往周歷十方二十八宿三十二天每宿丁罡十二步次回共三百三十六步至箕之罡直還望北斗大魒之次右旋南嚮四十九步重入火星經於太隂三十六步謁水星東行至于太陽之側右行六十四步成木東向謁木星再回而行借水星罡復出太隂之傍八十一步成全西向謁金星東行達于斗口三十五步而入中謁土星反行再入金水之宿直望北方玉京金闕乃入步而進再拜長跪祝曰具位臣姓某幸因宿慶獲際真風入靖凝神恭朝天闕身外之身冒抵玉京臣無任瞻天望聖惶懼屏營之至再拜重啓曰臣凡骨堅頑理難升舉幸因師授使遂飛神不避誅夷敢披丹悃入事云云臣無任祈恩俟命之至謹言再拜退復元路還神入頂門祝曰吾今朝真上謁青雲欲使神人閉債封形舉爾以去祕訣靈靈右元綱流演之圖乃梵行諸天之妙也始於飛神躡斗終於謁帝朝元若能精思按行出入既熟證對不亂可以上章奏事役使鬼神以致脫殼升真混合萬氣煉形之術朝元之方莫先乎此每於三元八節甲子庚申之日入靖焚香面北平坐臨目靜思凝神定想氣息綿綿神風不鼓聳身出頂如蟬之蛻殼升陟空玄如法行事自微至著由想念而成真則在乎其人矣上清靈寶大法卷之四
