front:
  text: 上清靈寶大法卷之四欎四
  hash: sha256:74b6be406ec8b34e26200c20d23c5fc27673c96e6094c837fc5ac2411edf9f3f
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5g0030_HFL_004-001a, image: hfl/0942/0942-152.png}
body:
  text: 洞微髙士開光救苦真人寧全真授上清三洞弟子靈寶領教嗣師王契真纂十玄修用門十玄修用師曰十玄者所謂十奧也一曰太定神光二曰黍珠入妙三曰中理五氣四曰十轉回靈此四玄之旨各有衆真頌譯五曰吐納正氣六曰玄真隱諱以元氣結秀胎宫尺寸明呼吸巳叙開圖之旨七曰胎化法質明洞陽之火候周天之大數內錬玉字生化胎仙八曰本始神通應感功德九曰隂丹陽丹流精玉光也巳有成規十曰大行梵氣乃巳之元氣也洞其奧則升騰有限明其旨則神仙有自矣神光大定經曰七日七夜諸天日月星宿璇璣玉衡一時停輪神風靜默山海藏雲天無浮翳四氣朗清一國地土山川林木緬平一等無復髙下土皆作碧玉無有異色衆真侍座元始天尊懸座空浮五色獅子之上師曰此說元始天尊妙用神道化機運感之所致既言七日七夜日月星宿一時停輪何以分其晝夜七日七夜之數又非止是玉清有浮𥠖土有如比威神妙化道君所言諸天也一時是應三界諸方萬天皆如是也此之微妙聖應天尊外化日月不行星宿不運璇璣玉衡停輪不顯晝夜其實內運主宰功用未嘗暫停故玉晨明七日七衣之數又非玉清玉京說經比人世七日七夜之理言一國則諸天諸地皆統言之則云一國地土也緬平一等則普同萬彚神化無不遍及故云無復髙下以內言之諸天日月則目不瞬星宿則氣不運也璇璣玉衡則運脉不息也神風靜默無出入息也山海藏雲隂陽無朝交也天無浮翳內外無物也四氣朗清內外上下一同也一國地土猶一身也山川林木猶四肢百脉毛髮九竅肌膚營衛神空骨節也土皆作碧玉入於道定之境也師曰以內言之乃大定神光湛然見玉清境有七日七夜之功七晝七夜日月停輪二目不瞬即非暝目亦非內視亦非臨目是七日七夜久視停其目瞬照明三部內外洞然其一身氣朝運於百節經絡隂陽營衛皆係於三部息脉其息脉乃人之一身璇璣玉衝也四至為璇璣三部應玉衡既是璇璣不運則日月駐景星宿停輪四至不至則三部不息一身氣血俱不運轉先要在神風靜默無吹噓出入之聲山嶽藏雲無蔽明妄想之境清明湛寂天無浮翳自然溫涼寒燠四氣朗清萬物皆同一色況一身內外皆如碧玉無一毫之塵漸至百真守死戶萬真朝身形可以舉身升空百日神合道妙千日白晝騰飛上升其天尊空浮乃自巳神居玉清宫又曰玉帝宫經云自已有天尊何勞上望天又元真讃曰天尊雖逺妙近降泥丸宫宫室皆七寶窗牖自然分是也五氣朝絳宫威神之妙化結而成獅子天尊坐而乘之下入丹田左青右白前赤後黑中黃故有五色之稱玄座空浮有無化應虛實信感七日七夜湛然見玉清天尊是時太定神光上乘至妙功圎㑹遇立致輕舉可以力取定中魔試水火刀兵王法萬種報於絲芒之實皆不得其道旨七日七夜之外所是見者皆未來之事或言之外則前功並喪無望仙冀豈不慎口耶太乙真人頌曰蓊𡨋無心太淵潜形蒼色混同存化凝靈鴻毛不動內外含貞龜啖紅虺結秀真精日月朦朧璇璣不升白霓青霧往復交并七日神通自見王清璇璣王衡圖一呼一吸三寸四至共得六寸一至得一十五分經緯天地縱橫十五故上帝付黃帝即河圖數也一呼脉再動一吸脉再勤呼吸定息脉五動閏以太息則六寸一動一寸一息脉行六寸夫大定之法惟先於定心心者百神之舍五官之府也心君湛然則聲色貨利皆不可得而撓之以此心而推則進道不逺矣時人慕道雖多達道則少始志雖勤終心或怠者皆由於心不定也定心之法貴斬三尸去六賊命魔以伐其害道之端息氣以造其入神之妙靜而定定而應神光內發日月洞明一氣常存萬神不散湛然見玉清境矣法曰兆絶慮澄心凝神思道運絳宫赤氣下降玄泉上升心血腎精二氣交合放丹田中孕生嬰兒漸長如真人形次運肝中青氣如雲下𦋇真人被青衣青玉冠青圭歡顔和恱次運心火池中有火龍一條躍出乘載真人乘五色雲氣自夾脊大度橋直上泥丸與元始天尊合為一體金樓玉殿法座寶幢一一周備須㬰元始運化生一一生二二生三之道化百寶光化生諸天童女官君森然環列元始寂定復放寶光一條洞照北隂之處並化為碧玉色自上而下光明洞達元始勑飛天神吏天丁力士持金玉簡金書勑字徑到北酆十二河源去處蕩除穢濁請滅三惡斬絶地根自坤至艮自艮至坤自辰至戌㸃戌亥子兌中中震卯存肝出青氣一條蕩絶諸根飛度五戶再㸃申酉寅巳亥隨訣召靈官以開五戶欲色愛情貪皆令清淨元始存洞煥一身皆如赤明境元始再勑諸魔王天丁力士飛天神王徑下北酆呼三尸名見三人出即有擲火大神放烈穴燒滅蕩然清淨亦呼七魄名有白衣七人從肺出再呼三魂名青衣三人從肝出同入火池一煅即化為嬰兒玉體光瑩內具五色有赤文羅絡形體各鎮其宫元始即下居赤明之境端靜而坐諸官君隨光而散了然無物一身照徹內想不出外想不入真造道之境也守而行之則大定神光之道可得而造矣兆於每日清旦靜坐寂定存心端謹無內外想先淨身口想念如前一假了次叩齒三十六通鼓動華池灌錬五芽生靈液一口咽入淵元宫以左手剔起十二辰訣飛子午斗上升泥丸以右手剔十二辰目飛子午斗於大丹氣枕一穴飛芒過擡頭兩目髙奔日月正取太陽之氣咽入絳宫平一氣不升降定目不瞬諸天日月停景混沌一氣子中名星宿則氣不運行兩手十指交叉平心運脉不息以舌拄上腭合齒生津神風靜默咽氣下歸丹田山海藏雲瞑目不顧外想內外無物天無浮翳再行一氣周匝四體內外上下一同四氣朗清端坐一身不側一國地土以一身鼓運體節上下內外更不妄想山川林木緬平一等無復髙下平坐一心朝念觀相一身已土皆作碧玉入道定之境也運用巳周偃息下座大定神光之圖人端坐圓光中身上有五色光訣曰以耳對肩以鼻對臍收其六根專神於目非外非內觀其神光三日之外密室之中見神光一㸃孜孜定神四日之外漸明漸大神光滿室定中百物皆為未然七日之外見一切真靈鬼物方入洞觀徹視之道各主用旺四十五日各主一分凡行大定徹視之道須持二品戒行大定三年面朝三清天尊賜劵白日飛升位補天真若不持戒德智慧不生難入大乘之路妙能體合至妙升入玉清此道不問開度濟生伐惡朝修保身護命消災去痼須行此道惟每日眛爽子午之時實可行之是時神清氣爽萬神同集洞達幽明此一身晝夜運化之妙乃宗師授於玄師皇人口口傳授度人若不坐應虛負仙階天曹地司並無仙籍黍珠入妙經曰十遍周竟十方無極天真大神一時同至一國男女傾心皈仰來者有如細雨密霧迮國一半土皆偏陷非可禁止於是元始懸一寶珠大如黍米在空玄之中去地五丈元始登引天真大神上聖高尊妙行真人無鞅數衆俱入寶珠之中天人仰看惟見勃勃從珠口中入既入珠口不知所在國人廓散地還平正無復欹陷師曰謂十遍說經巳竟十方無極大神并天真一時同至感召十品慧力經澤祥應一國皆獲護度咸得長生故傾心皈仰傾國來赴說經之所謂如細雨密霧不可稱量其數所言無鞅之衆萬天普言一國一國並㑹大浮黎土其地不能厚載天尊經力重德及無鞅廣衆則地窄偏陷來者之衆雖巳迮國一半尚自不可禁止是以天尊施玄妙大化懸一寶珠大如黍米在空玄之中莫測所懸之系去地五丈離於濁色之表登引天真大神上元之真九品之真上聖髙尊中元聖尊九品之聖妙行真人下元仙真九品真人千乘萬騎隨天尊登引俱入寶珠之中其一切天人非天真上聖真人故難隨無為化機不能同入空懸黍珠之妙止仰看而巳見勃勃從珠口中入既入珠口不知所在且如下格小仙有芥納須彌之妙懸壷天地之境何況大聖天尊敷宣大教示現神變也所言寶珠大如黍米巳是微妙更去地五丈能寶珠在空玄之中者非天神亦無此明慧又況見其珠口者實天尊登引聖真入妙有虛無之境當時隨天尊入於寶珠之時天人仰看即見珠口既俱入寶珠之中即天人不能見寶珠之內玄妙之化是以國人廓散地還平正無復欹陷此當時說經之境即天尊寶珠之妙也以至道言之大道神通大無不包細無不入聚則成變億萬無鞅之衆俱成毫芥之妙聚則如是散則從無生有遍及萬天諸國分形兆億無所不遍無所不入散則如是也去地五丈則離其五欲五塵五聚五色五香五聲五濁在五行數外故能入空懸之妙黍米者五穀之長一國者一身之比欹陷者道有傾迮未全一體難稱重玄之妙化天人則萬神也上聖天真妙行真人則三元之神也天尊則一身之主也以內境妙道言之乃玉清寶珠神化胎仙之訣以大法言之却粒愈疾之法以修誦言之威神玄化之儀蠲災召福之品師曰九轉十遍功用既周即證從有入無空玄黍珠之妙先召陽精後呼隂華比細雨密霧而入一身周盈祖氣十回神化元谷祖氣一歸衆氣同隨化黍珠之玄丹鎮黃庭之靈府丹成貫日餌之立駕雲輿上升玉清位為真人太玄真人頌曰靈盻比天上應太玄三日陽合七朝隂全十三坤位十八運乾望朔帶符八八為弦二十三夕隂陽宗元名曰常道此㑹三田一塵有染失於綿聮黍珠人妙之圖天尊妙化之圖中理五氣經曰元洞玉曆龍漢延康渺渺億劫混沌之中上無復色下無復淵風澤洞虛金剛乘天天上天下無幽無𡨋無形無影無極無窮溟涬大梵寥廓無光赤明開圖運度自然元始安鎮敷落五篇赤書玉字八威龍文保制劫運使天長存梵氣彌羅萬範開張元綱流演三十二天輪轉無色周回十方旋斗歷箕回度五常三十五分總氣上元八景冥合氣入玄玄玄中太皇上帝髙真泛景太霞嘯詠洞章金真朗郁流響雲營玉音攝氣靈風聚煙紫虛鬱秀輔翼萬仙千和萬合自然成真真中有神長生大君無英公子白元尊神太一司命桃康合延執符把籙保命生根上游上清出入華房八𡨋之內細微之中下鎮人身泥丸絳宫中理五氣混合百神師曰此天尊說造道開天之本五劫生成之始也經曰天上天下無幽無冥無形無影無極無窮溟涬大梵寥廓無光師曰此明大道本末之體也經曰赤明開圖運度自然元始安鎮敷落五篇赤書玉字八威龍文保制劫運使天長存師曰自天尊五劫開化之後運洞陽之火冶錬成文劫號赤明安鎮五方保天長存是五帝育物之道付之五老諸真乃中品之道也經曰萬範開張元綱流演三十二天輪轉無色周回十方旋斗歷箕回度五常三十五分總氣上元師曰開劫之後惟立萬法之範功用造化總於上元經曰八景𡨋合氣入玄玄玄中太皇上帝髙真泛景太霞嘯詠洞章金真朗郁流響雲營玉音攝氣靈風聚煙紫虛鬱秀輔翼萬仙師曰前明天地大道之本次說人身內景之道上清八景三部二十四神乃萬仙之首衆神之主玄中太皇者西元金毋此混合大洞玄中之玄妙中之妙上上之道明者神仙修之成上真經曰千和萬合自然成真真中有神長生大君無英公子白元尊神太乙司命桃康合延執符把籙保命生根上遊上清師曰正是混合五神大洞萬化之道是付之玉晨上品者是也經曰出入華房八𡨋之內細微之中下鎮人身泥丸絳宫中理五氣混合百神師曰太乙含華如蓮八𡨋細微比經緯五氣皆由三宫混合百神主於五神因化訣曰此二章之一章也乃靈中之寶上品之道正所謂玉晨道君云受元始無量度人上品是斯也造化即非身外根本比於三天上皇三十九帝九霄無上髙真普天萬帝無極髙真咸皆宗仰朝於紫微上宫金闕七寶瓊臺之內靈妃侍香真人典守四萬劫一傳妄泄此道削名玉清九祖沉於火毒之獄一身永受風刀之考永劫不原七玄世世蟲癩之報非巳成真人無科可授誤泄一言永獲考殃非上玄聖師下教天真小仙豈可得明乎妙行真人頌曰一氣朝宗入於八𡨋天門地户啓閉塞通生本太微明梁祖氣天入作陽天開於隂地泄為真納與邪功水火同來百神回東歸於谷室妄泄傾崩太乙含華之圖心胞八脉上通九色內含五彩太乙含華如白蓮旁通九鼎乙庚合成緑丁壬合成蒼戊癸合成紫丙辛合淺紅五神混合圖十轉回靈經云十轉回靈萬氣齊仙師曰十轉之道乃五行生成之道十轉之法是天尊十過說經神化者是其理矣經云衆真侍座師曰一身真集可議斯言經云元始天尊說經一遍諸天大聖同時稱善是時一國男女聾病耳皆開聰師曰真集常善水數生一普天蒙恩水生上朝遍流山谷沐腎增智聾耳得開病耳得聰至道言之迷者不知音外真病耳不聽無聲火聰亦曰聾得水之真一流智升慧開時並耳聽也經云說經二遍盲者目明師曰一身光明之主日月精華之根者目也為尋真之户牖見道之靈宗上道禁經日月為首光明者火也中主之瞳熒惑之本日月分暉也火二生數天一真水浴生本始之根上玄真火騰飛於心故復光返明接景三光是盲者目眀況生化之本甲坼兩腎戌亥之元系水朝元三瞳上凝心生火視三光合并二瞳主目光曰吁貟是也至道色盲亦由其類矣經云說經三遍喑者能言師曰木之生數也以至道言之物生五行一色有五彩隂陽互相反覆藏其用其喑者以常道言之肺王音者以五常明之言生金也金主聲即天尊三遍木之生數神化理在西方正金之體以木召金返復神變故喑者能言是也經云說經四遍跛痾積逮皆能起行師曰金之生數也跛痾者偏枯肌血四肢攣曲癃痾跛蹇也積逮之疾者世傳逮及積沉不愈是也此正是筋脉舒蹤血絡澀流屬於木脉肝氣羅絡之至即四數神仙正所謂返復五行生成之法也以至道言之法身之病金木互用則昌金木正用則亡正是水火互相須金木互相愛故四遍金之生數而成木之神變此之謂也經云說經五遍久病痼疾一時復形師曰土之生數也一身肌血形體皆屬於土五遍復形全於五行之體故盲聾喑啞跛痾積逮久病痼疾一時痊愈復形全質是五行生數也經云說經六遍髮白返黑齒落更生師曰水之成數經云說經七遍老者返壯少者皆強師曰火之成數一身光內生五臟之華外改老者返壯少者得之顔貌益強皆水火之功也經云說經八遍婦人懷妊鳥獸含胎已生未生皆得生成師曰木之成數生氣育物皆得生成聖胎凝靈八氣秀結分形胎化無諸耗損木之生氣所主也經云說經九遍地藏發泄金玉露形師曰聖胎九轉金之成數形難隱諱金光玉華照耀一身所謂金容玉貌瓊肌瑶醴沐溉一身噓呵萬物立生金玉吹氣成金唾地成寶百光千彩映絡內外皆由五行成用金玉發胎聖胎分形也經云說經十遍枯骨更生皆起成人師曰土之成數所謂十轉回靈萬氣齊仙回骸起死朽骨變仙更生成人此十遍之道祖於五行生數終於五行成數明此道則長生修其道則神仙脫殼飛升止於此矣若功成行滿位登髙真八十一日一轉八百日小乘三千日大乘不離斯言應出産一切神仙萬法路徑殊途事歸一揆真師曰口訣盡於文焉是下品之道付諸真者是也法空真人頌曰自一至十五行為本隂陽周回出入聖閫日上扶桑月沉玄衮萬神朝真得同大混急急如律令吐納正氣經云引氣三十二過師曰靈寶正氣即三十二天正真道氣若不採納此氣內修無功成之基外施無感應之驗則空尸行上道下鬼誦靈章徒用施為耳太黃天黃氣太明天緑氣清明天青氣玄胎天赤氣元明天蒼氣上明天黑氣虛無天碧氣太極天紫氣師曰步斗牛女虛危室壁之罡取氣則八天天君遣真仙侍衛洞觀八天之事所適無礙赤明天白氣玄明天緑氣耀明天黃氣竺落天青氣虛無天赤氣觀明天蒼氣玄明天黑氣太煥天碧氣師曰步角亢氐房心尾箕之罡依色取氣則八天天君遣真仙侍衛能洞觀八天之事所適無礙元載天紫氣太安天白氣顯定天黃氣始黃天緑氣太皇天青氣無思天赤氣上揲天蒼氣無極天黑氣師曰步井鬼柳星張翼軫之罡依色取氣則八天天君遣真仙侍衛能洞觀八天之事所適無礙皓庭天碧氣淵通天紫氣太文天白氣太素天黃氣太虛天緑氣太釋天青氣龍變天赤氣太極天蒼氣師曰步奎婁胃昴畢觜參之罡依色取氣則八天天君遣真仙侍衛能洞觀八天之事所適無礙服氣訣曰凡服三十二天之氣並先叩齒九通自天門入上元綱流演圖至二十八宿分步之每天存金樓玉殿天帝端坐冠冕衣服隨本天之色口降本色氣如絲芒鬱鬱然布於兆身各從其數吸歸身中凡有祈奏依帝玄治罡風中默奏立伺感通四維梵天中斗罡皆取直宿日服兼於四天並行玄真隱諱亶婁阿薈丁丑豫無惒觀音戊寅隨須延明首已卯蠱法攬菩曇庚辰臨稼那阿奕辛已觀忽訶流吟壬午噬嗑華都曲麗癸未賁鮮菩育臻甲申剝答落大𣑽乙酉復散煙慶雲丙戌無妄飛灑玉都丁亥大畜明魔上門戊子頥無行上首巳丑大過回跖流玄庚寅坎阿陀龍羅辛卯離四象吁貟壬辰咸南閻洞浮癸已恆玉眸詵詵甲午遁梵形落空乙未大壯九靈推前丙申晉澤洛菩臺丁酉明夷緑羅大千戊戌家人眇莽九醜巳亥暌韶謡緣邅庚子蹇雲上九都解飛生自騫損那育郁馥辛丑益摩羅法輪壬寅夬霐持無鏡癸卯姤攬姿運容甲辰萃馥朗廓奕乙已升神纓自宫丙午困刀利禪猷丁未井婆泥咎通戊由革宛藪滌色巳酉鼎太眇之堂庚戌震流羅梵萌辛亥艮景蔚簫嵎壬子漸易邈無寂癸丑歸妹宛首少都甲寅豐阿繿郁竺乙卯旅華莫延由丙辰