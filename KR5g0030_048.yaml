front:
  text: 上清靈寶大法卷之四十八圖六
  hash: sha256:955462b9a3a2dbc5e0d6a3f0c54b1b690fe8222a04e043ea06a102897111d869
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5g0030_HFL_048-001a, image: hfl/0956/0956-118.png}
body:
  text: 洞微髙士開光救苦真人寧全真授上清三洞弟子靈寶領教嗣師王契真纂齋法符篆門靈寶升天左右合同真劵師曰此劵乃太上之符契升天之質證也法用兩面碧紙髙九寸或一尺長一尺六寸或一尺八寸為則左劵正面當中團團寫大梵隱語一行寫四句左劵乃竒數却用單字其告文則自內寫到兩邊背面依式篆三皇內音真文右劵正面當中團團寫三十二天帝號一行亦寫四句共一十六行右劵乃偶數却用雙字其告文亦如前式背面亦書真文煉度畢宣告當中截斷以右二半用柏木匣盛或青紙作內外封付天門吏密封申狀關子同發左二半以左一半付男魂首者以右一半付女魂首者收執以青紙封套繫幡腳上或置生天輿中如專度一人則以青囊盛置芻身之左右佩之執付天門合同也左劵正面式三界天門守衛諸神靈寶升天左劵告下法位臣姓某承誥奉行太歲年月日時告下道境魂神受度更生自然一如告命度亡過某等魂上登元始靈書玉清中篇太上撰次降自三天升元始靈書玉清中篇太上撰次降自三天升度亡過某等魂上登道境魂神受度更生自然一如告命太歲年月日時告下法位臣姓某承誥奉行靈寶升天左劵告下三界天門守衛諸神左劵背書三皇內音真文六十八字右劵正面式三界天門守衛諸神靈寶升天右劵告下法位臣姓某承誥奉行太歲年月日時告下道境一如告命天人亡過某等承兹功德上登化上清無量之奧深不可諱敷落神真普度天中之尊天中大魔天中之靈九和十合變音隱韻天中空洞自然靈章無色之境天帝玉真梵行帝諱三界天名隱無色之境天帝玉真梵行帝諱三界天名隱音隱韻天中空洞自然靈章天中之尊天中大魔天中之靈九和十合變化上清無量之奧深不可詳敷落神真普度天人亡過某等承兹功德上登道境一如告命太歲年月日時告下法位臣姓某承誥奉行靈寶升天右劵告下三界天門守衛諸神右劵背書三皇內音真文六十八字左劵普度告文元始靈書大梵隱語無量之音中篇玉字普度九州分野十道冥鄉三界九幽北帝泉曲五嶽五道天牢地獄六洞十宫河源木府無間之中一切亡魂上登道境飛天書功萬神侍身魔王保舉上仙大勳遊行三界升入金門一如告命太歲年月日時告下法位臣姓某承誥奉行右劵普度告文諸天隱韻諸天隱名敷落神真普度九州分野十道冥鄉三界九幽北帝泉曲五嶽五道天牢地獄六洞十宫河源木府無間之中一切亡魂上登道境今日欣慶受度歷關諸天請滅三惡斬絶地根飛度五戶名列太玄魔王監舉無拘天門一如告命太歲年月日時告下法位臣姓某承誥奉行右二告文普度用之乃更易前面者用時子細推詳發天門劵封式內封式靈寶升天左右合同真劵具位姓某謹封封皮背書升度亡某等魂外函式靈寶升天左右禽真劵告下三界天門守衛諸神具位姓某謹重封右二劵如共作一封只如前式若分作二封則中間左右二字分開言左劵右劵是也給付亡魂封式正面式靈寶升天左右合同真劵具位姓某謹封背面式升度亡過某等魂左右二劵又法以隱語三十二天並直書於前亦一十六行告文則書于後却無意義不必拘執也亡者若無此劵地府土府不與全神而去水官不與精魄全識而去火官不與靈光全明而去五嶽不與名籍而去天門守吏呵遏不使進前若得此劵即得升入天門上生福堂矣又有二泰後符今附于此左劵後符右劵後符披黃授道紫府諸無上盟真玉匱靈寶披黃授道紫府真誥伏以神霄寶篆降自中天玉笈靈書頒從絳闕行之則超登真品佩之則克證仙階而況三氣祖書度窮魂於幽夜九天寶籙拔苦爽於圜扉應為復命之流盡賴生成之賜入意亡某受持之後克為大道之民常居福堂得證無為之果今對黃壇傳度宜永遵承符到奉行一如玄科律今右伏以道隱無名莫測升沉之變氣鍾有象復形生死之機雖順理之無差奈業緣之有證今亡過某命歸冥路魄散幽塗不無處世之愆諒有積生之過是以羅酆憲府録其陽過隂功操三塗考校之權執九幽禁罰之柄念之苦楚何以蠲原識性荒迷難超冥昧今日大吉咸稟釋除魂離長夜之庭罪滅惡根之苦披黃授道符命超生洞達希夷登真妙道一如告命太歲年月日時告下法位臣姓某承誥奉行太乙救苦天尊青玄上帝南昌上生黃籙無上盟真玉匱南昌上生黃籙赤明開化元始披圖體雲成象瓊書玉篆氣結為文上度生身長存下濟幽魂起度仰蒙道蔭永荷玄恩今據齋主某入意謹詣玄壇乞為亡過某傳授無上盟真玉匱南昌上生黃籙一階永作津梁持為身寶謹請南昌上生煉魂真君度南昌上生煉魄真君度南昌上生煉形真君度南昌上生煉胎真君度南昌上生煉神真君度南昌上生煉真真君度南昌上生好生真君度南昌上生度生真君度南昌上生化生真君度南昌上生注生真君度南昌上生火煉真君度南昌上生流火真君度南昌上生保命真君度南昌上生生根真君度南昌上生保制真君度南昌上生保全真君度南昌上生判生真君度南昌上生度魂真君度南昌上生護命真君度南昌上生注福真君度南昌上生注壽真君度南昌上生煉化真君度南昌上生反救世業真君度南昌上生哀愍真君度南昌上生混成真君度南昌上生運氣真君度南昌上生超界真君度南昌上生升仙真君度伏望同垂巨澤受度亡過某上資往生徑陟南宫化生人天魂神解悟咸乞真仙一合來降護持神符白簡上帝符命告聞諸天左右獄宰案掾尊神拔度亡過某魂消滅大罪塞遏邪源形神升度謁帝天關福智自生驂侍龍轅永契無為真道長存一如告命神符丹簡上帝符命宣告三官天牢地獄主司大神拔度亡過某承領符命部衛形魂上朝帝庭罪仇和釋與道合并神登玉闕受煉長存一如告命神符碧簡上帝符命赤書玉文上通紫庭天慈赦宥三界𡨋獄九幽罪魂亡過某億曽萬祖苦爽遊精削除罪録落滅惡根速赴生方氣息間寧上登天堂澄質煉真身心洞明蕩除隂翳與道合真一如告命神符玉簡上帝符命上開八門三十六獄執法治官速謁帝軒赦宥夙罪超度亡過某上升三天復升治職氣入玄玄一如告命神符金簡上帝神符宣告獄官司禁執罰典録刑司開度亡過某煉魂澄神升入玄關削落罪書道備功圓上升三天真境無為一如告命右籙奉行普告三界無極神鄉泉曲之府北都羅酆三官九署十二河源上解亡過某並及祖考億劫種親疾除罪簿落滅惡根不得拘留時刻升遷告以籙文風火驛傳太歲年月日吉時於黃籙大齋壇傳授法位臣姓某承誥奉行保舉師監度師傳度師主籙南昌上宫可韓司丈人真君度籙南昌上宫煉魂真君南極長生大帝君靈寶長生度命黃籙太上洞玄靈寶長生度命無上黃籙維大明某年太歲某月某朔某日鄉貫某人入意仍就黃壇乞傳授太上洞玄靈寶長生度命無上黃籙一階付某靈魂齎執過度三界超升九天謹按經云元始天尊昔在九清妙境三元宮中與諸大聖衆敷弘至妙開化人天標紀善功注名黃籙金格玉簡陳列三清一一地獄皆見十方救苦天尊入於九幽拔度諸苦天尊普告四衆汝等若能受持金籙白簡九真妙戒長生靈符救苦真符當消九幽大罪標名九宫察命童子護戒威神五帝直符六宫掾吏自當隨逐簡文覆護受戒亡靈今當為汝顯説九真妙戒金籙白簡受持功德拔難濟苦神力難思衆靈稽首伏受教命天尊告曰一者敬讓孝飬父母二者克勤忠於君主三者不殺慈救衆生四者不淫正身處物五者不盜推義損已六者不嗔凶怒凌人七者不詐諂賊害善八者不驕傲忽至真九者不二奉戒專一護戒威神元乙太素君度太華紫府君度無英白元君度太乙司命君度酆都九壘官君度北籙定籍君度天河東井煉度君度東極青宫救苦九龍金籙元始符命金籙白簡救苦真符告下十方無極世界三官九府百二十曹五帝考官九幽地獄巨天力士執罰神兵司録司命司功司殺牛頭獄卒三界大魔拔度亡過某出離地獄永辭長夜覩見光明萬罪蕩除𡨚仇和釋乘此九龍符命功德上生天堂一如告命百二十曹官南昌紫微流金煉真之籙元始符命金籙白簡長生靈符告下南方丹天世界朱陵火府南昌上宫長生大君韓君司馬司命司録延壽益算度厄尊神回骸起死監生大神超度亡過某上登朱宫流火之庭玉眸煉質黃華蕩形書名紫策受化更生乘此金籙度命功德時刻升遷一如告命回骸起死尊神監生大神帝君品命受度亡過某靈魂即日恭詣黃籙齋壇拜受太上洞玄靈寶長生度命無上黃籙一階如法受持永充濟拔人間天上敬信奉行一如玄科律令太歲年月日某處黃籙齋壇給度師法位姓某押保舉師監度師太上洞玄靈寶長生度命無上黃籙止正度用之其餘不給可用黃素朱書以彩色繪畫人物方注亡人之名乃正度者次當流火亭符火煉符並有散形在火煉符篆門亭中人物乃火煉符是也印押了可以青紫紅黃綾錦之屬表背用經帶軸頭一如宗壇籙樣此出蔡致虛黃籙儀也又玉堂本謂之金籙却用青素金書餘並同式紙可髙一尺一寸上空二寸下空一寸入紙二寸九分書之上清靈寶大法卷之四十八
