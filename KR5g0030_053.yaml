front:
  text: 上清靈寶大法卷之五十三寫二
  hash: sha256:3772b87319e06314a1a1e6b53a2926bf0a3ad6d064e80c5174cd2aac4bfdcd8e
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5g0030_HFL_053-001a, image: hfl/0958/0958-066.png}
body:
  text: 洞微髙士開光救苦真人寧全真授上清三洞弟子靈寶領教嗣師王契真纂大煉符篆門九天煉度隂符鬱單天符三氣尊神合生九氣出乎太空隱乎空洞禪善天符無光無象無名無形無色無緒無音無聲梵監天符開闢玄通三氣混沌乍存乍亡寂然天符氣清髙澄氣結凝滓九氣列位並受生成波羅天符三氣所育九氣所導洞玄天符三元育養九氣結形九月神布氣滿能聲梵輔天符九天稱慶太一執符帝君品命司命定算五帝監生髙虛天符男則萬神女則萬神唱其恭唱其奉無想天符男則司命敬其器女則司命敬其順九符告文太祖金字玉文九氣隂符拔度亡過某等魂土立天堂一如告命九天生神本氣符右符凡行九煉用黃絹造幡九首闊九寸髙八尺一寸頂上書本氣符幡身篆九天隂符兩手分寫告文分安於九天壇中隂尸九煉符師曰此符乃髙上空洞混化九天元父道君降而結為雲篆付九天金籙無量壽生神尊君行之以濟隂尸也如遇此符則九氣齊并如日之升百骸流光更無隂滓便成仙人矣凡用此符合以黃𥿄朱書或以表九通書符於表前上奏九天之帝則帝君受符九天稱慶太一執符帝君品命主録勒籍司命定算五帝監生聖母衛房矣右符書時存身為金籙大神道君搯九宫訣取九霄正氣呪而成符貼於表前鬱單天符天清地寧人靈九曜順行陽滿隂盈心生虛寂救苦幽隂自然合道日月同形禪善天符道本澄廓運化隂陽合真悟道了心無心梵監天符等觀慧化靈寶玄光照徹諸天三十二帝興隆教法救度存亡丹界靈符盡獲更生寂然天符靈符火煉百骸自飛氣變庚辛神度玄津身心清淨駕景騰飛波羅天符三氣勃煙日中晶精𩲸煉魂生隂激陽熛洞玄天符三變九煉易景反容體合玄光永享長生靈化天符梵上幽微逹爽飛步玄邈禦金獲存雲霄受氣俱守玄玄黃庭髙虛天符三陽煥發七氣成胎五行俱聚合鎮丹臺日月含輝胎光垂芒無想天符玄皇應運氣貫天中至妙真靈匹配元宗九天總氣度魂玉符鬱單凝神禪善保神梵監凝氣驕樂會真寂然安藏靈梵生津化應流景髙虛曜神無結無愛列名帝篇隂陽會神三萬六千二氣交映內保三田克登聖品與劫同年流雲玉軿來侍帝軒䇿龍駕景髙升九天急急如長生大帝敕右總符豁落斗祖氣吹布焚之亡人身有陽光奪日仙衣可愛神識朗明也八生自然靈空飛符柏拘羅第一煉某人罪消隂翳疾除罪簿落滅惡根玉真虛生混然靈仙符墮拘勒第二煉某人煉除纍趣斷地逮役上解祖考拔出地戶永離鬼官斷絶地根三氣龍胎玉寶神水化生自然符提頭羅第三煉某人煉除罪目名上南宫魂度朱陵制魔保舉道真虛玄九微鳴水素元符携任度第四煉某人升𠳤法橋上登朱府飛升金闕即得返形遊行太空飛度五戶名列太玄徑上南宫九靈玄生天水飛靈元精之符須持第五煉某人煉𩲸易質受化更生死魂受煉仙化成人玉寶洞微左契理命保真符蘇越第六煉某人更生變化隨劫輪轉與天齊年虛明三洞右契神化通真玉符務雲子第七煉某人煉質逍遙過度三界永無退轉劫劫長存上玄三氣化生自然之符凝泓第八煉某人煉質登真飛升金闕遊行太空逍遙上清五元化身二景精微飛空之符靈淵第九煉某人普度無窮隨劫受生九天生神寶符告文靈寶自然九天生神寶符書符右符告下疾除罪簿司斷地逮役司度上南宫司飛度五戶司受煉更生司仙化成人司過度三界司飛升太空司普度無窮司靈官仙吏奉為亡過某等請降真氣生神育質度命登真一如玄科律令太歲年月日具位臣某承誥奉行胞命元一黃演之氣符混元生胞胎命元洞𡨋紫戶之氣符煉胎成形魂命元長靈明仙之氣符魂門煉仙𩲸命元碭尸冥演由之氣符𩲸户閉關臟腑命元五仙中靈之氣符保命生根靈府命元髙真沖融之氣符靈氣固守元府命元髙仙洞笈之氣符元氣自分華府命元真靈化凝之氣符華堅聚一嶽府命元自然玄照之氣符法酒符玄元老君敕賜法酒大梵天玉津玄梵天金醴寶梵天瓊漿六氣道德之漿自然識慧之漿䦘苑素靈之漿芝品煉質之漿四氣消魔之漿三魂飲煉妙覺變化隂陽並化元英中真五臟敷榮神識洞清右符黃紋七寸朱書向東南誦三天隱諱取真氣書凡煉度畢當賜法酒而煉之以此符燒灰調酒與亡人飲之還形復性符返本還元復命歸根二氣肇形隂結陽成午為魄戶未為魂營元氣纒絡降誕人形氣耗神衰𩲸喪魂傾日月星光變煉丙丁窮理性命復體完形胎生上玄心稟太真悟道聞絰離合上清服符呪復性返形九步八坤行剛七轉內外咸成三台子午絳宫受真氣化為主洞識元真返形易質往來俱榮天上地下洞徹光明永不輪轉離合上清右黃素朱書凡生身受度事畢須對天真謝恩面東拜服此章則永不墮輪回之道度亡亦用之明亡者續命章呪辰中黃景氣三秀發霄庭倉臺飛羽輪迎延道巳成司命奏帝書號為玄度君得生太霞宫列賔館上卿命門合精延守其魂黃寧左携元素君右攝朱鬱靈呪畢宣赦發遣焚化送魂流火亭符天地混合同其名氣分隂陽神貫精中皇取氣集萬四天主張上接元和神金生真火煉英四明運煥齊其靈左右日月鍾甲丁黃旗召靈熒煌庭鬱儀結璘二曜交𨇠受煉符乃亭中人形天上陽晶地下隂精台光幽精爽靈右先書年甲符蓋之玉眸太靈分天地精一氣混合隂陽佐成司命合德四齊生靈火鈴煉度左右靈真急急如九氣生神律令右符黃紙朱書上帝訣南氣吹貼朱陵火府亭中其橋上仍安九天生神章一卷焚時默呪曰火鈴炎熾變化十方萬神侍衛永斷不祥呪畢存火鈴滿地照耀天界光明奪日次云興此大法橋想經為長橋亡魂乘陽光而升天其亭想為朱宫魂皆登天矣又見天尊浮空垂一寶珠光芒萬丈接引上升召監橋大神符書符召遣呪三氣之化一氣之靈魂𩲸清淨神精靈靈混沌之始人鬼分精大神聞召急至橋庭飛升煉度引度朱陵急急如上帝敕右符黃紙朱書可召南宫流火之庭監橋超度大神周旬字曰之身長八尺三梁冠緋袍仗劒立橋之西召引魂超度上橋大神符召遣呪朱陵朱陵流火神庭神吏奉命執符而行引斯滯𩲸上升南庭神魂變化煉度更生急急如上帝敕右符黃紙朱書召引魂大神長八尺三梁冠青繡袍左手搯三指根召魂訣右手持幡立橋前祝令引魂升橋玉清生化保度天門寶符元始玉文保度亡魂徑升朱府上詣天門魔王敬禮萬神護迎玉清元命逍遙上清急急如上帝敕生天度命法橋符右符書於橋綵後上中下書三道上帝訣青黃白氣吹之次步引魂罡至橋所再步升度亡人罡存用引魂罡升度亡人罡步二罡畢存身為救苦天尊左目出紫氣三道右目出霞光五道繞橋三匝默呪曰仙人玉女左右仙聖金飛靈幡拔亡上生下元生靈隂司亡魂立至玄壇引領大將玉柱仙靈三魂七𩲸引領大將速速報應能言通語大賜軋坤江河日月八海五門諸天大聖引魂上玄速度仙橋不得夂停右存二目光相交接引亡魂升度法橋又呪曰乾元亨人八卦九元十二月將九宫大將二十四氣八旺八門靈通變化大聖真靈赴吾壇下引接亡魂次存心中有真火自口中出數百丈存亡人乘火光升橋兩手午文呪曰汝受大羅真籙長生逍遙手執真符不經地獄一心朝上帝敕汝速超生上帝有敕奉行神王升仙車式師曰凡煉度法用綵帛作紫車一乘以神王二人擁車五馬牽車車中安亡人位度橋了焚之不可用召亡幡蓋此幡於煉度時已焚了却换紅幡度水池焚之次以黃幡隨車以童子導引而度天門次搯五帝訣焚之焚車呪天尊威神力救度衆生魂祥煙塞死戶慶雲開生門還將上天氣以制九天魂混然歸一身皆成自然人得馭紫雲車上朝泥丸君三界無遏難永脫輪回津甘露池符甘露神呪澄澄甘露滴滴瓊漿善則酥乳惡則冰湯九幽魂識七祖除殃愛河清徹苦海輝光孤魂不溺滯𩲸無傷元真勑命告示十方右黃素朱書玉訣於南宫前立一盆以甘草柿蜜煎水盛盆中焚符啓祝念甘露呪以符燒入盆中先存盆為寒池燒符念呪了却想為甘露謂之破苦寒池作甘露池也乃靈寶祖法是靈寶天尊賜南嶽魏夫人及許真君行之度池中魂消萬劫罪纍矣池邊祝云伏以圎池方沼象天地之形甘露寒池應苦樂之兆由是酆都暘谷泛灔渺彌泉曲河源深闊浩蕩善用者如酥如蜜惡報者似火似湯入此愛河名之欲海若也澄其五濁去其六根却其十纒除其三業則當易穢汁為甘露變寒池為香湯隂府開明沉魂超濟今某設九幽之妙供拔七祖之靈魂兼濟有情普資無礙故變寒池之水以為甘露之漿潤澤九幽通和十極即使魂神清淨𩲸識超蘇大度法橋上登朱府奉為加持甘露神呪次念呪焚符存用如前上清靈寶大法卷之五十三
