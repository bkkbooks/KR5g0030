front:
  text: 上清靈寶大法卷之三十飛六
  hash: sha256:1af9d1037a80c9278bf77a3484e8bb521c175bef64fa75823a3d7ffa684bdc02
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5g0030_HFL_030-001a, image: hfl/0951/0951-048.png}
body:
  text: 洞微髙士開光救苦真人寧全真授上清三洞弟子靈寶領教嗣師王契真纂傳度科格門師曰凡開壇傳度隨力為之若有力之家當預行申發至晚敕水禁壇宿啓行科亦如齊法次日昧爽登壇三時朝奏至晚下設醮傳度尤為盡善往往世俗從省止於設醮而巳故宿啓朝科罕得備載靈寶大齊道場三朝科文亦從更攺行用今且敘其傳度醮式乃受法謝恩之禮非黃籙齊儀量其輕重行之可也靈寶大法傳度醮科各禮師存念如法請宣神呪蕭仭扶桑方諸鬱霞元皇列真凝結雲芽明曜九芒含氣三華钁天振劒神虎辟邪安陽大帝攝御群魔上升玄都濯形天河和與道合真炎氣浮煙運升赤明長生元聖髙居玉京降妙玄羅散晶六冥元天大誥普濟群生消殄魔試奔飛火鈴保衛正氣億劫長寧和與道合真皓景金華長庚洞光大梵流布輪轉元綱蔚明交變騰化十方七關安鎮回合隂陽帝氣蕩蕩我享嘉祥玉文敷告生道延昌和與道合真太隂朔單上連帝居流𤔵騰晶化形玉虛輔衛三境簡閲元圖真符煥發定籍青都標名金籙宿釁咸除飛升碧落超登太無和與道合真元始虛皇集氣居中三境洞杳肇生穹窿七轉九靈混合回風變化萬神天地開通吉日行事萬魔斷蹤晨暉朗照默運元功建麾敢花執節太空十方普度劫運無終和與道合真法師長跪出官如法臣謹出身中五體真官功曹將吏開化度道隂陽功曹消災散禍解厄君吏各一十二人出某治中建節監功大將軍直使功曹隂陽神決吏各二人出出考嚴裝駐立營衛匝繞臣身郎吏虎賁察奸鈎騎都官僕射天丁力士治正執正收神食神吏收毒食毒吏收精食精吏收邪食邪吏誅符破廟吏剛風騎置吏驛馬上章吏飛龍騎吏等官並皆屯駐臣左右前後受臣詞語關啓此間土地里域正神治化靖廬名山洞天福地海嶽太歲官君法中將吏等神謹同誠上啓太上無形無名虛無自然至真大道無上元尊金闕玉陸下臣受法之日約以流通濟物是先接人為急今謹有奉道某人丐為進拜詞文上祈玄感當令臣所祈者逹所告者應所誅者却所禳者度功曹將吏飛龍騎吏分别關啓以時上逹列啓事竟各還臣身中復於宫室後召復到一如故事謹稱法位具位臣姓某謹同誠上啓玉清聖境元始天尊上清真境靈寶天尊太清仙境道德天尊昊天玉皇上帝南極天皇大帝北極紫微大帝承天效法后土地祇神霄玉清真王長生大帝東極青華大帝諸天上帝髙真日月星斗列漢髙真三官大帝四聖真君上清靈寶大法玄中大法師靜老天尊三天大法師靜應真君上古經籍度三師真君太極仙翁真君九天神功妙濟真君黃籙三師真君三洞四輔經籙神仙僉書雷省浮丘真君傳經傳法師君真人法籙天仙官將吏兵玄壇與降三界十方上聖髙真恭望洪慈洞開靈鑑臣聞無形無名即玄真之妙𧷤有光有象乃神化之靈機混成宇宙之先肇造乾坤之本分兹一氣育彼三才宰制萬靈陶成庶類於是元綱啓藴立萬劫之根宗大梵發揮漏九清之祕典三洞流布九品宣行蓋以闡於化機亦以彰於道要因師尊之開度亘今古以欽承臣猥慚庸鄙之資叨綴班行之末濫司至教竊盻靈篇所宜隨力以宏科不敢因人而廢事既能潔巳以進當開勤道之途授受不窮所以副大教作成之意傳流有格理須祈髙真監度之恩是用瞻紫極以投誠望碧霄而稽首不揆菲儀之瀆輒延玄極之尊伏願五色慶雲擁擲火流鈴之仗三華黃道降飛龍唱鳯之車衆聖臨軒群真就列臣等百神震惕一念精純拜手天墀祗迎聖駕請列聖降帝行初酌重宣法職具位臣某謹重伸上啓三境髙尊萬天上帝十方無極太上靈寶天尊靈寶大法歷代師真三界十方上聖髙真臣聞道本無言因經科而立教化垂有作出法籙以度人九品三乘遞相通貫六書八體互以發明傳於天中為萬聖指歸之路降乎人世開群生修進之門自非歷劫之良因安得一窺於正典而況教綱精練始可為師志慮清髙乃容受法立功建事上以贊於玄猷勵行飭躬內以檢於凡質科條至重付受不輕如臣本匪良資實無逹識五芽三素豈知錬習之源六欲七情徒逐沈迷之浪所當省已安可接人蓋以立誓盟心登壇受職雖戒張皇而妄泄不許緘祕而失傳況承勤懇之辭願被正真之化豈以臣之不才終加折絶幸其人之有志僣為申謄然雖昧通真逹靈之機猶不敢傳叛道罔人之法爰稽彛典用闡靈場奉髙真之有臨仰帝尊之在御輒披凡愫上瀆宸嚴傳度詞表文謹當宣奏宣詞表焚燎按如詞言情忱堅切義當接引不敢遜辭臣聞靈寶神章洞玄上品延康之始莫測其端龍漢之初漸彰其妙結飛玄之玉氣成隱祕之靈音發五鎮之根宗經四譯而昭布寧家國以贊帝玉之治調隂陽以輔造化之功上聖髙真莫不因兹而證道沈靈苦爽豈非乘此以升遷實萬品之津梁乃衆靈之軌範雖巍巍之典傳度不輕然浩浩之功包容無外重念臣迂踈末學謬居師匠之階嗣法某塵陋凡資僣受仙靈之職事俱越分理實愧心尚祈天造之垂憐更冀師恩之覆育許容付度俾遂進遷真階早紀於玄都罪目悉除於黑簿不經魔試漸入仙宗顧冒瀆之至繁惟淩兢之無任再陳二酌以罄丹誠臣等再拜寅恭禮行亞獻舉十方靈寶天尊度師跪奏宣念臣聞元始祖劫化生諸天隱碧落之空歌敷紫虛之鬱秀開明三景用普植於神靈敷落五篇使保制於劫運懸坐五色獅子之上說法度人端居七寶騫林之中授經付世萬聖臨軒而稽首衆真侍座以皈依皆諸天隱祕之音非世上常辭之詠靈風槖籥致曰月以停輪金口宏敷俾神風而靜默一遍而諸天稱善十回則枯骨成人是知妙道難窮玄功無量上天所寶下世不傳遇至士以赤心齎金繒而盟受衆真監度萬聖臨軒諸天保以善傳魔王舉而道備方遵玄格許進清班以今弟子某肘步投壇持心受法臣早膺師㫖獲佩靈文本接物以度人遇至賢而勿祕有來懇願遂啓上玄巳獲報於吉祥㳙良辰而付授給符傳法授戒度兵伏望靈寶衆真髙虛列聖慈悲濟物方便度人俾弟子某逈出塵寰永離浮幻蕩六根而清靜出八難之輪回頓悟玄機得行道妙隆三千之功行招集群仙總五帝之魔王萬靈振伏臣與弟子稽首再拜宣讀投詞念授詞後嗣法弟子再拜跪白嗣行靈寶大法具位臣姓某誠惶誠恐稽首頓首虔誠再拜上啓金闕三境髙尊諸天上帝十方無極太上靈寶天尊靈寶大法歷代師尊願賜矜憐俯垂鑑録臣千生慶幸一旦遭逢嗣法傳真遷階進職永堅素志不敢負心倘渝誓盟甘從譴罰今與度師分環裂劵立誓飲丹伏望證明容臣受度臣下情無任懇禱之至再拜謹言舉度人無量天尊師與弟子回班對立師啓白宣戒弟子對上長跪聽受恭聞靈寶之道洞玄之宗其妙難名度人無量受之者功超七祖修之者形陟九霄乃萬法之靈樞總十方之正教德之至大深不可詳固當修其所當修尤當戒其所必戒受持不替真仙可階今對三尊先明十戒舉智慧生戒根頌第一戒者無忘八極忠者欽之極孝者順之極齊者戒之極寬者廣之極𥙿者樂之極容者和之極忍者智之極天以北辰為極地以山嶽為極屋以棟為極天以有極則能聚衆氣地以有極則能聚衆形屋以有極則能聚衆木人有八極亦如是也故能立衆善善立則道備道備則所聞見自然開渙所應自然調適此得靈寶度人之基也第二戒者無忘鑑水鑑者喻心水者喻性心明則萬法皆照性靜則五濁不歸道之在人圎通非蒙蔽可了亦非躁動可逹託鑑水而悟心性此得靈寶度人之體也第三戒者無忘日録日録者所以修檢善惡人之處世患不自知患不聞過患不聽言則無所益今以日録録日之所為不可不筆處皆已之非也改之為貴則日録者乃不教之師不說之友不詔之君父不約之法度也不可忘之此得靈寶度人之想也第四戒者無忘追度安鎮且人之所親不過父母所尊不過君上父母君上之德恩必報之者追度安鎮是也追者謂誦經行持上為祖父六親之過去者以資冥路度者謂誦經行持上為祖父六親之見存者以資福算安鎮者謂誦經行持上祝聖壽安鎮四方召龍行雨驅妖馘毒保護民物禳度星𨇠皆其一也其或在家行祖父之志或居官分君上之職種種利益有可報稱皆即為之凡木之落葉尚糞其本根則歸根復命之義也人之報本反始不可不勉此得靈寶度人之宜也第五戒者無忘治救之術慈憫所先凡有病者為其誦經行符至誠禳却如已至愛男女父母凡有方便種種惠澤皆盡其心如蒞官行政務布隂功寬平設法三省而行再思而動其或修治橋梁當道種植有益於世皆力行之夫人之有慈念如木之有根人而不仁不逮於禽獸故猩猩活象義鶻搏蛇拔難有如此者可思之此得靈寶度人之由也第六戒者無忘服錬之術參同天地效法隂陽念念正真存存不缺則自然超脫變化無方今之蟲豸有外捨陸走而至飛翔地脉川遊而遂奔逸在物既爾於人當然此得靈寶度人之方也第七戒者無忘剛潔剛則有守不行非淫潔則戒行不慕非食不嗜非淫則不損身之精神不慕非食則不殺物之性命見人妻女如已之所親見物性命如已之所生自然精神全而𡨚對少此得靈寶度人之實也第八戒者無忘儉約凡所求物當知皆元始祖氣化生灰水蕩穢不用修飾粟菽充飽不用珍庖此得靈寶度人之福也第九戒者無忘願約願者從初入道時時發心約者既入道後設誓天地神明司之母輒中變科戒不可不守此得靈寶度人之念也第十戒者無忘師友師者所以教友者所以勸教者似父勸者如兄孰為父兄可不欽重母委棄于此得靈寶度人之宗也舉奉戒不暫虧頌上來所宣十戒乃是師傳尊授發明古經夫經者藴道之機法乃體經之用欲遵正教修勤為先守之行之母得中怠億曽萬祖幽魂苦爽皆即受度上升朱宫惟修之益勤學之不巳功滿德就皆得神仙飛升金闕遊宴玉京子其勉之次傳經文謹按經云上學之士修誦是經而通微奧即得飛度南宫不經地獄普度無窮一切天人莫不受慶無量之福生死蒙惠上天所寶不傳下世至士齎金寶效心盟天而傳輕泄漏慢殃及九祖長役鬼官侍經五帝玉童玉女各二十四人營衛神文保護受經者身聽受之後敬而持之次傳法訣原夫道法自然功施不宰本強名而至妙極元化以無形洪惟靈寶大法大有金書實元始之希夷乃至虛之沖寂淵宗莫究妙理難窮祕大羅金闕之天垂浮黎寶珠之㫖諸天欽仰萬聖護持夙有善根方能窺奧今弟子某虔心稽首誓受祕詮首露十方盟誠三界願窮至理體道度人恭對聖前受持大法伏望玉京元老金闕至真遣玉女飛函捧金章而廣示命金童稱善敷寶笈以流傳使弟子某魂神澄正萬氣長存不經苦惱身有光明三界侍衛五帝司迎萬神朝禮名書上天功滿德就飛升上清受而行之母容輕泄次度法印原夫法有階梯職分品級凡欲司於號令合先佩於印章文移關奏賴以宣行呼召指揮資以合契上天所寶非人莫傳既齎信以效盟用依科而付授是故兵隨印轉將逐令行惟在受持必期嘉應次度法劒原夫代天行化布令宣威全憑三尺之神鋒以制群魔之非道光騰七曜威攝萬靈凡有指呼無不響應吾今付汝切宜珍藏逐一度畢師與弟子執筆立誓師念云回筆指天弟子曰上不負天臣若負天七祖受刑天若負臣日月不明師云回筆指地弟子曰下不負地臣若負地身受刀兵地若負臣草木不生師云回筆指心弟子曰臣不負心臣若負心合門不生心若負臣道化不行舉法緣常濟天尊次剖劵分環夫環劵者所以結誓三官告盟十天永堅信誓度師不敢隱真出僞弟子母得叛道背師分環永不渝盟裂劵永不負誓始勤終怠五帝録愆敬佩精修九天同福對聖被受終身寶持師執劵左邊弟子執劵右邊當中以刀劃破給劵誓約弟子跪云筆指東方九氣天中靈寶天尊真人神仙玉女玉童靈官仙兵今日欣慶受度歷關諸天請滅三惡斬絶地根飛度五戶名列太玄魔王保舉位寄玉清九玄七祖拔出地獄皆即受度魂升南宫令臣過度三塗五苦八難九厄千災萬禍功滿德備玄師度引超淩三界逍遙上清內功外備過度三界位登仙翁諸魔滅試三官散形嘯命雷電呼吸風雲役召丁甲叱咤鬼神降致千真役使萬靈摧伏惡毒拔度幽明收束虎豹斬馘鬼精拯運鎮劫保佑安寧佐天行化𦔳國救民調泰五氣受天經緯內錬成真坐致行厨所向利貞若有不神天地盟臣臣今歸神歸身歸命三寶之尊若有異志始勤終怠叛道侮法輕泄漏慢違背師㫖不生敬信不依年限亂傳非人不忠不孝淫蒸毁棄隂謀殺害甘伺天憲先墮祖考後纍玄孫永沈北酆一身罰功隨事風刀考形三掠更生非道之形萬劫永不希仙甘心自受以明違天逆地叛道背師負心惡逆之誠不敢怨道咎師急急如靈寶大法律令敕次劃劵言誓上元天官中元地官下元水官四方天帝五方五帝日月星辰四極真人受度三師玄中證明劃劵之後誓不負天誓不負地誓不負師忠於國家孝於父母慈於衆生哀救苦爽以善濟物誓不違盟若有違盟甘伺天憲備經三塗之役償於五苦之考急急如律令右師與弟子各執一環以刀於中割斷青絲以代截髮次剌血飲丹盟誓截髮誓天剌血為盟飲丹結願仰告天尊三官保舉五帝證明三師受度諸天書名北斗落死南斗上生萬真受事天魔敬形七祖父母寄錬南宫功成之日上詣玉清負心違誓臨事不神一如律令師捧硃盞執筆白云付度巳訖㰱血重盟以丹代血各堅其心飲此丹華通真達靈中理五氣混合百神十轉回靈萬氣齊仙次師以丹水噀于弟子身白云一噀三清上聖度二噀十方至聖度三噀三界衆真度令弟子飲丹水一口以環劵各收貯師再持環劵祝曰天地合信環劵為盟行信忠孝心清緬平慈仁愛敬言真潔身始終如一其道合神勿生諂諛以起貪嗔損身破德三界不遵今分環劵其義斷金分環劵與弟子宣版劵次度仙誥汝以夙鍾慶幸獲際真風既契佩於靈文已恪守於盟誓宜給仙誥俾列清班惟在受持毋忘修檢宣仙誥次受交兵帖既膺天寵得進仙階今悉按於玄科授應干之法器其有本司官吏合部仙曹用對聖以交承俾分神而治事宜給照帖以正攸司宣帖後師祝云靈寶經法萬天所崇今日受度三界欽從諸天書名列位仙翁帝君大聖普告無窮無量度人我道興隆弟子受帖謝恩祝曰臣某賦性昏蒙㨁資凡下寵承帝賚名厠真儔既堅金石之盟巳佩筌蹄之㫖雖由際㑹實愧僥踰臣敢不益勵素心永棲玄範上贊無為之化期收濟世之功臣無任激切謝恩之至謹稽首再拜弟子三禮師重啓宣醮科臣等謹重伸上啓三清上帝萬天至真靈寶大法立教師君經法籙部天仙官將三界十方上聖群真臣聞道在人弘法因師度繼承不絶乃能敷暢於真風流布無窮所以恢張於大教梯航後學槖籥含靈作成輔正之功益廣度人之路臣禀資苦薄練素未精莫遇至人難明真奧兹濫當於傳度實有愧於公微幸蒙師造之垂科許以流行而接物是用盟天露懇過印交兵陳薦獻以惟恭獲威儀之粗畢念未全於豐潔誠有瀆於真靈咸祈曠蕩之恩普宥踈虞之戾即使某早乘良普頓悟玄機進修無魔障之干道法契神靈之𦔳呼吸有應關奏潜通積濟生度死之功得固蒂深根之妙上願真風昭闡至教宣行日麗月明天清地靜帝壽等南山之固久丕圖同磐石之尊安宗廟怡神官僚振職邊陲絶警黎庶相安次冀受道師尊生身父母見存獲慶巳往遊仙谷隱巖棲期早圎於行願跂行啄息俾咸遂於生成臣等謹稽首再拜寅恭以陳終獻宣龍車表疏次法師序立稱職重啓具位臣姓某等謹重伸上啓金闕至尊瑶穹上聖臨壇傳度諸大師尊三界十方群真衆聖臣聞道虛善應天髙聽卑故兹傳度之壇特沐鑒觀之澤深虞屢瀆仰丐寬容今則補授事終醮修禮畢仙凡有間儀衛難留清蹕收聲巳返瓊都之仗紫雲斂彩曷瞻玉駕之光真靈隨治以榮還官將分神而駐劄徒深懷感倍切傾馳臣與弟子無任激切攀戀謝恩之至謹稽首再拜奉送法衆送聖焚疏狀回向禮畢謝官將三獻文伏以百魔隱韻使離合之自然三景開明周大行之梵氣無上大羅之境端居元始之尊出法度人有返形之微妙傳經流世敷起死之玄功侍其經者八方威神衛其法者諸天上聖五帝大魔之所治十方使者之攸司至學既巳盟傳魔王舉其道備遵上天之禁格露祭醮於靈壇召制十方御地祇於要妙威齊天政束魔鬼於真文修行其㫖則萬聖臨軒誦詠是經則諸天齊到輔我法者聞呪訣而出有入無佐我道者承符命而濟生度死中理五氣混合百神今者謹按科盟備陳蘋藻伏望森森隊仗咸來顧以來歆濟濟威儀享既蠲而既潔恢弘教法懋積玄勳神鑑在兹謹陳初酌伏以靈寶本章乃重玄之藴奧上品妙道為大法之根宗或傳布於人寰或祕藏於天府宗奉敬禮者得道輕泄漏慢者招殃吾以宿命因緣恭參大法既蒙師而付度當備物以謝恩仰惟至聖之聰明俯鑑菲儀而肹蠁所冀威光赫奕輔正教於玄壇靈造昭彰積隂功於凡世退慚末學沗遇明師雖憑宗教以行持惟籍神功而贊助斷絶禍源則剪形截首申明號令則欽振提綱拯幽濟顯則無所不成建德立功而有求皆應母令懈弛有背盟言幸對威容恭陳亞獻伏以道無人而不立人非道而不行是知道用人宣人從道立當職謬參玄奧叨進仙階自慚寡德以無堪惟籍至神而是相伏冀分司部伍共嚴整於法壇森列旌旗各鎮安於靖治坐名立呼則斯須響應行神布氣則烜赫靈通輔吾道以立功守斯盟而謹節上贊玄元之化不忘終始之修嘉績有成嚴班可進今者詞多屢瀆禮盡三行不違方寸之誠俱賴聰明之鑑謹當終獻以謝威光上清靈寶大法卷之三十
