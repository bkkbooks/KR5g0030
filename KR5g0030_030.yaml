front:
  text: 上清靈寳大法卷之三十飛六
  hash: sha256:7e6c4a9cd200fea6d88cad802b3eaa5f2d524ac0a71eeb2c0eed18bf3458ad76
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5g0030_HFL_030-001a, image: hfl/0951/0951-048.png}
body:
  text: 洞微髙士開光救苦真人𡩋全真授上清三洞弟子靈寳領教嗣師王契真纂傳度科格門師曰凡開壇傳度隨力爲之若有力之家當預行申發至晚敕水禁壇宿啓行科亦如齋法次日昧爽登壇三時朝奏至晚下設醮傳度尤爲盡善往徃世俗從省止於設醮而巳故宿啓朝科罕得備載靈寳大齋道場三朝科文亦從更攺行用今且敘其傳度醮式乃受法謝恩之禮非黄籙齋儀量其輕重行之可也靈寳大法傳度醮科各禮師存念如法請宣神呪蕭仭扶桑方諸鬱霞元皇列真凝結雲芽明曜九芒含炁三華钁天振劒神虎辟邪安陽大帝攝御群魔上升玄都濯形天河和與道合真炎炁浮煙運升赤明長生元聖髙居玉京降妙玄羅散晶六冥元天大誥普濟群生消殄魔試奔飛火鈴保衛正炁億劫長寧和與道合真皓景金華長庚洞光大梵流布輪轉元綱蔚明交變騰化十方七關安鎮回合隂陽帝炁蕩蕩我享嘉祥玉文敷告生道延昌和與道合真太隂朔單上連帝居流𤔵騰晶化形玉虚輔衛三境簡閱元圖真符煥發定籍青都標名金籙宿釁咸除飛升碧落超登太无和與道合真元始虚皇集炁居中三境洞杳肇生穹窿七轉九靈混合回風變化萬神天地開通吉日行事萬魔斷蹤晨暉朗照黙運元功建麾敢花執節太空十方普度劫運无終和與道合真法師長跪出官如法臣謹出身中五體真官功曹將吏開化度道隂陽功曹消災散禍解厄君吏各一十二人出某治中建節監功大將軍直使功曹隂陽神決吏各二人出出考嚴装駐立營衞匝繞臣身郎吏虎賁察奸鈎騎都官僕射天丁力士治正執正收神食神吏收毒食毒吏收精食精吏收邪食邪吏誅符破廟吏剛風騎置吏驛馬上章吏飛龍騎吏等官並皆屯駐臣左右前後受臣詞語關啓此間土地里域正神治化靖廬名山洞天福地海嶽太𡻕官君法中將吏等神謹同誠上啓太上无形无名虚无自然至真大道无上元尊金闕玉陸下臣受法之日約以流通濟物是先接人爲急今謹有奉道某人丐爲進拜詞文上祈玄感當令臣所祈者逹所告者應所誅者却所禳者度功曹將吏飛龍騎吏分别關啓以時上逹列啓事竟各還臣身中復於宫室後召復到一如故事謹稱法位具位臣姓某謹同誠上啓玉清聖境元始天尊上清真境靈寳天尊太清仙境道徳天尊昊天玉皇上帝南極天皇大帝北極紫微大帝承天效法后土地祇神霄玉清真王長生大帝東極青華大帝諸天上帝髙真日月星斗列漢髙真三官大帝四聖真君上清靈寳大法玄中大法師靜老天尊三天大法師靜應真君上古經籍度三師真君太極仙翁真君九天神功妙濟真君黄籙三師真君三洞四輔經籙神仙僉書雷省浮丘真君傳經傳法師君真人法籙天仙官將吏兵玄壇與降三界十方上聖髙真恭望洪慈洞開靈鑑臣聞无形无名即玄真之妙𧷤有光有象乃神化之靈機混成宇宙之先肇造乾坤之本分兹一炁育彼三才宰制萬靈陶成庶𩔖於是元綱啓藴立萬劫之根宗大梵發揮漏九清之祕典三洞流布九品宣行盖以闡於化機亦以彰於道要因師尊之開度亘今古以欽承臣猥慚庸鄙之資叨綴班行之末濫司至教竊盻靈篇所宜隨力以宏科不敢因人而廢事既能潔巳以進當開勤道之途授受不窮所以副大教作成之意傳流有格理須祈髙真監度之恩是用瞻紫極以投誠望碧霄而稽首不揆菲儀之瀆輙延玄極之尊伏願五色慶雲擁擲火流鈴之仗三華黄道降飛龍唱鳯之車衆聖臨軒群真就列臣等百神震惕一念精純拜手天墀祗迎聖駕請列聖降帝行初酌重宣法職具位臣某謹重伸上啓三境髙尊萬天上帝十方无極太上靈寳天尊靈寳大法歷代師真三界十方上聖髙真臣聞道本无言因經科而立教化垂有作出法籙以度人九品三乗逓相通貫六書八體互以發明傳於天中爲萬聖指歸之路降乎人世開群生修進之門自非歷劫之良因安得一窺於正典而況教綱精練始可爲師志慮清髙乃容受法立功建事上以賛於玄猷勵行飭躬内以檢於凡質科條至重付受不輕如臣本匪良資實无逹識五芽三素豈知錬習之源六慾七情徒逐沈迷之浪所當省已安可接人盖以立誓盟心登壇受職雖戒張皇而妄泄不許緘祕而失傳況承勤懇之辤願被正真之化豈以臣之不才终加折絶幸其人之有志僣爲申謄然雖昧通真逹靈之機猶不敢傳叛道罔人之法爰稽彛典用闡靈場奉髙真之有臨仰帝尊之在御輙披凡愫上瀆宸嚴傳度詞表文謹當宣奏宣詞表焚燎按如詞言情忱堅切義當接引不敢遜辤臣聞靈寳神章洞玄上品延康之始莫測其端龍漢之初漸彰其妙結飛玄之玉炁成隱祕之靈音發五鎮之根宗經四譯而昭布寧家國以賛帝玉之治調隂陽以輔造化之功上聖髙真莫不因兹而證道沈靈苦爽豈非乗此以升遷實萬品之津梁乃衆靈之軌範雖巍巍之典傳度不輕然浩浩之功包容无外重念臣迂踈末學謬居師匠之階嗣法某塵陋凡資僣受仙靈之職事俱越分理實愧心尚祈天造之垂憐更冀師恩之覆育許容付度俾遂進遷真階早紀於玄都罪目悉除於黒簿不經魔試漸入仙宗顧冒瀆之至繁惟淩兢之无任再陳二酌以罄丹誠臣等再拜寅恭禮行亞獻舉十方靈寳天尊度師跪奏宣念臣聞元始祖劫化生諸天隱碧落之空歌敷紫虚之鬱秀開明三景用普植於神靈敷落五篇使保制於劫運懸坐五色獅子之上說法度人端居七寳騫林之中授經付世萬聖臨軒而稽首衆真侍座以皈依皆諸天隱祕之音非世上常辤之詠靈風槖籥致曰月以停輪金口宏敷俾神風而靜黙一徧而諸天稱善十迴則枯骨成人是知妙道難窮玄功无量上天所寳下世不傳遇至士以赤心齎金繒而盟受衆真監度萬聖臨軒諸天保以善傳魔王舉而道備方遵玄格許進清班以今弟子某肘歩投壇持心受法臣早膺師㫖獲佩靈文本接物以度人遇至賢而勿祕有來懇願遂啓上玄巳獲報於吉祥㳙良辰而付授給符傳法授戒度兵伏望靈寳衆真髙虚列聖慈悲濟物方便度人俾弟子某逈出塵寰永離浮幻蕩六根而清靜出八難之輪迴頓悟玄機得行道妙隆三千之功行招集群仙總五帝之魔王萬靈振伏臣與弟子稽首再拜宣讀投詞念授詞後嗣法弟子再拜跪白嗣行靈寳大法具位臣姓某誠惶誠恐稽首頓首虔誠再拜上啓金闕三境髙尊諸天上帝十方无極太上靈寳天尊靈寳大法歷代師尊願賜矜憐俯垂鑑録臣千生慶幸一旦遭逢嗣法傳真遷階進職永堅素志不敢負心倘渝誓盟甘從譴罰今與度師分環裂劵立誓飲丹伏望證明容臣受度臣下情无任懇禱之至再拜謹言舉度人无量天尊師與弟子回班對立師啓白宣戒弟子對上長跪聽受恭聞靈寳之道洞玄之宗其妙難名度人无量受之者功超七祖修之者形陟九霄乃萬法之靈樞總十方之正教徳之至大深不可詳固當修其所當修尤當戒其所必戒受持不替真仙可階今對三尊先明十戒舉智慧生戒根頌第一戒者无忘八極忠者欽之極孝者順之極齋者戒之極寛者廣之極𥙿者樂之極容者和之極忍者智之極天以北辰爲極地以山嶽爲極屋以棟爲極天以有極則能聚衆炁地以有極則能聚衆形屋以有極則能聚衆木人有八極亦如是也故能立衆善善立則道備道備則所聞見自然開渙所應自然調適此得靈寳度人之基也第二戒者无忘鑑水鑑者喻心水者喻性心明則萬法皆照性靜則五濁不歸道之在人圎通非蒙蔽可了亦非躁動可逹託鑑水而悟心性此得靈寳度人之體也第三戒者无忘日録日録者所以修檢善惡人之處世患不自知患不聞過患不聽言則无所益今以日録録日之所爲不可不筆處皆已之非也改之爲貴則日録者乃不教之師不說之友不詔之君父不約之法度也不可忘之此得靈寳度人之想也第四戒者无忘追度安鎮且人之所親不過父母所尊不過君上父母君上之徳恩必報之者追度安鎮是也追者謂誦經行持上爲祖父六親之過去者以資冥路度者謂誦經行持上爲祖父六親之見存者以資福筭安鎮者謂誦經行持上祝聖壽安鎮四方召龍行雨驅妖馘毒保護民物禳度星𨇠皆其一也其或在家行祖父之志或居官分君上之職種種利益有可報稱皆即爲之凡木之落葉尚糞其本根則歸根復命之義也人之報本反始不可不勉此得靈寳度人之宜也第五戒者无忘治救之術慈憫所先凡有病者爲其誦經行符至誠禳却如已至愛男女父母凡有方便種種惠澤皆盡其心如蒞官行政務布隂功寛平設法三省而行再思而動其或修治橋梁當道種植有益於世皆力行之夫人之有慈念如木之有根人而不仁不逮於禽獸故猩猩活象義鶻搏虵抜難有如此者可思之此得靈寳度人之由也第六戒者无忘服錬之術參同天地效法隂陽念念正真存存不缺則自然超脫變化无方今之蟲豸有外捨陸走而至飛翔地脉川遊而遂奔逸在物旣爾於人當然此得靈寳度人之方也第七戒者无忘剛潔剛則有守不行非淫潔則戒行不慕非食不嗜非淫則不損身之精神不慕非食則不殺物之性命見人妻女如已之所親見物性命如已之所生自然精神全而𡨚對少此得靈寳度人之實也第八戒者无忘儉約凡所求物當知皆元始祖炁化生灰水蕩穢不用修飾粟菽充飽不用珍庖此得靈寳度人之福也第九戒者无忘願約願者從初入道時時發心約者旣入道後設誓天地神明司之母輙中變科戒不可不守此得靈寳度人之念也第十戒者无忘師友師者所以教友者所以勸教者似父勸者如兄孰爲父兄可不欽重母委棄于此得靈寳度人之宗也舉奉戒不暫虧頌上來所宣十戒乃是師傳尊授發明古經夫經者藴道之機法乃體經之用欲遵正教修勤爲先守之行之母得中怠億曽萬祖幽䰟苦爽皆即受度上升朱宫惟修之益勤學之不巳功滿徳就皆得神仙飛升金闕遊宴玉京子其勉之次傳經文謹按經云上學之士修誦是經而通微奥即得飛度南宫不經地獄普度无窮一切天人莫不受慶无量之福生死蒙惠上天所寳不傳下世至士齎金寳效心盟天而傳輕泄漏慢殃及九祖長役鬼官侍經五帝玉童玉女各二十四人營衞神文保護受經者身聽受之後敬而持之次傳法訣原夫道法自然功施不宰本強名而至妙極元化以无形洪惟靈寳大法大有金書實元始之希夷乃至虚之沖寂淵宗莫究妙理難窮祕大羅金闕之天垂浮黎寳珠之㫖諸天欽仰萬聖護持夙有善根方能窺奥今弟子某虔心稽首誓受祕詮首露十方盟誠三界願窮至理體道度人恭對聖前受持大法伏望玉京元老金闕至真遣玉女飛函捧金章而廣示命金童稱善敷寳笈以流傳使弟子某䰟神澄正萬炁長存不經苦惱身有光明三界侍衞五帝司迎萬神朝禮名書上天功滿徳就飛升上清受而行之母容輕泄次度法印原夫法有階梯職分品級凡欲司於號令合先佩於印章文移關奏頼以宣行呼召指揮資以合契上天所寳非人莫傳旣齎信以效盟用依科而付授是故兵隨印轉將逐令行惟在受持必期嘉應次度法劒原夫代天行化布令宣威全憑三尺之神鋒以制群魔之非道光騰七曜威攝萬靈凡有指呼无不響應吾今付汝切宜珍藏逐一度畢師與弟子執筆立誓師念云回筆指天弟子曰上不負天臣若負天七祖受刑天若負臣日月不明師云回筆指地弟子曰下不負地臣若負地身受刀兵地若負臣草木不生師云回筆指心弟子曰臣不負心臣若負心合門不生心若負臣道化不行舉法縁常濟天尊次剖劵分環夫環劵者所以結誓三官告盟十天永堅信誓度師不敢隱真出僞弟子母得叛道背師分環永不渝盟裂劵永不負誓始勤終怠五帝録愆敬佩精修九天同福對聖被受終身寳持師執劵左邊弟子執劵右邊當中以刀劃破給劵誓約弟子跪云筆指東方九炁天中靈寳天尊真人神仙玉女玉童靈官仙兵今日欣慶受度歷關諸天請滅三惡斬絶地根飛度五戸名列太玄魔王保舉位寄玉清九玄七祖抜出地獄皆即受度䰟升南宫令臣過度三塗五苦八難九厄千災萬禍功滿徳備玄師度引超淩三界逍遥上清内功外備過度三界位登仙翁諸魔滅試三官散形嘯命雷電呼吸風雲役召丁甲叱咤鬼神降致千真役使萬靈摧伏惡毒抜度幽明收束虎豹斬馘鬼精拯運鎮劫保佑安寧佐天行化𦔳國救民調泰五炁受天經緯内錬成真坐致行厨所向利貞若有不神天地盟臣臣今歸神歸身歸命三寳之尊若有異志始勤终怠叛道侮法輕泄漏慢違背師㫖不生敬信不依年限亂傳非人不忠不孝淫烝毁棄隂謀殺害甘伺天憲先墮祖考後累玄孫永沈北酆一身罰功隨事風刀考形三掠更生非道之形萬劫永不希仙甘心自受以明違天逆地叛道背師負心惡逆之誠不敢怨道咎師急急如靈寳大法律令敕次劃劵言誓上元天官中元地官下元水官四方天帝五方五帝日月星辰四極真人受度三師玄中證明劃劵之後誓不負天誓不負地誓不負師忠於國家孝於父母慈於衆生哀救苦爽以善濟物誓不違盟若有違盟甘伺天憲備經三塗之役償於五苦之考急急如律令右師與弟子各執一環以刀於中割斷青絲以代截髪次剌血飲丹盟誓截髪誓天剌血爲盟飲丹結願仰告天尊三官保舉五帝證明三師受度諸天書名北斗落死南斗上生萬真受事天魔敬形七祖父母寄錬南宫功成之日上詣玉清負心違誓臨事不神一如律令師捧硃盞執筆白云付度巳訖㰱血重盟以丹代血各堅其心飲此丹華通真達靈中理五炁混合百神十轉回靈萬炁齊仙次師以丹水噀于弟子身白云一噀三清上聖度二噀十方至聖度三噀三界衆真度令弟子飲丹水一口以環劵各收貯師再持環劵祝曰天地合信環劵爲盟行信忠孝心清緬平慈仁愛敬言真潔身始終如一其道合神勿生諂䛕以起貪嗔損身破徳三界不遵今分環劵其義斷金分環劵與弟子宣版劵次度仙誥汝以夙鍾慶幸獲際真風既契佩於靈文已恪守於盟誓宜給仙誥俾列清班惟在受持毋忘修檢宣仙誥次受交兵帖旣膺天寵得進仙階今悉按於玄科授應干之法器其有本司官吏合部仙曹用對聖以交承俾分神而治事宜給照帖以正攸司宣帖後師祝云靈寳經法萬天所崇今日受度三界欽從諸天書名列位仙翁帝君大聖普告无窮无量度人我道興隆弟子受帖謝恩祝曰臣某賦性昏蒙㨁資凡下寵承帝賚名厠真儔旣堅金石之盟巳佩筌蹄之㫖雖由際㑹實愧僥踰臣敢不益勵素心永棲玄範上賛无爲之化期收濟世之功臣无任激切謝恩之至謹稽首再拜弟子三禮師重啓宣醮科臣等謹重伸上啓三清上帝萬天至真靈寳大法立教師君經法籙部天仙官將三界十方上聖群真臣聞道在人弘法因師度繼承不絶乃能敷暢於真風流布无窮所以恢張於大教梯航後學槖籥含靈作成輔正之功益廣度人之路臣禀資苦薄練素未精莫遇至人難明真奥兹濫當於傳度實有愧於公微幸蒙師造之垂科許以流行而接物是用盟天露懇過印交兵陳薦獻以惟恭獲威儀之粗畢念未全於豐潔誠有瀆於真靈咸祈曠蕩之恩普宥踈虞之戾即使某早乗良普頓悟玄機進修无魔障之干道法契神靈之𦔳呼吸有應關奏潜通積濟生度死之功得固蒂深根之妙上願真風昭闡至教宣行日麗月明天清地靜帝壽等南山之固久丕圖同磐石之尊安宗廟怡神官僚振職邊陲絶警黎庶相安次冀受道師尊生身父母見存獲慶巳往遊仙谷隱巖棲期早圎於行願跂行啄息俾咸遂於生成臣等謹稽首再拜寅恭以陳終獻宣龍車表䟽次法師序立稱職重啓具位臣姓某等謹重伸上啓金闕至尊瑶穹上聖臨壇傳度諸大師尊三界十方群真衆聖臣聞道虚善應天髙聽卑故兹傳度之壇特沐鑒觀之澤深虞屢瀆仰丐寛容今則補授事終醮修禮畢仙凡有間儀衞難留清蹕收聲巳返瓊都之仗紫雲歛彩曷瞻玉駕之光真靈隨治以榮還官將分神而駐劄徒深懷感倍切傾馳臣與弟子无任激切攀戀謝恩之至謹稽首再拜奉送法衆送聖焚䟽狀回向禮畢謝官將三獻文伏以百魔隱韻使離合之自然三景開明周大行之梵炁无上大羅之境端居元始之尊出法度人有返形之微妙傳經流世敷起死之玄功侍其經者八方威神衞其法者諸天上聖五帝大魔之所治十方使者之攸司至學旣巳盟傳魔王舉其道備遵上天之禁格露祭醮於靈壇召制十方御地祇於要妙威齊天政束魔鬼於真文修行其㫖則萬聖臨軒誦詠是經則諸天齊到輔我法者聞呪訣而出有入无佐我道者承符命而濟生度死中理五炁混合百神今者謹按科盟備陳蘋藻伏望森森隊仗咸來顧以來歆濟濟威儀享旣蠲而旣潔恢弘教法懋積玄勲神鑑在兹謹陳初酌伏以靈寳本章乃重玄之藴奥上品妙道爲大法之根宗或傳布於人寰或祕藏於天府宗奉敬禮者得道輕泄漏慢者招殃吾以宿命因縁恭參大法旣蒙師而付度當備物以謝恩仰惟至聖之聦明俯鑑菲儀而肹蠁所冀威光赫奕輔正教於玄壇靈造昭彰積隂功於凡世退慚末學沗遇明師雖憑宗教以行持惟籍神功而賛助斷絶禍源則剪形截首申明號令則欽振提綱拯幽濟顯則无所不成建徳立功而有求皆應母令懈弛有背盟言幸對威容恭陳亞獻伏以道无人而不立人非道而不行是知道用人宣人從道立當職謬參玄奥叨進仙階自慚寡徳以无堪惟籍至神而是相伏冀分司部伍共嚴整於法壇森列旌旗各鎮安於靖治坐名立呼則斯須響應行神布炁則烜赫靈通輔吾道以立功守斯盟而謹節上賛玄元之化不忘終始之修嘉績有成嚴班可進今者詞多屢瀆禮盡三行不違方寸之誠俱頼聦明之鑑謹當终獻以謝威光上清靈寳大法卷之三十
