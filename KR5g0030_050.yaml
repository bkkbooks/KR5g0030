body:
  text: 洞微髙士開光救苦眞人𡩋全眞授上清三洞弟子靈寳領教嗣師王契眞纂大錬符篆門丹陽符又曰寅炁陽晶洞明眞符扶桑合明炎帝精晶光布三景大帝四傾精神炁爽光轉五行日有赤童中藏陽晶日耀光彩陽炁炎昇混合玄元二炁交并東井黃華金醴玉津澡魂煉魄日月髙奔右符碧紙黃書東炁中炁入呪曰陽藏隂生二炁交周天元混合三五應廬服御黄華靈降我軀長享景炁與臣同符浴巳九玄參駕飛輿急急如律令石景水母符水帝月華洞眞流精淵泉結璘玉津炳耀相又化元聿星飛澤煉質備神光照朱霞聚炁東華三象歸元胎嬰舉形右符青紙粉書如圓鏡形取青炁入呪曰東井黃華石景五晶飛玄水母金醴玉津滔滔源源不竭池亭九龍灌錬三光垂晶仙人吐潤錬度亡靈内外朗徹表裏洞明百關九竅元炁滋榮五藏六府萬神目生胞胎結節隨水開扄死炁斷滅惡根沉零我今錬化死骸生魂返故攺貌玉體金容變化錬穢飛昇紫宸急急如律令右存玉童三人玉女七人自月下水中次念月君呪取月宫炁入水中黃華蕩形符黃華垂精仙人化潤百神自生隨水開扄玉體金容攺故華榮胞胎結節死骸生魂呪曰天澄炁清玉色高明日月吐鍕灌錬身形神湋内盥法水鍊精光景洞耀煥映上清炁不受麈五腑納靈罪滅三塗禍消九𡨋惡根斷絶福慶自生今日大願一切告盟身受開度昇入帝庭急急如律令又右符書時天門紫黒炁三帀入呪曰元始符命浣濯身形去瑕滌垢上昇南宫急急如律令陽精玉胎錬仙符黄華隂炁陽精固仙沐浴九魂九錬生尸冠帶金晨圓眀啓告玉胎鍊仙華光交映流芳陶律九陽育化玄霞散煙元景回靈曲映我身飛昇上清洞觀瓊軒玉眞錬形符元始一炁萬象化生混沌眞一无上玄元神水蕩穢惡炁不煙慈風洗蕩消釋罪根日精月華充飬眞元上帝有命普度幽魂呪曰浩浩渺渺太上靈泉潤枯育物流注自然神華玉液澄清太玄生魂育魄靈录綿綿清泠保命北都絶煙華池浩渺莫測其源急急如律令太液錬形符右符書時東南炁入呪曰太液鍊形金馬驛程上下水火森羅淨霐元範恢漠幽寂度人受錬無窮爲道至眞三元降合五炁㑹神太上符告六丁潜靈紫虚鬱秀行符玉京急急如太上太液律令水鍊變仙符呪曰太玄神水五行之數生能育物洗新除故渴則飬命死魂難遇若非大慈何以濟度急急如律令蕩翳符呪曰元始符命蕩除隂翳浣濁流清洞達陽光急急如律令金液鍊形符七炁之精金液錬形帝流赫赫眞炁耀靈鍊陽還元左翊玄羅離璘混合洞宴八騫眞炁流暢𨑰生本源右符書時東南炁入呪曰金液錬質與道合眞開明三境是爲天根无幽无極无始无終元皇九醜靈魔絳宫紫雲飛天身乗六龍水上火下流入三宫神歸陽明大道自通急急如律令又上開八門飛天法輪中理五炁混合百神下鎭人身泥丸絳宫千和萬合自然成眞普受開度死魂生身身得受生上遊三清念六星諱存南斗光降念六星名存亡魂在斗口中呪曰元始符命止逍遥上清急急如律令火錬反眞符朱明上境日月合明石景水母玉胞金晶中有赤帝南極老人名曰洞浮玉眸詵詵洞陽火鍊隂消魄糜甲乙丙丁戊巳庚辛壬癸受鍊魂榮幽精爽靈三台胎生玉嬰廻骸起死長生眞人大君丹界天尊朱陵度命受錬更生急急如律令呪曰朱明上景日月流輝眞炁普化時刻無違沐浴枯骸鑾錬而昇流光普帀受錬金晶元始有命急召籠威變身復相超化南宫急急如元始下帝律令火鈴符凡書此符南向左玉帝訣炷香凝神染丹筆引太陽九芒下降紙筆依法次第發筆書之勿失次序炎神炎神火鈴火鈴上通紫極下徹黄冥却妖煉魄赤帝之靈炎精二神三台流光煉形易質魄煉魂康萬妖祖落乗煙飛揚順上元賜福又官中元赦罪地官下元解厄水官逆天蓬天獸翊聖佑聖精神一德洞入火郷混合九炁總契虚皇昊天有敕流金振芒九天豁落利貞無疆自敕字下筆急急急火煉丹界形神自昌化煉神符表裏俱昌急志如上帝敕煉右符朱書黃素上念玄眞隱祝亦曰玉音攝炁靈書呪曰祖道玄眞烜赫正神鬱儀煉質熒𤏘澡形赤明和陽理禁威靈曜明宗飄帝重光明戊巳之英中央鎭星掃蕩邪炁破滅淫精海逢之沸木逢之燼火逢之明金逢之鎔長離之主統攝飛行迷離奴那唵唵吽吽迷離奴那唵唵吽吽總括辰羅東海青童迷泥奴那唵唵吽吽迷泥奴那唵唵吽吽迷泥奴那唵唵吽吽急急如上帝敕一炁宗神長生大君小兆鍊度上祈眞炁謹召流金火鈴飛天赤炁帝君佐吏文秀舒光矅明消魔印攝呪畢引太陽紫炁九芒灌注符中朱陵錬度符金木水火土五星尊神鍊度亡魂朱陵符吏上合上清三昧眞火速降朱陵錬度亡魂急急三元將軍錬度亡魂十三辰神君魁止魒朱陵神君錬度亡魂急急右符書時紅紙朱書南炁午文入玉眸錬質符右符書時用午文火炁入呪曰太上錬質九歩八坤行罡七轉內外合成三台子午絳宫受眞符錬萬靈赤火絳心辟除惡毒徃來俱榮北都曲府離合上清大洞自然風火無停急急如太上鍊質律令火鍊變仙符呪曰炁化成人尸變入玄三化九錬昇入九天九天之劫受度亡魂受錬更生得爲眞人急急如律令水錬成眞符九錬返生復故符呪曰魂魄精尸閉炁藏固神皈后土返形復故急急如上帝敕出肝炁眞火錬度一切罪魂魂神澄正萬炁齊仙金容攺故九錬返生沉魂滯魄逍遥上清急急如九天帝君律令紅杏持到卯墨墨同庚丑磨針計力兊襪臘取成午靈寳萬物串消利六合正一成法知一可眞驛令下攝五神混合符右符書時搯中指中文五方炁入呪曰上元太乙守居泥丸中元司命安坐絳宫下元桃康生宫把籍無英公子白元尊神玉符一召五神合并急急如靈寳符命律令日精月華徘徊陽光流火入品錬化隂芒尸穢消滅萬炁混康速離五苦飛昇天堂急急如律令回光返形符呪曰天炁已清人化已生得生天上九變受形五苦三塗斷落死名超度苦魂還向帝庭急急如律令南昌典者符呪曰朱陵朱陵始青化生南昌主極普度衆靈典者速降布炁流金急急如律令玉嬰神變符呪曰玉嬰太乙胎化天尊玄元始炁三寳天君乾靈坤母坤蠡乾靈虚皇告下玉胎分形九炁映明混合生成九天元炁孕胎成眞天一地清人寧谷聲冲開九天現出眞形陽魂聚神尸狗伏矢雀隂吞賊蜚毒除穢臭肺守宫上朝三天下入九泉事訖歸元咸爲七德急急如太乙天尊敕靈寳度人符命律令右符書時先存太乙救苦天尊放百寳慧光爍除七魄隂炁搯玉帝訣復取五方炁吹入符中回靈養素符呪曰元皇靈秀孕育發生三光朗照五炁發煙發生枯朽五神復元五老啓運復化嬰兒化生三田結胎黃房天寳君敕靈寳君敕神寳君敕南昌典者舒光布曜受炁相生玉眸煥文黃華灌英死魂受鍊仙化成人急急如元始祖炁律令廻尸起死符右符閉炁一筆書成取金光萬丈布入於符中返眞符右符專拔雷嗔犯刑法之死魂用此符梵炁符右符玉皇訣誦玉皇號一字一遍取炁吹之符中鍊度符章呪曰濟度垂死絶而得生千和萬合變化上清急急如律令中理五炁混合百神符呪曰中理五炁止各有生門急急如律令廻骸起死无量度人符呪曰一二三四五金木水火土魂魄得安全老君來救苦急急如太上老君律令召太乙司生元君符呪曰東有好生太乙天君速降火府流火度人急急如昊天上帝律令太乙追魂符呪曰太乙司生追魂大君俓下神虎速到無停急急如司生大君律令太乙拘魂符呪曰太乙拘魂司命大君令日受錬無得越行中皇九炁總監度生太乙度魂符呪曰太乙度魂太乙合魂黃離洞豪二炁受錬无英居左白元右輔泥丸精髓我道貴生速付流火急急如元始祖炁律令太乙合魂符呪曰太乙司命中黃主生隂陽混合返炁流行急急如元始祖炁律令五帝玉諱合形符東華木司九炁元君右符卯文青炁合肝炁九口吹衡山大帝三炁元君右符午文赤炁合心炁三口吹金華金司七炁元君右符酉文白炁合肺炁七口吹恒山水官五炁元君右符子文黒炁合腎炁五口吹嵩山上帝一炁元君右符中文黃炁合脾炁十二口吹灌五芽符東澄蘭南保容西惟澄北華平中零寥五芽請炁呪東方青芽紫雲緑霞服食青芽飲以朝華南方朱丹煥耀徘徊服食朱丹飲以丹池西方明石皓靈全質服食明石飲以玉池北方玄滋玄珠潤滋服食玄滋飲以玉飴中央黃炁黃庭髙仙服食黃炁飲以醴泉急急如律令右呪毎一符並七遍按各方訣隨本方炁取而吹之東方青帝玉司上元玄靈自然八道度仙靈符呪曰元精混沌青炁散分神童十二保鎮肝魂二七四五變化雲營九竈九社老木不停神虎吐毒劔擲火焚掃滅精蛀光景妖氛識不馳妄安保帝君急急如上帝敕南方赤帝玉司玄元赤靈自然八微玉眞靈符呪曰赤明開圖炎精扇飈三帝二宅煥赫浮飄司命得失萬帝宗朝朱鳳吐火金石化消流鈴擲電馘斬赤妖束縳九醜灰覆火燒肅清皇祚道德逍遥急急如律令西方白帝玉司中元黃靈九宫化生元紫眞符呪曰金精一啓太白七分帝君靈符流飄素雲召龍化水殺滅黒煙長牙巨獸討捕凶羣魂靈安鎭我得自然元皇正氣來固我身延年度世神飛昇眞急急如䋖令北方黒帝玉司元靈都虚微八道全眞玉符呪曰玄光豁落五炁流行𩀱闕上帝萬神化生安魂守志啖食炎精蒼龍蒼虎摧破黃兵晶晶震劒奔飛火星三天力士牧滅萬精保安家國道治昇平急急如律令中央黃帝玉司三元靈微八政黃元眞生靈符呪曰混沌元一黃象分馳感覆眞老變化嬰兒養育九炁胎生二儀日月上奔星辰下垂風火爭擊風刀亂馳六天九醜爽破心離太上符去何散不隨九星廟樂入道无爲急急如律令右五符又曰靈寳安鎭住宅土符用五方訣五方炁書之告文靈寳自然五帝玉司寳符書符石符告下青帝直符區更生赤帝直符祝昌中黃帝直符玉眞白帝直符辱曲正黒帝直符尹豐奉爲亡過某等請降眞炁煉胎返生一如玄科律令太歳年月日時告下法位臣姓某承誥奉行十干全形符又名錬身符天有三竒日月星取三光炁搯本命訣地有三竒乙丙丁北炁人有三竒神炁精在身三炁台光幽精爽靈存三魂入青帝甲乙護其魂卯文肝氣合東炁嘘赤帝養炁以爲丁午文心炁合南炁黃帝中主混百神中白帝呵文脾炁合坤炁呼侍魄合庚辛酉文肺炁合西炁呬黒帝通血合壬癸五炁周流成其形腎炁合北炁吹面書錬身符天眞地靈天地同生五行所運甲乙丙丁乾坤坎離八卦凝神錬胎反初戊己庚辛壬癸甲庚變易元身男正面男背面女正面女背面錬質符呪結空成梵眞炁自生赤書玉字八威龍文眞炁到處滯魄超昇急急如律令六甲六乙錬汝肝經六丙六丁錬汝心經錬汝神炁保命長生六庚六辛錬汝肺經大腸小腸萬炁潜冥六壬六癸錬汝腎經精華盈溢骨髓安寧六戊六已錬汝脾胃骨清肉輕長生乆視急急如律令一胞亥二胎午三魂卯四魄兊五臟中六腑乾七竅巽八景坤九神艮右符取五方炁吹入符中返生符十廻度人符青帝護魂卯白帝侍魄酉赤帝養炁午黒帝通血子黃帝中主萬神無越中一筆周回十轉念後呪向上出筆呪曰一轉男女聾病耳皆開牕二轉盲者目明三轉喑者能言四轉跛痾起行五轉久病復形六轉髮黒齒生七轉老壯少强八轉婦人懷妊巳生未生皆得生成九轉地藏發泄金玉露形十轉枯骨成人今辰所薦亡過某等受錬更生急急奉三天大聖師壇令寅文太乙救苦天尊律令敕卯文太上玄老君太清天帝敕中指下太上玉晨大道君上清大帝敕中上文太聖元始天尊玉清上帝敕中中散結符呪曰大明靈神九度鬱青明霞藏輝灌錬五形宫駕六合七神調平結節解釋胎根肅清急急如律令上清靈寳大法卷之五十
