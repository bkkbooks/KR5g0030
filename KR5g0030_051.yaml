  text: 上清靈寶大法卷之五十一圖九
  hash: sha256:e0ec6a3a4f2d277beca9a307f2a3b9f6738f4d8e05c6da3f971d7f0101d11557
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5g0030_HFL_051-001a, image: hfl/0957/0957-146.png}
body:
  text: 洞微髙士開光救苦真人寧全真授上清三洞弟子靈寶領教嗣師王契真纂大錬符篆門太隂混元化形隂錬法師曰混元合氣聚而成靈三元九數周分十二在天則十二宫分野在人則十二經絡臟腑以應六隂六陽表裏生成形也夫隂尸變錬攝氣聚靈錬生真景洞徹陽光不墮幽趣可登道域也且錬魂不過三尸喎斜跛躄殘疾刀兵形體不具者隂府亦然須行九陽錬度攝度經絡真符十二道焚于火池次行十二大將軍真形化生五臟六腑也訣曰以茭草縳人形狀以亡者臨終所著之衣先將書化形十二經絡符分布五臟六腑及朱書玉字真文天篆貼於腹上又朱書升天大劵以絳紗袋盛之帶於領上更以朱書靈寶五符安布于五臟混成三部八景二十四真氣先建壇行道啓奏上帝關聞九幽重泉隂府差役官將追取亡魂訖至夜具威儀於郊墟東北鬼戶上安頓茭人了法師於地戶上化身為九華真人步斗罡至罡尾望天門呼召真氣令一童執召魂幡立於天門上法師攝召一氣化成五臟即令道衆舉金闕化身天尊令童子以幡旋招真氣下布茭人身上十二氣畢次於人門上存化茭人為人形法師與道衆同誦中篇旋繞茭人以楊枝淨水灑之三匝衆舉步虛引擡茭人到壇下法師次第行錬度用十二混元大將軍符十二經絡符入大錬此法黃籙只度三名者可用矣混元十二大將軍隂陽十二經絡符師曰三十六氣形質布隂陽三十六氣生經絡是故天上三十六周流一身混合隂陽魂魄成嬰兒反胎成人乃一生二二生三之道也符內大將軍各有一百二十員總領各一員錬度時焚符召之用以化生五臟六腑須隂陽經絡符二道同用法以雄黃和朱砂書黃紋之上一心定神全真存三景篆之母得外想耳法曰先入靜室焚香啓告三景髙真朱陵大帝木公金母具陳情悃次召諸大將軍靈官下降面東南依式書之混元十二生氣大將軍符一氣將軍楊元虎坎文二氣將軍丁忠離文三氣將軍丁遷善震文四氣將軍陳志元兊文五氣將軍王先之坤文六氣將軍張固艮文七氣將軍李淵丑文八氣將軍申孚巽支九氣將軍周自然乾文十氣將軍章修戌文十一氣將軍王卓立未文十二氣將軍鄭明午文告文玉清一十二氣混神三景九陽攝氣鍊神飛仙真符書符右符告下一氣生腎大將軍楊元虎二氣生心大將軍丁忠三氣生肝大將軍丁遷善四氣生肺大將軍陳志元五氣生脾大將軍王先之六氣生膀胱大將軍張固七氣生小腸大將軍李淵八氣生膽大將軍申孚九氣生大腸大將軍周自然十氣生胃大將軍章修十一氣生三焦大將軍王卓立十二氣生心胞絡大將軍鄭明等從官符吏攝降真氣鍊度亡過某人等及六道四生孤魂滯魄混神合景復形返生一如玄科律令太歲年月日時告下法位臣姓某承誥奉行混元十二經絡隂符右符生腎搯子文存北氣玄色右符生心搯午文存南氣赤色右符生肝搯卯文存東氣青色右符生肺搯酉文存西氣白色右符生脾搯申文存中氣黃色右符生膀胱搯寅文存東北氣黑色右符生小腸搯戍文存西北氣右符生膽搯己文存巽緑氣右符生大腸搯酉文存西白氣右符生胃搯中文存中天黃氣右符生三焦搯已文存東南青赤氣右符生胞絡搯八卦訣存八方氣巳上十二符黃𥿄朱書面東搯本方訣取本方氣餘依方數存用混元十二經絡陽符一氣生腎坎文二氣生心離文三氣生肝震文四氣生肺兊文五氣生脾坤文六氣生膀胱艮文七氣生小腸乾文八氣生膽巽文九氣生大腸酉文十氣生胃戍文十一氣生三焦未文十二氣生胞絡辰文右十二符亦隨方搯訣取本方氣吹之十二經絡符呪腎部之宫玄關極玄中有童子列位上玄主諸六腑九九液源外應雨耳百液之津蒼錦雲衣舞龍靈幡上致明霞日月生煙兩部水王對生玄門使人長生上升九天急急如黃籙度生律令心神丹元中含蓮花主通寒熱調榮衛和丹錦飛裳被葉上羅金鈴木帶身生娑婆調血理命一身不枯外應口舌吐納五華萬神長存飛入太霞急急如黃籙度生律令木宫尊神翠羅重裳下有青童青神公子和制魂魄入生出死外應眼目內持尸鬼垂念純神聰明煒煒功滿德就飛升元始急急如黃籙度生律令皓靈虛成守於華蓋七元之子主調精氣外應中嶽與鼻齊位素錦衣裳黃雲燒帶喘息呼吸白元所至永無災害形神不滯與道合同上朝玉帝急急如黃籙度生律令脾屬戊已中立太倉瑞生金臺位居九重主調百役永無病傷外應天宅氣色芬芳光華日月以表虛明黃錦玉衣腰帶虎章注念三老子身輕翔長生髙仙上詣玉堂急急如黃籙度生律令瓊室之中泥丸通靈寸田尺宅更生治生氣亡液漏自非已形專閉御景與腎長寧三竒恬淡視內自明物物皆平名書上清急急如黃籙度生律令小腸瓊室八神素集長谷玄鄉繚繞郊邑精氣內守嬰兒外立長生久視三靈不殁保神長存永符出入却死還生回黃抱一急急如黃籙度生律令六腑之精光耀威明雷電入振舉揚玉旌龍旗橫天擲火流金主諸氣力收攝虎兵外應眼鼻腦髮俱成玉龍虎文能存威明役使萬神上朝玉清急急如黃籙度生律令大腸心腎膀胱通名內化百口聖地之精五味外美邪魔眼腥真亂神明胎氣凋零天真返老玉女還嬰三魂俱總七魄靡傾食氣吞霞上還太清急急如黃籙度生律令厥孚靈元名曰混康治人百病能消殳糧黃衣紫帶龍虎靈章長精益命桃孩延生開塞天關漱吞玉嬰遂至不化三蟲俱亡保灌玉盧形無災殃急急如黃籙度生律令三焦通門默存玄丹太乙流珠通運重環璇璣玉衡守坐盤桓雲儀玉華黃老守魂三真扶育洞煥七元日月飛行六合雲間帝鄉天中地戶之端魂神澄正萬氣長存急急如黃籙度生律令呼吸元氣以求上仙朱烏吐縮白石流光結精育胞化生胎根經緯羅絡永保長生三氣洞回九道開明正一合華白首返嬰急急如黃籙度生律令經絡總呪九天梵氣為之結形中有太帝慈悲惠生甚妙靈符魂魄返踈千變萬化從有入無身心湛寂俱契玄珠萬劫難遇開闢幽塗受此隂錬魂登太虛急急如黃籙度生律令混洞十二經絡化生真符化生腎符子文腎氣呪曰一氣之化神以通靈千神佐衛神氣混心以氣之聚神之最靈混合六神生以腎經身自運水大道生明亡魂受錬反故復生急急如玉清上帝敕唵三慕哆之化生心符午文心氣呪曰萬火為主急束魔王一之而定敕下無當赤宫之帝聚氣為王散亂無動百神歸降萬國朝禮一體定康亡靈受錬道相堂堂急急如玉清上帝敕唵茶輪西那尼化生肝符卯文肝氣呪曰术官之德脈氣如泉魄氣結聚魂精相連青氣鬱秀輔翼萬仙百骸之首肝府為先神積形聚氣化成仙亡靈受錬道德自然急急如玉清上帝敕唵囉咬囉哆呢化生肺符酉文肺氣呪曰魂精魄靈肺府之生百丞之轉百魔不生一白之氣混合肺房長意生志公子無忘玉樓相串金室同堂亡魂受錬升入天堂急急如玉清上帝敕化生脾符中文脾氣呪曰上帝有敕百魔敬聽飛神御化一氣之生帝君有命敕下中皇安鎮榮衛肢體光鮮安魂保鎮使神無藏亡魂受錬化生福鄉急急如玉清上帝敕唵曵都翳曇化生膀胱符寅文膀胱氣呪曰隂陽二氣四聚接靈魂魄歸府體氣咸寧青黑之氣交結膀胱鎮於靈府毫竅混康玉清接景泥丸附傍亡靈生化聚魄神昌三魂安泰大道生光急急如玉清上帝敕唵叱地叱陀尼化生小腸符戍文小腸氣呪曰三皇之文主氣小腸生長府內陽氣混康赤白之氣二氣交從結成腸府與胃相通大腸合度纏絡和中亡靈錬化改體容隆急急如玉清上帝敕唵莵囉懴羅呢化生膽符巳文膽氣呪曰二氣合景天皇附身通徹表裏百神安寧靈氣所聚神氣混康鎮於膽府赤文交光精魂自樂魂形堂堂錬度亡者玉眸生芒急急如玉清上帝敕唵離波那哆耶化生大腸符酉文大腸氣呪曰人命人氣人精月君中皇之靈天生有令永鎮腸經黑白二氣結生大腸混合表裏一體同堂光燦萬國交般千廊亡魂受錬攺貌形芒急急如玉清上帝敕唵婆舍羅吽呢化生胃符中文胃氣呪曰三官朝太乙六府盡歸堂胃神準此令消滅大魔王黃演之氣胃管生津安神鎮宅一體光生魂神歸伏神真納靈亡者生胃大道自明急急如玉清上帝敕唵壚吽叱唎哆化生三焦符巳文三焦氣呪曰上焦中焦下焦五神歸一之曹赤君之命無道上下往來勿勞淡白之氣所化三焦之神無藏咽液生津自然上下往來溫昌十二重樓通道一百骨節順張亡靈承兹變錬受度更生神鄉急急如玉清上帝敕唵噓吽吽唎吒化生胞絡符辰文胞絡氣呪曰帝君敕下飛攝大魔神精氣聚急急無過黃白之氣結胞絡生五榖所聚一體光明神寧魄靜靈氣聚清亡魂受錬與道合并急急如玉清上帝敕唵呼聚吒離吒右十二符用時焚一符運一梵語更用聚形呪默祝曰唵琴尼敕地喃嚧九錬符師曰黃籙齋法用符奏九通各以黃劄紙用朱書符墨書告文外用封函如表式中間符命各隨天尊換易流水之精錬而為胞符呪曰炎炎之精變之為英受錬亡者超度金城急急如火錬丹界天尊律令昭火之明錬而為胎符呪曰九幽玉戶破滅三尸亡魂受錬即度寒池急急如罪消北府天尊律令乘木之晶錬而為魂符呪曰十方之氣聚之為靈亡魂受錬死骸生身急急如十方救苦天尊律令柔金之晶錬而為魄符呪曰七氣之英太白流晶亡魂受錬逍遙上清急急如逍遙快樂天尊律令合土之英錬而為臟符呪曰南閻洞浮流火之英受錬亡魂上登朱陵急急如朱陵度命天尊律令致坎之靈錬而為腑符呪曰大架虹橋接引昏迷亡魂受錬上升玉池急急如法橋大度天尊律令昭離之晶錬而為竅符呪曰五帝化仙氣聚為連錬度亡者化身諸天急急如轉輪聖王天尊律令激震之聲錬而為景符呪曰救苦慈尊願拯幽魂魄今錬化劫劫長存急急如太乙救苦天尊律令利兊之榮錬而為神符呪曰周圓魂氣團聚成煙亡靈受錬化生九天急急如寶華圓滿天尊律令九符總呪九氣錬神三景合成生神大錬再返人形來接陽眷報應通靈急急如玉清上帝律令九符奏式具位臣姓某謹據齋宫某開建無上黃籙大齋乞度亡過某等魂脫苦升遷今請三尊御座萬聖監觀臣恭按玄科奉行錬度依法行持奏告符命仰冀流水之晶錬而為胞真符於此換易書本符右謹奏上火錬丹界天尊几前隨符換易恭望道慈特垂矜憫曲賜生氣灌溉亡過某等魂即得死魂受錬仙化成人隨劫輪轉與天齊年超陵三界逍遙上清臣下情無任戰栗之至謹奏太歲年月日具位臣姓某符奏九錬符右符錬胞坎文存先天虛無祖氣右符錬胎離文存混沌黃白二氣右符錬魂震文存日光右符錬魄兊文存月華白氣右符錬臟中文存中黃氣右符錬腑坎文存北氣黑濛濛右符錬竅兊文西方皓氣右符錬景震文東方青氣蓊冥右符錬神離文南方火氣炎炎九錬符呪日景曜羅綺含玄阿流火洋洋萬津滹波空林鬱青金翅婆娑八錬朱丹芝芳枯和金闕四張皇人之家靈暉吐精仰綴飛華左扳玄上右䇿命魔身登髙臺遊眄緑那八景翼霄紫瓊丹霞氣聞玉真命齊靈柯長宴九玄路無傾蹉上清靈寶大法卷之五十一
