front:
  text: 上清靈寶大法卷之二十七飛三
  hash: sha256:28317b22401aca8ab7838251bf7f5207c245f4f59756fa34ad551a6b16e3a426
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5g0030_HFL_027-001a, image: hfl/0950/0950-120.png}
body:
  text: 洞微髙士開光救苦真人寧全真授上清三洞弟子靈寶領教嗣師王契真纂洞玄仙格門仙格品論師曰男仙髙曰天尊女仙髙曰元君若形神未獲髙妙尚有肉質尸骸不許封稱有身一作成大功則三年中功則七年下功則九年一遷無身中者並七百年一升初自校職隂曹次入水官山川主者次地官靖廬福地主者次洞天主者次十洲三島仙官次漸進入於天官凡行功於世立大德大功行化之士內外功全迎神授職之所太隂錬尸年限足日合形仙飛如功德內外不備分神治事建邸於天地水之隂曹也入此玄階清品須參斗受書除落死名上生南曹功德發於敗正升入仙階年限比校亦許遷於仙品妄有冒越三官紏核可不慎守之犯者退品除年罰功墮事更宜謹敬慎之歟仙格品秩三天執筆伏魔持法使者太上執法弟子太上執法仙士太上執法真士太上執法仙官太上執法真官太上玉陛執法真士太上玉陛執法仙官太上玉陛執法真官太上玉階執法真官太上玉壇執法真官南宫少微執法真官南宫太微執法真官南宫元微執法真官南宫靈微執法真官南宫妙微執法真官巳上係十五發敗正天曹執法仙監仙監有七階天曹執法仙卿太極執法仙卿太極執法真卿洞微執法仙卿太清執法仙卿太清執法真卿上清執法仙卿上清執法真卿玉清執法仙卿玉清執法真卿太極執法真宰太初執法真宰太元執法真宰赤明執法真宰元明執法真宰太虛執法真宰曜明執法真宰竺落執法真宰虛明執法真宰觀明執法真宰巳上十位比諸天丞相之列並係五十發敗正一升四十發敗正入巳上十位仙宰自此巳下入色界天太煥執法仙宰上仙真宰元載執法仙宰上仙真宰太安執法仙宰上仙真宰顯定執法仙宰上仙真宰始皇執法仙宰上仙真宰翁重執法仙宰上仙真宰無思執法仙宰上仙真宰阮樂執法仙宰上仙真宰無極執法仙宰上仙真宰皓庭執法仙宰上仙真宰元洞執法仙宰上仙真宰巳上六十發敗正入仙宰七十發敗正入上仙八十發敗正入真宰巳下入無色界天太文執法仙宰上仙真宰太素執法仙宰上仙真宰無上執法仙宰上仙真宰太釋執法仙宰上仙真宰梵度執法仙宰上仙真宰平育執法真宰上仙真宰太清執法真宰上清執法真宰玉清執法真宰巳上十位並九十發敗正入仙宰一百發敗正入上仙一百二十發敗正入真宰漸入真人之位並上帝特封兼諸天諸地諸水仙職亦在特封次進入天機內省天機都省泰玄都省之任每發敗正當奏申天省比魔勘㑹非魔司校靈魔寶功制魔司舉勳魔三官五帝保奏諸天列言方升品秩退降亦同非洞徹百神神通天司莫詳其奧别有天真仙格神朝金闕日付之惟在賜衣建邸朝元參斗洞視按局大定七經功足方悉上玄至理試論籙階法職論曰三洞經籙應運傳行故洞真部有上清大洞回車畢道籙一階佩之者稱上清大洞弟子或不佩籙只入室誦大洞經行大洞功用者止稱小兆臣某蓋大洞三十九章屬洞真部非近世之人將度人經中章句指為洞經者也且大洞本品古無法職亦無章奏後世人始有編大洞法者矣然終非古書也且洞神部盛於東漢自盟威籙以下諸階雜籙悉總于正一壇天心五雷諸法書禁之術莫不𨽻焉此不詳述況洞玄一部有靈寶中盟祕籙一階紫虛陽光次之獨靈寶大法𨽻焉其佩籙而不行者止稱籙階既巳行靈寶大法而齊法出於靈寶未免應世接物因事立儀遂出法職亦不得巳而強立名字應時行化者也進拜章詞而氣有所總濟拔幽顯而䘖有所稱若法與籙相背違未免鬼神竊笑也林侍宸有云故立仙階五品以備行用耳自兹而建修不巳積功錬氣會道證神善行徹於玄都仙名書於金闕天俾真職於人世俾之宣化宏道頒羽蓋於青霄召之升舉事符今古德致而然固非先冒崇階巨職而至也有行靈寶經法而欲為異途者有行淨明法而補別職者皆非也並合佩中盟籙而補本職也且前所謂太上執法冠其䘖者此固有之但太上者虛無之神也又曰太上者至大之名上者尊崇之義又曰至大無外窮髙莫測故謂之太上又曰無上可上是為太上夫道則稱太上元極大道自此之外太上二字不可施矣道典中或獨稱之獨世之稱至尊之類也以君之號而為臣稱可乎且世之官爵自一命巳上皆出於君而於䘖之首稱皇帝某官天子某職可乎況宗壇之籙卷首皆稱太上某籙蓋以籙中符篆皆出於太上也若行持之士告行符命皆稱太上某符也是可施之符籙決不可施之䘖位籙故出於太上而以籙為階者不可以太上加諸䘖首矧太上執法真士稍稍礙理又人世奏牘有宗廟字皇帝字之類並合平闕人臣階位有帶御前及殿名者並空一字然終末有帶皇帝及天子字於階䘖者太上二字冒以為䘖於汝安乎階䘖者以所得之位也某籙弟子某法之職是佩得此籙行得此法以為已䘖太上不可得也有謂南曹執法乃行經法之人所稱此外靈寶法不稱南曹不知經法乃本法也今齊醮中告行符命出給真劵典章行用悉出於經法中不知源流者却云行齊應世所用靈寶法與經法不同何其淺陋之甚自靈寶法以來初無太上執法之階諸方有識之士未嘗用之邇來又有稱領教嗣師執法真宰等職或僞置靖名以為額豈非妖妄耶近者經法中亦廣職位矣如仙階入等武職六條及排比品秧之類頗漸繁雜悉不當引用不可以經法所載便行補受忽亂天儀有稱靈寶中盟弟子入曰行靈寶大法於此為不能洞曉中盟則靈寶籙南曹執法為靈寶之職其來巳久髙天上帝非不知也佩是籙補是職則合行是事無疑矣豈待再三疏於䘖位而後可行耶此執著不通之見也故師尊以南曹四階並帶仙字付之尤不敢當遂啓告上玄特加典者為初品況典者一職他法有之靈寶法中舊尚未出故也而四階不可除者以伺成真得道之士云南曹五階南曹執法典者南曹執法仙士南曹執法仙官南曹執法真士南曹執法真官印篆軌範門論本法合周印篆師曰印者信也用者封物相什亦執政者所持信也漢官儀云王侯曰璽列侯至中二千石曰章其餘皆曰印此世印也隆古盛時人鬼各安其所隂陽不雜其倫故道之用惟見於修真錬本以致輕舉飛升中古以降慢真日益正道凋晦邪僞交馳上下反覆於是出法以救其弊表章以逹其忱付降印篆以為信志故用印之義近同世格亦道運因時損益者也但名稱近似世之官府者不可用字畫兼取凡篆者不當用曹治僣及天上真司者不應用本職之外而繁雜者不必用靈寶大法古來止用三天門下南曹印近世既缺真篆而三天門下四字不應用於人世除去此四字又為不成故依本法止用靈寶大法司印今既進品洞玄佩中盟籙行靈寶法則職位巳重除拜章外上而奏牘下而關申牒帖行移告文符籙三界十方之曹局九州四海之冥司九地重隂洞天仙治幽顯所𨽻並用靈寶大法司印寶本職執法之信也其可推以他印耶應申奏文狀方函并上下一體施用惟章牘并章函用通章印而巳若遣章關牒亦用本職印耳靈寶大法司印說自周秦至本朝尺非一等有周尺黍尺有漢尺有後周尺至本朝有布帛尺有省尺江淮間有淮尺長短不同今本職執法之印合徑二寸五分周尺往往法書言印徑幾寸幾分多不辨尺之長短後有師古之士並從周尺可也通章印說洞真之品玉清之道出於晉永和間三茅二許揚降七真傳降無章奏之格洞玄之道靈寶之教自三皇之世赤明之劫其教巳出元有章奏之格出五錬生尸經五老本行經玉晨乃元始之弟子故以此印通誠祖師也非此法籙不得僣用若行洞玄章法則章之前後各控紙悉依式書符却不用正一章十二小印止於年月日上用通章印而巳其印文只三天合同劵神霄籙亦有之世人因見籙中載此印遂稱此印𨽻于玉清屬洞真部殊不知神霄之教未興而洞玄章法自五代以前並用此印也乃靈寶升天大劵之文但去其下文耳生人用之以為升章入天廷之質證也洞玄章用通章印則是靈寶本科且升又大劵自古屬洞玄部如給付亡人則於九玄使者字下加召魂等字生人用之則去其下文豈可便以為屬洞真部神霄乃天壇萬法皆總是以靈寶有三符亦編入籙中以備用亦未嘗指此印謂不係洞玄品也至本朝有道之士王升卿重編靈寶大法亦依古法敘陳諸家多遵用之其印無沿徑周尺二寸四分若執法之印用周尺則此印亦用周尺如用布帛尺則亦用布帛尺當從古尺可也若應用而易以他印並受考於三官矣九老仙都印說太清正一之道乃玄元後聖付正一天師有拜章之儀用九老仙都印者以太清同生入老尊是太上為師故弟子上聞於師以九老仙都印自章首再拜至太歲章尾却用十二小印其小印有一家無沿如符式有一家有沿如印式十二小印式再拜王陛下以聞側章首太清上章尾臣姓太清側太歲玄都以聞腰封右十二印並長一寸二分闊八分厚不拘黃神越章印說正一㫖要所載刀以一印總名黃神越章而徑闊稍大用於布氣治病之間而巳今按式徑一寸八分周尺依古文用二印乃心章緊切告祈奏啓上帝不拜正章者用之道君玉印右印乃傳道受教請命祖師章奏用之混洞赤文印赤書玉字印八威龍文印右前三印印符籙吞佩貼鎮並通用之靈書中篇印右印敷露真文保鎮山川地水用之元始符命印右印印黃籙白簡元始符命用之三天太上之印此印乃中盟之合契靈寶之總章凡印制章奏文檄並可通用亦可印誥佩治病遣邪長二寸七分闊三寸四分靈寶玄壇之印飛玄三氣玉章之印發遣九靈飛步章奏印泰玄都省之印大魁總監之印神虎雄左印雌右印總攝印荆房印論用諸印切謂靈寶之道出于無極之先靈寶之法起於中古之後東吳葛仙翁受經於徐來勒真人之時法猶未備晉許旌陽遇諶母傳月中孝道明王之教而科品始彰今稱淨明院非也靈寶無二道晉宋之末齊修方盛文檄漸繁故印篆尤不可缺也漢天師止以陽平治一印而致飛升許旌陽受銅符鐵券金丹寶經孝道明王之教靈寶之道亦非多印也以至拔宅升舉位列高穹修真得道上士髙仙亦有不假印篆而濟世康時者豈在印之多寡以為法之重輕後世行法者玄奧不逮於古人印篆百倍于前輩故近世行靈寶法多不用本職印奏牘乃以飛玄三氣玉章印發之靈寶古法未嘗用也又於發符誥中用三天太上印且符文之降出於上玄今之書篆于人手告天而行之可也未免列䘖位于符後三天太上又何預馬三天之與太上非所以為印文也又法中有道君玉印此亦未然如天子王侯謂之璽以道君而稱印不可也以玉為璽謂之玉璽如古者天子有八璽秦李斯篆傳國寶文曰皇帝受命萬世其昌又聖朝所傳璽其文曰皇帝恭膺天命之寶又天師以玉為印止稱陽平治都功印亘古及今未有於印文內自言玉印者也道君則天中之君也如世人君之璽臣下安得而用之且臣僚上奏於君而復用君之璽可乎又如所謂混洞赤文印靈書中篇印八威龍文等諸印似此之類皆以經中四字為一印如嚴攝北酆明檢鬼營𣸸一印字湊分三行似此之類則以經中八字為一印如此則世有天篆度人經自首至尾字字悉可為印不可勝計矣又有稱玄靈通真壇靈寶玄壇非獨僣亂天儀抑且違冒陽憲且金陵之三茅山大洞宗壇也臨江之閣皂山靈寶宗壇也信州之龍虎山正一宗壇也歷朝宗奉三洞聖師傳真弘化之地主領教綱之所若民間齊修止䢖壇於一時事畢則撤之豈有私屋輒立名號乎若得通真之妙則天下大利大害分野之災祥數運之終始皆能逆知然此等說世法所禁也功行未至固不必狂妄如此又有九靈飛步章奏司九靈飛步章奏印夫步罡以應九靈即章奏作用之事罡步之名耳天上無此司世間無此印法籙自正一而至洞玄皆可上章並依本職而巳惟正一法籙用九老仙都印洞玄法籙用通章印古無異說豈待別補一䘖特撰一印而可拜章乎且以世法言之守倅以上皆得上章奏於朝廷不過書所居之官以為䘖耳不應正䘖之外別立章奏之階今按古書師傳止補一䘖凡一切申奏符檄帖牒則用靈寶大法司印若拜章止用通章印如急切奏告用黃神越章印外此則召魂等事用神虎印凡設醮修齊禱雨祈晴召神攝鬼治病考祟拔亡救存二十七品之齊四十二等之醮應世間行持之用盡靈寶章奏之事止用前四印無有不可若受天心而行北斗醮自從本法合用驅邪院印既進品洞玄而行北斗醮通用靈寶大法司印其理盡之矣功成而洞觀徹視行髙而使鬼役神亦不必廣置印篆矣靈寶之外兼行別法者自從其科以其印用其符奏申文移亦只用靈寶本職印可也蓋玉清洞真本無章奏儀式而靈寶為中乘之極品正一而下諸法不得跨越靈寶故也所有雜印流傳既久又難一旦刪去今併存之好古精練之士當自擇焉祭印法師曰印券乃三天靈章髙真符契動有玉女侍衛用則有靈官典禁事隨印用不可超越凡祭印之法用棗湯淨茶各十二分明燈十二盞錢馬各十二分布列於天門之下至星宿朗時法師具衣冠精心上香雙手搯中指中取十方氣吹身變神為靈寶天尊頂碧玉七晨交泰冠青羽飛雲之衣朱履絳裙佩靈寶三境神劒負五色圎象丁立面南步八卦朝天罡回身面天門禮三拜興身默奏上帝言所傳法印幾顆今擇某日依法醮祭伏望三尊俯垂洞鑑特降玄元始三氣流布於印璽之中敕命金童玉女各二十四人以為侍衛令臣用印通靈隨所感應十方至聖皆為證明具啓奏畢再三禮吸天門三氣吹於印中次長跪將印逐顆雙手大煞文捧上額上勑之勑印呪含靈真丹耀靈素威玄天英玄天姿安暉隂容太化方玄樞應大定卿久英禎右呪畢取氣三口吹彈玉清訣再誦靈書一遍而收匣中出印法左手子文呪曰唵婆路伐囉曼茶因地瑟吒那鳥訶嚧帝攝入印法左手午文呪曰唵摩輸彌帝嚧呢阿多耶那烏吟地囉用印押字呪左手中中呪日唵般那狠那烏魯謨薩訶呪硯左手搯中指上節呪曰唵眇莽烏爽俱知毗茶攝呪水莊子文右執水呪日唵鬱單勃赫含精陀羅景玄攝呪紙左中指中右執紙呪日唵菩育曇那摩羅阿那攝呪硃左午文右執硃呪日唵陀羅阿那元梵菩臺攝呪墨左子文右手磨九匝呪曰唵形玄陀合幽律𠰢攝呪筆左寅文右執筆以口相交呪曰唵郁竺羅萌摩羅阿奕吁貟攝祭硃墨筆硯法曰宜用六丁六甲日造筆各十二枝墨十二笏硃十二兩硯二𨾏於甲子日面天門排於卓上以棗湯十二盞香爐一𨾏供養勿令一切人見法師左子文右午文交訣於口祝曰臣今依式造到筆墨硃硯並排列于天門之下謹請靈寶法部靈官仙曹金童玉女將帥吏兵並各布化真氣入於其內令兆所用之時隨意立獲通靈祭筆呪唵阿那法筵摩夷阿蜜羅菩提婆婁薩羅梵那總監鬼神攝右呪畢彈訣取天門氣十二口吹之入筆符於管中呪曰神筆靈靈上帝勑行上界禀令萬神敬聽書符篆籙洞逹玄冥玄中太皇上帝髙真中理五氣混合百神急急如靈寶大法律令勑入筆符祭將符書符呪唵夜闍屠渠訶勒曇俱婆夷知帝薩吒右法搯中指中書符十道用紅紙書分布十方逐符以黃錢化之呪曰千和萬合混合百神神公受命總監衆靈群妖束首振伏萬靈保真固命以度兆民生死受賴其福難勝功過無失保舉爾身急急如靈寶律令上清靈寶大法卷之二十七
