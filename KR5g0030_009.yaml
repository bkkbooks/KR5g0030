front:
  text: 上清靈寳大法卷之九樓一
  hash: sha256:8ee6ab7182e0b6499965c041442f3647def89c5e22765de24f03288fb188c2be
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5g0030_HFL_009-001a, image: hfl/0944/0944-004.png}
body:
  text: 洞微髙士開光救苦真人𡩋全真授上清三洞弟子靈寳領教嗣師王契真纂朝修懴謝門櫛髪呪泥丸玄華保精長存左爲隱日右爲月根六合清煉百神受思右呪畢咽液三過理髪欲向旺地能常行之髮不落當數易櫛櫛之取多而不使痛亦可令侍者櫛取多方也於是血液不滯髮根常堅沐浴呪天地開朗四大爲常玄水淨穢辟除不祥雙童守門七真安房靈津煉濯萬炁混康内外利貞保兹黄裳冠帶呪今日吉慶上合帝恩塵濁巳清尸穢沉零罪垢業厄表裏蕩清呼日吸月歩躡九晨回旋三台周遊五星佩符帶章鳳衣虎裙手執玄文誦詠洞靈聲徹太霄五帝回軿賜我羽書登升上清服食湯劑仙藥呪謹請五方五靈老君召出天醫扁鵲官吏各五十人當令臣服藥身得離病病得離身駕魁乗罡登升十天數由九地命禄俱榮長生不死與道合并呪畢面東服之凡修此道誦詠玄文舉止庠雅動合威儀若狂簡麤踈鬼神切笑三官司過相其失規故示兆之齋戒科條既言道士者非道士之模範不行凡言真人者非真人之規式不集况學士手臨食呪百榖五朱流入腸胃五藏安寧尸邪亡墜七祖安寧長生乆視呪訖叩齒三十二通咽液九過方食几午前宜食酉時後勿食午前者天人食也酉後者鬼魔脯也又臨食勿言死恐生疾病也食物不久露恐邪氣來也故真人斷榖入山求升仙之要矣臨睡脫衣呪受命大帝上升九宫百神安位列侍神公魂魄和煉玉臓華豊百體玄注七液靈充火鈴交煥㓕鬼除凶上願神仙常生無窮呪畢解衣就卧夜卧呪天有九星地有九宫我身百節萬神紏從三尸伏藏五臓流通三田四肢動息守中龍虎八卦侍我瓊容鬼妖萬精勿干真宫叩齒二十四通祝訖又叩齒如前凡卧不開口勿尸眠上道衣冠法服器皿假人服炁守三一誦玄文者尤忌也登厠叩門呪左德神右清神左有司土夫人右有六丁辟穢除我死籍上我生名凡登圊先叩門三下祝畢叩齒三通勿噀唾勿向北勿仰視三光勿男女混登皆致不祥出門呪出隂入陽四道開明八神六丁隨我利貞日月挾賛頭帶七星叩齒七通存七星在頭罡星指前燒香法大凡入靖燒香端心注意存念香煙不可反顧出戸亦不回視將行事不得與人言語并足蹈戸下不可以口囓香焚香不用竈火香灰不用竈灰内有伏龍糞道之大忌須以松柏枝葉火化成灰貯爐器中香火内不使有辛菜羶烈草木及蟲蛀毛甲之物褻瀆上真太極仙翁多以柳竹松柏燼同葵槿葉杵和成塊内加甘松少許亦無嫌疾得火矧又經久一時不灰翳多用爲烈火少用則綿久仙翁多取古藤根濯於長流水中曝乾同青木香玄參合擣焚之開穢達誠降真致仙餘辛烈之炁不可用也須是烈火焚香一舉煙騰誠隨上達不使綿翳若持誦使綿綿煙不絶可也惟在閉炁而鼻息黙祝通息而拜心拜之理恐九宫傾側須以體存隨心曲伏也凡受誦神文謝罪祈恩日中三朝上玄六時行香三朝者日出日中日入時也六時者半夜平旦食時日中晡時黄昏乃六陽時也如遇戊辰戊戌并疾風暴雨大雷電皆當暫停伺天炁静定方可朝修朝元入靖師曰靖室者不雜塵穢不交世事建立壇墠法天象地稱家之有無隨舎之廣狹排列聖位望闕朝真内外端莊身心同潔交真靈於盻蠁會至道於洪濛非止妄立名稱以欺世俗也在宫觀則設三境至真諸天上帝位次或居俗舍則中建三寳傍列衆真遇朝謁望闕存思而巳清旦澄神定志整具冠褐先戸外臨目存思身神羅列叩齒九通念呪呪曰大明靈神九度鬱青朝霞藏輝濯煉五神宫駕六合七神調平結節散輝胎根肅清叩齒九通入戸向地戸之左叩齒三通念宻呪早入戸呪四明功曹通真使者傳言玉童侍靖素女爲我通逹壇殿正神上元生炁降入我身呪畢玉清訣東炁存功曹一人使者一人玉女二人侍靖一人夜入户呪四明功曹龍虎使者正一生炁侍靖素女夜有所啓願得開明童子上元少女與我俱入壇殿通逹所啓皆得上聞呪畢存功曹一人龍虎使者二人侍靖素女一人開明童子一人上玄少女一人共六人入戸畢存香官使者龍虎二君侍香金童傳言玉女夾傍香案日月去面各九寸北斗盖頭魒星向前三炁蓊鬱身在炁中然後閉炁定神對席心拜或端簡三拜叩齒九通宻呪呪曰七星玄真魄靈皇君流輝内映浹御斗魂三台曜華七液纒津金當虎籙備衛生門神化洞靈攝輪紫庭呪畢隨意所陳惟使精念九神下應帝席必獲感應黙奏文具位臣某奏啓聖位切念臣早厠玄關獲參妙道愧無十善以賛六通未能感激於神明動則輕違於戒律初勤終怠口是心非操履有𧇊焚修失節慮六府明書於罪目三尸暗奏於愆辜謹以良辰特伸懴謝願矜愚昧特賜原除玄功積慮於三千丹藥早成於九轉仙曹紀善鬼録除殃八景金書得煉炁修真之術五文玉篆獲長生久視之功法属安寧災衰洗蕩萬靈振伏群魔不干興敎立功導民扶世上報君師父母之徳下濟幽明沉滯之靈真道長存形神俱妙臣下情無任不勝惶懼之至謹言早出戸呪出隂入陽萬神開通關奏事畢請閉黄房侍靖玉女明備神宫夜出戸呪玄上太隂八牎開明向來所陳少女通靈事畢復位萬神潜寜呪畢出户能於靖中當坐存念隨平日所得功用宻行尤佳或參以諸法别有儀範者自依本條悔過謝愆修真之要寡過爲先過若不悛去道逺矣雖行持未至於上道之階使爲行不檢豈足以折伏鬼神况於進拜表章濟度幽顯者哉功過之司毫分不失晉許逺遊遁跡山林勤心味道漸入真品而三官都禁遣周魴等出丹簡罪簿以語之曰夫欲學道慕生上𨽻真人玄心棲𨗿恭敬髙靈者當得世功相及禍患不結隂德流根仁心上逮乃可歩真索仙度名青府耳由此言之未及許逺遊者其可不知寡過自修耶奉法行持求仙學道所當懲悔巳往之愆積累方來之功故玄綱論曰過惟改而不復爲功惟立而不中倦是謂日新其徳自天祐之倘或口言祈謝乃心未省愆念之前而作之後飾之外而敗之中然後苦於勞神瞻星禮月持齋奉戒焚香誦經亦爲徒設矣有大言眩世則云罪之不積惡之不爲豈須懴謝斷棄教科此文矯激太過從客中道與不及所宜悔至於心知咎必省依經奉教按格行科削罪目於三官五帝之司上生名於十極九霄之境立功不怠舉形仙飛固有分焉亦無自阻有志者多成事也謝過儀毎歳除秋分一日外常以三元八節本命生辰甲子庚申及諸良日及時入靖室或宫觀山澤潔凈去處焚香專志省咎思愆先於壇側黙坐深念夙生所作所犯戰兢自乂方振衣而起整肅形儀登壇啓告行用入戸誦呪上香如法悉按常朝之儀早以東爲始午以南爲始夜以北爲始分五方懴謝自合立科儀發爐循格至三上香後方禮方如自然朝式但此事以宻爲尚兼獨行朝修不宜繁𤨏故今止編四方謝罪之文損益隨事之宜爾焚香供養九清上聖三界萬靈咸賜如言臣今以良日洗心悔過禮懴祈恩先伸上祝皇朝社稷宗廟先靈駕景九霄垂休萬葉今朝皇帝基圖永久祚業昌隆聖壽並於乾坤德教均於造化萬方向善百榖咸豐有識有知悉悟至真之道無邊無極共躋榮樂之郷大化興行正法無斁敢伸凡願上冒宸嚴臣下情無任不勝惶懼之至謹言臣某志心歸命東青西素南丹北𡨋四維上下十方靈寳天尊三十二天上帝周天二十八宿星君天真上聖五嶽真君山川河海洞天福地一切神仙諸靈官右以北爲先次向北方三拜長跪具法位臣某志心歸身歸神歸命北方東北方無極太上靈寳天尊北方八天帝君北方髙真上聖真人真仙斗牛女虚危室璧七宿星石北嶽恒山黒帝真君北方洞天福地山川河海一切真靈北郷神仙諸靈官臣聞大道垂慈昭示悔愆之路髙真設化特開請命之方伏念臣愚蠢凡姿善縁宿積叨逢道運獲際真風冒居法籙之班忝繼玄元之裔未克立功濟世深虞行已有𠂯又恐萬祖億曽昔亡往逝暨臣千生累刼宿世今身稔積愆辜深如河海結在天曹地司之内著於日月星辰之宫永刼不原終天不解懼遭譴罰有障善功今用首陳盡祈原宥令臣九玄七祖以及兹身萬刼千生至于今日凡淊天之重罪如杲日之鎔氷永斷惡根増培善本即使臣早圓行願獲遇至人次及見在宗親巳亡法俗遷神獲慶與道合真福被含靈俱蒙大化臣下情無任不勝惶懼之至以聞謹言次懴東方南方西方中央並同前式但改中間聖位耳臣某志心歸身歸神歸命東方東南方無極太上靈寳天尊東方八天帝君東方髙真上聖真人真仙角亢氐房心尾箕七宿星君東嶽泰山青帝真君東方洞天福地山川河海一切真靈東郷神仙諸靈官南方西南方無極太上靈寳天尊南方八天帝君南方髙真上聖真人真仙井鬼栁星張翼軫七宿星君南嶽衡山赤帝真君南方洞天福地山川河海一切真靈南郷神仙諸靈官西方西北方無極太上靈寳天尊西方八天帝君西方髙真上聖真人真仙奎婁胃昴畢觜參七宿星君西嶽華山白帝真君西方洞天福地山川河海一切真靈西郷神仙諸靈官上方下方無極太上靈寳天尊三景九霄大羅無極三十六天帝君五老上帝天曹主宰旡鞅髙真羅鄷隂境十地真靈三十六土皇君中嶽嵩山黄帝真君中央洞天福地山川河海一切神仙諸靈官上下郷神仙諸靈官三禮太上無極大道三十六部尊經古今得道宗師再祝臣某謹重誠上啓無極大道上帝髙真三界威靈十方衆聖以今入靖朝真首愆謝過仰蒙大造曲賜寛恩伏願罪削隂曹名増仙格學無魔試功克圓成臣敢不深悟前非益堅素志誓弘大教普救衆生利及十方澤均九祖臣下情無任不勝惶懼之至謹言次出戸如常此即靈寳自然朝之餘意也若毎月欲行當用後式只緫懴一叚毎日自然朝式先入户凝神靜慮内外朗徹然後存思啓聖逹意畢祝曰臣聞一炁開光握化機於渺邈三天啓運張玄象於洪濛五千四百科文下敷塵世三十六天梵炁上緫玄綱司禍福之無私定盈虧之有數流傳法籙開度人天道出鶴鳴正一演修真之㫖功標龍漢混元垂出世之門大道難名純誠可格今因吉日謝過朝真伏願金童敷命玉女典香上聞妙有之庭俓御虚無之境七輿八轡泛浩炁以浮空三界十方燭靈輝而蕩穢㐲念臣玄關下士赤劵初階未造玄微有違科戒謹遵科典特啓懴陳伏願金闕至尊玉京上聖普施睿澤洗滌深愆許以自新容之勉進宻降太玄之炁合成靈寳之軀克證真常永棲沖廕功霑幽顯惠及𡨚親俾進道以無魔期長生而久視臣下情無任不勝惶懼之至謹言長跪懴悔臣志心歸身歸神歸命三清化主十方靈寳天尊无量度人經中衆聖重念臣爰從曩刼以至今生三業六根五情七慾罪書黒簿定録玄科今對髙明特伸懴謝伏願流恩朽骨錫命真司銷除惡籍之名標紀善功之字俾胞元解結心境無塵智惠圓通障魔消散庶容少禆玄化上賛真風得道之後升入無形發十大願曰三清玉帝三素元君太上髙靈仙都大神今日吉慶所願開陳上願飛霄長生神仙中願天地合景風雲下願五嶽與身長存四願七祖解離𡨚愆五願帝君斬伐胞元六願世世智惠開解七願消鬼滅害斬馘六天八願開徹通幽逹靈九願一㑹莫不如言十願飛仙上朝三元再拜回向稽首靈寳虚玄主旡亘度人真道師氣包天地无德名法貫隂陽不思識隨縁應化救群品超越三界及十方巍巍旡上功德山歸心念念無休停臣不揆凡愚所佩大法冀上消於天災刼運下度於浮世兆民回死起生以完形救病除殃而輔正功圓行備早成金液之丹心了神靈速受玉皇之詔臣下情無任激切之至謹言次出戸如常拱侍北辰祭祝式伏聞太極未分含三才而周一炁兩儀既判齊七政以均四時運斗極於中天布星𨇠於象外分司闡化立極承天八王爲萬彚之元七聖作衆生之祖緫七十二候之氣運二十八宿之司旋轉斗垣周臨地軌爲車而調理綱紀拱辰而統制乾坤喉舌是司樞機爲握示魒星之所指四海知時觀罡氣之有渾八紘咸福三台齊色九炁同光掌天上之璣衡定人間之禍福漢明帝得瞻𧇖像張天師參受真經立玄教於塵寰脫凡縁於世網矧兹動植實願生成今臣恭行大法誓度幽明若不資二斗之回旋運坎離之造化欲成大道難造玄關是以值遇降辰特伸精禱伏冀七星垂鑑雲軿暫離於璇霄二帝丕臨期駕威臨於壇靖注上生籍勾落死名七元之真炁常充五臓之神君各保早悟真常之理獲宣至道之慈臣下情無任激切之至謹言召玄武符梵行諸天周回十方無量大神皆由我身救符所至混合玄𡨋急急如律令召北斗符璇璣玉衡一時停輪執符把籙齊到帝前千和萬合自然成真急急如靈寳大法律令上清靈寳大法卷之九
