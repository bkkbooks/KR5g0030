front:
  text: 上清靈寶大法卷之六十五禽五
  hash: sha256:5a67caa622d6929cd808f30789c68c85555f26706f524d94744e3fb507d4b6ef
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5g0030_HFL_065-001a, image: hfl/0962/0962-132.png}
body:
  text: 洞微髙士開光救苦真人寧全真授上清三洞弟子靈寶領教嗣師王契真纂雜用牒劄帖關門請當境監壇靈寶大法司牒當境某侯王本司剋取某月某日為齋主某人崇建無上黃籙大齋幾晝夜追悼亡過某等魂巳備牒貴司照應今者齋事扣期切慮下愚不移輒犯壇禁仰惟某侯王功著彼蒼廟食斯境英風動地廣惠澤民自是曰聰曰明莫不起敬起慕欲祈神造俯翊齋修須至牒者牒請提兵整甲鞭騎戒塗進玉陛以停驂立油幢而行令張氣焰鎮護壇場燭幽微察姦去穢屏斥人物禽畜之厭驅遣伏尸邪氣之干葷酒觸犯大赫厥靈火盜不祥須嚴其禁散天香而匝地邀帝駕以臨軒導引亡魂彈壓幽爽仍提綱於庶務使盡合於齋儀期惠始終普覃幽顯願闡揚大教當旌賞言功顒伺圎成敢忘攀餞謹牒年月日牒借地築壇起土牒靈寶大法司牒土府太嵗皇君五土尊神四靈神君禁忌百神當司今據齋主某乞取某月某日崇建無上黃籙大齋追悼亡過某等魂上生仙界事本司巳飛奏天廷祈恩開度今者齋修日近科範將陳欲借中宫隙地築立玄壇延奉帝真聿嚴昭事須至專牒者牒請上體齋功暫離方位青龍東去朱雀南翔白虎西行玄武北去勾陳中退凶殺深藏應干百千萬神各去二十五步髙際三天之表下通九壘之間界定八方壇崇三級像清都之寥廓延玉輅以來臨依黃籙簡文度泉扃魂爽或有伏尸故氣不正妖氛輒干禁忌之嚴攝赴魁罡之下克成乃事當復攸司依應奉行安居不撓謹牒年月日牒解壇復土牒無上黃籙大齋壇牒土府同前本壇昨為齋官某追薦亡過某等魂恭依科式借地築壇朝元治事今者巳行滿散所合召集中宫萬神復還土府須至牒者牒請同稟玄科各還厥位黃黑碧緑而九宫常靜東西南北而八卦奠安咸底緬平無復欹陷死魂蒙度願永脫於泉扃齋主承休兾留題於土簡人天胥慶動植懷生用以奉安敢希照會謹牒年月日牒敕水解穢牒無上黃籙大齋壇本壇恭依玄格崇建大齋尚慮塵凡汙濁之區兼有惡毒厭穢之氣今憑劒水用潔壇場須至牒者右牒請五方解穢吏兵四門神將八卦大神四靈神君直壇土地防禦神祇恭承帝旨同赴玄壇普召天兵廓施神化驅五龍而噀水激濁揚清命九鳯以㗸符除氛蕩穢攝化塵凡之境變為清淨之居內外肅嚴天人胥會其輒興於魔魅並攝赴於魁罡使夤奉合冝顯幽蒙惠牒至準女青律令奉行謹牒年月日牒辟非牒無上黃籙大齋壇牒辟非大將軍本壇恭依寶格宣演瓊科先振金鍾上開陽道須至牒者牒請下臨玄墠斡運乾元大叩大鳴冝合九陽之韻若隱若顯妙開三景之光齋悃潛通玄綱肇舉謹牒年月日牒禁壇牒無上黃籙大齋壇牒禁壇大將軍本壇恭按典儀祗崇齋直次鳴玉磬用集隂神須至牒者牒請潛敷神化開闢坤輿梵響交傳召洞隂之妙氣元陽允契判太極之先天凡聖同居風雲慶會謹牒年月日牒繳赦劄無上黃籙大齋壇今準泰玄都省降到赦書一通頭連在前右本壇除巳遵依奉行外請合屬主宰看詳前件赦文速為施行年月日劄發赦牒無上黃籙大齋壇牒日直功曹地道曹泰山沿路土地本壇今準三天門下降到曲赦一道泰玄都省降到赦書詔一道告下東嶽酆都十方道主者及應千幽隂地獄等處赦宥亡過某等及六道苦爽出離冥關赴壇受度須至專牒者右牒仰準此火急承受前去徑詣三界十方無極世界遍告主者咸準赦恩施行不得揩磨損失有滯驛程如律奉行故牒年月日牒破地獄牒如用合同牒則用小字無上黃籙大齋壇牒九獄都司主者本壇奉為齋官某崇建黃籙大齋追悼亡過某等魂及下元苦爽同登仙界巳節次飛奏天廷依科開度所有合同符牒巳預發各獄主者照應今則將行召攝猶恐隂扃未啓魂尚拘留恭準玉清寶籙破地獄真符及降下泰玄童子一百二十人各持諸天寶器合同符契下開幽獄須至隨符轉牒者牒請遵奉玉清詔命伺各方童子到獄徑以元符合同速開關軌赦放罪魂準令奉行謹牒年月日牒催召牒無上黃籙大齋壇本壇檢會今月某日為齋官某崇建黃籙大齋追悼亡過某等魂同登道岸事本壇已節次飛奏天廷祈恩開度及備牒承行官將先次根攝上件亡魂今則見行召攝尚慮冥道艱危未即遣發須至再牒催督者右牒請神虎追魂官典法部天神將吏地道鬼道功曹本處土地五道尊神速戒征途直通冥路催召亡過某及在會男女等親魂正𩲸依時引附靈幡現形報應赴室就浴入壇朝參躬承開度驛程有限不得稽延在路或有遏截仰攝赴近獄依律治罪星火奉行立待昭報謹牒年月日牒普召六道孤魂牒無上黃籙大齋壇本壇檢會今月某曰為齋官某崇建黃籙大齋追悼亡過某等魂及下元苦爽同遂生方事本壇巳節次飛奏三天請命頒行依科開度剋取今宵普施無礙夜齋廣資六道幽靈九泉孤滯除巳先具牒委神威遍行根刷外今依律普召遍十方際盡玄虛界自昔至今一切天仙道人倫道神祇道地獄道餓鬼道畜生道幽靈之衆乃至九州分野十道九幽一切軍陳殺傷之衆劫掠鬪殺之衆王法屠戮之衆牢獄枷鎖囚繫之衆徒流逺竄之衆遊宦身亡之衆投河落井覆舟赴水溺死之衆登髙墜體登車墜馬摧殘之衆農工商賈僧道尼姑岩棲谷隱流亡之衆路岐藝術遊手巫覡盜賊傭身客死之衆雷嗔虎啖水火漂焚之衆自刎自縊中毒陷穽枉死之衆疾疫飢荒暴露尸骸之衆蠱蛀傳尸邪妖拘執之衆墮胎懷孕産死女流之衆盲聾喑跛拳攣癱瘓沈痾致死之衆鰥寡孤獨乞丐困窮無依之衆依草附木作精作怪遊蕩之衆𡨚讎呪詛貧命欠財執對之衆胎生卵生濕生化生異類之衆含靈抱識蠢動飛潛有情之衆他方此界新死故亡若女若男有主無主一切孤魂滯𩲸等衆猶恐冥程阻隔未即到壇須至專牒催攝者右牒請神虎三部追魂使者天道地道人道仙道神道鬼道業道功曹監壇承受官吏本處城隍土地五道大神太歲尊神六甲開導使者引魂童子即今引領上件六道含靈河沙鬼衆隨幡指示次第入壇躬承開度仍請鈐束母令妄起邪心以干生氣前途或有攔截仰照天律施行時刻不移立伺昭報謹牒年月日牒化冥衣牒無上黃籙大齋壇本壇檢會今月某日為齋主某崇建黃籙大齋追悼亡過某等魂超升仙界事本壇見攝召上件亡魂到壇巳新盥沐今來所化冥衣切恐名數繁多遞相壞奪欲勞神造親為監視須至專牒者右牒請黃籙院掌冥衣使者監壇承受威神當處土地廟食正神法部當畨神吏親督焚化願仗三寶威力攝化無限皆成百色流霞之服表裏光明點勘名數次第分俵不得縱令恃衆恃強相親相奪務在周遍使十分披帶內外裝嚴毋致遺缺不均有妨受度牒至準玄科律令奉行謹牒年月日牒煉度牒無上黃籙大齋壇本壇為齋官某崇建黃籙大齋追悼亡過某等魂巳請命頒行依科開度今則仰遵科範受煉亡魂欲仗神功宣行妙用除巳具奏諸天上帝乞降恩光下臨外須至專牒者右牒請南昌受煉司主職神將丹天左右衛上將軍主水火將軍火鈴將軍火鈴童子九光童子開光童子水池火沼二大神將水火二池童子監生大神十方龍威大神丹靈大神皓華大神玄英大神煉尸大神返生大神聚形大神監度大神遷化大神聚𩲸大神引魂大神變化大神煉度大神超度大神變身大神復相大神正精大神火府大神返形大神超化大神煉度童子混元一十二生氣大將軍九天生化合干仙吏南昌上宫朱陵火府南陵樞府煉度合干仙吏靈寶水火二司煉度官君童女神兵等衆引煉仙曹靈官功曹使者吏兵合干仙宰分靈應化奉命下臨召日月之真晶請乾坤之正氣左化冶煉之沼右為流汨之霐匹配坎離抽添鉛汞引導亡爽陶育枯骸使隂翳銷鎔陽光洞徹餔五芽而孕秀聚九氣以生神嬰兒忽歌咸回靈於十轉制魔保舉皆度品於丹天敢冀慈仁俯垂彰感謹牒年月日牒煉度天醫牒無上黃籙大齋壇本壇奉為齋官某追薦亡過某等魂崇建黃籙大齋巳請命頒行祈恩開度修奉周圓今則祗按玄科恭行大煉尚慮死魂帶疾受煉無由必仗天醫以令生化除巳行符布氣依法全形外須至專牒者右牒請天醫仙吏尚藥敷藥靈官治病三五功曹太醫博士主者針砭小吏收毒將軍天醫執職官衆靈寶局中聚形功曹合氣功曹補氣續氣功曹聚神功曹全骸全形續骨功曹返形復相大神主生産功曹取死胎功曹下死胎功曹合干官宰上體好生同垂善救契勘見則受度應係死魂其有三十六種傷亡一十八等惡死請分科而專局先探本以窮原或灼艾握針或行符用藥隨其證候淺深之則斡以君臣佐使之功布五靈真氣調理百關使萬種沈魂消除衆疾産孕者斬根解結摧殘者續首全形完聚本真復還舊相仗離坎甄陶而變化證形神俱妙以升遷敢冀慈悲俯垂護度謹牒年月日牒發劵牒無上黃籙大齋壇牒上三界天門守衛諸神本壇今月某日為齋主某崇建黃籙大齋追悼亡過某等魂今則受煉巳周謹按法式分破靈寶升天左右合同契劵超度上升除將各劵一半付亡過某等收執外一半入方函重封印全所合發上三界天門請行照會須至牒上者牒請照會交管伺候上件亡魂齎持半劵前到即與辨驗合同應期超度使魔王保舉無拘天門牒至準玄科律令奉行謹牒年月日牒生天案牒無上黃籙大齋壇牒生天案主者本壇今月某曰為齋官某崇建黃籙大齋追悼亡過某等魂巳節次飛奏天廷依科開度所有上件亡魂受煉巳畢所合津發前往生天案受生除出給合同文牒付壇首亡過某收執為據須至牒者牒候到請照會辨驗合同印押隨期功果各與注生母令稽滯幽沉有妨開度牒至準玄科依應奉行謹牒年月日牒防送牒無上黃籙大齋壇本壇檢會今月某日為齋主某崇建黃籙大齋開度亡過某等魂今則巳詣煉度所合委差神吏管領前去地府生天案聽候注生須至隨牒遣發者右牒黃籙院地道功曹同承受官吏將上件巳受度亡魂交管前去并所給合同文牒敕赦誥籙各合齎執徑詣生天案交卸即與計功贖罪隨果注生在路或有遏截仰攝赴近獄明示憲章準令火急奉行不請違滯謹牒年月日牒焚燎護送牒無上黃籙大齋壇本壇奉為齋官某崇建黃籙大齋追薦亡過某等魂及下元苦爽今則依科煉度巳遂周圓除已出給符籙牒據執證受生外所有焚燎經財切恐遞相侵凌合委神吏專一督視及管送前去托生須至牒者右牒監壇受事合𨽻神祇法院當畨神吏當處土地五道大神黃籙院承宣一切官吏仰躬親監視焚燎之所將所給籙符牒據經財點照姓名逐一俵付各令收執母致違缺不均以相侵奪仍希管領前去黃籙院生天案交卸計會直日典吏遵依敕赦大會齋功特與削落罪簿隨其品格注受生方前塗或有非道邀阻請便冝照律施行時刻不移幸勿違滯謹牒年月日牒山簡牒靈寶大法司牒上某處洞天仙宫主宰照對今月某日為某鄉貫某追薦亡過某等魂崇建無上黃籙大齋幾晝夜謹為依科開度保舉超升以今功果圓成解壇散席遵依法式投簡䇿勛敬齎持龍簡璧鈕投送某處洞天摽紀善功刻名仙籍須至專牒者牒候到伏請照會依準玄都舊典奉行謹牒年月日牒土簡牒靈寶大法司牒上中宫土府太歲九壘土皇靈官主宰照對今月某日為某鄉貫某追薦亡過某等魂崇建無上黃籙大齋幾晝夜謹為依科開度保舉超升以今功果圓成解壇散席遵依法式投簡䇿勛敬齎持龍簡璧鈕投送某處福地摽紀善功刻名仙籍須至專牒者牒候到伏請照會依唯玄都舊典奉行謹牒年月日牒水簡牒靈寶大法司牒上某處靈澤潭洞靈