front:
  text: 上清靈寶大法卷之三十三飛九
  hash: sha256:9f70d9bcfbf5fe415e175f1ab129d039d5edb461c057b9f83670194c2a6ff42f
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5g0030_HFL_033-001a, image: hfl/0951/0951-168.png}
body:
  text: 洞微髙士開光救苦真人寧全真授上清三洞弟子靈寶領教嗣師王契真纂齊法壇圖門幡蓋章師曰凡壇場一幡並有一符各依法式書篆不可混雜他法五方衛靈幡符東方南方西方北方中央右五符書玄壇五方幡正面止南方用黑書餘皆朱書念五方衛靈呪書乃九氣青天者是也此符出洞淵衛靈神呪籙五方鎮壇符東方青帝呪九氣萌陽玉曆龍章八卦布外一德中藏化生自我死絶回祥南方赤帝呪南陵三光氣充光芒以養以正邪莫能當朱火石火為吾所將西方白帝呪太白流精七星守靈乾德內守金火莫刑生所不化白元用明北方黑帝呪玄德五靈度命元一胞精合魔內逹合七隂火內運玄德化明漂沈鬼賊馘滅邪精中央黃帝呪中主萬神十二元真總統四大元始玉晨敕呪玄帝髙真元始五老制符垂教使我行道今日是時傳真授道建齊攺云建齊行道召靈束魔災殃蕩掃五方大神敬伏三寶從吾者吉終獲難老脫死入生華而不老違吾者凶生逢難老死歸冥都地獄所考右四方符安四門中央安齊堂戶上焚香祝曰某帝直符吏二人出今日直事某甲從官若干人六龍各各嚴裝冠帶執玉持案上詣帝廷臣等所奏發符啓事從今以去至行道畢悉令條逹母使遺脫便隨事行遣只季月用黃帝餘依五帝也右五符或書五方幡背上蔡致虛路時中用以借地建壇太上三部符謂之安宅符用板書鎮五方本出靈寶升玄經三天幡三十二天幡師曰各長三尺二寸或二尺四寸東青八首南紅八首西白八首北皂八首或依度人經法以黃緑青赤蒼黑紫白九色為之自太皇天相間用可也幡面書天帝號背面篆三十二天符本出靈寶大劫經中太真科靈寶九天生神保命齊儀皆不同三十二天符見經句符書門青玄寶幢師曰凡預告之時當先立青玄幢法以青繒四丈九尺夫造上頂作大寶蓋蓋作八角懸小幡八首中間却懸大幡湊成寶幢以按九州分野幡身以雄黃篆大九龍符兩足分開篆青玄寶誥符兩手分寫齊意懸掛髙竿此為通天救苦預告十方停囚罷對又一法曰太一寶幡用黃絹造亦依此或書符九龍符青宫寶誥並見齊法符篆門告盟寶幡師曰凡建大齊先立告盟幡以黃繒夾造亦長四丈九尺幡身中間篆玉皇睿號玉皇大天尊玄穹髙上帝十字兩手分寫齊意就壇前空隙地髙竿懸掛啓聞穹厚告盟三界預白齊期亦將建善功之期信也故顯幽共覩鬼神遙瞻寓物陳儀耳又法頂上寫臣謹謹上奏五字身上書太上無極大道至真無上三十六部尊經真文寶符太上三尊十方衆聖玄中大法師三界官屬一切威靈伏望恩光鑑觀齊事四十九字兩手足分寫法位據某入意玉皇睿號見齊法符篆門遷神回黃寶幡師曰凡建丸幽獄當先立遷神回黃幡於壇之東法以白繒黃繒夾造長四丈九尺並依式書符懸於長空任風吹揚十方九幽孤魂苦爽覩此幡足所指諸苦解脫頓悟善性若生聲讃歎人天功德至重寶而欽崇以周妙果又法兩手分寫十方天尊每邊寫五方左手之下又寫救苦真人大惠真人右手之下又寫拔罪真人拔度真人兩足寫甘露呪用之亦同正面背面遷神回黃幡青玄睿號篆式東極宫中大慈仁者尋聲赴感太一救苦幡足九天生神迥黃章篆式太微回黃旗無英命靈幡攝召長夜府開度受生魂回耀靈幡師曰凡建回耀輪燈常立回耀幡於輪之東南法以絳綵三丈六尺夾造以朱砂雌黃合研正背依式書符正面或篆慈悲化主寶幢接引天尊十字浮空髙掛十方幽魂覩此靈幡一念皈依夙生罪障塵勞大罪皆得原除上生南宮正面背面幡足篆式符命通溟漠靈幡揚曉風遷神超北府飛舄上南宫又遷神幡睿號篆式慈悲化主九幽拔罪天尊又回耀幡睿號篆式慈悲化王寶幢接引天尊超度幡式師曰凡重建道場之日可立超度幡法以黃繒夾造長二丈四尺依式書之六甲開道幡師曰幡首書上帝內諱幡身篆六甲使者持幡開導八字兩手篆空洞通幽呪兩足篆戒經四句幡頂上帝內諱書正面身中幡身篆式書身背面六甲使者持幡開導幡手四句篆式靈音振空洞九玄離幽裔感爽無凝滯去留如解帶妙戒怡五靈金書警萬神察命定録籍靈符度苦魂九巵幡師曰凡關九巵九壘燈以黃素造幡九首懸之幡頂書九氣符幡身書九天隂符兩手分寫告文九氣符九天隂符見大煉符篆門九獄幡師曰凡建九獄以黃素造幡九首各長四尺九寸或以青造長九尺亦可幡身寫各方天尊號頂上書九獄梵氣符背面篆十方救苦天尊符兩手寫破獄符呪告文兩足寫玉清寶籙真符告下某獄以竹九竿隨方插之九獄梵氣符十方天尊符破獄符呪並見齊法符篆門回耀燈幡師曰凡建回耀燈造小幡四十九首黃白之色互相交間上書諸尊睿號頂上朱書青玄破酆都真形符符見齊法符篆門三塗五苦幡符見齊法符篆門二十四獄幡天尊號元皇廣度天尊紫清度魂天尊三界通化天尊無量慈䕃天尊濟度苦海天尊玄德救苦天尊六通救苦天尊開道往生天尊光照九幽天尊救苦超生天尊護魂無滯天尊慈悲廣度天尊玄化解脫天尊真光拔難天尊常普濟度天尊明真度幽天尊浩劫垂慈天尊大慈至廣天尊真常度命天尊廣化六道天尊苦劫輪轉天尊法橋大度天尊寶光九夜天尊大慈救苦天尊酆都燈幡師曰凡關酆都山燈以黃素造幡五首止書五氣天尊睿號五氣天尊號東方九氣洞空天尊南方三氣洞青天尊西方七氣洞虛天尊北方五氣洞微天尊中央一氣洞真天尊五路燈幡師曰凡關開通五路燈以黃素造幡五首並書開通道路天尊插於五方三十二天燈幡師曰關三十二天燈以黃素作幡十首書十方飛天神王符按十方掛之神王符見降真召靈門血湖燈幡師曰㸃血湖燈以黃素造幡五首書天尊號五方睿號東方九氣淨穢天尊南方三氣化厭天尊西方七氣斬惡天尊北方五氣蕩形天尊中央一氣皓慈天尊茭龍金龍二吏幡二符見齊法符篆門神虎隂陽二壇幡召魂幡巳上見神虎玄範門召六道孤魂等幡符見齊法符篆門命魔幡師曰以紅素夾造長七尺許中書命魔符凡散花命魔令一人前持引導旋繞符見篆門齊法符水火二池幡煉度壇幡符見大煉符籙門度魂陽輝幡師曰以黃素造長二尺四寸頂上書日月北斗之形幡身篆睿號一十八字兩手篆呪六句兩足篆呪四句幡身睿號篆式幡手陽輝度魂呪明哉太陽輝神光洞三界氣散玄漠內靈煙生紫庭御氣乘風霞飄飄淩無形幡足返根呪篆式明梵飛玄景開度長夜魂遊奕﨣期歸氣氣返故根朱陵度命幡師曰以白紙造幡朱書符頓朱陵府度橋幡師曰度橋時於神虎堂中燒吹橋上步神虎罡祝神虎官將接引亡魂上登朱陵又度橋幡師曰以淡青紙為之朱書其符兩手分寫呪四句又度橋幡分二邊二幡篆式幡腳篆式乃返根呪巳見在陽輝幡內上清靈寶大法卷之三十三
