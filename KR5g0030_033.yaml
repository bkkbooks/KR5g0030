front:
  text: 上清靈寳大法卷之三十三飛九
  hash: sha256:fc6f6f2011aca73ec4371638d213febfaea84bea9d57762a0400054bf94553e0
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5g0030_HFL_033-001a, image: hfl/0951/0951-168.png}
body:
  text: 洞微髙士開光救苦真人𡩋全真授上清三洞弟子靈寳領教嗣師王契真纂齋法壇圖門旛盖章師曰凡壇場一旛並有一符各依法式書篆不可混雜他法五方衞靈旛符東方南方西方北方中央右五符書玄壇五方旛正面止南方用黒書餘皆朱書念五方衞靈呪書乃九炁青天者是也此符出洞淵衞靈神呪籙五方鎮壇符東方青帝呪九炁萌陽玉曆龍章八卦布外一徳中藏化生自我死絶回祥南方赤帝呪南陵三光氣充光芒以養以正邪莫能當朱火石火爲吾所將西方白帝呪太白流精七星守靈乾徳内守金火莫刑生所不化白元用明北方黒帝呪玄徳五靈度命元一胞精合魔内逹合七隂火内運玄徳化明漂沈鬼賊馘滅邪精中央黄帝呪中主萬神十二元真總統四大元始玉晨敕呪玄帝髙真元始五老制符垂教使我行道今日是時傳真授道建齋攺云建齋行道召靈束魔災殃蕩掃五方大神敬伏三寳從吾者吉終獲難老脫死入生華而不老違吾者凶生逢難老死歸冥都地獄所考右四方符安四門中央安齋堂戸上焚香祝曰某帝直符吏二人出今日直事某甲從官若干人六龍各各嚴裝冠帶執玉持案上詣帝廷臣等所奏發符啓事從今以去至行道畢悉令條逹母使遺脫便隨事行遣只季月用黄帝餘依五帝也右五符或書五方旛背上蔡致虚路時中用以借地建壇太上三部符謂之安宅符用板書鎮五方本出靈寳昇玄經三天旛三十二天旛師曰各長三尺二寸或二尺四寸東青八首南紅八首西白八首北皁八首或依度人經法以黄緑青赤蒼黒紫白九色爲之自太皇天相間用可也旛面書天帝號背面篆三十二天符本岀靈寳大劫經中太真科靈寳九天生神保命齋儀皆不同三十二天符見經句符書門青玄寳幢師曰凡預告之時當先立青玄幢法以青繒四丈九尺夫造上頂作大寳盖盖作八角懸小旛八首中間却懸大旛湊成寳幢以按九州分野旛身以雄黄篆大九龍符兩足分開篆青玄寳誥符兩手分寫齋意懸掛髙竿此爲通天救苦預告十方停囚罷對又一法曰太一寳旛用黄絹造亦依此或書符九龍符青宫寳誥並見齋法符篆門告盟寳旛師曰凡建大齋先立告盟旛以黄繒夾造亦長四丈九尺旛身中間篆玉皇睿號玉皇大天尊玄穹髙上帝十字兩手分寫齋意就壇前空隙地髙竿懸掛啓聞穹厚告盟三界預白齋期亦將建善功之期信也故顯幽共覩鬼神遥瞻寓物陳儀耳又法頂上寫臣謹謹上奏五字身上書太上無極大道至真无上三十六部尊經真文寳符太上三尊十方衆聖玄中大法師三界官屬一切威靈伏望恩光鑑觀齋事四十九字兩手足分寫法位據某入意玉皇睿號見齋法符篆門遷神迴黄寳旛師曰凡建丸幽獄當先立遷神迴黄旛於壇之東法以白繒黄繒夾造長四丈九尺並依式書符懸於長空任風吹颺十方九幽孤䰟苦爽覩此旛足所指諸苦解脫頓悟善性若生聲讃歎人天功徳至重寳而欽崇以周妙果又法兩手分寫十方天尊毎邊寫五方左手之下又寫救苦真人大惠真人右手之下又寫抜罪真人抜度真人兩足寫甘露呪用之亦同正面背面遷神迴黄旛青玄睿號篆式東極宫中大慈仁者尋聲赴感太一救苦旛足九天生神迥黄章篆式太微迴黄旗無英命靈旛攝召長夜府開度受生䰟迴耀靈旛師曰凡建迴耀輪燈常立迴耀旛於輪之東南法以絳綵三丈六尺夾造以朱砂雌黄合研正背依式書符正面或篆慈悲化主寳幢接引天尊十字浮空髙掛十方幽䰟覩此靈旛一念皈依夙生罪障塵勞大罪皆得原除上生南宮正面背面旛足篆式符命通溟漠靈旛颺曉風遷神超北府飛舄上南宫又遷神旛睿號篆式慈悲化主九幽㧞罪天尊又迴耀旛睿號篆式慈悲化王寳幢接引天尊超度旛式師曰凡重建道場之日可立超度旛法以黄繒夾造長二丈四尺依式書之六甲開道旛師曰旛首書上帝内諱旛身篆六甲使者持旛開導八字兩手篆空洞通幽呪兩足篆戒經四句旛頂上帝内諱書正面身中旛身篆式書身背面六甲使者持旛開導旛手四句篆式靈音振空洞九玄離幽裔感爽無凝滯去留如解帶妙戒怡五靈金書警萬神察命定録籍靈符度苦䰟九巵旛師曰凡關九巵九壘燈以黄素造旛九首懸之旛頂書九炁符旛身書九天隂符兩手分寫告文九炁符九天隂符見大煉符篆門九獄旛師曰凡建九獄以黄素造旛九首各長四尺九寸或以青造長九尺亦可旛身寫各方天尊號頂上書九獄梵炁符背面篆十方救苦天尊符兩手寫破獄符呪告文兩足寫玉清寳籙真符告下某獄以竹九竿隨方揷之九獄梵炁符十方天尊符破獄符呪並見齋法符篆門迴耀燈旛師曰凡建迴耀燈造小旛四十九首黄白之色互相交間上書諸尊睿號頂上朱書青玄破酆都真形符符見齋法符篆門三塗五苦旛符見齋法符篆門二十四獄旛天尊號元皇廣度天尊紫清度䰟天尊三界通化天尊無量慈䕃天尊濟度苦海天尊玄徳救苦天尊六通救苦天尊開道往生天尊光照九幽天尊救苦超生天尊護䰟無滯天尊慈悲廣度天尊玄化解脫天尊真光抜難天尊常普濟度天尊明真度幽天尊浩劫垂慈天尊大慈至廣天尊真常度命天尊廣化六道天尊苦劫輪轉天尊法橋大度天尊寳光九夜天尊大慈救苦天尊酆都燈旛師曰凡關酆都山燈以黄素造旛五首止書五炁天尊睿號五炁天尊號東方九炁洞空天尊南方三炁洞青天尊西方七炁洞虚天尊北方五炁洞微天尊中央一炁洞真天尊五路燈旛師曰凡關開通五路燈以黄素造旛五首並書開通道路天尊揷於五方三十二天燈旛師曰關三十二天燈以黄素作旛十首書十方飛天神王符按十方掛之神王符見降真召靈門血湖燈旛師曰㸃血湖燈以黄素造旛五首書天尊號五方睿號東方九炁淨穢天尊南方三炁化厭天尊西方七炁斬惡天尊北方五炁蕩形天尊中央一炁皓慈天尊茭龍金龍二吏旛二符見齋法符篆門神虎隂陽二壇旛召䰟旛巳上見神虎玄範門召六道孤䰟等旛符見齋法符篆門命魔旛師曰以紅素夾造長七尺許中書命魔符凡散花命魔令一人前持引導旋遶符見篆門齋法符水火二池旛煉度壇旛符見大煉符箓門度䰟陽輝旛師曰以黄素造長二尺四寸頂上書日月北斗之形旛身篆睿號一十八字兩手篆呪六句兩足篆呪四句旛身睿號篆式旛手陽輝度䰟呪明哉太陽輝神光洞三界炁散玄漠内靈煙生紫庭御炁乗風霞飄飄淩無形旛足返根呪篆式明梵飛玄景開度長夜䰟遊奕﨣期歸炁炁返故根朱陵度命旛師曰以白紙造旛朱書符頓朱陵府度橋旛師曰度橋時於神虎堂中燒吹橋上歩神虎罡祝神虎官將接引亡䰟上登朱陵又度橋旛師曰以淡青紙爲之朱書其符兩手分寫呪四句又度橋旛分二邊二旛篆式旛脚篆式乃返根呪巳見在陽輝旛内上清靈寳大法卷之三十三
