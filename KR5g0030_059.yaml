body:
  text: 洞微髙士開光救苦真人寧全真授上清三洞弟子靈寶領教嗣師王契真纂齋法宗旨門呪食師於呪食之所執水盂焚變食符於內存真氣入水次念三光呪取三光氣入水又念青玄寶號取青玄之氣入水又念隱語取五方正氣入水次又念青玄號八十一遍存太一慈尊居于東方雲氣吸氣歸身化為太一慈尊啓召溟涬大變神王下降變食次以枝水灑食如攝召不經下幕醫治則先當與亡靈開通咽喉胃管生津變化法食皆是雲廚甘靈異品珍肴果是交梨火棗丹奈蟠桃之類品味香美遍滿無邉餒腹皆充食之無盡傳戒宗旨曰兆先於上帝前三禮長跪默奏請降披黃受道誥救苦真符長生靈符官君護戒神王童子茭龍金龍驛吏天道功曹畢引靈至戒座之前兆升座祝香焚召十方飛天神王符念呪剔訣焚召十方天真大神符迎請證明監度依科説法為亡者懴滌罪愆傳授披黃受道誥發十方善願説因果證戒法請戒師三皈依焚授戒香符告簡傳符香符宣救苦長生符提綱給登真度命誥祝龍宣寶籙施食請降凡欲至晚施食此日先須錬形存神發真依法朝奏三天金闕存玉皇在紫庭之左青玄在紫庭之右此二宫乃左右目上出日入月之所真道所居也三宫腦上乃捷神之府也兆早朝默奏先請降玉皇慈悲吉祥甘露下降變錬斛食自請降之後舉心運意行住坐卧皆是大獻管要心機歸一不可妄想開通鬼路兆行持施食先依法請水遍灑斛筵次以金錢二貼焚於艮方呪曰上天度人至列言上清急急如靈寶度人律令左手搯鬼目右手劒訣面艮戶丁行三步向前以劒訣虛書攝召長夜府五字祝曰引領鬼魂使者地道鬼道功曹當界土地五道諸神疾速為吾監引牒內所薦亡魂及六道幽靈等衆赴壇受食鍊度吾奉上帝敕祝畢再以劒訣向艮方書一開字存此處黑暗方上香召魂召孤魂焚追衆魂符祝城隍太歲當處土地五道諸神祇神虎攝召靈司天神將吏引魂赴壇先想聚魂方黑霧罩暗升座宗旨曰兆瞑目對座前焚香運變為自然五帝之境雙手發三天五帝訣於崑崙上撒開左右運璇璣靈根舌一氣吹噴于外星斗光芒無數廣布浮虛略動左右目光運化二儀日月分照次存法座髙懸日月之下如世九層雲臺上垂寶蓋華幡旌幢羅列次以身頂一元之氣散布于上盤結空浮青玄上帝端坐其上左手執琉璃水鍾右手執空青寶枝次略動崑崙左右月戶運化真人分形分布左右玉女金童侍衛森列上帝口吐金光如圎鏡似月出雲之狀上下四方皆見金光瑩玉之精照徹無邊至於斛筵悉皆隨氣升化參于雲漢之表上接光氣方左旋升座舉身頃然登寶座之上兆身與至尊混合一身左右侍真並如所想瞑目一心再如前思運龍燭鳳燈星散十方上下萬神億乘齊臨班列雲界證明接引方按科行事宣天皇寶誥召六道焚天道符子文存天道仙衆自天門乘寶光馭飛雲羅列旌幢彩仗浮空而至于上焚神道符丑文存神道眷屬自地戶乘焚氣白華接引駕風馬雲車浮空而來至于左焚人道符寅文存人道眷屬自人門乘寶光洞煥引導欣顔攺志來至于右運化祕呪玉清大獻廣布酥酡髙際九霄香環十極咸令濟化普受法食此天道神道人道謂之三善道並班列朝禮上帝聞法受食焚地道符鬼道符畜道符地申鬼酉畜戌一心運念布出靈氣雙手玉清訣引氣如河路之狀鼻出二氣交合却運青玄圓象之光自上而下同布于三惡道之中燭破各道隂冥之氣其三道幽魂徐徐乘光氣來至壇下形影並無隂翳舉手朝禮跪立普攝三惡道赴筵朝上帝呪玉清萬化解宣惡對善道升仙業道開通玉皇降命急召時升受沾供養上朝帝廷中文東氣召亡魂焚召亡魂符存元始圎象之光洞燭十方照破幽隂俱成皎日孤魂等類俱乘寶光齊赴斛筵搯提魂訣分班變食先焚符念啓請呪手結五嶽印請五方無入水中三光氣日魂朱景照韜緑映回霞赤童玄炎飈象引左目邊日光九芒吹食上月魄靄霄芬𤔵翳寥苑虎靈蘭鬱華結翹淳金清瑩炅容臺摽引右目邊月光十芒吹食上魁𩲃𩵄䰢魓𩳐魒引黃芒之氣吹食上又念三尊號取三天氣吹食上焚變食諸符祝呪食滿十方通關充虛食之無盡飛升玉都急急如律令左右手玉清訣存身為元始引天門三氣降接兆身以氣吹符焚水盂中以楊枝灑水誦諸祕呪旋繞依法存變焚符誦呪呪獻兆運發丹宫真人上香叩齒面天門請降金光道氣百千萬重布前瞑目運日月之光交接金光下臨似雲靄蒸布法食異香豐盈氣滿十方無不沾既先以供養千真萬聖呪施之後然沾溉衆魂祝曰天仙沾供神明沾享人倫享味善道升遷祕呪溜溜崑崙泉泛泛王清氣青玄居左右幽香徹天地玉女灌真漿仙真降祥瑞食之億萬年體身悉如意拔度亡過愧永離大報地急急如元始上帝律令灌化焚溟涬大梵神王符祝呪玉字普告百飽通虛溟涬生晶永絶飢虛食之無盡味冠天廚上帝訣祖氣焚水盂中請降玉皇慈悲吉祥甘露下哺官君一百二十人沾灑行用兆滅燈一心端嚴左手掐辰文剔去次左右手威德印搯玉清訣左仰右覆雙手玉清八指相合升起存想變録運玉皇至尊浮虛宣降溟涬大梵神王身長萬丈狀若龍虎君四目五色雲氣擁盤手足尖皆出毫光化現靈官一百一十人乘黑雲自天門浮空而下各持枝水遍灑甘露法雨一如細雨密霧四合沾溉一灑一滴其斛廣大豐盈次運淨霐之府出一真光雙手玉訣左右瞬目升降上下心祝玉字大呪一念不動秉如清明之府並無一慮引五方之氣交接結為一圑瑩如寶鑑照徹無礙自圓鑑之中道生一一生二二生三三生九九化八十一次化無窮遍滿十方其斛自下升髙參于天表廣化益大有虛氣靈煙周旋丹界洞煥靈壇所施斛食隨心隨化無遮無礙異香周回十極法味充塞世界斛食虛懸其中致於斛筵內外郊野山川溪谷遍世滿然悉是斛食次發十天訣引玉女童君數若沙塵哺咍接引衆魂受食五廚經夫五厨經之旨則令五臟充滿五神正五臟充則滋味足五神靜則嗜欲除則此經是五臟之所治如求衣食於廚故曰五廚耳長生祕章卯文青氣一氣和太和得一道皆太和乃無一和玄理同玄際不飢祕章離文赤氣不以意思意亦不求無思意而不復意是法如是持不熱祕章中文黃氣諸食氣結氣非諸久定結氣歸諸本氣隨取當隨世不寒祕章酉文白氣修理志離志積修不符離志而不修志已業無已知不渴祕章坎文黑氣莫將心緣心還莫住絶緣心在莫存心真則守真淵三天無量食充滿法界中濟汝飢渴者清淨無色身三麼三麼麼呢麼呢帝敕帝敕麼呪三天敕麼三天敕麼三天咈唵敕吽搯中文念青玄寶號九九八十一遍取氣入身化身為太一慈尊坐于玄局之上旌幢華幡懸覆左手水鐘右手執寶杖遍灑甘露仍存太一乘青雲在空玄之中同灑甘澍四合飛虛法雨慈雲沾沛無極悉皆滿溢次誦中篇存四方三十二天並降光氣灌注斛食遍滿無極世界三惡道衆及亡魂孤魂等俱享飽飫沾足圎成再𡨋心運化溟涬符以玉皇慈悲吉祥甘露沾溉六道幽魂等形貌並洗顔攺相歡欣稽首擎拳瞻望慈顔返生朝禮次以左右手接引訣運光氣引衆魂分列十方咸有光明相皈依三寶跪受符戒尚慮幽靈生前𡨚對殁後𡨚尤未能解釋當以符誥開諭和𡨚釋對俾歸善道焚解𡨚結諸符解十傷符命關三十二天燈告歷關諸天誥關三十二天燈請太上三尊三十二天帝君三界髙真十方衆聖無極飛天神王三界大魔王五帝魔王神仙玉女等衆真監度燈壇作三層上層為無色界四天立無色界魔王位十方飛天神王幡中層一十八天立色界魔王位下層欲界六天立欲界魔王位靈寶大錬齋法莫難於錬度乃超凡入聖脫胎換質之道苦魂沈九夜乘晨希陽翹得其理則水火交濟隂尸穢質一時生神不得其法則依科讀誦徒負幽𡨋此髙功第一事也師登錬度壇存用灑淨霞光五彩鬱繞上下先立水池亥文北氣至申上發訣飛北斗罡念靈書攪水念十二河源三十二遍取北方氣天河水入池焚真水符主水將軍符水錬符存官君環繞次立火池午文南氣飛南斗罡念靈書布火又念擲火萬里三十二遍取南方火氣入池焚真火符主火將軍符火錬符存官君環繞化景如丹天世界存定師化身充天塞地泥丸存三天境額上九天三十二天境各有臺殿左眼日宫右眼月宫七竅皆星斗頸後為𣡡羅蕭臺口為天河項為十二重樓心為朱陵火府脊骨為天階左腎水池出玉水右腎為火池出玉火尾閭為隂關一身變化與天地同身囿于天地之內天地囿于一身之中不知自巳形相只心中丹元君承元氣上升泥丸化為元始天尊端坐洞房施化上道左右官君王童玉女侍衛各處皆有官君元始放大光明下燭隂關豁開無限鬼魂盡入包荒之內師運天河之水灌下東井注下左腎水池之中右目月光直注水池水光明皎次運丹天之火注下右腎火沼之內左目日光直注火沼火光炎炎水火交光瑩潔明白指揮主水大將軍水池官吏引魂入水池所謂水者乃真一之精隂靈入水滌蕩塵垢童顔玉光次焚水錬諸符再命主火大將軍火沼官吏引魂入火沼冶錬所謂火者乃真陽之氣隂魂一入火沼魂如火棗融化隂尸反胎易質次焚火錬諸符誦隱語取四方氣生成又焚五帝全形符使五臟六腑一時生神再存童女各持生天淨衣授與亡魂想其魂各著衣服容貌光彩官吏引魂自脊骨天階而上登朱陵火府師焚度橋符存諸魂度橋而去再為陽光所錬骨相不凡火沼中有無限火龍各乘載嬰兒上升鬱羅蕭臺隨品受生師咽液納所出水火真氣各還本宫畢下座焚化九天錬度師定息凝神取生氣一口直入胞元命門運九天之氣灌溉融聚化嬰兒與已形相似內外握固餘光遍覆天地再運五臟五色之氣如雲自下而升戴嬰兒自天階而上至泥丸化為元始天尊五臟真氣結成師子元始放慧光圎如寶珠元始懸坐五色獅子之上百寶光芒洞煥諸天諸地明徹內外左日右月玉童玉女侍衛元始召錬度官君行錬庭事無限鬼魂悉屯于隂關之內次存水火二池內外相映錬度官君分列左右次第引魂入錬魂入火沼真陽融化魂如火棗次引魂入水池蕩滌凡麈身有光明此乃玉眸錬質黃華蕩形水火錬畢行九章錬元始誦章一過運脾一黃之氣灌胞命元以生胞使胞元宣通誦章二過運心中二赤之氣灌胎命元以生胎使胎結解根誦章三過運小腸中三淡紅氣灌魂命元以生魂使魂門錬仙誦章四過運肺四白之氣灌魄命元以生魄使魄戶閉關誦章五過運肝五碧之氣灌臟府命元以生臟使臟腑清涼誦章六過運膀胱六蒼之氣灌靈府命元以生靈府使胃管生津誦章七過運腎七黑之氣灌元府命元以生元府使孔竅開聰誦章八過運大腸八緑之氣灌華府命元以生華府使三部八景整具形神誦章九過運胃九紫之氣灌嶽府命元以生嶽府使三關五臟六府九宫金樓玉室十二重門紫戶玉門三萬六千骨節根原本始一時生神錬畢應諸罪魂凡塵盡蕩本性昭然解結除𡨚超凡入聖官童各與生天淨衣飄香楚楚師存水火二池結為流火之庭在心府官君次第引魂上登流火之庭運化無限火龍此乃龍負長庚瓶各載嬰兒上升鬱羅蕭臺乘光髙舉隨品受化事畢歸真元宫定息咽液下座書符存用更不贅述明錬度生尸生神之本源夫行錬度之法須明採納吞服三光正氣日精月華吐故納新自身集召陽神錬除隂翳方可明錬度亡魂之法且人壽至三萬六千日神盡歸太隂則曰鬼鬼曰歸也而生前罪咎損氣拋神自取死懷故有不滿天年而亡襁褓者神氣不全而形不固死者至隂之魄渺渺冥冥何緣得生陽世故假真水真火日精月華聚九陽之氣混合亡者五神返本生尸古法以九師各立一天錬一氣行九錬變錬生神聚靈於太一之庭錬質於朱陵之境往往行持之士不識修煉祕文止假朱砂好篆符形徒用水火不識朱陵之氣取用之方東井黃華之位全無存想默運五府混合成真一夜錬在甚處成人明真水夫真水者是隂中之一氣是為天一生水乃號皇極何耶蓋太極以一象中其一則為元氣一氣既萌形質巳具太素又變而成以滌隂垢以為黃華乃太隂之真精此為真水流入天河却運天河之水入東井須降黃華入於東井是為水泛於木以水流通水上火下之功此乃殺水其色黑濁何能溉育嬰兒長養百神混兮闢兮其無窮耶清陽之氣升浮則為天焉元隂之氣降下則為地焉天地本於隂陽而天地動靜之理是為運黃華於東井之上聚天一之靈生地二之火故為水上火下流入三宫也取真水法訣曰凡取東井黃華神水以月內井宿之日用月將加臨宿直之上逆數看井宿在何方便於本方上取之以亥為正月月將戌為二月月將逆轉看當井宿直日假如正月井宿在卯以月將亥加卯上順數至未上得卯字乃井宿之方是天河灌東井取此中水用之法曰取水候天拂明曰方離榑桑時於東井中人未汲者先以青紙用雌黃書請水符化於井中搯乾文西北氣入執燭垂光照耀下入水中次汲水入淨器內盛之兩手乾文右瞬目三次運兩腎氣自夾脊升上至頂取西北氣自兩鼻入頂交媾運出水內想水上火下此是真水也明真火夫明真火者是陽中之火也其火能辟除隂滓冶錬成嬰然後運自已之氣化合次求外真而運內真混合為一是為陽中之陽天之一元真氣納入丹田運內氣而錬成一團是為紫金假如南方火殺火北方水黑濁之水二物焉能生化且南氣紅北氣黑皆殺氣何以育養今之行錬度之士以訛傳訛殊無治善之心考究今南氣以東南氣北氣以西北氣東南乃朱陵宫此火能育物可以生化也西北乃天門故天一生此水能育物乃天帝之治所號曰雨露雨露既沾則枯骨重榮天氣澄清則日氣可取隂晦中夜方錬度燒符取氣取真火法訣曰凡欲取陽精真火先以楊柴炭用苦竹當日午面日截竹取火下用印香引之俟火著却以緋紙朱書請火符搯巳文取東南氣入以符引火燒炭用之法曰兆回視左肩想心中赤龍自左耳出右眼流火光肩背龍乘火飛上入火中此是真火耶用水火法至晚行錬度立壇火池用圎爐盛真火水池用方器盛真水立水池火沼二牌火池用緋幡水池用黃幡五方用五色幡書五帝符于上水火錬度壇法兆先於上帝前跪奏點三十二天燈南斗口安火沼北斗口安水池後列南極大帝九天生神上帝中列三十二天燈左日右月十方飛天神王天道功曹十方天真大神黃籙院官童直日受事官屬天醫六職十方飛天使者金龍茭龍驛吏方起靈升座祝香召十方飛天神王十方天真大神請三十二天帝君官童下臨壇所此是衆真監度十方臨軒也次引魂受錬按科行事明五劫開化凡遷拔亡魂第一次建齋立功贖罪名曰拔度第二次曰升度第三次曰超度第四次曰增崇品格第五次曰濟度夫拔度者亡人乍入隂府罪纍纒縛拔出地戶隨品受生行三光錬夫升度者慮亡魂生存之日功少業重人道有三十六品類恐生於貧窮下賤是故作諸功德用資升度行南昌錬夫超度者恐亡人生於中品孝心哀切建立普度廣濟六道四生集兹殊勳超升髙品行生尸九錬夫增崇品格者或亡人受生人中不皈正化是故增崇品格行靈寶錬夫濟度者恐亡人三生七世𡨚家債主負命欠財雖承太上符命受生恐𡨚家執對未遂逍遙故名濟度行廣度沈淪飛升冶錬是為五劫開化也三光錬夫三光者天之正氣日月星也乃是天三竒日月星地三竒乙丙丁人三竒精氣神三合成九陽數也謝恩醮廣成曰醮者祭之别名也牲牷血食謂之祭蔬果精修謂之醮皆可延真降靈河圖經品三洞之中凡有四十二等與齋法相類并諸雜醮法凡五十六門皆前哲後賢隨機所感普會降真祈福濟物利人輔佐王化孕育群品咸以太上為主次以北斗為宗苟能禮物精豐心誠丹罄何善不降何惡不除但延請乖儀俯仰失度不能感降耳由此言之則三洞既有二十七品之齋復有四十二等之醮近世庸妄之流乃謂靈寶立齋而正一有醮却於齋後散壇攺正一銜易正一服而後設醮何其謬矣夫醮則三洞皆有之况散壇之醮乃齋事告終酬謝真靈豈宜改銜易服别作一式行之其為鹵莽好竒敗亂科典可勝言哉此實古今之正理天下之通論也安可以私意亂之耶是致近來散壇送師了畢却再請上真重行設醮謂之專醮如此則可為齋後醮之義則大失本意矣若從古法大概相逺如古者未有排列道場之儀止於壇上行事若設醮則於壇外用青巾絳座時果醮饌不用請醮狀只於拜表投龍之後便請聖設醮今世雖立壇行事而復設像立位鋪置道場是以設醮竟就道場若遵古式則於壇上行事拜表之後便當設醮却於壇上行科道場內三獻行禮亦可却送師徹席事簡而理通不違古來之典格不然或於拜表投龍之後復爐出戶退靖少息然後再入户升壇行科請聖設醮還戒納職送師徹席三塗五苦頌旋壇出戶散諸壇陛司治次却解壇散席亦可如醮儀輦馬之類聊以寓誠却專狀獻之可也古者拜章之外文移尚少自上帝以至列真隨宜修設故醮位不多後世文狀關牒干涉既衆凡文檄所至之曹並當醮謝天子則用三千六百分位公侯則二千四百分位一千二百分位已下庶人則三百六十分位二百四十分位一百二十分位隨事大小輕重設之蓋下此則不能盡故也有如世人將上真總位數而作一分極為礙理以致九天上帝作一位三十二天作一位似此之類大為褻瀆今上真並合專設諸法中將吏貟數難計未免以類相從稍加總括更能於將吏前廣鋪酒果普行醮謝則不必計尤善也切在詳度行之近又有三塗五苦頌旋壇門榜大非儀也然立纂舒壇法天象地立門列榜以示儀式齋終醮畢并壇徹去何獨急於下榜哉混亂威儀交雜進止實為非便况三塗五苦之辭無非陳罪福以崇經教而已又非下門榜之義幸深詳之投龍進簡科曰夫大道以一氣化生三才陶鈞萬有故分三元之曹以主張罪福即天地水三官實司於三元也人之生死壽天罪福吉凶莫不係焉三籙文亦三元典格也按下元黃籙簡文靈仙品曰拔度罪根威儀修齋事畢當依赤書玉訣投三簡以告三元山簡者丹書玉札副以金龍一條金紐九枚以青絲纒之封投於靈山諸天洞府絶崖之中以關靈山五嶽為升度之信奏天官上元也土簡者丹書玉札亦以金龍金紐青絲纒之埋於壇宅廣成曰投於壇天井之上或埋於月辰方位上為升度之信以告盟地官中元也水簡者丹書玉札副以金龍金紐青絲纒之投於三江靈泉潭洞水府為升度之信告盟水官下元也三簡之法各用金紐九枚共用二十七鈕每簡仍附以金龍一條玉璧一封之外以青絲纒之而後投也今按盟真科格逐一開陳所以告盟天地水三官使監證齋功缺者考屬地官九都曹簡者告也札者紀也紀世之善告於上真法長一尺二寸闊二寸四分法二十四氣厚二分法二儀也上下方正法日之方景正真通逹無所避讓國家以玉為之夫玉有九德可以為禮天地神明之信故用玉焉公侯士庶只用槿木為之法則一同以槿木潔白纎致可以比玉矣所以明尊卑之殊也龍者乘雲氣御隂陽合則成體散則成章變化不測入地升天故三天極陽之境可以驛信傳命通逹玄虛者其龍乎龍乃陽畜故天用龍是以天上以龍為驛傳騎往來人間法以上金鑄成各重一兩國家用上金公侯大臣用次金士庶以銀鍍金也上金者五金之最剛不渝天地所寶通靈合神故也取法龍形投之洞府告盟三元也洞府冥官所司僚屬告龍信簡文録其善功以奏言於上聖感應之報猶影之隨形修尚之士不可闕之璧者禮天地山川之寶也山簡用蒼璧為九天之信以法天也以蒼玉圓形徑二寸虛其中土簡用黃璧為九地之信以法土之色也方其形徑三寸虛其中方者乃法地之形也水簡者用玄璧為之為水官之信水之色也法以黑色玉六出之形徑三寸虛其中鈕者以代歃血也國家用金臣庶以銀鍍金鈕徑九分其外如鐶之形也青絲者以代割髮通盟逹誠最為重也投三簡之法按廣成科云齋主出簡言功之後宣讀巳訖明早便可埋於壇中不伺别行關告今以張承先齋儀中三簡啓奏真位不同巳載投簡科中明敘之矣今修齋壇只於言功解壇時便告土簡即時埋瘞之其山簡水簡雖巳宣告當卜日或齋辰備醮饌儀物法師率衆官或泛舟以詣水洞或梯陸以登名山於洞府之外剃草灑掃潔淨敷陳醮席酒果湯茶當鹿脯等國家用六十分臣庶二十四分一如醮儀乃盛服澡漱朝謁法事依科設醮次第投之庶為周備則所在地司靈官監齋將吏當為關啓洞府仙曹通逹告齋之簡如此則福善立應不可以壇中告了都無關啓直爾投於洞中則所在真靈恐不關領善功不逹獲罪深矣所失尤多若山水之洞稍逺師衆不可俱行者當選法職者二人與齋主齎簡徑詣洞所設醮關告投奠亦可不得藏匿簡文因循遲久則所在地司録奏獲罪不輕切宜慎之所有投簡關啓科書悉從廣成本科但其書流布日久傳寫之間多行減節只存啓祝之辭今巳詳訂具見别册上為國王官僚下及人民九祖父毋長夜三塗修建大齋並當告盟九天投簡三元福利廣大不可勝言諦聽奉行勿生懈怠魔壞爾身也若國家投龍具有金籙科式與此常禮繁簡不同詳度行之又曰若有至士欲度諸天人民善信男女咸使得離三塗五苦八難之中得過三惡世世與道相值當取八節甲子之日投三元玉簡除宿置之簿言名上天事過諸天三官九府更相關告上天友别萬神敬護五帝侍衛三界司迎門户清肅天神地祇日月來朝千魔萬精不敢妄干至願堅固觸向咸令七祖父母即得解脫三塗五苦上升天堂生死罪福影響相酬三官九署書人功過其理甚明世世因緣毫分無遺也又曰張承先云凡學士受佩中盟求仙削罪依自然經科投金鈕十枚放龍清泉為求仙之道再登壇受五老赤書二籙策杖思微定志劵等依盟真科文投三龍二十七鈕於山水宅三處為求仙之信然後依玉訣别以九龍二十七鎮以八節日投山水宅三所求除罪簿言名上天也拜通天救苦表袖內袖九龍符九道次步罡存伏如拜章法同至欲界魔王之境次見色界之境次見無色界之境入青道不入黃道次見四天之境次見三天金闕之門自此將升天契劵付天門守衛之神法師下車留侍從之神在門外惟有青衣童子二人捧表入金闕之東次見一朱衣靈官一青衣童子接表引詣太一元生府及東極宫見救苦真人便殿將表中情意陳白次真人引見青玄上帝坐殿上有九頭獅子左右二真人兆殿下九拜躬身口奏進表畢出太一元生府入金闕見太上在御座上朝禮如儀兆口奏跪進想侍仙玉郎接表進呈上判允字布祥光於符命上兆復進符命亦有祥光侍仙玉郎傳表頒行符命兆受禮謝出闕復入太一元生府見青玄上帝兆再拜口奏進呈符命亦市祥光宣救苦真人青玄靈童九龍使者至殿下頒符命付使者禮辭同真人靈童使者出太一元生府至三天門復取契劵同向來侍從諸神歷三界度罡風回壇興身稱以聞不離本位宣九龍符命九道畢法師望東想東極慈尊坐九頭獅子在百寶光中祥雲之上左右真人侍從灑枝水於十方吐祥光於幢上兆九拜以左手拽起禮謝十方納官復爐次預告挂門迎天榜回靖此是通天救苦預告十方停囚罷對如陽間停決之義也拜素車白馬章袖普告三界誥變神飛步存伏同拜章法至三天門下見天師對讀引詣金闕朝見並在存想法想見覽章判從字侍仙玉郎傳接付右階曹官青腰玉女頒降天曹宣素車白馬大將軍一人官吏一百二十人至殿下兆進呈普告三界誥想侍仙玉郎接進呈上覽布祥光於誥上侍仙玉郎接下付兆兆禮謝辭退同向來所宣素車白馬大將軍從官同出如儀至壇興身稱以聞不離位宣誥回壇納官復爐拜酆都開業道章袖酆都拔贖誥元始符命誥敕赦步罡存伏如前至金闕兆想朝禮上允判依字兆進誥命赦文想侍仙玉郎上呈上稱善布祥光於上侍仙玉郎遞下兆受禮辭出闕復詣泰玄都省見四相各於銜下書名兆受之出三天門下復如舊路興身稱以聞不離位宣赦元始符命誥酆都誥祝龍禮謝十方回壇納官復爐拜開通道路章袖玉皇寶誥敕制地祇誥步罡存伏如前至殿下朝禮想上覽判允字頒付官曹宣太一使者五帝真符驛吏各持太一符命紫陽寶節五方生氣靈符兆跪奏玉皇誥地祇誥想侍仙玉郎上進上布祥光頒下兆受畢禮辭同太一使者等回出三天門下興身稱以聞不離位宣誥禮謝十方回壇納官復爐拜沐浴錬度章袖金液錬形誥雷文誥生天寶籙步罡存伏如式至殿下朝禮如儀想上覽判允字侍仙玉郎遞付直日宫曹宣浣濯夫人五方解穢童子丹天左右衛大將軍持東井黃華水一器五方童子各齎五靈之氣至壇下朝兆跪進誥籙侍仙玉郎進呈上覽布祥光於上頒付與兆兆受辭謝出闕詣泰玄都省謁四相如儀呈寶籙想四相各於銜下書名辭省出同所宣官將等出三天門下回程如儀至壇興身稱以聞回壇納官復爐誥籙留上帝前候鍊度時奏請宣告上清靈寶大法卷之五十九
