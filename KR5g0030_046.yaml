front:
  text: 上清靈寶大法卷之四十六圖四
  hash: sha256:3e00518ecbeefd5d4b333a3e37c71f4b6cf3453964cabfcad5fefce7982400f0
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5g0030_HFL_046-001a, image: hfl/0956/0956-004.png}
body:
  text: 洞微髙士開光救苦真人寧全真授上清三洞弟子靈寶領教嗣師王契真纂齊法符篆門玉清寶籙破地獄真符師曰玉清寶籙乃元始之威章出九光紫陽之冊實靈寶普度靈文作隂曹之合契為冥官之合同也法用梓柏木作簡長七寸三分半闊三寸六分厚三分面書符背書告文作四行年辰法位二行共六行外用青紙作封套以朱題之依法告行又法以黃紙髙九寸或一尺長二尺四寸或一尺八寸用朱書符黑寫告文外以黃紙作可漏黑書更以青紙作函朱書其面於破九獄時請降宣告焚之存用如式法曰先焚香面天門跪奏有式次以左手二指掐大指根大指掐四指三節念呪曰至聖神人已成天真三皇之裔太上之孫億曽萬祖苦爽幽魂天尊大法十轉回靈赤書成章告下泉冥玉文一下摧毀鐵城符光洞煥赫奕重隂刀化寶𣗳劔變騫林炎火生蓮冰消雪扄三塗五苦八難超陵魔王隂官稽首送迎玉清元命一如奉行急急如元始上帝敕右呪一遍取天門氣入筆書依散形篆畢再用此呪祝之取天門正氣一口吹之又祝一遍取南氣一口入符中存萬丈金光照耀奪日凡臨壇頒告亦依前請降存用祝遣焚於烈熖之中散形九泉寒夜期劫輪塗幽隂寒壑忽覩光暉照破九壘何敢不從禀遵帝命金剛折摧風雷消散火翳化池溟泠溫和普掠無施火車息熖鑊湯罷炊銅柱摧毀屠割停椎元始有敕符到速追魂離酆岱𩲸出鐵圍有罪無罪急赦無遺三界侍衛萬神咸聽玉清寶符開破九幽北酆憲壘敕攝火令祝呪三天寶誥敕汝諸鬼關鎖速開鐵城摧毀拔度幽魂出離關軌急急如上帝敕元始上帝無量度人靈符告下破獄開關一切幽魂覩見光明削除罪簿咸得上升化成蓮花永無苦聲超陵魂識飛升紫庭上開八門與道合并三界萬靈皆受玄恩三五使者直符功曹聞吾呪召速至當今齎持符命開破幽隂急急如上帝敕祝遣破獄呪風雷火翳銅柱溟泠普掠屠割火車不停鑊湯煎煮焦爛身形萬死萬生受罪不輕飛天大聖妙行真人誦念靈章拔離幽冥九幽地獄除苦停辛執天符命列名玉清唵三摩尼滅罪律令唵三摩尼急急如太上玄科律令右氣訣同前告文玉清寶籙照耀重泉地獄摧毀鐵城開宣元始符命時刻升遷北都寒池部衛亡過某等形魂制魔保舉度品南宫死魂受煉仙化成人生身受度劫劫長存隨劫輪轉與天齊年永度三塗五苦八難超陵三界逍遙上清一如告命破獄告文玉清寶籙破地獄真符告下北隂酆都內外宫洞三十六獄阿鼻地獄九幽地獄十二河源泉曲水獄大小鐵圍十方獄庭長夜隂關冥司萬神咸聽符命真文煥發照耀隂冥塗炭罷對考掠俱停炎火息熖冰消雪扄刀化玉𣗳劒變騫林疾除罪簿落滅惡根不得拘留亡過某等魂及一切囚苦罪魂乘此真符救苦功德速令出離覩見光明上升南宫受化更生一如告命太歲年月日時告下具法位臣姓某承誥奉行太一救苦天尊青玄上帝內封式玉清寶籙照破地獄救度苦魂具位臣姓某奉行謹封外函式玉清寶籙破地獄真符告下九幽酆都天牢地獄主者具位臣姓某謹重封玉清寶籙拔幽魂真符師曰此文乃虛無之妙氣智慧之祥文玉清真文髙玄寶字靈光燭幽塗靈符破苦獄也凡告行亦用梓木簡如破獄符制度依式為之亦用破獄符存用次祝呪曰三天大羅髙上玉清元始靈書太上真文玄元大道敕降玉晨天洞天真主領魂神九幽主者六洞真靈禀受真符拔度幽魂天王律令隂曹速行右西北氣入筆書了再取東方生氣入取南旺氣入存萬丈金光照耀奪日散形元始符命總氣上玄普告三界歷關諸天風澤洞虛萬氣齊仙元洞玉曆死魂返生九泉幽爽斬絶地根回骸起死時刻升遷三官九府落滅惡根拔出地戶七祖升遷急急如靈寶無量度人律令檄文拔出羅酆九幽泉曲之府敕赦火令祝呪三天大羅髙上玉清元始靈書太上真文玄元大道敕降玉晨天洞天真主領魂神九幽主者六洞真靈禀受真符拔度幽魂天王律令隂曹速行急急如律令元始上帝告下幽隂地獄冥司無極神鄉泉曲之府北都羅酆拔度魂識出離幽關速除罪簿不得拘留聞吾呪祝冥吏咸聽赦原死魂上升朱陵急急如元始上帝敕右氣訣存用如前遣呪幽魂多悲苦當思神霄君玉清真金符煥赫破幽扄解脫出幽閉拔度苦沉淪上升忉利天煉仙登真庭急急如上帝敕神霄符命敕下九幽諸大卒吏符到奉行一切罪魂赦之生天天獄靈官司命救生真氣到處破獄生天急急如律令告文玉清寶籙拔幽魂真符告下十方三界無極神鄉泉曲之府北都羅酆三官九署十二河源上解亡過某等并及祖考億劫種親普及十方九幽一切罪魂疾除罪簿落滅惡根不得拘留時刻升遷萬神護送徑詣人天隨品受化更生福鄉一如告命太歲年月日時告下法位臣姓某承誥奉行太乙救苦天尊青玄上帝內封式玉清寶籙拔度九州分野一切幽魂具位臣姓某奉行謹封外函式玉清寶籙拔幽魂真符告下三界十方冥曹主者具位臣姓某謹重封行持赦符師曰夫取救亡魂之法當依法立茭龍金龍二吏次以青紙三幅以朱前書東華青宫九龍救苦真籙次書天篆告文次書青玄破酆都真形符次書拔幽魂符破地獄符并檄文後寫年辰法位祖師外用封函付茭龍驛吏宣行又以黃紙三幅前朱書南昌紫微流金練真之籙亦書天篆告文次書青玄真形次書金液煉形符九天雷文誥韓君真籙超生金籙并檄文後寫年辰法位祖師如式外用封函用金龍驛吏宣行取救亡魂前來伺候召攝受化更生法曰臨焚時當存身為太一搯中指上節丁罡面東叩齒九通呪曰青玄天尊敕符救苦度脫幽冥赦愆鬼戶隨願生天並無障阻靈寶律令開闢地府不許稽留逆命罪汝次彈訣取東方九氣吹之唵卯吽寅吟丑㗶中中吒中上哩四上噠戍吽亥元始符命師曰元始天尊在七寶騫林放大光明照見天上地下有諸罪魂不覩光明沉滯迷津漂流苦海無由脫離故天尊哀憫降臨符命救拔罪魂得升道境永脫苦囚受法之士當澡心滌慮精思至道依法告行則幽冥有所濟度矣五星炳煥始清碧霞死魂受煉太上元經魂魄返形攝召萬氣招真命靈黃氣居中仙化成人與天度品齊年南宫祝呪虛明紫蘭太素髙虛太真玄晨三氣淳于玉清八觀朗映九衢妙覺變化始青肇圖應感輪回消魔瓊都芝晶煉質逍遙帝輿三清曲赦照破幽塗五嶽九幽無間酆都波羅摩褥下救三塗五苦八難勞厄俱除冥官禀命元始真符急急如令違者咸誅急急如靈寶大法取救亡魂檄律令右法玉清訣東氣黃紙朱書告文上清靈寶元始符命告下三官天牢地檻主職神司超度沉魂上升清微之天百神㑹合變化成仙稟受玉符驂侍龍轅一如告命太歲年月日時告下法位臣姓某承誥奉行外封式元始符命告下十方無極世界具位臣姓某謹封右符以梓柏木為簡高九寸闊二寸四分厚二分面書符背書告文如救苦符式外以青繒作套以朱題之依法告行後三符並同此式但元始符命與歷關諸天誥關天道功曹齎持普告三界關神道功曹若敕制地祇關地道功曹也告三界誥此散形與登真度命符亦同赤文命靈三天上帝出離度命幽冥濟魂咸苦生死度脫迷津斬根死戶東井煉形三台丙耀六氣齊並九幽隂翳盡覩光明普告三界風火無停超登天堂得證仙道告文太上玉敕普告三界十方主者無極神鄉泉曲之府北都羅酆三官九署十二河源上解亡過某等並及祖考億劫種親無量罪根疾除罪簿落滅惡根不得拘留時刻升遷一如告命太歲年月日時告下法位臣娃某承誥奉行外封式普告三界告下三界無極神鄉主宰具位臣姓某謹封敕制地祇誥靈寶祖氣魂離赤字肇分諸天魄度玄言無量度人大量玄玄告文太上符命敕制地祇告下酆都嶽瀆冥關主者一切神司侍衛送迎拔度亡過某等魂出離地戶五苦八難七祖升遷永離鬼官魂度朱陵受煉更生一如告命太歲年月日時告下法位外封式敕制地祇告下地祇主者具位臣姓某謹封關諸天誥元玄帝尊諸天總靈三天正氣九氣分身真氣混合歷關羣真上通天關諸天齊臨告文太上玉敕歷關諸天告行三十二天三十二帝天真三界魔王天門主者神司今日欣慶受度亡過某等魂開通幽暗咸覩慧光請滅三惡斬絶地根飛度五戶名列太玄魔王監舉無拘天門一如告命太歲年月日時告下法位外封式歷關諸天玉敕告下諸天真宰具位臣姓某謹封右四符並同前式九幽玉簡真符日慧之光月慧之光星慧之光幽冥夜壑咸覩輝光鐵城摧毁獄卒停刑陽晶赫赫隂隂陽合㑹三清翳煥明空洞混元玉敕曲赦苦囚速生重光急急如靈寶大法超度亡魂律令告文太上玉簡九幽符命告下酆都九壘五嶽重隂掾吏考官冥司典吏牛頭獄卒牢檻大神拔度亡過某等永辭長夜出離九幽得覩光明心神明了證品仙階𡨚仇和釋上生大有之天一如告命太歲年月日時告下法位外封式九幽玉簡靈符告下酆都九壘五嶽九幽冥司主者具位臣姓某謹封九幽白簡靈符靈寶大法洞玄九氣梵陽之氣赤陽之天始清離合太陽元碧落自然純化始真身立降敕命九壘遵承察命度籍靈符度魂九真妙氣歸命天尊時刻升遷不得停留告文靈寶符命九幽白簡告下羅酆北府嶽瀆九幽長夜冥曹土皇九壘十王案掾獄吏考官六洞隂魔九宫主者溟泠大神拔度亡過某等魂消平𡨚對洗滌深愆得離三塗永辭五苦身超丹闕得覩陽光悟道聞經逍遙真境乘此白簡拔度功億上生天堂一如告命太歲年月日時告下法位外封式九幽白簡靈符告下酆都九壘嶽瀆九幽冥曹主者具位臣姓某謹封天官玉簡真符玉虛九天九日導乾九霄祖氣大梵開張明氣四騫彌羅大千洞妙自真執符把籙總監上天普受開度死魂生身告文靈寶符命天官玉簡告下上元天府曹局主罪仙官天牢地獄考吏執法神祇拔度亡過某等魂出離天獄赦除大罪得升梵氣之天不墮重泉之地主者敬聽一如告命太歲年月日時告下法位外封式天官玉簡真符告下上元九府三十六曹考官具位臣姓某謹封地官玉簡真符風澤洞虛幽廓大憲金剛乘天溟漠通幽太上敕行解滌𡨚仇斬絶地根洞開隂塞神功大範解除熱惱告文靈寶符命地官玉簡告下中元清靈三府洞陽左宗天宫酆都右隂天宫九幽泉曲嶽瀆冥司主生死罪録靈官四十二曹考司典吏案掾尊神拔度亡過某等魂拔出地戶永免幽囚乘沐陽光徑生妙樂乘此靈寶符命拔度功德上生天堂一如告命太歲年月日時告下法位外封式地官玉簡真符告下中元三府四十二曹考官具位臣姓某謹封水官玉簡真符陽華太和妙氣十二真一霐淨玄明河源明燭幽都紫雲覆蔽接舉身超魂飛天內告文靈寶符命水官玉簡告下下元暘谷三府清泠右南水宫酆都劫量泉曲河伯水獄冥司主生死罪録靈官四十二曹考司典吏案掾等神拔度亡過某等永辭北都寒池泉曲苦海溟波沐覩陽光徑生陽界乘此靈寶符命功德上生玄天一如告命太歲年月日時告下法位外封式水官玉簡真符告下下元九府四十二曹考官具位臣姓某謹封上元玉清三天赦罪玉簡真符師曰玉清三天君白簡乃三天之玉籙髙上之神章若告行當以柏木作簡髙七寸三分半闊四寸半厚三分以粉屑粧以木書符於面上背書告文并年辰作六行外以青紙作封此符專薦帝王后妃公侯者如亡者巳三經拔度方可用之法曰凡書符面天門跪告默奏三天存三素氣降默祝三天隱諱曰霐𡙎衆一氣七遍取氣入筆書之畢再祝九遍取素氣三口吹之彈玉清訣三氣勃煙明氣四騫億曽萬祖幽魂苦爽運應滅度身經太隂計日煉度便得神仙罪福禁戒宿命因緣普受開度身得受生魂神暫滅即得返生告文玉清玉文告聞髙上之天左右獄卒案掾尊神天獄主者主罪神靈拔度亡過某等永辭長夜消滅大罪塞遏邪源形神升度謁帝天關福智自生驂侍龍轅真道長存一如告命外封式玉清三天赦罪玉簡真符告下三界十方主罪考主獄萬神具位臣姓某謹封右符用一道專度帝王外封云升度九州分野古代帝王神魂九州用九道外封云告下九州分野主者並用黃紙朱書外用十道告十方外封云告下東方天地水界掌獄執曹主者東青地朱書南赤地黃書西白地黑書北黑地青書中黃地白書東北青地紫書東南碧地緑書西南緑地蒼書西北紫地碧書餘並黃地朱書若度帝王以白玉屑或粉書之亦可上度功德未滿之人下度帝后宗支之人也中元金書九天紫府內音寶誥師曰此符乃九天之正氣生化之真文上帝靈命超度苦魂若普度只依此式書之若專行薦悼須用亡者生死年命書於姓名之下入簡中𣸸書之若告行以柏木為簡髙九寸九分闊三寸九分厚三分以白粉為地用朱書篆之一行篆八字若作四行計三十二字背面亦書告文外以青紙作封以朱題之此乃大臣官僚可以告行又法以黃素丹篆黑寫告文外以綾錦表背如世之誥敕於錬度時給與亡者收執宣告如式凡書符時焚香面西北默奏九霄上帝存九帝皆衮冕絳綃飛羽華裳具白情意次祝九天氣一遍帝真胞命元元一黃演之氣帝真胎命元洞冥紫戶之氣帝真魂命元長靈明仙之氣帝真魄命元碭尸冥演由之氣帝真臟腑命元五仙中靈之氣帝真靈府命元髙真沖融之氣帝真元府命元髙仙洞笈之氣帝真華府命元真靈化凝之氣帝真嶽府命元自然玄照之氣祝畢取九霄九色之氣入筆書之畢再祝一遍玉訣依前取九氣入簡中告文上帝符命宣告三官天牢地獄主司大神超度亡過某等咸領符命部衛形魂祗受寶誥上朝帝庭罪仇和釋與道合并神登玉闕受煉長存一如告命太歲年月日時告下法位外封式中元金書九天寶誥告下天牢地獄隂曹主司大神具位臣姓某謹封右符用一道專度古代將相大臣九功七德名賢用之即云拔度九州分野官品亡魂九道告九州十方並同玉簡式下元救苦斗中登真度命出離生死靈符師曰此符乃玉清之赤書紫庭之金文度命登真出離生死也乃度黎庶亡魂用之凡告下當以梓木簡髙九寸九分闊三寸九分厚三分以白粉刷地正背皆朱書外用青紙作封袋並用前式此符用一道專度庶士九道告九州十道告十方並用黃地朱書法曰凡書符焚香面西北跪奏存中斗之上有白玉京山百寶祥光洞煥一身照徹內外祝呪曰元洞玉曆止身得受生右呪一遍取西北氣入筆書之玉清訣書畢再祝一遍取氣吹簡上赤文命魔度命幽冥三天敕赦咸濟苦魂出離生死度脫死魂斬根死戶東井煉形天慈玉敕赦宥幽靈三台炳耀六氣齊并九幽隂翳盡覩光明得轉五道風火無停超天堂得證仙真告文玉清赤書玉文上通紫庭天慈赦宥三界冥獄九幽罪魂拔度亡過某等億曽萬祖苦爽遊精削除罪簿落滅惡根速赴生方氣識間寧上登天堂澄質煉真心開洞明蕩除隂翳入道升真一如告命太歲年月日時告下法位臣姓某承誥奉行外封式斗中登真度命出離生死靈符三界十方九幽酆都主者具位臣姓某謹封玉清金簡靈符告文神霄符命玉清金符宣告諸道地獄一切考官司禁執罰典録司刑開度亡過某等煉魂澄神升入玄關削落罪書道備功圓上生無極之境無為自然一如告命太歲年月日時告下法位臣姓某承誥奉行外封式玉清金簡靈符告下諸道地獄一切考官具位臣姓某謹封神霄金簡真符明梵玄景開度窮隂隂陽象交火煉成人大帝陽堂號八靈君魂生攝氣九轉成仙五氣皈身混合百神九開祿道明道回輪得證無為身乘紫雲告文神霄金簡宣告獄官司禁執罰典録刑司拔度亡過某等永辭長夜煉魂澄神升入玄關削落罪咎果備功圓上生神霄髙上之天真境無為一如告命太歲年月日時告下法位臣姓某承誥奉行外封式神霄金簡真符告下司禁執罰典録靈司具位臣姓某謹封神霄玉簡金符玉簡金書怡靈警神苦魂滯爽即得更生八門通關無影無形魂升金闕遊宴玉京三景自然敷落神真幽關治獄咸覩光明告文神霄玉簡三天符命上開八門三十六獄執法治官速謁帝軒赦宥夙罪超度亡過某等上升神霄玉闕之天復還治職氣入玄玄一如告命太歲年月日時告下法位臣姓某承誥奉行外封式神霄玉簡金符告下天獄執法治官具位臣姓某謹封本治天堂玉簡金符五文開廓普植神靈永度三塗禍消九冥疾除罪薄落滅惡根死魂受煉時刻升遷身度我界體入自然傾光回駕監真度生神識洞了身乘紫雲告文同前外封式神竇玉簡金符告下東嶽上生本治天堂具位臣姓某謹封師曰夫㸃九巵神燈須行本治之簡付亡人收執徑詣生天堂無有障礙也法曰書時存九天帝降九氣入符焚時呪曰九陽運真氣煉化即神功焚符速告行昭感自冥通急急如九氣帝君律令金液煉形誥三寶君敕亡過某靈魂煉度亡過某三魂七魄靈光遍體幽夜開明升遷魂魄還聚本形亡過某靈魂告文金液煉形與道合真開明三景是為天根無幽無極無始無終元皇九醜靈魔絳宫紫雲飛天身乘六龍水上火下流入三宫神皈陽明大道自通一如告命玉清九天度魂雷文寶誥二十一字出神霄法雷文部徑華極天正弼皇罡雷蝕毛結冲德疆雨電雲滿野篆祝呪髙上玄穹玉清宸宫神霄雷府火陵之中南閻洞浮雷令推前火府隱奧煉度自然長生大君韓君丈人四司五帝掌籍火陵魂魄受度百神混成普得霑濟身登紫庭玉府雷令破攝北酆皆覩光明急急如律令拔度告文玉清九天度魂雷文告下三官九府百二十曹九幽地府十八地獄北隂酆都牢檻去處地獄主者拔度亡過其等罪苦咸原幽牢罷對重泉黑暗咸覩光明承兹赦命出離地獄上生天堂一如告命太歲年月日時告下法位臣姓某承誥奉行外封式玉清九矢度魂雷文告下三元九府百二十曹具位臣姓某謹封煉度告文玉清雷篆火府隱文關告冥曹普度幽魂上登紫府升赴朱陵開泰苦爽煉度登真中有元極長生之尊韓君丈人消解罪戾風火無停三界聞之咸登紫庭一如告命又玉清玉府玉篆雷文關告冥曹開泰亡爽煉度登真火府靈官南昌典主千五百神君火帝火官把籙當前九煉死魂疾便受形玉文一下不得久停司命司馬左右司録司生奉行一如告命元始上帝削死上生靈符師曰夫生身受度須得削死上生之符方能身與太虛合德延壽長年也其法以梓木簡長九寸闊二寸四分厚二分以粉青為地朱書符以袋盛同升天左右二劵焚之若度亡亦用元始上帝敕罪消北府子名上南宫午死魂受煉午仙化成人坤仙道潜通雷八巳昭彰妙道削死上生卯升入無形串告文元始敕命赦罪宥愆解仇釋結削死上生名刋玉簡位列玉階真光接引慈慧敷開金蓮捧步紫氣度關三變九煉易容返顔三天魔王保舉制仙真心洞明福智自生驂侍龍轅受氣長存一如告命太歲年月日時告下法位臣姓某承誥奉行外封式元始上帝削死上生靈符告下三界十方注生合屬真司具位臣姓某謹封焚符呪生生得帝心名㑹重戶內紫房混五神魂魄常保貴七闕受仙暉五臟元玉氣俱過水火天披建四和蔚上皈皇一子共兆魂相對急急如上帝敕上清靈寶大法卷之四十六
