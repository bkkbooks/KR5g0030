front:
  text: 上清靈寶大法卷之十樓二
  hash: sha256:628c63958068df95e3348bbabe943639d955a3fd09d52d05d601c6228303cff7
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5g0030_HFL_010-001a, image: hfl/0944/0944-038.png}
body:
  text: 洞微髙士開光救苦真人寧金真授上清三洞弟子靈寶領教嗣師王契真纂三界所治門玄穹主宰玄師曰髙真上聖總録穹玄妙有妙無不可窺測經典一出漸露其機三洞正科其理淵深自大唐以後經誥散失逐時𥙷綴真僞混淆有識之士能别玄奧始可指其萬分之一耳元始天尊九聖之尊萬化之源道之玄氣虛無自然不可擬議散而為氣聚而成形其中有神强名天尊故稱云元始天王者是也乃上清之道尊為玉籙上皇居玉清聖境治玄都玉京靈寶天尊九真之祖上清髙聖道之元氣以教言之元始為洞真至此别為洞玄所謂玉晨受靈寶上品度人之道乃元始之弟子上清之祖師太清之上皇即天真髙靈尊為宗師也曰太上玄皇玉晨道君者是也居上清真境治金闕寥陽寶殿道德天尊九仙教主道之始氣以教言之自元始至此為洞神曰太清金闕後聖玄元道君太清仙王禀元皇虛皇之誥宣三洞四輔之文隨方應化演教傳經今古尊崇萬方欽仰自三皇以來宣說靈寶之經萬世度人無量天人崇位雙皇封尊為太上老君者是也居太清仙境昊天上帝諸天之帝仙真之王聖尊之主掌萬天升降之權司群品生成之機三洞四輔禁經之標格大梵至妙無為之神威乃三界萬神三洞仙真之上帝君也自三氣之天胤三寶之皇胄髙出乾坤之表生萬物而不宰也三才肇立氣清髙澄積陽成天萬彚之源豈應無主故以形象言之謂之天以主宰言之謂之帝故曰玉真天帝玄穹至聖玉皇大帝經曰天帝玉真無色之境梵行是也自玄氣而化生居大羅之下上清之上掌四種民梵天而尊於三界之上是為天主亦不得巳而強名之也治太微玉清宫如太上彌羅無上天尊語乃道門歸美之辭又太上開天執符御曆等語乃大宋上號帝王尊之象也太一救苦天尊乃始青一氣元始分形九聖九真九仙之師掌普度生氣之元曰東極青宫長樂世界青玄上帝太乙元皇救苦天尊是也次政十方億劫應化天尊非修證品位真人蓋元始上帝之皇裔玄氣神化之分形也治青玄左府北極大帝則紫微垣中有帝座是也按天文志南極入地三十六度北極出地三十六度天形倚側半出地上半環地中萬星萬氣悉皆左旋南極北極為之樞紐惟此不動故天得以轉也世人望之在北而實居中天為萬星之宗主三界之亞君次於昊天上應元氣是為北極紫微大帝治中天紫微宫有云紫微大帝乃諸天大神三界萬神萬殺之帝欺罔凡世褻瀆上玄所當痛革天皇大帝乃北極帝座之左有星其形聮綴微曲如鈎是名勾陳其下有大星正居其中是天皇大帝也其總萬星為普天星辰宿曜之帝位同北極而北極却為樞紐而天皇亦隨天而轉上應始氣三氣之下萬天之上三界之中莫不尊此三帝治勾陳瑶宫有云紫微上宫天皇大帝者尤為誑妄今之天皇則紫微垣中勾陳之下者是也何以言紫微垣或勾陳宫可也若紫微上宫乃玄都玉京山非紫微垣也一字之差利害甚重大唐時尊老君為聖祖天皇大帝乃唐室一時尊祖之典又非紫微垣之天皇也不考古今妄稱名號所當鑑焉聖祖保生天尊大帝按古典云九天司命真君於大宋真宗大中祥符元年十月二十五日降于延恩殿時有六真人侍立左右自稱是趙氏之始祖當時王欽若為宰相遂下詔上尊號曰髙道上靈九天司命聖祖保生天尊大帝又尊司命之配為聖祖母上尊號曰元天大聖后自此列天帝之班為上九位天下只得遵朝㫖行或云黃龍一氣司命保生天尊乃神仙人物之主天子王侯之尊也何其證耶不知真廟以前聖祖未降之時天子王侯又誰為之尊耶君子於其所不知豈可强言迷誤後學貽笑無窮師曰三清三境天尊人孰不知其為玄元始三氣但氣聚則為形散則復為氣是萬化之源三才之祖天地之根不可得而名不可得而議赤眀啓運大道流光或火煉太空或皇人按筆真文降世三洞宣行故有洞真洞玄洞神之部天寶靈寶神寶之稱中古以後遂立科法三洞各有經籙故謂之三乘九等也道之𨼆者不可知道之用者故立教或者却叙云元始乃道中之祖為靈寶祖師道君乃法中之祖為宗師老君乃教中之祖為真師救苦天尊十天尊為玄師吁三洞四輔法籙之源九品三乘互相通貫而以為三清各主其一其餘頗礙於瑾若然則行教度人不亦謬乎十方靈寶天尊主濟度存亡三界苦難治於十天東華太君乃男女真仙授書下教司命之主也治東華方諸宫西元太妙王毋乃男仙女仙真人録籍之主也治西靈龜臺靈寶經師或授尊經而典禁應劫出書以度人者鬱羅翹真人也靈寶籍師或掌神文之科格主録勒籍以升品授符授仙以度者真定光真人也靈寶度師或遵元格而演教敷宣玄範以符真隨方應化者光妙音真人也後三真共度三職總掌於三十六部尊經符圖集成中盟寶誥流演塵凡載度天人付之太極真人徐來勒徐真人以傳太極仙翁葛玄後世未知真真相繼鮑南海封青牛雖授符圖非三師限昔晉時楊掾許侯得靈寶金書乃上真魏元君付之兼許妙濟真君受教於諶毋及孝道眀王皆玄師限也後學承師受教各認宗𣲖而知師也玄中大法師乃元始立教之後至上皇元年五劫同啓五行全形五氣俱備化生諸真諸仙應五劫之內化生玄中之精精中之玄皆是上皇故劫號上皇五劫之中化生玄中大法師乃禀五氣之精英與天真皇人集雲成章龍胎石景億萬符書三部十條悉為正文玄中大法師方始立教也元始祖劫化生諸天祖劫者龍漢劫延康劫赤明劫開皇劫上皇劫也大羅天者虛無居之包含天地不可窮極經云上無復祖惟道為身於五劫之間化生天地大羅一氣生三天三清之境是也三天降氣而生九重一曰無景鬱單無量天二曰上上禪善無量壽天三曰洞虛極上須延天四曰無極上靈玉空元洞寂然天五曰洞極無涯不驕樂天六曰上極元景洞微化應聲天七曰元名至極梵寶天八曰太極無涯洞幽摩夷天九曰元洞波黎答惒天每一重又各生三天九重總為三十六天本經所謂上清之天是也髙上虛無皆謂之上清非特稱一境而巳次分種民三界三十二天統治四方在九天之下三光之上宫室分度各有等序降連星宿元氣相接生化萬物陶成品彚又有八極八天外魔一天在三十二天之下三光之外八極八表自清微天至外梵天總數八十自然之氣結成宫闕於是虛皇各命之以帝君輔之以天相置之以僚佐分之以民物與大羅一氣共為八十一天道氣下降乃生九地一曰色潤澤地名元德其氣上青中黃元土卿之所治二曰剛色澤地名皇德其氣通黑元庭土丞所治三曰石脂色澤地名帝德其氣通蒼龍口之土龍之所治四曰潤澤地名王德其氣通黃元心土大將軍之所治五曰金粟澤地名人德其氣通赤元福土令之所治六曰金剛鐵澤地名水德其氣通白元骨上長之所治七曰水制澤地名里德其氣通紫甲土父母之所治八曰大風澤地名復德其氣通青始賢祖土宗政之所治九曰洞淵無色綱維地名昌德其氣通緑軒始土下二千石之所治謂之九壘每壘有土水風各一重上下相次一地則虛皇又命四土皇君同主宫室輔佐並等降以法上天凡三十六土皇上應九重三十六天之帝也九壘之下浩蕩頑空裏以風澤風澤者元始梵風之氣也剛於真金亦名剛風擎持九壘乃載諸天髙而洞浮垂而不落上接大羅蓋道之氣也故經云風澤洞虛金剛乘天也夫三洞通化九氣混生浮於太元冲乎四虛法象之大惟道能包之五劫名元始祖劫渺渺億劫龍漢延康赤明開皇上皇化生諸天混沌之中大羅二境九重三十六天玉清境十二天上清境十二天太清境十二天種民三界三十二天三十二天係宿氣右四方二十八天每一天係一宿之氣四維四天各係一宿梵氣之間又等降相交東北之天復際西北之宿蓋生氣上轉如羊角而升者也順理之流雖同其義趣而慮惑於方維因作此圖以明也三光日開明三景八景冥合星辰是為天根氣入玄玄月三十五分總氣上玄北斗七元君與四方二十八宿為三十五分總元氣於上天以司造化北斗者中斗也史記天書曰斗為帝車遷運於中天臨制四鄉分隂陽建四時均五行移節度定諸庶務八極外梵天元青天始青天始黃天八𡨋之內太玄天太丹天始玄天始素天細微之中太素天域中仙境神洲五嶽三島十洲皆在三光之下大地之上巨海之中也嶽者鎮也坤厚載物而不移五嶽三島十洲仙聖之所居神洲者中國也王者居之為域中之大其中人民修行正道升而為仙真上有十大洞天三十六小洞天七十二福地並仙官治之洞天之中有五山亦謂之五嶽作中國之鎮其餘小國更不列之洞淵九壘八威龍麟虎豹獅子丹蛇天馬猛獸八景日月木星火星金星水星土星五斗諸星八冥東極東南極南極西南極西極西北極北極東北極八門東天法輪之門東南天法輪之門南天法輪之門西南天法輪之門西天法輪之門西北天法輪之門北天法輪之門東北天法輪之門三十二天總括師曰自太皇黃曽天至上明七曜摩夷天此六天為欲界也自虛無越衡天至無極曇誓天此一十八天為色界也自皓庭霄度天至太素秀樂禁上天此四天為無色界也是謂三界自太虛無上常融天至太極平育賈奕天此四天為種民之天今考本經分為一十二事一曰天名劫初分定之名二曰帝號元始所命之號三曰帝諱天帝之名四曰天帝所主掌道之職也五曰所居宫六曰所治分七曰係宿氣降連二十八宿八曰氣名元氣禀受之名九曰氣色九氣分方之色十曰大梵𨼆語內音也道君綴成事十一曰分界上界下界升降也十二曰天民數短長之數也此圖最為寶經之要誦持者宜詳而行焉欲界六天太皇黃曾天帝號鬱繿玉明諱觀覺主長生之籙居紫微宫治在西北方亥之西係奎璧梵氣氣名元陽黃色亶婁阿薈無惒觀音分欲界天民壽數九百萬歲太明玉完天帝號須阿那田諱攬覺主度魂更生居紫房宫治在北方亥之東係璧宿氣名上陽緑色須延明首法攬菩曇分欲界天民壽數一千八百萬歲清明何童天帝號元育齊京諱大覺主敷布政教度人居九晨宫治在北方壬之西係室宿氣名太陽青色稼那阿奕忽訶流吟分欲界天民壽數三千六百萬歲玄胎平育天帝號劉度內鮮諱育元主召魔舉仙居丸景宫治在北方壬之東係危宿氣名清陽赤色華都曲麗鮮菩育臻分欲界天民壽數七千二百萬歲元明文舉天帝號醜法輪諱梵雲主通行元氣居廣寒宫冶在北方癸之西係虛宿氣名洞陽蒼色答落大梵散煙慶雲分界欲天民壽數一億四千四百萬歲上明七曜摩夷天帝號恬懀延諱玉真主開玄度難居太隂宫治在北方癸之東係女宿氣名通陽黑色飛灑玉都明魔上門分欲界天民壽數二億八千八百萬歲色界一十八天虛無越衡天帝號正定光諱無上主明無上道居太玄宫治在北方丑之西係斗宿氣名建陽碧色無行上首回跖流玄分色界天民壽數五億七千六百萬歲太極濛翳天帝號曲育九昌諱吁貟主煉度朽體居玄都宫治在北方丑之東係牛宿氣名極陽紫色阿陀龍羅四象吁貟分色界天民壽數十一億五千二百萬歲赤明和陽天帝號理禁上真諱煥明主煉仙成真居長明宫治在東北寅之北係斗箕梵氣氣名始陽白色南閻洞浮玉眸詵詵分色界天民壽數二十三億四百萬歲玄明恭華天帝號空謡醜音諱世元主應化一切居東華宫治在東北方寅之南係箕宿氣名陽暉黃色梵形落空九靈推前分色界天民壽數四十二億八百萬歲耀明宗飄天帝號重光明諱絡覺主劫終納學仙之人居昊天宫治在東方甲之