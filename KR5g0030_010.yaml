金童三十二人傳言玉女三十二人右侍香金童乃陽初精潔之氣玉女乃隂本淨謹之靈傅言飛香皆四品之元真也東方青帝直符南方赤帝直符西方白帝直符北方黑帝直符中央黃帝直符巳上直符乃五帝內真氣符合道德之氣所化也直曰香官三十二人右香官是六十甲子之曰三皇之子孫也曰有三十二人以直芳香之氣散穢招真是效職男安本生六甲之氣所化也凡諸百靈非止三十二人但召奏止用四方天數三十二人是一天有三五功曹二人左右官使者一人侍香金童一人傳言玉女一人五帝直符各一人直曰香官一人每一天計一十二人三十二天統有三百六十人其諸一人功曹二人謂三天五帝各一人上應千二百官君下合三萬六千神氣也師曰玉清靈虛官靈寶天仙內院有仙曹分降以給官中仙宫使令皆自上清下降辨魔部辨魔玉女二人仙卿之上給四人八威治魔都領五人仙卿之上得給十人神慧殺鬼都伯史仙卿之上得給十人寶章部諸天符寶真人扶寶記天文郎二人譯符書真寶記真官二人扶掌諸天寶記天文玉女二人承受部三天承受玉女一人十天承受玉女一人五帝承受玉女一人三十二天承受玉女各一人玉清上奏靈官一人上清上奏靈官一人太清上奏靈官一人主職部靈虛掌印靈官靈虛掌法靈官靈虛對定靈官靈虛發放靈官靈虛監獄靈官已上各一十二人天醫部天醫上藥仙官二人主辨形候天醫上藥靈官二人主隨病處藥天醫上藥神吏二人主修命制煉生形博士二人主生形腹肌三五治病功曹二人切脉論病諸藥療病砭石小吏二人針砭煮烙敷藥靈官二人收毒將軍使者二人儀衛部護道神王二人伶華仙宫三十二人伶華玉女三十二人玉清主職功曹一十二人切原天真司於上境鬼神主於幽冥固非世人所可測然行持之七亦須少逹天地之正理粗曉教法之源流既不通古今又不考經豈可妄意測度迷悮後學可不痛哉且夫奏申所及祈請所關者必有所據而可以言也嘗觀四十九品法中以三境上帝為三師救苦天尊為真師又稱玄師與舊頗有不同且有施用仙曹赫奕仙曹三界所向仙曹等目並以經中一句作一司且如不得拘留逼合鬼群經中自謂應度之魂出離幽境不得復行拘留逼合鬼群之中是承上文之義耳今却取一句為一司又如無所不辟等句此言中篇之功用能如此今却不詳經意並取為司斷章破句全無理義然三洞四輔數千萬卷若皆取為司局之名不亦多乎王升卿所編靈寶大法考證甚多其於此一端失於刪去深為未善今既諸方流傳久矣亦只得併存之中間可取僅赫奕一曹稍有粘綴子細推之亦是稱魔王之威德也如掌醮司降聖司之類亦未穩當自古及今所傳羅天醮聖目包總備具赤無此等司治天樞院居三天門下詳見拜章科典乃故稱南極天樞院自北極為中天過北極方至天門南極則入地戶三十六度與北極相對今却顛倒錯謬不知南北慿此關申得不違戻也故今先叙玄穹主宰以明三氣之源絶之以三界宫曹以備關申之目濟生度殁皆可類考所是仙曹玄司雖不盡去切不可承謬而用要亦參酌以理行之上清靈寶大法卷之十
