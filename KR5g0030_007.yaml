front:
  text: 上清靈寶大法卷之七鬱七
  hash: sha256:08208d513dc2d7ee9d2e1709bf753d9e293c3f52e3bbbb2dc1098f0f4bb2f3f7
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5g0030_HFL_007-001a, image: hfl/0943/0943-112.png}
body:
  text: 洞微髙士開光救苦真人寧全真授上清三洞弟子靈寶領教嗣師王契真纂修錬佩服門八十一品通玄祕旨還元敘玄朝上祕品凡學仙求法之士神不歸根則不靈氣不還元則無寶法有五符五靈之氣能滌五臟穢濁清淨身心然後念道思真自然悟發神通莫測宜遠聲色忠孝國家濟物利人法有五符以五色繒各半寸方用硃書平旦入靖燒香服五靈符氣以井花水調面五方服之服七日後任意呼召八十一天靈官及用八十一品普濟之法飛章謁帝追度一切亡魂九州亡殁之鬼並仗此法超度或禱雨祈晴救病除妖無不應驗五靈真符紅杏墨黑磨真襪臘靈寶總呪曰九光三氣七政五常中皇髙尊下降元陽八十一品總呪始當詣坐八會九光自然成文萬靈併藏右想丹田中有混芒九光恍恍飛騰歸於命根良久上朝八景氣入玄玄玄中太皇迎會萬真隨念應祈普召萬神八十一品符內欠符三道天真品子文亶灰度天神品子中邈邈自騫地神品申文束覆郁羅水神品亥文龍羅九醜飛空品中指手心竺笳落五嶽品五嶽訣上玄靈真伏神品中手心負天大力真應品來年年命止祝寫度魔霐連池催生用胎品巳文皆得度人受生品中手心始化應死催品巳文歘歌流精化生品午午阿易玄解𡨚品斗訣天皇訣幽寂五分得生品産人本命訣山嶽吞煙變化品申妙辨化元玄應品中手心刀利訣袪邪用天魔品中噠靖地魔品中指上節梵沖水魔品中指下節漠渺醜魈魔品同前訣轟馘百怪品小指中中魔鬼品小指上利韓全妖魔品亥寂幽𡨋洞真品子靈魔懀服氣用太陽品卯回靈玄太隂品酉十轉光天罡品巳聲力五靈品五方八卦須玄延神靈品巳朝梵祖氣品子混恍靈布氣品斗靈明罡定極品自本命訣剝𠷈出神用大神品中手心𩵄臨入神品本時訣七聲嗏集神品本命訣合明天拜章品本日訣流真精行神品中四指入掌心嘽嚤吽歸神品本命訣甲摩辨自此至前太陽品並朱書燒灰參苓湯下淨真聽祝通真品卯靖端明淨目品卯襪離焰洞視品申滅魔試目辟品午流精炎日照品未遷噠哪內觀品午下吻叻沖𨑰視品小曲元囉嚩召聽品呼囉遷元品五嶽訣遷靈仙普度用普度品三塗訣吽吒唎攝魂品斗訣誾闥錬魂品子午闢開焰精合形品四三節梵氣交羅解結品斗訣魔勒微芒超生品申入玄返魂品中指恰大中復𠷈九醜生呼神王玄靜品中文靖勑神王品八卦訣軓華五帝品八方八卦靈寶欲界品五指俱曲啌色界品二指搯虎口命魔無色界品中申斬靈五老神功品子午卯酉品吽玄天丁仙兵品四三指搯中啃品皮魂合體演梵品大指搯中二指縫含光天醫品申哆明監生品中節上開明去穢品子靜光績魂品卯亢鳴靈無解除品斗訣𡄳囉辨喫合品辰辨噠除業品奉子令味綿哆修禳普濟成通品巳咭帝流禳天品乾帝呢靈書禳地品坤祇微哫禳災品申風厨嘆禳兵品酉嗷嚧禳火品子亥申黑嗏禳水品巳午中囑禳蟲品西叻𠷈總祝八十一字祕呪繿明醜玄阿囉龍邅須延談獻貟浮寶騫利禪詵剝婆萌梵天醜鐸善猷明離舉遷玃婁易邈範先首堅竺落笳伽扶唎大嚩三摩妙辨坤覆道乾赤眀輪和滅魔自蠲喑吻噠哩陀郁馥沐萹真九氣吁流上仙勑巳上並用靈寶中氣凡行持存元始祖氣心念八十一字然後隨符施用夫道玄祕旨萬法之宗得之專於守一行之在乎神功神功一全無施不可守神神靈氣聚寶盈神氣既住內外光明應感無礙巳達天真真中有神長生大君真神相應上朝帝廷名刋玉籍萬劫慶榮知之進道妙理自明知之懈退永代滅形輕泄漏慢七祖受刑謹之戒之天律非輕八十一靈官職位掌印靈官掌籍靈官掌奏靈官掌律靈官掌書靈官掌令靈官掌算靈官掌符靈官掌節靈官掌曆靈官左曹靈官右曹靈官左司靈官右司靈官執事靈官朱衣靈官繡衣靈官蕩穢靈官降生靈官釋𡨚靈官真陽靈官隂光靈官紫霞靈官飛雲靈官鼓吹靈官玉章靈官進書靈官混化靈官玄司靈官洞光靈官青章靈官真靜靈官丹皇靈官斗威靈官馘魔靈官玉册靈官玄光靈官仁惠靈官安化靈官定化靈官定光靈官太白靈官大明靈官應元靈官告命靈官洞章靈官鍊形靈官大虛靈官伏魔靈官紫虛靈官丹光靈官中皇靈官素華靈官元黃靈官七變靈官浩陽靈官東華靈官安鎮靈官侍靖靈官恭靖靈官真靖靈官衛靖靈官紏察靈官啓奏靈官通傳靈官保度靈官傳奏靈官謄書靈官待報靈官傳送靈官集神靈官飛光靈官節次靈官言功靈官制魔靈官正精靈官攝召靈官明真靈官六天靈官明靈靈官玉輔靈官巳上八十一靈官皆有隱名服之八十一日批降傳言克期感應隱名內篇陽年從鬼隂年從門𩲳北氣西南氣東南辰位正東南方魃存從天中氣下魅西北方魁正西方𩲵東北方正南自止十字不問隂陽年用服符方位并訣一九坎中藏二九在坤方三九玄震發四九巽焰光五九居中位六九遇乾鄉七九兊上立八九鬼門傷九九離明上神遊合玉皇巳上訣隨方掐之服符九道攺各方氣訣並存本方氣色結成紅橘大入丹田中入靖隱訣祕呪元黃運氣馘絶邪蹤太上勑令定桃康公七靈靜制赫文黃中戊己結蓋嬰兒使通混合百脈百竅齊聮神遊太漠我命無終急急如元始律令凡遇錬神之時入靖燒香密誦七遍批降呪靈丑摩寅𠷈卯叻辰聻巳五靈訣吹紙上五府納靈訣出元皇五元素府內同左目為太陽訣舌左存太陽以目視出肝氣迎合為音霞氣納肝宫右目為太隂訣舌下右存目視出肺氣迎合為素霞氣內肺宫天蓬天火急局印金輪制魔攝局式酉至卯掐定眉中為天罡訣舌尖存天罡以心意脾向腎赤黃紫三色之氣自鼻中出迎合為青黃白三氣聚於兩眉之中化為一粒五色珠自泥丸以神迎寶珠入腹咽之自然五臟光明有真火焚身中穢氣次見法身如嬰兒唵喗噠娑薩訶巳訣呪曰青精陽神太白庚辛炎炎赤帝壬癸之君付吾戊巳合我身形千和萬合氣體通靈長生久視願得飛升急急如元始律令右存五方真氣合我五臟自頂門入遍歷五府化為紅橘納丹田吞符普召萬神呪元姑律令道君勑文三光玄斗日月之精六通神光十方應化吾今召某速降通靈急到壇前通傳靈勑玉清訣如召五嶽掐五靈訣任意存想十方神祇即時而至或在耳如松風之聲或假童子通傳萬無失一祕之靈寶開天二十四玉契師曰契者劵也上天之合同也天尊頒詔得仙之子先賜玉契以俟飛升過度天門此之玉契諸天宫分如人間官曹所治各有拘遏安可便造故上天立此玉契以付學仙之士或數盡身歸太平得此玉契便可徑還所治奉上天詔命背土凌空亦資此契以度剛風左社右稷扶助登真之人全憑玉契自非巳參斗領職不可輕付違者天誅慎之九天玉契一名太一契凡開天門生死魂神飛升超度及詣九天十天三十二天天曹天師天門三將軍用之亶臻答貟南邅雲宫刀都阿仙玃天沙人九仙玉契一名司命契凡開地戶超拔神魂斷地逮役及北隂酆都地府應干地道遣用曇臻門貟前邅輪宫堂都首仙玄天珍人南極玉契凡諸南天南方南斗南曹南昌上宫南院天樞內省天樞院朱陵火府用之音須雲飛詵梵騫那通宛由九乾坤鮮碧北極玉契凡諸北方北天北極北曹北院太玄都省天樞內省北隂泉曲用之吟華玄河十眇容馥嵎易神玉雲飛真元東華上相青童道君玉契凡諸東方九氣木德扶桑宫太一青宫青靈始老宫用之元首忽麗答都回耀南丹鬱明玉契凡諸南嶽魏夫人及南方三氣丹臺南上南陵及丹靈真老宫用之玉空緑醜雲馥攬變西龜素曜玉契凡諸白玉龜臺太素真人皓靈黃老西方七氣宫用之婆色景寂阿辨浮桑北鬱玄明玉契凡諸北方五氣諸宫五靈玄老宫分及北𡨋北海水府等司用之九覆眇醜沙黎洞漢中天總真玉契凡諸蓬萊瀛洲等治用之薈無浮玉猷婆育九日君玉契音須詵梵通宛乾坤月君玉契門無輪霐首無珍惡北斗玉契曇稼前澤堂流玄陀上元天宫玉契亶曇南前刀堂玃玄中元地宫玉契稼門澤輪流首陀珍下元水宫玉契臻貟邅宫都仙天人天蓬玉契凡東方七宿用之亶曇稼臻答門無貟天猷玉契凡南方七宿宫用之南前澤邅雲輪霐宫翊聖玉契凡西方七宿宫用之刀堂流都阿首元仙玄武玉契凡北方七宿宫用之玃玄陀天沙珍惡人青帝玉契凡東嶽真君東嶽泰山宫用之音須吟華雲飛玄阿赤帝玉契凡南嶽真君南嶽衡山宫用之詵梵千眇那容馥騫白帝玉契凡西嶽真君西嶽華山宫用之通宛嵎易由九神玉黑帝玉契凡北嶽真君北嶽恆山宫用之乾坤雲飛鮮碧真元黃帝玉契凡中嶽真君中嶽嵩山宫用之雲阿前馥堂玉玄元右二十四玉契各只用天篆以柏板長五寸闊二寸四分朱書奉玉皇誥或歸真日佩而用之即得遄歸本處無有拘遏者若遇發上件宫府文檄亦可用可以輕薄紙片用雲母為粉八辰砂掐上帝訣書之取東南氣吹從中間剪為兩片以左片貼公文上之首更不必用印以右片燒作灰用東南方香水調服無不達矣上清靈寶大法卷之七
