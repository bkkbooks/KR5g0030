front:
  text: 上清靈寶大法卷之一
  hash: sha256:a912be3eef96dddba92903650cca089e02054ff07bc151a026615d5cf71e4282
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5g0030_HFL_001-001a, image: hfl/0942/0942-016.png}
body:
  text: 洞微髙士開光救苦真人寧全真授上清三洞弟子靈寶領教嗣師王契真纂開宗明義門總敘師曰靈寶大法者貫通三洞總備萬法是旡上大羅天元始天尊所説玉晨道君五老上帝髙真上聖妙行真人十方神王至真大神所授後聖玄元金闕李真天帝降世行教化度凡間得而聞之乃三十六部尊經總計萬八千篇衆道之宗玄淵隱奧與萬法一貫且天真皇人有八明五譯七經八緯十奧四十七章總成一部究其微妙皆曲盡其理夫八明者以法天開八聰以明其幽五譯者法五劫開化生五行是氣方成世書七經者汲引大道之徑路八緯者範圍教法之閫域十奧者是謂十玄四十七章訓説始末紀綱總成一部盡闡玄奧之旨其於詳微分品立門樞貫為一八明一則明元始祖氣從何先化玉字按靈寶王字內音經云自三氣之先溟涬之後其中真精歘化後生元氣元氣之內有神曰元始天王其氣混凝與元始同生流化結芬非色非相或舒或張至延康開劫一氣分形而為二氣虛無自然而生始氣二氣交結凝相太空彌覆無極字方一丈八角垂芒莫知其理一氣混凝包藏玉字至龍漢開劫元始天王分隸二氣混沌開光氣清髙澄成天氣降積滯成地二氣分合中有和氣名曰玄氣亦曰大梵之氣至赤明劫元始開圖中有真陽之氣化為洞陽之火元始運洞陽之火冶錬三氣混和玉字而成赤文因而劫號赤明文號赤書玉字是兹理矣二則明生育混沌陶冶萬範自混沌開拆三氣成文火鍊為赤書光明之氣陽光之精成日靈光之精成月餘光布散分為三象三氣之神分為三清之聖自此之後萬範皆出莫非玄元始三氣也三則明靈寶大法自然生成圖書總括萬象為三才樞紐至開皇劫分隸三元化生諸聖至上皇劫王劫周啓五行全形化生諸真諸仙應五劫之內産生玄中之真精精中之神皆名上皇故劫號上皇也於五劫之中五行正氣流方布形或聚或散或捲或舒或體應雲煙火霧或象類星斗金玉成形分蟲魚龍鳥皆出於赤書玉字分形自然生形成三洞四輔之文龍胎石景億萬符書三部千條圖局命天真皇人太真玉妃悉書其文録為簡籙以正生化之本總括萬象之元陶鑄羣品之機出産仙真之紐是兹理矣四則明大法為三洞祖教出生一切聖人自五劫開化之後上清洞玄玉清洞真太清洞神三洞之經四輔符籙皆因赤書玉字而化稟受靈寶之氣而成昔自元始天尊命上皇三十九帝九霄天帝各紀經呪而成大洞三十九章明五劫開化混洞之體述和合三氣歸一之法付王晨道君次於諸天説三十六部尊經後自三皇之代金闕後聖玄元老君下化於神農時下化為郁默子説嘗百藥分五穀而説長生經伏羲時下化為田野子正八方演隂陽説靈寶元陽經祝融時下化為鬱華子訣修三綱齊亡政説靈寶五星混常經黃帝時下化為廣成子説靈寶道誡經少昊時下化為隨應子説靈寶元藏經髙辛時號元陽子説靈寶微言經帝堯時號務成子説靈寶政事經帝舜時號尹壽子説太清經靈寶赤書經夏禹時號真寧子説五篇真文經龍蹻經周時號郭叔子説靈寶赤精經道德二篇靈寶八威治魔經吳時號太極左仙翁説靈寶祭鬼經業報經漢世名赤松子説三一經至桓帝時永壽元年正一太清洞神之教下降人間武帝時名河上公説道德篇章西王母奉元始之命説靈寶三十六部尊經成世書至晉永和十一年玉清洞真之教下降人間方成三洞皆出因靈寶大法生化一切聖人也五則明人身體法元始造立混沌而生聖胎法身父母交精一點含和二氣分坼先生其腎三氣分肇而生神府神府者心也四氣合并華蓋成形五氣開光如花五葉即五內備矣如三氣至五劫之象也二氣分判上生泥丸而下生玄谷玄谷水府也三氣火煉上生曰月如同二目一身光明如為萬象也人身正同其理夫身外分形須知靈寶祖氣是也入沙成金入石成玉禽生鸞鳯獸生玄龍草木生靈芝五榖含嘉瑞氣散成和風氣升如慶雲氣降為甘露入水生夜光在人生聖賢以此為祖氣乃至和太一之精衆靈之首太寶既有此物如人之分形入大浮黎土丹谷中央也成行九轉分形五變而成法身乃元始十遍枯骨更生是也六則明元始祖氣無形之先比擬降質成氣化生萬寶今世作何體狀復採此氣餌之登真正所謂靈寶之氣如萬類亦有之謂龍珠虎寶牛黃鴉丹之屬也今流精玉光丹亦是也所謂靈寶之氣天地者日月對氣日中之時身中者神氣會合之初也故太乙真人曰常於太極握樞機動靜神珠降幌幃自有靈寶生玄谷黍珠空歌嘯詠時是也得此餌之必登真人之位故下仙莫能階此髣佛矣七則明大法中大洞育物回靈之道則白曰登晨次誦詠長生度世尸解得道及經中備有萬法所是靈寶經述天中元始天尊説經之旨趣則常理矣上有修真內錬骨肉同飛之道中有長生度世尸解之法下有升祖度玄之教大則保鎮天地正天宿度愈災却魔之格小則有治療沉痾回尸起死之功明則有嘯詠風雷變化自然之靈幽則有䇿役鬼神徹視十天之文故曰備有萬法八則明大法有三品必成聖真仙遒如通玄究微行諸十品上道功德合備則白日飛升若其餘輔修得一法救一長生度世為地界洞天仙人之首或朝夕朝禮尊敬奉事供養必獲尸解之仙十洲三島散仙之民矣師曰八明可以開聰而五譯始成世書第一譯譯曰王字生於虛無之先隱乎空洞之中名大梵玉字至赤明開圖火煉成文為赤書玉字元始以大通神威之力開廓五文而生神靈宣緯演祕而成大法也第二譯譯曰火煉成文赤書之後字方一丈八角垂芒覆於諸天下蔭於西元九天之根流雲之勢玉光金精之明煥耀太空元始命天真皇人悉書其文名八威龍文亦曰諸天八會之書祕於上清玄都金闕七寶瓊臺及紫微上宫蘭房金室東西華堂九天太霞之府也第三譯譯曰元始天尊為道法宗主玉晨道君為靈寶教主撰此靈書五篇真文三十二天玉字成經名雲篆光明之章西王母授黃帝龍威丈人授大禹靈寶五符之法并太上後聖授百代帝王靈寶尊經並在三十六部尊經之內更不稱譯黃帝問道峨嵋親見皇人再蒙授旨及吳左仙翁於太極徐真人降授流布亦更不重敘為譯第四譯譯曰漢元封元年七月七日西王母下降以此經法授漢武帝帝不曉大梵之言王母曰元始是大羅天人道君是西那玉國天人亦與神洲之言不同況大梵之言乎遂以筆書之改天書玉字為今文以大梵之言威儀服御宫名圖書名色宫闕甲子卦氣壇式大法之內諸品行用三十六部尊經並從漢制世文之語為古今之法言也第五譯譯曰自天真皇人悉書其文以為正音妙行真人撰集符書大法修用真定光真人鬱羅翹真人光妙音真人集三十六部尊經符圖為中盟寶籙以三十六部真經之文為靈寶大法因此流傳吳左仙翁授經籙法訣於太極徐真人也仙翁遺於上清真人楊君總其上清洞玄玉清洞真二品之法後世漸有神文見也上清靈寶大法卷之一
