front:
  text: 上清靈寶大法卷之三十二飛八
  hash: sha256:ccf184b9fa8976b4f7f82f29a88bfda0dee74da7cd7b2d1d2ea3732c08811f9d
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5g0030_HFL_032-001a, image: hfl/0951/0951-128.png}
body:
  text: 洞微髙士開光救苦真人寧全真授上清三洞弟子靈寶領教嗣師王契真纂齋法壇圖門下層壇圖式中層壇圖上層壇圖總壇圖四圍燈式道户燈二本命燈二隨生年隨十二支轉行年燈七男一嵗起寅女一嵗起申太嵗燈一隨本年方大墓燈三宫羽辰商丑角未徵戍小墓燈五宫羽戌商未角丑徵辰七祖燈七西南方九幽燈九又曰分八方安中類東北方寄西南上立九獄牌夾門燈二與道戶燈相對列門之左右二十四氣燈二十四東南方八卦燈八分八方各立牌九宫燈九分八方安中央寄坤依豁落斗分九官十方燈十分十方二十八宿燈二十八自東方起逆布轉各方七宿自角起三十六天燈三十六天門上五嶽燈五分四方央寄西巳上燈總一十有六合一百五十九燈各隨方安並巳細注在前各燈立一牌書燈名云道户燈角宿燈東方風雷地獄燈一宫燈東方燈東嶽燈之類是也本法以七祖九幽燈然於中庭恐妨行事方位巳具于前又田居實先生齋壇圖有六甲八節十直五臘日宫月宫諸燈全無經據金籙簡文亦無禮祝之法又五嶽七祖諸燈各有碗數圖式與此不同不欲革去今併存之以伺博學髙人自為可否又以二十八宿各依星像之數然燈則通前共三百一十三盞酆儉當隨其力大抵燒香然燈為齋功之首其餘事可增減却所不論惟法天象地於燈燭宜從厚也謹考天文而出其圖幸深詳之廣成曰或壇席狹處不可鋪燈宜就別所安之亦依法祝也諸燈像日宮月宫十直巽六甲五臘八節坤太嵗本命行年九宮東嶽南嶽西嶽北嶽大墓乾小墓二十四氣三十六天七祖九幽角亢氐房心尾箕斗牛女虛危室璧奎婁胃昴畢觜參井鬼柳星張翼軫玄師幕左一靈寶玄師為三天化主乃闡教之師應宣行齋事當先關啓證明齋功張帳幕設聖像几案香花崇奉如法五帝幕右一五老上帝主人天功過之録證質齋功按古儀在五方案上廣成儀令就三師位之北别設與玄師相對帳幕几案鋪置如法天師幕左二正一天師為三天法主乃出法之師應有齋修皆當關啓敷闡如法三師幕右二經籍度三師為開度之宗師資存念之旨敷藏如法三官幕左三三官主三元考校之籍證録齋功敷藏如法監齋幕右三監齋為靈寶齋法之主監臨齋事敷藏如法右六幕於玄壇前左右依次設之又有正一三師幕此乃龍虎山正一宗壇尊崇祖師之義而田先生從而行之却𣸸正一三師幕而以經籍度三師立於天門之上而世俗因有天門三師之説實非本科若行靈寶齋法合從古也如挾處不可容六幕只作左右中幕每一幕却以帳設隔為三幕分三香花几案並於當中參謁相通行事當以中為尊左為二右為三也幸深詳之堂陛章師曰凡建大齋當先建十二堂陛召集髙仙真靈分司治事各有聖位行遣啓祝制度敷藏如法青華堂一中設青玄上帝左右真人上安碧落空歌圖每日焚香誦救苦頌三首九朝行道而朝禮之合於預告之前建立上通天救苦表立青玄幢於此行事神虎堂二法於預告之後就艮戶卜一室中安神虎夫人官將左右立隂陽二壇中間向升立八門召魂壇置召魂幡於左右應關發玉札召亡並於此行事或見虎玄範門神糾察司三中安五師三官之位九朝彈糾於此行事六幕巳不必設也若有精思堂四又曰存真堂靜默堂中安正一天師及齋法祖師之位仍設髙座几案髙功居之以次分六職衆官之位朝修出入不離此室冥官堂五中安嶽府酆都十王之位應冥曹諸司隨位數鋪設監生司六中設九天諸真之位案上安監生真文召魂至於此拯療天醫院蕩穢所七中安天醫諸職真宰并浣濯合干仙吏召魂醫療沐浴於此行事受煉司八中設上帝諸尊之位左右列受煉諧真官吏凡行持變煉於此行事如狹處不可設如期為之亦可或於道場中左右止列煉度官將之位當中行事蓋上帝之位巳有在道埸中故不設之黃籙院九中設黃籙院諸真聖位案上安元始神霄諸真符籙拔度苦魂為事受生案十中設受生聖位案上安判注死魂應該受生貴賤録籍專司銓注五道都府十一中設五道神位專司開攝地祇沈淪五道諸類孤魂通章司十二中安從章靈官將吏隨位數設之凡進拜章表於此行事監臨所中安本法及所受諸法官將併承行官吏功曹直符等住隨宜鋪設在壇之西土地位作里域司亦可杜儀云關召敷奏傳感上玄凡建壇場土地為首宜設位遙對壇所今欲以諸處城隍併土地當境廟食諸神當處五道等神附在此處作里域司亦一理也九祖位作受度堂遷拔九幽洗滌玄祖宜設位遙對壇所中設九祖七玄姻親春屬隨宜鋪設肴羞供具一一如式杜儀云立東南上普度堂外設茭郭立四門標榜東弗于逮南贍部洲西瞿耶尼北鬱單越白茅蓋頂青幕四面近郊野水際為之尤妙四面作城以土朱染畫令勻中作臺要二層用物疊一臺立水盆之內浸鐵迹臺光章立六道孤魂之住四面鋪陳飯食酒果中安斛食廣設九泉河沙鬼衆於此行事催申日先立散壇日焚之靖室髙功存神書篆符籙之所中安皇人黃籙真宰籙符中典録靈官隨宜鋪設於預告之後先立之誦經堂中安三寶位自預告後集同盟日逐轉經呪睿號禮懴於此行事聚魂府中設五總聚魂聖位專司攝聚鬼亡魂𩲸召集正真生氣儀衛章師曰凡建壇陛禁忌有嚴當用十四符章以衛靈神安鎮四方也書時誦二章祕呪搯玉清訣取天門玄元始青黃白三氣吹之以板篆挂於四圍壇上若書燒之亦可丹輿緣輦之符絳實命筆寶飾敷陳輝精交映輿輦風程羽蓋瓊輪之符玄元羽蓋祖氣結凝混沌之根十轉回靈朱鳳之符朱鳳驂轅辟穢張威四靈振伏飛舞華扇玄龍之符五色玄龍飛蹈太空交筆運始建禦奔衝九色之節符寶光蕭仞受化虛皇純陽結梵華散紫堂十絶靈幡符颷營鬱勑寶光散施曜暉李日萬聖膽依九鳳齊唱符元氣散廓雲霞彩光八鸞同鳴符七氣氤氲旋繞崑崙八鸞同鳴五色獅子符萬穢萬獸獨步大布摧伏瞻依無畏獰威無量惠通巨力普苑端拱居中受道無為九光白鶴符道契玄光光映十方開光頂負羽鶴翺翔旋繞太虛嘯詠呈祥青龍侍衛符太上玄明演法騫林三界侍衛八方威神使束縳魔靈竒氣羅終我自然與道合真變易龍刑白虎鎮守符七氣齊應大律合英太法玄象結氣聚形五帝交觀圭鑿元純白虎鎮守壇殿華靈朱雀陽精符仙道自吉髙上淸靈明氣四騫結命朱陵日陽聚氣赫赫玄精朱雀擁護至道長存玄武後擁符空中萬變玄氣嵳峩威伏萬天受命太阿玄玄豁落合形龜蛇召五方從官兵馬鎮壇符師曰六符可召五方五氣五靈諸天從官兵馬并五方天帝從官掾吏兵馬凡行科誦呪存各方諸天臨軒金光洞煥太空天帝從官乘空而降異香寥廓可以板篆挂鎮齋壇始景元精九靈妙景真符右符青紙朱書卯文震氣向方吹焚之可召東方九氣青靈諸天從官兵馬丹光炎上洞靈大梵真符右符紅紙黑書午文南氣向方焚之可召南方三氣丹靈諸天從官兵馬皓華靜陽七氣真符右符白紙黑書酉文西氣向方焚之可召西方七氣皓靈諸天從官兵馬玄光靜景妙寶虛梵真符右符黑紙朱書子文北氣向方焚之可召北方五氣玄靈諸天從官兵馬一切威靈之衆虛皇洞真梵氣寶光真符右符黃紙黑書天師訣東氣向中焚之可召中央一十二氣黃靈諸天從官兵馬髙晨妙極太一無上真符右符黃紙朱書玉清訣南氣望空焚之可召五方天帝從官掾吏兵馬上清靈寶大法卷之三十二
