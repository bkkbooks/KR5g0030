front:
  text: 上清靈寶大法卷之二十二觀七
  hash: sha256:a6dab0ef2ba31dd2067a1111d96ac0aa28e24750bf1e658e85d7b5d3ad3be65a
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5g0030_HFL_022-001a, image: hfl/0949/0949-004.png}
body:
  text: 洞微髙士開光救苦真人寧全真授上清三洞弟子靈寶領教嗣師王實真纂經句符書門靈寶經句主符命有重前者各隨冝用風澤洞虛右符頂佩之止人怕懼金剛乘天右符安土梓木書鎮八方溟涬大梵右符變化法食遼廓無光右符鎮墳無灾赤明開圖右符鎮猫兒自食之鬼運度自然右符鎮犬上屋怪赤書玉宇右符鎮貼益牛馬八威龍文右符服之曰久能飛升梵氣彌羅右符鎮山鬼害人萬範開張右符鎮凶灾旋斗歷箕右符解官灾赤口白舌泛景太霞右符鎮地斷蟲蛙嘯詠洞章右符鎮本地斷蟲蝗金真朗郁右符治肺勞去尸蟲靈風聚烟右符煞蟲毒鎮其方千和萬合右符和合財物五贓自然成真右符和合萬事安神真中有种右符治肝病蠟湯下長生大君右符治心病柏葉湯下無英公子右符治腎病乳香湯下白元尊神右符治肺病柏枝湯下太一司命右符護形落死桃康合延右符治脾病長肌執符把籙右符護身安胎保命生根右符保身解𡨚下鎮人身右符安五藏去三尸泥丸絳宫右符治頭疼益精神中理五氣右符通百關混合百神右符鎮宅禁神鬼十轉回靈右符鎮井泉花木精萬氣齊仙右符鎮伏尸客鬼上開八門右符利財飛天法輪右符治財耗宿命因緣右符鎮夫妻忌妬鬼罪福禁戒右符鎮宅令子孫威旺普受開度右符梓木書亡人手中得免罪生天死魂生身右符安亡人手得再生人中人道渺渺右符治土殟仙道奔奔右符治學道失心鬼道樂兮右符鎮舟中伏妖龍水怪當人生門右符鎮地度魂得生仙道貴生右符安胎治小兒夜啼貼帳上鬼道貴終右符鎮宅滅禍仙道常自吉右符佩服學道無魔修真有悟鬼道常自凶右符鎮虎狼不出髙上淸靈爽右符治小兒驚風悲歌朗太空右符下死胎鬼氣惟願仙道成右符孕婦佩得子夀人佩得仙不欲人道窮右符鎮凶鬼北都泉曲府右符鎮石精古怪異物中有萬鬼群右符佩帶能藏形邪鬼不能侵害但欲過人算右符延人壽益算斷絶人命門右符鎮夫妻𡨚鬼阿人歌洞章右符道百關人參湯下以攝北羅鄷右符鎮四方止盜束送妖魔精右符壓男女𡨚枉斬馘六鬼鋒右符書刀上斬地滅鬼諸天氣蕩蕩右符佩長精神我道日與隆右符佩之成道落落髙張右符治財物耗散明氣四騫右符鎮斷口舌梵行諸天右符鎮雌雄喪殺周回十方右符鎮飛遊氣無量大神右符安司命土地等神皆由我身右符佩服令人有綱紀我有洞章右符鎮𣗳木鬼萬變成仙右符治奴婢鬼仙道貴度右符鎮古冡鬼道相連右符治鐵精天地渺莾右符劒書地上鬼祟走避穢氣紛紛右符書於地殺鬼三界樂兮右符鎮亡者安過之長存右符保蠶除耗身度我界右符鎮落水鬼體入自然右符鎮藥死鬼此時樂兮右符滅古廟靈壇薄由我恩右符利見大人鎮宅吉龍漢蕩蕩右符斷滅惡跡何能别真右符封鎖蟲獸皆伏我界難度右符佩服出入利故作洞文右符伏蟲鼠怪變化飛空右符斷客死路亡鬼以試爾身右符鎮死魂不散鬼成敗懈退右符鎮師巫禁呪度者幾人右符鎮喪車客死鬼笑爾不度右符鎮虎狼瘡痍患故為歌音右符鎮井泉黑現五色光三界之上右符治宅中鳴響黑暗渺渺大羅右符治六畜疫病上無色根右符斷凶死鬼雲層峩峩右符鎮邪摧折性命之鬼惟有元始右符保命禳灾浩劫之家右符鎮貼主進財物部制我界右符如偷取氣書地上令人不動統承玄都右符變宅為天界鬼祟不能入有過我界右符佩服令人聰慧身入玉虛右符佩之可神遊三界我位上王右符治夜行恐怖成疾匡御衆魔右符治衝祟卒倒空中萬變右符治腫毒書於毒上穢氣氛葩右符治厠溝鬼為害保真者少右符治夜夢鬼交左右三轉出下一筆迷惑者多右符治神昏亂仙道難固右符治人五藏煩燥鬼道易邪右符治物被蟲食人道者心右符清神助氣諒不由他右符鎮古木妖安木上即天伐仙道貴實右符治子孫生多患癎病人道貴華右符治墮胎爾不樂仙道右符治五般風癎疾二界那得過右符治夫妻命尅其欲轉五道右符治門前五道為患我當復奈何右符鎮外事不動過度三界右符治奴婢鬼魔王敬形右符鎮外人作犯令灾著本人勑制地祇右符鎮辟殟永離鬼官右符佩去山瘴瘧魂度朱陵右符佩服能錬精魂受錬更生右符佩服落死籍是謂無量右符鎮火甑釡井椅卓自鳴普度無窮右符佩行舟治水怪上清靈寶大法卷之二十二
