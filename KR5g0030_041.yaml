body:
  text: 洞微髙士開光救苦真人寧全真授上清三洞弟子靈寶領教嗣師王契真纂齋法符篆門然燈章師曰謹按上元簡文然燈之法是法解真人啓請元始天尊天尊答曰遷拔之格救度之門三洞衆經具有成典今當為汝宣説要言濟度拔亡然燈為上五方八極地獄幽牢在極隂之鄉長夜之境死魂囚閉不覩三光𡨋昧之間經諸考掠宜如法以梓木造一燈樹上分九巵每巵安一燈下以淨土作天地輪上圜象天下方象地上層安燈樹懸幡九首旙上書九天隂符兩手書告文中層團團安燈九碗立九氣牌下層安燈九盞立九壘土皇君牌三層共三九二十七盞外立八門然燈八盞立八卦計三十五盞乃三十五分總氣上玄八景冥合氣入玄玄上照九天調泰正氣鎮運星宿中照九野以掃九土災殃下照九幽重隂九壘通光九道破暗燭幽外八門以映八極自初終亡至于七七燈光相續苦魂覩此光明即得解脫也太上太極九地內音三陽開光真符太上靈寶赤明丹光玉曆寶章開三陽天元梵靈之氣浩劫開神運龍文泛赤霞八威奔電激九鳯破妖邪鍊度月皇室飛升元始家光明常繼照靈慶襲晨華告文右告下九地九壘土皇幽關主者救拔亡過某等魂制魔保舉度品南宫死魂受錬仙化成人生身受度劫劫長存隨劫輪轉與天齊年永度三途五苦八難超陵三界逍遙上清一如告命太歲年月日時告下法位臣姓某奉行封皮太上太極九地內音三陽開光真符告下九壘土皇幽關主者法位姓某謹封九陽化氣九巵燈符一陽混溟𤥭瑶之氣符一陽生形幽壑開明四景合體分配五行二陽泛華紫微之氣符二陽育質會合五神靈音含輝玉女侍迎三陽天婁風𤥭之氣符三陽受仙受福黃華金門離合披閲四和紫户胎元三秀欎羅四陽中女辟邪之氣符四陽倉臺赤帝丹靈保生虹映敕拔命神五陽太皇微延之氣符五陽玉華太華重寧公子執符大一會靈金童鼓歌鳯嘯龍吟六陽化真白灝之氣符六陽鍊真造化玄元白氣灌溉死户生根七陽絳實紫光之氣符七陽運布平會百川身度始青返胎朱庭八陽金真命仙之氣符八陽爍爏形合精延內外瑩潔身外身存九陽大皇寂玄之氣符九陽九氣雲騰露凝結秀黃華冠帶玉堂帝會玄玄離合上清九背符日月右二小符書於九符之背並用三光呪目東北起隨方氣訣九陽誥式太上太極金書祕字三光九真隱符鬱單無量天魂精祕音內諱玉佩開陽上符帝真胞命元玄一黃演之氣書第一章混合空洞氣生神苐一章右告下中央中皇之位普掠地獄主者拔度亡過某等魂制魔保舉度品南宫死魂受鍊仙化成人生身受度劫劫長存隨劫輪轉與天齊年永度三途五苦八難超陵三界逍遙上清一如告命太歲年月日時告下法位臣姓某承誥奉行九符告文換易式上上天明陽胎命南方離宫午位火翳地獄梵監天始陽魂命東南方巽宫辰巳位銅柱地獄寂然天太陽𩲸命西方兊宫酉位金剛地獄波羅天上陽贓府東北方艮宫丑寅之位鑊湯地獄洞玄天元陽靈府西北方乾宫戍亥之位火車地獄靈化天正陽元府北方坎宫子位溟泠地獄髙虛天通陽華府西南方坤宫未申之位屠割地獄無想天萌陽嶽府東方震宫卯位風雷地獄右法九天九陽九氣九章九獄可子細隨符換入不可苟蕳恐致誤事又九陽梵氣符誥式玊清誥命九陽真文三合九氣八十一天上徹福堂光接三清鎮運璇璣調順隂陽中照境域滌蕩妖氛下開九地幽夜光明輝映萬有啓陳十萬地獄敬聽咸發悲心聲光互應悉遍虛空三途九夜無處不經拔度亡人承斯道力普掃超升一如告命第一壘潤色地土皇君符第二壘金剛色地土皇君符第三壘石脂急地土皇君符第四壘潤澤地土皇君符第五壘金粟澤地土皇君符第六壘金剛鐡澤地土皇君符第七壘水制澤地土皇君符第八壘大風澤地土皇君符第九壘洞淵無色綱維地土皇君符破獄九天符破獄章師曰按太一真科凡立九獄於地戶上以土沙砌壇九所方闊二尺九壇如一四維總方六尺以法地之隂極二六之象每獄作四角三曲一獄各然三盞之燈盞內安符中安獄牌牌上書符上懸九幡幡上亦依式書符又云面書本方天尊背書十方天尊符幡頂書九獄符兩手寫破獄符呪告文足却寫某符告下某獄以竹几莖插之又式以黃幡九首書九天生神氣符每破一獄焚一幡以一天幡挂其位中立大幡一首書青玄寶號任風飄揚萬罪皆滅宜依法施用不可缺典十天玄化符太一救苦天尊隨形赴感尋聲救苦天尊應念垂慈九幽拔罪天尊隨方救苦朱陵度命天尊回死注生廣度沈淪天尊聖力無窮天尊法橋大度天尊弘濟無窮天尊轉輪聖王天尊隨願往生天尊大慈大悲救苦真人大慈大悲大惠真人四極神童稟受符命敕三官九府四司五嶽九幽六洞天宫鄷都主者普行救度一切亡魂出離地獄上生天堂急急準靈寶大法律劃一茟逍遙快樂天尊接引往生天尊右符黃紙朱書玉訣東氣粘於童子九獄主者牒前合同十方救苦天尊符清微天禹餘天大赤天玄元始天尊靈寶至真無量度人大洞真師玉皇至尊今日頒行十方無量丹皇上帝曲赦寒庭南斗上生疾除罪簿可韓奉命洞浮敬從敕苦尋聲太一天尊元皇誥文入神合形雲內灑布幽牢立破蓮池芳香東方天尊無量度人曲沛洪恩升濟重泉依命並原上升三天南方並同上呪西北東北東南西南西北上方下方並同前五方玄老童子真人下拔亡魂萬萬苦爽十方億劫應化天尊順氣法明分身下降太一奉命時刻無停諸天分布惠光丸色三氣遍照無間幽狴𡨚仇和釋死魂上生風文驛傳萬神稟敕一如告命時刻升遷手執靈杖破滅鐵城隂𡨋獄吏稽首送迎右符文曰淨鄷都開幽夜寶誥别有告文請五帝䇿杖符請九靈䇿杖符真官䇿杖呪真官臨獄拔度敕苦三元上宫光明照耀洞朗虛空五靈紫䇿輝映十方下極無極長夜九幽劃破圖獄一一天宫皆朝元始急急如靈寶大法律令九獄幡符東南西北東北東南西南西北中央九幡首符東南西北東北東南西南西北中央九獄燈盞符東南西二東東北北南西南西北中央右九符焚時念三星煌煌呪燈符右符念茫茫鄷都中呪搯煞文焚盞內東方玉真梵氣符三陽之光妙氣纒結永破風雷九壘遵令九氣生煙玉寶慈尊皇上正氣流降真空雷電息威驅消迅風戟戈摧折罪惡傾崩元始符命升濟魂宗告文九氣青華光耀風雷玉寶慈尊摧戈毁戟扶晨通照魂升太微神識受錬享福無期一如告命太歲年月日時告下法位臣姓某承誥奉行南方玄真梵氣符六陽之光照煥隂獄火翳停焰幽夜開明玄敕奉行三氣丹華萬福玄真吹吁陽光拔度苦魂火翳頓滅炎生威風炮炙塗炭法雨慈雲慧光布化罪考消蠲一如告命群靈敬聽告文三氣丹華光徹火翳萬福慈尊蠲消火化化成春園甘涼瑩肌苦魂承恩逍遙無為一如告命西方太真梵氣符四氣合陽分隂威化金光摧毁𡨋曹遵承七氣素英太妙至極金光寶耀普度魂識鐵杖考掠永使解脫金鎚刀義應時消摧天慈赦宥無敢有違魂登太素逍遙神儀告文七氣素華照耀金剛太妙慈尊摧鋒滅芒刀化騫林劒變柏桑魂𩲸受度與日同光一如告命北方上真梵氣符五氣順度玄光合真溟泠變溫幽曹奉行五氣玄精玄上玉晨九和陽光普濟靈魂清香周布穢惡敬傾氷戈霜刃消除無根九天道氣永除寒扄罪考解脫徑上南宫告文五氣蒼華光徹溟泠玉晨慈尊氷消雪城溫生寒廓毒汁澄清魂獲妙果飛升香林東北方仙真梵氣符梵氣定極斗運旋行鑊湯停沸九夜除名鎮劫保運神景慈尊化形救苦度仙上聖慧澤流布鑊湯滅釁沸煮火爛復形端正湯化甘涼蓮生清柄永出苦獄普登元應一如靈命鬼官敬聽告文梵氣晨華徹照鑊湯度仙上聖應感無方沸涌澄息化甘泉漿亡爽生神徑升天堂東南方度真梵氣符斗稟四度真氣混康銅柱摧折隂府消愆生化梵陽一氣好生度命大聖普度無窮焦爛生肌熱惱散衝炎然銅柱永滅無熒苦除罪考上升仙宫告文生氣之華下照東南銅柱摧落炎𤔵息間好生度命普濟無間苦魂解脫升度玉壇一如告命西南寶真梵氣符六合分治回尸返生屠割停考隂府咸原坤蠡虛皇太靈髙尊景色元輝下照幽宫風刀割切摧刃銼鋒罪魂零落肌體復充永離荼毒隨證仙宗告文黃華月輝透降坤維鐵城摧毁屠割停威虛皇慈尊保度浮𥠖罪魂登蘇劔刃悉摧一如告命西北方命真梵氣符九氣肇運咸覩陽光火車俱住萬靈振降乾靈玉真無量太華元元正氣廓照無涯火車毁輪消滅蹤瑕潰爛腐魂變形玉葩神聚魂凝上詣仙家告文玉清祖氣罷對幽堂三星煌煌元始開光有罪無罪得赦某方寶光照映普登天堂此九符書幡頂上兩手寫呪兩足寫告文焚九獄符搯上帝訣東氣存元始九氣彈入獄中東方獄牌符呪曰青陽青帝震宫之精流光下照洞徹幽𡨋摧破地獄風雷悉停急急如上帝律令南方獄牌符呪曰南炎赤精離宫耀明下照萬重無幽無冥火翳除𤔵除熱得涼急急如律令西方獄牌符呪曰白帝剛騎誅斬妖魅乘氣驅馳飛戈走吏下破金剛救護一切急急如律令北方獄牌符呪曰重隂𡨋𡨋黑龍持符徑逹重泉罪無久拘北帝有令違者必誅急急如上帝律令東北方獄牌符呪曰重隂之境罪業之門鑊湯煮漬考掠罪魂符命一下善惡悉分急急如律令東南方獄牌符呪曰九龍符命下入重泉積劫滯𩲸無路可宣銅柱之苦咸蒙赦原急急如律令西南方獄牌符呪曰三光普照幽冥陽關積釁不原萬劫可哀魂離屠割獲登天臺急急如上帝律令西北方獄牌符呪曰炎炎之心重重之罪火車輪轉受此苦會符命下逹九幽罷對急急如律令中央獄牌符呪曰乾坤交泰二氣咸通元始符命萬聖咸從一切地獄永扇慈光急急如上帝律令右九符書九獄牌上毀鎖符太上符命普度幽魂出離苦夜徑超玉清右符黃紙朱書升天普度訣東氣張門符貪巨祿文無武破運七星氣入先天先地先人日月之光耀明三界真元所化神之最靈大浮𥠖間一用同更三尸守戶與神合并七曜開門萬神咸聽洞中玄虛光獄獄戶神光破暗獄吏淮符鐵城開毁劫柱清虛滅靈猛將吳通啓逹攝名幽魂來詣壇所急急如律令二符告文具位臣某為某修建黃籙大齋拔度某人以今點燭九獄神燈頒告玉清寶籙破地獄真符準今符命時刻升遷天牢地獄𡨋關幽扄長夜泉曲一切𡨋司主者敬聽上玄符命開關啓道毀鎖張門放諸罪魂九州十道一切亡魂不以罪業深重釋放部衛前來制魔保舉度品南宫死魂受錬仙化成人生身受庭劫劫長存隨劫輪轉與天齊年永度三途五苦八難超陵三界逍遙上清一如告命太歲年月日時告下具法位臣姓某承誥奉行右二符臨破獄先於燈上燒驚灰手上存想次布於九獄中回光符元始一氣散耀諸天靈寶陽晶鬱儀之君光回九地輝映八𡨋太玄隂景結璘之神炎光熱惱廓照生明引日月星合精氣神六合內外破暗生明青玄天尊救苦破鄷都赦罪真符大明出東浮羅陽光紫氣鬱秀變化皇老天寶君靈寶君神寶君太一青玄九龍正氣破獄滅考十方天尊混合成形上有三十六天下有三十六泉分形散景變化億千所指鐵城摧毀罪業消蠲九色圓象遍照諸天魂神受度敕降青玄急急如律令凡破獄預以青紙書青玄破鄷都符陽日朱書隂日用墨書依九龍符存用吸氣入符臨破獄懷於心前每獄焚一道至普掠獄指搯靈寶訣取中祖氣默祝化形呪同回光符焚於普掠獄中再心呪曰敕吒哩現光明念三遍瞑目存燈光化成百寶祥光上逹九天下徹九地存前符化無量天尊遍詣諸獄救拔罪魂乘光而出幽冥也化形呪吾師救苦天中尊常行化形十方界以此威神興大慈救彼衆生無量苦九夜重昏幽暗府普令廓照生光明牛頭獄卒盡升仙萬苦沉魂俱解釋三途五苦諸囚繫萬苦停間上紫清見聞有識及有情感此皆成無上道祝符破鄷都呪玉清大道流化寒庭青玄太乙分散真形照燭羅鄷幽狴幽精罪消億劫考滅三塗魔王敬命稟令三清隂官鬼吏並不憂驚氷炭爐火永使幽𡨋鑊湯劔戟原宥俱停元始萬神救苦罪刑徑升太一受錬朱陵破鄷都告文太上玉清寶光梵真元始威章拔度寶籙道君有命敕付崑崙破毀鐵圍羅鄷幽隂十方三界泉曲神鄉三官九署十二河源解釋亡過億劫罪源落滅惡根疾除罪簿不得拘留時刻升遷萬神護送徑詣南天隨品受化更生福鄉一如告命太歲年月日時告下具位臣姓某承誥奉行封皮式太上破鄷都赦罪直符告下十方三界羅鄷泉曲河源主者具位臣姓某謹封右符如破鄷都可用黃紙朱書告文墨書青紙作封套朱題其面北酆章師曰北都羅鄷有山髙深莫測萬劫黑暗四圍上下分布幽獄囚繫罪魂備受諸苦既建大齋當推心普濟廣度沉淪宜依鄷都山真形設象然燈以贖亡者之罪用諸符命開泰幽扄拯拔無間矣玉清淨鄷都開幽夜寶誥此書十方救苦天尊符符見破獄章告文玉清大洞寶籙頒宣真靈奉令救拔寒庭符火洞朗赫奕重泉𡨚仇釋散業纍咸原十天詔命普救無邊河原泉曲幽夜開宣氷池消化劔戟為騫魔王鬼吏俱變為仙拔度亡魂永斷扳援疾除罪簿不得拘連死魂受度與天齊年元始玉符生化自然一如告命太歲年月日時告下具位臣姓某承誥奉行宗師朱陵度命天尊真師尋聲救苦天尊祖師統天元聖天尊玉清寶誥告下北都羅鄷主者具位姓某謹封玉清淨鄷山開東方諸大地獄寶誥告文玉清元命蠲破寒泉隂冥重漠晝夜無邊承符肆燭永散咸原罪魂升度鬼官升遷真王有命斬斷𡨚愆拔度亡人鄷山摧罷永劫長年一如告命太歲年月日時告下具法位臣姓某承誥奉行玉清淨鄷山開南方諸大地獄寶誥告文元始玉符普燭鄷山晝暮炎池廣生隂精真王帝命酆關蕩形制魔保舉罪惡散形慈光肆朗業罷寒庭敢有違命時刻無停拔度亡人魔王隂官稽首送迎不得拘留徑升上清一如告命太歲年月日時告下具位臣姓某承誥奉行玉清淨鄷山開西方諸大地獄寶誥告文三天玉篆大羅靈章鐵關摧戟炎戶絶煙魔王拱命鬼吏升仙玉符焚燭永破酆泉靈光接引罪考俱原悉變淨圍絶酆山緣拔度亡人罪魂升度蓮浦飛仙玉清有命時刻升遷一如告命太歲年月日時告下具位臣姓某承誥奉行玉清淨酆山開北方諸大地獄寶誥告文玉清玉篆普照寒庭幽獄重城黑氣朗明寶慈慧光洞煥照清慈雲廣布穢惡芳馨罪滅鄷山盡境超升永辭楚毒徑升帝庭超陵三界宥對停輪真王降命魂升上清一如告命太歲年月日時告下具位臣姓某承誥奉行玉清淨鄷山開中央諸大地獄寶誥告文玉清梵寶符火靈章五氣玄通中制重隂鄷山罷對萬劫𡨚囚違天者赦逆罪者恭祖真親詔普度無窮拔度亡人重隂鬼吏徑上南宫一如告命太歲年月日時告下具位臣姓某承誥奉行青玄上帝總開鄷山諸大地獄真符告文玉清符命告下酆山諸大地獄主者𡨋關厚土牢檻主考去處原宥亡魂徑辭考對速赴玄壇上升道境逍遙十天衣食自然受諸快樂一如告命太歲年月日時告下具位臣姓某承誥奉行青玄上帝開鄷都上方諸大地獄真符告文太玄寶誥太一玄章告下鄷都諸大地獄𡨋關主者九壘水府扄夜鬱單無極神鄉金剛無際𡨋冥長夜幽關去處原赦亡魂疾除罪簿落滅惡根上升仙府受錬自然長登快樂一如告命太歲年月日時告下具位臣某承誥奉行青玄上帝開酆都下方諸大地獄真符告文玉清寶誥太一青章告下酆都諸大地獄冥官主者九天曹局十方六洞原對亡魂億劫重罪不得拘留逼合鬼羣受鍊南宫上升仙境快樂無為一如告命總篆祝呪玉清訣東氣玉清寶笈丹書祖氣赤文玉字赦原九地開赦幽骸悉除萬罪天王律令隂曹速行符火洞煥赫奕重牢靈光朗耀總破氷燭寒鄉幽爽承命逍遙急急如元始上帝敕上清靈寶大法卷之四十一
