front:
  text: 上清靈寶大法卷之五十二寫一
  hash: sha256:f07ea6bb6b23f09a758277c969650e3829cb12ee757e885599cf52e8b03da693
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5g0030_HFL_052-001a, image: hfl/0958/0958-004.png}
body:
  text: 洞微髙士開光救苦真人寧全真授上清三洞弟子靈寶領教嗣師王契真纂大煉符篆門玉清大洞生化一十八符生腦符右符白地黑書辰文上方氣呪曰腦君泥九赤文混洞君字噓噓吾奉玉清敕速降元氣成攝生眼目符右符白地青書中指上文引搯二指中巽氣七斗陽生訣七斗隂生訣呪曰目君目神通光君字玄真吾奉玉清敕速降元氣成攝真王有命日月無停帝君宣化煉生萬神光輝帝陛玄映萬生混合自然上升玉庭生舌神符右符黃地朱書辰文巽氣赤靈訣中氣呪曰舌君告神騰陽君字正生吾奉玉清敕速降氣氣成攝玉清靈章普化丹元舌神騰陽萬寶宣祥玉清寶篆煉化正生死魂受度上升福堂生心符右符青地朱書中指上文東南氣呪曰心君心神玄珠君字玄玄吾奉玉清敕速降元氣成攝生肝符右符素地青書卯文旺方氣天門訣呪曰肝君肝神青帝君字孟先吾奉玉清敕速降元氣成攝玉清玉符生化自然魂神生氣上升玉天升度煉化億劫無邊肝府萬神與天齊年生脾符右符白地黃書中文中氣玉訣呪曰脾君脾神紫庭君字延年吾奉玉清敕速降元氣成攝髙上玉文生化紫庭表裏洞徹煉質返仙玉符宣召安坐中元萬神敬聽風火驛傅生肺符右符黑地白書四指中文呪曰肺君肺神皓洞君字李成吾奉玉清敕速降元氣成攝生腎符右符白地黑書中指根北玄氣玄宫訣戌辰局呪曰腎君腎神太淵君字永都吾奉玉清敕速降元氣成攝大明萬寶鍊化生身死魂受化腎神太淵神生命舍永都萬全永保安寧生化自然上步玄天一如告命生隂符右符黑地朱書中指根引搯中中西北氣呪曰隂君隂神續命君字伯強吾奉玉清敕速降元氣成攝生胞符右符白地朱中指中東南氣十二經訣呪曰胞君胞神元常君字秋夫吾奉玉清敕速降元氣成攝真王有命煉化重泉胞元宣通與道自然根元適徹下鎮淵元百神守舍保命延年生胎符右符青地白書辰文元神氣八景訣呪曰胎君胎神含生君字寅和吾奉玉清敕速降元氣成攝五帝宣符煉化胎元洞陽五氣永鎮靈仙混元洞真紫戶升仙解結符右符朱地黑書三陽訣五氣呪曰結君結神九華君字彥遐吾奉玉清敕速降元氣成攝玉清寶篆盟告十天𣑕度隂尸解結無邊胎絡分散穢纍反生靈光下灌保命生根三華勃秀流芳自然解節符右符青地白書中指根西北氣呪曰節君節神杳皓君字空猷吾奉玉清敕速降元氣成攝靈寶三十二天解結節大洞三十六天斬故根生血符右符青地朱書中指根西北氣呪曰血君血神中幽君字良弼吾奉玉清敕速降元氣成攝髙上玉文化煉生尸黑帝流行禀質中幽脉絡遍布滋運神通元始有命生化丹虛與道無窮上步天衢生精符右符青地朱書子文北玄氣呪曰精君精神元隂君字祝祝吾奉玉清敕速降元氣成攝玉清洞陽生化元除內外充溢表裏洞虛永劫長存安鎮君居精神明朗榮固無虞上天玉符萬寶金書混成帝一中元不除生氣符右符黃地白書中指上文引至下文辰氣呪曰氣君氣神無英君字毳毳吾奉玉清敕連降元氣成攝髙上玉清道化生三氣形神具與天安神萬梵長存反覆天真無英祖氣毳毳化顚功圓道備上升玉輿生神符右符青地朱書中指根引至上節巽氣又已午未文中元氣呪曰神君神神天生君字靈父吾奉玉清敕速降元氣成攝玉清寶符混合萬神生化神真天生萬靈永保長生上升帝廷生元命符右符白地青書中指根引至上節巽氣呪曰命君命神正中君字長生吾奉玉清敕速降元氣成攝髙上大帝玉符生命命神天冲景氣長存使形受化煉保天根魂神內守永鎮天居玉清梵氣上升福堂告文玉清大洞金玄羽章飛空祕符書符右符告下腦神泥丸赤文混洞君目神通光君晨嬰君舌神騰陽君心神玄珠君肝神青帝君脾神紫庭君肺神皓洞君腎神太淵君隂神續命君胞神元帝君胎神含生君結神九華君節神杳皓君血神中幽君精神元徐君氣神無英君神神天生君命神正中君速降真氣煉化亡過某等委氣聚形全神復性一如玄科律令上部符上天虛無元洞九五太上阿房總御靈户王衡攝氣腦華元覩統御上部通神逹古中部符赤明開真三氣洞和洞納陽光五藏不怙三氣所保朱宫莊蘇納凉流泉生兀無徂下部符黃中理氣無生自尊胃管幽通六府俱存白氣公挑桃康命淳養育朱丹洞神往還上部八景符腦符髮符皮膚符目符項髓符躬符舌符鼻符中部八景符喉符肺符心符肝符膽符左腎符右腎符脾符下部八景符胃符窮腸符大小腸符司中符胸臆符兩脅符左陽符右隂符三尸符上尸符中尸符下尸符上尸符呪曰上尸愛欲自號彭琚受化九種鳥頭蛇軀混沌無心或沉或浮貪欲滋味華色自居走人魂魄司人過咎斷人命根氣散神遊放蕩三宫小蟲無劬真人甲乙書篆靈符色欲巳斷死路巳除元始有命請滅尸頭三台監形速出無留滅根絶種勿使餘遺亡者煉真三宫清虛五帝監映太乙定書吉日沐浴冠帶行疇飛度天界流景玉輿逐景上清乘空遨遊一如告命上升玉京中尸符呪曰中尸彭瓆號曰中黃愛欲自居倚腹逃藏沉浮變化形無常方執人魂𩲸走作三宫赤子馳騁使人發狂欲性喪神罪由小蟲真人甲乙上帝巳徴身佩玉符玉文金章列名元圖三欲巳亡元始符命斬滅尸形斷根絶種勿使飛揚亡魂受煉五府清涼真仙安鎮臟內生光五帝監映太一列行中元沐浴冠帶衣裳解形變景流景玉光飛升上清食息太空長保自然天地無窮一如告命上升玉京下尸符呪曰下尸彭矯貪欲自榮白色混沌骵無常形依人兩足恱動人情言我得失走作魂靈三宫攪亂赤子不寧貪欲小蟲假備幽冥真人甲乙三煉巳清欲門閉塞不受邪精元始急令三台臨庭速出無隱及爾弟兄九種子孫一時斬形五帝度真太一記名下元沐浴冠帶羽青去度三界上飲元精解形遁變流景上清飛玄步虛三界齊明一如告命上升玉京九煉生尸符章師曰夫九煉生尸法最為上道人始受生皆從虛無中來莫不資其昔業㑹遇今緣取象乾坤含懷日月變化隂陽神識往來萬化之中三焦潜凝九天𡨋運皆以九天生神之氣合和為生一月為胞鬱單天氣降為之二月為胎禪善天氣降為之三月魂具梵監天氣降為之四月魄成寂然天氣降為之五月化膽波羅尼密不驕樂天氣降為之六月化腑洞玄天氣降為之七月明竅靈化天氣降為之八月景附髙虛天氣降為之九月降神無想無結無愛天氣降為之身中神萬八千內外相合三萬六千神一時生身金樓玉室紫戶靈布匝繞身中表裏相應聲尚神具三元養育九氣結形晝夜不停布化轉變黃神受質故入在胞胎中人之受生莫不禀九天之氣而生今將九天之氣攝化布在於八方則死骸返生枯朽發煙罪纍蕩除九天混合萬神具全神識瞭然則魂獨超於三天法天象地含隂吐陽生神布化各有法訣纍行煉化可以升入無為九煉生尸法者按百單八數三十六天三十六混元將三十六亡人身中一元二儀三光四象五行六律七政九宫共百八數乃陽九百六之數聚天地之氣更生成人以天之氣生神以九神之氣生九竅上通天門聲尚神具上應九天九氣出乎太空之先隱乎空洞之中無光無象無形無名九氣列正日月星宿隂陽五行人民品類並受主成天地萬化自非三元所育九氣結形是故九月神布氣滿五神備具則成人身化生三十六上應三十六天下有三十六地莫不備焉除日月二氣覃照萬國是一百單六數乃應陽九百六之灾甲申大期也九天煉度陽符鬱單無量天魂精開陽上符混合元氣胞源宣通大道通玄惡根化消灌溉命門隂陽氣交元君遏户司馬洞謡滅度轉輪形與神同書混合空洞氣章右謹上請帝真胞命元元一黃演之氣九重奉為亡過某等纏其胞使胞元宣通上徹於天以生成一如告命太歲年月日法位臣姓某承誥奉行上上禪善無量壽天魂精明陽上符洞𡨋紫戶開度飛玄結胎黃房斷死斬根禪善靈氣精煉成容務玄尚生列備明堂混合相和胎結解根書無量結紫戶章右謹上請帝真胎命元洞𡨋紫戶之氣九重奉為亡過某等魂纒其胎使胎結解根下響於地以固靈一如告命梵監須延天魂精始陽上符須延三雲玄玄氣分坤儀定位乾象著分氣氣反根九開祿道胎生氣元魂生攝氣九轉成仙書須延總三雲章右謹上請帝真魂命元長靈明仙之氣九重奉為亡過某等魂纒其三魂使魂門通神以逹真一如告命寂然兜術天魂精太陽上符寂然無色靈化景分碭尸演由空洞生神騫爽合成九轉景靈魄户閉關嬰兒歘歌書寂然無色宗章右謹上請帝真魄命元碭尸𡨋演由之氣九重奉為亡過某等魂纒其七魄使魄戶閉關天王降仙以安寧一如告命波羅尼密不驕樂天魂精上陽上符採集空景回黃命靈總録具形開度生魂氣錬元藏紫戶生仙衆真交㑹聖毋慶年章洞幽靈天地始分五帝朝真書翻翻五帝駕章右謹上請帝真臟腑命元五仙中靈之氣九重奉為亡過某等魂纒其五臟使五臟清凉五帝朝真以存神一如告命洞玄化應聲天魂精元陽上符回化無影三氣冲融伐胞馳滯心超上京煉胎反𥘉混混魄壯魂化元一伏諾魔王書應聲無色界章右謹上請帝真靈府命元髙真冲融之氣九重奉為亡過某等魂纒其六腑使胃管生津以納和一如告命靈化梵輔天魂精正陽上符玄氣混梵列序真仙務猷運靈瓊房妙韻冲心自怡遨玩五神爽魂返根星宿朗明書玄㑹統無涯章右謹上請帝真元府命元髙仙洞笈之氣九重奉為亡過某等魂纒其七竅使孔竅開聰星宿朗明以開通一如告命髙虛清明天魂精通陽上符清明重霄真靈化凝煥落景霞空洞振音去留解帶明識生神超神方外整具形神書清明重霄上章右謹上請帝真華府命元真靈化凝之氣九重奉為亡過某等魂纒其八景整具形神使幽夜開光以全身一如告命無想無結無愛天魂精明陽上符玄玄虛中冥心清神靈感太虛潜凝神登內外無形稱為真人書無結固無情章右謹上請帝真嶽府命元自然玄照之氣九重奉為亡過某等魂纒共身使三關五臟六腑九宫金樓玉室十二重門紫戶玉閣三萬六千機關根源本始一時生神全神布氣氣滿能聲聲尚神具毛髮生身諸天下臨以保其生一如告命右九陽符並以黃紙朱書符墨書文外作封函上清靈寶大法卷之五十二
