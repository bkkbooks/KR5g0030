front:
  text: 上清靈寶大法卷之四十驚七
  hash: sha256:4c87e3c82d450dc372b1b852d3a6f3b065b19ae1b535f7a339e894a89567e041
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5g0030_HFL_040-001a, image: hfl/0953/0953-122.png}
body:
  text: 洞微髙士開光救苦真人寧全真授上清三洞弟子靈寶領教嗣師王契真纂齊法符篆門四驛章師曰凡建玄壇當建四驛庭專一承受傳遞符檄亦由陽間郵亭之象也所謂四驛者蛟龍驛金龍驛風火驛金馬驛是也每驛各有神吏主之狀如力士持黃令旗聽候差使須當依式書符召之方能感降也其龍二吏當用新淨茭縳之以像真形驛吏各左手仗劔右手持幡幡上書玉皇赦罪天尊背負青玄救苦真符如書筒之狀龍身龍口神吏之身並依式安符存用祝讃所謂蛟龍吏屬隂若遣役當地道功曹可往五嶽九幽水府雷司瘟司城隍社令牢檻等處救拔亡魂其金龍吏屬陽若遣役當同黃籙院功曹符吏可往三官天牢五斗天一北獄及羅酆重牢幽檻鐵圍無間地獄等處救拔亡魂蓋隂陽當從其類也四驛各有所屬其茭龍金龍吏所出巳具在長生救苦符之後餘並詳叙于左韋詳而用之風火驛師曰風火驛者有一院號曰火院有一判官主之院轄左右風驛火驛左者專一傳遞南院符命赦書文檄右者專一傳遞北院符敕文檄所謂判官即主管南北二院文書風火院判官馬勝青面三目簇金羅帽朱袍金甲緑靴赤髮仗劒或變身三頭九目管下兩驛之中各有判官十員驛吏三百人應所告敕書符籙簡章皆徑由主者逐一檢授或有訛舛皆積在此驛不得上逹各付所屬獄罪也凡建齊必先具公文申告乞為改正仍以此符差驛吏即為傳逹必獲彰感今符法後衆稱風火驛傳正謂此也召風火驛吏符右符黃紙朱書玉訣西北氣書用役呪可召驛中判官一員檢校符檄即差本驛符吏一員如有訛舛即便改正飛行傳逹也金馬驛師曰金馬驛有主者管下驛吏一百二十人皆雲冠朱衣朱履馳飛馬凡有緊急符命檄文所經三官五師九府四司羅酆北府三界萬神考録鬼營去處普告三界即無容隱時刻頒命神通威力毋有阻遏符命到處萬神咸聽也召金馬驛吏符右符黃紙朱書玉訣西北氣書之可役驛吏粘符於關前差一人遍歷三界十方傳逹符檄升度幽冥最為急速斯須可到役二驛吏總呪此呪三遍玉訣西北氣赤書玉字奉教遵承普告萬聖檢校速呈仰告仙吏風火勿停急急如律令茭龍身劵元始符命普告三官驛龍左傳合符受氣飛輝太空死魂受錬巳度無窮即時升舉母使停蹤急急如元始上帝敕金龍身劵元始符命普告酆都驛龍右傳遍徹幽途窮魂受度逍遙虛無今日遣汝急急如元始上帝敕茭龍㗸符地府茭龍救苦真符追取亡魂早離酆都來朝太上得升天宫急急如玉清律令金龍㗸符火府金龍長生靈符超度苦魂徑出幽都覩見光明上生南宫急急如玉清律令左童符右童符左童幡符玉清訣天門氣洞神逍遙功徹三清下傳符命幽魂錬精逍遙快樂南昌受形普召三界時刻不停急急如元始上帝敕右童幡符玉清訣天門氣玄都帝君玉䇿玉真疾雷風電雲龍輔神上徹三境下視風輪九幽開度魂𩲸成人急急如元始上帝敕化境章師曰凡主玄壇呪麈寰穢濁非得神化之道難格帝真故先假符文攝化然後捲簾奏謁開壇行事元始上帝變化金闕玉房符玉清訣東氣會合天地合明日月祥雲密覆瑞氣氤氲三華離便豁門五明瓊房有妙韻玉軒謡梵音霐持無鏡森羅淨霐金城耀目玉砌回旋大浮𥠖土碧落空歌告丈式符黃紙朱書外作可漏告文用墨書靈寶大法司今為齊主某開建玄壇修崇齊直延降三天玉帝十極髙真變錬塵居化為𥠖土者書符於此天中之天鬱羅蕭臺玉山上京大有妙庭金闕玉房中有帝真今日校録諸天臨軒執符把籙齊到玄壇隨所應度飛升上清右奉元始符命虛皇道君敕下建齊之所變化玄壇以成金闕符到奉行太歲年月日時下具位臣姓某承誥奉行封皮式元始上帝變化金闕玉房寶誥具位臣姓某謹封朝三天金闕捲䈴超玉陛符臣某朝謁呪曰始青大化慶合十天朝超帝闕合道靈仙玉文飛化永劫元元發盟初劫生化自然急急如玉清上帝敕朝謁符玉訣東氣臣某朝謁臣某朝謁呪曰大行梵氣周回十方三華離便大有妙庭金闕玉房森羅淨霐真中有神長生大君臣今趨化徑朝玉清急急如元始上帝敕右符黃紙朱書靈寶開壇符告文式右符宣告靈寶官屬守衛神祗今日欣慶受度歷關諸天請滅三惡斬絶地根飛度五戶名列大玄魔王監舉無拘天門萬神朝禮三界侍軒群魔束首鬼精自亡琳琅振響十方肅清河海靜默山嶽吞煙萬靈振伏招集群仙天無氛穢地無妖塵冥慧洞清大量玄玄一如告命太歲年月日時告下法位臣姓某承誥奉行封皮靈寶開天符命法位臣姓某謹封請光章師曰夫欲薦拔隂靈須得慧光之法方能降三光之慧以接凡火之光庶可照破幽暗追度沈冥如無此法只是凡火之光不能超脫法曰於正齊日午時面南對太陽焚香口奏吸氣吹筆以黃紙九寸朱書慧光符十二道玉清訣東氣以蠟封作炬應發燈光用玉清慧光符日月星光照破重泉元始一氣演化三光混合空同梵氣敷光天帝有敕告下十方太陽烜赫太隂耀芒三天有命乘晨希陽惠光普照幽夜停酸三塗罷對魂升王清然玉清符呪大道一氣開生二儀五行之祖斡運璇璣三才並立陽耀分輝天尊慧澤閳大慈悲今日欣慶三光録儀臣今所啓開發天機上生陽光下明幽途輝出重隂幽魂永離急急如上帝律令上清慧光符九日之光停午朗耀六合之精圓極返陽元始慧光靈寶慧光五星正氣列宿熒煌日為陽輝氣貫權樞月為皇華氣灌七元玉皇玉虛玉晨之氣之氣之氣三台煌煌天中尊仰幽幽冥冥酆都沉零淪陷三途受苦遭刑天尊慈慧光破重隂昏翳蒙照如日月光沭遇慧恩徑生天堂然上清符呪九陽至精三光通明日月晨華星光合明三華寶耀混合群晶三寶發華慧光發神長降飛空下燭幽冥慧光一照遍徹十方三途罷對五苦停輪火山息𤔵氷消雪扄刀化玉𣗳劒化騫林鐵城摧毁魂升玉清臣今上請願賜開明日月靈妃星光真人一十二員稽首奉行分燈散輝照徹寒庭急急如律令太清慧光符日光童子吁九日九陽光月光童子圓十月日月輝日光使者阿陀龍羅七星太一光照北海玉清天尊慧光上清天尊慧光太清天尊慧光三光合晨下徹幽府清微天禹餘天大赤天三天正慧光景合離天寶靈寶神寶道經師力普照寒池諸天天光億劫天尊一覩光明飛升天堂三天上帝普花十方天尊威儀慧光毫明救拔苦穢日華香燈月華神燈無虧無期百萬魔王拱手火毒消翳地獄傾摧幽魂得度元泉披靡太一中斗統攝光照無地八極急急律如令然太清符呪三寶訣三氣赤明開圖運度自然開明三景億劫之先今日大慶沉魂受錬重昏幽暗永閉寒泉欲請恩光普照冥關氷寒溫和爐炭息煙刀山劒𣗳永斷板援回光十方照耀諸天魂消五纍業除勾連三晨同耀永劫元元開明童子承恩上原三光玉女請如所言急急如律令取太陽大法法曰取午時先以陽燧火候日南宮方照華陽念太陽輝神呪曰明哉太陽耀神光洞三清氣散玄漠內靈煙生紫庭控御乘風霞飄颻淩無形急急如律令以香末面離左持鏡右執符炬相向默念呪曰日魂朱景照韜緑映回霞赤靈玄炎飈象呪畢以陽輝燧取太陽氣以符炬蘸油於香上吹㸃燭一燈於元始之前自此三晝夜五晝夜七晝夜終於四十九晝夜不可暫滅候盡再以燭續之如天色隂晦以木攺火為之故日中真火可以下徹九幽上騰光於三景普照福堂也玉清生化分布慧光符三光訣慈悲寶篆玉笈飛煙華燈布散普照重泉三界朗明輝散十天重昏沭照慧及無邉今日大慶脫苦升仙道生一氣萬物生全元始威章生化自然急急如玉清上帝敕啓隂召陽章師曰夫金鍾玉磬之法所以召集自身之中隂陽二神和合天地驅遂厭穢召集真靈啓格十方通幽逹明追攝魂𩲸洞集息度無致妄耗有二神以主之故開壇之初必鳴鍾磬焚符以召集之交鳴者乃互出合為一所以錬隂成陽秉志純誠無妄想無亂志則可招靈今人之祭金鍾玉磬亦不逺哉陽神盧㑹之字炎靈身長八尺三梁冠烈火服右仗劒主陽間神祠淨天地穢驅百木精隂神盧同字永夫身長八尺三梁冠素衣大䄂仗劒立黑雲中主隂間冥司諸獄亦能淨世間之穢絶隂府之考掠辟非大將軍符禁壇大將軍符二符出神霄法中十二堂陛章師曰夫建大齊當先建十二堂陛召集髙仙真靈建齊行事且十二堂者一曰青華堂九朝吟救苦頌焚碧落空歌符佩魔王之章二曰神虎之堂每朝焚主伯主吏符三曰紏察司九朝彈糾焚降真召靈符四曰精思堂九朝諷天童經焚召飛天神王符五曰冥官堂九朝諷救苦經焚十方救苦天尊符六曰監生司九朝焚巳生未生符十天玄化符安鎮監生真文於案上七曰天醫蕩穢所九朝焚召天醫符淨天地符清神符八曰受錬司九朝焚度魂韓君真籙九曰黃籙院九朝焚九幽赦罪超生金籙十曰受生案九朝諷得道經焚回尸起死符五嶽破幽引魂符十一曰五道都府九朝諷中篇焚太一玉帝托生籙十二曰通章司九朝諷天童經焚開大符依式行之此乃分司治事青華救苦頌三首天尊發願大慈心救苦方方化善因五嶽四司皆稟命鄷都北府盡停刑真符告下咸蒙赦童子傳宣救罪人元始化身真妙用度人無量道方成二天尊誓願度衆生說法端嚴坐寶林獅子九頭分瑞相慧光一照廓重隂刀山劒𣗳皆摧折火翳風雷急罷停大慧大慈無量力鄷都地府盡瞻聞三天尊慧力拯隂靈救苦尋聲破鐵城弘濟無邊隨願度光明普照達幽扄慧風扇處炎煙滅法雨沾時發杇榮無量慈悲成拔度亡靈俱得面慈尊和不可思議功德碧落空歌符右符雙手辰文一覆一仰自心劃至髮際閉目存身為元始項負圓光執如意額中九色光明復化為五色獅子之座紫雲覆體瑩徹十方來朝即道氣取三氣入筆搯上帝訣丁立面東書叩齒九過咽液九過然後存五臟五色氣入符此符安壇場之上能召十方衆真下降能解穢又拜詞焚之行持吞之安鎮章師曰在昔元始天尊混元既判三氣開圖以大道元精真一之氣化為靈寶赤書凝結成文降於五方安鎮天地招命真靈上消天災保鎮帝王下禳毒害以度兆民制伏神鬼拯拔沉淪無所不為也故建齊之時立纂舒壇法天象地以九陽之地變為金闕玉陛然千真萬聖混同班侍至時東西未定形氣未安俯仰之間如運掌爾當以五方玉字敷落神真安鎮五方辟斥妖氛肅清壇宇參方圓入動靜方可延格帝真上期玄感法曰建壇用五老赤書一日清旦用混洞赤文章二日清旦用制邪玉文或元洞玉曆章三日清旦用靈寶五符設醮用大梵隱語事畢收符焚之具如玉訣之法東方青帝玉符隨方氣訣呪曰九氣化生青帝宣行登壇度死拱衛萬靈升度玄關安鎮萬靈急宣至化上升帝庭急急如律令南方赤帝玉符呪曰三氣丹天赤帝雙星南天度化登步玄壇安神宣命永保亨貞上元朱月上升玉堂急急如律令西方白帝玉符呪曰七氣素英太白流晶真文拱衛上造帝庭敢有干試以誅以刑金門皓伯風火無停玉符所告萬惡崩傾急急如律令北方黑帝玉符呪曰五氣玄精黑靈萬神龍天上告侍衛飛騰帝君明檢伯史分明玉清詔命普鎮宸庭急急如律今中央黃帝玉符呪曰玉清降氣俱㑹帝庭五老檢校營衛靈真萬惡所化三五交并日月上升風火奔馳真文成立依命安寧急急如律令右五符隨方色書先朝奏玉清請降運金碧黃霧五龍大神日月星宿齊臨化五內五色氣合成玉樓鳯閣峩峩森列朝奏章師曰行朝之序自入靖至登壇上十方香禮師宣呪發爐出官命魔復爐須憑符𢍆乃可通誠必獲昭感東方符南方符西方符北方符東北符東南符西南符西北符上方符下方符入壇燒香符子文五方呪符中文建壇符早朝跪爐香符子文午朝符午文晚朝符戍文一捻香符玉清訣二捻香符上清訣三捻香符訣太清無上三天符亥文玄元始三氣符辰文三五功曹符左右官使者符侍香金童符巳文傳言散花玉女符子文斗訣五帝真符符直日香官符子文午剔關啓土地符午文入戶符出戶符發爐敷落神真符復爐傾光回駕符設醮符申文書符呪唵伽義耶義疾帝吽帝吽化詞符呪曰靈寶有令詞達帝庭靈官有令真人上騰詞文速達急為齎擎符文交驛將吏護呈急急奉丈人律令右法申文未化詞時先焚香爐中玉清命魔殺伐前驅符上清寶光玉清慧光太清玄光七元星光照開道路白元尊神輪轉無色太一司命回度五常泛景太霞嘯咏洞章上遊上清出入華房十轉回靈萬氣齊仙赤明開圖運度自然過度三界位登仙翁元始玉敕真符命魔奔火前導通關含虛三皇領從滅制羣魔祝符呪中指訣南天清地朗萬化俱行凶魔故氣妖孽消亡玉清有敕潜化虛皇斬斷六天奔走潜藏太上符命電電發光敢有千試敕滅摧亡急急如律令玄謁洞陽飛化開黃三境布令宣命魔王玉䇿寶氣斬伐妖宗五帝受令宣魔上皇祥光靈氣洞煥流芳諸天接景北帝升堂玊官一化神神敬聽急急如元始上帝敕神公受命普掃不祥八威吐毒猛馬四張天丁前驅大帥仗幡擲火萬里流鈴八衝敢有干試拒遏上真金鉞前戮巨天後刑屠割鬼爽風火無停千千截首萬萬剪形魔無干犯鬼無妖精三官北鄷明檢鬼營不得容隱金馬驛程普告無窮萬神咸聽三界五帝列言上清雙手二十四氣靈罡大魔伐煞局焚時存元始降空玄之中念黃中䇿氣呪存元始降金光自頂而入兆身至絳宫結成金液丹光衝入溢中內外瑩明萬神朝禮三界廓然次剔中指中上清靈寶大法卷之四十
