front:
  text: 上清靈寶大法卷之十六觀一
  hash: sha256:43ca87a76e97ff827a458650369fa81ad19997b5682f5ba3ff099ab7a3cf0b7b
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5g0030_HFL_016-001a, image: hfl/0947/0947-004.png}
body:
  text: 洞微髙公開光救苦真人寧全真授上清三洞弟子靈寶領教嗣師王契真纂鎮禳攝制門赤書行用式法曰凡行赤書須先關告古者修真之士以五篇鎮禳攝制或投於名嶽洞淵以削罪籍上名九天即此是也凡投簡如告水府大帝削除罪籍當用銀木簡朱書以青紙為袋青絲纒之仍以金龍一條金鈕九枚用以匣盛投於三河之淵也如告五嶽靈山亦以銀木簡朱書籠鈕亦如前法埋於本命所屬嶽上或福地名山若告九地土皇亦如此式埋於所住之中宫也凡投簡之際發爐啓聖宣呪投簡復爐如式以文置之五方則五嶽仙官至若長齋百日精思不輟則天真下降但專佩此文亦得尸解朱書五色石上災殃自滅凶殘自消如不及到正嶽之山則於所居之地取四方之山亦可備五嶽但本命之方則為命嶽取象以招靈氣神無所往而不在然梵氣開煥出圖度世無文不光無文不明無文不立無文不成無文不度無文不生故百魔隱韻離合自然因以治事隨事以用文故玉書之赤文中篇之祕篆皆可離合而用也九書簡畢上書法位姓名本命年月日時願神願仙長生不死之道如告水府則續之曰九府水帝十二河源江河淮澤溟冷大神乞削罪名上聞九天謹詣水帝府源金龍驛傳其首則同式其未別作一行書太歲年月日時於某處告下各以簡書真文却以簡之陽面書告文用本法印印之凡投簡北向叩齒三通讀簡文畢次執簡宣呪如式告水府呪元始五老上帝高尊十方至真太華靈仙赤文告命無幽不聞上御九天請下玉文日月五星北斗七元中告五嶽四方靈山下告河海十二水源九府水帝溟冷大神今日上告萬願開陳謹投玉簡乞削罪名千曽萬祖九族種親罪相連纍纒及我身普蒙削除絶滅種根記名水府上言帝前七祖父母去離八難上登九天衣食自然我罪釋散萬神咸聞謹以金鈕關盟水官請如所陳金龍驛傳凡投山簡東向叩齒九通讀簡畢執簡宣咒如式告嶽府咒玄上開眀元始監真上帝五老赤書丹文天地本始總領三元攝氣召會催促舉仙高上符命普告十天日月星辰五嶽靈山天下地上冥靈大神監生主録南上三門開領玉簡勒名丹篇削兹罪書上輔帝臣千曽萬祖九族種親皆蒙解脫五苦八難去離三惡魂上九天死生開度萬劫長存今日上告萬神咸聞謹以金鈕關盟真官請如所告金龍驛傳凡投土簡於中庭向壬方叩齒十二通讀簡畢捧簡宣咒如式告土府咒天地開張九氣分靈三元洞府十方肅清五老上帝開真領生丹書赤文元始上清普告天下九土皇靈今日上告萬神定生我願我仙即得飛升謹投玉石土府太皇削除罪刑奏簡上宫列簿華清早得成仙天地同靈九祖種親腐骸更榮魂升南宫舉仙化庭今日告命萬神咸聽謹以金鈕表盟至誠請如斯言金龍驛傳五嶽靈山投簡式凡遇本命日甲子日遇立春日則書東方赤書自東方九氣起止攝氣舉仙計二十四字如立夏日則書南方赤書自南方起止應會太陽計三十二字若春分秋分夏至冬至則書中央赤書自中央起止普告萬神計四十字如立秋日則書西方赤書自西方起止制召上仙計四十八字如立冬日則書北方赤書自北方起止制到玉階計四十字並依本方色書白剌上記姓名年月如投簡九年則五方仙官到使青腰赤圭黃素太素太玄玉女來皆見投簡時叩齒十二通宣咒曰玄上高靈元始尊神大聖徘徊萬神臨軒三景敷榮慶雲四陳上告較圗推算九天今日啓願投剌靈山丹書赤字自然真文上告五帝記名玉篇萬神鑑映日月明言願度願生願神願仙天地星宿互照我身三官九府五帝大神普告無窮削除罪根元始大開莫不納言九祖幽魂受福自然三塗五苦永離八難得與三景同輝紫宸輪轉不滅身得飛仙宣咒畢讀剌了投於絶岩之頂便散香於靈山之上又叩齒二通向本命方咒曰元始監映仙名巳書三官九府罪惡永除散香五帝告盟太虛請如所陳萬劫長居安鎮星宿禳度天災式五方赤書各主召其方星官天文分度及天災若安鎮之則隨方而釋若東方則自歲星起止掃除災群計三十二字以青紙朱書露中庭九日九夜依法焚之散灰青煙之中併以青石刻書埋之若南方自熒惑起止正道驛行計三十二字亦以青紙朱書露中庭三日三夜依法焚之併以赤石刻埋之若中央自鎮星起止金馬驛傳計四十字以青紙朱書露中庭十二晝夜依法焚之併以黃石刻埋之若西方自太白起止受符北元計二十四字以青紙朱書露中庭七日七夜依法焚之併以白石刻埋之若北方自北辰起止明道動輝計三十二字以青紙朱書露中庭五日五夜依法焚之併以黑石刻埋之用時皆向東南散髮叩齒十二通咒曰元始上天三光高明回景照耀四方朗清運度所衝激陽流星五界錯越三流失寧五斗總辰七宿明靈真君大魁厥諱玉精夫人皇起字曰育嬰總御玄關回轉諸天今日客災玄告不祥謹以真文赤書上呈散髮訟愆披露丹誠惟垂玄鑑回復天經氣不橫越災不橫生焚燒靈文散煙玉庭上景監明普告萬靈氣清三關災滅丸真隂陽調和國土太平謹以金龍風馳驛程右咒畢露真文於中庭各按本方用金龍文鎮之隨日而焚又依方色數刻石埋鎮以燈照及紋繒安鎮為信攝制魔式凡受上法冝先攝伏魔精神明自致若東方則自東山起止稽延書三十字以青木剌朱書若南方則自北攝起止摧亡書二十二字以赤木剌黃書若中央則自敕攝起止當前書十六字以黃木剌白書若西方則自赤書起止帝君書十六字以白木剌黑書若北方則自北山起止滅摧書二十四字以黑木剌白書凡念咒皆向東北若東方九次南方三次中央十二次西方七次北方五次並叩齒三十六通閉息氣九口而仰念呪曰三元開明回轉天常運推數終百六乘剛大劫交會萬妖爭行北酆不拘放逸思宗群魔聳肆祅用天光上帝有命普告十方演明天度法教開張正道治民掃除不祥有何小妖群聚為場赤書玉文擒攝鬼鄉北酆三官逃命傳行千魔束爽萬鬼送形流鈴交煥激氣太陽金虎四邀天丁輔亡大小齊到不得匿藏元始所告列奏上蒼召龍天水神止水度水等式九天地間大劫之災洪水四出此符可以穰止或使蛟龍為通路開水徑以度身若書東方則自下制起止無間計三十二字以青紙黃書投水中若書南方則自南河起止不從計四十八字若中央則自中山起止普聞計四十八字若西方則自西山起止驛傳計四十八字若北方則自九河起止風馳計二十四字皆如東方式用時叩齒五通閉氣二十五息存身內心中生火出頂上燒四方山林草木及巳身皆為灰燼一道飛翔入青煙之上無所復遺思大水浩蕩除天下巳身化為蛟龍隨水而流因又叩齒二十五通呪曰上始回靈開明九元天推地轉三氣流傳五行相促運度機關隂陽否激結成災衝大劫傾訖蕩除妖氛九河受對洪流激川水母徘徊鳥烏合群日月冥會三景停關上選種臣排較玉文棄惡貴善清濁永分我系帝簡名列九天大災四會赤書所蠲是日告命萬神咸聞日月五星照明我魂五嶽靈山浮度我身無河水府溟泠大神開除水徑通利河津蛟龍映符攝山送雲負我度我驚馳四奔丹書赤字元始真文金龍驛程時刻無聞玄須奏御上對帝君右咒畢引氣二十五咽須臾自有水神開道在山則曰山浮在水則曰自開可謂臨厄而自濟倐歘之頃也若郡國有水災之時亦可建齋精思行之矣天尊於億劫之始運元氣真晶化生靈文以制御劫運保國安民宿有善緣得遇斯文上古之人淳和抱朴與道混同不伺齋戒行之立應未代時澆人心散壞宗正者寡違真者多欲行其法須依三元簡文立齋行道精心思念冥契上聖乃感通矣或不然者則魔試來干徒為之耳可選精潔之士於絶塵之地名山靈迹以祈通應以彰大道濟度之慈太上救物之澤弘化之士其勉之哉三十二天靈章寶文師曰三十二天玉字乃雲篆大梵之氣結空成文即元始靈書中篇大梵隱語是也大梵者天中之天也隱語者諸天祕音也自太皇天為始一天八字皆隱祕真諱之旨今冒禁略明其奧謂如觀音乃皇曽天內諱也無惒者乃日月出入之門名也緣邅者乃南北二斗君諱也洞浮者赤帝君諱也廓奕者乃神公北帝諱也陀羅者乃斗中二童名也吁貟者乃日月二童名也霐者可韓丈人諱也渺莽北天鬼帝之內諱也餘名三十二天帝中及神王諱也乃太上王晨大道君授元始天尊祕訣修行之微妙故按六十四卦而成其句以象中黃之數凡修錬之士當擇丙丁火旺之日面東南設香几再拜以黃素書之或鎮或佩則萬靈振伏召集真元以和三田更於本命庚申甲子八節太歲吉辰服之招真致靈日生智慧神光百神昭感飛真太虛萬災不干神靈擁護坐役朝謁所謂無所不辟無所不禳也如禳鎮濟度存亡以青素朱書安鎮五方再以黃素總書安中央於散壇之日安五方焚青煙中風散十方則所召所治無不克應是謂大梵無量之音也先當朝奏三天請降內誦洞章隨事行用立彰玄感矣東方八天玉字每一句配合一卦乃豫隨蠱臨觀噬嗑賁剝復無妄大畜頥大過坎離咸一十六卦書時搯震文取東方八天之氣吹身中面東咒曰眩昺煥落耿蘭幽芳澮蒲標竺載札猷元皇醜攝南方八天玉字每一句配合一卦乃恆遁大壯晉明夷家人睽蹇解損益夫姤萃升困一十六卦書時搯午文取南方八天之氣面南咒曰中寂虛一混華仙宗和暉陽堂赫胥耀同晶虛瞿吞攝西方八天玉字每一句配合一卦乃井革鼎震艮漸歸妹豐旅巽兊渙節中孚小過既濟一十六卦書時搯兊文取西方八大之氣面西咒曰遊惠照蘇陀伽含羅𡵨俱渺郁台映盧摩畢淑少都攝北方八天玉字每一句配合一卦乃未濟乾坤屯蒙需訟師比小畜履泰否同人大有謙等一十六卦書時搯子文取北方八天之氣面北咒曰元皇寶耀延靈鬱單榑桑敬禦御晨總玄洞妙宗明攝安鎮玉文首尾題式維某年太歲某甲子某月某朔某日某伏為某人謹齎法信詣靈寶大法司乞開建無上黃籙大齋幾晝夜滿散修設謝恩清醮幾分位謹以本方鎮信請法施行太上靈寶東方八天自然玉字靑帝九氣天文空真文東方八天自然玉字安鎮齋壇明露天地拔贖罪苦開度超生一如太玄女青符命律令具法位臣姓某告行右玉字並用青紙朱書隨方篆文只於中間攺云南方玉字赤帝三氣天文西方玉字白帝七氣天文北方玉字黑帝五氣天文中央大羅之天自然玉字黃帝一氣天文其餘並隨方攺之起敷真文自有科儀兹不再述所有各方祝語今具于左五方安鎮祝辭謹召東方靑靈宫中南丹西皓北玄中黃靑靈童子丹皓玄黃捧領東方真文南西北中央直詣本方九氣天中三七五十二無極世界東方地獄之中南北中央西救度亡過某使長夜光明死魂快樂無為自在隨願往生齋主歸命稽首再拜次隨方啓祝衆皆同聲誦本方隱語如式起真文總祝呪無上至真上聖髙尊布化運氣三十二天八會九光自然成文安鎮天地保制劫年元始符命普告三元下敕九地上關諸天中告海嶽名山大川今日上告萬神咸聞修齋行道拔度幽魂三官九府削滅罪根永度三塗五苦之源世世受福紀名丹篇神生天堂錬化自然生死開度億劫長存九天告命風火驛傳凡起真文先如式啓奏隨方禮謝收歸中央捧香上叩齒一十二通祝之又啓奏納之次以真文繒彩隨黃素表焚之禳災祈福亦同用耳中央八威龍文章黃中理氣統攝無窮鎮星吐輝流錬神宫巳上一十六字太上書於鬱羅蕭臺主召萬神上淸靈寶大法卷之十六
