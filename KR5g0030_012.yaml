北隂酆都血食之賔結連祖考近化姻親冡訟冥曹伏連火害延及生人諸不能治解者當擇淨室或曠野人逈靜之處取凈土建三晨玄樞壇三級毎級髙一尺上層闊二尺當中心皇宫設北極大帝天皇大帝中層闊三尺列北斗九皇南斗六司日月三台之位皆依星像然燈下層闊六尺列三元將軍十二支神太歳擎羊陀羅二使者四直功曹土地正神前列洞案書南北二斗諱於燈上燒以五色線自斗口牽至洞案下依儀關啓暗書匿過自謝已愆和合年命禳解灾厄但人道肅清鬼妖戢息或不及壘土爲壇則用白堊粉畫地爲三級依儀行之三晨玄樞壇禳灾解厄立壇式師曰凡一切灾厄禍難至大之事並從大赤金科建三天緫炁壇具式在前若小小厄㑹宜立生化壇髙五尺圓面徑九尺上立標柱上建天盤立斗燈九盞或不能以土築壇却用白堊土或以刃物畫一周圍以斗燈安臺凳之上以象天盤立斗之形若能一一依式尤更殊妙次備淨水時花名香細果醇醲各九分以彩畫雲馬九疋馬爲奔走之勢雲作飛逸之形於空隙處寫郷貫姓名隨意書所患灾禍因依並乞解脫令某過度永保長生及注年月日時毎一疋雲馬上書奏一星名次於馬鞍上各書斗符斗経者以朱書各星用一獻狀如常式臨火化之又畫雲馬六疋亦書南斗符在斗経中並同前式仍朱書三天育局符三道用一道令被灾之人於暗室中書平生宻事昧心之由實封并金錢九伯貫同雲馬焚之次以一道燒灰服之又以一道戴於頂中九十八拜而退一切灾厄立得解脫而復生矣三天育死局符又曰和合年命符右符下書某人命某歳某月某日某時建生上屬北斗某星主掌平生罪犯隨意書之願乞赦原謹請五星靈應帝君和某人年命急急如元始天尊敕本師真君令以朱書呪七次玉清北斗炁及本命星炁吹之飛斗式飛神宻奏訣曰先歩斗自柄入斗口復回至柄罩身再歩入斗口三拜至第三拜俯伏存身如法下丹田白衣入絳宫青衣入泥丸紫衣入畢想五臓五色炁以神乗之以舌爲度仙橋如長虹之狀隱隱而見良久漸漸分明面前有一池水水上見橋直入斗口自巳乗炁登橋至斗口見光明照耀如月之狀其中有玉殿金階即黙呼四直使者具白情意見使者入斗中逐一星宫奏之次見擎羊陀羅二使者下降檢察醮筵復奏星宫有斗中上奏靈官引兆奏事蒙㫖恩𠃔再拜便回又存如前至南斗中奏事次見火鈴大將軍六星童子下降亦如此檢察訖良久有紫雲異香或赤光入戸乃二斗下降忌孝子婦女雞犬僧尼見之燈上燒符魑𩲕魁𩲃𩵄䰢魓𩳐魒南斗符見斗經北斗符見斗經祈禳鎮謝立壇式師曰凡禳鎮祈謝當立玄壇亦如黄籙薦亡靈寳玄壇之式然事雖不同而儀矩則一亦開天門地戸但禳鎮之法増添十二支神挿鏡劒十二具用五色繒旛四十四首四色各八首安四方黄色十二首安中央五方然燈四十九盞八卦九宫十二爻神十二支大神三台九晨科式已行于世矣靈寳玄壇火鈴辟惡愈灾法師曰南宫有韓司火府中有赤文流火之章金真神印結丹霞之秀氣凝三光之玄文名丹天流金火鈴神印丹華映日金火騰輝檄龍召雷煉䰟登真翦伐水恠驅蕩隂爽愈灾却癘度厄辟病焚燒六醜降伏五魔侍印有一炁丹華上吏三千人火鈴大將六百人金光神童一百二十人請直印請暉隨印節度乃赤帝之緫章韓君之火鈴祕於丹炎之府輝耀之臺以絳瓊作文封以元照靈虚之章三百年以印給付南官之官佐化行功於下元者受之於心不示凡才妄泄受左官考罰造火鈴印式師曰凡造印擇丙丁日取木火納音者用靈地神桃向南之枝命匠刋造方面二寸一分厚七分刋印了埋於淨處東南隅上入地深七寸許日用香一炷焚於所埋地上三禮無祝而退如是七日了取出以流水洗去土用香湯浴之以真丹填齒如法祭之常貯於青丹黄錦囊中勿令染塵犯違正炁犯之則佐吏不降徒勞精思耳受持神印式訣曰凡受持取印札於肘後至丁曰丁時面丁方歩火鈴罡存王女真形六人呪曰魒𩳐魓䰢𩵄𩲃魁敕攝入印中存急急如火鈴攝右呪六遍毎遍取炁呵印上七日不得食肉及諸腥辛七日足第八日甲日甲時面甲方歩火鈴罡存六甲神將真形六人呪曰魁𩲃𩵄䰢魓𩳐魒敕攝入印中安急急如火鈴攝右呪六遍毎遍取炁吹印上二日不得食五辛菜果油至二日足第三日丙日面丙方歩火鈴罡面日叩齒九通存日光覆印穿齒同旋九重呪曰吁貟童子召光欎儀赤帝洞浮南閻吐輝玉眸詵詵萬惡詵詵臣奉師命不敢稽違光炁九纒丁甲隨持元皇口敕隂炁消糜呪八十一遍取炁八十一次噴印上至辰日戌時歩火鈴罡面斗叩齒七通仰面祝呪曰陀羅育𨗿清光斗晨太一靈童魁罡元君元皇妙炁育印通真至靈至聖違邪必應火鈴金光叱馘妖氛魁輝罡炁摧滅萬𠒋一印福生元亨利貞右呪四十九遍取炁四十九次吹印上如是畢祭了安之用印式大凡封山召神檄龍馘妖鎮水渡波愈瘟消患並左右手搯火鈴印歩火鈴罡面南存心火如絲入印齒交穿纒繞九重如赤光羅映畢即叩齒九通祝曰臣某上啓南上一炁宗神長生大君韓君司馬大神伏望特賜正炁入臣印中隨炁召降金真玉光八景大神火鈴大將開明靈童三炁上吏文秀舒光隨印節度煥赫天威焚蕩妖𠒋擲火前伐流鈴從奔風狂火伐所印利貞玉帝上命神公奉行急急如火鈴律令祝畢口引上宫正炁布印上次印之或印砂石沈埋水中地中或印尺素上吞佩之或印封泥上或印痛處皆不過三作必愈須忌穢炁干印干之則印破不神矣流金火鈴神印火鈴罡用火鈴訣搯左手中指至離文至甲下挑入印中火鈴印治病法訣曰凡有寒炁痛炁等疾左手搯離亦曰日君訣凡本多以辰爲日訣不知辰爲天罡也天黄炁陽精育䰟洞陽練明三炁故訣離爲日君訣也右乎執印當令動止詳緩毋使神炁輕浮範象師巫取笶世俗矣當行持去兆兩歩以印文向之即其位白一炁宗神長生大君小兆某疾上請真炁謹召流鈴飛晃赤炁帝君佐吏文秀舒光曜明㓕魔印攝次引日芒浹身心混合爲一復從鼻岀穿印彌羅兆身纒絡三匝乃止上清重明九斗陽芒火鈴真符又曰大止煉身符炎神炎神火鈴火鈴上通紫極下徹黄𡨋却妖煉䰟赤帝之靈火精二神化形流火三台流光煉胎䰟煉易質𩲸康萬邪殂㓕成喚飛揚上元賜福天官中元赦罪地官下元解厄水官天蓬大元帥天猷大元帥翊聖大元帥佑聖大元帥子丑寅卯辰巳午未申酉戍亥精神一德洞入火郷混合九炁緫炁虚皇吴天有敕流金震芒元天焕落貞利無疆急急急煉𩲸驅禳用書煉字呪南方之君赤炁之精熒惑使者丙丁將軍朱雀炎神赫赫陽晶五行造化萬物發生天帝有敕符到奉行人神受煉永保長生急急如律令書斬字呪結空成梵真炁自生赤書玉字八威龍文治病斬邪萬生安寧保制劫運使天長存急急知律令右符繞制百殺煉隂正陽朱書上清訣上宫正炁南向凝神染丹筆引太陽九芒下繞紙筆書之吞佩貼鎮皆可施用緫敕呪祖道玄真烜赫正成鬱儀皎質熒惑澡形赤明和陽理禁威靈耀明宗飄帝重光明戊巳之英中央鎮星掃蕩邪炁破㓕妖精海逢之沸木逢之燼火逢之㓕金逢之熖長離之主統攝飛行迷離奴那唵唵吽吽唵唵吽吽唵唵吽吽緫括張羅東海青童迷泥奴那唵唵吽吽唵唵吽吽唵唵吽吽急急如律令右呪訖存太陽光芒烜赫注入符中外有請炁行持具見玉音攝炁靈書上部三境真符玉清聖境上天天帝上清真境九天緫管太清仙境捉鬼將直玉皇上帝縳鬼將直五方五帝速降真炁五方真君炁隨符行筆行鬼神行筆住鬼神住神筆既住晷刻不移敕呪謹請太上玄皇妙道真君九天丈人仙官僕射五嶽尊神速降真炁入臣符中隨符所敕鬼死人安急急如律令右符朱書黄上三清訣天門炁吹祝了取五方炁吹燒灰香水吞下治疾立安一百刻三服見效中部輔翊真符紫微大帝敕煞鬼天蓬元帥敕煞天猷元帥敕煞翊聖保德真君煞佑聖靈應真君煞天關大神煞地軸大神煞敕呪謹請九天雲路上清追捉大元帥江巨源翟世寧趙子玉徐來中一依符命隨符前去收捉鬼邪治病安寧急急如上清元降律令右法紫微印黒書黄上北炁用一道燒人門用七道燒灰以桃心汁調服有返䰟之功也下部五功曹真符青帝護䰟東斗注筭青天魔王巴元醜伯赤帝養炁南斗上生赤天魔王負天擔石白帝侍𩲸西斗記名白天魔王反山六目黒帝通血北斗落死黒天魔王監醜朗馥黄帝中主萬神無越中斗大魁緫監衆靈黄天魔王横天擔力三官北酆至列言上清止無英公子至辭參髙真止三十二天至列言上清止敕呪謹請五斗真君五方五帝直符三十二天上吏禀奉上帝敕命風火不停回尸注生反死還嬰䰟𩲸和柔萬神安寜急急如律令右符先念玄藴呪次搯玉清訣朱書天門炁祝了東南炁吹淨水吞之無不禳治上清靈寳大法卷之十二
