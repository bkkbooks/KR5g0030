front:
  text: 上清靈寳大法卷之十二樓四
  hash: sha256:88ee22746eee79517a2ae4e77bb3400641bc406d9f82a6502f8a99ee8b630100
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5g0030_HFL_012-001a, image: hfl/0945/0945-004.png}
body:
  text: 洞微髙士開光救苦真人𡩋全真授上清三洞弟子靈寳領教嗣師王契真篡濟世立功門師曰凡立功建德各有齋法謂如天地否終則修靈寳金籙齋星宿錯度日月失昏則修天皇九曜齋四時失度隂陽不調則修五帝育物齋兵革四興則修太一聖真齋疫毒流行則修長主保命齋請雨祈晴則修洞淵五神齋師友命過則修黄籙齋是也九種隂功經曰星宿錯度謂五星凌犯九曜差𨇠妖彗出野次舍不順變亂經常也日月失昏謂日青無光日行失次薄蝕翳暈之類也四時失度謂春行秋令夏霜冬雷之𩔖也隂陽不調謂雨暘不時炁候差忒之類也國主有灾謂亂臣賊子篡權專制逼脅王命違和失政之𩔖也兵革四興謂八方未化藩戎侵境賊鋒逆臣四伐亂征鎮山壓野男號女悲互相凌殘之𩔖也疫毒流行謂時行瘟疫遍連城邑不祀之鬼乗炁爲沴以致野道蠱魅精恠妖邱惡獸毒物惑亂擾害之類也兆民死傷謂風動氣冷鬼邪侵犯山崩地陷水火相侵河海山川惡物興禍鬼邪癆瘵傳尸伏連蠱疰行病肆毒使斯民夭横非命死傷之𩔖也師友命過謂同學門人凡有一喜可師則爲師同一朝之學皆曰友凡傳道嗣法共志同門義等天親情無生死命過之後當竭追修隨事之宜是也此皆修齋行香誦經之本意謂之九種隂功其法若大事當建靈寳玄壇小事則建三晨小壇凡師友命過則量度誦建依黄籙品格餘皆按此法立壇陳九鼎埋三晨之象盖行持驗灾增減潔清壇墠備列好樂之具詳録五事灾狀啓所𨽻之高真則丹心合天五功乃就克臻升舉是爲隂功以宻行爲貴洩語外知其功不注矣立壇式法曰當取生炁方無穢污石礫淨土擇不經生死戰陣刑獄屠宰之地築壇三層若三晨壇每層各高一尺上層闊二尺中層闊三尺下層闊六尺三層各隨事設所属聖位上層以苻鎮之壇之上層埋三晨之像埋深九寸日居右月居左五星各從其方中層依八方排九鼎中宫一鼎附安珅位造鼎之法古者以金銀銅鐵鑄成或用新潔甆器如鼎之様燒成上作一盖器之外以朱書九鼎之名却於鼎内以黒書九州之名隨方分布各方先以朱書河圖數文文之上却安其鼎以鼎名向外平穏安之無使𣣱側先期奏聞上帝申牒壇中合属真靈移文所在地祗等神守䕶壇禁行亊之時汲九方清泉貯於九鼎之中法師口奏事情以盖覆之仍別設淨筵各依好樂備置儀物時花新果燒香然燈鋪陳如法次集善行清修同齋之士不拘人數共修齋直禁壇淨穢誠信精篤悉按古儀六時行香十遍轉經使丹𠂻上格天貺下臨非世俗常行讀誦之易也倘非善士心馳塵境口宣靈篇雖積累千萬無益於事凡功成德就啓九鼎視之仍舊以盖覆定若鼎内水清澄如初理之常也若小有混濁或别見異狀則有災變反常者皆爲妖可依式辯驗則可以知其所属分野灾厄未能全觧當别行愈灾法觧星宿錯度日月失昏符上層聖位天皇大帝太微帝君北斗星君五方五帝十一曜星君韓君丈人九天萬福真君妙行真人青羅真人中層聖位三台華盖星君二十八宿星君三元三宫大帝北極四聖真君十方飛天神王下層聖位八卦大神九州社令五嶽大神十二月將十二時直解四時失度隂陽不調符上層聖位虚皇天真五方五帝三官大帝四司真君扶桑大帝暘谷神王中層聖位五嶽大神九州社令四海龍君四瀆源王八卦大神下層聖位風雷雨部大神風伯雨師河上玉女湖中玉女海中玉女十二月將十二時直太歳尊神直壇土地解國主有灾兵革四興符上層聖位昊天上帝聖祖天尊天皇大帝太微天帝十方靈寳天尊四聖真君五師真君太一十神列位中層聖位三十二天帝十一曜星君十方神王九宫大神三竒大神太一神君下層聖位九壘土皇君五嶽大神九州社令城隍主者太一八門神君太歳尊神十二月將十二時直土地正神直壇神吏解疫毒流行兆民死傷符上層聖位昊天上帝十方靈寳天尊長生保命天尊妙行真人三官大帝五師真君四聖真君度厄尊神中層聖位三元將軍解厄度厄兵吏收瘟斬瘟大將軍天醫大神甘露童子清涼玉女下層聖位五方天兵騎吏九州社令太歳尊神十二月將十二時直城隍主者土地正神師曰大凡解師友命過具有黄籙齋儀此不贅述三晨小壇二晨像日像用金月像用玉右各經一寸如其形如無金王可以銀銅代之五星像以五色石瑛右如小彈丸大上真星宿好樂琵琶鳳管時花新果山泉五榖潔飯五色青木香甘松茅香大棗細茶旛五色綵綉五色太一十神好樂竹弓蘆矢印甲馬無鞍馬兵士木刀木鎗木劒木㦸緋紙錢黑紙錢繒五色時花新果九州分野大神揚州鄒混分野社令正神山宫釜荆州張象分野社令正神二宫嘵兖州費萌分野社令正神八宫蒼徐州賈萌分野社令正神四宫銅雍州盛季分野社令正神六宫寳冀州馮遷分野社令正神一宫昴豫州范𣏌分野社令正神五宫鼐青州祥育分野社令正神三宫罡梁州張謙分野社令正神七宫魁九鼎様荆二梁七雍六揚九豫五冀徐四青三兖八河圖式驗鼎内災福厄㑹法黒濁主水災黒渾雨滂黄濁風災黄渾疫疾黄穢蟲災字裂地動白濁字㸃小㓂白渾字滅兵災小渾濁耗旱災水紅赤字淡火災青渾飢荒如有非法變動並須奏白天省批報以别之如平常者則主一州平寧或灾變未釋當用九宫愈災法再解禳之九宫八節愈災法師曰南上之宫韓司主柄有九宫天星下降九地執奉天命司行災異一節主災炁一年主分五日主廵治一日主變令坎宫玄淵之神曰太一星也主兵水河泛岸决榖貴兵戈離宫丹炎之神曰天一星也主火旱草枯亢陽大灾榖焦民飢中宫厚化之神曰天府星也主地炁害坼土功地震疾病民勞乾宫飛雲之神曰青龍星也主霜寒大水小兵艮宫積隂之神曰太隂星也主隂霪霧霾日月無光震宫黄龍之神曰軒轅星也主迅雷烈風苦雨藩營多病重霜巽宫虚靄之神曰招揺星也主卒風雹雨損傷禾稼蟲蝗坤宫元土之神曰攝提星也主土功暴寒霜凍大霧偒殺草木兊宫金秀之神曰咸池星也主霜寒五榖折毀兵盗狂賊如上九星奉南上之命各主一節令之災異按九州而廵行多致剋制之宫而成四時失度隂陽不調也又有三清長吏太一神君專主兵革旱澇疫毒流行况紫微上宫天皇玄府青羅真人主劫數曆限推遷七政司括下元民灾國厄日月薄蝕五星變易失度差𨇠天折地震妖彗凶孛恠星異炁亦主九土灾祥也愈灾之法依九宫所管八節方位行用且以冬至日爲始先面東誦經十過以消冬至後到立春節計四十五日内九土之灾却自坎一宫爲始面北誦轉到離九宫成九過又面東一轉成十轉也以消北方坎宫之灾是一節誦二十過經也又如立春節先面東誦經十過以消立春後到春分四十五日九土之灾却自艮八宫爲始面東北誦轉到兊七宫成九過又面東一轉成十轉以消艮宫東北方之灾餘皆倣此並依九宫式次第爲之凡誦經畢並視侍經玉女玉童典行其意毎思一土如元始十遍二回說經之詳自始青至皆得度世一念一存思矣八節九宫圖立壇解禳式師曰凡九土灾祥毎歳十月下元普校大㑹之日上帝巳預定矣至十一月冬立一陽氣應灾祥隨炁昇潜積累同乎數者未即然至正月元日後灾祥發矣亦湊同乎數者不遭數者即候出乎數者巳盡灾祥始興而下世凡俗昏昧莫知逃既司洞玄仙戒不待臨事而消預於下元之後行功救世佐國安民擇同學至人九人於淨所建三天緫炁壇三級上層法天中層像人下層體地依制度築立上層圎面徑九尺髙三尺中層作八角面縱横相去限一丈二尺四寸髙二尺四寸下層方面闊一丈五尺五寸髙三尺六寸爲則又一法上層圎面相去五尺髙九寸中層八角縱横長七尺二寸下層方九尺髙一尺也上層用金作日像圓形九分玉作月像圎形十分以五石英作五星形如彈丸大却埋日像於卯位埋月像於酉位皆傍壇沿極處五星却按東南西北中埋於上層日月之裏相去三寸各深一寸地次於壇心上立衝天柱髙三尺二寸毎八寸穿一天盤作三重第四下一重安斗罡如曲尺燈架上層以青色彩泥如淡碧色以丹砂周回書二十八宿罡之形中層壇以黄色彩泥周回書靈寳五功符只書四維四道次書大梵隱語光明玉字按四方均布之又書三十二天帝諱於下却用寳鼎九隻或用甆石器亦得分安八方中宫者寄安坤宫上取深淵長流之泉貯於九鼎中未納水時法師九人各面九方執筆存想萬里人物山川城郭取炁入筆按九方數取炁存思且如離宫當取九口炁之類是也取炁吹筆了便於鼎中黒書九野之名將九方水煎沸納於器中使平滿以盖覆之安燈於側及置香爐於前鼎之後立牌寫九炁丈人之位下層亦以白色新泥填築四圍開八門及天門地戸壇畫八卦畫四海五嶽以中嶽俯坤方及畫九州分野依式鋪置訖並依三層三輪排列聖位悉令合儀畢至期行事於子午時入壇八方敷几案䄄褥以八人同志各典一方髙功却别立髙座在地戸上面天門而統攝九宫之職如此定了方可六時行香毎人各誦大經靈書各一遍同聲諷誦一遍共周十過仍各存心映内經法以意施爲至一晝夜六時畢於亥時入壇開器視之方見九土灾祥再依前行持又至亥時視之若器中水并所書字如常即罷壇設醮謝恩除灾度厄祈禳外並用此行持此乃大赤金科勿以私意妄行更易恐所行不應勞而無功矣九宫牌東方九炁緫炁丈人南方三炁緫炁丈人西方七炁緫炁丈人北方五炁緫炁丈人東北方四炁緫炁丈人東南方六炁緫炁丈人西南方二炁緫炁丈人西北方一炁緫炁丈人中央一十二炁緫炁丈人八門二戸乾方太昊祖天門坎方太淵絶水門艮方太安玄石門震方太原神雷門巽方太虚靈風門離方太明純火門坤方太釋九地門兌方太素衍澤門乾方天門巽方地户上輪一十三位三境位三左右玄真人二太一真人妙行真人青羅真人靈寳真人四相四中輪二十一位昊天天皇北極東華木公西元金母三官三四聖四五帝五四師四下輪一十四位聖祖太一救苦天尊十方靈寳天尊消灾解厄天尊九宫解厄天尊普慈護國天尊長生保命天尊大慧真人救苦真人真定光真人鬱羅翹真人光妙音真人太極真人三天法師曲尺斗燈九位北斗七元七左輔右弼第一層天輪三十五位十神太一十十一曜十一度人不死君南極注生大帝南極長生大君度世司馬大神好生韓君丈人太皇萬福真君扶衰度厄真君迴骸起死真君南斗六司第二層人輪三十七位法中仙曹執職靈官功曹金童玉女等衆一位在中央九州社令列在外六丁玉女列左六甲神將列右五方五行五嶽佐命第三層地輪六十三位八卦大神四海龍君四瀆源王太歳神君立太歳方十千大神十二支大神風伯雨師雷公電母霜雪上吏四直使者雹霰上吏雲霧上吏九壘土皇當處城隍監醮靈官直壇土地十洲三島大小洞天靖廬福地主者此一位立中兵三天緫炁壇禳度水旱灾厄法師曰凡天炁下降地氣不昇則炎火亢極旱魃爲殃也地炁上昇隂勃閉陽則溢水隂𩆍水潦爲害隂德則不俟來言陽功則有所懇治建癸壇則請澤立丙墠則止霪告暘谷而奏火帝青職龍而禱三官分限極則朝玉闕降符簡則檄雷霆丁甲施功太乙助力斗華摧妖治發敗正四女分𨽻和合歛翳功成百兆受澤徳先萬物滋茂言功謝過司位遷秩各列天仙之籍德邁神公之比苟且無功罰壽降職兆冝遵守母或怠焉訣曰凡雨也天氣下降地氣上昇隂陽和合則降雨凡旱也天氣下降陽氣獨運地氣不昇隂陽不和則炎烈亢陽火旱作灾