front:
  text: 上清靈寶大法卷之四十七圖五
  hash: sha256:fe479eda4ce2e6331243bc8490a28884f49a030cd17ae907c5e099014fa8dd8b
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5g0030_HFL_047-001a, image: hfl/0956/0956-070.png}
body:
  text: 洞微髙士開光救苦真人寧全真授上淸三洞弟子靈寶領教嗣師王契真纂齊法符篆門進簡投龍章師曰夫元始安鎮敷落五篇故五老上帝受赤書真文安天之根鎮地之源下鎮五嶽以奠五方斯實靈寶之根宗度人之樞紐上學之士希道求仙傳中盟之經佩靈寶之籙皆以赤書真文於槿木之簡面寫告文投之山川及住宅關盟三界削落罪根及於五嶽投龍進簡滅過消愆乃其本㫖也事見玉字真文諸經中科曰凡建黃籙大齊解壇事畢則用山土水簡以金龍金鈕玉璧附之所以紀勒齊功關告三元也其法實本於五老之赤書自唐張承先法師編敘齊科巳詳言之矣至杜廣成編集黃籙齊科則備述赤書之本未投簡之典格可謂坦然明白無可疑者近世有於三簡各篆一符且各人所傳符形異同豈知投蕳本意舍赤書其可行之乎今姑述三簡之呪開明其略且山簡呪有曰玄上開明元始監真上帝五老敕書丹文天地本始總領三元水簡呪有曰元始五老上帝髙尊十方至真太華靈仙赤文告命無幽不聞土簡呪有曰天地開張九氣分靈三元洞府十方朗清五老上帝開真領生丹書赤文元始上清再詳三呪之㫖皆明指五老赤書也若易以他符則與本㫖大相違背又呪文全不相合可不稽考也今依經㫖於簡後用五老赤書玉字篆之以義取之用為投簡之信此乃出於正經却非後世私師之比倘所傳各有宗𣲖而此格决不可易況投簡正涉三官之府罪福所係尤宜審思之所有赤書玉字巳具鎮禳攝制門今恐檢閲不便遂就中間摘取合用再具于左未免有重復之兼其有三符雖不當用亦俾存之以伺上學者之所證驗云設曰簡者記也紀世之功告盟上真上下正方各長一尺二寸闊二寸四分厚二分國家以玉為之蓋玉有九德禮天地之信也以下皆以槿木或柏木為之丹界五行丹書國號年辰建齊之所及髙功姓名投於名山大洞靈泉龍穴及埋齊壇之中告天地水三官使著明齊事奏于上境也每簡輔以金龍各一條龍者使負簡謄信於三官府也每簡又各輔玉璧一枚故山簡月蒼璧圓形虛其中土簡用黃璧方形虛其中水簡用玄璧六出形虛其中並徑二寸半又以金鈕二十七枚各徑九分圓其外如環之形每一簡用九鈕同龍璧並以青縣纏之青絲以代割髮金鈕以代㰱血上告三官也濟生度死修真學道皆一理耳但易其文與呪當細詳而行之無誤幽明矣山簡正面告文本貫某州某縣某鄉某里齊主某奉為亡某於某處修建黃籙大齊幾晝夜滿散祗設清醮幾分位仰答恩光齊壇解散恭依法式謹詣某洞天靈山投送金龍玉簡伏願天官賜福地府除愆酆山削罪幽獄停𡨚注名朱府運度自然見存得道往逝生天繒璧效信金龍驛傳一如告命太歲年月日於某山洞府告下法位臣姓某承誥奉行背書東方赤書二十四字土簡正面告文本貫某州某縣某鄉某里齊主某奉為亡某於某處修建黃籙大齊幾晝夜滿散祗設清醮幾分位仰答恩光齊壇解散恭依法式謹就黃籙齊壇投送金龍玉簡伏願地官赦罪罷對羅酆刀山斷刃劒𣗳摧鋒中黃戊巳上奏蒼穹有情衆類普度南宫見存得道億劫無終效信繒璧傳驛金龍一如告命太歲年月日於某處靈壇土府告下法位臣姓某承誥奉行背書中央赤書四十字水簡正面告文本貫某州某縣某鄉某里齊主某奉為亡某於某處修建黃籙大齊幾晝夜滿散祗設清醮幾分位仰答恩光齊壇解散恭依法式謹詣某靈淵投送金龍玉簡伏願水官解厄告命重泉五湖四海十二河源疾除罪簿息苦停𡨚亡魂受煉超度南天功加一勿注籍金篇繒璧效信金龍驛傳一如告命太歲年月日於某處靈泉水府告下法位臣姓某承誥奉行背書北方赤書二十四字告文變用式若學土佩受中盟求仙削除告文臣以某年某月某日謹詣三洞法師某受靈寶五老真文赤書靈篇三部八景諸天內音神仙二籙八威䇿文五帝符杖中盟衆經傳授事畢山簡云投簡靈山水簡云投龍清泉土簡云投簡中宫金龍驛傳乞削罪籍若為國家士庶建功告文今謹有某人上為家國下及存亡請福祈恩首愆謝罪修建黃籙大齊若修真之士於三元八節謝罪祈禎投赤書簡文出真文玉訣山簡告文法位姓某年月日本命屬某帝名係某嶽願神願仙長生度世飛行上清五嶽真人至神至靈乞削落罪籍上名九天謹詣靈山金龍驛傳土簡告文同前法位某願神願仙長生度世飛行上清中皇九地戊已黃神土府五帝乞削落罪録勒名太玄謹詣中宫投簡記名金鈕自信金龍驛傳水簡告文同前法位某願神願仙長生不死三元同存九帝水府十二河源江河淮濟溟冷大神乞削落罪籍記名丹篇謹詣水府金龍驛傳右三簡並如前法第一次每簡用金鈕九枚第二三次只用龍不用鈕也外有道士投簡節度詳見鎮禳攝制門山簡符太上三天天帝玉真三光鑑映威制山靈五帝回運仙道常興真氣貫浩山嶽藏煙土簡符太上三晨大羅居中九地坤載土府呈祥萬神朝合永祚綿昌水簡符太上三元敕制水源九江四瀆河伯育祥天河回運削罪九玄上清四季投簡真符春夏秋冬升度契勘門師曰亡魂受煉既畢當出給誥籙符劵與之收執前去所司呈驗合同以憑注生由世之誥敕憑據耳若無此則經由所至拘阻難遂超升矣太乙救生救死救苦超度朱陵真符法曰凡書此符先面東焚香三拜跪奏存太乙乘五色九頭獅子金光閃爍口吐青玄之氣心存九拜啓奏訖搯玉訣敕筆呪曰元始玉帝敷法至靈道法施惠授符超生如有愆罪急以除分汝現玉言萬神咸聽祝了取天門氣入筆次搯卯文念太乙號八十一聲取太乙口中氣入紙筆又呪曰奉太乙救苦天尊敕行亦念八十一遍取氣入筆又念八十一聲取青玄氣隨氣下筆書之元始符命開度死魂元皇大範度命朱陵靈符技度升入金門上開八門金光散暉救度苦爽飛升紫庭玄氣開度飛度五户無苦聲升玉清南昌上相玉宸元皇敕救拔死魂上生朱陵祝呪三天大羅髙上玉清元始靈書太上真文玄元大道敕降玉晨天洞天真主領魂神九幽主者六洞真靈禀受真符拔度幽魂天王律令隂曹速行急急如律令至聖神人巳成天真三皇之裔太上之孫億曽萬祖苦爽幽魂天尊大法十轉回靈赤書成章告下泉冥玉文一下摧毀鐵城符光洞煥赫奕重隂刀化寶𣗳劔變騫林炎火生蓮冰消雪扄三塗五苦八難超陵魔王隂官稽首送迎玉清元命一如奉行急急如元始上帝敕右法玉訣東氣告文天尊救苦仙道貴生上開八門飛天法輪普受開度死魂生身上清丹霞炎光世界朱明國土重陽宫中朝謁天君超度朱陵流火神庭火煉池申火膏冶煉蕩除塵垢受化更生紅蓮花上得成初學天人一如告命太歲年月日時告下法位臣姓某承誥奉行太乙救生救死救苦度厄天尊青玄上帝盟真玉匱度魂韓君真籙唵吒唎吽韓君司馬南昌丈人度命起死速消惡垢總監上天生神育質超度三天右給付亡過某魂執此籙命永為身寶所注生處永為證據者奉上清北極大帝敕九幽赦罪超生金籙無上虛寶籙降超度窮皇敕泉扄劫魂速生朱陵府太上弘慈悲濟生度死輪日月左右照下入開光門罪魂並停酸金籙度苦魂幽魂離浪津右籙奉敕亡過某靈魂執此隨願往生准祖師上清北極大帝敕太乙玉帝托生籙靈寶大法司今月日奉玄誥託生寶籙給付拔度久滯幽隂不得託化沉魂乘此符命者青玄救苦拔度重隂慧光所至廓照寒扄過度三界金龍負驛四天升入無形風火無停門王接魂上生右託生寶籙超度託化人間天上隨業受生一如告命太歲年月日時告下法位臣姓某承誥奉行玉清合同升天大劵師曰三皇內文有升天版劵得道飛升之時天尊遣侍真賜劵使骨肉同飛過度天門下世不許僣行此乃三天合同玉清寶劵上帝靈命玉皇真文給賜生身學士朝元謁真者拔度死魂煉魄南官使無拘天門也法以青紙一方拈成四門面用丹書劵文背書告文年辰法位共作五行以絳囊盛之繫以青練若學士心映當掛心前如度亡給化與天門吏曲度者須於芻身三天三寶陽日合并虛元玄都結氣成天南宫陶鑄北府消愆謹敕三部使者召制魂英佩負法身得度真元升虛入妙證道無為亡魂告文敕制地祇侍衛止受煉更生過度天門執送南宫生身告文某人今日欣慶受度止無拘天門玉清符命升度道境一如奉行太歲年月日時告下法位臣姓某承誥奉行太隂煉化升天大劵日月合光天帝梵陽真陽開化隂煉魂强公子輔黃寧總録具形神頭帶九芒身佩珠纓真度命明道回輪九陽真精煉魂登晨告文今日大慶告盟三十二天三十二帝受度亡過某等消滅三十六結根三十九死户惡根斬絶尸纍積滯煉化升仙三界保舉五帝司迎上詣天門無令阻遏急急如上清靈寶大法律令太歲年月日時於齊壇內給法位臣姓某告行南昌升天寶劵散形呪元精育飬灌煉元根魂神澄正萬氣長存不經苦惱身有光明急急如律令達朗視坡覩基化正宣天玄紀法主帝變津宜背符祝符呪元始祖氣苦爽幽魂皆即受度上升朱宫急急如律令告文靈寶大法司當司某今則齊事告圓煉度巳畢所薦亡某既得生尸成質合行升度南宫須至出給升天寶劵收執照據者敕制地祇侍衛送迎亡某等拔出地戶五苦八難止更生過度天門敕送南宫急急如上清靈寶大法律令太歲年月日時於齊壇內給法位臣姓某告行外封式升天寶劵付亡過某佩服超升上朝帝庭急急如上清靈寶大法律令具位臣某謹封此劵乃帝君敕拔度上世亡魂不可缺也右三劵並朱書用青紙角封長七寸闊三寸二分以絳囊盛之付亡魂收執生天升天四保舉符元始符命保舉狀泰玄都省謹奉道㫖為齊主某修建黃籙大齊升度亡某等魂超升丹界謹按靈寶本科合行保舉者右元始符命止逍遙上清一如告命太歲年月曰時告下法位臣姓某承誥奉行三天大法主正一天師歷關諸天保舉狀泰玄都省謹奉道㫖同前右歷關諸天請滅亡過某三惡斬絶無拘天門一如告命普告三界保舉狀泰玄都省謹奉道㫖右普告三界止河源上解亡某等及祖考億劫不得拘留時刻升遷一如告命右四符並朱書於保舉狀之前四狀並髙一尺二寸但歷關諸天一幅用碧紙其餘皆用黃紙墨書連四狀以黃紙作大可漏併封之敕制地祇保舉狀泰玄都省謹奉道㫖右敕制地祇侍衛送迎亡過某等拔出地戶永離鬼官魂度朱陵受煉更生一如告命太歲年月日時告下法位臣姓某承誥奉行外封式升天保舉文狀升度亡過某等魂具位姓某謹封右式前四符用青白二繒朱書貼於四鎮合同告下其元始符命係付亡魂收執合同四鎮合同劵又名金文玉劵師曰此劵乃天真皇人授於太玄真君次傳太極左仙公後青牛封君以傳鮑南海下世始有之用當如法四鎮合同以東一分黃素朱書付天門吏焚於天門南一分朱書白璧投名山福地巖穴洞天之中西一分青繒朱書付亡魂收執北一分刋於金魚之背投水中三官合契三元合同並書刋齊意及亡魂為首者之姓名其義蓋欲亡者所詣合同隨品受化也又曰以黃紙一幅朱書却取角分作四片貼四保舉符告下以東一分貼元始符命南一分貼普告三界西一分貼歷關諸天北一分貼敕制地祇若誥丈只隨保舉狀式四符外却以青素作可漏封函以朱題之依法施用四函題式東元始符命時刻升遷具位姓某謹重封南四鎮合同劵同前普告三界同前西四鎮合同劵歷關諸天同前北四鎮合同劵敕制地祇同前上清靈寶大法卷之四十七
