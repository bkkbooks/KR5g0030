front:
  text: 上清靈寶大法卷之三十六驚三
  hash: sha256:a10d1de3d0b75aefc327e6d7c6e7df44450da7e0cbff234a6dc1432885c7a1b7
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5g0030_HFL_036-001a, image: hfl/0952/0952-080.png}
body:
  text: 洞微髙士開光救苦真人寧全真授上清三洞弟子靈寶領教嗣師王契真纂神虎玄範門召將行持式師曰凡行召役之法先須內煉方可存神握固步斗集神或書玊札符命或發玉札或建隂陽二壇或召攝亡魂並當先行此事惟此變通庶可昭格法曰召將之初先如常式淨心口身了次存身為枯木左右手搯玉清訣發心火炎炎焚木為灰左午文右子文義腰存腎中真火如車運轉與心火交接起巽風吹灰去盡叩齒一十二通面天門吸混元祖氣一十二口閉息小時存天門降紫雲來入頂門存我中宫有黃白纒繞而出與紫雲交接想自身為元始再想太一從空來至兆前坐九頭獅座再吸太一頂中青玄之氣合元始之氣化作百寶光𦋇身存天門有紫雲碧霞其氣散處見神吏虎賁童女符吏並執節捧符兆乃拂袂於耳目後彈畢次通氣進前焚香叩齒一十二通以舌拄上腭兩運華池次引肺氣步提魂虎跡靈罡丁步一十三步兩手小指二指相交大指並搯中指中節念嘯命靈罡祕呪呪曰玄範北魁掌死生至道呼吸根蒂昌我行玉札金虎文萬神敬聽靡不從如有違吾大道者汝須黜職道不成急急如北魁紫微夫人歌章律令攝金輝斡旋齊七衡飛罡神虎開幽關回運天常履玄剛回素扶嬰定淑蘭泓遐扶盈映帝阿陵昌乘明盤兆羅和㑹七辰作一家離合自然有玉葩急急如中斗大聖勑右存神虎官將隨香煙乘紫雲之氣俱入印中祭畢絳袋盛之旋身面北呪曰唵俱賖魯析容吒盧𠰢攝左斗印按心前右劒訣義腰存身為青玄玉相叩齒三通髙聲召云北魁玄範府焚香關石日直功曹火急到來密呪存至如常式功曹既到為吾齎此寶香關召某將逐一關召召呪金門皓華太白七非庚辛祖氣化應自然召氣呼隂承飄素微元聿𩲸星飛澤返步幽𡨋萬神奉命急速奔馳急急如內真夫人敕命疾速律令寅文北氣一召玄天玉札神虎符吏混元真晶與符合𢍆太一玄冥通真合制追魂攝𩲸隂陽開閉萬神潜聽敢不侍衛急急如神虎大聖敕二召神虎玉札神伯主吏神虎大聖夫人內諱追魂使者攝𩲸兵吏禀受符命一呼速至宣告寒庭不得拘滯追魂攝𩲸形影顯現靈曹大聖來臨法㑹急急如上帝敕三宫訣北氣三召上靈大魔大定神光急急如令行神虎一到速若電光急急如上帝敕子午斗斗氣此三呪凡焚符召將祝發玉札符檄悉皆用之總呪玄天玉札神虎符文寅卯混元合𢍆辰太一玄冥巳追魂攝𩲸午開陽起隂萬神敬聽敢不奉迎神虎玉女神虎大聖酉追魂使者戌攝𩲸吏兵亥一召速至子不得稽停丑秉受符命中中宣告寒庭追魂攝𩲸視影現形來臨法㑹功奏午玉宸謹請某將速降玉清訣北氣行嘯命之道法曰三部使者居淵源宫二隂之首府總分召隂之氣神虎居三焦之首七玉女居七竅之穴陽耀隂靈在左右目下左右二聖在雙鼻孔下清冷尋魂神將在兩腎神虎使者等俱在華池之內以靈根七轉呼吸分氣散布升化而出壇前與法部神虎官吏合為一相隨意指揮但以一氣引接乘氣而來且嘯命者乃發心肺之氣結合作隂風玄霧飛發呼召神虎則心感形通神吏皆吟嘯而臨發玉札式召將如前入科三獻文見齊法啓祝門三酌了祝云領符度籙咸遵太上之科攝𩲸召魂並按玄師之㫖願馳飛馭快展修程具有太一玄冥混元玉札謹當宣告宣玉札宣關再念前諸呪祝玉札祝遣玉札呪太一紫元君天一北祚敕神虎㦸飛運招搖一統隨玉札所至處神虎所到處十方精光都一吸急急如律令右呪七遍吸十方精氣一口吹之元始符命總告玄冥玉女大聖隂𩲸降靈三魂急至七𩲸無停隂氣潜奔陽氣速程三官北酆明檢鬼營超陵三界逍遙上清急急如元始上帝敕右呪中文北氣握玉札遣將髙聲祝云咨示神虎大聖七司玉女三部使者攝魂靈曹諦聽吾言當職躬膺帝命掌握印章體太上而贊化度人統神虎而追魂攝𩲸今則按金函之祕典領玉札之隱書令出惟行時不可失繄爾靈通變化故憑齎捧宣傳即冀整轡浮空通天入地奉上玄之命令遍無極之神鄉𢍆勘姓名追尋魂𩲸不論髙深逺近毋容沮遏拘留期頃刻之不移感倣徨而來赴分明顯現警悟愚迷俾齊進於齊壇得親承於睿澤仰希昭報幸勿稽延玄憲彰彰火令疾疾右步斗入斗口面東南念太一紫元君呪七次取東南氣入水仗劒呷水噀去立隂陽二壇行持式召將亦如前了存至請聖次髙聲祝曰諸將既臨聽吾懇祝當職叨行大教濫厠仙階專南昌受煉之權領北魁追攝之局司存所係昭告為先昨據某人投詞云云今者齊事扣期玄綱將舉巳屢伸於敷奏為開泰於幽沉所合建陽耀隂靈之壇召男魂女𩲸之衆兹按玄科而敷蕆故邀神馭以來臨惟仗神威專行追攝願遵承於付囑大振起於宗風少駐神光為歆微禮次入科三獻文見齊法啓祝門諷經宣狀次左手六皇訣右手玉清訣以中指依壇式就土上畫之畫陽耀壇念陽斗章五行所造兮復歸於五行三指下四大假合兮却歸於太空或隂或陽兮任天地之根宗四中天地冥兮萬鬼潜四上天地動兮萬鬼爽中中隂陽運兮神鬼亨二下感此倣徨赴我壇二中賜汝靈書歸上清四下急急如太一玄冥律令攝中上午出畫畢取鬼戶氣吹九口彈訣畫隂靈壇念隂斗章隂陽推運兮劫數更遷五指中生死周流兮孰愚孰賢離輪轉無窮兮上玄造化未出三界兮拘於神變寅魁𩲁東斗兮酉𩳐魒西轉卯𩵄向南兮子魓行北面午隂靈兮茫茫沒沒子陽魂兮碌碌悠悠子天地𡨋兮萬鬼潜順至寅天地動兮萬鬼爽順至巳隂陽運兮神鬼亨順至中太一召兮何遲遲辰先至後至律有常順至亥夭一北祚神虎敕卯太一紫玄魂𩲸彰感此倣徨赴我壇坤賜汝靈書歸上清急急如太一玄冥神虎夫人攝引申上離畫畢取鬼戶氣九口吹之彈訣次仗劒面兩壇呪曰陽耀返魂不受死經隂精攝𩲸回尸度厄急急如律令攝魂𩲸雙行赴壇現跡呪胎光不昧爽靈魂營幽精復生尸狗去奸伏尸除邪雀隂無垢吞賊開明蜚毒無滯除穢非干臭肺閉塞陽魂復故天地正氣再聚汝形此是五行造化真精五臟萬神永保安寧陽魂隂𩲸無外逃形一呼一吸速至變真靈符一攝壇現魂靈急急如太一玄𡨋神虎律令召地獄罪魂都呪黃老三寶君紫雲上天氣攝制九幽魂太玄無邊際皆成自然人地獄無拘閉開通光明門悟真道自㑹急急如律令神虎七真內經玉真萬華宫髙仙藏帝經主圖九天表洞觀元中尊七轉召萬神五嶽𩓑來迎青龍左顧衛朱雀奮幽𡨋三宫招魔王司録較所呈白虎左扶助玄武解纒縈拔度重泉曲記仙書上清悉仇釋解對夙仇靡不清七世解𡨚結精血失沉零返胎朱火室更受洞中生百史衛神區令兆保黃寧急急如律令此經行持朝謁誦念解散𡨚執分離男女往生一誦七遍左右剔隂陽斗召魂赴壇式如前畫壇了次焚神虎諸符或兼用别法並於此施用指揮官將速攝合㑹亡魂幽爽赴壇現跡召魂呪陽神返風生隂靈逐我幡魂𩲸承符召急速赴靈幡壇陽神返汝殘隂靈來我幡北斗天蓬敕玄武開幽關三魂無散失七𩲸莫傾殘乘此金符力攝汝赴靈幡壇願承無上道證汝升仙班歌陽章五行所造兮復歸於五行見畫陽耀壇祕呪三官北酆明檢鬼營不得容隱金馬驛程普告無窮萬神咸聽三界五帝列言上清急急如神虎律令歌隂章隂陽推運兮劫數更遷見畫隂靈壇祕呪元始符命時刻升遷死魂受煉仙化成人不得容隱金馬驛程超陵三界逍遙上清急急如神虎律令總祝上來遵洞玄上道建神虎靈司既敷落於神真巳頒行於玉札伏請大聖使者玉女吏兵法部仙兵諸司官將徑往生方死府直通隂境陽庭極校量拘録之曹遍水火風刀之治根尋係薦亡爽追取合㑹幽魂不移時於反瞬之間並現跡於二壇之內仍仰監獄使者聚魂功曹各與部集整齊毋使喧爭紊亂若𠾑𡨚負債為隨事以解分俾易慮回心免他生而執對庶可臨壇受度證果升遷實資輔贊之功共闡玄元之教領吾懇祝切在遵行毋或稽違有妨開度功成之日如律褒崇疾疾三召請亡魂依式安幡及諸符命閉神虎堂門逐日焚誦發符檄督促追魂盡數到壇現跡仍囑令入夢影響明彰嘉應至開壇日開門只就堂中攝召依前式再行關召次第而行混元玉札師曰混元玉札乃玉清神虎之合𢍆三皇召靈之祕㫖是元始親降札文有回骸起死度人之道自漢時三天太玄都主飛玄之後遺神文於龍虎山璧魯洞因唐時葉靖能天師遇太一元君指曰北魁玄範在龍虎得者當尋西璧魯致魂召靈升髙清神功可作帝王師後葉靖能依銘得之況上真劉真人諱根及仙人孫登天師劉剛皆遇之夫行持之士若不得玉札則亡魂不能聚其魂𩲸卒難超度可謂受財於罪網種禍於福田者也凡告下隂曹可以白繒長三尺六寸或七尺髙一尺二寸以白紙背過朱書玉札併檄文於前以墨書告文於後仍以墨書正度亡人姓名生死因依於已者本命所屬星符之下如普度名數至多止於正度名下添一等字其餘皆具在甲帳連黏札前用太章昊回明大帝玉魁司主之印外使青紙作內外封函以朱題之又曰以總監鬼神印印之以彩畫三使者褁之同關牒一併發遣焚於青煙之中非玄壇普度不可妄用則地司徑白三官速奏上玄削職罰功可以立待矣法曰書時向東設玄𡨋夫人位左手搯神虎訣二指三指以大指押倒却以大指搯小指二節叩齒九通依前法召將指揮取西北氣入筆書之陽日玉札散形吾奉北魁君急召六甲神雄左追魂吏統制百節形手持玉札符禀敕往幽𡨋真精降一氣善惡悉分明星元為鬼律萬神咸敬聽不問有無罪不問踈與親黑律夫人攝魂𩲸返歸嬰攝魂赴壇來主伯速施靈何受命火急施行急急攝化元聿白一字一塗星飛澤陽日七星所屬符第一子生第二丑亥生第三寅戌生第四卯酉生第五辰申生第六己未生第七午生右七符可隨正薦亡人本命所屬書一符於本命星之下却以墨寫生死年月日時或殯葬或化作兩行寫之隂日玉札散形禀敕玄夫人吾召六丁神雌右武鸞吏倒生玄司君遵奉玉札劵徑往隂關生天一北祚氣生死路分明三界何敢違十方盡皆迎億劫𡨚仇對符到悉皆停萬神咸敬聽死魂返故根攝魂赴壇來主吏速感靈奉命火急施行急急攝採嬰兆盤蘭定淑一字一塗隂日七星所屬符第一子生第二丑亥生第三寅戌生第四卯酉生第五辰申生第六己未生第七午生右七符亦隨亡人本命書於所屬星下並如前式玉札檄文太上混元玉札急追索劵內三界九州亡靈入正薦姓名某人等急急依帝敕命奉行毋令怠慢神虎官吏火急捧符告下主司玉札全式北斗太一玄冥神虎混元玉札書玉札篆天一北祚太一紫元北魁玄範混元玉札告下三界十方天曹地府山川海嶽泉曲冥關北都羅酆六洞十宫三元九府百二十曹鬱絶之鄉幽隂之境諸大地獄九州分野城隍社令里域丘墟黃泉蒿里主宰魂𩲸應干合屬去處追取上件亡過某等徑離所部速到玄壇朝謁上帝領受殊恩神虎奉命萬神敬聽一如告命風火驛傳太歲年月朔日時告下法位臣姓某承玉札奉行北斗太一玄𡨋神虎內真夫人內封皮式北斗太一玄𡨋神虎混元玉札具位臣某奉行謹封封皮背腰書追取某人等魂外函式神虎混元玉札告下三界十方主罪主獄萬神具位某謹重封太上混元玉札追魂鐵劵師曰凡欲普庭橫死之者須用追魂鐵劵以攝之劵內所謂扶嬰兆盤蘭定淑乃七元真君隂名也化元聿白星飛澤乃斗中夫人內諱也是以北斗之精斡運隂陽聚其魂𩲸成其形影之象然後攝之蓋橫死者隂氣迷纒心神倒錯妄失真元至卒之後陽魂俱消隂氣隔障不覩光明魂離𩲸喪故太上慈悲立此劵以攝之是謂靈寶無量度人也法用雌黃合朱砂篆之各於所屬星下書亡人姓名生死年月日時併殯葬火化何地若普度名數多則於玉札下書或不記年月日時亦須子細開說亦同信帛符併玉札三使者真形關牒一處發遣焚之鐵劵散形無量扶蓋神纓自宫飛生自騫業覩盆基翠字九蘭婆泥咎通易邈無寂碧落浮𥠖形攝上玄總監上天惡奕無品景蔚蕭嵎飛天幽寂扶嬰兆盤蘭定大醜度人淑一半一圈子至午逆輪化元聿白星飛澤午至子逆輪鐵劵聚形玉札文太上混元玉札急追劵章符文中合度一切幽魂苦爽生方死普咸從帝命神虎官將攝到如令不得怠縱敕告文式靈寶大法司本司今據入意除已飛奏天廷取㫖外今依法式奉行太一混元追魂玉札付追魂使者前去𡨋曹追取亡過某人等魂赴壇受度今具亡人姓名下項書玉札篆文右天一北祚太一紫元北斗玄𡨋混元玉札神虎符命徑下十方三界生方死府追取上件亡魂等來赴玄壇朝謁上帝領受天恩主者萬神開關啓路疾速奉行毋輒稽延一如告命太歲年月日時告下法位璧魯龍章天一北祚神虎書太一紫元寶章符北魁玄範在龍虎得者當尋西璧魯提魂攝𩲸乃玄司生死去留職付汝告文右追取亡過某人享年歲月日時生於年月日時身故及附薦男女亡魂九州分野十類河沙孤魂滯𩲸於今月某日速赴靈壇分明報應冥曹主者准此奉行太歲年月日時告下法位封皮式攝召靈符告下九幽掌宰冥曹主者具位姓某封右用黃紙朱書髙一尺二寸召攝二聖飛符召呪上靈天蒼中有甲英混芒一吸東有伏藏天帝所獲玄爀天章今日書符作我天航急急如律令又念北帝呪取東南氣三口入筆君之呪曰北帝靈靈天帝歆欣唵召神虎豁落紛紜天飛羅明日月星營混氣有成急急如律令雄左大力符雌右武鸞符左大聖符右大聖符前二符黃紙朱書召二聖用之後二符用紅素各長四尺九寸以粉書貼關前又二聖符玉曹仙伯追魂符三清玉帝敕召神伯何金虎前奔玉札符令下急敕元君魁都曹火令敕破酆泉幽壘遵依疾速施行右符三清敕神虎元書敕幽字武鸞主吏追魂符三皇君敕召玉札玄範魁司覆主吏喬荀受命隂關敕取亡魂破制酆都幽都禀令疾速奉行右符三清敕玉札吏受敕破幽字並用黃紙朱書斗訣北魁氣先用符召到壇啓祝事因方發此符追魂指揮焚之三部追魂使者符召呪天帝神虎斗中靈神侯魏張𧪵等速降威靈吾今召汝助我真形聽吾驅使立現蹤形急急如律令上部使者符天地合德日月合明乾以覆運坤以載靈隂陽一氣與符合并追魂使者侯准敕奉行中部使者符隂陽合氣魂𩲸合形天垂元象帝以運靈生關死户符廓通津追魂使者魏准敕奉行下部使者符天日合氣陽帝炎精飛符昭灼攝𩲸聚魂追魂使者張𧪵准敕奉行右三符以黃繒九尺分作三絶先用綵畫三使者真形半身依服色繪飾却於半身之下各書一符用朱書同玉札遣發祝使者持符遍詣十方三界天牢地獄追取亡魂赴壇現跡報應當先朝奏內誦步虎跡罡行嘯命之道呪七遍祝使者速行此符昔西山真人劉根遇太一玉女授之功成遺龍虎山璧魯洞中三部使者符檄神虎使者受領札劵追取亡魂某人等速降來如律令告文式靈寶大法司本司據某人云云入神虎追魂事書三符書檄文太歲年月曰時告下法位北斗太一玄冥神虎內真夫人右檄文乃玄範府曲赦疾行萬里以黃紙朱書不可妄用上清靈寶大法卷之三十六
