front:
  text: 上清靈寳大法卷之四十二驚九
  hash: sha256:c5a299aee7cbfd32097f924fc21ca737d31f0d7190df369614419cc6b93f7b48
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5g0030_HFL_042-001a, image: hfl/0954/0954-076.png}
body:
  text: 洞㣲高士開光敕苦眞人𡩋全眞授上淸三洞弟子靈寳領教嗣師王契眞纂齋法符篆門回耀章師曰按二十四戒經凡人生造二十四種罪故死後獲二十四獄之報歷三塗五苦八難之場故太上有回耀降光之格當於建齋之先立回耀旛於壇之東南次用梓木作燈輪如車軸作三層中立一柱上層安燈十二盞中層十六盞下層二十一盞共四十九盞中央立五累苦門各立牌寫諸獄名仍造小旛四十九首黄白之色相間旛上依式寫天尊號頂上書破酆都符宜依法吿諸符命廣行拯救庶可回三景之光曲映九泉之戸使萬罪消滅苦䰟蒙度矣三塗五苦旛符天塗玉清虚皇天尊地塗玉清大慈天尊水塗玉清大悲天尊色累安寳華林青靈天尊愛累梵寳昌陽甘靈天尊貪累七寳金門皓靈天尊華競洞隂朔單五靈天尊身累玉清玄靈天尊上元㓕慾斬尸變景流光玉符三元陽光定慧靈樞𡨚䰟冠帶德𢍆玄元混生變化善寂疑虚法輪運轉永免天塗斬上屍呪上尸青慾自號彭琚變化九種烏頭蛇軀混沌無心或沉或浮貪慾滋味華色自居走作人魂魄司過咎㫁人命根炁散神遊放蕩三宫小蟲無劬真人甲乙書篆靈符色慾巳斷死路已除元姑有命請斬尸頭三台監形速出無留㓕根絶種勿使餘遺亡者鍊真三宫清虚五帝臨映太一定書吉日沭浴冠帶行疇飛度天界流景玉輿逐景上清乗雲遨遊急急如律令告文玉清開光寳符告下天塗驅雷役電官符右符吿下落㓕色根死道靈官奉爲亡某斬滅天塗界上尸道色慾之門免天官驅雷逐電之役辛酸楚毒之悲超度三界逍遥上清一如吿命中元滅慾斬尸變景流光玉符三陽交泰九地肇圖光顯開度九炁華敷六字澄瀾脫彼地塗斬滅中尸呪中尸彭質號曰中黄愛慾目居倚腹逃藏沉浮變化形無常方執人䰟𩲸走作三宫赤子馳騁使人發狂欲性傷神罪由小蟲真人某乙上帝巳徽身佩玉符玉文金章刋名元圖三慾巳亡元始符命斬滅尸形斷根絶種勿得飛揚亡䰟受錬五藏清涼真仙安鎮藏内生光五帝鑒映太一列行中元沐浴冠帶衣裳解形變景流景玉光飛升上清食息太空長保自然天地無窮吿文玉清開明寳符告下地塗擔砂負石官符右符告下落㓕愛根罪道一靈官奉爲某斬絶地塗界中尸道愛慾之門免地官擔砂負石之役培石運土之酸超度三界逍遥上清一如吿命下元滅慾斬尸變景流光玉符祕景長生内景含和通真解滯善破四魔幽關朗徹凝黙玄阿水塗開泰永出愛河斬下尸呪下尸彭矯貪慾自榮白色混沌體無常形依人兩足恱動人情言我得失走作䰟靈三宫擾亂赤子不寧貪慾小蟲假備幽冥真人某乙三錬巳清慾門閉塞不受邪精元始急令三台臨庭速出無隱及汝弟兄九種子孫一時斬形五帝度真太一記名下元沭浴冠帯羽青玄度三界上飲玄精解形遁變流景上清飛歩玄虚三界齊明告文玉符開苦寶符吿下水塗摙汲溟波官符右符吿下落滅貪根惡道靈官奉爲亡某斬絶水塗界下尸道貪慾之門免水官摙汲之役填河灌瀆之辛超陵三界逍遥上清一如吿命三塗符祝呪玉清寳符元始敕行幽塗禀命三界解刑赦除閉繫斷役消名隨品受化萬神奉行急急如上帝敕右法三塗訣存三官左右降炁入符中緫祝遣呪玉清上帝敕赦上清大帝敕赦太清大帝敕赦敕命十方靈寳救苦天尊朱陵上帝朱陵府神君南極長生大帝九天監生大神受度亡過某等䰟玉皇有敕上奉道君敕赦十方三界罪䰟光散九幽流香滿庭唵吽吟嚧嘔婆娑諦薩訶急急如太上道君敕赦律令解形遁變滅度色累苦心玉清流光寳符妙哉元始傾光紫微九幽悟性神飛沛然法雨徧潤咸施吿文右符吿下飛度色累戸靈官奉爲亡過某解除色累苦心門滅度泰山地獄苦形神升度竭帝天關福智自坐叅侍龍轅一如吿命解形遁變滅度愛累苦神玉清流精寳符陽炁上升隂合陽交出死入生度慶幽寥火錬死䰟得成仙質二帝秀飄靈章所告神生自超告文右符告下飛度愛累戸靈官奉爲亡某解除愛累苦神門滅度風刀考身地獄苦形神升度謁帝天關福智自生參侍龍轅一如告命解形遁變滅度貪累苦形玉清流景寳符阿羅瞿曇光明混間玄景耀衢制㑹酆山龍漢蕩蕩玄上虚關勿渉苦津滅去凶殘吿文右符告下飛度貪累戸靈官奉爲亡某解除貪累苦形門免擔山負石苦形神升度謁帝天關福智自生叅侍龍轅一如告命解形遁變滅度華競苦精玉清流霞寳符破暗燭幽靈輝九丘斷除華競駕景空浮吿文右符吿下飛度華競戶靈官奉爲亡某解除華競苦精門滅度填河塞海地獄苦形神升度謁帝天關福智自生叅侍龍轅一如吿命解形遁變滅度身累苦䰟玉清流輝寳符八芒榮敷刀刃摧殂身累斷滅永度三塗告文右符吿下飛度身累戸靈官奉爲亡某解除身累苦䰟門滅度吞火食炭鑊湯地獄苦形神升度謁帝天關福智自生叅侍龍轅一如吿命太歳年月日時吿下法位臣姓某承誥奉行五苦符祝呪色累苦心非色非心欲累苦䰟即慾無慾愛累苦神是愛非愛貪累苦形我形非形華累苦身非真非身五累俱空形返天真六道業債無愛無生積火不還破債封形我真同真三界俱空五相我空得爲真人長保輪劫與天齊齡急急如玉清上帝敕右五符存身爲靈寳天尊恰五苦設取炁吹之遣呪玉清寳符元始妙章隱玄幽象妙逹羣陽變隂作晝廓翳停殃消除五累飛度南昌急急如上帝敕右八符並以黄紙朱書吿文墨書用青紙作封皮朱題其面破獄時焚之封皮式玉清某符吿下某靈官法位姓某謹封飛度色累戸呪解形遁變落尸五門三慾巳清神津内灌脫故錬新體香炁䦨玉符滅迹地無拘停飛度天界超凌雲端魔王保真炁合自然七祖同升飛歩天門五帝鑒映萬神咸聞飛度愛累户呪雲行飛歩遁變玉光解形脫迹散髮翶翔人累無拘乗虚空行天魔巳除五道開通超度風刀形升上宫飛度貪累户呪解形神變割截貪癡超出銅柱越過愛津幽䰟受度苦爽咸遷七祖解脫九玄生天貪累永脫神飛上仙飛度華競戸呪落尸解罪神超鑊湯剪除華競滅落邪源亡人受錬魔王保名開通王道與真同情逍遥自然升宴紫庭飛度身累戸呪玉符解罪神脫溟波蕩除業障割切戀根幽司罷對寒郷停形出離北府神得受生快樂無爲逍遥太空大抵修真之士能於庚申甲子日黄紙朱書五苦符服之可以去三尸逐五苦當誦苦神章此頌乃道君出遊八門見諸獄幽關重檻及三河九江刀山劒𣗳囚徒餓鬼責役死䰟流曳塗炭無復自形不可忍見見之悲傷故作是頌苦神章生落苦神界輪轉五道庭九幽開長夜累劫無光明刀山多劒𣗳毒刃互峥嶸不見羣鳥集但聞苦䰟鳴廻風揺長條哀響流寒庭上有履山人時刻無暫停飢食泉曲炭渴飲冶火精流曵悠塗中豈識形與名念爾不知命告㢤傷人情罪福各生縁善惡諒由心輪轉不終滅響聲不絶音九幽有無録萬劫自相尋寒氷無極源長夜間重隂不見福德合但見窮鬼林長河難閉塞苦䰟扳轅吟孤聲赴絶劒哀號落刀岑此形非復形痛哉傷人襟一難鐡牀地獄符靈寶符命㧞度亡某等出離鐡牀地獄乗此陽光得生人道中常獲聦明一如吿命二難刀山地獄符靈寳符命㧞度亡某等出離刀山地獄乗此陽光得生人道中獲正男子身常辞五漏一如告命三難銅柱地獄符靈寳符命㧞度亡某出離銅柱地獄乗此陽光得生人道中獲形體完全具足十相一如吿命四難鑊湯地獄符靈寳符命㧞度亡某出離鑊湯地獄乗此陽光得生中華之國爲富豪長者身一如告命五難爐炭地獄符靈寳符命㧞度亡某出離爐炭地獄乗此陽光得生人道中值有道君王理治之世一如吿命六難鐡輪地獄符靈寳符命㧞度亡某出離鐡輪地獄乗此陽光得生人道中獲氣性慈仁之慧一如吿命七難鋸解地獄符靈寳符命㧞度亡某出離鋸解地獄乗此陽光得生人道中長值國土太平之世一如告命八難寒氷地獄符靈寳符命㧞度亡某出離寒氷地獄乗此陽光得生人道中常與三寳相遇永證仙階之職一如吿命書八符呪天尊救群迷超度離八難慶㑹人道中五苦一時迸永滅三塗津輪煥法周範希夷成嬰童浩劫無窮根急急如律令遣呪靈寳玉符超淩八難度脫窮幽得證彼岸大道幽微陽光燦熳獲人道中發大讃歎三塗五苦八難超凌魔王隂官稽首送迎玉清元命一如奉行急急如上帝敕呪畢剔訣存變監生章師曰凡建大齋務在廣度恐其間幽爽内有因産身亡胞胎繫滯子毋不分故太上哀矜立監生一司專治女䰟之事出諸符法以救濟之其功溥矣監生真文飛玄元炁結成眞文死骸開度萬品開根右眞文安鎮監生司案上則亡人見之即百骸流光奪却尸穢之炁巳生未生符玉清訣東炁想入幕謹請九天監生大神衞房聖母治病天醫等衆只今引過血湖未分娩産䰟等入幕以遂分娩托化人天急急如律令呪曰謹請雙保之母速賜真炁救鬼䰟生天右符念四句爲呪書之中文靈寳祖炁焚之分娩符謹請雙保之母速降真炁救鬼生天監生符右符念監真度生一七徧併念靈書一徧書之取東南炁次念巳生未生皆得生成三十二徧一炁吹布二符並青紙書焚血湖堂内存亡人身有青炁光明滿室斷胞根催生符天醫救療章師曰世人多因受疾而亡十相既不完全則隨䰟帶疾何以登壇受度故太上有天醫拯㧞之法憑諸符篆使全其形豈曰小𥙷之哉靈寳五靈真符九光三炁七政五常中皇髙尊下降元陽急急如律令右法更加五芽吿文靈寳五靈真符吿下天醫院執職官衆符靈寳教命宣告天醫即仰朩宫行藥火官灼艾金官握鍼水官煑湯土官和劑各依窠局將來受度亡魂孤爽對證醫療俾令聾者開聦盲者目明喑者能言跛者能行乆病痼疾咸使復形髪白反黒齒落更生婦人懷姙鳥獸含胎巳生未生皆得生成回尸起死白骨成人青帝護䰟白帝侍𩲸赤帝養炁黒帝通血黄帝中主萬神無越中理五炁混合百神生身受度逍遥上清一如吿命太歲年月日時告下具法位臣姓某承誥奉行召天醫符卯文東炁呪曰北帝之上隱元之傍天醫使者下濟黄房拯治亡殁體淨身康承符而召急急赴堂急急如上帝敕召符天醫大聖地醫大聖金丹仙藥普救群生降臨真炁聞召速至一時復形呪曰天醫天醫速降天門拯救群生治病消危上帝有敕風火急行急急如南極好生律令麒麟降藥符斗訣南炁𩳞𩲤𩲥𩳐隂日用求醫召敕台甫吸陽日用日月明天地轉三台護南極敕璇璣令降真炁施藥靈麒麟使駕醫王天醫靈地醫聖神醫人法醫病急急如上帝律令南極天醫招真降藥符呪曰南極有令注定生名天醫大聖速降凡籠紫虚欝秀輔翼萬仙醫源顯道普救民愆是病除瘥是惡須蠲天醫靈官地醫神官仙聖功曹速降靈軒五元真炁攝藥濟縁急急如南極長生大帝令北極璇璣玉帝敕青帝全形符右符青地朱書震文赤帝全形符右符紅地白書离文白帝全形符右符白地黒書兌文黒帝全形符右符黒地黄書坎文黄帝全形符右符黄地朱書中文全形符呪曰金城孕秀玉洞凝神真炁内養以成真人今日受錬上登朱陵䰟𩲸受度與日同明急急如律令右符青紙朱書呪七次搖三塗五苦訣續頭符呪曰太上聖教託物通靈今將此首賜與亡䰟急急如律令右符太一號神將與亡䰟無頭者續頭接手符呪曰亡䰟亡䰟全汝之形今賜汝手速速奉行急急如律令右符太一號神將與亡䰟無手者接手接足符呪曰人託四胑一不可無脚而能行訓教下虚速呼東方化炁入脚急急如上帝律令右符太一號神將與亡䰟無脚者接脚開聾啞符呪曰東明西鳴不得不行入耳無間速速傳聲上應虚星師曠通靈急急如律令又呪天開地裂人生腦裂開其聾啞立便能說左右開道印任信用一物想作降魔杵剌其口耳太一號神將與亡者開聦疾疾瞽目符呪曰日月隂陽二精炁生七星上應離婁金針今蒙太上法速與開光明急急如律上帝律令右符太一號神將降聖開眼覩見光明接骨符呪曰三尸蔽髓神流天罡敕接骨頭急急如律令右符太一號神將法力填𥙷損處跛躄能行疼處速止偃水符呪曰其有含𡨚負氣避罪愚癡水鬼牽仍故坄溺死翻舟覆浪永劫同徒運石堆砂腹常鼓急今有太上偃水符法請神將爲亡䰟偃其水令四肢調泰六脉安和急急如律令治腫毒虚浮符呪曰其有亡䰟癰疽瘡毒炁體虚浮仗此符光即令消散急急如律令治遭刑自刎定痛止血符斗罡太一號呪曰其有亡䰟夙業犯法自刎刑傷闘敵被謀悞遭劽斧仗此符命定痛止血長肌無痕急息如律令催生符斗罡㸃中黙念呪曰婦人懷姙鳥獸含胎巳生未生皆得生成急急如律令右符疊書北帝敕急出斗諱七轉順下謹請雙保之母速賜真炁救鬼䰟生天急急如律令全形具體符呪曰玉清元始尊敕下天醫神完全枯朽骨普濟度亡人急急如律令全血符生成五臟符接續肱首符玉訣東炁呪曰太上慈悲肱首能完形神俱備上朝玉房急急如律令安舌續頸符北斗諱南斗諱呪曰普受開度死䰟生身身得受生上聞諸天諸天之上各有生門急急如律今中理五炁混合百神十轉廻靈萬炁齊仙仙道貴生無量度人上開八門飛天法輪罪福禁戒宿命因縁普受開度死䰟生身急急如律令金刀斷索符呪曰太上有敕普救群生金刀斷索保固全形急急如律令解索斷繩符呪曰杳杳𡨋冥太初無形何物可繫何物可縈爲汝不甦遂纒此形我今爲汝金刀斷繩五苦八難悉得肅清照徹本原上升玉庭急急如律令再念三䰟歸絳宅亡𩲸返元宫存身爲太乙搖寅文念呪畢取鬼戸炁吹以金刀訣拂斷至劒訣西炁開咽喉符黒上朱書呪曰浩晶生法炁氤氲凝天地两曜共澄徹五緯交相通三光煥巳明寳炁凝三宫帝郷㑹九老咽服百骸豐金華照光景身與日月同念道上聖前萬劫壽無窮急急如律令蕩穢章師曰天醫完其形監生解其結但一身穢垢何以清㓗須用符文爲其滌蕩使身形瑩淨方可臨壇受度也九鳯破穢符九鳯將軍天回地轉回轉天玄九鳯却穢君度九鳯收穢君度九鳯蕩穢君度九鳯解穢君度清神符呪曰玉清聖境式元始天尊敕九鳯真官行合明天帝日急急如律令解穢符蕩穢符歩斗天門炁呪曰三炁欝回九鳯飛來旛舞八方上應太微焚蕩邪穢朱丹吐怡神符檄命仰召靈暉急急如律令沐浴章師曰夫人處世多染六塵死入幽隂又以隂炁溟濛則重重厭穢障翳以致一性塵昬故上玄出示寳符使五香灌溉清淨䰟神期可超化矣變洛室符中篇書之攪水符左子文念東井呪攪水再本師訣歴至二㫖甲下入上訣左右手俱作次以左袖引男右袖引女呪曰攪水清清人得此水耳目聦明鬼得此水䰟𩲸受生汝等鬼衆悉來受沾急急如律令又呪水在天爲銀漢在地爲黄河在人爲丹田之府在道爲錬火之家汝等衆浴萬鬼滅籙汝等受水永無生滅唵阿那藍訶吔耶𠮷唎攝男堂符女室符右二符並念合明天帝日七徧呪曰元始符命時刻升遷亡者蕩形得獲超生急急如上帝敕男堂日䰟孕珠紫霞符卯文日中金光九芒入中理五炁九和十合光象朱景日䰟出入華房玄飈變化上清下鎮人身泥丸絳宫緑英照韜十轉回靈養神錬形自然成真呪曰日中接景司命天君九帝齊景三光同軿與我同升髙奔三天急急如律令女室月𩲸九靈成真符黄帝中主萬神無越桃康司命太一合延受命神功白帝侍𩲸升遷三界逍遥上清呪曰日中方盈月帝元君八景羅列寳光負形身生玉液内錬外清急急如律令右符白上朱書酉文月中王光十芒入蕩穢符呪曰日月二景諸天流光東井星君東井錬度君靈澤真人救苦真人㧞度真人天地真人天河龍王九鳯破穢靈官素車白馬大將軍浣濯夫人七神童子四直引䰟使者六甲丙丁將軍引度錬沐升證光明謹依靈寳大法律令敕解汚浴䰟符白上黒書玉訣東炁呪曰天地開明四大爲常玄水洗穢辟除不祥雙童守門七靈安房雲津鋪潤萬炁混康内外利貞保兹黄裳急急如上帝律令又符沐浴形軀脫離幽途淸淨夙業九獄無拘吉今香湯瑶池甘露百體輕快四大調護受衣受食生人天處是男是女洗滌穢惡急急如上帝玄科律令黄華蕩形符呪曰天河灌東井石景水毋精元始披長夜天人逐月生沐浴蘭池上龍附長庚瓶金童洒香水玉女濯五律冠帶耀玉質錬度五仙形體香萬神集承景登髙明急急如律令丹陽符石景水毋符二符見火煉符淨血尸沐浴符青上朱書子文北炁呪曰元始符命㧞度爽靈血尸臭穢凶惡潜寧七液得注五臟光生急急如上帝敕冠帶章師曰亡䰟沐浴既畢當給仙衣整肅威儀俾其朝真聽法盖凡世所製非上天自然者故用符章變錬亡者得之體貌輕清生天可待矣變男衣符變女衣符變生天淨衣符右三符並中篇書之玉訣東炁又符呪曰七曜扶衰真炁變衣四神合衞五緯交輝炁分羅綺錬空成威六合扶挾二炁玄微玉真煥爛仙女齊飛圓景素明元始慈慈急急如律令唵欣欣呼嗚伐夷帝明都變錬有形攝唵噠陀耶囉陀耶帝吽鉢吒唎唵化真晶摩訶摩訶一念平等無有高下捨彼妄縁證此清淨上清靈寳大法卷之四十二
