front:
  text: 上清靈寶大法卷之四十二驚九
  hash: sha256:96a6bf2736294de14c5009e2906d0b9b5ce2afb36fb272c677ffc5d1c9345e17
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5g0030_HFL_042-001a, image: hfl/0954/0954-076.png}
body:
  text: 洞微高士開光敕苦真人寧全真授上淸三洞弟子靈寶領教嗣師王契真纂齋法符篆門回耀章師曰按二十四戒經凡人生造二十四種罪故死後獲二十四獄之報歷三塗五苦八難之場故太上有回耀降光之格當於建齋之先立回耀幡於壇之東南次用梓木作燈輪如車軸作三層中立一柱上層安燈十二盞中層十六盞下層二十一盞共四十九盞中央立五纍苦門各立牌寫諸獄名仍造小幡四十九首黃白之色相間幡上依式寫天尊號頂上書破酆都符宜依法告諸符命廣行拯救庶可回三景之光曲映九泉之戶使萬罪消滅苦魂蒙度矣三塗五苦幡符天塗玉清虛皇天尊地塗玉清大慈天尊水塗玉清大悲天尊色纍安寶華林青靈天尊愛纍梵寶昌陽甘靈天尊貪纍七寶金門皓靈天尊華競洞隂朔單五靈天尊身纍玉清玄靈天尊上元滅欲斬尸變景流光玉符三元陽光定慧靈樞𡨚魂冠帶德契玄元混生變化善寂疑虛法輪運轉永免天塗斬上尸呪上尸青欲自號彭琚變化九種烏頭蛇軀混沌無心或沉或浮貪欲滋味華色自居走作人魂魄司過咎斷人命根氣散神遊放蕩三宫小蟲無劬真人甲乙書篆靈符色欲巳斷死路已除元姑有命請斬尸頭三台監形速出無留滅根絶種勿使餘遺亡者鍊真三宫清虛五帝臨映太一定書吉日沭浴冠帶行疇飛度天界流景玉輿逐景上清乘雲遨遊急急如律令告文玉清開光寶符告下天塗驅雷役電官符右符告下落滅色根死道靈官奉為亡某斬滅天塗界上尸道色欲之門免天官驅雷逐電之役辛酸楚毒之悲超度三界逍遙上清一如告命中元滅欲斬尸變景流光玉符三陽交泰九地肇圖光顯開度九氣華敷六字澄瀾脫彼地塗斬滅中尸呪中尸彭質號曰中黃愛欲目居倚腹逃藏沉浮變化形無常方執人魂𩲸走作三宫赤子馳騁使人發狂欲性傷神罪由小蟲真人某乙上帝巳徽身佩玉符玉文金章刋名元圖三欲巳亡元始符命斬滅尸形斷根絶種勿得飛揚亡魂受錬五藏清涼真仙安鎮藏內生光五帝鑒映太一列行中元沐浴冠帶衣裳解形變景流景玉光飛升上清食息太空長保自然天地無窮告文玉清開明寶符告下地塗擔砂負石官符右符告下落滅愛根罪道一靈官奉為某斬絶地塗界中尸道愛欲之門免地官擔砂負石之役培石運土之酸超度三界逍遙上清一如告命下元滅欲斬尸變景流光玉符祕景長生內景含和通真解滯善破四魔幽關朗徹凝默玄阿水塗開泰永出愛河斬下尸呪下尸彭矯貪欲自榮白色混沌體無常形依人兩足恱動人情言我得失走作魂靈三宫擾亂赤子不寧貪欲小蟲假備幽冥真人某乙三錬巳清欲門閉塞不受邪精元始急令三台臨庭速出無隱及汝弟兄九種子孫一時斬形五帝度真太一記名下元沭浴冠帶羽青玄度三界上飲玄精解形遁變流景上清飛步玄虛三界齊明告文玉符開苦寶符告下水塗摙汲溟波官符右符告下落滅貪根惡道靈官奉為亡某斬絶水塗界下尸道貪欲之門免水官摙汲之役填河灌瀆之辛超陵三界逍遙上清一如告命三塗符祝呪玉清寶符元始敕行幽塗稟命三界解刑赦除閉繫斷役消名隨品受化萬神奉行急急如上帝敕右法三塗訣存三官左右降氣入符中總祝遣呪玉清上帝敕赦上清大帝敕赦太清大帝敕赦敕命十方靈寶救苦天尊朱陵上帝朱陵府神君南極長生大帝九天監生大神受度亡過某等魂玉皇有敕上奉道君敕赦十方三界罪魂光散九幽流香滿庭唵吽吟嚧嘔婆娑諦薩訶急急如太上道君敕赦律令解形遁變滅度色纍苦心玉清流光寶符妙哉元始傾光紫微九幽悟性神飛沛然法雨遍潤咸施告文右符告下飛度色纍戶靈官奉為亡過某解除色纍苦心門滅度泰山地獄苦形神升度竭帝天關福智自坐參侍龍轅一如告命解形遁變滅度愛纍苦神玉清流精寶符陽氣上升隂合陽交出死入生度慶幽寥火錬死魂得成仙質二帝秀飄靈章所告神生自超告文右符告下飛度愛纍戶靈官奉為亡某解除愛纍苦神門滅度風刀考身地獄苦形神升度謁帝天關福智自生參侍龍轅一如告命解形遁變滅度貪纍苦形玉清流景寶符阿羅瞿曇光明混間玄景耀衢制會酆山龍漢蕩蕩玄上虛關勿涉苦津滅去凶殘告文右符告下飛度貪纍戶靈官奉為亡某解除貪纍苦形門免擔山負石苦形神升度謁帝天關福智自生參侍龍轅一如告命解形遁變滅度華競苦精玉清流霞寶符破暗燭幽靈輝九丘斷除華競駕景空浮告文右符告下飛度華競戶靈官奉為亡某解除華競苦精門滅度填河塞海地獄苦形神升度謁帝天關福智自生參侍龍轅一如告命解形遁變滅度身纍苦魂玉清流輝寶符八芒榮敷刀刃摧殂身纍斷滅永度三塗告文右符告下飛度身纍戶靈官奉為亡某解除身纍苦魂門滅度吞火食炭鑊湯地獄苦形神升度謁帝天關福智自生參侍龍轅一如告命太歲年月日時告下法位臣姓某承誥奉行五苦符祝呪色纍苦心非色非心欲纍苦魂即欲無欲愛纍苦神是愛非愛貪纍苦形我形非形華纍苦身非真非身五纍俱空形返天真六道業債無愛無生積火不還破債封形我真同真三界俱空五相我空得為真人長保輪劫與天齊齡急急如玉清上帝敕右五符存身為靈寶天尊恰五苦設取氣吹之遣呪玉清寶符元始妙章隱玄幽象妙逹羣陽變隂作晝廓翳停殃消除五纍飛度南昌急急如上帝敕右八符並以黃紙朱書告文墨書用青紙作封皮朱題其面破獄時焚之封皮式玉清某符告下某靈官法位姓某謹封飛度色纍戶呪解形遁變落尸五門三欲巳清神津內灌脫故錬新體香氣闌玉符滅迹地無拘停飛度天界超凌雲端魔王保真氣合自然七祖同升飛步天門五帝鑒映萬神咸聞飛度愛纍户呪雲行飛步遁變玉光解形脫迹散髮翶翔人纍無拘乘虛空行天魔巳除五道開通超度風刀形升上宫飛度貪纍户呪解形神變割截貪癡超出銅柱越過愛津幽魂受度苦爽咸遷七祖解脫九玄生天貪纍永脫神飛上仙飛度華競戶呪落尸解罪神超鑊湯剪除華競滅落邪源亡人受錬魔王保名開通王道與真同情逍遙自然升宴紫庭飛度身纍戶呪玉符解罪神脫溟波蕩除業障割切戀根幽司罷對寒鄉停形出離北府神得受生快樂無為逍遙太空大抵修真之士能於庚申甲子日黃紙朱書五苦符服之可以去三尸逐五苦當誦苦神章此頌乃道君出遊八門見諸獄幽關重檻及三河九江刀山劒樹囚徒餓鬼責役死魂流曳塗炭無復自形不可忍見見之悲傷故作是頌苦神章生落苦神界輪轉五道庭九幽開長夜纍劫無光明刀山多劒樹毒刃互峥嶸不見羣鳥集但聞苦魂鳴回風搖長條哀響流寒庭上有履山人時刻無暫停飢食泉曲炭渴飲冶火精流曵悠塗中豈識形與名念爾不知命告哉傷人情罪福各生緣善惡諒由心輪轉不終滅響聲不絶音九幽有無録萬劫自相尋寒氷無極源長夜間重隂不見福德合但見窮鬼林長河難閉塞苦魂扳轅吟孤聲赴絶劒哀號落刀岑此形非復形痛哉傷人襟一難鐡牀地獄符靈寶符命拔度亡某等出離鐡牀地獄乘此陽光得生人道中常獲聰明一如告命二難刀山地獄符靈寶符命拔度亡某等出離刀山地獄乘此陽光得生人道中獲正男子身常辭五漏一如告命三難銅柱地獄符靈寶符命拔度亡某出離銅柱地獄乘此陽光得生人道中獲形體完全具足十相一如告命四難鑊湯地獄符靈寶符命拔度亡某出離鑊湯地獄乘此陽光得生中華之國為富豪長者身一如告命五難爐炭地獄符靈寶符命拔度亡某出離爐炭地獄乘此陽光得生人道中值有道君王理治之世一如告命六難鐡輪地獄符靈寶符命拔度亡某出離鐡輪地獄乘此陽光得生人道中獲氣性慈仁之慧一如告命七難鋸解地獄符靈寶符命拔度亡某出離鋸解地獄乘此陽光得生人道中長值國土太平之世一如告命八難寒氷地獄符靈寶符命拔度亡某出離寒氷地獄乘此陽光得生人道中常與三寶相遇永證仙階之職一如告命書八符呪天尊救群迷超度離八難慶會人道中五苦一時迸永滅三塗津輪煥法周範希夷成嬰童浩劫無窮根急急如律令遣呪靈寶玉符超淩八難度脫窮幽得證彼岸大道幽微陽光燦熳獲人道中發大讃歎三塗五苦八難超凌魔王隂官稽首送迎玉清元命一如奉行急急如上帝敕呪畢剔訣存變監生章師曰凡建大齋務在廣度恐其間幽爽內有因産身亡胞胎繫滯子毋不分故太上哀矜立監生一司專治女魂之事出諸符法以救濟之其功溥矣監生真文飛玄元氣結成真文死骸開度萬品開根右真文安鎮監生司案上則亡人見之即百骸流光奪却尸穢之氣巳生未生符玉清訣東氣想入幕謹請九天監生大神衛房聖母治病天醫等衆只今引過血湖未分娩産魂等入幕以遂分娩托化人天急急如律令呪曰謹請雙保之母速賜真氣救鬼魂生天右符念四句為呪書之中文靈寶祖氣焚之分娩符謹請雙保之母速降真氣救鬼生天監生符右符念監真度生一七遍併念靈書一遍書之取東南氣次念巳生未生皆得生成三十二遍一氣吹布二符並青紙書焚血湖堂內存亡人身有青氣光明滿室斷胞根催生符天醫救療章師曰世人多因受疾而亡十相既不完全則隨魂帶疾何以登壇受度故太上有天醫拯拔之法憑諸符篆使全其形豈曰小輔之哉靈寶五靈真符九光三氣七政五常中皇髙尊下降元陽急急如律令右法更加五芽告文靈寶五靈真符告下天醫院執職官衆符靈寶教命宣告天醫即仰朩宫行藥火官灼艾金官握針水官煮湯土官和劑各依窠局將來受度亡魂孤爽對證醫療俾令聾者開聰盲者目明喑者能言跛者能行久病痼疾咸使復形髮白反黑齒落更生婦人懷妊鳥獸含胎巳生未生皆得生成回尸起死白骨成人青帝護魂白帝侍𩲸赤帝養氣黑帝通血黃帝中主萬神無越中理五氣混合百神生身受度逍遙上清一如告命太歲年月日時告下具法位臣姓某承誥奉行召天醫符卯文東氣呪曰北帝之上隱元之傍天醫使者下濟黃房拯治亡殁體淨身康承符而召急急赴堂急急如上帝敕召符天醫大聖地醫大聖金丹仙藥普救群生降臨真氣聞召速至一時復形呪曰天醫天醫速降天門拯救群生治病消危上帝有敕風火急行急急如南極好生律令麒麟降藥符斗訣南氣𩳞𩲤䰡𩳐隂日用求醫召敕台甫吸陽日用日月明天地轉三台護南極敕璇璣令降真氣施藥靈麒麟使駕醫王天醫靈地醫聖神醫人法醫病急急如上帝律令南極天醫招真降藥符呪曰南極有令注定生名天醫大聖速降凡籠紫虛鬱秀輔翼萬仙醫源顯道普救民愆是病除瘥是惡須蠲天醫靈官地醫神官仙聖功曹速降靈軒五元真氣攝藥濟緣急急如南極長生大帝令北極璇璣玉帝敕青帝全形符右符青地朱書震文赤帝全形符右符紅地白書離文白帝全形符右符白地黑書兌文黑帝全形符右符黑地黃書坎文黃帝全形符右符黃地朱書中文全形符呪曰金城孕秀玉洞凝神真氣內養以成真人今日受錬上登朱陵魂𩲸受度與日同明急急如律令右符青紙朱書呪七次搖三塗五苦訣續頭符呪曰太上聖教託物通靈今將此首賜與亡魂急急如律令右符太一號神將與亡魂無頭者續頭接手符呪曰亡魂亡魂全汝之形今賜汝手速速奉行急急如律令右符太一號神將與亡魂無手者接手接足符呪曰人託四肢一不可無腳而能行訓教下虛速呼東方化氣入腳急急如上帝律令右符太一號神將與亡魂無腳者接腳開聾啞符呪曰東明西鳴不得不行入耳無間速速傳聲上應虛星師曠通靈急急如律令又呪天開地裂人生腦裂開其聾啞立便能説左右開道印任信用一物想作降魔杵剌其口耳太一號神將與亡者開聰疾疾瞽目符呪曰日月隂陽二精氣生七星上應離婁金針今蒙太上法速與開光明急急如律上帝律令右符太一號神將降聖開眼覩見光明接骨符呪曰三尸蔽髓神流天罡敕接骨頭急急如律令右符太一號神將法力填輔損處跛躄能行疼處速止偃水符呪曰其有含𡨚負氣避罪愚癡水鬼牽仍故坄溺死翻舟覆浪永劫同徒運石堆砂腹常鼓急今有太上偃水符法請神將為亡魂偃其水令四肢調泰六脈安和急急如律令治腫毒虛浮符呪曰其有亡魂癰疽瘡毒氣體虛浮仗此符光即令消散急急如律令治遭刑自刎定痛止血符斗罡太一號呪曰其有亡魂夙業犯法自刎刑傷鬪敵被謀誤遭劽斧仗此符命定痛止血長肌無痕急息如律令催生符斗罡點中默念呪曰婦人懷妊鳥獸含胎巳生未生皆得生成急急如律令右符疊書北帝敕急出斗諱七轉順下謹請雙保之母速賜真氣救鬼魂生天急急如律令全形具體符呪曰玉清元始尊敕下天醫神完全枯朽骨普濟度亡人急急如律令全血符生成五臟符接續肱首符玉訣東氣呪曰太上慈悲肱首能完形神俱備上朝玉房急急如律令安舌續頸符北斗諱南斗諱呪曰普受開度死魂生身身得受生上聞諸天諸天之上各有生門急急如律今中理五氣混合百神十轉回靈萬氣齊仙仙道貴生無量度人上開八門飛天法輪罪福禁戒宿命因緣普受開度死魂生身急急如律令金刀斷索符呪曰太上有敕普救群生金刀斷索保固全形急急如律令解索斷繩符呪曰杳杳𡨋冥太初無形何物可繫何物可縈為汝不蘇遂纒此形我今為汝金刀斷繩五苦八難悉得肅清照徹本原上升玉庭急急如律令再念三魂歸絳宅亡𩲸返元宫存身為太乙搖寅文念呪畢取鬼戶氣吹以金刀訣拂斷至劒訣西氣開咽喉符黑上朱書呪曰浩晶生法氣氤氲凝天地兩曜共澄徹五緯交相通三光煥巳明寶氣凝三宫帝鄉會九老咽服百骸豐金華照光景身與日月同念道上聖前萬劫壽無窮急急如律令蕩穢章師曰天醫完其形監生解其結但一身穢垢何以清潔須用符文為其滌蕩使身形瑩淨方可臨壇受度也九鳯破穢符九鳯將軍天回地轉回轉天玄九鳯却穢君度九鳯收穢君度九鳯蕩穢君度九鳯解穢君度清神符呪曰玉清聖境式元始天尊敕九鳯真官行合明天帝日急急如律令解穢符蕩穢符步斗天門氣呪曰三氣鬱回九鳯飛來幡舞八方上應太微焚蕩邪穢朱丹吐怡神符檄命仰召靈暉急急如律令沐浴章師曰夫人處世多染六塵死入幽隂又以隂氣溟濛則重重厭穢障翳以致一性塵昏故上玄出示寶符使五香灌溉清淨魂神期可超化矣變洛室符中篇書之攪水符左子文念東井呪攪水再本師訣歷至二旨甲下入上訣左右手俱作次以左袖引男右袖引女呪曰攪水清清人得此水耳目聰明鬼得此水魂𩲸受生汝等鬼衆悉來受沾急急如律令又呪水在天為銀漢在地為黃河在人為丹田之府在道為錬火之家汝等衆浴萬鬼滅籙汝等受水永無生滅唵阿那藍訶吔耶吉唎攝男堂符女室符右二符並念合明天帝日七遍呪曰元始符命時刻升遷亡者蕩形得獲超生急急如上帝敕男堂日魂孕珠紫霞符卯文日中金光九芒入中理五氣九和十合光象朱景日魂出入華房玄飈變化上清下鎮人身泥丸絳宫緑英照韜十轉回靈養神錬形自然成真呪曰日中接景司命天君九帝齊景三光同軿與我同升髙奔三天急急如律令女室月𩲸九靈成真符黃帝中主萬神無越桃康司命太一合延受命神功白帝侍𩲸升遷三界逍遙上清呪曰日中方盈月帝元君八景羅列寶光負形身生玉液內錬外清急急如律令右符白上朱書酉文月中王光十芒入蕩穢符呪曰日月二景諸天流光東井星君東井錬度君靈澤真人救苦真人拔度真人天地真人天河龍王九鳯破穢靈官素車白馬大將軍浣濯夫人七神童子四直引魂使者六甲丙丁將軍引度錬沐升證光明謹依靈寶大法律令敕解汚浴魂符白上黑書玉訣東氣呪曰天地開明四大為常玄水洗穢辟除不祥雙童守門七靈安房雲津鋪潤萬氣混康內外利貞保兹黃裳急急如上帝律令又符沐浴形軀脫離幽途淸淨夙業九獄無拘吉今香湯瑶池甘露百體輕快四大調護受衣受食生人天處是男是女洗滌穢惡急急如上帝玄科律令黃華蕩形符呪曰天河灌東井石景水毋精元始披長夜天人逐月生沐浴蘭池上龍附長庚瓶金童灑香水玉女濯五律冠帶耀玉質錬度五仙形體香萬神集承景登髙明急急如律令丹陽符石景水毋符二符見火煉符淨血尸沐浴符青上朱書子文北氣呪曰元始符命拔度爽靈血尸臭穢凶惡潛寧七液得注五臟光生急急如上帝敕冠帶章師曰亡魂沐浴既畢當給仙衣整肅威儀俾其朝真聽法蓋凡世所製非上天自然者故用符章變錬亡者得之體貌輕清生天可待矣變男衣符變女衣符變生天淨衣符右三符並中篇書之玉訣東氣又符呪曰七曜扶衰真氣變衣四神合衛五緯交輝氣分羅綺錬空成威六合扶挾二氣玄微玉真煥爛仙女齊飛圓景素明元始慈慈急急如律令唵欣欣呼嗚伐夷帝明都變錬有形攝唵噠陀耶囉陀耶帝吽鉢吒唎唵化真晶摩訶摩訶一念平等無有高下捨彼妄緣證此清淨上清靈寶大法卷之四十二
