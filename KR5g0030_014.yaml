front:
  text: 上清靈寶大法卷之十四樓六
  hash: sha256:a51b867b9b978398f7246a3bd76b58f21557d048b8be1d10fdb5a0767789fb88
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5g0030_HFL_014-001a, image: hfl/0946/0946-004.png}
body:
  text: 洞微髙士開光救苦真人寧全真授上清三洞弟子靈寶領教嗣師王契真纂鎮禳攝制門敷落五篇師曰五篇者乃元始天尊自然飛英至精虛無混沌之氣凝結而成玉章鎮於大羅之上昔上皇元年星辰交錯亞曜加臨上犯三天曽命真梵真人齎持五篇付於五帝鎮於天元以制其天政又命真如真人齎持五篇付於五嶽以鎮其地紀以御其地祇又命妙行真人付於名山主者以候其成道之士敷揚教法下度生死蓋五篇之氣其功甚博上消天災中鎮國祚下度人民如召三界五帝建諸壇陛當以旺日常青素朱書敷露五方則萬靈振伏以集群仙可以禳度厄運如五煉生尸之法焚而用之如生人受煉則佩負在身度世永無災厄身過之後地司奉迎不經地獄即得返形遊行太空如幽魂受煉得遇斯文身有寶光永斷執迷度脫輪回之道也若行靈寶之士居山修煉常佩斯篇或鎮幽谷則魔不敢近邪不敢犯身有萬天敬重神明護門內外光明萬災不干可謂保制劫運使天長存者哉書符式法曰如書時於淨室面東再拜長跪存身為元始有萬神侍衛身有光明取五方五色氣握玉清訣以鼻引九氣入口九咽運丹田之氣上衝泥丸周流一身遍於百竅放大光明照見諸天諸地日月星宿然後誦密呪一十二遍取氣入筆起身再拜執筆叩齒三十二通面東書畢上以星斗蓋形存諸天星宿日月光明與五篇之氣交映內外即收藏之如用時當朝天門焚香再拜長跪默奏元始具白事因方取用之無不應矣祕慎之焉書五篇密呪混合帝尊八回九生玉晨金華真人敷陳飛飈玉輪太素理真靈寶天根六合洞靈五篇自然結成真文我今書篆元始分氣萬神合契俱會帝庭第一篇太清九真安化上愛玉符觀覺鬱鑑寅太明紫堂寅太釋玉房午九神魂𩲸卯開闢玉真辰阿奕煒燁巳飛天流音寅輪景帝常卯都靈四指中頤臻中指中豁落三指上大有三指中慶雲啓靈寅至中指中三真總御印中指中四指三氣分形中指上中下三節我位上王丗久長榮寅七矅輝魔坎恬會敷榮離五道運度兊九氣回旋卯七元十二紀政中指中真身酉南辰鑑映慶臻衛靈聚形東方明氣發育木精而英仁惠之氣滋衍萬彙天界地綱與時皆正凝耀神鄉結為青書第二篇交神黃明玉化之符虛無上首玉福彌辰午回象吁貟未灈濯騰精坎煥赫洞陽離浮景玉光坤七靈歌謡寅世元紫堂四指上羅英四指中散景中指中曜明玉房四指中金英玄精酉合愛玄玄巳四象卯八卦八方訣七氣飛陽陽斗七元星君隂斗三元正一巳午未申玉行從機中指中遊度五戶亥戍四象回旋三真未天氣開張巳彈聚形南方太丹之氣衍光洞煥飄擲化火融煉化九隂赤字凝章其文甚異敷映九億精明煥天第三篇真皇混丹肅玄之符入景總獸卯韶玄攝精申九都辰騫轉坤飛生上靈兊密羅淨璄寅馥郁巽延宛玄丹庭巳度華坎霐運玄明子神宫午開廓辰空輪戌灌大印四方子午印酉六律中指上攬離午十有三門上清訣收滅四氣寅申巳亥遏寧四開中指中聚形中央黃真之氣結精飛英虛落之氣混沌黃元之精交流曆律化感生文光耀萬里精芒煜煜天端之間第四篇八威禁龍制虎英太白玉化之符大猷浮景子真定丑化元寅宛延卯素渺申簫時戌玉梁澄煙玄結陽七纒四捐中秀樂三府四指下流輝九元酉寂然三指上靈𨗿中指中飛華坎拂軿酉晨濫錫籍申太漠午申延未隂十陽十子天變飛河午何丘九度五氣回飄七玄度仰酉六府充盈戍星宿停關百骸流光中指中聚形西方素威禁氣流化粹端飄摧耀神凝結成書光映萬里其文甚異列明淩芒威摧萬妖第五篇明綱玄兆大明九化之符天龍坤儛轅乾蓊靄浮羅卯紫精溟涬太育寅九機化乾申覆形厚德四指上元阿淪精四指下育瑛四指中明陀三指下景神渺雲三指上天魁總監三指中秀樂禁天坎紫虛陀五離劫量交前酉碧霞韻梵印渺渺遊凡大指中交變運量大指下馘絶惡愆中指中恢冠玄漠萬度成仙午彈聚形北方玄精發耀萬物滋形生端不竭天魔有紀玉皇上相髙觀靈化接玄庠序開明天教册封萬帝玄真感和天文敷柄典約清律天化大成凝結玉章光映九億靈寶五帝育物真符師曰五方育物符是靈寶度人中品之道乃五方五帝所掌五行造化功用是也凡修用此五符當先佩五帝真形符存五帝侍衛思五星居空玄之中各去兆面五尺存見木星青光九芒火星赤光三芒金星白光七芒水星黑光五芒土星黃光一十二芒畢然後書符書青帝符上東方香面東九拜叩齒九通閉氣九度書之玉清訣東氣書赤帝符上南方香面南三拜叩齒三通閉氣三度書之玉清訣南氣書白帝符上西方香面西七拜叩齒七通閉氣七度書之玉清訣西氣書黑帝符上北方香面北五拜叩齒五通閉氣五度書之玉清訣北氣書黃帝符上西北香面天門十二拜叩齒一十二通閉氣十二度書之玉清訣上方氣師曰五帝育物生成長養安鎮之道錬化神人莫不由此運五元五內之氣接化五帝生成須當精治若不得此道則何以生成萬物矣東方青帝木功符九氣青天青靈始老中有帝君神仙真靈歲星真君東斗注算東方青帝保肝護魂青天青帝大魔降真巴元醜伯保命長存飛天大神王執符奉行青帝天官兵馬金剛九十萬人各三匝角亢氐房心尾箕七星東方八天帝上靈流入正氣於符中八天天帝亶婁阿薈東方一篇東方天尊甲乙寅卯十二大神直符而行東方三界東嶽萬神傳命驛程右符主生化萬物鎮東方整木星失度調東方七宿璇璣來和氣除春令不調治東方毛蟲之妖統東方鬼神召東華神仙治肝病筋脈之疾治瘟疫服之九年青帝遣青靈玉童青腰玉女各九人迎兆登九氣青天位封青帝真人祕之南方赤帝火功符三氣丹天中有帝君丹靈真老神仙真靈熒惑火星南斗上生南方赤地養氣保心赤天赤帝大魔降真負天擔石保神長存飛天神王執符奉行赤帝天宫兵馬金剛三十萬人井鬼柳星張翼軫星南方八天天帝上靈流入正氣降於符中八天天帝南閻洞浮南方一篇南方天尊丙丁巳午十二大神直符而行南方三界南嶽赤帝佐命司命南方萬神傳命驛程右符主成熟萬物鎮南方整熒惑失度調南方亡宿璇璣來和氣除夏令不調治南方羽蟲之妖統南方鬼神召南極神仙治心病氣脈之疾鎮火妖服之三年赤帝遣丹靈玉童太丹玉女各三人迎兆登南方三氣丹天位封赤帝真人西方白帝金功符七氣素天中有帝君皓靈皇老神仙真靈太白金星西斗記名西方白帝侍𩲸煉真保肺安寧白天白帝大魔降真反山六目保神長存飛天神王執符奉行白帝天官兵馬金剛七十萬人奎婁胃昴畢觜參星西方八天九帝上靈流入正氣降於符中八天天帝刀利禈獸西方一篇西方天尊庚申辛酉十二大神執符而行西方三界西嶽白帝一切萬神傳命驛程右符主制伏萬物鎮西嶽整太白失度調西方七宿璇璣來和氣除秋令不調治西方甲蟲之妖統西方鬼神召西靈神仙治肺病腸胃之疾度兵災服之七年白帝遣皓靈童子玉華玉女七人迎兆登七氣素天位封白帝真人北方黑帝水功符五氣中有玄天帝君五靈神仙玄老真靈辰星真君北斗落死北方黑帝通血流精北方黑帝大魔降真監醜朗馥祛孽保真飛天神王執符西行黑帝天官兵為金剛五十萬人斗牛女虛危室壁星北方八天天帝上靈流入正氣降於符中玃無自育北方一篇北方八天天帝北方天尊北方女天鬼神拱乎魔玉敬形壬癸亥子十二大神直符而行北方三界北嶽黑帝一切萬神傳命驛程右符主收藏萬物鎮北嶽整水星失度調北方七宿璇璣來和氣除冬令不調治北方鱗蟲之妖統北方鬼神召北𡨋神仙治腎病膏血之疾鎮水妖服之五年黑帝遣玄靈玉童太玄玉女各五人迎兆登五氣玄天位封黑帝真人中央黃帝土功符一十二氣中有帝君黃靈元老三寶帝君三天上帝三天天尊北仙九聖九真九靈金童玉女三天大神中央鎮星土德安寧中斗大魁統監衆靈中央黃帝中主萬神無越無傾黃天黃帝大魔降真十方飛天神王大神執符奉行黃帝天官子二百衆官將吏一十二萬衆人魁𩲃𩵄䰢魓𩳐魒星三天髙聖九天真靈三十二天八景天帝九霄九聖靈妃上尊上皇夫人元君王母帝君真君流入正氣降於符中四方隱語三十二天帝十方天尊辰戌丑未戊己之辰六甲六丁直符而行十方三界天地水神五嶽八州一切萬神金馬驛程如有不伏三界五帝列言上清右符助四帝造化萬物鎮中嶽整鎮星失度調中斗璇璣來和氣除四時正令不調統中央鬼神召上中下界神仙治中央裸蟲之妖治脾腎肌膚之疾鎮萬災服之十二年黃帝遣黃靈玉童黃華玉女各一十二人迎兆登一氣梵天位封黃帝真人惟中央一符非王侯不可佩服青帝禦魔總真靈符四神四氣飛雲丹霄啓華總御制伏百魔無為自然梵氣彌羅日月停景璇璣不行巴元魄伯與道合真正氣所居群魔東形保制劫運使天長存方符吏啓華領兵九十萬人守衛其文其符可併赤書真文以春甲乙之日赤書紫上置於東方禳卻萬災保鎮無窮召延嘉祥物阜時康學道之士以時服之生青玉之英於肝俯之中光映形外道成青帝召迎佩之永消殃患矣赤帝禦魔總真符八方威神使我自然天真上聖自然之音明真總御却邪辟兵負天擔石遊觀太空萬靈振伏招集群仙群妖束首鬼精自亡熒惑合契與道齊年右符吏明真領兵三十萬人守衛真文其符併赤書真文以丙丁日朱書青上置於南方禳郤萬災保鎮無窮召延嘉祥物阜時康學道之士以時服之三年之後生赤玉之英於心府中光映形外道成赤帝召迎志心佩之永消殃患矣白帝禦魔總真靈符煥明五方威伏魔鋒茂成總御使道興隆太威白帝攝北羅酆赤書內文變化飛空八景𡨋含氣入玄玄匡御衆魔諸天齊功反山六目靡敢不從九和十合億劫無終右符吏茂成領兵七十萬人守衛真文其符并赤書玉文以秋庚辛日白書黃上置於西方禳卻萬災保鎮無窮召廷嘉祥物阜時康學道之士以時服之三年之後生白玉英於肺府光映形外道成白帝召迎志心佩之永消殃患也黑帝禦魔總真靈符四州九維玄黃九醜天中之神氣運樞紐天中之尊幹璇璣斗靈寶洞玄三界稽首五帝侍衛位極五九諸天遙唱萬帝設禮轉靈寶旨萬神朝禮鬼妖滅爽萬神朝禮萬災不干神明護門今日欣慶普度人天監醜朗馥守元固靈飛升金關遊宴玉京右符吏守元領兵五十萬人守衛真文其符并赤書玉文以冬壬癸之日黑書帛上置北方禳卻萬災保鎮無窮召延嘉祥物阜時康學道之士以時服之三年之後生玄玉英於腎府光映形外道成黑帝召迎志誠佩之永消殃患矣黃帝禦魔總真靈符七政所施四氣朗清天回地轉三台九晨豁落斬摧擲大流鈴萬神總梵八溢充盈靈寶衆經中主萬神飛天大醜變化爾身三官北酆明檢鬼營協𡨋德御飛謁黃庭右符吏協真領兵一千萬人守衛真文其符并赤書玉文於四季戊已之日朱書黃素置中央禳却萬災保鎮無窮召廷嘉祥物阜時康學道之士以時服之三年之後生黃玉之英於脾府中光映形外道成黃帝召迎志心佩之無所不治矣青天大魔制邪玉文四十八字鬱靄蒼精洞景閛明始陽九氣停華育童流英妙府靈真上神瓊碧雲電飛光羽妍青腰玉女太上真人保度仙籙消魔却氛赤天大魔制邪玉文四十八字昌陽真老赤靈尊神統禦丹天檢制魔群嚴駕朱鳯三角之汯上道太清玄元之恨炎熛三氣盤回絳雲育養丹府保制長存白天大魔制邪玉文四十八字七靈皎氣三素元真中有黃老制攝魔精庚辛官將七十萬兵羽旗龍節金虎雲奔斷除妖妄練育華英與道長存鹿劫無領黑天大魔制邪玉文四十八字北隂鬱單玄氣之宮帝真靈會驅神駕龍至有玉女夜光之童掌握圖籙攝制魔蹤虛危合化紫煙激風寶晶煉育後天無終黃天大魔制邪玉文四十八字元皇上靈沖妙之尊混合真朴造化元根感激幽微挺生大神攝召萬氣齋會華房消蕩百魔與道俱昌保度却災滅度除殃右五方玉文與五帝大符通靈合變節度同功上清靈寶大法卷之十四
