front:
  text: 上清靈寶大法卷之十八觀三
  hash: sha256:39bc99191117d4a4b847cdd83a2f60c7c654b899a401be7a7714be2e57e9e3d2
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5g0030_HFL_018-001a, image: hfl/0947/0947-096.png}
body:
  text: 洞微髙士開光救苦真人寧全真授上清三洞弟子靈寶領教嗣師王契真纂經句符書門十二道言七氣成符師曰道言者乃元始之敕衆經之首也其十二按一年之數可以治萬病集千神召和氣於身田一道言昔於始青天中碧落空歌大浮𥠖土中指中文仰吸中黃氣入口按三田之氣灌注成之二道言是時元始天尊說經一遍東方無極無量品至真大神無鞅之衆浮空而至按十方搯訣可制伏強邪三道言元始天尊說經中所言並是諸天上帝內名隱韻之音亦是魔王內諱百靈之隱名也子文書篆諸天名諱密呪用之四道言凡誦是經十過諸天齊到中指搯召十方上聖高真飛天神王受度等用五道言正月長齊誦詠是經中指中凡誦經隨氣先服之六道言行道之日中指中登壇朝謁治病伏魔服佩之七道言此二章並是諸天上帝及至靈魔王隱祕之音四指上凡書玉字先服之八道言夫天地運度至普度無窮大指中凡用隨經句所用九道言夫末學道淺至便得神仙中指中凡出入之間服佩之萬魔不敢干十道言夫天地運終至普度天人按子午未搯訣可以禳殄災非保安身命十一道言凡有是經至洞明至玄中指中可召三界大魔保舉上仙十二道言此諸天中大梵隱語元量之音寅申巳亥可以通章上表佩之能度剛風浩氣直入天關右四字黃上朱書制鬼禳土吸靈寶氣一氣書之十二氣而成符也右四字黃上朱書佩之集萬神制龍虎禳土鎮凶宅一氣六筆而成也元始二字符師曰元始者天尊之尊號也有十二號何謂蓋老君應化十二通元始應化十二通故中央十二氣以應元始之度人者也可以隨經句行用濟生度死並上帝訣一元始度人無量上品二元始天尊當說是經三元始天尊說經一遍四元始天尊懸坐空浮五元始懸一寶珠六元始即於寶珠之內七元始天尊說經中所言八元始上帝至尊几前九元始洞玄靈寶本章十元始祖劫化生諸天十一元始符命十二元始靈書中篇太極太初太始祖氣二氣分形三才定位四始威儀小女定坤妙極玄玄女台成質靈寶中停一轉天廣清清二轉地廣靈靈三轉人合玄冥神風靜默四氣朗清右符祈晴午文火氣聾病耳皆開聰右符治耳病卯文日氣盲者目明右符治目病辰文天門氣枯骨更生右符能還魂子午文艮氣衆真監度右符催生寅卯文東氣普得濟度全其本年右符錬度左手中指中文回尸起死白骨成人右符錬魂左手中指中文召制十方右符能驅瘟四山訣神明護門右符鎮宅左手上淸訣魂神澄正萬氣長存右符安魂魄中指中文元始安鎮右符鎮凶地酉文三光氣九和十合右符能和合中指上天門氣中理五氣混合百神右符治萬病四指甲三光氣敕符呪鬱繿阿那育京內鮮醜輪懀延定光育昌理禁謡醜光明摩夷𨚧婁密羅菩提宛𥠖真定阿貧招童薩羅巴狂明梵勃監穹窿慧覺行觀那育覺長總監行無上玄法門右呪黃紙並朱書佩服正字諸符道言右符治百病左手酉文碧落空歌右符治經絡病左手卯文大浮𥠖土右符佩之能度厄離文丑氣始當詣座右符催生安胎子午斗天真大神右符治凶怪上淸訣上聖髙尊右符同後四字疊書辟邪妙行真人右符辟邪鬼上淸訙流精玉光右符治腎漏玄訣日月九氣神風靜默山海藏雲右符治氣急左手子文天無浮翳四氣朗淸右符疊書治目病中指中文一國地上山川林木緬平一等無復高下土皆作碧玉右符連前疊書起土造作用玉清訣五色獅子右符治心病瘧疾午文無有異色衆真侍座右符安宅動土用玊清訣羣魔束形鬼精滅爽右符治妖怪艮文五色鬱勃右符治五臟氣病酉文魔精喪眼鬼妖滅爽右符治邪上清訣召制十才伏御地祇右符敕六甲遣鬼用玊清訣束縛魔靈神明護門右符同前用並玉清訣侍經五帝玉童玉女各二十四人營衛神文保護受經者身右符通前黃紙朱書佩服能護身通氣營衛神文魂神澄正萬氣長存不經苦惱身有光明三界侍衛五帝司迎急急敕右符保命定心玉淸訣五色玄龍右符治精怪子文建九色之節右符治肝病辰文嘯歌雍雍右符治肺嗽酉文五老啓途右符治脾病中指中文羣仙翼轅右符治氣病太淸上淸訣光回駕右符能回陽坤文監真度生監生大神右二符催生用並寅文諸天丞相右符治草木萬物貼埋鎮之二都監訣南昌上宫右符保命中指中文韓司主録右符佩服能延生離文東斗注算右符能益算卯文赤𥿄靑書西斗記名右符治邪記仙名黑地白書酉文中斗大魁總監衆靈右符治病辟鬼統衆靈白地黃書子午斗北斗落死右符度厄落死籍靑地黑書子文南斗上生右符消災注生黃地朱書離文此五斗符或以黃素朱書湊作一道上淸訣以絳囊盛之佩身中可解三刑六害九橫五苦一切災厄不得單用如學士所佩用五色書逐一注於符下靑帝護魂右符治肝病魂不附體黃地靑書震文東氣咒曰靑帝護魂保鎮三宫忌酸辛九日白帝侍魄右符治肺病魄彺定魄安肺赤地白書兊文西氣宜吞佩咒曰白帝侍魄冶錬隂邪忌食苦九日辛三日赤帝養氣右符治心病氣不足安神壯氣黑地朱書離文南氣吞佩咒曰赤帝養氣萬神歸身忌食甘辛五日黑帝通血右符治腎通精血扶衰憊黃地黑書坎文北氣吞佩咒曰黑帝通血萬真保精忌食甘三日鹹五日黃帝中主萬神無越右符治脾定神長肌黃地靑書中文上方氣吞佩咒曰黃帝中主萬神無越忌鹹十二日甘五日巴元醜伯右符治一切瘡玉淸訣負天擔石橫天擔力右二符玉淸上淸訣並治少氣反山六目右符治目疾玉淸訣監醜朗馥右符能益生氣中指下文五帝大魔右符祛邪治瘧玉清訣神公受命普掃不祥右符治鬼用玉淸訣八威吐毒右符治毒物傷貼酉文猛馬四張右符治畜病午文天丁前驅右符護身左手中指中文大帥仗幡右符保命辰文擲火萬里右符能燒怪寅文玉淸午出流鈴八衝右符却魔上淸訣金鉞前戮右符殺鬼降魔中指中文此五符五將主之天丁曰玉淸前驅大將大帥曰總統大將擲火曰火鈴大將流鈴曰流金大將金鉞曰殺伐大將宜治妖怪山石狐土精魅以黃紙作一道宜總書焚之大驗巨天後刑右符治邪四指根屠割鬼爽右符治鬼煞文千千截首萬萬剪形右符斬妖煞文元始安鎮右符治驚怪玉淸訣敷落五篇右符鎮宅安五藏玉淸訣千和萬合自然成真右二符和合用玉淸訣阿陀龍羅右符鎮劫災除邪惡通誠意解百厄黃上朱書中斗氣玉淸訣名大赤黃上符四象吁貟右符治隂陽二氣失於榮衛吞之黃上朱書日月氣上淸訣亦宜佩之能解百惡名皇主定元符落落高張明氣四騫梵行諸天束送妖魔精斬馘六鬼鋒諸天氣蕩蕩我道日興隆右二符與一國地土符並太書鎮宅治生營運用玉淸訣巳上符本經所載並朱書重疊成符或於經中取二字四字八字以意取之先召十方訖念本呪搯訣書訖再上香靣東南方想通光符吸氣吹筆書成念中篇一遍玉淸訣取東南氣吹之謂神洲上聖玄都玉京在東南正面西北也吞佩安鎮焚化隨事用之或治萬事亦隨事朱書汪於下隨符所敕當依直日遣飛天神王下天吏直符隨事祝遣發符前去無不應驗通光符凡書前符須想此符吸氣吹筆端次書符雜治病符右符治虛咒水下三道右符治目疾浸水洗之右符治復連燒患人前右符治疫氣宜吞佩鎮貼右符治邪宜服右符治橫逆佩服右符治祖先為妖焚與之右符治百邪佩服右符專治病補氣吞服右符壯精神驅病右符禳惡星佩之則吉右符治神少服七丸右符治百邪宜佩帶右符治百邪宜吞服右符治病補氣吞服右符禱兩書鐵札投潭中右符安鎮萬神伏右符能制魔出入常佩之右符治百精桃木朱書釘其方右符治冤對焚即解之右符治耳聾宜日服之右符立壇追鬼用右符治疫氣宜鎮服右符祈晴焚之右符治風疾服右符能治瘖啞宜吞服右符二十六道乃於中篇內取天篆成符本無符名自服則以正字救治他人則用前符取氣吹而給之上淸靈寶大法卷之十八
