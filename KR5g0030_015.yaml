front:
  text: 上清靈寶大法卷之十五樓七
  hash: sha256:7379921028e4da72f83416144f1298c668574f0de805fb4c04e4ccecd6429843
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5g0030_HFL_015-001a, image: hfl/0946/0946-066.png}
body:
  text: 洞微髙士開光救苦真人寧全真授上清三洞弟子靈寶領教嗣師王契真纂鎮禳攝制門混洞赤文章師曰太極妙化神靈混洞赤文昔天真皇人降玉隆騰勝天授虛皇天尊靈寶大法謂東華上卿洞神大夫領下元生籍左官及諸仙官曰九霄總梵八帝治天非混洞赤文不能攝化九陽而明度是以神霄玉清虛皇天泛上靈景華九陽清真虛梵之氣而成天境丹霄南極玉文天泛丹靈妙華洞陽景真元梵之氣而成天境碧霄太虛真極天泛廣靈太華上陽元真靈一之氣而成天境玉霄玉靈素華天泛玉靈素華純陽至真元一之氣而成天境太霄太靈真元天泛太靈洞華三陽九真太一之氣而成又境琅霄素靈皓元天泛素靈皓華六陽洞真至一之氣而成天境紫霄無靈上極天泛元靈紫華清陽妙真天一之氣而成天境景霄妙靈寶華天泛妙靈寶華景陽真精虛一之氣而成天境青霄玉華元極天泛青靈玉華元陽天真純一之氣而成天境此九霄九天皆混洞赤文之所開化明煥妙梵清英紫丹上靈之秀而成天篆真文矣故赤文化混洞混洞化彌羅總天無九氣之道下復九因至八梵真玉宫亦此文之所化也是以太丹天內有赤帝宫宛利城棄賢世界梵寶丹靈皆赤帝君所理中有朱陵之府流火之庭太炎之宫赤明之館丹丘火池元始天尊煉真文之所乃混洞赤文之所化梵也玉篆七十二字混洞赤文章元始啓運太玄肇靈虛極無象一氣流形化生二景五緯凝精混合自然恆除結嬰總真布景煥赫乙清炎持廓奕七紀齊并祈師盧浩丹天耀晶朱光煉度赤靄散明三華鬱秀耀映帝晨元洞玉曆章師曰昔混洞溟涬大梵彌羅諸天未分隂陽𡨋合三因九轉六變七徊元始肇形五劫𥘉化乃命梵元祖晨道君筆録天元運乘五劫故元洞者以名祖氣王曆者以記天元劫運乘五周復歸其一自一氣化分三因成九若龍若蜒蟠曲九道漠漠無極總九陽祖氣之元太上以三九運梵三五乘元合四十二氣以開始青天元祖氣東方始青之元應九陽木王之初故東方得以九氣以分天境劫號龍漢次九因重復陽氣開明赤文流光敷落五度開圖丹書太上以三乘五三轉朱英合二十四氣以開南丹天一祖氣明南方丹光之元應三陽火王之初故南方得三氣以分天境號赤明次復九因重積中黃化元天緯周纒梵元以開中皇天一祖氣明中靈黃華之光應五陽土主之初故中央得一十二氣以分天境劫號上皇次九元復因素景肇陽七明煥梵五緯乘天太上以七五三乘合三十六氣以開素靈天元祖氣明西華皓景之光應七陽金王之初故西方得七氣以分天境劫號延康次復九因周竟混化歸本一氣肇明太上以二五乘十三積元陽合三十氣以開北玄天祖元氣明玄𡨋上景之光應一陽水王之初故北方得五氣以分天境劫號開皇是以五劫既周昊天成象一氣混道八境流光三積九乘南方赤明丹光玉曆寶意四十字開三陽天元梵靈之氣浩劫開神運龍文泛赤霞八威奔電激九鳯破凶邢煉度丹星室飛元始家炎明常繼照靈慶襲農華中央上皇中靈玉曆寶章四十字開五陽又元梵寶之氣混黃生一氣感化結真形上德持柔順含光洞杳𡨋建中該九極執本統三辰煒燁天端上飛芒耀五靈西方延康素靈玉曆寶章四十字開七陽天元梵英之氣貴老儲靈粹全精耀斗滅六天滅馘滅萬寶復幽微爽氣浮高關寒光靄素輝空同枝玉勤華麗九霄飛北方開皇玄上玉曆寶章四十字開一陽天元梵混之氣五氣符元妙諸天混太冥辰精飛羽黑玉女散華青紫丹封天寶玄光凛帝庭群魔欽至化萬國保安寧五文開廓章師曰赤明開圖運度自然元始安鎮敷落五篇赤書玉字八威龍文保制劫運使天長存此乃是元始天尊大梵祖氣化生玉字出書度人也而靈書中篇在開圖之初謂之中者中和之氣融而成書故日中孝道明王主之五氣分而列五位於是赤書玉字五篇敷落故五老上帝主之所以中篇著於末者取生物首下之義故赤書先之然而真文呪訣出於古書後之學者難可施行故髙上著筆以解曲滯開演古文微妙元辭諸天尊披誦玉音十方遙唱上天設禮神魔降伏故能成天立地開張萬真安神鎮靈生成兆民匡御運度保天長存上制天機中檢五靈下䇿地祇嘯命河源運役隂陽召神使仙此至真之文妙應自然致天髙澄使地固安五嶽保鎮萬品生存可謂功用無窮學仙之士宜於元旦之始朱書黃素佩以朝真則制魔保舉度罡破壘神奧莫測若度下世亡魂遇節臘而開焚之咸覩真光化生天仙之境永斷輪回之道矣東方青帝赤書玉篇真文東方九氣始皇青天碧霞鬱壘中有老人總交圖籙攝氣舉仙巳上二十四字書九天玄臺主召九天上帝校神仙圖歲星輔肝角亢鎮真氐房心尾四景回旋箕主七宿正斗明輪乘氣捕非掃除灾群巳上三十二字書紫微宫東華殿主召星官正天分度東山神呪攝召九天赤書符命制會酆山束魔送鬼所誅無蠲悉詣木宫敢有稽延巳上三十二字書東華月靈之館主攝鬼魔正九天氣下制柬河溟海水大劫洪灾蛟龍負身水府開道通逹百千上帝敕文風火無間巳上共三十二字書九天東北玉闕丹臺主攝東海水帝大劫洪灾召蛟龍及水神等事右合一百二十字皆元始自然之書一名生神寶真洞玄之章一名東山神呪八威䇿文東方安寶華林青靈始老帝君所掌也南方赤帝赤書玉篇真文南方丹天赤帝玉堂中有大神號曰赤皇上炎流煙三氣勃光神仙受命應運太陽巳上三十二字書九天洞陽之館主召九天神仙圖籍金名熒惑輔心井鬼守房栁呈張翼統御四鄉軫總七宿回轉天當召運促會正道驛行巳上三十六字書三氣丹臺主召星官明度數正天分北攝酆山束送魔宗符校所討明列罪源南山神呪威伏八方群妖滅爽萬試摧亡巳上三十二字書於西南玉闕主制北酆以正鬼氣南河水帝太伯龍王神呪流行普掃不祥洪水飛灾上召蛟龍開除水徑千道萬通敢有干試攝送火宫赤書所告莫有不從巳上四十八字書西南正陽玉闕主南海水帝大劫運交洪水四出主召蛟龍水神事右合一百四十八字皆元始自然之書一名南雲通天寶靈襟一名九天神呪一名赤帝八威䇿文南方梵寶昌陽丹靈真老帝君所掌中央黃帝赤書玉篇真文中央總靈黃上天元始生五老中皇髙尊攝氣監真總領群仙典録玄圖宿簡玉文推運上氣普告萬神巳上四十字書太玄玉寶玄臺主神仙玉簡宿名總仙氣也鎮星輔脾回度北元魁𩲃主非截邪斬根𩵄䰢魓𩳐掃穢除氛魒正玄斗明度天關九天符命金馬驛程巳上四十字書玄都玉臺主攝星官正天度數勑攝北帝遏塞鬼門剪除不祥莫有當前巳上一十六字書玄都玉臺主攝北帝正天氣檢鬼精中山神呪召龍上雲制㑹黃河九水河源不得怠縱善惡悉分千妖萬奸上對帝君莫有千試太陽激焚亦書玉字宣告普聞巳上四十八字書玄都玉臺主攝中海水帝四泉之水洪灾湧溢之數召水蛟龍事右合一百四十四字皆元始自然之書一名寶敕洞清九天靈書一名黃神大呪一名黃帝威靈䇿文中央玉寶元靈元帝君所掌也西方白帝赤書玉篇真文西方素天白帝七門金靈皓映太華流氛白石峩峩七氣氤氲上有始生皇老大神總領肺氣主校九天檢定圖籙制召上仙巳上四十八字書九天素靈宫北軒之上主召仙氣舉仙道也太白檢肺奎婁保魂胃昴畢觜主制七關參總斗魁受符北元巳上二十四字題金闕玄窗主攝白帝星官正明天度赤書玉字九天正文攝召萬氣普歸帝君巳上十六字題金闕三圖館主攝六天鬼氣行此法也西山神呪八滅七傳符水上龍召山送雲在所校録同到帝前輔衛上真斬滅邪源若有不祥截以金關赤書符命風火驛傳巳上四十八字題金闕三圖館主攝西海水帝及水中萬精召雲龍以防水患之事也右合一百三十六字皆元始自然之書一名西山神呪一名八威召龍䇿文西方七寶金門皓靈皇老帝君所掌也北方黑帝赤書玉篇真文北方玄天五氣徘徊中有黑帝雙皇太微總領符命仙煉八威青裙羽𧜭龍文鳯衣上帝所舉制到玉階巳上四十字書鬱單玄元紫微臺北軒主諸天真人神仙圖籙北辰輔賢斗牛鎮扇女虛危室豁落四關璧總七星執凶紏非却夭掃穢明道動輝巳上三十二字是天北玄元斗中書也主北方星官正天氣北山神呪激陽起雷流鈴煥落钁天振威北酆所部萬妖滅摧巳上二十四字書北朔單鬱絶之臺主攝天魔北帝萬鬼九河傾訖鳥母群飛蛟龍通道水伯洞開赤文玉書驛龍風池巳上二十四字赤書北朔單鬱絶之臺主北海水帝制水中萬精召蛟龍負身右合一百二十字皆元始自然之書一名元神生真寶眀文一名北山神呪一名八威制天䇿文北方洞隂翔單鬱絶五靈玄老帝君所掌也上清靈寶大法卷之十五
