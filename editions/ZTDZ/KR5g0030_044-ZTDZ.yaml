front:
  text: 上清靈寳大法卷之四十四圖二
  hash: sha256:8144326cf7e53adbe1de2ff3741208be679d220184cef7b40e3868e723dcc441
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5g0030_SJB_044-301053a, image: sjb/30/301053a.png}
body:
  text: 洞微髙士開光救苦眞人𡩋全眞授上清三洞弟子靈寳領教嗣師王契眞纂齋法符篆門赦拔亡魂章師曰凡欲修建大齋普度幽冥須奏告上玄先行赦拔之法惟在上章拜表肆赦頒符然後方可開壇行事蓋法中有赦有籙有簡有誥有符有劵皆依次而告行是故於預告之時則上救苦表頒九龍符青宫誥以次上素車白馬章則頒普告三界誥上破酆都開業道章則頒酆都拔贖誥元始符命誥太上敕赦救苦符破地獄符拔幽魂符三官簡九幽玉白二簡等齋事扣期則上開通道路章頒玉皇誥敕制地祇誥建齋之後上沐浴煉度章頒金液煉形誥雷文誥生天籙長生符等以次上昇度亡魂章頒歷關諸天誥凡諸符誥皆可依類告行不可混雜先後冝以意消詳况符契乃上天之眞命幽冥得之莫不遵承今按齋法條具如左太上敕赦生天寳籙法曰先於靖室冥心靜坐依法内煉畢方上香面北長跪黙奏玉晨道君南斗星君南上諸眞乞降生天敕赦容臣書篆按式頒行如法口奏畢心存九拜想天門三重金光煥然中有金闕見玉晨雍容左右侍眞羅列方黙奏九拜良久見慈顔懽恱敕玉童玉女捧寳匣自百寳光中下降案前光芒如日照徹天地次啓匣敷開寳籙一如請降之數便吸入籙紙中合而爲一存朱筆硯中皆有光明方叩齒三通三拜而退面東平坐小息令神炁俱定次左手掐都監訣四指中文右手執筆香上呪曰无上玄元太上道君教臣行符照破幽獄死魂出離得覩光明急急如律令右呪五千遍吸天門青黄白三炁入筆及朱紙之中先書无上等篆二十八字次左手掐南斗訣魑子丑𩲕中中𩲓四中四上中上午出存六星如日輪初出之狀自南而下光明无極剔訣入籙中存六星光芒透入籙中與籙之六星合而爲一透底有光次左手掐離文取真光入筆先書六星諱運處離宫明同日曜宰御火帝禀質隂陽位尊南極陶魂鑄魄威勝无方曲赦九幽魂次用六宫眞號塗之毎星六轉天府司命眞君天相司録眞君天梁延壽眞君天童益筭眞君天樞度厄眞君天機上生眞君次叩齒一十二通引炁祝曰大行梵炁周廻十方中有度人不死之神止無量度人急急如上帝律令敕右念此呪以筆述星罡筆盡呪盡吹炁剔訣次書下四字念唵吟吒唎九遍搯中文存天門金光如長虹入籙透底光明次下筆唵吟吒唎右念此四字爲呪不計其數又念四字毎一字四轉塗之共一十六轉剔筆上出次以一筆挑上蓋之呪曰元始符命時刻昇遷亡魂受度立便生天急急如元始上帝律令敕取天門金光入桃玉清訣發筆存金光道炁自設迸岀符金光燦於十方度生濟死隱書毎一字念太上慈悲呪三遍又有天覆地仰二筆蓋每字上又於此二筆上轉筆九次呪曰吾奉太一救苦天尊敕行九揷筆再取青玄炁吹巳上四字或眞書或對書或疊書皆有說此乃玉晨祕諱元始乃玉晨之師故用元始律令亡者得之无不生天故爲生天寳籙書訖祝之祝呪南上六星出幽入冥吾奉帝敕速監生靈南昌上籍即得返魂急急如律令總呪太上道君敕付崑崙神符一下拔度死魂急急如律令右此呪不以遍數多念爲妙更加前面祕諱符呪祝之再吸天門金光萬道入籙中剔中文存星光交纏朗然如日内外洞徹再上香叩齒九通三拜跪奏重行請降亦依前存用若臨壇告行亦如請降存用祝遣焚之存籙中金光照徹十方九幽泉曲無不煥赫一切罪魂俱覩光明離苦登眞矣籙總式无上玄元太上敕赦生天寳籙告下十方三界天牢地獄主者度人不死之神南極長生之君度世司馬大神好生韓君丈人无上玄元玉晨道君教臣行符照破幽獄死魂出離急急如太上律令敕具法位臣姓某據入意據詞難抑除巳節次飛奏天廷取㫖頒行外尚慮所薦亡魂宿愆深重未該赦原拘繫冥曹難已受度乞宣降太上敕赦生天寳籙拔贖罪魂出離苦趣今準敕命告行者右奉太上敕赦生天寳籙告下十方三界天曹地府山川海嶽泉曲冥關北都羅酆六洞十宫三宫九府百二十曹鬱絶之鄉幽塗之境諸大地獄九州分野福地名山城隍社令神物司臨之所仙曹典録之墟較量罪福考察功過一切天牢地嶽主者咸領符命敕赦亡過某及受度亡䰟九州孤爽冥司地獄陰曹幽扄罪䰟苦爽生前所造三業六根塵勞諸罪殁後受報𡨚愆應是故爲誤犯或手弒君父不孝二親或誹謗大道背眞就僞或殘傷兄弟謀反師尊或六親通同婬犯骨肉或爲劫賊殺害人命或屠割衆生自饒一身或以强淩弱以貴虐賤或浮好三寳執心不專或輕慢法師穢賤靈文或心懷隂賊安忍嫉妬或惡口兩舌闘亂善人或殺生淫祀祼露三光或心生或口語或自作或教他積劫以來所有諸罪承此太上慈恩並與疾除罪簿落滅惡根不得拘留徑出地獄永離幽隂皆證妙果如擔砂負石漣汲溟波之衆驅雷役電掃山穿地貫天引水之徒並與斷地逮役永使逍遥即令上件亡䰟七炁成眞六儀運虚五靈續絶二曜扶衰旋綱躡空飛歩雲宫胚胎有始塵劫无終金城孕質玉洞凝神眞炁內養以成眞人上入太虚下洞幽泉雲宫寳闕中有眞䰟出入福郷周旋生門咀嚼靈芝灌漱金泉甘露川流懸澍丹田紫霞朝映三炁凝煙瓊室化仙安座金蓮眞儀掩日塵劫爲年一如告命太歳年月日𠮷時告下具法位臣姓某承誥奉行天樞上相天機内相泰玄上相天機上相東極宫中太一救苦天尊萬劫應化眞元教主太上老君内封式太上敕赦生天寳籙具位臣姓某奉行謹封内封背書敕赦亡過某等䰟外函式太上敕赦生天寳籙告下三界十方天牢地獄主者具位臣姓某謹重封右籙告下隂曹釋赦无間罪業籙用黄紙朱書髙九寸後用白紙繳告文大字墨書内外封函並用青紙朱書於拜酆都赦罪章後告行赦文式今月某日奉太上玉晨元皇大道君靈寳天尊敕降下爲髙功某奏乞爲列詞請降太上敕赦生天寳籙開光長夜原赦罪䰟今奉太上敕命告下者右籙同前用黄紙朱書赦文用黄素墨書並用黄紙作内外封告二十道九州用九道十方十道一道專度亡䰟姓名讀訖焚之即得赦宥萬罪千愆受煉更生又一法凡普度衆䰟及六道孤䰟以黄紙長九寸闊三寸亦依前書敕赦生天籙别有告文作五行書隨所度名數岀給多少依太極仙翁祭煉法行生天寳籙救苦天尊寳劵青玄救苦敕命告行大慈憫赦九夜咸原分身散形隨念尋聲三光眞精普度罪䰟玄神炁君太乙救苦天尊九聲丹天三炁北府消名玄元祖炁灌漑身形二象四顧紫雲覆身亡䰟秉敕時刻昇遷天門炁吹再書念四字爲呪疊書毎字各轉筆九帀元始符命時刻昇遷亡䰟受煉立便生天天門炁覩見光明速生天界急急如救苦天尊敕轉等十帀拂筆十次再念十玉寳皇上天尊卯方天尊號隨方搯訣玄眞萬福天尊午太妙至極天尊酉玄上玉晨天尊坎好生度命天尊已太靈虚皇天尊申度仙上聖天尊寅玉虚明皇天尊乾元量太華天尊亥眞皇洞神天尊巽三帀玉清大帝敕慧光一到幽牢罷對速生天界三帀上清大帝敕慧光一到幽牢罷對速生天界三帀太清大帝敕慧光一到幽牢罷對速生天界存光芒照曜天地度亡䰟告文右太上生天寳籙給付某人收執俓詣所屬請乞主者遵依太上敕命即使時刻昇遷一如告命度孤䰟生天籙式太上生天寳籙超度合受度孤䰟出離幽夜隨果徃生主者遵依符命施行太歳年月曰告下具法位姓某奉行又式太上生天寳籙右奉寳籙給付合受度孤䰟俓詣所屬曹局請主者遵依太上敕命即與隨品受生託化人天一如告命太歳年月日時告下具法位臣姓某承誥奉行度師東極宫中大慈仁者太一救苦天尊牒式泰玄都省牒九幽掌宰何都承子舉當省奉帝敕四大幻骨肉之軀儔能不死一元攝形氣之㑹莫大好生故凡玄範之昭回翳匪皇風之滲漉幽都黒壤蓋警背正以趨邪上宫紫微以待超凡而入聖限界本别趨向奈差驟意馬而逐心猿七情不返溺愛河而淪苦海萬劫彌深彼爾林林抑何昧昧經科三十六部明如幽室張燈職守百二十曹詳於廣幅施尺無非與物爲作好因今有具位某奏爲入意附薦宗親外姓徃化願度十方旁資六道報本反始旣知存誠以事天錫𩔖推恩冝與舉斯而加彼用頒符籙大示寵綏除犯非天毀道叛君逆親不以赦原減外其餘在水在陸若顯若幽或故或新無小無大準今元始符命並與等差減降原免者一齋官某所正薦某或生前有念慮差忒行事違誤處準今符命時刻昇遷一齋官某所同薦某旣已數該赦宥無罪可原準今符命更與進昇仙品一齋官某所附薦本宗自髙曽以下止于弟姪應自死而未得解脫或已生而復墮輪廻者準今符命並與品量該度超昇一齋官某就壇普度一切男女等魂不論逺近準今符命並與赦罪往生一應恃勢作威陷人於死妄開邊隙以殺無辜貪財劫掠貨藥毒人悖亂人倫婬犯六親準今符命並與減降一等一應犯三光厭惡風雨故殺物命隂私設謀損害人命誅降殺伏侍師失律辜法妄殺負財欠命見坐報對者準今符命並與品量故誤照赦原減一應一切䰟𩲸死於非命無辜國法天憲戰闘桎梏沉溺懸墜瘟疫螫毒産難自殺吞噬傳疰迷戀驚畏殘廢血光十相不完等衆及其他色目條列不盡不論有主無主見在沉淪者準今符命並與釋放隨品開度一應飛走潜動元是人身今墮輪廻未正本相準今符命並與品量託化一應山林廛洞有學道煉形以符籙藥石救人元功未就竟歸鬼録者準今符命所屬保明特與昇度一應村疃里社忠臣孝子山林廟食祀典諸神能徇民祈禱保護福澤者準今符命許所司保明例與昇遷一應黄籙齋壇受事奉命隨法輔教神將官兵功曹上地等神及中下界有預曹局準今符命例與進陞一品其餘所犯自今月某曰昧爽以前已發覺未發覺已報對未報對咸赦除之於戲上天之載無聲扣之則應下民之孽匪降昧者自貽期務小心以將大賚赦書到日主者施行牒奉敕書如右倐到請飜録遍牒合屬去處疾速遵照施行其有奉命不䖍並依律論故牒又牒泰玄都省牒九幽掌宰喬知府㓜聞敕門下撫御有形之衆𩔖廓垂無劫之丕基陽冥在覆露之中生死屬權綱之下物所尚者人爲貴焉始𢌿性之善良終流心於頑獷徇六情積成三業差一念遽入九幽天網恢恢憲章凛凛覊留惡圄囚繫幽牢赦未該原恩無踈放庸示勸懲之道特頒拯拔之仁睠大教之宣行憫衆生之淪滯匪加黜陟曷表生成錫命玄都分符曲府勑萬神而敬聽付主者以奉行當省據髙功某奏爲齋官某人報薦某開建昇度九幽大齋修設冥陽淨醮廣崇善利普拔沉淪仰祈天恩俯垂昇濟伏取敕㫖事牒奉三天門下敕大德本於好生用廣滌瑕之澤至誠可以事帝俯從濟衆之求下寛大之敕文布昭慈之宸貺頒符曲府昧爽咸恩播告於先要約記後一赦文自今月某日昧爽以前除犯誣天毀聖冐律違科反道亂常隂謀劫殺罪大惡極律所不赦其餘罪衆已結正未結正巳發覺未發覺已受苦未受苦已報對未報對並準元始符命咸赦除之一應囚繫去處久被嚴刑深沉惡趣雖霑恩霈未沐赦原或能悔過自新屏惡向善不以罪業深重準今敕命特令隨品受生一應五嶽大川九幽都府城隍社令泉曲河源郊野址墟邪途異域棲棲滯𩲸總總孤䰟百家九流四生五道血湖罪爽夭横傷亡無倚無依難名難狀漂流幻海沉溺愛河展轉輪廻未能解脫準今符命悉與超昇一應陽間𣗥寺州縣獄司廂幕市曹戰塲土寨其有罪衆拘縳致殞𡨚對而终犯憲遭刑被兵殁陣留連未釋超脫無由照準敕文咸令受度一應諸遊奕之神五通木野之𩔖依憑草木淫亂生靈假借妖精妄求血祀致干天律收攝玄司知過能悛並與比附原情咸從釋放仍仰所在里域神司昭論俾歸正道以俟寵綏一應靈壇社廟血食神祇衞護人民匡扶境域恢張山嶽主理川源顯立功勛徇民祈禱準今敕令仰逐部保舉例與推恩一應山林巖洞幽谷異人訪道求師修眞錬性拯幽拔滯濟苦恤貧上𩔖天心下賙人急至於忠烈孝義威武仁慈廣積隂功衆所推敬雖終上壽未陟仙郷準今敕令冝令所屬遍行根刷速與保奏照格陞遷一應崇修黄籙廣濟無邊仰三界司察靈官黄籙院昇度主者紀録功勲超乎正薦併資祖禰内外宗姻旁及附薦異姓亡靈均被宸恩同登道境無拘地戸昇陟仙階一應臨壇將帥效職官君監衞齋壇輔賛道法神功受命隨事立功照準玄科並與遷爵一品一應三元九府五嶽四司酆都九幽泉扄以下掌生死罪録之官主典刑執罰之吏城隍社令里域土司地道驛傳等神諸處管押將佐依準玉格各與進秩一階一應赦文該載不盡名目繁多律無明文並與比𩔖放行一應冥司去處輙以赦前事再舉拘連亡者以其罪罪之於戲奉天光而頒帝命有感必通塞死戸而開生門無所不度赦書到日主者施行右牒奉敕赦如前宣令九幽掌宰疾速飜録行下合屬去處遵依敕令施行故牒太𡻕年月日具法位臣姓某準行具列天省八相敕赦二字一玉清上帝廣救無邊上清大帝釋宥讎𡨚太清大帝普掠重泉玉皇上帝罪考俱原諸天降詔羅山絶然三途五苦九幽酆泉普皆解脫釋絶攀縁急急知玉清上帝敕無主孤上昇三天有𡨚有結普皆除蠲廣救重隂與天齊年左原沉墮男女隂䰟右赦冰城悉皆開宣冰城爐炭雪扄幽泉陽光破燭並赴十天有功有命上奏三天有惡有逆準命赦原今日敕命時刻昇遷北都寒池部衞形䰟制魔保舉度品南宫十天告命風火無停幽關罷考爐炭絶煙不得有違冥曹合同準敕遷神急急如元始上帝敕右三宫訣午文出放筆了發十天訣捧赦赦書泰玄都省牒本省奉三天門下朱書據髙功某奏爲入意今準帝㫖代天奉行者書符道言元始符命自龍漢之劫方傳隠韻祕文乃浮黎之天受度廻骸起死白骨成入煉炁保眞丹書列字爰從沉淪之苦貪逐世縁遂將澄湛之機浸成業海千生萬死受報隂關十地九泉不開長夜致眞司之列奏祈恩霈之普施我道至慈在深憫惻冝從所請用示洪私可頒赦下酆都應亡過某等從前或有所犯違天負地不孝不忠不仁不義故殺誤傷六情六慾之罪不以輕重咸赦除之一依符命出離幽隂上登福境應九泉罪䰟三途苦爽違天毀聖故作悮爲爲臣不忠爲子不孝縱傷物命隂毒損人罪無輕重已未發覺曽未結正咸赦除之其餘六道四生無主孤䰟等衆隨縁昇度趂福受生解釋𡨚仇永資逸樂其臨壇靈官典者將佐小吏直符直吏各遷爵一品酆都長夜牛頭獄卒諸大鬼王九幽都司城隍里社在時用事官將主者各進秩一階從今以去如遇修建黄籙大齋濟度幽𡨋一如今來格降施行赦書行周天界遍詣重泉敢以赦前事告者以其罪罪之主者施行於戲大道之靈在神明之顯化至仁之德庶幽暗之普霑几厥有情禀兹元造母或自怠以取譴訶施行牒奉赦書如前冝令酆都疾速徧牒施行仍關申合屬去處牒至準敕故牒太歳年月日告下法位臣姓某承誥奉行列八相位封式泰玄都省牒九幽掌宰詔書泰玄都省敕門下罪疑惟輕功疑惟重自昔帝者之世訓迪士師之官以虞舜之宅心體臯陶之邁德尤重人命深用哲刑民恊于中欲從以治繄爾士庶職在地司間召二三之臣以較大小之獄猶慮簡戒未授新故相仍稍加煆勵之威莫測生成之徳悉宜肆赦咸與惟新俾㑹觀闕之前獲聞道德之要惟爾典憲體予至懷故兹詔示想冝知悉據某人入意切盧亡魂生存之日旋積罪尤亡殁之後必拘幽夜雖屢伸於薦拔恐未遂於超昇一正薦某一附薦某等一普薦五姓孤䰟陣亡官兵等衆男子三䰟七𩲸女子三䰟一十四𩲸告下考官之庭者右奉敕冝今三界所屬考校罪䰟諸司特與省罪疾速津發前項亡過其等䰟以今月某日前來齋所面覩慈尊親受開度蓋元始上帝度人功大風火不停準敕如右牒至準式奉行故牒太歳年月日時吿下法位臣姓某承誥奉行省主三天扶教正一靜應眞君封式泰玄都省牒酆都主者右詔書赦書二件非齋法所載徃徃後人自撰旣諸方流傳久矣不用刪去今併存之若用時當於預告先行詔書了扣期却行赦書與敕赦同時頒告其詔赦並用髙頭黄紙大字書内有字與符命及篆文朱書都用繳赦牒遣赦牒發赦關之𩔖並見章奏門東極青宫太乙寳誥長樂天中東極宫赤玄光内紫金容大聖神道廣度沉淪九幽教主大慈仁者㝷聲赴感應念垂慈億億劫中無量度人大慈大悲大智大慧太乙救苦天尊右奉太一寳誥伏請地獄諸司𡨋曹主者遵承敕下開度亡幽俾令受度主者敬聽恭禀誥命準此奉行太歳年月曰𠮷時告下法位臣姓某承誥奉行東極宫中大慈仁者太一救苦天尊金闕玉皇寳誥靈寳大法司今月某曰恭奉玉皇𧇖敕頒下玄文寳誥度脫罪䰟超昇玉京者金闕仙籙監眞度生玉皇寳誥太上彌羅無上天妙有玄眞境渺渺紫金闕太微王清宫無極無上聖廓落法光明寂寂浩無宗元梵總十方湛寂眞常道恢漠大神通玉皇大天尊玄穹髙上帝右奉金闕仙籙玉皇𧇖誥伏請靈寳至眞十方上聖依靈寳度人之典施廻骸起死之功敕下九幽俾苦䰟行開泰誥行諸地令滯爽以霑恩主者奉行恭禀誥命準此奉行太歳年月日時告下法位臣姓某承誥奉行玉皇大天尊玄穹髙上帝靈寳酆都拔罪眞誥靈寳大法司今月某日恭奉玄誥拔贖罪䰟徃生南宫者酆都受制令茫茫酆都中重重金剛山靈寳無量光洞照炎池煩七祖諸幽䰟身隨香雲輿定慧青蓮花上生神永安功德金色光微微開幽關華池流眞香蓮蓋隨雲浮干靈重元和常居十二樓急宣靈寳旨自在天堂遊右奉太上玉文酆都符命拔除衆罪贖命幽都萬神敬從永無執繫乗天尊之慧命脫地獄之拘留託質仙都常居樂境準此奉行太嵗年月日時告下法位臣姓某承誥奉行右諸誥命並用黄紙朱書告文墨書外用封函如式上清靈實大法卷之四十四
