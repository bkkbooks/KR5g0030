front:
  text: 上清靈寳大法卷之十八觀三
  hash: sha256:0a47eae31901f9bca0d3bff896d6732e41f80876591c86f911d7df7f47602bc7
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5g0030_SJB_018-300816a, image: sjb/30/300816a.png}
body:
  text: 洞微髙士開光救苦眞人𡩋全眞授上清三洞弟子靈寳領教嗣師王契眞纂經句符書門十二道言七炁成符師曰道言者乃元始之敕衆經之首也其十二按一年之數可以治萬病集千神召和炁於身田一道言昔於始青天中碧落空歌大浮𥠖土中指中文仰吸中黃炁入口按三田之炁灌注成之二道言是時元始天尊說經一遍東方无極无量品至眞大神无鞅之衆浮空而至按十方搯訣可制伏強邪三道言元始天尊說經中所言並是諸天上帝内名隱韻之音亦是魔王内諱百靈之隱名也子文書篆諸天名諱密呪用之四道言凢誦是經十過諸天齊到中指搯召十方上聖高眞飛天神王受度等用五道言正月長齋誦詠是經中指中凢誦經隨炁先服之六道言行道之日中指中登壇朝謁治病伏魔服佩之七道言此二章並是諸天上帝及至靈魔王隱祕之音四指上凢書玉字先服之八道言夫天地運度至普度無窮大指中凢用隨經句所用九道言夫末學道淺至便得神仙中指中凢出入之間服佩之萬魔不敢干十道言夫天地運終至普度天人按子午未搯訣可以禳殄災非保安身命十一道言凢有是經至洞明至玄中指中可召三界大魔保舉上仙十二道言此諸天中大梵隱語元量之音寅申巳亥可以通章上表佩之能度剛風浩炁直入天關右四字黄上朱書制鬼禳土吸靈寳炁一炁書之十二炁而成符也右四字黄上朱書佩之集萬神制龍虎禳土鎭凶宅一炁六筆而成也元始二字符師曰元始者天尊之尊號也有十二號何謂蓋老君應化十二通元始應化十二通故中央十二炁以應元始之度人者也可以隨經句行用濟生度死並上帝訣一元始度人無量上品二元始天尊當說是經三元始天尊說經一遍四元始天尊懸坐空浮五元始懸一寳珠六元始即於寳珠之内七元始天尊說經中所言八元始上帝至尊几前九元始洞玄靈寳本章十元始祖劫化生諸天十一元始符命十二元始靈書中篇太極太初太始祖炁二炁分形三才定位四始威儀小女定坤妙極玄玄女台成質靈寳中停一轉天廣清清二轉地廣靈靈三轉人合玄冥神風靜黙四炁朗清右符祈晴午文火炁聾病耳皆開聦右符治耳病卯文日炁盲者目明右符治目病辰文天門炁枯骨更生右符能還魂子午文艮炁衆眞監度右符催生寅卯文東炁普得濟度全其本年右符錬度左手中指中文廻尸起死白骨成人右符錬魂左手中指中文召制十方右符能驅瘟四山訣神明護門右符鎭宅左手上淸訣魂神澄正萬炁長存右符安魂魄中指中文元始安鎭右符鎭凶地酉文三光炁九和十合右符能和合中指上天門炁中理五炁混合百神右符治萬病四指甲三光炁敕符呪鬱繿阿那育京内鮮醜輪懀延定光育昌理禁謡醜光明摩夷𨚧婁密羅菩提宛𥠖眞定阿貧招童薩羅巴狂明梵勃監穹窿慧覺行觀那育覺長緫監行无上玄法門右呪黄紙並朱書佩服正字諸符道言右符治百病左手酉文碧落空歌右符治經絡病左手卯文大浮𥠖土右符佩之能度厄离文丑炁始當詣座右符催生安胎子午斗天眞大神右符治凶恠上淸訣上聖髙尊右符同後四字疊書辟邪妙行眞人右符辟邪鬼上淸訙流精玉光右符治腎漏玄訣日月九炁神風靜黙山海藏雲右符治氣急左手子文天無浮翳四炁朗淸右符疊書治目病中指中文一國地上山川林木緬平一等無復高下土皆作碧玉右符連前疊書起土造作用玉清訣五色獅子右符治心病瘧疾午文無有異色衆眞侍座右符安宅動土用玊清訣羣魔束形鬼精滅爽右符治妖恠艮文五色鬱勃右符治五臟炁病酉文魔精䘮眼鬼妖滅爽右符治邪上清訣召制十才伏御地祇右符敕六甲遣鬼用玊清訣束縛魔靈神明護門右符同前用並玉清訣侍經五帝玉童玉女各二十四人營衞神文保護受經者身右符通前黄紙朱書佩服能護身通炁營衛神文魂神澄正萬炁長存不經苦惱身有光明三界侍衞五帝司迎急急敕右符保命定心玉淸訣五色玄龍右符治精恠子文建九色之節右符治肝病辰文嘯歌邕邕右符治肺嗽酉文五老啓途右符治脾病中指中文羣仙翼轅右符治炁病太淸上淸訣光回駕右符能回陽坤文監眞度生監生大神右二符催生用並寅文諸天丞相右符治草木萬物貼埋鎭之二都監訣南昌上宫右符保命中指中文韓司主錄右符佩服能延生离文東斗注筭右符能益筭卯文赤𥿄靑書西斗記名右符治邪記仙名黒地白書酉文中斗大魁緫監衆靈右符治病辟鬼統衆靈白地黄書子午斗北斗落死右符度厄落死籍靑地黒書子文南斗上生右符消災注生黄地朱書离文此五斗符或以黄素朱書湊作一道上淸訣以絳囊盛之佩身中可解三刑六害九横五苦一切災厄不得單用如學士所佩用五色書逐一注於符下靑帝護魂右符治肝病魂不附體黄地靑書震文東炁咒曰靑帝護魂保鎭三宫忌酸辛九日白帝侍魄右符治肺病魄彺定魄安肺赤地白書兊文西炁宜吞佩咒曰白帝侍魄冶錬隂邪忌食苦九日辛三日赤帝養炁右符治心病炁不足安神壯炁黒地朱書离文南炁吞佩咒曰赤帝養炁萬神歸身忌食甘辛五日黒帝通血右符治腎通精血扶衰憊黄地黒書坎文北炁吞佩咒曰黒帝通血萬眞保精忌食甘三日鹹五日黄帝中主萬神無越右符治脾定神長肌黄地靑書中文上方炁吞佩咒曰黄帝中主萬神無越忌鹹十二日甘五日巴元醜伯右符治一切瘡玉淸訣負天擔石横天擔力右二符玉淸上淸訣並治少炁反山六目右符治目疾玉淸訣監醜朗馥右符能益生炁中指下文五帝大魔右符祛邪治瘧玉清訣神公受命普掃不祥右符治鬼用玉淸訣八威吐毒右符治毒物傷貼酉文猛馬四張右符治畜病午文天丁前驅右符護身左手中指中文大帥仗幡右符保命辰文擲火萬里右符能燒恠寅文玉淸午出流鈴八衝右符却魔上淸訣金鉞前戮右符殺鬼降魔中指中文此五符五將主之天丁曰玉淸前驅大將大帥曰緫統大將擲火曰火鈴大將流鈴曰流金大將金鉞曰殺伐大將宜治妖恠山石狐土精魅以黄紙作一道宜緫書焚之大驗巨天後刑右符治邪四指根屠割鬼爽右符治鬼煞文千千截首萬萬剪形右符斬妖煞文元始安鎭右符治驚恠玉淸訣敷落五篇右符鎭宅安五藏玉淸訣千和萬合自然成眞右二符和合用玉淸訣阿陀龍羅右符鎭劫災除邪惡通誠意解百厄黄上朱書中斗炁玉淸訣名大赤黄上符四象吁貟右符治隂陽二炁失於榮衛吞之黄上朱書日月炁上淸訣亦宜佩之能解百惡名皇主定元符落落高張明炁四騫梵行諸天束送妖魔精斬馘六鬼鋒諸天炁蕩蕩我道日興隆右二符與一國地土符並太書鎭宅治生營運用玉淸訣巳上符本經所載並朱書重疊成符或於經中取二字四字八字以意取之先召十方訖念本呪搯訣書訖再上香靣東南方想通光符吸炁吹筆書成念中篇一遍玉淸訣取東南炁吹之謂神洲上聖玄都玉京在東南正面西北也吞佩安鎭焚化隨事用之或治萬事亦隨事朱書汪於下隨符所敕當依直日遣飛天神王下天吏直符隨事祝遣發符前去無不應驗通光符凢書前符須想此符吸炁吹筆端次書符雜治病符右符治虚咒水下三道右符治目疾浸水洗之右符治復連燒患人前右符治疫氣宜吞佩鎭貼右符治邪宜服右符治横逆佩服右符治祖先爲妖焚與之右符治百邪佩服右符專治病補氣吞服右符壯精神驅病右符禳惡星佩之則吉右符治神少服七丸右符治百邪宜佩帶右符治百邪宜吞服右符治病補氣吞服右符禱兩書鐵札投潭中右符安鎭萬神伏右符能制魔出入常佩之右符治百精桃木朱書釘其方右符治冤對焚即解之右符治耳聾宜日服之右符立壇追鬼用右符治疫氣宜鎭服右符祈晴焚之右符治風疾服右符能治瘖啞宜吞服右符二十六道乃於中篇内取天篆成符本無符名自服則以正字救治他人則用前符取炁吹而給之上淸靈寳大法卷之十八
