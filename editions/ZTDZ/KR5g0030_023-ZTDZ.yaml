front:
  text: 上淸靈寳大法卷之二十三觀八
  hash: sha256:5e7531d4c8983488c9a45dfa3c3b099d7d2a962cc6136a181af955414591798c
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5g0030_SJB_023-300864c, image: sjb/30/300864c.png}
body:
  text: 洞微髙士開光救苦眞人甯全眞授上清三洞弟子靈寳領教嗣師王契眞纂經句符書門書符敕朱墨咒上清訣朱南炁墨炁太玄殺炁朱丹流光入於其中萬惡逃亡急急如靈寳符命律令敕筆咒神筆通靈上合玉淸書符殺鬼治病安寜凶災萬禍所向摧傾符到奉行發符咒玉清訣天門炁靈寳大法元始眞文虚旡大道結化三淸炁降入符符到安寜人生鬼殺永保無終急急如律令開印咒玉清訣視印取用太上玉帝眞命河魁玉淸至靈上淸寳勑太淸奉行萬無不辟急急如律令用印咒玉淸神印丹霞赤文開光十天召眞致靈印之所到萬神敬從急急如律令右法叩齒三通存靑黄白三炁自天門下覆印右手擎印使之收印咒九靈九眞九仙九聖九天九炁覆蓋神印玉女玉童侍衛交幷靈官力士常保萬眞急急如律令濟生心印咒玉淸有命緫炁虚无雲龍交篆立注丹書急急如元始上帝勑中文度死心印咒虚皇祖炁大梵飛行靈光注筆塗苦罷對幽暗罪魂普監上生急急如元始上帝勑燒香咒諸天十方旡極至眞大神王右法以東方爲始召降如五老啓途群仙翊轅之𩔖下降於十方然後從心中所陳祝之次上香定心定心咒魂神澄正萬炁長存不經苦惱身有光明三界侍衞五帝司迎萬神朝禮名書上天功滿德就飛昇上淸右一十句取本命方炁咽之行事隨炁所願無不上達治萬病咒大行梵炁周回十方中有度人不死之神中有南極長生之君中有度世司馬大神中有好生韓君丈人中有南上司命司録延壽益筭度厄尊神廻骸起死無量度人右九句凢炁血凝滯體有小疾即端坐𩀱手玉淸訣念一遍取東南炁入口中閉炁存炁如黄霧之狀自五臟穿入骨節皮毛之中皆爲黄炁良久體有小熱其病即愈凢治疾布炁並用生眞炁咒混洞赤文无无上眞元始祖劫化生諸天開明三景是爲天根上無復祖唯道爲身五文開廓普殖神靈無文不光無文不明無文不立無文不成無文不度無文不生右一十五句毎日早𩀱手玉清訣面東南念五遍存天降五色雲以鼻引入口咽之存歸三田如此五藏充實三田盈溢皆成眞炁萬邪不干五嶽持身咒混沌分光開元祖劫三台四聖南北九天八卦大神五星三皇三天師眞五嶽持身三塗六丁六甲神仙神虎四直上帝降炁内錬化成玄女通眞雲雷發震生化自然急急上奏與天齊年右法子午訣五方炁𦋇身安神定志咒青帝護魂白帝侍魄赤帝養炁黒帝通血黄帝中主萬神無越青天魔王巴元醜伯赤天魔王負天擔石白天魔王反山六目黒天魔王監醜朗馥黄天魔王横天擔力五帝大魔萬神之宗飛行鼓從緫領鬼兵麾幢鼓節遊觀太空自號赫奕諸天齊功上天度人嚴攝北酆神功受命普掃不祥八威吐毒猛馬四張天丁前驅大師仗幡擲火萬里流鈴八衝敢有干試拒遏上眞金鉞前戮巨天後刑屠割鬼爽風火無停千千截首萬萬翦形魔無干犯鬼無妖精三官北酆明檢鬼營不得容隱金馬驛程普告無窮萬神咸聽三界五帝列言上清右呪毎日早持一遍不問出入行藏此爲泰定心神通暢血脉運化無滯同行世界治疼痛呪青帝護魂白帝侍魄赤帝飬炁黒帝通血黄帝中主萬神無越右呪六句震文東炁离文南炁兊文西炁坎文北炁中文中炁並呪一遍吹病人疼處令咳嗽一聲不過三次疼即止五斗保生命呪東斗主筭西斗記名北斗落死南斗上生中斗大魁緫監衆靈右六句每遇夜星朗時向五方各呪一遍取五方炁吹身佩五斗符萬邪不干千災去矣治病驅邪法凢驅邪止奏心章與之分别人鬼不得妄入鬼神情罪先用五斗五魔符與之安鎭五臟保命生津驅逐邪炁半月日後却朝元奏請中理五炁混合百神符付之吞服鎭守黄庭治顚邪法凢顚邪之𩔖即存三宫天尊升在泥丸宫列玉局坐呼召身中五臟正炁升天中五星正炁各化爲帝者各方服色執玉圭後更將五臟五星變爲五斗毎星如道士之狀各方服色依方住立執靑簡更將五臟五星變爲五天魔王如人間武士之狀各方服色執㦸佩弓劒依方位立却存巳神將升五帝五斗五魔直前擒下鬼賊到天尊前約束押赴三官都司聽斷仍念呪曰神公受命普掃不祥八威吐毒猛馬四張天丁前驅大帥仗幡擲火萬里流鈴八衝敢有干試拒遏上眞金鉞前戮巨天後刑屠割鬼爽風火無停千千截首萬萬翦形魔無十犯鬼無妖精三官北酆明檢鬼營不得容隱金馬驛程右呪九遍給五帝五斗五魔符與患人服一月若欲求報應於病人夜卧時用各符一道令吞用一道安頭髻上又一道貼帳帶上又一道同劄焚竈中告示六神同三五將軍追攝報應凢用符須先朝元請降方行如報應了收前符於淨處焚之禳鎭法凢有大不祥用鐡板五片闊三寸長九寸書五魔符背後冩因依年月日時法位奉行先具心章密奏上玄請降符命方可行之佩符呪侍經五帝玉童玉女各二十四人營衞神文保護受經者身右呪凢木命人取東炁火命南炁金命西炁水命北炁土命上方炁吹符上淸訣度一切亡魂呪普告三界無極神郷泉曲之府北都羅酆三官九署十二河源上解祖考億劫種親疾除罪簿落㓕惡根不得拘留逼合鬼群元始符命時刻昇遷北都寒池部衞形魂制魔保舉度品南宫死魂受錬仙化成人生身受度劫劫長存隨劫輪轉與天齊年永度三途五苦八難超凌三界逍遙上淸右呪並玉淸訣東炁安宅祝土呪七日七夜諸天日月星宿璇璣玉衡一時停輪神風靜黙山海藏雲天無浮翳四氣朗淸一國地土山川林木緬平一等無復高下土皆作碧玉無有異色衆眞侍坐右一十五句凢動土丁罡七歩取旺方土一合面北搯玉淸訣念七遍取西北炁吹土上於所造方上置土供飬畢以水調塗於中庭即萬殺千恠並皆回避如犯土家宅不寜依法呪土以水調洒一宅中元洞呪水元洞玉曆龍漢延康眇眇億効混沌之中上無復色下無復淵風澤洞虚金剛乗天天上天下無幽無冥無形無影無極無窮溟涬大梵寥廓無光赤明開圗運度自然右一十六呪汲東流水置器中存神爲靈寳眞人三淸居三田之中左日右月五星居五方五帝侍水五星日月降光輝入水五靈衞水玉童玉女立于左右斗罡指水即叩齒三十二通念呪三十二遍取五方炁入水雖盛夏久停亦無蟲穢凢治病可用吞符或煑粥煎藥皆可如時疫流行可呪此水以楊竹枝遍灑其瘟毒自散立得痊安命魔驅邪炁呪靑天魔王巴元醜伯赤天魔王負天擔石白天魔王反山六目黒天魔王監醜朗馥黄天魔王横天擔力五帝大魔萬神之宗飛行鼔從緫領鬼兵麾幢鼔節遊觀太空自號赫奕諸天齊功上天度人嚴攝北酆神公受命普掃不祥八威吐毒猛馬四張天丁前驅大帥仗幡擲火萬里流鈴八衝敢有干試拒遏上眞金鉞前戮巨天後刑屠割鬼爽風火無停千千截首萬萬翦形魔無干犯鬼無妖精三官北酆明檢鬼營不得容隱金馬驛程普告無窮萬神咸聽三界五帝列言上淸右法玉淸訣凢給符治人身一切邪炁皆以北炁治之布炁呪眞中有神長生大君無英公子白元尊神太一司命桃康合延執符把籙保命生根上游上淸出入華房八冥之内細微之中下鎭人身泥丸絳宫中理五炁混合百神十轉回靈萬炁齊仙右一十八句玉淸訣叩齒三通呪三遍北炁吹病身吸炁後揉痛處即安和合百事呪千和萬合自然成眞右法凢和合托木面北呪七遍南炁吹水祝心中事七次噴其方即和合治眼疾呪諸天日月星宿璇璣玉衡一時停輪神風靜黙山海藏雲天無浮翳四氣朗淸右七句取淨土一塊面東南呪九次吹土併呪水洗赤眼立安凢治目疾符水用治瘟疫呪束送妖魔精斬馘六鬼鋒諸天炁蕩蕩我道日興隆右四句凢入瘟家治病勑水布炁用黍米呪於是元始懸一寳珠大如黍米在空玄之中去地五丈元始登引天眞大神上聖高尊妙行眞人十方無極至眞大神無鞅數衆俱入寳珠之中天人仰看唯見勃勃從珠口中入旣入珠口不知所在國人廓散地還平正無復欹䧟元始即於寳珠之内說經都竟衆眞監度以授於我當此之時喜慶難言法事粗悉諸天復位倐歘之間寂無遺響是時天人遇値經法普得濟度全其本年無有中傷傾土皈抑咸行善心不殺不害不嫉不妬不婬不盗不貪不欲不憎不𡜍言無華綺口無惡聲齊同慈愛異骨成親國安民豐欣樂太平經始出教一國以道預有志心宗奉禮敬皆得度世右法左手托赤黍米不以多少右玉淸訣自東方爲始至下方毎一方呪十遍存一方天眞大神飛天神王千乘萬騎並入黍中十方計一百遍呪了取西北炁吹治一切疾呪靈寳水天眞天津寳液神淸一呪斬鬼永辟妖精天罡眞炁斬殺邪癘眞陽之水永去萬里右法左手上淸訣托水右玉淸訣指水先念前呪七遍次念後呪三遍取東南炁入水剔訣水中隨水有靈官侍水行之靈寳針以神桃枝長五寸作針玉淸訣五方炁吹針針病處令患人三吸三咳嗽出針誦靈書大凢治大事存身爲元始坐五色獅子又存頂中有元始金容玉相即左搯玉淸訣右上淸訣密誦不拘遍數取東南炁吹一切符水中隨意用之凢一切符除本呪外並用此祝於正經内略出諸呪凢諸符隨事用本呪本訣或有專祝香呪更用之訖方念中篇並玉淸訣先取東南炁吹又念玉淸大呪取西北炁吹之呪曰三十二天三十二帝諸天隱諱諸天隱名天中空洞自然靈章諸天隱韻天中之音天中之尊天中之神天中大魔天中之靈九和十合變化上淸無量之奥深不可詳敷落神眞普度天人今日欣慶受度歷關諸天請㓕三惡斬絶地根飛度五户名列太玄魔王監舉無拘天門東斗主筭西斗記名北斗落死南斗上生中斗大魁緫監衆靈靑帝護魂白帝侍魄赤帝養炁黒帝通血黄帝中主萬神無越靑天魔王巴元醜伯赤天魔王負天擔石白天魔王反山六目黒天魔王監醜朗馥黄天魔王横天擔力五帝大魔萬神之宗飛行鼔從緫領鬼兵麾䮵鼔節遊觀太空自號赫奕諸天齊功上天度人嚴攝北酆神公受命普掃不祥八威吐毒猛馬四張天丁前驅大師仗幡擲火萬里流鈴入衝敢有干試拒遏上眞金鉞前戮巨天後刑屠割鬼爽風火無停千千截首萬萬翦形魔無干犯鬼無妖精三官北酆明檢鬼營不得容隱金馬驛程普告無窮萬神咸聽三界五帝列言上淸上淸靈寳大法卷之二十三
