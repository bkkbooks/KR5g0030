front:
  text: 上清靈寳大法卷之五十六寫五
  hash: sha256:b3430adfe15646badcc3911c0ed5d490820b5e94078e09da8ae127d3ba5533dd
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5g0030_SJB_056-301172c, image: sjb/30/301172c.png}
body:
  text: 洞微髙士開光救苦眞人𡩋全眞授上清三洞弟子靈寳領教嗣師王契眞纂齋法宗㫖門宿啓建壇夫宿啓者本自然朝也乃齋法之祖建齋之始必先行自然朝朝者只發爐啓聖禮方懴悔三啓三禮也繼以敷露宣詞說戒𥙷職宣禁今本朝所謂謹依科法宿啓以聞是也科之末句稱明晨行道續更啓聞盖謂明旦方始正齋行道耳既爲人建齋當以脩齋之意預告真靈也古科宿啓必在建齋之日子時而陸簡寂所撰靈寳道士自修盟真齋儀則不宿啓止於齋日清旦說戒𥙷職接續登齋行道繼以言功口表又正一經科止云建齋當先行自然朝初無宿啓散壇之文也雲光張若海不覩經文輙以巳見肆爲妄論筆之於書凡二十條大悖經教遂使晚學之徒乗非蹈謬悉於宿啓之前說戒𥙷職且𥙷職受簡然後登壇杜廣成固嘗非之矣謂如開建大齋齋主必預投詞髙功受詞與之關奏亦在一月之前次第進拜章書頒宣符命此乃先行其事而後𥙷職謂之顛倒又安不於預告之前令髙功先𥙷職耶切詳經科垂𥙷職之文爲明晨行道設耳故宿啓建壇不渉正齋且陸簡寂靈寳齋說光燭戒罸祝願儀叙云先宿啓畢次授十戒𥙷職衆官跪受簡札明日行道各典所署次宣三十六禁告示威儀則是說戒𥙷職宣禁必當在宿啓後於科巳有明文此合宜也由晉迄唐相㳂不革自雲光張若海逞妄謬不經之說淺學者或宗其源盖不曽博覽古科之如是也一日修奉止曰齋㑹三日巳上方謂之齋或七日九日久者一月具載經科具太極真人演經文而著齋戒威儀之訣陸天師摭經訣而撰齋謝戒罰之儀三籙九幽解考塗炭三日七日一時九時品目雖繁儀矩則一㳂流窮源舍太極真人及陸天師果何適㢤近代𥙷職又有添入上下僉議以某人充等語頗有窒碍髙功又豈僉衆所可𥙷耶又李景祁所集齋科於建壇日午後先行自然朝說戒歸玄師幕補職宣禁至夜依科宿啓如此則建齋之日兩行自然朝也不亦贅乎今悉攺從古科於宿啓三禮之後敷露繼以宣詞於復爐之前說戒𥙷職宣禁庻合陸天師本科不敢從俗故也宿啓建壇宋㫖曰初入壇幕之前便存身如青玄上帝左右玉童玉女從衆妙門乗光而岀執幢持節立於道前行持運化請降九鳯破穢之官噴噀而下變凡爲聖於地戸上依法敕水凈壇敕壇拜解穢表𥙷職天有六運周建六官建齋行道當分六職格降髙穹升壇凡升壇先上六幕香次則手爐知磬二人前讃導引法師登壇其威儀道衆並分左右序對列壇前髙功昇外壇至地戸外立蜜呪入戸升中壇壇衆隨之近人只如常旋行髙功居道衆之後入巽戸至外壇方揖髙功先行入地戸道衆却立髙功攙越而過大不嚴肅故蔣氏立成儀亦云凡升壇則髙功居前出壇則髙功居後乃合古科大爲允當髙功入户畢道衆俱入壇中郡講旋至中壇之東面西立六職止於中壇之西面東立髙功與齋官同升天門入内壇上十方香日以東爲始夜以北爲始次上御案香焚香宻呪存思如式齋官上香畢再出天門左旋至中壇西北立髙功回本位上手爐香宻呪按科行事至復爐畢手爐知磬法事先行道衆次之髙功自内壇則自天門出入近有中壇與内壇皆自地户入却自天門出者皆非也杜廣成陸簡寂科法皆入地戸升天門上十方香自古而然不可從俗盖内壇法天故自天門出入唱導宗㫖曰玄師前分班立髙功上香三拜跪奏告齋畢呪曰願師得道我得飛升開度七祖父母脫離五苦八難早登天堂名入仙籍又一本願師得道我得飛仙開度玄祖罪苦咸原名書仙籍升入帝廷齋官授詞函兆跪受方告齋監齋宣職狀方唱導畢上廊幕香了都門外祝白啓壇宣啓壇䟽方入戸兆先行入外壇於地戸外立宻呪曰四上功曹龍虎使者正一生炁侍靖素女夜有啓請願得開明童子上玄少女爲臣俱入黄房之裏通逹所啓皆使上聞玉清訣宗㫖曰凡入戸先左足後古足出則先右後左當存香官使者左右龍虎君侍香諸靈官早兼存四明功曹通真使者各一人侍靖玉童傳言玉女各二人羅列左右夜則存四上功曹侍靖素女開明童子上玄少女各一人羅列左右入戸者入地戸也今升壇則於地戸之左存思宻呪出户則存官將玉女傳送齋誠各各散去按三洞經科中玉女出入戸皆用此呪近有淺識之士見正一㫖要應朝修皆用此呪遂稱洞玄法籙合行别易此其謬哉上十方香宗㫖曰兆升天門入内壇必先上十方香日以東爲始夜以北爲始凡上香躬身秉圭次然香持謁簡通名再躬黙通衘位放謁簡於位牌之右次宣謁劄焚之逐方皆如之只是建壇用謁劄餘登壇則持謁簡若散壇則持謁謝劄也上御案香御案香則上帝前當中一案又曰洞案洞者通也通真逹靈焚香之所也在道場中則居玉清前壇中則三寳前散花云洞案爐烟起是指此案也宗㫖曰凡上洞案香皆當存三寳然後上十方香先存元始天尊正當陽座次存左太上道君右太上老君各座側叅侍元始天尊光明煥耀悉備衛如法次存見三十六部尊經存三尊之左侍經玉童玉女仙郎仙王仙伯仙卿如法次存玄中大法師在三尊之右與經正當中相對左右侍真如法若清醮黙念十方靈寳天尊隂醮念太一救苦天尊宗㫖曰入壇正中乃金闕下先進左足雙歩星珠熠耀罡至主爐前放訣靈寳星珠熠耀罡行罡呪玉清赤素大梵分流元綱流演星珠貫周急急如元始上帝命左手子文直中文午出微勤雙目日月略開上香呪玉華散景九炁凝烟香雲宻羅徑御九天侍香金童傳言玉女上聞帝前令臣長生世爲神仙所啓所願咸乞如言存玉女金童龍虎在爐邊三捻香一捻香上逹玉清境二捻香上達上清境三捻香上達太清境靈光梵炁下注臣身飛香進御合道帝廷急急如元始上帝命左手剔三宫訣宗㫖曰瞑目運化壇墠上通天門黄炁交結如碧雲水晶之狀日月星斗交光下接靈壇之中左右芝盖華旛寂寂巍巍運心府化蓮迸開一景居中金光獨懸其中焚玉字真文一道於主爐中祝呪元始祖炁緫合靈章無文不度無文不光赤書玉笈龍篆垂芒臣今焚變上朝玉房急急如元始上帝命雙手剔玉清訣運重光金戸樓臺三層中有至尊升階九級光炁充布于壇兆心奏忱恂求恩請命帝允所乞壇墠如元陽之境並無纎埃有玉女金童傳香奏簡金光横列交結如紋左班五老乗丹轝飛空而下右班三十二天帝叅鳳駕同臨拱朝至尊三真五師出班朝謁三官四聖俱乗此光齊降靈壇次五嶽四瀆群真左右拱朝廊幕城隍社令雷府官將翊衛前後到此日月星斗交光運動接境焚降真召靈符于主爐中祝呪元始符命緫召萬靈靈光普照三界通明玉符飛降合契帝廷令臣奏啓上朝玉清雲霞飛奏時刻無停俓升玉闕與道合真急急如元始上帝命上清靈寳玉虚召靈神光妙化億萬齊臨急急如元始上帝命中文剔岀周匝再自中宫自上宫剔午出爐中緫召諸天呪洞玄元明三炁成直五行所運三天運行急召急至萬神咸聽刍急如元始上帝命玉清訣剔開破斗内三光五方降炁天真童女侍香傳言童女龍虎真人俱在御案之前上本位香此科案也齋法之始朝奏爲先按科行事恐語言失度故立科文端圭正立不可執卷故置科案於髙功立位之前近人多用一槿几只可容安科書而巳却以手爐上香宻呪宻呪者宣呪言而心存朝上帝也蔣氏立成儀令於科案別安香爐兼以香爐置於一邊欲大造科案諸方例不遵行若壇塲狹處不可容本位香止從古式以手爐上香也宗㫖曰兆自主爐前退至本位三拜跪執手爐三上香宻呪道由心學心假香傳手執玉爐心存帝前真靈下盻仙斾臨軒令臣關告俓御九天又呪空因色顯心以香傳心之所逹非火非烟令臣關啓俓御九天真靈歆格不假言宣宻呪者不聞聲而心存朝上帝也故曰不假言宣又云此一呪出楊傑撰宣和金籙科也各禮師存念如法夫禮師者經籍度三師也廣成曰經者逺也經爲逺師乃籍師之師也因師授受不忘本耳籍者因也傅真學道師資相因乃經師弟子度師之師也度者進也度我凡身進登道品從凡至真莫不因師乃已之師也盖道不可無師謂如下至一術一訣莫非師傳呪佩經籙行大法主領齋修開度天人豈應無師而古者傳籙則有以有籙者爲師中古以後建立宗壇不容私度故傳經受籙合以宗壇爲師若嗣行靈寳奏受齋法則合從所授之法存拜三師或於籙外而曽從人受持經者亦合兼存用之倘以受經之故而遺去傳法之師則不可行也夫經乃道之緒餘法乃經之施用直以經之傳授爲宗而傳法者不爲師則亦有所偏矣夫法則出於經捨經則非法其正教之外而别習他書雜法者却不在臨壇存禮之數也宗㫖曰都講之職按西方白帝以主其職金主聲金乃肅殺之府故獨班唱禮凡舉唱各禮師存念如法衆官各秉簡端心臨目注念依下文禮之先存經師所在之方方乃住處存形貌諱號心禮三拜祝之曰願師得仙道上登髙靈爲我超㧞一切皆成道真我身昇度次存籍師所居之方心禮三拜祝曰願師得飛仙上登髙真爲我開度七祖父母早生天堂我得真道升入無形次存度師所在之方心禮三拜祝曰願師得升度上登髙仙爲我開度五苦八難名入仙籙永成真人次存上天三師下降心禮之存金光滿室悉爲三寳地各項圎光之耀十方仙真羅列經師鬰羅翹真人西北天門隨白炁内下臨壇所籍師真定光真人西北天門隨黄炁内下臨壇所度師光妙音真人西北天門隨青炁内下臨壇所五方衛靈存五方正炁非三素雲也夫三號合生九炁而其散爲萬殊析其大爲五炁在天爲五星在地爲五嶽在人爲五臓在物爲五行在事爲五常今所用呪而存降五方之正炁祛斥妖氛肅清壇墠也東方青炁屬肝上應木星其時爲春其帝青帝凡屬木者東方青炁主也南方赤炁屬心上應火星其時爲夏其帝赤帝凡屬火者南方赤炁主也西方白炁屬肺上應金星其時爲秋其帝白帝凡屬金者西方白炁主也北方黒炁屬腎上應水星其時爲冬為帝黒帝凡屬水者北方黒炁主也中央黄炁屬脾上應土星其時爲四季其帝黄帝凡屬土者中央黄炁主也故有五方五帝兵馬則此神主之也存降之法想念於倐忽之間存各方炁隨方色中各有吏兵下降隨呪應召翊衛齋壇宗㫖曰閉目良久内思五臓五嶽五星五帝備衛身中次存青黄白三炁遍滿玄壇四靈翊衛萬神森列左右嚴肅内視金光映盖一體作金光先自肺中出至項上生圎光照耀十方身中了然盡見内外東方呪搯卯文存木星洞闕朱臺在目後直入一寸射九靈青玉之光映覆一身須㬰從口鼻入灌注肝府若青琉璃色瑩徹次存青光滿身内外繚繞直射東方如青雲𦋇覆壇所南方呪搯離文存熒惑星玉門華房在目際直入五分射三靈赤輝之光映覆一身㳄入口鼻灌注心府如日色輝照次存赤炁滿身内外繚繞直射南方如赤雲𦋇覆壇所西方呪搯酉文存太白星玉璫紫闕在兩眉間直入一寸射七靈白華之炁映覆一身次入口鼻注灌肺府如月精映照之光次存白光滿身内外繚繞直射西方如白雲𦋇覆壇所北方呪搯子文存辰星帝郷元宫在髪際直入一寸射五靈紫晶之光映覆一身次入口鼻灌注腎府如紫晶照映之色次存紫光滿身内外繚繞直射此方如紫雲𦋇覆壇所中央呪搯中文存鎮星金室長谷在人中直入二寸射十二靈黄華之光映覆一身然後入口鼻灌注脾府如黄華瑩徹之色蓊欝于中次存黄光滿身内外繚繞直射中央如黄雲𦋇覆壇所鳴法鼓二十四通廣成曰法鼓者内正神炁外滅魔靈法事所先也凡都講舉唱鳴法鼓二十四通若唱存思便鳴法鼓非惟乖其節度抑亦不識存思豈知天憲後學未解威儀但欲軌則前軰老宿既乖法制便冒合格然使未悟習迷乆巳成風惟務宣讀羙麗殊覺非也大法所持冀在精謹攝心注念惟在威儀之先務在合格若法制有虧既不用心何以契道則髙真不降福慶靡臻反招罪譴也其欲契道唯在依料證法度也勿以小事而不慎之所謂差之一分失之千里宗㫖曰左叩齒爲天鐘右叩齒爲天磬中齒相叩爲法鼓叩之以爲節二十四通者三八二十四數也召身中三部八景二十四神敷落神真是也法當存神鼓炁二十四通存神炁清徹逹玉清存身中青黄白三炁自丹宫昇經歴五臓上至泥丸直透天門上合玄元始三炁結成琉璃寳殿上聖居中真人羅列發爐出神焚敷落神真符出香官諸符宗㫖曰兆執手爐𡨋心存自身在青黄白三炁雲中内外蓊冥四靈侍衛萬聖森羅次搯中文宣無上三天至臣等身中依法出神出神者乃岀香官奏事官局守衛百神非拜章奏表詞之官也夫神炁與天地並一一念到處則神隨念而往潜天而天潜地而地度人經云上遊上清下鎮人身是也發爐者𤑔香於外以通誠意出官於内以遣其神内外盡誠則其神上天入地俱無所間是爲通真逹靈也宣無上三天玄元始三炁下上中至臣等身中丑寅三五功曹卯至辰又一云五方訣歸本命左右官使者己至午一云卯酉左右捧香驛龍騎吏未至申侍香金童酉一云入中傳言散花玉女戌五帝直符亥一云五方歸中直日香官丑辰輪至午各三十六人岀存驛龍騎吏赤衣皂幘并功曹童子香官等從天門而下次存自身中有驛龍騎吏等從腦而出各合成一人至壇所侍立左右各三十六人放訣關啓土地戌歸中文至御前自上文剔至午出于爐中存驛吏等咸受詞語捧香而去次黙念呪曰内有光明外有所向内外朗然了無餘象靜以待之即其顕相訣曰泥丸頂上髙且崇遶山周匝列九宫紅光紫霧第一峰玉皇天帝居其中時敲玉磬撞金鐘召集萬神朝上穹中界赤子傳帝𠂻遍歷諸府當親躬衆真班列莫匆匆急過重樓十二重仰瞻天表合雙瞳共讃帝德言聖功端拱無爲清淨風兆民頼之常雍雍君臣慶㑹壽無窮永保乾坤一混同出官夫出官者出髙功身中真官也先存額上朱門闊一尺八寸朱門即腦中門也吏兵從朱門中出下至壇前羅列須知以炁合炁以神合神混合無間方可造其閫域乃得靈寳降真之妙恐成輕泄惟當叩師宻授先出三將軍四靈神導從前後左右方行出官也凡拜建壇詞則當用之否則莫用宗㫖曰兆叩齒二十四通長跪先存四靈從頭出立前後左右次存日月五星盖頭北斗覆形出肝中青炁布滿玄壇光如日月次存唐將軍左腎出執元帥玉符葛將軍右腎出執太芒㦸周將軍心中出執揮靈玉斧次存天門上三將軍下降合身中所出之神俱緋衣大䄂通雲玉冠立前兵士各二十萬衆悉朱衣赫然各從本宫而出周匝身中木官九人肝出持弓在左火官二人心出持矛在前左金官七人肺出持劒在右水官五人腎出持㦸在後土官一十二人脾出持鎗在前右四方五德將軍自五臓出五色衣神玉形位列四方依法出官緫出官如前存用畢次搯斗訣起歸上帝訣宣謹出臣身中至天丁力士逐一存用出身中神想吏兵從腦出於左右前後次從中文歴至根廵二指根至巳文彈之次念呪曰一體虚寂何出何入以之爲儀呼吸是及逐一出身中官五體真官五臓出卯文上仙上靈二官直使肩出或云腎出又云頰出酉文直使功曹正一功曹兩肩出或云心出子文治病功曹脾出左右官使者脾肺出執幢節午文隂陽神决吏心腎出丑寅文料車赤符吏臍下出古道士形侍車馭或云曲秋出辰已文罡風吏左股脾出古士形乗獸未文騎置吏右股脾出古士形冠㥽馬足青形侍車馭或云罡風騎置吏左右膝下出力士乗狻猊一十二人申文驛馬上章吏兩肺頸兩足下出古士形乗赤馬戌文飛龍騎吏亥文狼吏頸出執劒赭色朱以虎賁鼻出如虎形或云兩眉或云兩腎出坎文察奸心出古士形乗獅子勾騎大小腸出古士形乗獅子身碧色或云心出乗丹霞之炁覆護之所艮文三官僕射三人臍中出道士形或云胃中天騶甲卒左右手臂出金甲仗劒一十二人或云甲卒三指震文天丁力士左右肩出神王形一十二人或云腎或云眉巽離坤兑治正執正吏收炁食炁吏鼻出力士形收神食神吏收鬼食鬼吏兩肘出收毒食毒吏收邪食邪吏收精食精吏收瘟食瘟吏各二人都三十六人並二十四骨節中出一云七收吏自鼻炁中出並黑幀朱衣道士形誅符破廟吏一人心出道士形社里邑君肝出青黒衣道士形勢立地戸上威儀濟濟左右都平君止諸君將吏等背岀子輪亥彈所謂出官若欲拜建壇詞則依法出之否則不用若第一朝及謝恩醮並同此式按科行事兆端圭正立存身爲真人宣法位啓聖畢次禮十方當從此爲始天一生水天之祖炁衆星皆拱北也故從此而起宗㫖曰兆同齋官隨方上十方香毎一方一上香歸位一拜禮畢長跪懴悔懴悔宗㫖曰兆跪爐懴悔壇官等修齋行道冒禁違科種種罪愆志願臨壇修奉無諸魔試克遂感通次懴三業六根及亡者積生之罪祈恩開度成就齋功禮經三啓宗㫖曰懴悔既畢義當禮經故吟三啓歩虚而三禮之禮三寳宗㫖曰凡稱禮三寳冥心三拜敷露夫建立瑶壇法天象地分布日月五星和合隂陽正天宿度立纂舒壇以凡陽之地變爲金闕瑶堦玉陛前至真萬聖混洞班侍至時東西未定形炁未安俯仰之間如運掌歟當以五方玉字二十八宿敷落神真安鎮五方辟斥妖氛肅清壇宇參方圎入動靜方得至尊居玄化之妙日月周流一定如國朝君王端居九重之上君臣可以分其朝治故自建壇左班起治屬泰玄三天左宫師真省朝之所也敷真文者須當委曲行持其法有四一曰敷落五天帝君天真兵馬下臨安鎮五篇者五方正真之炁和合隂陽鎮護壇場焚五帝育物符召三十二天帝君開度隨方宣表二曰露者齎紋繒金龍玉璧表質丹誠三曰敷真文者乃九天之寳章慶雲之靈津以法書篆鎮日月失昏失度中禳兆民灾祥四者五篇以九天之炁諸天祕諱周天星宿聚而爲篇可和地紀發生隂炁成陽次可度九幽長夜之沈䰟俱超朱陵正是四象吁圎今之末學止以敷露爲名歌聲美麗誦文爲畢備更不考究深負㧞度之果豈不寒心耶廣成曰在昔元始天尊混元既判三炁開圖以大道元精真一之炁爲靈寳赤書凝結之文降於五方以安鎮天地招命真靈故天地得之以安鎮日月得之以光明鬼神得之以開度人民得之以長生真文傳之世上消天灾保鎮帝王下禳毒害以度兆民制伏鬼神拯㧞幽爽無所不爲也經曰無文不光無文不眀無文不立無文不成無文不度無文不生又曰赤書玉字八威龍文保制劫運使天長存此靈寳五篇真文之妙用也故能正天分度調和隂陽開度飛爽保衛帝王拯淪濟溺通幽逹明和𡨚𥼶咎却死延生生死之苦無不救之故建齋之時以真文玉字安鎮五方解壇事畢收符焚之散灰青煙之中具如玉訣之法或學士修真自祈度世紀名仙品永離鬼官當以三元八節甲子本命之日書文玉簡投諸名山除宿世罪簿言名上天事畢三過諸天三官九府紀其善功上天友别萬神敬護五帝侍衛三界司迎千魔萬精不敢妄干經曰志願堅固觸向咸成七祖父母上生天宫生死福慶影響相酬也建壇用五老赤書一日清旦混洞赤文章二日清旦制邪玉文或元洞玉曆章三日清旦靈寳五符設醮大梵𨼆語請真文宗㫖曰凡敷露五方玉字須當請降以真文法信置於案上兆上香三拜跪奏雙手發十天訣於天庭之上再剔玉清訣叩齒七通雙目日月之光髙奔天庭之上輪照兆身運日月光中有元始虚皇在内一如圎光再發雙目毫光與日月之光交合了次朝奏具陳齋悃乞開紫陽玉笈宣降玉文真篆付臣安鎮齋壇祛除故炁格降真靈隨意祝畢宻誦請降虚無祕呪髙上大有玉清萬神雲光寳篆普降帝廷急急如元始上帝命中文祖炁存上帝放百色毫光一條注於真文之上剔玉清訣以目瞻一炁吸前日月光中至尊俓歸巳形合而爲一方叩齒三通咽液一口隨方安鎮上東方案香焚青帝育物符宣東方表下真文於案上以金龍法信鎮之宣東方玉字兆存肝炁自目出與外相合結作青林炁聚爲雲樓玉殿青帝居之東方八宿朝拱其殿星斗磊落一條青炁金光分孕而出指射離宫兆以口引青炁納肝府上南方案香焚赤帝育物符宣南方表下真文於案上金龍法信安鎮宣南方玉字兆存心炁自喉舌出與外相合結空成梵炁聚爲宫殿赤帝居之南方八宿朝拱星斗磊落内有一條紅赤之炁孕生曲過西方兆以鼻引赤炁歸丹府上西方案香焚白帝育物符宣西方表置文於案上金龍法信安鎮宣西方玉字兆存肺炁自目而出與外相合結炁成形聚成水晶琉璃之殿白帝居之西方七宿朝拱斗光交煥金白之炁孕化直過北方以鼻引素炁歸肺府上北方案香焚北方育物符宣北方表置真文於案上金龍法信鎮之宣北方玉字兆存腎炁自兩耳出盤結于外炁聚作宫殿黒帝居之北方八宿拱立斗光交合飛噴上下接中宫以鼻引前炁納于玄宫上中央案香焚黄帝育物符宣中央表置真文於案上金龍法信安鎮宣中央玉字兆運丹宫之精交合脾元之炁自口噴出于外炁聚結爲三宫三樓上中下三層黄帝居之内布黄炁散接四方之炁有五星狀若車輪懸覆于上星光分照射入巳形二炁引吸咽液而退此名五帝駕景乗雲朝謁大羅之境又曰存四方三十二天帝兵馬二十八宿星君下降壇場中宫存黄天天帝三天兵馬三天大神土德星君九仙九聖金童玉女下降壇場宣十方靈官䟽留案上散壇隨詞焚之或拜建壇詞於此歩罡飛謁存伏如儀說戒宗㫖曰法師旋一周面東立唱云衆官各各首體投地黙禮十方三拜從北爲始衆官西方面東坐弟子於壇前同受戒法師三捻香按科說戒說畢廵行歸班補職夫天有六運周建六官建齋行道當分六職格降髙穹宗㫖曰兆同六職詣玄師幕上香三禮長跪掲簽受職當黙想三官玄師秉志純誠宣示戒條宣立誓結盟表自此爲始起居皆當關告監齋禮經三拜而退還亦如之不可暫闕也宣三十六禁兆同衆官平坐宣禁監齋受罰簡三拜上啓玄表兆存思如儀至三天門下泰玄都省玄中大法師宫朝謁如儀接坐復想興身存表中之意奏想判以謄進頒下三界禮謝出三天門下次依式納官復爐謝玄表不頒行止念稱善復爐入神焚傾光廻駕符兆執手爐宣至諸靈官合自子輪至亥入中中局三境訣剔出存神入吸炁咽下丹田宻呪曰向來召出臣身中五體真官功曹將吏等衆從衆妙門而入在左還左在右還右後召復到一如故事存上帝天真三界官屬齊昇霄漢唯有五帝吏兵等守衛壇場集神自䐉門歸納三宫混合爲一也降天門出地戸夜出戸呪玄生太隂八䆫開明向來啓奏少女通靈隨心啓化安鎮黄庭事畢復位萬神安寧存官將玉女傳送齋誠各各散去出壇謁幕兆於玄師幕上香三拜跪奏謝過三拜興身紏過回靖復位兆上香三拜真師衆官復位上清靈寳大法卷之五十六
