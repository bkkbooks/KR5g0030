front:
  text: 上清靈寳大法卷之二十六飛二
  hash: sha256:1267560a467d2682ba438d6a0bd84c69db9cd2327018a56f87e0160da581fc6d
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5g0030_SJB_026-300889a, image: sjb/30/300889a.png}
body:
  text: 洞微髙士開光救苦真人𡩋全真授上清三洞弟子靈寳領教嗣師王契真纂經㫖訓解門師曰元始天尊所說衆經三百六十品品有三十六部尊經並以此一經爲首萬法之祖莫出於此上極洞真中貫洞玄下該洞神故曰大法明寳珠降世昔元始天尊於始青天中敷說此經以授道君又於大丹之天中賜大梵之音道君序成之後上天爲寳祕於玄都玉京紫微上宫緘藏至重非聖不傳後西元王母上請於天帝降保甲申之災以付修真之士因此遂留人間此經並是諸天上帝及至靈魔王隱祕歌音内說天地劫運萬神名諱交㑹隂陽元氣生化其義不可得而盡解得悟道者自能洞明上天四萬劫一傳之間四十年一授輕泄漏慢殃及九祖長役幽隂可不慎歟明内音所因天尊於赤明世界栢陵舍座是時雲霧鬱勃三日三夜冥隂不解五老上帝上奏天尊曰今日侍座所未曽見天尊敷教則致山海靜黙天地肅清今日隂冥天地惶懼臣等有疑不審何故天尊告曰今日諸天發瑞靈應自然玉字煥爛障蔽天地咸令四座瞑目以伺俄頃天然梵氣頓啓瞑暗豁消五色光明洞照十方各有靈書字方一丈現於虚空之中文彩焕赫八角垂芒精光晃目不可得看天尊普吿衆靈曰此靈書八篇字無正形其趣宛奥爾等難可㝷詳乃命天真皇人注書其字解釋其音以賜道君總二百五十六字道君撰次成文是爲大梵隱語因序而附二章之後皇人者甞於黄帝時下降峩眉山授帝以三一五芽之法復升於天也分經首尾篇目天尊說經二章前後有序大梵隱語前後亦有序皆道君所作也今則離其首尾分其篇目依藏本定其字類并題目共四千五百七十四字太上道君二章前序自道言昔於始青天中至東向誦經計一千五百九十五字元始天尊寳經前章自元始洞玄至列言上清計一千二百七十八字元始寳經後章自元洞玉暦至禍及七祖翁計七百八十六字太上道君二章前章後序自道言此二章至乃當洞明至言也計四百四十字大梵隱語前序自諸天中至靈書中篇計一十九字隱語正音自亶婁阿薈至幽寂度人計二百五十六字大梵隱語後序自道君此諸天中至大量玄玄也計一百八十字玉晨明十遍說經說經召十方无極无量品无鞅之衆十方境土天人聽法應時而驗一遍東方至真大神浮空而至安太堂鄉聾病耳納善世界皆開聦二遍南方至真大神浮空而至宛黎境域弃賢世界盲者目明三遍西方至真大神浮空而至福堂淵咸行世界瘖者能言四遍北方至真大神浮空而至鬱亶野淸跛痾積建淨世界皆能起行五遍東北至真大神浮空而至福集郷長久病痼疾安世界一時復形六遍東南至真大神浮空而至无福田用髮白返黒賢世界齒落更生七遍西南至真大神浮空而至延福郷仁老者返壯靜世界少者皆強八遍西北至真大神浮空而至福徳野延婦人懷姙鳥獸含賢世界胎已生未生皆得生成九遍上方至真大神浮空而至諸天宫闕地藏發泄金玉露形十遍下方至真大神浮空而至洞洞九壘正行遊梵四膏三十六宫天地宫府枯骨更生皆起成人敘玄章師曰道言至无量上品乃大洞迴風混合度人上品之道也昔始青天即玉隆騰勝天也大浮黎即天帝内諱也碧落乃始青天脉如一身脉絡也玉晨道君首言之始故曰敘玄啓運章師曰元始至以召十方謂當說者當此劫運開圖出教故說是經先召十方如大洞十轉召十方三回召仙官所指召五嶽三官元始上帝說經故曰啓運真應章師曰始當詣座至五色鬱勃乃大洞十方神宫天境自然之真隨天尊所召應感來赴大浮黎之㑹登劫刄寳臺聽其所宣經法故曰真應定極章師曰七日七夜至衆真侍座此天機内運分晝夜七數之期威神外感有一時停輪之瑞以内言之定觀七日不知晝夜觀心无心乃見真元之心觀形无形乃識本始真形心形都无自入无形之道湛然見玉清聖境乃白日飛升之道入定之法巳述本品故曰定極還元章師曰元始天尊玄座至咸得長生乃元始上帝說經之道十轉之法立於生數成於五行成數行其道者白日飛龍駕鶴上詣玉清受書爲仙公明其道則長生不死用其道則證此十端大功玄座者法身所御也獅子者元始威神也以内言之六氣八冥朝心化成獅子下丹田故左青右白前赤後黒中黄故有五色獅子之象巳具本品故曰因成五行是名還元玄元章師曰道言至欣樂太平乃隨前五行生成瑞應十回度人隨徧召十方十品大神一時同至因功徳巍重不可稱量故有迮國之化偏陷之虞乃懸一寳珠分度道品精麄應於玄妙髙下天人仰看不能入黍珠之妙真聖隨化俱登納玄玄之中旣巳受度道君天人全其本年咸行十二善心方契齊同慈愛異骨成親之道而天人先是一國男女傾心歸仰者十方天人入大浮黎土也黍者此五榖之長萬數之季故有玄化之元命其章品也演梵章師曰經始出教至皆得度世自天人普度之後經法流演出教度人凡是一國聞其說經未受教法預發至學之心並啓大道之誠行於宗奉禮敬四事得其一端者皆得度世流演萬天各行四事梵行故曰演梵宣祕章師曰道言至非世之常辭謂天尊所說經中上二章乃大洞百神内名亦皆天帝内諱或魔王百靈隱名故曰宣祕上聖章師曰上聖巳成真人至白骨成人乃是天真大神巳成三清真人感應内徳也旣能通玄究微能悉其章則曉逹經内大洞祕諱方有諸天遥唱萬帝設禮之道又有日月巳下亦是大定之法定中見一切无道鬼神魔精現身可役可問定力未就不能制禦則依九宫洞視法至學章師曰至學之士至不能更生此至學之士則有五帝侍衛三界稽首與諸天遥唱萬帝設禮不可同日而語也濟度垂死等白骨成人亦不可階級而至効矣又學士止能伏制地祇束縳魔精但卻死而巳不能更生矣勸道章師曰輕誦此章止神明護門謂非師授亦不齋戒沐浴仍虧損存思規儀同常辭混諸俗言故被殃於身不若不誦希福而辟罪供養尊禮而獲祥故曰勸道讃玄章師曰斯經尊妙至徳難可勝洞玄之中此經妙入大洞之道故尊於三洞之上妙於衆教之玄獨歩玉京也大羅天上有玉京之山金闕七寳瓊臺紫微上宫有玉京殿三十六座毎座萬里軒簷周回五千五百里中中有上方玉虚明皇宫靈寳至真明皇道君獨典斯經於宫中萬真萬聖一日三朝爲萬道之宗巍巍玄經上上大梵无徳可比无徳可勝也故曰讃玄修誦章師曰道言凡誦至遊宴玉京也師謂授有經之者不以修持止是誦經十過致此玄應上爲祖考之故也凡人之所生靈性不昧浩劫常輪或生四域或生六道或化應四生之中或托形三界之内一切有情皆我父母是以學士有二種大徳一則慈悲不殺不害恐悮害曩劫以來君師父母二則清淨不婬不慾恐㸃汚觸忤一切行化三師及出家法身或曩劫以來君師父母是以學士修誦先當仰報億曽萬祖幽䰟苦爽皆即受度上升朱宫也而朱陵品格受煉之科白日尸解太隂反形者受煉七年而爲神仙之位子孫超度青宫抜度䰟登朱宫者受煉九年受化更生得爲貴人若夙靈通逹不昧其本好學至經功滿徳就皆得神仙飛升金闕上清之天許遊宴大羅玉京也若好學至經者乃夙世不昧功徳重於誦者非是貴人則九年必得尸解若弃名貴九年飛升金闕而爲名貴昏性業拘消福多致反墮苦爽爭及學士清薄生運好學无諸業障必保得道神仙決致矣上學章師曰上學之士至遊行太空前謂授誦通玄究微之真此謂上學之士亦修亦誦不能度於億曽萬祖至於自身受度飛升南宫世人爲學士也詣師受經誦經之者至得延壽長年後數窮運應皆得作尸解之道䰟神蹔滅不經地獄即得反形遊行太空也其所作尸解之道有大洞五石鎮生之法形謝朽爛五藏自生年限滿足太一合神更生真仙之質受書上道寄治洞天功徳充備位補髙真又有九真中經混守長生大君之道形質告終軀寄重隂神守百關五内自生年限足備神形合符飛升十天受書列位功滿之日位補真人又有身佩九真之戒心映金籙之符受諸玄經功著三天徳合五常神氣内全功徳未充數合歸冥亦分其品白日上解夜半次之神色不變爪甲不青目睛不黯者乃尸解之仙䰟神暫滅命過太隂反形於朱陵之宫不經地獄遊行太空遍歴十天受書上道功滿道備三十年七十年百二十年因人啓發隂宫形神合㑹飛升三天隨其品位以補仙真別有上聖髙真曉告世情示以大歸潜升髙清遺於冠劒之者其太清巳下非八品符藥法術解厄避世雜法五解杖履代形之者不得返故郷必被三官所執非比前之四品尸解之同列也暢微章師曰此經微妙至生死蒙惠謂上至髙真上聖受度保制劫運使天長存中及一切天人全其本年莫不受度明可以度人无量幽可以度死拔亡是曰生死蒙惠暢演至微妙於衆經矣各述本品科格中效盟章師曰上天所寳至長役鬼官此人若至人齎金寳效心盟天而傳若輕泄漏慢殃及九祖況世人皆在不傳之禁限是上天寳經祕於玄都苟有漏慢豈止殃及九祖也長役鬼官及北府三官主役鬼之官也前以輕誦殃身後以輕泄殃祖知盟閉口而行依科修誦乃爲成真之梯凳也玄局章師曰侍經五帝至受徑者身謂盟師授經即五帝各遣玉童玉女各二十四人營衛神文典禁燒香保護受經者身泄語一人則罰一玉童玉女徑白五帝以奏太上此乃五行四季九宫二十四氣之神計二百四十人從五帝侍衛也若非盟師受經安有營衛典禁之科也三元章師曰道言至飛升上清謂正月上元宜度上世亡䰟七月中元當度巳身十月下元爲國安民八節之日以消九土之災以禳八節之厄誦詠向其方順宫以建指功標五帝徳化九土故得爲九宫真人正是左三右七戴九履一二四爲肩六八爲足身在中宫得守於五也乃上清九元豁落之道本命之日是本生始氣之日誦詠安䰟制𩲸保命寧人澄正五藏萬氣集身次於對坐元命之日誦詠即得不經苦惱身有光明行此功徳則三界侍衛五帝司迎萬神朝禮名書上天也若功滿徳就即得飛升上清也且本生之日謂如甲子日爲本生甲午日爲元命上清者四梵天之上有三清之天第一太清十二天九仙所居上清十二天九真所居玉清最上十二天九聖所居共三十六天上清居太清之上玉清之下矣行道章師曰道言行道之日至如此分明法有存思呪訣具於本品三氣者玄氣青元氣黄始氣白即是三氣也自一氣而生三氣三氣生九氣九氣生萬氣三氣之主一氣之尊元始上帝也九氣之祖青童道君也萬氣之母西方至母也人居三氣之中化應三一之神真常之至道萬氣之根宗也宻呪章師曰无上玄元至東向誦經凡啓奏太清只告五靈老君召出身神若關啓上清只告真元教主太上老君如啓奏玉清只告太上道君也臣及甲乙述奏誦經之意召出身神巳具本品東向誦經者東乃長生之方諸天尊重凡諸靈寳符書並宜向東書篆引三十二天之氣布之神通立至凡行道者須東向爲始末洞玄章師曰元始洞玄至離合自然此二十四字乃洞玄本章之首元者萬道之祖始者衆氣之宗洞者神應靈應玄者變景莫測靈者有求必化寳者仙真聖根此六字爲萬道之祖衆氣之宗歸於大洞之中神應靈應變景莫測求靈化寳則爲上品妙首十回度人巳明本品其章中之㫖者乃百魔隱韻或離或合非力㑹合韻非相律成音皆在自然而然百魔者九霄大魔帝君之五與上帝元始同化玉清元氣皇冑之胤嗣也乃神霄玉清王紫霄玉清消魔王丹霄中極保景王青霄玉清洞明胎王次玉霄妙化王次太霄景霄碧霄琅霄玉清王亦大魔之帝也次九天大魔三天大魔三界大魔三清大魔五帝大魔五天大魔諸天魔王梵天靈君之魔次三省天相太玄之魔比魔非魔靈魔制魔神魔等至六天大魔隱韻皆典二章之中以洞玄百魔之音韻離合自然而成章玄奥莫測惟元始洞曉以說二章十回度人故亦曰洞玄赤文章師曰混洞赤文至无文不生自玉字生乎大梵之先至赤明開圖而爲赤書未明隱於混洞之中亦曰赤文六十四字明於澤品内景言之大洞玉字混合之道也亦述於内行中更不重敘大梵章師曰是爲大梵至森羅淨霐大梵者大洞之體也諸天之上有大羅之天帝有鬱羅蕭臺七寳成於空玄之中臺有九層髙參太空之上於白玉之京立於玉山之巔上極无上之上乃大羅玉清元始所治玄都也渺渺劫仞不可窺測若亡若存不可定位上有三華堂離便宫大有宫妙庭宫金闕玉房森羅上舘淨霐二池以内言之泥丸九宫也玉帝宫元始所居與上清所說九宫有㫖此正是内朝元始之道也梵氣章師曰大行梵氣至無量度人乃大洞祕㫖周回十方亦十回度人五行生成之本也中有度人不死之神帝一尊君也南極長生之君上一赤子分形九真也度世司馬大神太一之神也好生韓君丈人心中真人丈人也南上司命司録與回骸起死君居下元延壽益筭衛丈人於中元度厄上生君佐一於上元皆總氣於九天九天總氣於太微太微梵氣乃髙上洞玄之氣辟非之煙入兆身中則立致不死行之三年得道巳述於本品招真章師曰今日校録至嚴校諸天於赤明劫初在始青天中大浮黎土開校圖録之日諸天神王大聖主其諸天圖録並臨帝軒校量罪福輕重記録功過淺深也玉清有八景隱玄羅圖上清有二十四氣八景玄圖皆元始所開之圖與諸天梵氣元圖同開也籙者上元金籙簡文中元玉籙簡文下元黄籙簡文又有玉清飛化玄籙寳圖上清青真紫籙晨圖太清巳下及諸天皆有圖籙億萬不可備紀其目並詣元始上帝之前校録也此十方大聖品位尊崇與上帝同階而受事於元始也五色玄龍者非有相之形得五行玄上之氣而化成也九色之節者青黄赤白蒼碧緑絳紫九色之羽成節也十絶靈旛者五神錦中成十絶以爲靈旛也飛雲則輕清飛華琅之雲乗丹玉之輿碧瓊之輦上有五色玄羽之盖下有百字瓊瑶之林或駕驂朱丹鳯凰或馭導五色玄龍五老啓其途羣仙翊於轅傾光降臨回駕詣軒監諸天之衆真普校録於度人也執籙把籍者諸天丞相主録定品者韓司丈人監生度人者九天大神普詣元始上帝之前隨其品格應度者普行受度也巳下乃嚴校諸天之告行也普告章師曰普告三界至逼合鬼羣三界者上元无極神郷中元泉曲之府下元北都羅酆三官則上元天官紫微府中元地官青華陽臺府下元水官清泠府九署者一官三署分左右録水火考也三官共九署也十二河源者十二分野有十二水河之源湊於无極混海歸於泄水之源上解祖考者及億劫種親疾除罪簿落滅惡根不得更有拘留使時刻以升遷無致逼從再合鬼羣也十二河源泄水於天河東井之源也日月八景冶煉金仙東井黄水主華神池沐浴更新其光事見上清三道順行經此亦煉度䰟神之所也巳上四十八字普告三界之告命符命章師曰元始符命至逍遥上清三塗者地獄餓鬼畜生業報三塗又有天官地官水官之役五苦者衰病死墓絶又有水火風刀王法饑饉瘟疫又有鑊湯爐炭屠割氷池考掠又有色慾情愛貪五苦累三塗同五苦共爲八難六十四字元始符命也二種符告具見黄籙齋法寳諱章師曰上清之天至梵行梵行者道中之道天中之天玄中之玄真空无礙三界之上玉清之下上清之上有天帝曰玉真天帝乃昊天玉皇上帝玄穹髙上帝主治無色梵行之境是種民天界也已下三十二天帝諱帝名隱諱靈章隱韻玉音或言天尊祕諱或是天魔隱音或明天明神内名或載天靈妙音莫知其微莫測其玄九和能變十合能化无窮神應无量奥㫖玄變妙化於上清故曰寳諱又以此天帝書列成劵可以无量度人受度章師曰今日欣慶至天門此二十八字乃關告天門大劵告門也得道之䰟蒙天尊賜劵出符告三界魔王保舉到天門不得拘執也其三十二天帝升天劵内隱玉皇内文中人皇文六十八字在内計三百三十九字五行章師曰東斗注筭至萬神无越皆生於赤明出於五劫司於五方也以度天人衛真章師曰青天魔王至列言上清乃扶衛掃蕩命魔煞鬼前驅之命皆玉清赫奕大神也神公即太玄上相三十二字神公所受元始之命亦可爲震靈之呪兆有恐心怯意之所叩齒三十二通存身作神公誦之十過萬魔奔走千妖匿形玉曆章師曰元洞玉曆至運度自然乃大洞正文之體狀玉曆是紀五劫開化億劫更換之曆大洞者混洞也龍漢延康劫中其大洞未分上有三十六氣下有三十六澤皆金水剛風梵澤之氣无色无光至赤明劫元始開圖運應啓分度數推及自然分形方有赤書真文度者一日一度劫者乃大小劫運小劫者陽九極而生隂隂百六極而生陽水災火厄交攻人物一新其大劫者玉清天有宛昌臺乃百寳玉石髙九萬里方闊六萬里每日月出初一度天人登臺歌洞章而採日月晨華摘空青寳枝而拂日月之光取空青之實好芥子寳珠投於西元之城夫人之衣拂盡寳石空青芥珠投滿西城乃爲一劫當此天地交攻水火風災蕩穢彌天三界巳下俱壞龍門交㑹鳥母度世劫過種民天人下降佐理太平聖君也自延康龍漢至赤明開圖經於億劫也流化章師曰元始安鎮至萬範開張自開圖之初元始五篇真文赤書敷落安鎮五方命以五帝典治司化育物鎮運拯度保天長存雖至劫運亦不敗壞三畧如故以大梵玉字之氣彌羅諸天自此三界萬範開張巳上六十四字并此三十二字乃天地之至誌靈寳之梵音洞玄之本章安鎮禳治隨意用之立取靈應心存元始口誦此章氣召西北訣恰玉清也巳述𡨋文品升元章師曰元綱流演至氣入玄玄元綱者元洞之綱混洞之紀流演三十二天輪轉五色之境周回十方始而更終自斗旋左歷度箕星回日月之度分成五帝之大化三十正分三十二天三天也總三十五分之氣於上元流演之中輪轉於无色之境冥合玉清八景之天氣入天中之天玄中之玄也以内言之一身元綱者泥丸也晝夜周流氣血终始周回一身總於上元也三部八景二十四氣玉清宫泥丸宫周回真雌一雄一神合八景共三十二氣三元三氣總於上元玄宫下通心胞八脉冥合下元八景矣有玄綱之圖採服天之氣流演之道具本品中契玄章師曰玄中太皇至輔翼萬仙玄中太皇乃王母也下元萬氣之母合延之神也乃上帝之道君上皇之聖真居西元太霞宫嘯詠空洞靈章以生萬氣不絶也左手把金真玉光右手擲流金火鈴流響三十五天聲應天中雲營玉音攝髙上元氣靈風聚辟非之煙紫景鬱秀太虚萬仙輔翼朝宗乃大洞回風混合祕訣大法雲營非聚雲之營乃周運營瞬之營妙在金真朗郁流響雲營玉音攝氣靈風聚煙一十六字諸天大禁不敢輕露隱於大洞真經首章兆可尋詳以契玄真成真章師曰千和萬合至保命生根以此祕訣混合一千回共得一萬遍即自然成真真中有神長生大君乃九真之首神也无英公子肝神也主䰟白元尊神肺神也主𩲸太一主神司命主氣桃康合延主精並執兆五符五籍保兆命元生根自五神混合百神而化揖華章師曰上遊上清至萬氣齊仙上清者心之華房也太一含蓮其形自然太一元君居之如蓮華之房心未開之丹華八冥之脉冥㑹之處盡總於心也細微之中者以通元氣周注泉源之所也如草木枝脉此人身赤文血脉之道路一體經絡之營衛也中理五氣者理五神之妙氣於中元五神總細微之血脉於八冥混合如此百神十轉回靈即得萬氣齊仙也心端有水名曰神水服之魔鬼神靈見之如赤日又此七神乃玄丹太一中斗之神人身中黄太帝之本形也長生大君陽明无英公子隂精白元尊神北極太一尊神真人司命丈人丹九丹元桃康大君玄冥合延大神瑶光也三界章師曰仙道貴生至飛空之中欲界最居其下六天爲境人修三百善功得生此天色界者有三淨行及身心口三業淨者得生此天无色界者三業淨六塵根不染者得生此天若塵業俱凈生種民天中過此乃證自然无爲大洞之境三界歌章是魔王飛空時作此音以前遵玉清也阿大魔王自稱也敬形章師曰魔王敬形至七祖翁謂止述三界歌章非二章正經也自魔王至更生三十二字勑制地祇之文令敬迎誦章之學士也天寳章師曰道言至付焉謂上天之所寳不傳於下世依玄科四萬劫一傳天真若有齎金寳質心依舊格告盟十天方許付度舊格者真凡有品真人巳立四萬劫至人依朱宫仙格太真盟科四十年一傳普度章師曰道言天地至普度无窮謂消諸不祥无量之文普度无窮也隂煉章師曰夫末學道淺至便得神仙已述于上學章其煉度尸形之法出靈寳五煉生尸經九煉生化章明其要於升度品保鎮章師曰道言夫天地至普度天人此保鎮之法巳述各品至言章師曰道言凡有是經至至言也此經之神无量功徳无窮玄化感應罪福凡夫罔知其實上士勤行深明至理得道之日方始洞明此經至妙之言靈感實應驗之㫖也大洞章師曰中篇是也諸天中大梵玉字之音三十二天无量隱語之音乃元始祖氣靈書中禁之篇玉晨道君撰次天真皇人所書也内隱大洞祕諱五劫開圖之音出諸天内音玉字經指歸隱奥兆可詳之慎勿泄漏於凡夫耳目无逃天憲黙而行之玄應章師曰有知其音至玄玄也止誦此音而有玄應皇人章師曰元始无量度人上品妙經皆是道君所標之目也本章者天真皇人標題内名也上品至自然四句一十六字是皇人總明一經宗㫖大意又衆真云是本經下隱五方真文也混洞至度人是元始天尊所說正文也今日至諸天是玉晨道君所紀受度之㫖也普告至上清是元始天尊所降誥命神功所受所行之文道君紀録於此上清至梵行亦元始所說正文也三十二天至受度乃道君紀述當曰受度自慶之言也歷關至天門此元始歴關之文道君紀録於此東斗至妖精此道君宣述扶衛掃蕩之事玉清大神之威神也三官至上清此神公上真太玄上相五靈北帝當日受命之符元始所降之言也道君紀録于此元綱至生門此元始所說正文中有至髙真此道君所授大洞之㫖三界歌章乃魔王所述皇人所書也隱語中篇道君撰次元始正文此三界之上至太量玄玄也皆道君所說皇人乃書也敕制地祇至更生三十二字乃元始敕文亦道君所記也二章者自元始洞玄至列言上清是一章也自元洞玉曆至辭參髙真是二章也三界歌者非二章乃魔王所述矣餘皆道言者道君所記非二章之㫖也上清靈寳大法卷之二十六
