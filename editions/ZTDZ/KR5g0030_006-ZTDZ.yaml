body:
  text: 洞微髙士開光救苦眞人𡩋全眞授上清三洞弟子靈寳領教嗣師王契眞纂修錬佩服門爾時太上於赤明初年命天其皇人傳授諸天内音眞法安鎮萬天立乾坤文制星辰日月成立萬天及諸萬聖同萬類萬物皆受太上靈寳所成受元始天尊眞炁方得生成各隨本性而受其名謂此法能度天上人間萬靈及於一切得道聖眞皆禀内音眞法大梵之炁而成大道矣學士行之悉得上升之道所謂一切大聖皆得内音眞法而成聖也師曰天上天下得此音无所不辟无所不禳无所不度无所不成此是天眞自然之音是名諸天内音眞法自然成天立地乾坤也人若遇此法時須要上合於地中合於人更能舉動方圎言不傷物常行損巳救人之道方可行諸天内音眞法自得飛升上天之道謂明諸天上帝諸王諸聖皆從此法而成仙官之位眞法妙重諸天齊功上天度人所寳不傳下世所謂内音之法故知元始天尊四萬劫一傳下世此明八字之音皆是諸天宗範謂明此音是升天之道本入聖之根長生之門上天之路且人萬劫遇此音者一身得道升天更能度於九玄七祖皆得神仙之道謂明此法天上人間一切聖賢眞聖無有不從此而成髙眞之道故曰此音度人無量爲萬道之宗得道成眞有如兩霧功筭不知其數此法古今四百萬年再降人間若有遇者獨行三界升入金門與天齊年訣曰凡行養命修仙之道常以毎月十日望日晦日上下弦日朱書玉字至日清旦以凈水服之毎一月服八天四月服足也自東方服起周而復始其玉字自有天眞皇人昔書其諸天内音玉篆具眞文冊中佩服東方内音亶婁阿薈無惒觀音大黄皇曽天須延明首法攬菩曇太明玉完天稼那阿奕忽訶流吟清明何童天以每月十日書第一第二第三字清旦向壬方佩服更念三天呪誦持如法百日自然百神朝身久之可致長生白日上升之道也華都曲麗鮮菩育臻玄胎平育天答落大梵散煙慶雲元明文舉天以每月望晦二日書第四第五二字向東方佩服二十四年自得神仙長生不死上升之道生死皆得上升得居帝君南軒遊臺之上自然飛大羅之天飛洒玉都明魔上門上明七曜摩夷天無行上首回蹠流玄虚無越衡天阿陁龍羅四象吁貟太極蒙翳天以每月上弦下弦二日書第六第七第八三字向月服佩誦呪如法八年自然身有光明面生金色生死皆得上升日月之舘身得神仙長生久視與天齊年也佩服南方内音南閻洞浮玉眸詵詵赤明和陽天梵形落空九靈推前玄明恭華天澤洛菩臺緑羅大千耀明宗飄天以每月十日書第一第二第三字清旦向壬方佩服更念三天呪持之如法百日自然萬神朝身自得長生白日上升之道也眇莽九醜韶謡縁邅竺落皇笳天雲上九都飛生自騫虚明堂耀天以毎月望晦二日書第四第五字向東方佩服二十四年自得長生不老上升之道生死皆上升得居帝君南軒遊堂之上自然身登大羅天也那育郁馥摩羅法輪觀明端靖天霐持无鏡攬姿運容玄明恭慶天馥朗廓奕神纓自宫太煥極瑶天以毎月上下弦日書第六第七第八字向月佩服八年身有光明面如金色生死皆得上升日月之舘身得神仙長生之道與天齊年也佩服西方内音刀利禪猷婆泥咎通元載孔昇天宛藪滌色大眇之堂太安皇崖天流羅梵萌景鬱蕭嵎顯定極風天以每月十日書第一第二第三字侵晨向壬方佩服更念三天呪持之如法百日自然萬神朝身自得長生白日上升之道也易邈無寂宛首少都始皇孝芒天阿繿郁竺華莫延由太皇翁重浮容天以每月望晦二日書第四第五字向東佩服誦此音二十四年自得長生不老上升之道生死皆上升得居帝君南軒遊堂之上自然飛身大羅天也九開自辯阿那品首無思江由天無量扶蓋浮羅合神上揲阮樂天玉誕長桑栢空度仙無極曇誓天以每月上下弦日書第六第七第八字向月佩服八年身有光明面如金色生死皆得上升日月之舘身得神仙長生之道與天齊年也服北方内音玃無自育九日導乾皓庭霄度天坤母東覆形攝上玄淵通元洞天陁羅育邈眇炁合雲太文翰寵妙成天以每月十日書第一第二第三眞篆字侵晨向壬方佩服更念三天呪誦持如法百日自然萬神朝身飛升上清之道也飛天大醜總監上天太素秀樂禁上天沙陀刼量龍漢瑛鮮太虚无上常融天以每月望晦二日書第四第五字向東佩服誦之二十四年自得神仙生死皆上升大聖之天碧落浮黎空歌保珍太釋玉隆騰勝天惡奕無品洞妙自眞龍變梵度天元梵恢漠幽寂度人太極平育賈奕天以每月上下弦日書第六第七第八字向月佩服呪之八年自然身有光明面如金色生死皆得上升日月之舘與天齊年凡修大道常行慈悲救物物無其物清淨其心正直端嚴無邪無曲潔已齋心常思衆善與人言論常加謙和動合天地言無傷炁勿食葷鮮勿食物命見他命如巳命見他非如已非見他之過如思父母之名若遇似此之人方可傳授諸天内音飛升之法蓋爲此法至神至聖四萬劫一傳如下世今有遇此者乃宿有升天之本人能忘心佩服自然飛升上清萬神朝禮地祇侍門名書上清功滿德就白日升天祕之慎之非人勿傳五芽眞文師曰靈寳有五方眞符赤文祖炁天中靈寳也人身中主内生五色靈芝外招五方雲芽和炁乃眞液眞水在天爲五老上帝在經則結炁成文是爲五芽眞文在五方則爲五帝在乾象則爲五星在地理則爲五嶽在事則爲五常在物則爲五行在人身則爲五臓也修靈寳之道洞房之法餌服五方正眞之生炁以錬凡軀也神哉青芽眞文一十二字赤芽眞文一十二字白芽眞文一十二字黒芽眞文一十二字黄芽眞文一十六字右五炁五芽眞文以丹書於金漆黒光二板之上行持請炁畢朝奏内誦洞章方可施用法當隨方叩齒咽液三過心禮三拜發眞升歩百花之虹丹朱迎接以舌砥化五色之炁咽入重樓送歸絳宮化成五方錦紋交結入符五芽元炁靈液之嬰體也此乃身中靈寳祖炁學士當勤行之佩服眞文師曰五芽内錬之法請五帝五靈降眞及佩眞文使其神居五臓之中爲致五芽之精也常以立春日鷄鳴時入室東向九拜平坐叩齒九通思東方青帝靈威神以其司春主東方生炁故也身長九寸頂青玉冠九炁青羽衣駕蒼龍之輦建頴旂從甲乙胡老之官九十萬人來降須㬰化生青炁如雲灌覆已身從已身從已口入直下肝府又思木星煥明在東方照映已身便開口念呪九遍取東炁九口咽液服東方眞文一十二字呪曰九炁青天元始上精皇老尊神衣服羽青設御天宫煥明歳星散輝流芳淘漑我形上飡朝霞服引木精固養青芽保鎮朽齡肝腑充溢玉芝自生回年億劫色返童嬰五炁和合天地齊并常以立夏日鷄鳴時入室南向三拜平坐叩齒三通思南方赤帝赤摽奴以其司夏主南方生氣身長三寸頂赤玉冠衣三炁赤羽衣駕丹龍玉輦建釆旂從丙丁越老之官三十萬人來降須㬰化照已身又思火星煥明在南方照已身便開目念呪三遍取南炁三口咽液服南方眞文一十二字呪曰三炁丹天朱宫雲童元始上帝驂駕赤龍丹羽飛衣錦帔光明驅䇿靈官運道隂陽三炁吐輝漑我絳宫赤子俱鎮錬芳飾容朝飡朱景玉芝滿充回停劫年朽骸返童長齡天地永享無窮身生水火變化百方常以立秋日鷄鳴時面西七拜平坐叩齒七通思西方白帝白招矩以其司秋主西方生炁也身長七寸頂白玉冠衣七炁白羽衣駕白龍玉輿建素旂從庚辛玄老之官七十萬人來降須㬰化生白炁如雲俄覆已身從已口入直下肺府又思金星煥明在西方照已身便開目念呪七遍取西炁七口咽津服西方眞文一十二字呪曰金雲七門皓映西華中有素皇元始之家驂駕白龍七炁峩峩徘徊玉門散精朱霞金星吐輝芳芝滂沱玄奥我身養我素芽明石鮮光萬劫不俱服以流泉飡以太和九天上帝給以玉華保年駐白顔景敷羅長存天地三光同遐常以立冬日鷄鳴入室面北五拜平坐叩齒五通思北方黒帝叶光紀以其司冬主北方生炁也身長五寸頂玄玉冠衣五炁玄羽衣駕黒龍玉輿建皂旂從壬癸𦍑老之官五十萬人來降頃刻生黒氣如雲似流星之光覆己身從口入直下腎府又思水星煥明在北方照已身便開目念呪五遍取北炁五口咽津服北方眞文一十二字呪曰北方玄天五炁散靈上有大神始老元精駕龍建旂遊宴玉京是日元吉慶雲敷榮飛芝流灑滂沱四盈玉女玄奥混我身形腎宫充鎮朽芽堅生五府納眞上通神明五老降接仙道早成變化水火衣服羽青飛行太空遊造紫庭壽同三景萬劫長齡常以春分秋分夏至冬至日鷄鳴入室向五方旺方心拜十二拜平坐叩齒一十二通思中央黄帝含樞紐主五方之旺炁也身長一尺二寸頂黄玉冠衣五色衣駕黄龍玊輿建黄旂從戊巳蒼龍之官十二萬人來降須㬰化生黄炁如雲覆兆已身從口下直入脾府又思土星在中炤兆身即閉目念呪一十二遍吸中炁十二口咽津服中央眞文一十六字呪曰中央太山元炁徘徊上有玄老總統四靈驂駕黄老五色羽衣運道九天輪轉璇璣煥明七星流光散輝玉英芳芝流溢四飛淘漑我身脾府光開養芽飡精萬神總歸検魂制魄仙錬八威表裏洞清常生不衰通眞達靈升入太微服靈芝雲液法師曰凡春夏先服雲液而後服元炁也秋冬先服元炁而後服雲液也常服每日以鷄鳴陽光始分東南向叩齒如其方數東九南三西七北五中央十二通也以雙手掌相摩令熱拭面目隨其方數念呪自東方起一周而止次第飲服五芽眞液也五芽呪東方青芽紫雲流霞服食青芽飲以朝華青芽肝也朝華者上齒根也便以舌撩上齒之裏以古䑛唇三過潄口令玉泉滿口九咽之又引青炁九咽令鎮肝中南方朱丹煥耀徘徊服食朱丹飲以丹池朱丹心也丹池下齒根也以舌攪下齒之裏以舌䑛唇三過潄口令玉芝滿口而三咽之又引赤炁三咽令鎮心中西方明石皓靈全質服食明石飲以靈液明石肺也靈液唇表之精也以舌撩齒上之表以舌䑛唇三過潄口令玉芝滿口而七咽之又引白炁七咽令鎮肺中北方玄滋玄珠潤滋服食玄滋飲以玉飴玄滋腎也玉飴舌也以舌撩下齒之裏以舌砥唇三過潄口令玉芝滿口呼吸而咽五次又以鼻引黒炁五口咽之令鎮腎中中央戊己昻昻太山服炁守精飲以醴泉一名玉英一名金粮一云仰視太山戊己脾也太山者前首也以舌撩上下裏表以舌䑛唇三過潄口令玉泉滿口而十二咽之又引黄炁十二口令鎮脾中如此畢叩齒三十六通咽炁三十五過又念都呪呪曰白玉嵓嵓以次行源泉湧洞似玉漿飲之長生壽命延長呪畢以舌撩上下中央令玉芝滿口而三咽之引炁二十五過極炁而咽之其道都畢此法並於夜半子時平旦寅時服之餘時卯酉午申巳亥并四土時各只服一靈芽玉液也服元炁法凡服元炁閉口屈舌以鼻長引口中炁滿脅腹鼓腮而咽之半夜八十一咽平旦六十四咽食時四十九咽日中三十六咽晡時二十五咽黄昏一十六咽其餘時二十四咽此法行之百日可以換骨易形一年自然徹視還年却老乗雲登仙可翹足而俟矣凡逐時服炁咽液訖以竹膜朱書玉嬰神變符丸而吞之以津液咽下存已神如嬰兒之狀在丹田中二年在心中三年在泥丸中與前内朝同行三年之外可分形隨意玄妙不一應變無極兆自然之炁液並隨行轉三年之外火應水朝與天地同隂陽與日月同造化九年五老下降迎兆白日上升也師曰天地之中有聖人在其中得其道賢人在其中得其法智人在其中得其術皆天地㑹精而成其眞也故道不可以言求法不可以情求術不可以意求皆萬物順天地化生而歸於自然也水火圖玉嬰神變符玉嬰太乙胎化天尊玄元始炁三寳天君乾靈坤毋坤蠡乾靈虚皇告命玉胎分形九炁映明混合生成九天元炁孕胎成眞天一地清人寧谷聲冲開九天現出眞形陽魂聚神七魄守宮上朝三天下入九泉事訖皈无咸鳥七德急恩如太一夭尊勑開明三景師曰靈寳有開明三景之道兆於日初出時平心向太陽祝鬱儀呪呪曰日魂朱景照韜緑映回霞赤童玄炎飈象呪畢以鼻引日之紫芒八十一咽又於月初出時平心向太隂祝結璘呪呪曰月魄靉蕭芬艶翳寥宛虚靈蘭鬱華結翹淳金清瑩炅容臺標呪畢以鼻引月光黄色炁一百二十咽又於初夜戌末時仰面視斗極祝北斗諱曰魁𩲃𩵄䰢魓𩳐魒呪畢以口引北斗七星金光四十九咽次服中元三景元炤眞符以竹膜朱書作丸以津吞之服日符忌午後服月符忌上弦前下弦後服斗符忌辰戌日服此三景眞炁可以還精復胎立反少容呼吹萬疾隨意而愈百魔稽首玉女侍形不待飛升三年功滿受書爲三景眞人中元三景玄炤眞符師曰三景符乃三光之正炁上清之正道並用黄紙朱書男服鬱儀符女服結璘符或被邪妖染者服中元斗形如危篤者合三符作一道吞之立金生形復肌回顔換骨乆服長生亦能飛升鬱儀符存圍形方景紫光九芒左九匝日䰟朱景中指上節離炁結璘符存方形圓景白光十芒右十匝月𩲸靉蕭四指上節乾炁中元斗形魁𩲃𩵄䰢魓𩳐魒掐至辰推括曜所建冬至戌夏至亥合形太陽太隂並詳星曆過數日取則也錬服三光師曰毎於日出時兩結玉帝訣合掌對太陽念日君呪呪曰鬱儀之神離宫眞精灌服九芒乾元利貞况畢以鼻吸炁九咽以意送下丹元約二九三九以至九九八十一遍再祝曰唵鬱哗𠻗煜貞元輝縳𠯐囉喗𠸎唎娑婆薩訶呪畢取炁如前咽之次於月出時雙手玉帝訣合掌對太隂祝月君呪呪曰結璘夫人坎位眞精圎曜八芒吉利元亨呪畢以鼻吸炁八咽以意送下丹元約八八六十四遍再呪曰唵結噷𠷈哼嚂縳明囉㗶囉娑婆薩訶呪畢取炁如前咽之但自上弦初九日後下弦十六七日取炁行持次於星岀時兩手玉帝訣合掌對天罡方念天罡呪呪曰唵勑之神斗極眞精流輝七芒吽吒勃凝呪畢以鼻吸炁七咽以意送下丹元約七七四十九遍再呪曰唵吽吽迷離奴那婆羅修唎唵吒唎吽呪畢再取炁如前咽之只於戌亥時行持餘時不行此法乃三光錬形或隂兩之日不可行持凡服三光畢叩齒九通而退服三光符師曰毎遇三七日雙手斗訣面天門歩北斗罡回身面南服三光符持上帝三字祕諱曰洞潜氣天命長人恒寧呪畢再拜以新水吞下又再拜念總呪呪曰祖道玄眞烜赫正神鬱儀返質熒惑操形赤明和陽理禁威靈耀明宗飄帝重光明戊巳芒英中央鎮星掃蕩邪炁破滅淫精海逢之沸金逢之鎔木逢之燼火逢之空長離之主統攝飛蹤迷離奴那唵唵吽吽東海青童總括張羅迷離奴那唵唵吽吽呪畢存三光炁灌注三田九符亦用此呪玉清天日魂孕珠紫霞眞符天地人勑長生霐持無鏡攬姿運容祖道玄眞烜赫正神帝理上眞熒惑操形冠帶九芒帝重光明右符書時面東北念三光一字呪鬱離貞三遍吸炁三口入筆書之又呪曰鬱儀之神離宫眞精灌服九芒乾元利貞想内有紫光九芒有圎光童子如日初出狀若車輪黙念三字呪九遍引炁納丹田復自丹田升上吹布符中紫光纒於符上玉清天月魄九靈成眞符精炁神勑延生赤明和陽理禁威靈元載孔昇戊己芒英薩羅婁王拘魂制魄右符書時面東北念三字呪結亨坎三遍吸炁三口入之筆書又呪曰結璘夫人坎位眞精圎曜八芒吉利元亨想内有白光十芒有散輝玉女如月初出狀如水晶黙念三字呪三遍引炁納丹田復自丹田升上吹布符中白光纒於符上玉清天天罡正炁玄精秘符日月星勑合眞虚无正魒曜明宗飄紫極回旋帝運上玄帝招眞童曲育九昌總監上天明梵穹窿威制天政浮羅合神那育醜英天中之尊右符書時面罡方念三字呪唵吽吒三遍吸炁三口入筆書之念勑極玄眞總威尊號又呪曰唵勑之神斗極眞精流輝七芒吽吒勃凝瞑目仰頭想罡星在頂上取蒼炁想炁中官君童子次分作六炁吹符中玉音攝炁靈書祖道玄眞烜赫正神鬱儀返質熒惑操形赤明和陽理禁威靈曜明宗飄帝重光明戊已芒英中央鎮星掃蕩邪炁破滅淫精海逢之沸金逢之鎔木逢之燼火逢之空長離之主統攝飛蹤迷離奴那唵唵吽吽東海青童總括張羅迷離奴那唵唵吽吽師曰於日初出時面太陽先存五臟分明了次對日黙念靈章玉音攝炁吹一遍以口對日光挹咽九口又祝一遍瞑目以鼻長引暗數九次咽之存日之紫光九芒下入丹田作日狀以午前數多爲功午後不可行也直至初三日夜月初出時依採日炁法瞑目以鼻引十咽之存月之白光十芒下入丹田亦存月狀與日合半至二十三日後不復採之月炁比日炁等共一萬遍遇春先取木德夏取火德秋取金德冬取水德四季土旺亦各本方色炁却及萬遍逢一月五過依洞章法取斗中紫炁萬遍名外侍八瓊丹一千遍夜月有神光出没二千遍一身有光三千遍滿室有光四千遍舊病新疾殘靨宿根皆去色返嬰童五千遍地司除死名玉清書生籙百靈侍衛六千遍舉身有光洞照百歩夜可細書鬼神不匿預知未來七千遍吹嘘百物可起死尸八千遍呵呪五金皆成至寳光生圓象九千遍丹成如日面生金容骨秀五香三天注仙萬遍道備位登眞人内朝三天金闕降眞召靈師曰大法有降眞召靈之道炁運生化之妙眞靈升降之變呼吸坐役億萬眞仙無所不通先化一身之内次運萬方之中動合自然開明三景大行梵炁周廻十方造玄入妙實渺渺大羅之上十轉回靈之道若外求此道由縁木求魚徒用神炁學仙之士内修外錬濟顯㧞幽必從此始須當朝奏請降内朝三景天闕飛眞謁帝乃運神㑹道之功用也若爲國爲民祈禳濟度錬化隂魂修建黄籙大齋拜表上章祈恩請命當内誦玄報毋墮大縁也施用之法當齋沐入靖調神正炁或坐或跪先内錬六官上開八門中運三宫下通内户理發五炁混合百神次登長虹金橋廣度詣中天斗内再自中天升橋徑詣三天或朝三寳九天天帝三宫五師太一南極師尊皆用此法立彰玄報靈寳之道一以神炁修錬誦謁爲主使學士品列仙官侍眞金闕若妄亂施爲徒誤幽明減筭致罰玄憲有格冐禁宣傳法曰運眞自丹宫升絳宫次升明堂仰視三天升化自東方清微天爲始朝奏如法復還萬神先黙祝玉清降眞朝元祕章了方服三天三境眞符次祝内朝金闕祕章玉清降眞朝元祕章上清玉符總召萬靈靈光普照三界通明玉符飛降合契帝庭臣今啓奏上朝玉清雲霞飛奏時刻無停徑升玉闕與道合并急急如玉清上帝勑十天訣自上清出運化降眞召靈寳符飛煙散綵如霞錦透徹三天上下爲七寳金樓玉殿森列懸映目前再自三宫出玉清訣于爐中億乗齊臨降矣内朝三天金闕秘章上元太乙守居泥丸中元司命安坐絳宫下元桃康生宫把籍无英公子白元尊神玉章一召萬神奉迎玉清祖炁與道合眞靈寳天尊降道飛靈升化潜通徑朝玉宸左右司衛飛歩帝庭急急如玉清上帝勑右宻呪畢咽液三過兩腋發運神㑹道金光自兩宫出迸注三境符中以舌運盻接炁服符服三境符神靈炁清起接三清六丁六甲威劒無情大道自然拯度群生玉符注筆朝謁至眞千邪潜伏萬鬼碎形火鈐天罡白獸金精周行衞護勇鎮三清上帝玉符勑下安形凶魔奸惡道炁長存化運升度上朝帝庭急急如元始上帝勑雙手十天訣祖炁吹布以舌捲符通津咽服飛發神化三十二天下座納眞納眞呪天靈九宫太一守房百神參位魂魄安康長生久視日月同輝急急如上帝律令勑右呪乃金口所宣皇人按筆以授下士須當依旨修用以求玄報若自錬奏謁百神混合洞煥十方萬災不干神明護門子宜精行變降眞召靈上道行時先右手玉清訣左五嶽訣紅杏卯墨黒午磨眞酉襪臈子靈寳中文應化黙念三遍取五方炁剔去不得放炁以五方炁壓之若學不篤志則五嶽試人慎之慎之青帝護魂符呪曰五行之主九天司方青陽造化赫赫陽晶飛雲結篆風馬髙馴雲煙蕩瑞育化陽春木宫大惠鎮護肝魂右符護得道者三魂使其通靈澄徹呪曰謹召肝爲青宫无英制魂君少陽木精歳星之炁納化身中以生肝三魂處之木神九人神吏九千衆速降眞炁榮衞皮膚主其毫髮治肝病魂不附體呪青帝護魂保鎮三宫右青書黄上震文東炁吞佩忌酸辛九日以立春日受之若吞服用竹膜三枚書之若佩書白素上青帝符歌東望重拜手蒼帝玉皇君靈風鼓槖籥育物布元春雲龍轡嚴駕玉衞擁瓊輪枯萌泛霑及大惠無不均萬仙歌以道委曲戒天人心根迷自固拱跽戴洪仁赤帝養炁符呪曰五炁運度衆肺貫通日運玄珠光運華峯三宫升降徃來無窮赫赫陽晶萬物發生紫房混合九魂錬純披朱始丹蕭仞始臺通流血炁反胎火庭右符主火能養元炁黄帝曰壯火食炁少火生炁得温而後養也呪曰謹召心爲絳宫太一司命君太陽火精熒惑之炁納化身中以生左心左有玉童右玉女處之火神三人從吏三千衆主治其中榮衞宫府主其魂魄治心病炁不足呪赤帝養炁萬神歸身右朱書黒上午文南炁吞佩忌食苦三日愈以立夏日受之若吞服以竹膜二枚書之若佩書黄素上赤帝符歌太景開玉樞洞堂啓金除騫林䕃瑶砌丹鸞踏瓊珠寳房名曲麗明璫神所居飛遊豁雲道引目盻眞都天日永不夕重煙鎻青廬天上勑印開柏几羅簡書禆風樹玄化慇辛諒有餘白帝侍魄符呪曰白炁混沌三炁之神吐青入玄洞達我身晁晷蜉蝣隂魂返陽七尸燥煉萬神侍迎金炁散輝全我清靈此符侍得道者七魄使無散亂閉絶鬼道呪曰謹召肺爲素宫白元營魄君少隂金精太白之炁納化身中以生肺七魄處之金神七人從吏七千衆治其身榮衞筋骨主其牙齒治肺病魂狂呪白帝侍魄錬制隂邪兊文西炁吹符吞佩忌食苦七日辛三日即魄生肺安以立秋日受之吞時以竹膜四枚書若佩書紫素白帝符歌六甲抱金關七政守靈壇流鈴擲火化威劒巨龍幡懇彼素靈眞明憲孰敢干永制妖鬼魔澟落霄風寒沴炁旣巳息萬天俄而安眞儔荷大庇抵顙相歌歡黒帝通血符呪曰混沌元精玄象變通結炁洪濛眞元汗漫通徹三宫黒奕五帝控馭飛龍沖妙無質至道難終此符育得道之人使血脉通利一身榮盛黒帝乃太玄水帝也水在人身乃血也呪曰謹召腎爲玄宫桃康合精君太隂水精辰星之炁納化身中以生腎左玉童右玉女處之水神五人從吏五千人主持其中榮衞骨血主其生精治腎病血不足呪黒帝通血腎水清渟坎文北炁吞佩忌食酸五日炁盛血旺腎病安以立冬日受之若吞用竹膜一枚書若佩書青素上黒帝符歌無質統有物淵兮上帝心不啓不發道藴妙化機深恐爾漏未盡隂想勿浸淫輪轉無涯波苦道相迷尋萬年嘗謹約一旦自煙沉無沖落鬼境殃譴不可任黄帝中主符呪曰渾沈𡨋始萬範開張三天大有總制中土圎象黄宫帝祚無窮三陽發生逸䂊陽春此符衞中府制萬神若近取一身則肝藏魂肺藏魄絳宫丹田二炁交媾則赤炁下降玄泉上升心藏血腎藏精二炁反覆交相生養黄庭之中神意所在也呪曰謹召脾神爲黄庭常化靈君土精之炁納化身中以生脾處之土神一十二人領從吏萬二千衆精光神三萬六千毛竅神納靈萬炁長存百神混合内外蓊𡨋反胎復嬰上朝帝君治脾病忘魂失神肌瘦飲啄不寧呪黄帝中主萬神無越中文上炁吞佩忌食酸十二日甘五日即安炁盛脾病愈以土旺之日受之若吞則以竹膜五枚書之若佩黄書絳素上黄帝符歌萬天拱中宸控駕玉化根翹機貫億暦洞朗闢四門大有混皇眞糺制星宿魂非帝道不運有方頼之存威忿即霜秋和豫爲陽春生成握元紀仰荷戴無垠上清靈寳大法卷之六
