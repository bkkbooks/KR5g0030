front:
  text: 上清靈寳大法卷之五十四寫三
  hash: sha256:dc8815a7d7f5189d6a32feb7ac3ae5ffc5693b7241fa502893c7fe39b671304d
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5g0030_SJB_054-301151b, image: sjb/30/301151b.png}
body:
  text: 洞微髙士開光救苦眞人𡩋全眞授上清三洞弟子靈寳領教嗣師王契眞纂齋法宗㫖門指剖靈寳靈者𩔖乎陽也有形而無質與道合真成象於上在人則與人神黙契思化於心故曰靈也寶者𩔖乎隂也有形而有質化虚成實聚形於下在人則滋血成身凝精於腎故曰寳也所以物之生者不得不生盖感靈而生形形具而質成質成而神生出無入有也物之終者不得不終盖因寳散而質枯質枯而神離神離而形散出有而入無也至德真經曰人自生至終大化而有四嬰孩也少壯也老耄也死亡也其在嬰孩則炁專志一和之至物不傷焉德莫加焉其在少壯則血氣飄溢慾慮充起物所攻焉德故衰焉其在老耄則慾慮柔焉體將休焉物莫先焉雖未能保養嬰孩之全猶可方於少壯間也其在死亡也則之於息焉反其極焉是故生而因靈生寳終而因寳䘮靈此天地之常數且靈寳者在人之身故本經註云百神不散謂之靈一氣常存謂之寳若能守其神養其氣固其寳煉其靈耳至散之時形靈物外故曰神仙之道可以飛歩九霄爲玉帝之臣也和天安地保國寧家秘筌宗㫖曰靈寳大法上可以保天長存禳日月之失昏星宿之錯度下禳劫運刀兵水火陽九百六之灾治山川蚖蛇巨獸之恠大可以修真内煉骨肉同飛之道中有長生度世尸解之法小有昇濟存亡回尸起死之功明則嘯命風雷變化自然之靈幽則䇿使萬神徹視十天之文故曰聖人體之而常用百姓日用而不知叙𣲖宗㫖曰靈寳大法師授宗㫖集𣲖五劫開化之後上聖已成真仙口口相傳不形文字恐泄天機自招譴責所謂文書易見宗㫖難逢今世遇者皆宿有善功遂令遭遇故當保愛尊敬師𣲖盟真玉匱宗㫖曰授詞之日於靖内拜三十二天表毎日拜一天三十二日拜竟則爲之盟真玉匱者進謁四方三十二天竟則比金玉之盟匱者黄籙禁重罪考不原爲之玉匱如玉之匱寳惜守之天上三十六宗㫖曰混沌纔判玄炁生元是一生二二生始炁爲三炁清微天爲玄禹餘天爲元太赤天爲始一天生三天毎天生三炁爲九天清微天生欝單天禪善天須延天也禹餘天生兠術天不驕樂天應聲天也大赤天生梵輔天清明天無想天此是九天也九天各生三天共二十七天外除太皇黄曽天并無色界四天太虚太釋龍變太極四天共爲二十七天三清三天在九霄之上是爲天上三十六地下三十六宗㫖曰天有九天帝君地有九壘土皇君毎壘亦有三炁土水風各一重上下相次地一曰色潤地二曰色澤地三曰石脂色澤地四曰潤澤地五曰金粟澤地六曰金剛鐵澤地七曰水制澤地八曰大風澤地九曰洞淵無色綱維地九壘各生三炁以法地下三十六凡天上三十六陽炁爲三十六天君地下三十六隂炁爲三十六土皇君九壘之下三炁者風澤洞三炁也浩蕩頑空裏以風澤者元始梵風之炁剛於真金亦名剛風擎持九壘乃載諸天髙而洞浮垂而不落上接大羅盖道之故明三寳宗㫖曰靈寳大法中所尊太上無極大道三十六部尊經玄中大法師是名三寳出廣成齋科諸方奉行共一十七字即無異同近有妄行増易輒編入簡寂齋儀中此爲非也太上無極大道宗㫖曰無極大道一炁纔判元始天尊授大法付太上道君道君授之於後聖老君夫元始乃道君之師道君又老君之師老君下化流教於世是爲無極大道三十六部尊經宗㫖曰靈寳大法是爲三洞祖教自五劫開化之後玉清洞真上清洞玄太清洞神三洞四輔符籙皆因赤書玉字紀經呪而成之大洞三十九章明五劫開化混沌之體述和三炁歸一之法付玉晨道君次於諸天說靈寳三十六部尊經方成世書十方國土所在天宫皆有三十六部尊經真文寳篆世俗止言洞真十二部洞玄十二部洞神十二部三洞合爲三十六部殊不知各有標題洞真十二部上清經一部八千卷妙真經一部五百卷太一仙經一部八百卷妙林仙經一部八十卷開化經一部八千卷仙人𠈉經一部七千卷黄林先生經一部一萬八千卷太上真經一部一萬五千卷道教經一部一萬五千卷煉精經一部八萬八千卷功德經一部八萬四千卷道徳經一部五千卷洞玄十二部靈寳經一部八千卷元陽經一部百十二卷元辰經一部一十萬卷大劫經一部一萬卷開山經一部十萬卷諸天内音經一部十萬卷八煉生尸經一部十萬卷靈和心音經一部八萬卷消魔經一部八萬卷無量壽經一部八萬卷按摩經一部十萬卷道身經一部十萬卷洞神十二部太清經一部八千卷徹視經一部九萬卷集仙品經一部八萬卷洞淵神呪經一部入萬卷内祕經真一經集靈經中精經無量品經一部八萬卷黄老集宫經一部八萬卷黄庭經一部十萬卷小劫品經一部八萬卷玄中大法師宗㫖曰元始天尊立教之後至上皇元年五劫同啓五行全形五炁俱備化生諸真諸仙應五効之内化生玄中之精精中之玄皆是上皇故劫號五劫之中化生玄中大法師乃禀五炁之精英與天真皇人集雲成章龍胎石景億萬符書三部十條悉爲正文玄中大法師方始立教也明五方炁數東方九炁壬子木乃發生之時數至庚申九位陽神所聚南方三炁戊子火乃炎离之府數至庚寅三位陽神所聚西方七炁甲子金乃肅煞之時數至庚午七位陽神所聚北方五炁丙子水乃玄精之府數至庚辰五位陽神所聚中央一炁庚子土乃重辱之府數居一位陽神一炁所聚明十方大衍數東方九炁南方三炁西方七炁北方五炁中央十二炁除虚數土即下方也東南六炁西南二炁東北四炁西北八炁上方一炁下方一炁緫計八十五炁除天元一炁日月二炁地元一炁按華夏九九八十一陽數也明九炁分布宗㫖曰諸法只載五炁按五方五帝劫有九色圎象而不分剖出入變化法則不能通真召靈今以圖指𩔖五炁變九炁圖竊謂虚皇之教起於古初妙道開光神文降世或隨時而化現或因事以付傳中古以還典章浩慱至晋宋間而簡寂先生陸君始明授受降世之源别三洞四輔之目攷詳衆典撰次齋儀自是遐邇宣行齋法昭布條陳經誥次序力成洎唐則張清部萬福復加編集典式漸詳中䈎以後廣成先生杜君光庭於是緫稽三十六部之經詮旁及古今之典籍極力編校齋法大成然其一字一法由始及终莫非出於經典所是古科二十四品之齋廣成之論謂黄籙兼緫死生人天同福上至邦國下及庻人皆得修奉𨽻於下元中宫統攝萬靈並關九府功徳深重利佑存亡於是撰集齋科四十卷號曰黄籙齋科然則壇壝典儀朝修俯仰莫不古今一途而其科文嚴整典式條暢發明古則昭示方來齋法至此不可有加矣其科中第一卷叙壇官則曰法師當佩三洞之籙章其次則佩洞玄籙者可以行事盖齋法出於靈寳屬洞玄部也自告齋始事以至醮謝散壇則廣成科中無不備具自後世世紛紜齋科雖叅三洞之衆經而多出於洞玄之十二部若奉行齋事符書呪訣關奏文移在科不載自唐以後則緫于靈寳大法而法之本文又主以度人上品之一卷是謂上清靈寳大法雖至徑簡而藴典難窮經曰星宿錯度日月失昏亦當修齋行香謂經國主有災兵革四興亦當修齋行香誦經疫毒流行兆民死傷亦當修齋行香誦經師友命過亦常修齋行香誦經今廣成科中爲國消灾爲民祈福㧞濟師友普度幽䰟請福三元關陞九祖皆曰黄籙悉有科儀齋法出於靈寳故所集來歷則關渉經典甚衆而行齋符法合在此書靈寳古法自奉持戒律深明本經服炁存神收光内煉然後救世拯物輔正除邪建德立功濟幽度殁至此則齋法當行是充其所藴以友天下者也亦施用之次序也廣成立科以黄籙爲重靈寳舊法亦皆黄籙科品云玄師曰開度七祖救㧞三塗黄籙大齋最爲第一應欲開度先承齋土投詞便審其人孝慈忠直誠實懇切皈依信向在於科法堪爲宣行方可領詞許其修奉示以齋中法信合需儀物令預營辦不致臨用缺典次擇吉地建壇要在洞天福地名山靖廬玄壇宫觀清淨宅舍不經兵陣戰場屠坊刑獄生産血厭塜墓坊圈穢惡之地乃爲吉地也次卜日告齋要值三元八節五臘十直三會等日若專度玄祖要得亡者七七百日大祥小祥逺忌生日相合乃爲良日若普度之時要得庚申甲子四始十直天恩天赦上吉之日與節臘元㑹同合乃爲吉日獨遇其日不可開建也告齋爲立意之初致詞通逹三元自吉日爲始也齋主携法信投狀諸師門拜請法師師受狀畢引齋主詣道前恭𤑔信香以啓奏有文既承投詞嚴命同學同志之士同學者謂上道同壇同師之友也同志者謂同志性普爲幽明者也苟非其人和氣不生有墮功果自告齋之日師與齋官弟子同學同志入靖對齋不交外事或百日或九十日或七十日或四十九日或三十二日亦可冥心一意專以開度爲念量所度亡䰟多寡修文備事廣狹爲則悉令具足母使扣期有缺擇日建立玄壇壇心設三寳位上施帳座寳盖中安神經内壇設十方香案旛花燈纂鋪置如法有圖壇前左右分立六幕有式中置九幽神燈或天門上壇外四圍依法然燈有圖壇之東南鋪廻耀輪燈有圖壇之東北鋪九獄燈有圖壇後正面鋪置道塲列上帝御座於中兩旁分班列左右序聖位香花几案如法於道場前左别設正一三師之位壇之東南設受度堂遥對壇所即齋主九玄七祖之位又於壇前左右分立十二堂陛分司治事凡未開啓齋壇之前進拜章書並於道場内行事壇前向外立土地里域當境承差官將監壇正神位前期三十二日或二十四日或十四日隨所度亡䰟多寡爲則預告上穹進拜通天救苦朱表立青華救苦之堂宣行九龍符命立青玄寳幢有式修禮告盟三清四帝東極五師三官天樞院三界十天五嶽九州九地十道北都冥曹城隍太歳里社神司等處關召功曹直符上地依式關發之次進拜素車白馬章立告監旛啓聞穹厚有式闢一處爲誦經堂集同學同志齋沐身心逐日精專修誦靈寳諸經如度人上品生神寳章金籙度命得道救苦諸經禮誦朝天九幽諸品懴法持念甘露神呪玉皇青玄十方諸尊睿號以多爲功印造焚化功力有限也前期十日或七日三日亦可量事爲之正奏九清上帝東南二極九幽朱陵洞淵真王十方五老諸天尊天帝九霄三十二天木公金毋申日宫九曜南北東西中五斗三官四聖五師監齋正一三師三省五府南北二院南昌上宫九天天曹諸真天真皇人飛天神王十極真人符法經籙真仙五嶽四瀆水府酆都地府九江九壘洞天仙官太歳尊神牒某府州縣城隍當境正神諸道諸獄九州社令蒿里相公水陸關津五方境界冥關幽路五道大神酆都嶽瀆地府諸案典吏監壇正神帖本司官將劄司命土地但干去處一一周備仍申都水監雷霆真宰牒太歳神王風雨龍神城隍里社山林孟長溪真及屬嶽之司一方洞府福地諸天仙曹等處各請差神兵衛護齋壇斥逐不祥乆晴防止風雨隂雨尅日借晴仍選委當境正神直壇防非止惡監盟齋事呵禁非道之徒次詣神虎堂關召神虎官將法部吏兵建隂陽二壇八門壇關發玉札并係薦亡䰟甲狀關二聖玉女三部使者二獄使者攝召官典賫持玉札預詣地水職司根㝷所薦亡䰟赴壇現踪報應伺領齋修有式讃立遷神回耀等旛有式關奏巳訖次第書篆開度符籙前期七日或五日四日三日於道場内拜奏啓告玄穹解穢寳章有儀以次排日進拜酆都赦罪章宣告酆都赦罪誥元始符命誥敕赦或救苦符㧞幽䰟符等祝龍有式接續進拜開通道路寳章宣告玉皇寳誥敕制地祇誥行開通五路法釋放亡䰟齋事扣期進拜沐浴煉度寳章前期二日一日集衆官登壇演習威儀建齋之日臨午聲鐘壇官齋官威儀執事祗請法師集靖默堂議定職次僉書職狀依班序立法師就坐齋主九禮三復長跪三致詞三請求師登壇有文師允請賛引法師陞髙座祝香敷座啓盟有文次下座書結盟狀知職榜威儀引導出堂至壇外地户上敕水淨壇法師率衆官各持枝水誦天地呪以次旋遶陞壇洒淨畢依法禁壇有儀先以請光符請太陽火㸃元始前燭自始至終常以燭續之不可暫滅次於壇前立六幕自玄師幕至五帝幕天師幕三師幕三官幕監齋幕並各請聖㸃酌宣表牋䟽讀結盟狀進錢馬一就焚燎以次建立諸司堂陛有文畢回靖少息以次詣冥官堂設十王供有儀讃十王儀有儀至落景法師陞壇分燈有文侍燈依式然燈令内外周遍退靖次如前具威儀祗請法師陞壇宿啓賛引出堂叅謁六幕先五帝次三師監齋三官天師次玄師幕衆官分班序立齋官上香捧詞函自述齋意授與法師師受詞告齋呤賛導引至都門外兩班序立壇下法師上香啓白有文侍經宣啓壇䟽焚燎壇外鳴金鐘玉磬有儀法師跪奏捲簾有文拜通真表依法陞壇至地戸外宻呪入戸衆官隨之入中壇依序分立法師獨陞内壇上香行事依科宿啓敷露真文宣靈官䟽或拜建壇詞說戒𥙷職宣禁回幕㕘謝紏過依法禮燈有儀宣童子救苦儀祝告九陽符懴九巵九壘神燈有儀召靈沐浴朝禮呪食有文宣十念懴悔儀有儀第一日正齋行道㕘謁六幕依科三時行道六度行香十遍轉經毎朝引靈至壇下叅朝三寳懴謝罪愆發爐出官引䰟至壇大謝畢引靈復位靜夜於上帝前請䇿杖符誥有文至九獄燈前宣告破地獄真符依科懴燈有儀發符持杖破獄或初夜爲之尤妙禮九幽神燈有儀至廻耀燈前告㧞幽䰟真符懴燈破獄有儀或初夜未行召䰟等事當於正齋之夜行之第二日正齋依科三時行道如第一日之儀是夜至酆都燈前告青玄破酆都符依科懴燈有儀普召九泉六道孤䰟全形生育沐浴更衣朝禮有文引至茭郭設無碍夜齋有儀解𡨚釋結傳符施戒有儀或即行煉度有儀或引歸聚䰟堂伺煉化亡䰟一併行事亦可焚燎茭郭第三日正齋行道依科三朝如第二日之儀或於晚朝拜行道祈恩青詞朝退陞壇進拜遷㧞昇度亡靈寳章告歷關諸天誥關三十二天燈有儀靜夜宣行煉度變煉亡䰟各有科法傳授九真妙戒告行長生靈符給登真度命誥披黄受道誥南昌籙長生黄籙誥劵等祝龍破劵讀功德䟽牒斬滅三尸飛度五戸有儀祝流火亭有儀度上法橋有文牒天門守禦諸神保舉亡靈上登朱府送靈焚簡焚燎經財茭郭草龍童子等宣放生儀有儀第四日侵晨關發設醮請狀按古科不必行此奏三寳上帝申三官大帝剋日分投龍簡有儀依式次第陞壇起五方真文拜言功謝過表解壇散席下榜瘗土簡投龍至夜就道場中設醮依科行事拜謝恩青詞進奉車輦錢馬功德都䟽表狀送聖出壇散六幕宣謝表次至玄師前禮謝宣散壇謝玄表還戒納職送師徹幕申東嶽等處回兵牒城隍監壇回祠出給照劄付功曹土地等依格推功散諸司堂陛畢焚燎輦馬之𩔖法師衆官回靖送師禮謝弟子拜謝交賀禮成尅日詣洞天靈泉投龍進簡有儀功圓果滿三官保舉五帝奏名諸天稱慶功周幽顯進品仙階按古科設醮只於拜表言功宣簡之後便降聖設醮送聖出壇下榜送師徹幕還戒約職罷散諸司前後解壇散席如此科式不可超越或五晝夜七晝夜九晝夜十四晝夜至四十九晝夜小則三晝夜皆須委曲依詳序次第關行但古今規格多有不同以致無所按據今攷齋法㫖趣推其正理分布節奏逐一開陳中間不違古格以義取之所當遵行倘乖節次不惟有干典憲冥曹亦須𥨸笑三官鼔筆四司紏察徒爾施設勞而無功矣且五老本行具說三見黄籙尚且不墮地獄而况親行大教普濟幽明不滿十數天上地下三界仙人神鬼飛走甲介皆子之恩徳所及魔王敬伏保舉上帝稱慶歡恱三官言功五帝列言祖師錫皇飛符金闕降丹華雲軿㧞七祖於北宫度九玄於死籙一身骨肉仙化神形俱登妙道吞餌金丹佩服仙劵千乘萬騎白日登昇三天隨其功業授𥙷真階或爲上清真人之位或登玉清仙翁之名或爲太極左卿方始洞明普救無間功徳之所致也子宜勉之竭志奉行明十王童子二科按業報經云人之始受胎一月爲胞一陽神降生一䰟二月爲胎二陽神降爲二䰟三月三陽神降爲三䰟三䰟始全七月生七𩲸九月神布炁滿聲尚神具降誕分形爲人生時陽數曰九九死隂數曰七七七盡則七𩲸俱離身形上詣天曹言人罪福百日乃隂陽之數極一䰟去名曰卒哭周祥三百六十日神炁更運二䰟去二年七百二十日神炁交周轉輪三䰟去名曰大祥則隂陽之神七百二十日離尸去此乃按七十二數隂陽三十六也今人只以歌聲美麗殊不知出何文有何功德童子儀十段十王儀有十宫甚矣法曰七七百日小祥大祥當求哀懺悔贖亡者之愆非消生前之罪咎作諸功德廣度六道四生回兹功德之力焚燒黒簿超生人世煉形行持夫欲入靖朝元臨壇行事飛神謁帝拜哀上章煉度亡䰟等事然凡俗之質一身沈穢萬神昏昧未能去除焉能通感上玄升濟幽冥無功及物也當知法先煉化自形然後方可施用庶得朝謁召役觸事皆通斯可開泰幽途㧞度亡爽也此法或三元八節四季庚申甲子本命晦朔及登壇行事或入穢所皆可修用宗㫖曰煉形之法入靖焚香端坐凝神叩齒三十六通平炁想自身爲枯木内有五臓六腑大小腸全以双手玉文午上剔出發四山火并風想火光如紅絲從心出燒枯木及所居之處一切物件次鼻出炁如風吹散灰塵次想大水飄去諸般皆無所有次存五方五色真炁漸漸降入玄谷自小至大炁聚結成嬰兒内有五臓六腑洞明漸長如真人服色端嚴左日右月去兩眼角照雙目光明運肝中青龍自左耳出左肺中白虎自右耳出右心中朱雀自口岀前䁂中玄武自兩足出後並羅列左右分明斗口罩頭斗柄指地次以舌左轉九次咽津一口存如紅丹入腹中於大椎骨出項上發九色之光罩頭上再搯中文運十二宫即開目興身臨壇行事𤑔香夫香者非木也乃太真天香八種曰道香德香無爲香自然香清淨香妙洞真香靈寳慧香超三界香也道香者心香清香也德香者神也無爲者意也清淨者身也兆以心神意身一志不散俯仰上存必逹上清也洗身無塵他慮澄清曰自然者神不散亂以意役神心專精事穹蒼如近君凡身不犯穢四香合和以歸圓象何慮祈福不應妙洞者運神朝奏三天金闕也靈寳慧者心定神全存念感格三界萬靈臨軒即是超三界外存神玉京運神㑹道不可闕一即招八方正真生炁靈寳慧光即此道也以應前四福應於一身以香𤑔火者道德無爲之純誠也以火𤑔火者誠發於心也願通炎上之烟用降真靈之格兆凡於𤑔香之初有香符一十五道隨事用之各有呪訣請降諸真符誥宗㫖曰凡欲頒行應干符誥既係凡手書篆須當請降然後方可宣行請降之法先以符命置上帝案前兆上香三拜跪奏雙手發十天訣於天庭之上再發玉清訣微叩齒七通運雙目日月之光髙奔天庭之上輪照兆身運日月光中有元始虚皇在内一如圎光再發雙目毫光與日月之光交合了次具位朝奏元始力陳齋悃乞開紫陽玉笈宣降某符付臣宣行或開破幽獄或煉亡䰟或追取或焚變如意祝之至謹言了宻呪三遍不可岀聲請降虚無祕呪髙上大有玉清萬神雲光寳篆普降帝庭急急如元始上帝命存上帝放百色毫光一條注於寳篆之穿透如雲篆霞綵流金之狀洞煥上百再發十天訣取止炁布于上剔玉清訣以目瞻一炁吸前日月光中至尊徑歸巳形合而爲一方叩齒三通咽液一口付左右宣告而行祝遣呪普告三界無極神郷泉曲之府北都羅酆三官九署十二河源上解祖考億劫種親疾除罪簿落滅惡根不得拘留逼合鬼群元始符命時刻昇遷此都寒池部衛形䰟制魔保舉度品南宫死䰟受煉仙化成人生身受度劫劫長存隨劫輪轉與天齊年永度三塗五苦八難超凌三界逍遥上清預告科曰凡建大齋受齋主之詞名爲立誓投誠捨金贖亡者之罪求哀㧞度兆受詞入靖室修寫通天救苦表依式飛神朝謁預祈恩霈開泰停酸次立青華救苦堂颺青玄告盟寳旛告九龍符命九道赦九州分野焚開壇䟽掛門迎大榜發預告文檄申飛龍騎吏虚空鑒察應感靈司此爲通天救苦預告十方停囚罷對如陽間停决拜通天救苦表宣九龍符命祝遣呪普告三界無極神郷泉曲之府北都羅酆三官九署十二河源上解祖考億劫種親疾除罪簿落滅惡根不得拘留逼合鬼群元始符命時刻昇遷北都寒池部衛形䰟制魔保舉度品南宫死䰟受煉仙化成人生身受度劫劫長存隨劫輪轉與天齊年永度三塗五苦八難超凌三界逍遥上清玉訣東炁列火焚之祝九龍使者持符行申發預奏敷謄齋悃上御三天啓聞穹厚關盟三界普告十方預祈敕命頒宣九夜開泰冥關停囚罷對發奏召役呪訣存用發遣並同正奏用拜素車白馬章宣普告三界誥祝遣呪普告三界無極神卿泉曲之府北都羅酆三官九署十二河源上解祖考億劫種親疾除罪簿落滅惡根不得拘留逼合鬼群元始符命時刻昇遷北都寒池部衛形䰟制魔保舉度品南宫死䰟受煉仙化成人生身受度劫劫長存隨劫輪轉與天齊年永度三塗五苦八難超凌三界逍遥上清立告盟旛法曰青玄寳旛以青絹造書大九龍符作旛脚九條周回八條中央一條各書九龍符命一道湊成寳幢按九州分野依式讃立旛内捲錢果撒颺十方以凡人眼目恐見天真泄慢禁重也宗㫖曰發預告畢兆面天門上香存天門有素車白馬千乗萬騎十方各有天真大神大將軍浮空而來鑒觀修奉面天門口奏依式颺旛化建壇立旛之所爲太溟水府之宫淨瑩無翳上結寳盖如芝幢日月流光照透水府内化一大旌幢四畔靈風鼔蕩直接盖上存一似蓮花于水之中芬馥无盡上有金光祥雲梵炁周回首脚花旛風散十方如細雨宻霧青玄上帝居盖之下乎持枝水隨旛洒布作法雨祥雲升接隂䰟並赴旛下以伺開壇朝禮上帝受化更生朝奏宗㫖曰兆自預告之後繼行朝奏三天金闕祈恩請命伏闕待㫖先運真神化四方以目瞻顧玉相移刻見玉童君二人持幢執節捧耀日寳珠毫光閃爍遥射兆身玉晨至尊放眉毫口鼻寳光與明珠之光合而爲一兆以目鼻微引此光至兆面前其童君執珠如日輪照洞煥無碍寳珠一炁分班須㬰移入兆形宛如流金之狀兆瞻禮玉晨再拜退闕其玉女童君駕日與兆身同升寳珠金光作圎象輪轉煥照四方上下悉皆洞明直入泉扃溟漠之境皆如晝皎獄中鬼官稽首加額朝禮皈依至尊歡顔怡悅此光照開幽獄一切罪䰟並得停囚釋對隂䰟皆脫囚苦次玉女持幢節駕寳珠圎光内外洞朗旌幢一轉於光輪之上法雨慈雲沾洒幽牢並爲光彩之透徹表裏悉爲蓮境普得升濟微光盡及兆身依法納真出戸是夜入睡之時便化卧床爲琅輿運兆身卧在雲霧日月星斗之中光彩燦然合映兆身存巳形如青玄上帝坐九頭獅子之上左執琉璃淨鍾右執空青寳枝沾洒十方異香從耳目鼻口流布無極世界念彼幽𡨋並皆欣悅垂洒垂升此爲預告精思開泰停酸之道拜酆都開業道章宣赦元始符命誥元始符命時刻昇遷北都寒池部衛形䰟制魔保舉度品南宫死䰟受煉仙化成人生身受度劫劫長存隨劫輪轉與天齊年永度三塗五苦八難超淩三界逍遥上清酆都㧞贖誥太上開明元始監真五老上帝赤書玉文㧞贖一切宿對罪根皆䝉解脫考掠休停䰟升九天𩲸度朱陵今日上吉萬神咸聽龍負白簡開盟𡨋靈乞如所願風火驛傳祝龍拜開通道路章宣玉皇寳誥太上彌羅無上天妙有玄真境渺渺紫金闕太微玉清宫無極無上聖廓落法光明寂寂浩無宗玄範緫十方湛寂真常道恢漠大神通玉皇大天尊玄穹髙上帝敕制地祇誥敕制地祇侍衛送迎㧞出地戸五苦八難七祖昇遷永離鬼官䰟度朱陵受煉更生是謂無量普度無窮開通五路法以泥座五箇挿白旛五首以竹枝掛挿泥座上旛身書開通道路天尊按五方燈壇内安登壇别載宗㫖曰兆面天門三禮㸃開通道路燈逐方持旛吟偈以䇿杖或劒劃開五路先自東起面東丁立想太一使者五帝直符布生炁入東門以䇿杖劃開東方路次南西北中皆如此此是開通道路釋放亡䰟上清靈寳大法卷之五十四
