front:
  text: 上清靈寳大法卷之四十七圖五
  hash: sha256:cfc1efa6a56aeca3d5875ae07e4660c5b6767ea0a92c028ce747e9243de3c43f
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5g0030_SJB_047-301084a, image: sjb/30/301084a.png}
body:
  text: 洞微髙士開光救苦眞人𡩋全眞授上淸三洞弟子靈寳領教嗣師王契眞纂齋法符篆門進簡投龍章師曰夫元始安鎭敷落五篇故五老上帝受赤書眞文安天之根鎭地之源下鎭五嶽以奠五方斯實靈寳之根宗度人之樞紐上學之士希道求仙傳中盟之經佩靈寳之籙皆以赤書眞文於槿木之簡面寫告文投之山川及住宅關盟三界削落罪根及於五嶽投龍進簡滅過消愆乃其本㫖也事見玉字眞文諸經中科曰凡建黄籙大齋解壇事畢則用山土水簡以金龍金鈕玉璧附之所以紀勒齋功關告三元也其法實本於五老之赤書自唐張承先法師編敘齋科巳詳言之矣至杜廣成編集黄籙齋科則備述赤書之本未投簡之典格可謂坦然明白無可疑者近世有於三簡各篆一符且各人所傳符形異同豈知投蕳本意舍赤書其可行之乎今姑述三簡之呪開明其略且山簡呪有曰玄上開明元始監眞上帝五老敕書丹文天地本始總領三元水簡呪有曰元始五老上帝髙尊十方至眞太華靈仙赤文告命無幽不聞土簡呪有曰天地開張九炁分靈三元洞府十方朗清五老上帝開眞領生丹書赤文元始上清再詳三呪之㫖皆明指五老赤書也若易以他符則與本㫖大相違背又呪文全不相合可不稽考也今依經㫖於簡後用五老赤書玉字篆之以義取之用爲投簡之信此乃出於正經却非後世私師之比倘所傳各有宗𣲖而此格决不可易況投簡正渉三官之府罪福所係尤宜審思之所有赤書玉字巳具鎭禳攝制門今恐檢閱不便遂就中間摘取合用再具于左未免有重復之兼其有三符雖不當用亦俾存之以伺上學者之所證驗云設曰簡者記也紀世之功告盟上眞上下正方各長一尺二寸闊二寸四分厚二分國家以玉爲之蓋玉有九德禮天地之信也以下皆以槿木或栢木爲之丹界五行丹書國號年辰建齋之所及髙功姓名投於名山大洞靈泉龍穴及埋齋壇之中告天地水三官使著明齋事奏于上境也毎簡輔以金龍各一條龍者使負簡謄信於三官府也毎簡又各輔玉璧一枚故山簡月蒼璧圓形虚其中土簡用黄璧方形虚其中水簡用玄璧六出形虚其中並徑二寸半又以金鈕二十七枚各徑九分圓其外如環之形毎一簡用九鈕同龍璧並以青縣纏之青絲以代割髪金鈕以代㰱血上告三官也濟生度死修眞學道皆一理耳但易其文與呪當細詳而行之無誤幽明矣山簡正面告文本貫某州某縣某郷某里齋主某奉爲亡某於某處修建黄籙大齋幾晝夜滿散祗設清醮幾分位仰答恩光齋壇解散㳟依法式謹詣某洞天靈山投送金龍玉簡伏願天官賜福地府除愆酆山削罪幽獄停𡨚注名朱府運度自然見存得道徃逝生天繒璧效信金龍驛傳一如告命太歳年月日於某山洞府告下法位臣姓某承誥奉行背書東方赤書二十四字土簡正面告文本貫某州某縣某郷某里齋主某奉爲亡某於某處修建黃籙大齋幾晝夜滿散祗設清醮幾分位仰答恩光齋壇解散恭依法式謹就黃籙齋壇投送金龍玉簡伏願地官赦罪罷對羅酆刀山斷刄劒𣗳摧鋒中黃戊巳上奏蒼穹有情衆𩔖普度南宫見存得道億劫無終效信繒璧傳驛金龍一如告命太歳年月日於某處靈壇土府告下法位臣姓某承誥奉行背書中央赤書四十字水簡正面告文本貫某州某縣某郷某里齋主某奉爲亡某於某處修建黃籙大齋幾晝夜滿散祗設清醮幾分位仰答恩光齋壇解散恭依法式謹詣某靈淵投送金龍玉簡伏願水官解厄告命重泉五湖四海十二河源疾除罪簿息苦停𡨚亡魂受煉超度南天功加一勿注籍金篇繒璧效信金龍驛傳一如告命太歳年月日於某處靈泉水府告下法位臣姓某承誥奉行背書北方赤書二十四字告文變用式若學土佩受中盟求仙削除告文臣以某年某月某日謹詣三洞法師某受靈寳五老眞文赤書靈篇三部八景諸天内音神仙二籙八威䇿文五帝符杖中盟衆經傳授事畢山簡云投簡靈山水簡云投龍清泉土簡云投簡中宫金龍驛傳乞削罪籍若爲國家士庶建功告文今謹有某人上爲家國下及存亡請福祈恩首愆謝罪修建黃籙大齋若修眞之士於三元八節謝罪祈禎投赤書簡文岀眞文玉訣山簡吿文法位姓某年月日本命屬某帝名係某嶽願神願仙長生度世飛行上清五嶽眞人至神至靈乞削落罪籍上名九天謹詣靈山金龍驛傳土簡告文同前法位某願神願仙長生度世飛行上清中皇九地戊已黃神土府五帝乞削落罪録勒名太玄謹詣中宫投簡記名金鈕自信金龍驛傳水簡告文同前法位某願神願仙長生不死三元同存九帝水府十二河源江河淮濟溟冷大神乞削落罪籍記名丹篇謹詣水府金龍驛傳右三簡並如前法第一次毎簡用金鈕九枚第二三次只用龍不用鈕也外有道士投簡節度詳見鎭禳攝制門山簡符太上三天天帝玉眞三光鑑映威制山靈五帝回運仙道常興眞炁貫浩山嶽藏煙土簡符太上三晨大羅居中九地坤載土府呈祥萬神朝合永祚綿昌水簡符太上三元敕制水源九江四瀆河伯育祥天河回運削罪九玄上清四季投簡眞符春夏秋冬昇度契勘門師曰亡魂受煉旣畢當出給誥籙符劵與之收執前去所司呈驗合同以憑注生由世之誥敕憑據耳若無此則經由所至拘阻難遂超昇矣太乙救生救死救苦超度朱陵眞符法曰凡書此符先面東焚香三拜跪奏存太乙乘五色九頭獅子金光閃爍口吐青玄之炁心存九拜啓奏訖搯玉訣敕筆呪曰元始玉帝敷法至靈道法施惠授符超生如有愆罪急以除分汝現玉言萬神咸聽祝了取天門炁入筆次搯卯文念太乙號八十一聲取太乙口中炁入紙筆又呪曰奉太乙救苦天尊敕行亦念八十一遍取炁入筆又念八十一聲取青玄炁隨炁下筆書之元始符命開度死魂元皇大範度命朱陵靈符技度昇入金門上開八門金光散暉救度苦爽飛昇紫庭玄炁開度飛度五户無苦聲昇玉清南昌上相玉宸元皇敕救㧞死魂上生朱陵祝呪三天大羅髙上玉清元始靈書太上眞文玄元大道敕降玉晨天洞天眞主領魂神九幽主者六洞眞靈禀受眞符拔度幽魂天王律令隂曹速行急急如律令至聖神人巳成天眞三皇之裔太上之孫億曽萬祖苦爽幽魂天尊大法十轉回靈赤書成章告下泉冥玉文一下摧毀鐵城符光洞煥赫奕重隂刀化寳𣗳劔變騫林炎火生蓮冰消雪扄三塗五苦八難超陵魔王隂官稽首送迎玉清元命一如奉行急急如元始上帝敕右法玉訣東炁告文天尊救苦仙道貴生上開八門飛天法輪普受開度死魂生身上清丹霞炎光世界朱明國土重陽宫中朝謁天君超度朱陵流火神庭火煉池申火膏冶煉蕩除塵垢受化更生紅蓮花上得成初學天人一如告命太歳年月日時告下法位臣姓某承誥奉行太乙救生救死救苦度厄天尊青玄上帝盟眞玉匱度魂韓君眞籙唵吒唎吽韓君司馬南昌丈人度命起死速消惡垢緫監上天生神毓質超度三天右給付亡過某魂執此籙命永爲身寳所注生處永爲證據者奉上清北極大帝敕九幽赦罪超生金籙无上虚寳籙降超度窮皇敕泉扄劫魂速生朱陵府太上弘慈悲濟生度死輪日月左右照下入開光門罪魂並停酸金籙度苦魂幽魂離浪津右籙奉敕亡過某靈魂執此隨願徃生准祖師上清北極大帝敕太乙玉帝托生籙靈寳大法司今月日奉玄誥託生寳籙給付拔度久滯幽隂不得託化沉魂乗此符命者青玄救苦拔度重隂慧光所至廓照寒扄過度三界金龍負驛四天昇入無形風火無停門王接魂上生右託生寳籙超度託化人間天上隨業受生一如告命太歳年月日時告下法位臣姓某承誥奉行玉清合同昇天大劵師曰三皇内文有昇天版劵得道飛昇之時天尊遣侍眞賜劵使骨肉同飛過度天門下世不許僣行此乃三天合同玉清寳劵上帝靈命玉皇眞文給賜生身學士朝元謁眞者拔度死魂煉魄南官使無拘天門也法以青紙一方拈成四門面用丹書劵文背書告文年辰法位共作五行以絳囊盛之繫以青練若學士心映當掛心前如度亡給化與天門吏曲度者須於蒭身三天三寳陽日合并虚元玄都結炁成天南宫陶鑄北府消愆謹敕三部使者召制魂英佩負法身得度真元昇虚入妙證道无爲亡魂告文敕制地祇侍衞止受煉更生過度天門執送南宫生身告文某人今日欣慶受度止無拘天門玉清符命昇度道境一如奉行太歲年月日時告下法位臣姓某承誥奉行太隂煉化昇天大劵日月合光天帝梵陽眞陽開化隂煉魂强公子輔黄寧總録具形神頭帶九芒身佩珠纓眞度命明道回輪九陽眞精煉魂登晨告文今日大慶告盟三十二天三十二帝受度亡過某等消滅三十六結根三十九死户惡根斬絶尸累積滯煉化昇仙三界保舉五帝司迎上詣天門無令阻遏急急如上清靈寳大法律令太歳年月日時於齋壇内給法位臣姓某告行南昌昇天寳劵散形呪元精育飬灌煉元根魂神澄正萬炁長存不經苦惱身有光明急急如律令達朗視坡覩基化正宣天玄紀法主帝變津宜背符祝符呪元始祖炁苦爽幽魂皆即受度上昇朱宫急急如律令告文靈寳大法司當司某今則齋事告圓煉度巳畢所薦亡某旣得生尸成質合行昇度南宫須至出給昇天寳劵收執照據者敕制地祇侍衞送迎亡某等拔出地戸五苦八難止更生過度天門敕送南宫急急如上清靈寳大法律令太歳年月日時於齋壇内給法位臣姓某告行外封式昇天寳劵付亡過某佩服超昇上朝帝庭急急如上清靈寳大法律令具位臣某謹封此劵乃帝君敕拔度上世亡魂不可缺也右三劵並朱書用青纸角封長七寸闊三寸二分以絳囊盛之付亡魂收執生天昇天四保舉符元始符命保舉狀泰玄都省謹奉道㫖爲齋主某修建黃籙大齋昇度亡某等魂超昇丹界謹按靈寳本科合行保舉者右元始符命止逍遥上清一如告命太歳年月曰時告下法位臣姓某承誥奉行三天大法主正一天師歷關諸天保舉狀泰玄都省謹奉道㫖同前右歷闗諸天請滅亡過某三惡斬絶無拘天門一如告命普告三界保舉狀泰玄都省謹奉道㫖右普告三界止河源上解亡某等及祖考億劫不得拘留時刻昇遷一如告命右四符並朱書於保舉狀之前四狀並髙一尺二寸但歷關諸天一幅用碧紙其餘皆用黃纸墨書連四狀以黃紙作大可漏併封之敕制地祇保舉狀泰玄都省謹奉道㫖右敕制地祇侍衞送迎亡過某等拔出地戸永離鬼官魂度朱陵受煉更生一如告命太歳年月日時告下法位臣姓某承誥奉行外封式昇天保舉文狀昇度亡過某等魂具位姓某謹封右式前四符用青白二繒朱書貼於四鎭合同告下其元始符命係付亡魂收執合同四鎭合同劵又名金文玉劵師曰此劵乃天眞皇人授於太玄眞君次傳太極左仙公後青牛封君以傳鮑南海下世始有之用當如法四鎭合同以東一分黃素朱書付天門吏焚於天門南一分朱書白璧投名山福地巖穴洞天之中西一分青繒朱書付亡魂收執北一分刋於金魚之背投水中三官合契三元合同並書刋齋意及亡魂爲首者之姓名其義蓋欲亡者所詣合同隨品受化也又曰以黃紙一幅朱書却取角分作四片貼四保舉符告下以東一分貼元始符命南一分貼普告三界西一分貼歷關諸天北一分貼敕制地祇若誥丈只隨保舉狀式四符外却以青素作可漏封函以朱題之依法施用四函題式東元始符命時刻昇遷具位姓某謹重封南四鎭合同劵同前普告三界同前西四鎭合同劵歷關諸天同前北四鎭合同劵敕制地祇同前上清靈寳大法卷之四十七
