front:
  text: 上清靈寳大法卷之二十一觀六
  hash: sha256:62cc0cd5a36b26e288efd47b762d36c53a8ddb1b20a8e137ab94581cd90ef30d
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5g0030_SJB_021-300844b, image: sjb/30/300844b.png}
body:
  text: 洞微髙士開光救苦真人𡩋全真授上清三洞弟子靈寳領教嗣師王契真簊經句符書門靈寳經句主符命有重前者各隨冝用靈寳太章右符利見大人去三尸十回度人右符廷年生貴子離合自然右符成萬事和五藏化生諸天右符焚棺中絶尸勞元始祖劫右符鎮絶傳尸是爲天根右符書石上百獸不居開明三景右符乆吞服能悟道上無復祖右符治病安宅神五文開廟肝安五藏順五行鬰羅蕭臺右符山勢險住宅弊鐡板鎮山根普植神靈右符破廟遣伏尸三華離便右符治病口生肌清炁玉山玉京右符治頭風得仙長生之君右符取地户尸蟲取三家井水申時服大有妙庭右符令人悟道治嵐碎水箭金闕玉房右符吞服生貴子森羅淨霐右符燒水中洗目能明度人不死右符去三尸九蟲用三家井水午時服度世司馬右符取蟲乳香柳枝湯酉時服韓君丈人右符取飛尸蟲降真湯子時下司命司録右符落死劫罪韓司主録右符乆佩生貴子度世尊神右符祐宅護身大吉監生大神右符下死胎一日前先服換女成男廻骸起死右符起乆病下死胎乳香湯下執符杞籍右符利見大人求官遂飛天至真右符佩服能仙清心換骨諸天承相右符驅瘟伏魔安心南昌上宫右符佩帯却惡星無極神郷右符治水恠引水鐵板書安地中仙化成人右符佩服變形神皇曾鬰繿右符治肝病伏水恠玉完那田右符鎮宅祛土瘟利人何童元育右符鎮宅祛上瘟利人却夣除伏尸平育内鮮右符治小兒夜啼祛客文舉醜法右符聰明延壽摩夷懀延右符治山林興灾禍鬼禁越衡正定右符鎮墓乾方山林秀亡人安梓木朱書濛翳九昌右符鎮墓子孫貴梓木和陽上真右符治心病火灾恭華醜音右符治司命爲灾宗飄重光右符却刀化塵皇笳妙辯右符佩帯勝敵堂曜婁生右符鎮百毒人宅端靖羅千右符鎮宅八方恭慶菩提右符梓木朱書鎮墓治子孫詞訟水火厄極瑶无延右符鎮墓坤方令子孫盛夀命長去傳尸孔昇定光右符治肺病解訟皇崖阿貪右符治飛尸保命延年極風真童右符鎮刀兵鬼崇孝芒薩羅右符鎮伏尸浮容閔巴右符除自傷鬼江由𣑽光右符除附物鬼揲阮勃監右符鎮墓乾方梓木書祛奴婢牛羊灰曇誓飄隆右符鎮墓兊方梓木書治女人剛強奴婢失上下滛亂霄度覺昏右符治腎病伏盗賊元洞行觀右符治百病解藥毒秀樂覺長右符安鎮十方治子孫不孝常容總監右符柳木書之鎮祅來方太虚總監右符用柳木書之鎮祅來方玉隆行元右符鎮飛鳥入舍驚恠梵度運上右符鎮墓坎方梓木書令子孫盛田蠶叔免刑傷賈奕法門右符鎮墓艮上梓木書免水患通利田産三官九署右符取三尸用桑白皮湯丑時服十二河源右符辟井水鬼鐵板書水中方位上疾除罪簿右符頂佩落罪目得仙落滅惡根右符佩發下鬼始清心穢不得拘留右符鎮宅去惡鬼逼合鬼群右符佩之鎮山精部衛形䰟右符佩服安魂定神制魔保舉右符安死人手絶傳尸北都寒池右符鎮宅縳鬼天中空洞右符伏山精異恠毒龍敷落神真右符禳本命星殺受度歴関右符禳惡星刑命斬絶地根右符落死籍絶地脉注籍記名右符注筭求子記名落死上生右符延壽却災中斗大魁右符鎮墓結冶天中護魂侍魄右符治伏尸安魂魄總監衆靈右符縳鬼不動五帝大魔右符佩帶護形中主萬神右符吞服長肌治泄㵼巴元醜伯右符治肝病用黒豆湯下負天擔石右符治心病用丹砂湯下反山六目右符治肺病用藿香湯下横天擔力右符治脾病用棗湯下監醜朗馥右符治腎病用鹽湯下總領鬼兵右符書安旗鼔上用兵捷麾幢鼓節右符鎮貼壯威遊觀太空右符洗耳目明生聦明子自號赫奕右符鎮伏心邪上天度人右符用柳木板長一尺二寸書安死人手斷傳尸嚴攝北酆右符鎮邪安家宅神公受命右符下鬼胎死炁普掃不祥右符下鬼胎死炁八威吐毒右符斷刑獄死鬼猛馬四張右符吞服治蟲天丁前驅右符驅鬼解𡨚大帥伏幡右符解呪詛延年擲火萬里右符鎮火災伏小兒衆疾流鈴八衝右符治男女妄行血敢有干試右符治六畜疫病拒遏上真右符解三世𡨚金鉞前戮右符捉五通巨天後刑右符祛山鬼屠割鬼爽右符驅水鬼風火无停右符驅蜃龍水恠千千截首右符鎮有鬼處書鬼名於下藏跡除形萬萬剪形右符破廟鎮廟神下魔无干犯右符滅魔去邪鬼无妖精右符鎮八方鬼不入界三官北鄷右符佩帶亡鬼不見其形明檢鬼營右符鎮二十四位下邪不見不得容隱右符免産難金馬驛程右符服一年身輕舉上无復色右符治頭疼下无復淵右符辟水恠上清靈寳大法卷之二十一
