front:
  text: 上清靈寳大法卷之三十八驚五
  hash: sha256:58065073d905e0d50e0becbc9bd5d5147ae04dfae934ba9525a853308b7a9858
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5g0030_SJB_038-300982b, image: sjb/30/300982b.png}
body:
  text: 洞微髙士開光救苦真人𡩋全真授上清三洞弟子靈寳領教嗣師王𢍆真纂神虎玄範門玉府監䰟童子符真都元暢紫光之童回光洞映無逺不通通幽達靈齊𢍆元宗王府引䰟童子符太上元都始青之童幽微顯徹威振羅酆死戸閉塞九孔肅通四大九維三界烕䧺亡䰟隨歩躡景無蹤周景囬旋與道日隆元始速古二符取北魁炁吹筆三作書之監䰟童子專監守亡䰟毋令散失引䰟童子判引䰟入壇沐浴朝真領受功德度橋接引脱化也神虎追䰟符神虎攝䰟符神虎引䰟符神虎聚䰟符神虎取䰟符神虎驅䰟符右六神内篆是清清冷冷尋䰟神將精光大史統制百節大神用攝一切沉䧟鬼䰟應如影響神虎追攝符混元一炁分形化身足蹈招摇首冠三清北魁玄範聚攝䰟神陽𩲸隂尸返尸出冥五行具足敕攝來呈神虎信帛符圓象天元八卦合形五岳含煙風逹巽乾日月爲爐黄道居中分居四象戴履澄明爽靈胎光幽精念七𩲸名書之右二符用素帛二尺書之捲神虎牒内并五道牒符焚之五道牒符三炁陽光日月並照王敕告下元始玄冥三官北鄷明檢鬼營巨天力士普開泉扄渺莾九醜天道貴生覺元洞虚辭參髙真髙上清爽分配五行七政均施萬炁齊仙明炁四騫上元侍并三官九府咸聽玉文神虎玉尺五道奉迎攝䰟速至風火無停神虎追䰟符神虎追䰟符神虎夫人敕神虎大聖敕地方䧟隅攝赴北獄化元聿𩲸星飛澤追䰟使者侯魏張𧪵追攝䰟神付監獄使者劉令急急現形祝呪太一玄𡨋天一北祚北斗天蓬敕神虎㦸飛運招揺一統隨神虎到處十方精光都一吸急急如律令功德金色光輝輝開闇幽華池流真香蓮盖隨雲浮仙靈沖元和常居十二樓急宣靈寳㫖自在天堂遊右符天皇訣玉清訣北炁白紙黒書焚水盂中噀攝䰟壇内及四維立現形神虎現形符左神虎大聖敕右神虎大聖敕神虎夫人化元聿白星飛澤神虎玉女蔣仁貴等速攝䰟𩲸神虎攝䰟吏一十五人攝䰟現形稟敕奉行使者劉急攝赴身來神虎㦸飛運招揺一統隨普告三界無極神郷泉曲之府北都羅酆三官九府十二河源上解祖考億劫種親疾除罪簿落滅惡根不得拘留逼合鬼群元始符命時刻升遷北都寒池部衞形䰟制魔保舉度品南宫死䰟受煉仙化成人生身受度劫劫長存隨劫輪轉與天齊年永度三塗五苦八難超凌三界逍遥上清右符黄紙一寸四分朱書玉清訣鬼戸炁沈北流水噀壇内想亡䰟至可自服一道或亡人不記生死年月日時以符灰擎手中祝亡人現形吹灰于鬼戸立現神虎通現使者符神虎神君敕左右衞聖追䰟神吏引䰟童子遵奉神虎敕命急急如律令急召神虎使者劉立赴合身形急急如律令右符黄紙朱書燒水中噀洒隂壇中通幽釋變符神虎飛符攝䰟吏一十五員地方䧟隅攝赴北獄左七匝䰟飛玉律大力攝右七匝靈飛玉女天靈攝天道蒼蒼幽靈萬變天帝所敕急急奉行右符東南炁焚水中洒之立現通語符太一紫元覆䰟真君霄輔助精大神天一北祚元君上帝敕神虎令䰟𩲸勿走現體露形急急如上帝敕上帝勑令神虎神將亡䰟可飲液急濟疾速通言急急如律令謹請大道君大道貴生景化霄然洞鏡大霞鑄䰟神仙喉開咽利枯竭生全靈津速降返復玄元急急如律令右符東炁燒吹人身及壇内令見亡䰟及通言語通目普現符神虎使者神虎大將神虎玉女神虎功曹禀勑急召䰟急急現真形化元聿白星飛澤勑攝急䰟真神全𩲸正再聚䰟𩲸速通元真太上降慈悲令救世間人獨隂與獨陽耳目有靈光速令現真形速令聽人言謹請䕶法靈童明彰報應急急如太乙神虎夫人命太上追䰟符東方追䰟大使南方追䰟大使西方追䰟大使北方追䰟大使上方追䰟大使下方追䰟大使左三䰟急降右七䰟速來升天追䰟攝𩲸大使入地追䰟攝𩲸大使入火追䰟攝入水追䰟𩲸大使攝𩲸大使陽間追䰟攝𩲸大使飛空追䰟攝𩲸大使三䰟急赴七𩲸順道者生俱來逆道者亡無所不收無所不攝火光萬丈准三天上帝勑命萬里火雲飛空如箭勅差關九萬疾疾准三天上帝勅命火急攝赴玄壇祝發呪上清律令制召大神追䰟攝𩲸速赴現形承天帝命時刻無停太上玉符疾速無情敢不依律上奏帝廷急急如元始上帝敕大煞四門罡訣南炁右符專攝沉䧟鬼區之䰟急遣五行追䰟大神同神虎雷部雙行追取全足到壇太乙普召亡䰟符祝呪太上神符攝汝諸鬼呼名立至現形懽喜青龍在左白虎在右頭戴天冠足履玄武萬邪速離諸鬼速至急急疾敕攝急急如神虎大聖律令召䰟符又曰五行秘章又曰四直使者追䰟符三皇元君天洞天真金玉之光照撤十方攝召䰟爽來詣玄治察命定録溟漠開通正定本心五府開明敕符一道隨呪急來符皆墨書只敕字用朱書九轉塗之玉清上帝敕上清大帝敕太清大帝敕金木水火土五星尊神攝召亡過某人赴玄壇吾奉太一救苦天尊敕行靈寳符命㧞度某人䰟𩲸出離地獄五苦三塗不得拘留逼合鬼群落死斷名急急如律令右符東南神霄炁吹太隂混化三界追䰟符玉清追䰟使者符天一北祚太一玄𡨋嚴攝北鄷死䰟受煉方昭玉清追䰟使者方昭急攝亡過某人䰟立至上清追䰟使者符上天度人列言上清追䰟聚𩲸濯質完形張昉上清追䰟使者張昉急急追亡過某䰟立至太清追䰟使者符天真經法全其本年㧞命玉帝受度太清追㧞幽翳死骸流光郭太清追䰟使者郭追亡過某䰟立至右三符玉皇訣取中央玄元始三炁吹之北斗七靈符右七符用白紙長二寸四分闊一寸四分書之於斗降日向七星之下備香花燈燭茶酒餅菓供養以大指恰左手三指上二節倒大指根上香三拜向北斗上存某星君聖容下降書符之所叩齒三通上香再拜以朱書符作丸子用北斗訣凡神虎攝召乃北斗司掌録也當面北存北斗以水吞此符畢次啓祝曰今月某日伏遇北斗某星君下降之辰臨壇吞服靈符伏望洪慈允兹所懇凡遇行持役使神虎攝召䰟儀分明報應齋功成就魔障不干臣干冒真威無任激切之至陽靈通真符隂靈降真符右符以紫楓木或桃木長尺二寸闊二寸四分朱書遇月旦上七日用茶酒餅五殳章栁脯錢馬二分祭之置醮壇中則萬真俱臨日乆功曹自然通報太上五嶽破幽引䰟寳籙太上三清敕降鄷庭三清惠光破幽啓關光照十方回二陽肇慶巨靈使光起死枯朽發榮者劈破山岳受命天尊使者引䰟萬神敬諾敕到奉行攝召諸符鬼器符謹請無上救苦真人在玄真人右玄真人揺動玉女金精照見天上地下即使亡某速現形急急如玉帝敕通天目符天目神君急速降靈流布真炁助吾眼明立見神鬼役使六丁鬼神受命不得隱形急急如玉帝敕先焚鬼器符於香爐中次焚通天目符於水盂中念焚呪以水洒壇及召䰟幡併童子身次瞑目存神左紫微印右劒訣變身爲太一存天兵列左右凡道衆皆化爲救苦真人祝官將里社速攝亡䰟前來附旛現形恰上帝訣取西北炁吹空中想太一睿相在空中變身呪曰靈童靈童出你神靈童靈童入我神你藏我隱身光明護身保命得安寧急急如上帝敕取北炁吹水盂令童子喫一口仍與左右人洗眼次左手午文黙念開光呪天之靈光日月之光上聖威光五色神光速赴光中表裏通徹分明現形急急如圓光童子律令敕午文南炁吹幡上方歩罡行持焚符作用三界使者召䰟符天道蒼蒼幽靈萬變上帝敕下火急召䰟三界召䰟使者侯魏張𧪵火急召䰟來現形天皇訣東南炁召䰟符右符左七匝謹召飛符總管趙侯右七匝急領兵隨符勾管要亡人書符呪太上神符攝汝諸鬼呼召立至現形懽喜青龍在左白虎在右頭戴朱雀足履玄武符使召䰟無有不至急急如律令元始符命時刻現形火急疾速三尸䰟𩲸精分明速現形急急如律令唵吽吒唎以天罡炁入筆書之焚時亦用此呪喝云追攝某䰟疾速現形行符呪火爲朱雀水爲玄武肝爲青龍肺爲白虎攝提使者逺神近鬼陽䰟隂𩲸急召急至咸禀符命附幡歸位面奉髙真南宮度世急急如律令左卯文右子文追攝生字符上清大帝玉清大帝太清大帝太一救苦天尊玉皇上帝降戴通天之冠下天河之帶天地水官奉金書玉詔㧞度亡過某前來現形急急如律令乾象天靈日月齊明攝土宿參沙計都攝滅三䰟再至七𩲸上驅急急如律令神虎符上台虚猜星君中台六淳呈君下台曲生星君天帝敕神虎二大將神虎二使者䰟速現形化元聿白星飛澤急急如神虎大聖敕神虎訣東南炁唵嗚吽吒烏輪荼义速赴來七遍烏龍遲皂墨膝黒唵帝敕虎吽薩婆訶辰文面西北取東炁一炁念三遍喝二聖三部使者火急引䰟附旛現形取東南炁吹旛下現形符天三竒日月星地三竒乙丙丁人三竒精炁神青帝護䰟攝赤帝養炁攝黄帝中主攝白帝侍𩲸攝黒帝通想自已五内五色炁血攝藏於符中想成人焚時亡人本命訣東炁想四象五行成其形返䰟符隂鬼聚衆天靈攝幽幽冥冥無路可通非吾神將能追汝䰟催上亡某䰟𩲸不移時刻急急如玉帝敕唵啉吽七遍北炁天地閉隂陽行䰟速返急急行急急如女青律令西南炁吹旙下現形符通現符通幽符通目符巳具在前亦附此用召䰟附旛符天門照地戸通人門留鬼路攝䰟攝𩲸倒生催䰟攝尹文東北炁大力速攝䰟神將速降靈三䰟火急附疾速現真形急急魁至魒出筆神虎提䰟攝𩲸使者劉青神虎不離一斬滅亡萬千形影飛行急十萬精光都一吸左行三尸不得住右治七𩲸獨飛行天印敕下火急奉行神虎之令急急如律令唵吽吒唎亡靈速附准内書至尊敕將名上帝敕命亡靈速附五方童子引䰟將軍金闕律令某人立到壇附體通靈急急奉太一至尊律令神將趙公明疾速現形水噀之立附上清靈寳大法卷之三十八
