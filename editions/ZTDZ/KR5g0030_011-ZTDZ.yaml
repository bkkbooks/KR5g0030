front:
  text: 上清靈寳大法卷之十一樓三
  hash: sha256:3829389d33ad99d047dcb47e53429675b2144052ca42c56892f4184cb0fc226d
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5g0030_SJB_011-300745a, image: sjb/30/300745a.png}
body:
  text: 洞㣲髙上開光救苦真人𡩋全真授上清三洞弟子靈寳領教嗣師王契真纂降真召靈門師曰天皇降真符虚皇召靈符乃三天飛玄正炁自然之章以召三元衆真萬靈兆司清宫仙階位治靈虚真品欲降百真役使千靈當以青綺七尺二寸中以朱書降真符飛黄書召靈符安於靖中以黄錦或黄繒作席用醮禮祭之百曰有降真召靈使者玉女金童各三人隨祭下降直衛真文所召千真萬靈並降子室學不篤信五嶽試人輕露祕宻所召不神凡請三天仙真靈神並遵符而届前無神文乃爲妄召雖精思苦徹萬無一降或有降者多作魔試受者依玄都憲格齎三素繒隨年尺諸有經之師以畫空而心記不載於文章恐鬼神禽畜𥨸視漏泄矣二符中有符吏一十二人監臨壇所如建壇用此二符化金闕梵行之界方始行事運化内朝三天金闕降真召靈之道書時用玉清訣天門炁三口吹篆而成元皇降真青華真符開明三景是爲天根玉山上京大羅玉清三華離便大有妙庭大行梵炁無無上真與道合同召天真訣亦用召真符天真大神辰妙行真人酉至真大神亥度人不死之神申南極長生之君午好生韓君丈人午南上司命寅卯中中丑四中離廻骸起死巳十方飛天十方訣長生無量大神未五老帝君中中諸天丞相玉訣監生大神子三官帝君中中玄子東方八天卯南方八天午西方八天酉北方八天子東斗注筭卯西斗記名酉北斗落死子南斗上生午中斗大魁中中青天魔王卯赤天魔王午白天魔王酉黒天魔王子黄天魔王中中千和萬合君四指過中上節至卯長生大君子亥執符把籙君子丑保命生根君大指甲中理五炁中中混合百神君卯酉中中玉虚召靈紫英真符天之天中渺渺劫刃混沌之中無幽無𡨋無形無影無極無窮梵炁彌羅萬範開張汎景太霞十轉回靈契體合真敕呪元始符命緫召萬靈靈光普照二界通明玉符飛降合契帝庭令臣奏啓上朝玉清雲霞飛歩時刻無停徑升玉闕與道合真急急如元始上帝敕右法玉清訣周匝三官剔午岀東炁上清靈寳玉虚召靈神光妙化億萬齊臨急急如元始一帝敕緫召諸天君吏亦用召君吏符神功受命君普掃不祥君八威吐毒君猛馬四張君天丁前驅君大帥仗幡君擲火萬里君流鈴八衝君金鉞前戮君巨天後刑君屠割鬼爽君風火無停君千千截首君萬萬翦形君明檢鬼營君金馬驛程君元洞玉曆君混沌赤文君敷落五篇君赤書玉字君八威龍文君旋斗歷箕君上開八門君飛天法輪君欲界大魔王無色界魔王色界大魔王束送妖魔君斬馘鬼鋒君敕制地祗君歷關諸天君普告三界君䰟度朱陵君受煉更生君消諸不祥君保舉上生君巳上三十六官君皆属法部中之驅役者也降真符召靈符靈寳召真符玉京神光衆妙之宗神光萬道樞冠玄都玉清上帝玉女秉敕速召来臨召集萬神啓運符右青繒朱書靈寳訣元如祖炁布可以召集萬神召十方飛天神王符大梵無上億劫化身星宿停闕元始演化無量度人敕召飛天受事神王速降敕召十方無極飛天神王長生大聖齊駕降臨年月日具位姓某符召東方神王呪掌袞州分野七靜道生七觀無生元始觀身飛晨玄真東方神聖秉劫無停急急如靈寳大法律令南方呪掌揚州分野靈都九通萬炁交中神敕一下靡敢不從急急如靈寳大法律令西方呪掌豫州分野仙司緫録玉寳虚中玉敕一下莫有不從急急如靈寳大法律令北方呪掌冀州分野建元玄虚寂妙入無神敕振伏走霧雪衢急急如靈寳大法律令東北方呪掌青州分野安陽昌靈保黄飛群直符所制萬神敬聴急急如靈寳大法律令東南方呪掌梁州分野絳力隱微太𡨋玄珠敕命所制風馬奔驅急急如靈寳大法律令西南方呪掌荆州分野空寂暉晨含景玉虚符命所遣黄龍踟躇急急如靈寳大法律令西北方呪掌徐州分野顯得緫持靜梵玄英玉符一下不得留停急急如靈寳大法律令上方呪掌雍州分野圎盖法輪扶摶䊮乾玉珮桂旌直造帝前急急如靈寳大法律令下方呪掌五嶽府冥曹嶽瀆滄溟家真崇靈聖真勅遣何敢不遵急急如靈寳大法律令緫召十神王呪洞玄宗先靈枝之元太一君吏御炁飛烟雍雍侃侃衮服飛仙一瞬十極緫御萬天阿繿那易娑歩曇延逺落那願厥淪孛連乗命玉晨付令侍壇爲宣化度如律如編急急如靈寳大法律令緫遣呪阿繿那易孛連娑歩逹落曇延厥淪那願齎章飛馳以雲以霧龍召寳環削簡正誤錯字爲攺落字爲注無令上官典者遣却急急如靈寳大法律令右法各方決隨日直召用各領萬騎可以通信十方招集群仙斬魔伏祟不可妄遣緫召君吏符洞玄元明三炁成真五行所運三天敕行急召急至萬神咸聽靈寳降御萬真符四斗俱明降御萬真太靈總攝混合百神三陽朗照五炁俱清三隂三節萬神現形三王有命飛形紫晨呪曰元始敕命降召萬靈保神攝炁大道通名身朝金闕飛形太清右符黄紙朱書可逹御庭召攝神炁降真追鬼又名統御萬靈符亦曰萬司如意符靈寳召萬靈符上帝敕下速召萬神至口字放訣日君陽神奉命卯月星隂將行敕酉金闕瑶精玉神舉世通煞左召神定旌玉女光妃辰文右召靈安華玉女元妃玄文火急降靈寅文三都邪鬼敢有杞逆攝付重泉子文呪曰瓊境瑶都金編玉符紫陽刋字名列玉樞得爲萬神俱朝太空急急如律令召南極度人不死之神符大行梵炁周回十方元始上帝敕召呪曰今日校録巳文止諸天臨軒午至中中右法午至中指中應念書神君號念至今日校録諸天臨軒召鎮壇玉曆將軍符北極素靈天中曆紀上相急至玉曆捋軍威㨗萬神呪曰玉曆將軍北帝尊神統攝三界分象布形靈寳玄炁金光徹明太空之中煥耀通真急急如元始上帝律令召萬司如意大將符靈寳赫奕統衛萬司帝君有令咸掌郡都飛極神馭護衛玄爐守真定志校定圖形老君預敕道君後除无始主者道炁之餘符命一下萬司咸威呪曰唵敕宣尼吒護唵哆哆唎吒萬司如意大將温仲宣紺髪童顔金介胄仙帶左手玉清訣撫心右手仗劒朱履立黒雲中行靈寳法若無此將何以檄召諸神當誦隱語書召用印召靈寳諸司官屬將吏符呪曰符命告召官將齊臨遵承號令聽受關行玉篆預符速降萬靈急急如律令右符以栢木篆應臨壇行事先召如意大將諸司官屬方可行用如欲止風雨以黄紙一尺闊五寸朱書祝將吏行召當保監壇神符呪曰靈寳符下召神無停當坊主者社令咸聽守護壇席掃穢除氛聞今符召急速來臨急急如元始上帝敕召監壇主醮諸神符呪曰符召諸神監主齋庭驅除精魅掃蕩邪精肅清壇宇咸集威靈齋功成就名列玉宸急急如律令右法凡建醮設壇可召四明功曹行事凡召鬼神指使取東炁四口書焚召隂陽二神符呪曰隂神陽神請速通靈令吾朝真上謁帝君欲使神人閉債封形舉雲即去祕訣靈靈使我追攝即得通神急急如律令召土地符呪曰此間土地神之最靈聞符一召速現威形安鎮庭宇通逹齋誠急急如律令召四靈守壇符吾召四靈君四靈既集臨驅除諸惡炁並到降真靈四方消魔魅三朝護吾形承今符命至火急要通真急急如律令凡登壇須召四靈護身若不用此符則神炁散蕩以黄紙朱書入戸時焚於背後本師訣方念入戸呪召上界符呪曰上帝敕命請降天真暫駐塵寰道德玄靈聞今符召差降天兵疾速降臨萬炁齊并急急如律令召中界符呪曰上帝敕命請降神靈五嶽四瀆城隍社令山川潭洞四海淮源攝降真炁神聖吏兵聞今所召暫駐神真急急如律令召下界符呪曰上帝敕命請降隂神酆都六洞嶽府隂真七十五司掾吏獄冥幽䰟苦爽皆見光明速離隂所降赴仙庭急急如律令召赫奕萬神符玉清上帝宣命召靈上清上帝應命揮靈太清上帝緫炁飛靈玉清有命總攝無停一炁生三速離宸庭日月左奔風火八衝星天朗耀金馬驛程乗天履炁普降真靈萬神俱集億萬齊臨森然混合大有妙庭七轉左天中之天赫奕臨諸天遥唱參駕龍軿玉清有命急召急臨筆盡呪盡陽發向上隂發向下宣召萬神呪三十二天三十二帝諸天隱諱諸天隱名天中空洞自然靈章諸天隱韻天中之音天中之尊天中之神天中大魔天中之靈九和十合變化上清無量之奥深不可詳敷落神真普度天人今日欣慶受度歷關諸天請滅三惡斬絶地根飛度五戸名列太玄魔王監舉无拘天門東斗主筭西斗記名北斗落死南斗上生中斗大魁緫監衆靈青帝護䰟白帝侍𩲸赤帝養炁黒帝通血黄帝中主萬神无越青天魔王巴元醜伯赤天魔王負天擔石白天魔王反山六目黒天魔王監醜朗馥黄天魔王横天擔力五帝大魔萬神之宗飛行鼔從緫領鬼兵麾幢鼔節遊觀太空自號赫奕諸天齊功上天度人嚴攝北酆神公受命普掃不祥八威吐毒猛馬四張天丁前驅大帥仗幡擲火萬里流鈴八衝敢有干試拒遏上真金鉞前戮巨天後刑屠割鬼爽風火无停千千截首萬萬翦形魔無干犯鬼无妖精三官北酆明檢鬼營不得容隱金馬驛程普告无窮萬神咸聽三界五帝列言上清急急如祖師上帝命玉晨道君敕緫召萬神呪晶晶靈靈炁化真靈虚皇緫炁普降宸庭神承炁降炁合真精急應吾召急應吾聲急急如玉清上帝敕祝呪金闕玉房大梵穹皇聞兹告召速至感通鼓節麾幢降于雲漢乗風馭炁來自浮空泥丸絳宫玉室金堂三部八景四體百神昂昂而興濟濟而至森然混合羅列壇場承玉清命應化祥光急急如元始上帝敕右法三天十天訣運吸發出凡召赫奕部以目篆三天真形向天門口吸入三宫化成三清思自身作神公之形頂玉清大承金碧貂蟬冠絳霞飛羽服大帶朱履絳裙坐三色雲中右手擲七斗目成紫微印左手擲三火目搯玉清訣叩齒九通祝之又叩齒二十七通次隨事召之凡諸神訣目並隨事搯隨炁吹挑以實搯勿虚浮勿令人畜見並以西北炁則所召立至矣事畢速請歸治所召五帝玉童玉女呪紅杏墨黒磨真襪臘靈寳右法左手玉清訣右手書玉清真形於空中念呪吸五方炁閉息以左手拱真形訖開口吹之再呪搯五嶽訣取五方炁吹之此入局召真之緫訣也餘皆由此見玉童玉女方可召降餘真稍越此訣徒召無應矣召仙曹宻呪无上玄元太上道君召出臣身中三五功曹左右官使者驛龍騎吏侍香金童傳言散花玉女五帝直符直日香官使者各三十二人出出者嚴裝顯服冠帶垂纓整其威儀住立臣前後左右聽臣區分通逹誠命上御三天急急如元始上帝至尊敕命右呪口誦微音使外人莫曉也如非正月七月十月長齋止言今日吉慶齋戒臣及甲乙言伏爲某事從意直言而奏如當日通誠奏告即云无上玄元止急急如元始上帝至尊敕命右法左右手搯上清訣目篆玉清真形以口吸念呪取乾方炁咽之存上丹田中絳宫下命門中乗三素之炁隨而出住立西方始隨事區分召仙曹緫章呪髙上之天玉清爲主玄罡大魁太玄生府中有帝君靈虚玉母統制嘯詠玉文金符司治仙禁金童玉女校精辯魔統制百史上逹三天形成司舉傳奏教令蠲救疾苦備衛護道囚縳鬼侮流浪諸天濟生度死解厄摧恠通逹紫府十天告命召其所主急急如元始上帝律令右法目篆三天真形於天門方存爲三色先左手玉清訣右手上清訣叩齒九通閉目篆之念三天諱霐天地表中防䨜人德立以口吸流入三宫存身爲神公之狀宻呪一遍取十方炁吹東南西北畢如意召降應諸天仙曹玄局靈司並以緫章大呪召之不伺别文妄勿得誦混淆仙曹也召仙官呪髙上之天玉清爲祖靈寳三炁三省樞主上帝主之天曹生府各有所職下𦔳玉律分品列位位官所處一召下降一依天璽急急如律令召童子呪謹請靈寳玉清殿下一十二童子號曰玉霞吾奉帝命與速降臨急急如律令召玉女呪謹請柔和之隂九靈九真命曰玉女鳯衣輕裙真王之命召赴壇庭急急如律令召功曹呪玄曹玉文立功之官主持玉清奏告三天聞吾呼召急降壇庭急急如律令召雷神南司火府韓君上宫龍圈雨部雷宅神庭五方電主霹靂丁神受命直符上召玄靈天尊教令風火不停速駕十方法雨慈雲迅雷搜龍烈電火鈴掃除不祥摧碎魔群天獄收妖速降真靈急急如律令三天上帝心印真形師曰靈寳有三天上帝真形凡學士受持大法每日清旦以竹膜四片依各色書吞之然後緫治幽明無不應驗但服之三年可封制山川攝召真靈統鎮六天召劾隂宫七年外坐致行厨千真萬靈侍衛兆身九年功滿飛昇上清清微天真形青書禹餘天真形黄書大赤天真形白書五靈玄老北帝真形黒書三天三境真符師曰靈寳度人無量品中有至道内煉身形外納正炁名刋玉清位列真人除馘妖孽起死回骸功德徹於天地之間此道至聖至妙至靈至尊以泰玄都省爲都關天機都省爲内禁天樞上院爲宗教之師神功妙濟真君乃天樞院使相第一代經師昔上帝賜此三境真符以統領天樞之要使道攝北宫職領黄庭安神養真愈厄蠲患佐度人之法門尊徑師之元徳于令天樞院南上火宫存其符焉夫三境符者乃無上三天五劫之初三炁真精靈虚妙炁結成真文諸天自然之音大道之根宗也可以召役神靈可以吞服成真隨事感通也本不傳下世乃真人口授心傳得斯文者皆夙生道骨勤而行之當獲神仙若長齋山林清堂修誦行八緯之真詮修七經之妙用吞服真苻下輸九九日三尸自亡穀氣自生身輕體强面生玉光體秀金澤不同藥石津炁良由自然真炁長生度世永無衰艾久久服之必獲升仲書時搯三境訣天門炁以竹膜朱書吞之又能愈千灾治百病凡小事止用太清苻大事方緫用三符也或以鐵板長九寸闊五寸朱書此苻沈清泉之中今疾病之人取水服之立効又以青竹葉朱書九道揷流水岸邊令人隨影所指汲水服之可治瘟疫功用莫述玉清境苻玉清無上大羅至尊玄元祖炁天帝化生混合无始會歸真敕令萬神火急應命呪曰玉虚上境大羅昊天炁遍成象妙化玄元龍章鳳篆億萬雲軿無極聖衆䕶法真仙自然祖炁運合俱全中大聖三天洞玄引進天使玉女傳言天開接上通奏傳急急如元始上帝律令右發遣飛天神王用及石諸將擊天關以開天門集真召靈上清境符無上玄元太上道君一炁分形旁流四極真元始三炁緫通五斗星曰星洞照天地合形萬神應命莫敢不從呪曰玄元始青紫虚妙庭三十二天天帝帝君混合三炁流霞散精真文到處萬神應聽拱禮玄奥洞開天門上通八極下度幽靈傳言引奏龍虎二君四司五帝俱妙神精急急如元始上帝敕太清境符丸陽開化八極生光太上老君統會三元左玄真人統攝百靈右玄真人營衛萬神二炁化生萬物合成呪曰太微玉晨開明三景中理五炁混合百神德全道備萬炁齊并元始運化上開八門日月熠耀照入幽冥一切苦爽咸覩光明急急如元始上帝律令右發遣同前用上清靈寳大法卷之十一
