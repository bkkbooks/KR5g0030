body:
  text: 洞微髙士開光救苦眞人𡩋全眞授上清三洞弟子靈寳領教嗣師王契眞纂經緯修用門七經師曰修用之法而有七經一則洞視百靈吞服混元玉札髙玄内諱行元始内觀之道如不及行此當行内視中藏法二則參斗割移死籍注生南曹所謂北斗落死南斗上生也三則朝元四則分神治事五則仙曹建邸六則超度玄祖寄治南宫七則選應玄舉也吞服玉札洞視隱文師曰上清三洞九品之文分四輔萬篇惟靈寳三階有餘緒神章則救死濟生爲上下奉眞之士徃徃萌始之勤終未見替止縁塵根暗識六慧不通被六天魔惑四邪妄興作諸變化不能洞了故三洞之文上曰洞眞以凡修眞洞合形神目覩眞人與道合契逮乎中下洞玄洞神廼萬法之祖六通之本是以天尊證道眼慧眼眞人定法眼慈眼故觀三界如居掌中天尊設法以明内觀外作洞視以效道慧之眼洞視徹視遥觀以體法慈之目是以三洞凡學洞眞洞見眞人然後成眞旣曰洞神目擊神眞然後通神而作神仙凡三洞之萬法無不先要三洞自明然後可以通神神靈降身至於洞神洞淵洞靈大洞八史六丁靈飛六甲與光洞觀並設通目之道男士之淫女士之邪六根不淨耗失眞元豈洞神純陽則神仙不隱純隂則鬼現形是乃眞祕授玉札一卷之祖修之百日眞仙現跡見之可以役使可致天眞功德備合白日飛昇三洞召眞現形無此玉札徒勞施用終不洞明昔者不傳下世因靈寳教行鬼邪出隂以此洞之不能隱形免惑道士玉札皆上眞内諱隱名依法用之克日成眞授受之者擇三元十直八節之日齎玉簡二枚上金九兩命素千尺信財百千以盟三官師授無不盟信妄泄天寳師伐以風刀之考弟子修之終無所成折筭一紀詳其士之豐儉勿失其人不以非材泄之非道罰亦如之耳天地玉字内音防中之眞合炁玉京太華袁德轉輪不停丘紅妙樂圎羅肓靈音曜清都元始坤道化形岳麓所制鬰成煥壘造化無窮黄中理炁衆妙之宗音壘右二符並中指中文日吞二枚召二炁父母用日月玉字内音日月帝皇内諱曜道枝正薈條將軍梁髙騫爽天皇君内音汎景太霞嘯詠洞章甲子元君白素天皇魂炁元玄解乗胎仙六轉六合八遼玄𡨋逐字塗之乾文地皇君内音溟涬大梵寥廓無光甲申地皇萬炁絶眞黄素元君九華元陽六轉巴元靈曜炁生逐字塗之坤文人皇君内音无形无影无極无窮甲寅元君太微玄晨紫素人皇碧落混沌六轉洞幽迦摩梵惠逐字塗之中文爲訣服符呪天地人皇三素元君解結散滯閉塞死門辟非去尸心神寧閑五星諱三天隱諱玉清始青玄元凝結上清禹餘混芒降固大清大赤流焰騰晶鼻引玄元始青黄白三炁黄紙朱書厚載無私化形玉虚卯五岳坤輿上達帝居辰九壘祖土三炁洞元寅鼻引九地黄紫二炁朱書千靈變化攝伏羣魔酉元皇列眞凝結雲芽中中黄内象感化嬰見辰鼻引東方九炁朱書服符呪元父合雌玄毋歸雄天地混合人道居中玉符保命五臓光衝耳目開爽我道興隆急急如律令三眞内諱太一天眞諱森羅淨霐霐持無鏡祖劫化生上清訣太初天眞諱阿陀龍羅堅敷澄宗四象吁員玉清訣眞仙眞人諱流羅梵萌浮羅合神柏空度仙太清訣鼻引三天炁書成上帝内諱神户纒絡眞元散清子文皇道含明炁晶育魂洪綱告寜午洞潜洞虚宸洞開微酉入中指中鼻引子午中宫之炁書成服符呪太一捧将太𥘉命靈眞仙護命三帝司迎炁通玄關魄煉魂英服炁合符洞徹萬靈急急如律令七曜諱赫赫陽衆陽宗辰太隂理化廣帝理生酉皓景金華庚辛洞光酉扶桑鬰華九炁令華卯朔單五炁元老化形炎帝赤明奔飛火鈴一炁靈寳中黄肇玄中中每日吞七丸召七曜也此日月五星内諱各掐本訣書取本方炁隨其方色服符呪東連扶桑西貫咸陽五行相配混合中央急急如律令南斗六司諱離宫之祖日陽餘炁三炁炎炎丹天朗耀四明尊帝騰勝威天急急如上帝勑六字疊書塗之離文逆至子取南炁書之北斗七元内諱河變恬懀紫精陀丘觚亶琅璨岺昺太行幽微畢雷明陀唵痡梵秦貫標急急如上帝勑七字疊書子文至午剔取北斗炁書之服符呪南司七政陶魄鑄魂順道而造逆天法輪周旋玄象回死作生七辰内妃夫人隱諱玄玄所化元炁所運應變無窮魂魄澡煉衆星所拱飛天遵奉馳驛風傳玄元應化星飛驛程七字疊書子亥文取魁星炁書之日吞七枚召七妃也神虎神吏内諱卓雲青府寅混元覺縁丑業覩般基中中玉玄演侯卯寂無眇凝辰極中昆清中皇達元靈午七匝昌荀逵迪恙信貴七字疊書取東北玄範𩲃司之炁書之服符呪魁張玄範應化無邊掌持青律度魄魂遷飛度五戸驛馳風傳元皇九醜樂秀三田逵迪察命變攝昌言荀恙持金不信通玄三界總司盡秉吾權三台秘諱太清佐命三炁元君乾爲天坤爲地靈爲人中皇炁絡氤氲虚皇總炁精元有英天寳妙色終升太虚四指上六炁混康停華育魂靈寳化生至道元宗罒指中曲宻華房延生度世神寳守宗萬神護攝四指下服符呪上部八景胎結泥丸中部八景胎盤絳宫下部八景胎解胞根三元輝映台魂鮮明急急如律令中斗正使秘諱罒景回樞灌形天河旋斗歴箕回度五常太玄璣渠玄君斬尸天王秉權五帝命魔太陽四正斬根斷死控適天元回盻帝堯遊行太空俯仰玉衡玉文八威正炁所臨八匝中斗大魁總監衆靈八字沓書中指中文取中斗炁二始祕諱太一之宗三匝遊宴太阿夫一之宗五匝遐想天帝五字分二重沓書共八轉筆中指中文中炁日吞三枚服符呪中斗大魁旋斗歴箕回度五常逃形天關太一天一二始分張八景𡨋合司命桃康急急如律令玄女秘諱八景冥合炁入玄玄梵炁彌羅萬梵開張玉音攝炁靈風聚煙三匝玄運珠三師正音秘諱真定光慧大羅智翹真妙流音梵景空瑶中指甲随炁田轉逐字轉吹彈四聖秘諱暗咀嚕嗂嘧囉啘嘰喁𠰉九區六甲祕諱甲子護我身甲戌保我形甲申固我命甲午守我魂甲辰鎮我靈甲寅育我眞天地日月星勑六丁秘諱丁丑延我壽丁亥拘我魂丁酉制我魄丁未却我災丁巳度我危丁卯度我厄隂炁雲雷電雨六匝塗搯十二宫訣取十二官炁四直功曹陽神内諱俱曽直年嚧眚直月詵季直日瑞夷直時四匝鳴囀嗏叹四直功曹隂神内諱旭斯直年晨濫直月馥淵直日蜒渺直時四匝唵㖡嗏已上八卦訣甲陽卦丁陰卦方炁書之五師秘諱延生固精注禄保命固靈固神中體存眞煉形鎮身五匝金木水火土五行訣五方炁三將秘諱上部三田暢中部八景分下部九陽靈三匝玄元始三塗玉諱太霞扶桑乾下鎮酆都坤韓君丈人度人不死中指甲鼻引三天炁八口閉炁書吹呵各三次五嶽玉諱太華木司九炁元君衡霍火官三炁元君金華金主七炁元君恒山水帝五炁元君嵩山土帝一炁元君五方訣五方炁雷神秘諱嘔嘻𡀎咁咳吒嚙唵臨十一臣念十一字掐辰义念呪曰雷一雷二雷三雷四雷五子上局巽炁書之總服符呪玄女内妃隂陽合配三師紀律四聖分銳六甲陽神六丁隂吏四直元君五司都帥三塗五苦鎮輿坤地巽震雷霆隂陽拘制兊乾施光坎離交位下辟鬼門滌垢蕩穢飛付仙家獨歩無畏元亨利貞逆順神炁師曰凡受持此法於元旦入靖面北設香几以朱砂雄黄用輕黄紙依前式書髙玄内諱畢再拜收安淨匣中各打宻記母令差互以甲子日服三天隱諱天地玉字三眞内諱上帝内諱甲寅日服七曜南北二斗三台中斗内諱甲辰日服三皇内諱五帥三將二始諱三師諱甲午日服六甲六丁四直諱甲申日服神虎神吏玄女内妃諱甲戌日服雷神内諱凡欲服符須隔夜預備香火水盂劔子帝鐘各一及盥潄之具一一周備不使臨用有缺方就寢至夜子時後丑時前起行事整肅衣冠盥潄畢入靖焚香明燭汲井花水一盞置在聖前次取玉札内諱符於案上分記之退身入戸朝眞𩀱手掐玉清訣歩斗至聖前春夏自魁歩起秋冬自魒歩起至魁上香望天門九拜畢長跪宻奏上洞視黙表一通焚於爐中畢再拜雙手玉清訣面北呪水依後法服符朝眞宻奏維太歳年月日時眞位臣姓某謹焚香皈命奏啓三清上帝玉皇上帝紫微大帝日月五星南辰北斗三台星君三天上眞四聖元帥五嶽五帝七晨内妃南昌丈人六丁玉女六甲神君雷神雨部神虎大聖使者四直功曹四直神將洞觀神將徹視童子臣謹依靈寳大法混元玉札上清隱文每遇六甲之日合服上眞内諱隱名玉字齋戒吞服所祈洞視神眞役使仙靈追魂攝魄伏望眞慈不以瀆犯賜譴許臣服食行持兹值甲子之辰謹當依式吞服上眞某玉字隱諱乞降正眞道炁灌注法眼俾令徹視百靈役使千眞左呼六甲右召六丁坐致行司預知未然身生水火變化無方臣無任祈天望恩之至祝畢焚黙表於爐中又九拜次以左手掐五岳訣至中岳搯定上香以右手取水香上度過左手把帝鐘揺撼七次以右手傾水七次入盞内念呪七遍傾水北魁呪魁罡靈魁罡聖逢著邪炁必須應勑攝右呪七次取北炁七口吹水中止次掐五岳訣托水仗劒念後呪太一神呪謹請太乙天眞太初天眞眞仙眞人上應乾位六丁左神六甲右軍爲吾上受天心普救萬靈太一神呪南方火輪除邪去病取水勑攝右呪畢存日在水中轉念呪七遍取南北炁各一口吹水中以雙手持水香上度念呪乾元呪乾元亨利貞日月與吾明靈泉入五臓六腑得安寧神仙同羽化飛昇朝上清右呪七遍取天門炁七口吹水中放水次以雙手自子巡先訣彈水後廵十二支念後呪五岳持身呪五岳持身天地同生日月斡運配分五行周天上眞玉諱分明各降眞炁灌漑胞根神清炁爽洞徹玄𡨋急急如律令再拜丁立執符逐句看甚字取炁而吞之取炁例臣謹依大法但遇六甲之日服諸眞炁臣受天炁仰乾方吸臣受地炁俯坤方吸日炁東方吸月炁西方吸五星炁五方五吸三皇梵炁子申寅三方三吸南斗炁南方六吸北斗炁北方七吸三台炁北斗魁頭之上三吸三天眞隠内炁天門三吸三師度我神炁西北方三吸五岳持身妙炁五方五吸三途總司炁南方三吸北隂天門六丁柔和眞炁丁旬方吸各一六甲武罡之炁甲旬方吸各一太一神變之炁太一寅方吸二神虎七隂眞炁西北方吸四直所主正炁年月日時建方各一吸上帝正眞生炁天門三吸内煉三元之炁天門三吸九天玄女眞炁西南方三吸雲雷雨部之炁巽方十一吸右吸炁畢再呪曰天爲我蓋地爲我載南辰北斗爲我衣裳吾藏身於三界之内太虚之央干不能侵支不能傷即令天地不能見我質日月不能見我形鬼神不能見我身飛行太空出幽入𡨋千邪萬恠逆道魔殃當我者死值我者亡急急如律令攝右呪畢取十方炁掐十千訣彈入水中然後面天門存身爲元始天尊黙念玉札隱諱以左手取玉札以水吞下吸水三口餘水噀天門上右法吞符訖次取神虎玉札七字入左手中右手掐五岳三塗訣至中岳掐定呪曰勑化元聿魄星飛睪降眞炁入臣身中急急如律令右呪畢取五方炁各一口欲入水中想七隂夫人降玄光炁入水以左手抛玉札入口右手取水送下次吸餘水噀鬼門喝云攝再拜退次置水劒不用却吸鬼門炁一口閉息於靜室面南端坐行元始内觀之法三塗五岳印五岳印以左右手小指四指仰手相叉各以二中指左右互勾二小指以左右第三指各勾左右手四指直於左右二中指以大指掐中中元始内觀師曰凡行此法於靖室面南端坐焚香以鏡一面對面前安吸鬼門炁一口吹鏡中次閉室行元始内觀須端坐行之先聚卦炁先存五臓心如含蓮花如縞英紅在肺中下肺如華蓋如縞英白肝如金鍾八華居左如縞英紫膽如綴珠色如縞英