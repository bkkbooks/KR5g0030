front:
  text: 上清靈寳大法卷之五十三寫二
  hash: sha256:54728b23e9323ff47003ad1b9ac640c54e5ad3006de70f6dc252b3293dbfa0c2
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5g0030_SJB_053-301142c, image: sjb/30/301142c.png}
body:
  text: 洞微髙士開光救苦眞人𡩋全眞授上清三洞弟子靈寳領教嗣師王契眞纂大煉符篆門九天煉度隂符欝單天符三炁尊神合生九炁出乎太空隱乎空洞禪善天符无光无象无名无形无色无緒无音无聲梵監天符開闢玄通三炁混沌乍存乍亡寂然天符炁清髙澄炁結凝滓九炁列位並受生成波羅天符三炁所育九炁所導洞玄天符三元育養九炁結形九月神布炁滿能聲梵輔天符九天稱慶太一執符帝君品命司命定筭五帝監生髙虚天符男則萬神女則萬神唱其恭唱其奉无想天符男則司命敬其器女則司命敬其順九符告文太祖金字玉文九炁隂符㧞度亡過某等䰟土立天堂一如告命九天生神本炁符右符凡行九煉用黄絹造旛九首闊九寸髙八尺一寸頂上書本炁符旛身篆九天隂符兩手分寫告文分安於九天壇中隂尸九煉符師曰此符乃髙上空洞混化九天元父道君降而結爲雲篆付九天金籙无量壽生神尊君行之以濟隂尸也如遇此符則九炁齊并如日之升百骸流光更無隂滓便成仙人矣凡用此符合以黄𥿄朱書或以表九通書符於表前上奏九天之帝則帝君受符九天稱慶太一執符帝君品命主録勒籍司命定筭五帝監生聖母衛房矣右符書時存身爲金籙大神道君搯九宫訣取九霄正炁呪而成符貼於表前欝單天符天清地寧人靈九曜順行陽滿隂盈心生虚寂救苦幽隂自然合道日月同形禪善天符道本澄廓運化隂陽合真悟道了心無心梵監天符等觀慧化靈寳玄光照徹諸天三十二帝興隆教法救度存亡丹界靈符盡獲更生寂然天符靈符火煉百骸自飛炁變庚辛神度玄津身心清淨駕景騰飛波羅天符三炁勃煙日中晶精𩲸煉䰟生隂激陽熛洞玄天符三變九煉易景反容體合玄光永享長生靈化天符梵上幽微逹爽飛歩玄邈禦金獲存雲霄受炁俱守玄玄黄庭髙虚天符三陽煥發七炁成胎五行俱聚合鎮丹臺日月含輝胎光垂芒無想天符玄皇應運炁貫天中至妙真靈匹配元宗九天緫炁度䰟玉符欝單凝神禪善保神梵監凝炁驕樂㑹真寂然安蔵靈梵生津化應流景髙虚曜神无結无愛列名帝篇隂陽㑹神三萬六千二炁交映内保三田克登聖品與劫同年流雲玉軿來侍帝軒䇿龍駕景髙升九天急急如長生大帝敕右緫符豁落斗祖炁吹布焚之亡人身有陽光奪日仙衣可愛神識朗明也八生自然靈空飛符栢拘羅第一煉某人罪消隂翳疾除罪簿落滅惡根玉真虚生混然靈仙符墮拘勒第二煉某人煉除累趣斷地逮役上解祖考㧞出地戸永離鬼官斷絶地根三炁龍胎玉寳神水化生自然符提頭羅第三煉某人煉除罪目名上南宫䰟度朱陵制魔保舉道真虚玄九微鳴水素元符携任度第四煉某人升𠳤法橋上登朱府飛昇金闕即得返形遊行太空飛度五戸名列太玄俓上南宫九靈玄生天水飛靈元精之符須持第五煉某人煉𩲸易質受化更生死䰟受煉仙化成人玉寳洞微左契理命保真符蘇越第六煉某人更生變化隨劫輪轉與天齊年虚明三洞右契神化通真玉符務雲子第七煉某人煉質逍遥過度三界永无退轉劫劫長存上玄三炁化生自然之符凝泓第八煉某人煉質登真飛昇金闕遊行太空逍遥上清五元化身二景精微飛空之符靈淵第九煉某人普度无窮隨劫受生九天生神寳符告文靈寳自然九天生神寳符書符右符告下疾除罪簿司斷地逮役司度上南宫司飛度五戸司受煉更生司仙化成人司過度三界司飛昇太空司普度无窮司靈官仙吏奉爲亡過某等請降真炁生神育質度命登真一如玄科律令太歳年月日具位臣某承誥奉行胞命元一黄演之炁符混元生胞胎命元洞𡨋紫戸之炁符煉胎成形䰟命元長靈明仙之炁符䰟門煉仙𩲸命元碭尸冥演由之炁符𩲸户閉關臓腑命元五仙中靈之炁符保命生根靈府命元髙真冲融之炁符靈炁固守元府命元髙仙洞笈之炁符元炁自分華府命元真靈化凝之炁符華堅聚一嶽府命元自然玄照之炁符法酒符玄元老君敕賜法酒大梵天玉津玄梵天金醴寳梵天瓊漿六炁道德之漿自然識慧之漿䦘苑素靈之漿芝品煉質之漿四炁消魔之漿三魂飲煉妙覺變化隂陽並化元英中真五臓敷榮神識洞清右符黄紋七寸朱書向東南誦三天隱諱取真炁書凡煉度畢當賜法酒而煉之以此符燒灰調酒與亡人飲之還形復性符返本還元復命歸根二炁肇形隂結陽成午爲魄戸未爲䰟營元氣纒絡降誕人形炁耗神衰𩲸䘮䰟傾日月星光變煉丙丁窮理性命復體完形胎生上玄心禀太真悟道聞絰離合上清服符呪復性返形九歩八坤行剛七轉内外咸成三台子午絳宫受真炁化爲主洞識元真返形易質徃來倶榮天上地下洞徹光明永不輪轉離合上清右黄素朱書凡生身受度事畢須對天真謝恩面東拜服此章則永不墮輪廻之道度亡亦用之明亡者續命章呪辰中黄景炁三秀發霄庭倉臺飛羽輪迎延道巳成司命奏帝書號爲玄度君得生太霞宫列賔館上卿命門合精延守其䰟黄寧左携元素君右攝朱欝靈呪畢宣赦發遣焚化送䰟流火亭符天地混合同其名炁分隂陽神貫精中皇取炁集萬四天主張上接元和神金生真火煉英四明運煥齊其靈左右日月鍾甲丁黄旗召靈熒煌庭欝儀結璘二曜交𨇠受煉符乃亭中人形天上陽晶地下隂精台光幽精爽靈右先書年甲符盖之玉眸太靈分天地精一炁混合隂陽佐成司命合德四齊生靈火鈴煉度左右靈真急急如九炁生神律令右符黄紙朱書上帝訣南炁吹貼朱陵火府亭中其橋上仍安九天生神章一卷焚時黙呪曰火鈴炎熾變化十方萬神侍衛永斷不祥呪畢存火鈴滿地照耀天界光明奪日次云興此大法橋想経爲長橋亡䰟乗陽光而升天其亭想爲朱宫䰟皆登天矣又見天尊浮空垂一寳珠光芒萬丈接引上升召監橋大神符書符召遣呪三炁之化一炁之靈䰟𩲸清凈神精靈靈混沌之始人鬼分精大神聞召急至橋庭飛升煉度引度朱陵急急如上帝敕右符黄紙朱書可召南宫流火之庭監橋超度大神周旬字曰之身長八尺三梁冠緋袍仗劒立橋之西召引䰟超度上橋大神符召遣呪朱陵朱陵流火神庭神吏奉命執符而行引斯滯𩲸上升南庭神䰟變化煉度更生急急如上帝敕右符黄紙朱書召引䰟大神長八尺三梁冠青綉袍左手搯三指根召䰟訣右手持旛立橋前祝令引䰟升橋玉清生化保度天門寳符元始玉文保度亡䰟徑升朱府上詣天門魔王敬禮萬神護迎玉清元命逍遥上清急急如上帝敕生天度命法橋符右符書於橋綵後上中下書三道上帝訣青黄白炁吹之次歩引䰟罡至橋所再歩升度亡人罡存用引䰟罡升度亡人罡歩二罡畢存身爲救苦天尊左目出紫炁三道右目出霞光五道遶橋三匝黙呪曰仙人玉女左右仙聖金飛靈旛㧞亡上生下元生靈隂司亡䰟立至玄壇引領大將玉柱仙靈三䰟七𩲸引領大將速速報應能言通語大賜軋坤江河日月八海五門諸天大聖引䰟上玄速度仙橋不得夂停右存二目光相交接引亡䰟升度法橋又呪曰乹元亨人八卦九元十二月將九宫大將二十四炁八旺八門靈通變化大聖真靈赴吾壇下引接亡䰟次存心中有真火自口中出數百丈存亡人乗火光升橋兩手午文呪曰汝受大羅真籙長生逍遥手執真符不経地獄一心朝上帝敕汝速超生上帝有敕奉行神王升仙車式師曰凡煉度法用綵帛作紫車一乗以神王二人擁車五馬牽車車中安亡人位度橋了焚之不可用召亡旛盖此旛於煉度時已焚了却换紅旛度水池焚之次以黄旛隨車以童子導引而度天門次搯五帝訣焚之焚車呪天尊威神力救度衆生䰟祥烟塞死戸慶雲開生門還將上天炁以制九天䰟混然歸一身皆成自然人得馭紫雲車上朝泥丸君三界无遏難永脫輪廻津甘露池符甘露神呪澄澄甘露滴滴瓊漿善則酥乳惡則冰湯九幽䰟識七祖除殃愛河清徹苦海輝光孤䰟不溺滯𩲸無傷元真勑命告示十方右黄素朱書玉訣於南宫前立一盆以甘草杮蜜煎水盛盆中焚符啓祝念甘露呪以符燒入盆中先存盆爲寒池燒符念呪了却想爲甘露謂之破苦寒池作甘露池也乃靈寳祖法是靈寳天尊賜南嶽魏夫人及許真君行之度池中䰟消萬劫罪累矣池邊祝云伏以圎池方沼象天地之形甘露寒池應苦樂之兆由是酆都暘谷泛灔渺彌泉曲河源深闊浩蕩善用者如酥如蜜惡報者似火似湯入此愛河名之慾海若也澄其五濁去其六根却其十纒除其三業則當易穢汁爲甘露變寒池爲香湯隂府開明沉䰟超濟今某設九幽之妙供㧞七祖之靈䰟兼濟有情普資無碍故變寒池之水以爲甘露之漿潤澤九幽通和十極即使䰟神清淨𩲸識超甦大度法橋上登朱府奉爲加持甘露神呪次念呪焚符存用如前上清靈寳大法卷之五十三
