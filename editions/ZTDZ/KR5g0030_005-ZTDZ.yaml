front:
  text: 上清靈寳大法卷之五欝五
  hash: sha256:2677601a9bbfa64dd807d96cbb77fa66432cefb287a035167128cfb1a6489331
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5g0030_SJB_005-300690b, image: sjb/30/300690b.png}
body:
  text: 洞微髙士開光救苦眞人𡩋全眞授上清三洞弟子靈寳領教嗣師王契眞纂修錬吐納門内朝三景金闕師曰修用大法未能洞達天眞威化不備魔試交攻神祗不欽所召不感當内朝三景飛仙分形之道其法於辰戌丑未四時朝之先存心中中元司命神字玄堅乃中極太一君也下在脾中玉堂宫又曰王房是太一君偃息之所也主養兆一身眞形炁質於四時當叩齒五通存黄炁滿脾脾上有一眞人如嬰兒衣黄衣呼之曰中極玄堅太一眞君某欲得眞人神仙黄庭之道五呼之同眠瞑目五十息此中央司命神丈人下化太一帝君乃九天天神之父也治太極宫知者形不入地獄玉童玉女侍之役使萬神常以寅卯午申四時朝上元太一神君號南極老人下在太一宫中主兆魂魄胞神命炁胎府之父也於此四時叩齒九通存頭上眞人入一寸名太極宫又號太一宫存赤黄炁滿宫中炁中有一眞人如童子狀衣絳衣呼之曰南極元先太一眞君某欲得神丹長生不死之道如此九呼之同眠瞑目五十息念之九十息正修之者延年不死可變化神仙滅魔試致眞仙常以子亥已酉四時朝下元玄元道母下在雙合宫中雙合乃腎也對上南極故號北極主兆精炁生死符籍之母也於此四時叩齒四通存腎中有白炁炁中有神龜龜上有玄女青白衣如姹女左有司命君青衣天冠右有司録君白衣天冠呼之曰下元元辰北極玄道母字玄妙某欲得金醴玉泉可飲食者乞勑司録司命削某死籍更注長生役使六丁玉女坐致行厨如此四呼之同眠瞑目念之四十息止以時不廢日月久行應感無窮九年得𥙷太極仙卿一年便有髣髴役使神靈所欲無不應心常念勿妄獨慎其口尅日成仙乃洞玄三皇帝君所行實靈寳之宻機亦盟天告師而行矣當佩服五方内音玉字依法修錬造玄入妙秘之内誦洞章師曰三十二天之根有西元龜山元録内有丹黄飛玄紫文空洞靈章是也故色界魔王章云我有洞章正是此文也飛玄紫文章曰飛玄紫炁凝神根綱維玉靈總萬神空中鬱勃結自然上有稜層十二傳玉樓巍峩耀景雲流精紫闕帶金軒瓊臺瑋鑠繞八騫中有青金九靈仙丹皇眞母號精延飛青羽䙱晨纓冠手執玉節握靈旛五色命魔對帝尊把持符籍當生門咀日嚼月吸醴泉離羅吐輝錬五魂内充外溢絳府欣金光煥煥形正圎從朔入金色沌沌惟有開明曉此言日五月十精北元克見華蓋領仙君紫炁左回與斗連歴度四七入金門正是丹皇校萬仙有明此訣加精勤披形宻思毎令分妙景感㑹得要文三年當審保長存九年乗空致羽裙鳯衣輕翔升龍山俯仰九靈謁玉晨凡修此道自正月止十二月一年毎月中取三日五日九日十五日二十五日乃一月五次至日清齋以半夜後誦詠飛玄紫文一過仰視西方金門之上若在人間天隂無光當於室内黙念内思如法思紫雲自金門左回歴斗箕回繞北斗竟還金門之上毎令分明思畢當心拜紫雲四過叩齒三通仰心祝曰天夜朗清幽虚啓眞流雲徘徊金華四騫丹皇散暉靈飛紫軿是夕開陳清舍校仙成我上願體應自然結命月華保年日根三靈合景停景龍山宻夜請披請如斯言祝畢便以口鼻引日月紫雲之炁入身咽液二十八口止存身化爲玉虚上帝二十八宿星斗纒絡行此三年於夜卧之時别有神眞降體及兆寢室中也身有紫雲映滿一身九天書名列字玉清九年徑證上仙此無量度人之功仙道貴哉學仙之士勉力行之毋玷於靈寳之道則幽明仰頼矣師曰天有紫雲之炁干於日月五星北斗之分在其方國皆有合道之人得仙之君如此了候其象自見紫雲便依文禮視不必須常日也勤加在意克得雲降升騰有㑹也況紫雲黄炁光明徘徊於巖谷如茵如蓋或赤白黄青紫絳青黄白或五色雲炁光明四面丹霞者皆天尊上帝出遊在山谷者有得道之人居也又宜徃此而修錬或俯盻仰視眞人而㑹見時急燒香再拜陳其心願勤而行之必見帝尊之容立致飛昇止可封之於心不可輕示於人道泄則靈散無復成仙矣如文始先生尹君侍金闕聖君爲標凖也勉而行之經曰眞中有神長生大君无英公子白元尊神太一司命桃康合延師曰此二章之中大洞之道上道禁經有九眞中經止議長生大君變化萬神凡人之生太微降炁生人方始分形蛻胎自生之後三萬六千神備而壽至三萬六千日神盡歸太微中則曰鬼也鬼曰歸也而一生罪咎損炁抛神自取死壤故有不滿天年而夭亡襁褓者神不全也神不全則形不固況小罪折一筭而北斗追取三目之神大惡滅筭一年則拘去三萬六千神炁一小善則増一筭而三日延生𣸸神一太功則益壽一年而三百六十日廷壽降神所以増減也此之七神乃北斗隂神又曰玄丹太一亦上道禁典若知此道則𣸸神益命萬劫長存元尊長生頌曰中元有斗主魂魄玄元太一七隂神手握靈旛攝百神與奪善惡増減形一筭三日除其生一歳三百六十停有人知此運七靈升入玄天開七門三魂鼓舞合一形百神懽悅歸無淪欲得此道何所云元谷火起飛七神徑入身中開玄關再拜扣搏天地間回元惡逆除死名降神益筭保生成可以分形爲億千可以回骸致天仙黙黙内外萬物忌猿馬死而隂返陽此道秘而勿妄傳守之億劫永長全刻金列盟奏三天輕泄永閉於河源但須守心使石堅百日神全活根元召祭身神師曰人之一身之主存乎神炁神炁符合則通眞達靈神變氣凋禱何能應況一身靈寳五符秘序有召神之法乃萬道之首衆法之先兆宜動行其法當於甲子本命及月中二日十六日晦日一月五次入靖備我心中所好飲食潔素酒果八品而已先面東正坐收心定息凝神頃時上香三次叩齒二十四通呪曰丹天眞人太一眞人桃康眞人胎光眞人幽精眞人爽靈眞人眉神天雲腦神元老頂神東王耳神嬌女目神英明髪神長壽鼻神通靈口神丹朱舌神丹皇齒神衞士喉神虎賁肩神鬱靈手神魂隂心神呴呴肝神臨臨肺神祝祝臍神玉靈胃神阻阻脾神禆禆腎神漂漂膽神獲獲丹田神藏精大腸神託託小腸神梁梁陽神窮英腔神隂隂膝神區區腰神孔男足神天丁力士呼之三遍再祝曰汝等出吾身中各各請坐前後左右自依本位今日吉日祭祀汝等任意飲食哺飱醉飽爲期祝訖存神如已者百十人揖讓兆取飲食隨性任量飲食以盡爲法又曰汝等旣醉且飽欣樂無極毎遇吉日祭召即至常日之時勿得離吾未來吉凶汝先報吾知吾身常存汝等亦存善有悲憂汝等亦秋或有仙藥致之取之令吾所食令與汝等長生萬劫變化爲期汝等即還吾身中各安所治急急如律令師曰坐知未然尸解朝元升仙通眞以此爲先十祭之後與兆受言百祭之餘可致神仙金丹靈芝飲食俱全泄之一語折壽十年自致不靈慎勿妄傳解結塞死戸法師曰凡人身中眞炁與諸天炁合人以胎生胞中復受邪炁與正炁混雜故人身中有十二結三十九死尸當先解十二結三十九死戸則人之眞炁上與天通戸解結有經塞死戸有大洞三十九章雄一雌一廻風混合之道雄一帝君雌一帝君乃兩自中瞳人也雄一長四寸在人之下唇内坐以聽誦經雌一亦長四寸在上唇内坐以聽誦經況人之三田毎田有四結并十三死戸解結之法誦解結經請道父道母之炁先解下田結去了次解中田後解上田塞死戸之法誦大洞眞經三十九章請三十六天正炁自下丹田起至中田至上田止逐段請一天眞炁上合三十九天正炁歸於一身號曰帝一即是人之眞性歸於黄庭凡誦經先存曰炁次有紫炁自二手心二足心及臍心五處出纒一身滿室以至一天周匝畢復歸身中混合日月師曰人之三田皆有眞土毎遇子時後聚左右二腎眞炁於下田丹元存如五色纒絡一丸中含眞性以意行十轉之法以意送從羊角而升直抵泥丸中眞炁混合復從玉樓降下留在黄庭與心炁混合復運從夾脊而升循泥丸一遍復降在黄庭存黄庭有一天尊如巳形服此眞炁自子午二時行此法三次午時以後却用心火降在黄庭中想天尊在大火中坐凝然不動依坐忘法歸息法毎一呼自丹田起即存其息納在黄庭使天尊納咽每一吸自鼻入亦存其息納在黄庭中天尊納咽凡濟生度死一切行事便出黄庭天尊居泥丸合五臓炁皆在混元宫黙朝錬頂師曰毎日寅午戌三時入靖先以訣錬其頂通其天門然後變神乃元始親授妙行眞人天眞皇人升舉之口訣也秘之金寅吒丑金辰吒卯大中力中上勑午岀左年爲之次两手玉靖訣存身爲白鶴仙人法存天門開有白鶴至存我身乗鶴飄飄而升直至三天之上見元始頂放九色金光注入我頂中次想巳身萬竅流光遍照十方世界畢然後再乗鶴回治此乃受元始之靈寳秘訣如有啓告即俯伏王墀而奏若上章亦如此法朝元法師曰平居無事當居靜室焚香精思使神不離身方可飛歩朝元朝元之法存上中下三田各有天尊却存中下二天尊乗五色雲炁與黄庭中巳神同自絳樓而升直至泥丸存坐三尊皆在玉局自巳却在玉局前長跪奏事畢却存三境中三尊乗三色雲炁來泥丸上與巳中三田天尊混合共成三尊却存此三尊同成一尊乗五色雲炁從絳樓下入黄庭住却行定法眞靜師曰觀心之道須是内觀其心心無其心外觀其形形無其形逺觀其物物無其物三者旣悟惟見於空觀空亦空空無所空所空旣無無無亦無無無旣無湛然常寂寂無所寂欲豈能生欲旣不生即是眞靜眞常應物眞常得性常應常靜常清靜矣人能如是然後身得虚無性回太極可以接物利人超凡入聖此是正道切在行持自此蹊徑從無入有行日月混合之法安養聖胎全備夢寐之間與日間無異方可行持大洞廻風之道得聖身康徤出入自在然後可以廵遊諸天瞻禮虚無金闕夜卧法師曰凡卧先展開手足仰卧後存思五臓訖却存天尊在黄庭中凝然而坐放大光明十方照耀當此之時忘去身心留意内觀原我當來初生之神如何凝湛如何日用役使我形其神如何而寓他日如何遷神如此沈思初覺神識昏昧少頃心地豁然覺得四炁寧靜曰月垂光雙照玄宫之中所存天尊分明端坐更無一㸃塵翳歷歴聽得仙宫妙樂及見世界種種竒異可觀之事但不可著相怨神流蕩此是本性之明經中所謂湛然見玉清境也仍須日月行混合日月之法可以養本性貴得陽神强壯可以倐忽萬里初有本欲之時須是把定身心恐身心不定却成顛風告終代形遏厄尸解法師曰靈寳之道有神通䇿杖以制六天鬼神䇿役三界萬靈造䇿杖之法須擇名山福地淨域靈壇用吉日取向陽甘竹一枝長六尺通有十二節者選甲午丙午丁卯曰或三月三五月五七月七九月九將覌自上第三節右微曲一曲於曲凹中上刋日月下作斗形於頂中開一穴入中央守吏符於第二節下開四方四穴入四方守吏符以蠟封固訖下四方刋十方靈寳億劫應化天尊號功成以黄繒作袋盛之袋之長短隨杖爲之自初一日爲始依十直日時呪面五方誦呪取五方炁吹仍毎夜存思一年炁足方可施用又一法長五天五寸通九節於第二節左曲於第三節下四面開竅入王岳内名符又實以靈書中篇如佩持修用則用靈寳五符入杖中一法杖不曲受持之法坐卧起息常以自隨或不可隨身之地則置於潔淨處受持旣乆以杖指天天神設禮以杖指地地祇送迎指東北方萬鬼束形指破地獄亡魂返生所指災厄應指崩傾乆乆精勤脫衣蓋竹隱形岀入也凡用杖破獄於第二節下懸一小黄旛長七寸旛上書十方救苦天尊符及十天玄化符别有施用如常行佩受則去旛子凡施爲當叩齒三十六通存五帝直符各一人隨五方色服五帝玉女各一人侍衞䇿杖有五色之光映流杖上微呪曰太陽之山元始上精開天張地甘竹通靈直符守吏部衞神兵五色流煥朱衣金纓輔翼二眞出幽入𡨋招天天恭攝地地迎指鬼鬼滅妖魔束形靈符神杖威制萬方與我俱成與我俱生萬劫之後以代我形是爲五解神升上清承符告命靡不敬聽右呪畢引五方眞炁三十六咽止或以三元八節本命生辰請炁行侍焚香朝禮或旦旦行持誦呪精神不倦神眞現形杖則載人飛行功满德就以杖假形倐歘之間成眞人矣夫五解之道乃五行眞炁奪北斗之權衡脫離死厄尸解得道神升上清木解法毎日面東持呪九十遍服香湯一盞存杖作巳形九年可以木解呪曰文波畫烏魚波畫咖耶波畫三台波畫此日生身度道七七功德上升千變萬化潜身上清杖化我形急急如律令金解法毎日面西持呪七十遍服香湯一盞存杖作巳形七年可以金解呪曰三台生我傳法三台養我逐天三台護我升仙通風度尺斷應當義復形本元急急如律令水解法每日面北持呪五十遍服香湯一盞存杖作巳形五年可以水解呪曰靈龜散炁入吾杖中吾有大道與俗不同出日入月驅虎逐龍去代我化泉脉相通急急如律令火解法每日面南持呪三十遍服香湯一盞存杖作巳形三年可以火解呪曰朱雀居吾前吾握造化權三官護我命五帝注生全支波烏神火化令吾性神兩全急急如律令土解法每日仰面向天朝東立持呪十二遍服香湯一盞存杖如巳形十二年可以土解呪曰元始黄龍旺在四時中宫正位權首施機主制上司吾奉帝勑汝今代吾以假吾威數執十八戊已之期急急如律令五嶽内名符青地紅書赤地黄書白地黒書黒地白書黄地白書右五符隨方納於扙中五帝破獄䇿扙符金闕化身真炁周流慧光煥景金虎破幽上清靈寳大法卷之五
