  text: 上清靈寳大法卷之三十一飛七
  hash: sha256:1e078e8319eef871788c2ba2c5c98d0c9c51600e5396d935005befc0fea178ff
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5g0030_SJB_031-300934a, image: sjb/30/300934a.png}
body:
  text: 洞微髙士開光救苦真人𡩋全真授上清三洞弟子靈寳領教嗣師王契真纂齋法壇圖門齋法總說師曰謹按清微寳格云隂功有徳超祖考陽徳顯然福一身何不立功救無間自然天帝賜子真亂臣賊子永沈淪猶被殊澤化昆蟲九年諸天稱恱慶白日乗雲朝玉清無間者幽隂苦爽也修度人玄理求必仙之要路者非普救無間幽隂苦爽也夫幽隂考治之宻㫖各有攸宜凡世之四生六道輪轉生死無有休息若非超出三界體入自然焉能解脫輪迴之苦也且人道也至戎蠻夷夏正化不及日月不照之地但有三業六根五累者皆生人也普統於北天北方有三宫鬼官主之非清泠青華紫微三官也此之三官專主三考報對若身業重則火官考心業重則録官考口業重則水官考若六根三業俱重則風刀考也人之生也父精母血凝骨孕肉而化生形質胞胎結育十月全儀太微降氣生神夙性隨化䰟識方始生成爲男則天尊有位爲女則元君有真但縁三業自造六根牽纒數盡歸空隨業受報肌尸沈於土壤䰟神拘絆冥郷非宿世而横亡者社令土主閉繫長夜永無出期倘若𡨚業酬還俓歸鬼都萬載亦未超生或罪多而功少歷五苦而始有托化之漸設若功多罪少經一塗畢而便證輪迴之福罪福俱鮮逐業報生無功罪大萬劫沈淪火官考則銅柱鐵牀銅汁鑪炭火濠天河火車鑊湯之報或水官考則氷池寒塘毒汁糞穢之報或録官考則金槌鐵杖之報或風刀考則屠割鋸解飛戈飄㦸抜舌犂耕迅雷烈風八逹交刃割切身心刀山劒林分解形體火犬毒蛇穿嚙骨肉然膏灰骨灰粉神軀晝夜之中萬死萬生業風吹洒應時復形罪若淺薄苦盡化生尚猶不失人路多生卑賤不具相貌之人或生四極戎狄蠻夷之域罪重業輕生於六畜之形十世五苦再循人道若也罪業重大風刀考掠之後散飄神䰟飛揚萬方隨其胎卵濕化化生分形微細昆蟲永無再生人身之路更有罪業少而過名大者備經三塗五苦之後方入餓鬼之門再生劫運拘爲長夜之域擔砂負石漣汲溟波驅雷役電逮後之後托化鬼道醜惡之報億億劫中永沈隂𡨋於是辛玄子酆都記云有胎生之鬼是此也旣生人世行止施爲惟罪是修意志情累皆爲根業善事善業彼求報此惡事惡業此求報彼一失人身便有此境至於酆都北帝啓陳上曰先縁不幸身任冥司動經億劫不覩光明而況下鬼罪鬼也今故遵承太上慈訓示此因縁使學士覩兹苦報㫖趣存太上慈悲之念發慈悲之智惠行慈悲之法門證慈悲之妙道使苦爽蒙慈悲之恩徳豈不樂哉是以祖師說是救苦度人法門萬卷千篇作苦海之舟楫爲成真之徑路上學之士發此慈悲心者慎母曠慢反墮功徳勞而無功也師曰九清之上有無上大羅玉京金闕中有盟真之科祕於玉匱中乃靈寳普度幽明之法門也自赤明開圖之始元始天尊所說救苦抜罪之靈篇與諸萬聖結約證盟誓願於億劫之中救度苦爽故曰盟真也盟真之典有三品焉上有上元金籙之科中有中元玉籙之科下有下元黄籙之法總而言之謂之無上盟真玉匱黄籙普度幽明無量大齋也建置之法先承投詞之㫖次卜地㳙吉吿齋嚴命同學同志入靖對齋預告上穹修札關告十天九地三元九州靡不遍通持誦經號敷宣科儀行香修齋建壇貢章頒符請命召攝顯現以伺感通功周幽顯名列玉清普天懷徳功莫大焉當按齋法次第關行慎勿妄示混淆三元罪在不赦若遇真人不行流演閑塞道恩天憲立至兆宜契勘人才骨相而付焉鎮信章師曰古人淳朴懷道抱徳不貪不欲各足於身但用至誠自可通感不須財寳玄合天真末代時澆人民矯詐惟吝財貨不識因縁賤命重財亡家破國内懷萬惡外結凶奸相繼滅亡未曽自悟念是之故令遣散之一則外賊不起内外安靜衆禍消除所以質信効心以財爲首財旣可捨心亦隨之聖善冥通隨夫心意髙天厚池玄聖上真非信不通非心不感通感之致在乎心焉金龍一十三條十條鎮十方三條投三簡科曰各重一兩長三寸六分國家用上金公侯大臣用次金庶人以銀鍍金並可通用夫龍者上天之驛騎也傳逹通感龍騎爲先負簡即騰信三官効誓則告盟十極鎮信之法以龍爲首闕者考屬隂官曹鎮綵十一段十段安十方一段命信安中央科曰東方青紋九南方絳紋三西方白紋七北方皂紋五上方碧紋三十二下方黄紋三十二四維黄紋各一十二總十方合一百三十六數國家用匹數公侯用丈數士庶用尺數命信一叚天子公侯用紫色士庶用本命細音色匹文尺數各隨齋主本命年數外加一數以表延生之信紋繒者顯五行之色象十方之炁降十天致五帝通真効信請命祈靈不可缺也闕者考屬天官玄都曹紙墨筆硯一十副鎮十方紙毎方一十二幅科曰建齋行道或救抜億曽萬祖先後亡靈或請福析恩消災謝過則四司五帝三界十方紀録善功校定罪名故以紙筆爲録功紀善之籍質信於十方不可缺也缺則十天不録其功九幽三官不除其過闕者考屬三官曹香華十柈鎮十方科曰以香者通感爲質隔氛去穢華者以鮮潔爲美表瑞效真請福祈真香華爲本香以沈箋降真華以香潔木生者如無華者可用五色綵剪成以鎮十方不可缺也闕者考屬隂官曹鎮来二斛四斗或一斛二斗科曰米以質信天官増加品禄闕者考屬天官曹鎮油二斗四升或一斗二升科曰油者隂𩔖也隂中生陽以油鎮隂官續陽景闕者考屬隂官曹鎭炭一百二十斤或二十四斤或一十二衆科曰炭者陽𩔖也陽中生隂以炭鎮陽官資隂氣闕者考屬陽宫曹鎮錢二萬四千公候二十四貫士庶一十二貫或二貫四伯或一貫二伯科曰二萬四干者以代上金之信質心三界告盟十天闕者考屬天官玄都曹玉璧一十三枚十枚十方三枚投龍簡科曰玉有貞潔之徳可以冥感上真故以爲信也十方璧圎其形虚其中各徑二寸四分厚二分投龍簡璧天官用蒼璧青色圎形虚其中地官用黄璧方形虚其中水官用玄璧黒色六出形虚其中並徑二寸半投三簡以金龍青絲金鈕纒而副之青絲以代割髪金鈕以代㰱血上告三官也闕者考屬地官九都曹槿木簡三面科曰簡者記也紀世之功告盟上真上下正方各長一尺二寸闊二寸四分厚二分國家以玉爲之玉有九徳禮天地之信也巳下皆以槿木或栢木爲之丹界五行丹書國號年辰建齋之所及法師姓名投於名山大洞靈泉龍穴及埋齋壇之中告天地水三官使者明齋事奏于上境闕者考屬地官九都曹金鈕二十七枚毎一簡用九枚科曰各徑九分圎其外如環之形國家用上金大臣士庶並以銀鍍金以青絲纒龍簡投之每簡用九鈕者見於靈寳經法中餘並從廣成本科後世不敢増易惟書簡則廣成科不載符止真書其一面若經法則篆文於一面用與不用更以理推詳之威儀章師曰太上三尊居玄都玉京之山七寳玄臺紫微上宫十方世界上聖髙尊一日於寅午戌三時旋行朝謁執符把籙建節持幢吟詠洞章燒香散花奏鈞天廣樂鸞唱鳳舞萬真稱慶三界齊懽今之齋法登壇朝奏步虚旋繞盖取於玄都玉京也威儀法式莫不備焉飛空霓旌一對似節無龍金鳯綬帶三層五色絲爲之懸竿朝元朱幢一對珠盖珠綱八角一層懸竿木胎左龍右虎金龍㗸綬帶含虚散絲節一對五色絲爲之上下五層懸竿頭上金鳯㗸綬帶殊妙寳翣一對珠錦玉珮金鳳㗸之懸竿五明羽扇一對以木刻成金彩装飾上布日月星斗中列五嶽下繪海嶽豎以朱竿鶴羽一對以木刻成鶴翅豎以朱竿燈燭行道禮誦燈燭爲急非惟啓奏所須抑亦消禳所用經科具有多寡要在隨力所營或止依金籙簡文所載然之照耀諸天續明破暗下通九幽地獄上映無極福堂功徳之中此最爲上或兼諸香液雜以蘭膏各令合儀自然降福然燈者所以續明照夜若太陽巳出當令侍燈依式㓕之今世亦然燈燭所當除革壇幕章師曰禮天地道真靈當建壇以伸至敬三洞齋儀壇格各有等差規範不同各見本法今專敘黄籙齋壇故不泛及具式如左靈寳昇度玄壇式按下元黄籙簡又靈仙品曰抜度罪根威儀當於中庭開壇四面當擇吉地建立要在洞天福地名山靖廬玄壇宫觀不經兵陣戰場屠坊刑獄生産冢墓坊圏穢惡之地乃爲吉地也要取方位端正坐北向南若所在屋宇基址坐向不同當以方位定其四方或偏或背却所不論切不可取屋之端正而易壇之坐向也建壇之法或壘以寳磚或砌以文石或竹木暫結或築土創爲務合規程以崇朝奏之禮或建立天寳之臺取法上境建齋行道以壇爲先如朝㑹玉京山也其法當露於三光之下以竹木架構用茅盖頂壇心之中上開天井備雨屋以防風雨若晴明則勿用也杜廣成有曰常情以露壇爲宜然誠之所感則九天非遥志所不通則跬歩爲隔若丹禁動於真靈注念合於神明豈屋宇之能蔽乎且敕壇之後尚不可壇内逆行及外人干犯真靈科禁甚嚴況晴雨不常倘或關奏之際風雨驟至失雍容庠序之規有匆遽奔馳之亂首尾旣紊誠敬全虧故儒家沾服失容不祭盖虞於此耳以此論之則壇在屋下終始周旋固無失於禮容自可期於通感黄籙簡文云壇之上層四方四角上方下方合作十門方闊二丈四尺於十門之外開天門地户日門月門四角合作一門方廣三丈二尺名四界都門安八卦纂榜盖經中所載止云兩級乃法天象地之義也今按廣成儀範立壇三級上層方廣二丈四尺中層方闊三丈二尺下層方闊四丈或上層一丈八尺則中層二丈八尺下層四圍止闊三尺亦可盖中層欲拜跪不可狹也每層各髙二尺三寸或一尺二寸或一尺五寸或九寸爲則倘地形窄狹不可從科未免隨地之闊狹屋宇之髙低先量起爲則方可定其大小髙下之規模耳或就平地立上下二級亦可務在變通不可膠柱上層十門用長纂二十枚短纂一十枚門牌十面中層四門用長纂八枚短纂二十枚門牌四面下層八門用長纂一十六枚短纂一十六枚門牌八面三層通計長纂四十四枚短纂五十四枚長者各髙一丈九尺出上短者各髙七尺六寸入土長短總九十八枚張清都科只用六十四枚盖止兩層壇外正列八卦纂耳纂之長短不然只隨屋宇之髙低定其長短亦可若分列其纂亦隨地之闊狹施設但要踈宻相似其纂並用朱漆雕木爲額漆𥁞作蓮花火珠之形門之兩旁並鏤刻日月瑞雲之像務在精巧其門牌總二十二面各廣三寸三分長二寸四分隨方用五色裝之上書門額三層並於兩纂之間安一燈纂頭並造五色蓮花燈互相交間遇夜然燈共九十八椀纂之三層用絳繩或青繩三度縻之第一度自長纂花頭下連門通攔之第二度自短纂花頭下攔之第三度去第二度二尺來許攔之要與第二度繩髙低相似其第二第三度正攔空處勿攔門也長纂之頭並十字交加綳繩懸掛小旙枝花之屬旛花相間三層一同壇面上鋪䄄席共用三十八副壇外二層以黄布十二縑圍之上下整飾務在精嚴上層門外四面掛三十二天旙旙隨方色分之壇心頂上懸三天旙隨方掛五方衛靈旙壇内施帳座寳盖列太上三尊之位中安神經四圍安十方洞案隨方分列鎮信香花鋪置如法又安科案二隻止於乾方天門開一門出入乃法天也中層分布六職衆官位次止開東南巽方地戸出入乃象地也應登齋行道並自地户出入餘門不可往來下層於正面開離宮一門出入壇外四圍如法鋪燈壇上隨方以儀衛諸符標揭三層之外别立花柱各髙三尺或五尺護淨隔几中開一門出入而已餘悉以青繩縻之每壇一面分三人執威儀立共一十二人常行整肅不可踈宻遇歩虚旋遶亦各依次而旋行之壇前左右分立六幕十二堂陛分司治事若小小齋事不必築壇止於道場行事也夫登壇以代元始應化故先造威儀以制萬天今依大法立諸門炁四圍燈圖詳具于後上層十門東方卯地青華元陽門用青榜朱書南方午地洞陽太光門用赤榜黄書西方酉地通隂金闕門用白榜黒書北方子地隂生廣靈門用黒榜赤書東北寅地靈通禁上門用黄榜白書一云黑書東南辰地始陽生炁門用黄榜白書一云朱書西南申地元黄髙晨門用黄榜白書西地戌地九仙梵行門用黄榜白書一云青地黄書上方玄地大羅飛梵門用白榜青書一云青地朱書下方巳地九靈皇真門用青榜黄書一云黄地青書又本以日門湊東北角月門湊西南角合爲十二門日門用紅榜黒書月門用黒榜白書中層四門或八門亥上天門黑榜青書張清都云黄地黑書巳上地户赤榜黄書張清都云黄地赤書寅上日門青榜黄書申上月門白榜黄書又本以日月門湊上層兩角於中層立八門乾宫天門黄地青書坎門黒地青書艮宫鬼戸黑地青書震門青地黑書巽宫地戸黄地青書離門紅地黒書坤宫人門地白書兊門白地紅書下層八門或十二門震宫洞青之炁正東卯地黄榜青書離宫洞陽之炁正南午地白榜朱書兊宫少隂之炁正西酉地青榜白書坎宫洞隂之炁正北子地赤榜黒書艮宫少陽之炁東北寅地黑榜青書巽宫梵行之炁東南巽地黒榜黄書坤宫梵隂之炁西南坤地黒榜黄書乾宫梵通之炁西北乾地黑榜黄書本立十二炁門子元陽之炁紅地黄書丑洞隂之炁白地黑書寅少陽之炁紅地青書卯梵元之炁青地紅書辰梵行之炁黄地青書巳洞陽之炁紅地黄書午梵陽之炁青地朱書未梵真之炁紅地黄書申洞青之炁青地黄書酉少隂之炁白地黑書戌靈梵之炁青地白書亥梵通之炁青地黄書内壇門牌篆式長華元陽門洞陽太光門通隂金闕門隂生廣靈門靈通禁上門始陽生炁門元皇髙晨門九仙梵行門大羅飛梵門九靈皇真門中壇門牌篆式天門地戸日門月門人門鬼戸又本以日月二門居上層以天門地户人門鬼户居中層故併存之外壇十二炁門牌篆式洞陽之炁梵陽之炁梵真之炁洞清之炁少隂之炁靈梵之炁洞隂之炁元陽之炁梵通之炁少陽之炁梵元之炁梵行之炁上清靈寳大法卷之三十一
