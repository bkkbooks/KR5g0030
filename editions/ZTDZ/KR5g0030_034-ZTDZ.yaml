front:
  text: 上清靈寳大法卷之三十四驚一
  hash: sha256:fa10f22e4c9acc1f0b7c77115c3f6f2acd841b381ab24ce2692bb99b0209c93b
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5g0030_SJB_034-300954a, image: sjb/30/300954a.png}
body:
  text: 洞微髙士開光救苦真人𡩋全真授上清三洞弟子靈寳領教嗣師王𢍆真纂齋法壇圖門獄燈圖像章師曰凡建大齋須當破暗續明開赦諸獄赦諸罪爽當按圖像如法鋪陳今具如左九巵九壘燈圖師曰救拔之格宜如法造燈𣗳其下立天地輪以圓象天以方象地分三輝而照九壘列八極以居中皇自初終亡至於七七使燈光相續照破幽關建燈之法以梓木作一燈𣗳上分九巵一巵安一燈下用淨土作壇三級上圓下方上層安燈𣗳𣗳上懸旛九首中層立九炁牌安燈九盞下層立九壘皇君位牌安燈九盞三層共二十七盞外立八卦八門然燈八盞使上照九天中照九野下照九壘通光九道外照八極周回十方計三十五盞乃二十五分總炁上玄之法也九炁牌帝真胞命元元一黄演之炁帝真胎命元洞𡨋紫戸之炁帝真䰟命元長靈明仙之炁帝真𩲸命元碭尸𡨋演由之炁帝真臟腑命元五仙中靈之炁帝真靈府命元髙真沖融之炁帝真元府命元髙仙洞笈之炁帝真華府命元真靈化凝之炁帝真嶽府命元自然玄照之炁九壘牌第一壘洞淵澤地土皇君第二壘金剛澤地土皇君第三壘石脂色澤地土皇君第四壘潤色澤地土皇君第五壘金粟澤地土皇君第六壘金剛鐵色澤地土皇君第七壘水制澤地土皇君第八壘大風澤地土皇君第九壘洞淵無色澤地土皇君九幽獄圖師曰按法天象地方圓爲式九幽曹主罪憲職羅酆東南巳地是其所也按大一聖真之科以砂土作壇九所方闊二尺九壇一同總方六尺以法地之隂極二六之象毎壇作四角三曲如獄之形毎獄明登三炬九獄共二十七炬九獄之心隨方立牌牌上面書破地獄符見齋法符篆門背寫獄名上懸九旛有式在旛盖章又式作黄旛九首篆九天生神章符至破九獄燒九旛了却以此旛掛其位仍先立遷神廻黄旛使幽䰟覩之萬罪皆㓕也夫九幽者八卦中宫按九州分野各係社令主守在天爲九霄在地爲九宫化形爲九幽獄其名有九皆一炁所化一念所感凡亡人一念之惡其獄即現其報隨之故太上垂慈拯濟立九齋法超㧞苦爽當知其所出也一曰幽𡨋乃東方震卦九炁所化凡發生蠢動莫不待風雷之所驚故曰風雷二曰幽隂乃南方離卦三炁所化凡火數至陽爲陽極隂生之道故曰火翳三曰幽夜乃西方兌卦七炁所化凡一日之光並没酉地爲金方殺伐至剛之道故曰金剛四曰幽酆乃北方坎卦五炁所化凡炁候水數至子爲隂極陽生水旺於子故曰溟冷五曰幽都乃東北艮卦梵炁所化凡炁候至寅艮爲温柔發施之理木炁所生故曰鑊湯六曰幽治乃東南巽卦梵炁所化凡火至巳爲至旺之郷莫不爍爍鎔銅之熾故曰銅柱七曰幽關乃西南坤卦梵炁所化凡金氣爲西南肅殺之候故至人門之郷多生貪殺之心故曰屠割八曰幽府乃西北乾卦梵炁所化爲天輪運轉之象故曰火車九曰幽獄乃中央一炁所化是中宫土皇所掌爲中央緫制之治故曰普掠大凡建九獄本爲普度沉淪之設若建小縁上不祝君王而及寰區下不度九祖而及六道區區只度一二位之䰟則上帝豈特爲一人而能頒曲赦悉開九獄必無是理地獄未必皆可破幽䰟未必皆可度而我之立意無一毫及物之功豈本科之意也倘或專薦止然燈祝賛或建九巵燈之類足矣破獄之科不必舉行庶免僣瀆然孝子報親無非盡誠懴罪足矣豈可以我祖宗必墮地獄而行此科理之所在也若果欲行之却當隨宜設斛食度沉䰟不拘多寡隨力建功則破獄一節行之無慊矣盖無量苦奕沉迷有無一念既差終墮其獄若非祈天請命行符破獄何由解脫故當按法行之九獄牌東方幽𡨋風雷地獄南方幽隂火翳地獄西方幽夜金剛地獄北方幽酆溟冷地獄東北幽都鑊湯地獄東南幽治銅柱地獄西南幽關屠割地獄西北幽府火車地獄中央普掠幽獄九獄燈符九獄形緫九獄廻耀燈圖師曰盟真科典有廻耀降光之格懺除五累苦門法以梓木作輪如車軸之象上層然燈一十二盞中層一十六盞下層二十一盞中央五累苦門共四十九數也仍立牌寫諸獄名更造小旛四十九首黄白之色至相交間𣗳之須先立廻耀旛於輪之東南内外相應乃黄籙廣度幽䰟用之集兹功德以薦亡䰟能回三景之光曲映九泉之户使鐵城鎔解刃毒摧鋒拔度苦䰟咸覩三光徑生人天此本科也乆廢不用宜倣蔡致虚路時中儀以沙作三圍外方内圓如車輪様徑九尺外一圍作二十四輻然燈二十四盞立二十四獄牌中一圍作十五輻然燈十五盞立五累五道五苦門牌内一圍作九輻然燈九盞立三惡門三尸道三徒界牌當心立廻耀靈旛一首然燈一盞又以黄白相間造小旛四十九首隨燈布之懴燈畢就燈上化之木軸様内圍燈牌九并九旛睿號色慾門元靈隱耀天尊上尸道威光寳際天尊天徒界普照幽明天尊愛慾門隨機赴感天尊中尸道虚皇普濟天尊人徒界大慈救苦天尊貪慾門慈悲救度天尊下尸道无邊普度天尊地徒界法力超昇天尊中圍燈牌十五并十五旛號人道元洞王晨天尊色累苦心門普光弘濟天尊太山地獄苦道弘慈廣濟天尊神道通光普照天尊愛累苦神門法輪開化天尊風刀地獄苦道靈源普潤天尊鬼道慈悲惠愛天尊貪累苦形門神光廣被天尊摙山負石苦道玄上玉華天尊地獄道寳光通照天尊華競苦精門玉清玄上天尊作江河苦道慈恩萬善天尊傍生門金華慈慧天尊身累苦䰟門玄明梵行天尊吞火食炭苦道玉真隱韻天尊外圍燈牌并二十四睿號監天地獄廣常慈愛天尊玄沙地獄普垂妙澤天尊无上地獄開度无量天尊太真地獄光明寳華天尊虚无地獄隨劫救苦天尊火庭地獄㝷聲救苦天尊毒刃地獄无邊普濟天尊寒夜地獄九幽拔苦天尊律令地獄妙化無邊天尊風刀地獄廣常覆護天尊九幽地獄金華廣耀天尊刑正地獄聖力無邊天尊太平地獄廣大慈悲天尊清沼地獄無極快樂天尊玄隂地獄輪轉萬變天尊天玄地獄廣度沉淪天尊天一地獄髙皇玉晨天尊三十六天獄髙靈最妙天尊元正地獄慈教廣度天尊河伯地獄普垂惠澤天尊禁罰地獄廣大無邊天尊黄天地獄大弘普濟天尊累劫地獄隨念徃生天尊女青地獄開度宿障天尊廻耀輪燈二十四獄圖師曰按真人二十四戒經尺人生前造二十四種罪惡死後歷二十四報化爲二十四獄三塗五苦八難之場八獄共二十四獄按人身中三部八景二十四神之數多因在世貪着情愛設心邪境結節凝滓不能開通故盟真科典有廻耀之格假陽光燭破昏衢使鬼官罷對囚苦出離二十四獄牌第一鑊湯地獄第二刀山地獄第三銅柱地獄第四鐵犂耕舌地獄第五剉身地獄第六毒蛇食身地獄第七鎔銅地獄第八爐炭地獄第九鐡輪地獄第十運石地獄第十一鐵床地獄第十二劒林地獄第十三寒氷地獄第十四鐵丁釘身地獄第十五亂考地獄第十六大石壓身地獄第十七針錐地獄第十八鐵丸地獄第十九食炭地獄第二十磑磨碓搗地獄第二十一惡汁灌身獄第二十二㧞舌地獄第二十三鐵鎻鎻身獄第二十四鋸解地獄三塗五苦門牌天塗上尸死道色慾之門地塗中尸邪道愛慾之門水塗下尸惡道貪慾之門色累苦心門愛累苦神門貪累苦形門華競苦精門身累苦䰟門血湖燈圖師曰大鐵圍山之南有硤石獄其形皆黒旁有火熖下有血湖在東南一大石間上大下尖中開一縫罪人出入自有百藥毒汁灌身心獄號血湖産死婦人億劫沉墮苦不可勝穢惡之甚獄中有百萬鬼卒晝夜考掠乃翻體大神擲尸大神食心啖腦鬼王之𩔖也血湖燈産死獄酆都燈圖開通五路燈圖師曰凡建大齋當先開通道路釋放亡䰟法以泥座五箇挿白旛五首按五方安東方飛道大神南方横道大神西方直道大神北方遏道大神中央都道大神三十二天燈圖師曰燈壇作三層上層爲無色界四天立無色界魔王位懸十方飛天神王旛中層一十八天立色界魔王位下層十方天尊立欲界魔王位壇心立一幡幡上書三界大魔王師曰此圖按元綱流演之像上懸三十二天旛外開八門四圍立二十八宿牌九天燈圖師曰九天燈即九巵燈也若不用燈𣗳未免就地鋪之盖洞經中以第一天居中正在頭上第二天在南第三天東南四天在西五天在東北六天在西北七天在北八天在西南九天在東是也亦隨方立九炁牌上懸九天旛當依此圖如式鋪設今人以東北起第一天甚悖理也當細考詳生天寳臺上清靈寳大法卷之三十四
