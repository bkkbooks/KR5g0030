front:
  text: 上清靈寳大法卷之十六觀一
  hash: sha256:dc85730e270ed372bc41ae0caa01f20930492068a6cbefde9772dc96c63ec2df
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5g0030_SJB_016-300800c, image: sjb/30/300800c.png}
body:
  text: 洞微髙公開光救苦真人𡩋全真授上清三洞弟子靈寳領教嗣師王契真纂鎭禳攝制門赤書行用式法曰凡行赤書須先闗告古者修真之士以五篇鎮禳攝制或投於名嶽洞淵以削罪籍上名九天即此是也凡投簡如告水府大帝削除罪籍當用銀木簡朱書以青紙爲袋青𢇁纒之仍以金龍一條金鈕九枚用以匣盛投於三河之淵也如告五嶽靈山亦以銀木簡朱書籠鈕亦如前法埋於本命所屬嶽上或福地名山若告九地土皇亦如此式埋於所住之中宫也凡投簡之際發爐啓聖宣呪投簡復爐如式以文置之五方則五嶽仙官至若長齋百日精思不輟則天真下降但專佩此文亦得尸解朱書五色石上災殃自滅凶殘自消如不及到正嶽之山則於所居之地取四方之山亦可備五嶽但本命之方則爲命嶽取象以招靈炁神無所徃而不在然梵炁開煥岀圖度世無文不光無文不明無文不立無文不成無文不度無文不生故百魔隱韻離合自然因以治事隨事以用文故玉書之赤文中篇之秘篆皆可離合而用也九書簡畢上書法位姓名本命年月日時願神願仙長生不死之道如告水府則續之曰九府水帝十二河源江河淮澤溟冷大神乞削罪名上聞九天謹詣水帝府源金龍驛傳其首則同式其未別作一行書太歳年月日時於某處告下各以簡書真文却以簡之陽面書告文用本法印印之凢投簡北向叩齒三通讀簡文畢次執簡宣呪如式告水府呪元始五老上帝高尊十方至真太華靈仙赤文告命無幽不聞上御九天請下玉文日月五星北斗七元中告五嶽四方靈山下告河海十二水源九府水帝溟冷大神今日上告萬願開陳謹投玉簡乞削罪名千曽萬祖九族種親罪相連累纒及我身普蒙削除絶滅種根記名水府上言帝前七祖父母去離八難上登九天衣食自然我罪釋散萬神咸聞謹以金鈕關盟水官請如所陳金龍驛傳凢投山簡東向叩齒九通讀簡畢執簡宣咒如式告嶽府咒玄上開眀元始監真上帝五老赤書丹文天地本始緫領三元攝炁召㑹催促舉仙高上符命普吿十天日月星辰五嶽靈山天下地上冥靈大神監生主録南上三門開領玉簡勒名丹篇削兹罪書上輔帝臣千曽萬祖九族種親皆蒙解脫五苦八難去離三惡魂上九天死生開度萬劫長存今日上吿萬神咸聞謹以金鈕關盟真官請如所吿金龍驛傳凢投土簡於中庭向壬方叩齒十二通讀簡畢捧簡宣咒如式吿土府咒天地開張九炁分靈三元洞府十方肅清五老上帝開真領生丹書赤文元始上清普吿天下九土皇靈今日上告萬神定生我願我仙即得飛升謹投玉石土府太皇削除罪刑奏簡上宫列簿華清早得成仙天地同靈九祖種親腐骸更榮魂升南宫舉仙化庭今日吿命萬神咸聽謹以金鈕表盟至誠請如斯言金龍驛傳五嶽靈山投簡式凢遇本命日甲子日遇立春日則書東方赤書自東方九炁起止攝炁舉仙計二十四字如立夏日則書南方赤書自南方起止應㑹太陽計三十二字若春分秋分夏至冬至則書中央赤書自中央起止普吿萬神計四十字如立秋日則書西方赤書自西方起止制召上仙計四十八字如立冬日則書北方赤書自北方起止制到玉階計四十字並依本方色書白剌上記姓名年月如投簡九年則五方仙官到使青腰赤圭黄素太素太玄玉女來皆見投簡時叩齒十二通宣咒曰玄上高靈元始尊神大聖徘徊萬神臨軒三景敷榮慶雲四陳上告較圗推筭九天今日啓願投剌靈山丹書赤字自然真文上吿五帝記名玉篇萬神鑑映日月明言願度願生願神願仙天地星宿互照我身三官九府五帝大神普吿無窮削除罪根元始大開莫不納言九祖幽魂受福自然三塗五苦永離八難得與三景同輝紫宸輪轉不㓕身得飛仙宣咒畢讀剌了投於絶岩之頂便散香於靈山之上又叩齒二通向本命方咒曰元始監映仙名巳書三官九府罪惡永除散香五帝吿盟太虚請如所陳萬劫長居安鎭星宿禳度天災式五方赤書各主召其方星官天文分度及天災若安鎭之則隨方而釋若東方則自歲星起止掃除災群計三十二字以青紙朱書露中庭九日九夜依法焚之散灰青煙之中併以青石刻書埋之若南方自熒惑起止正道驛行計三十二字亦以青紙朱書露中庭三日三夜依法焚之併以赤石刻埋之若中央自鎭星起止金馬驛傳計四十字以青纸朱書露中庭十二晝夜依法焚之併以黃石刻埋之若西方自太白起止受符北元計二十四字以青纸朱書露中庭七日七夜依法焚之併以白石刻埋之若北方自北辰起止明道動輝計三十二字以青紙朱書露中庭五日五夜依法焚之併以黒石刻埋之用時皆向東南散髪叩齒十二通咒曰元始上天三光高明回景照耀四方朗清運度所衝激陽流星五界錯越三流失寧五斗緫辰七宿明靈眞君大魁厥諱玉精夫人皇起字曰育嬰緫御玄關廻轉諸天今日客災玄吿不祥謹以眞文赤書上呈散髮訟愆披露丹誠惟垂玄鑑廻復天經氣不横越災不横生焚燒靈文散煙玉庭上景監明普吿萬靈氣清三關災滅丸眞隂陽調和國土太平謹以金龍風馳驛程右咒畢露眞文於中庭各按本方用金龍文鎭之隨日而焚又依方色數刻石埋鎭以燈照及紋繒安鎮爲信攝制魔式凢受上法冝先攝伏魔精神明自致若東方則自東山起止稽延書三十字以青木剌朱書若南方則自北攝起止摧亡書二十二字以赤木剌黄書若中央則自敕攝起止當前書十六字以黄木剌白書若西方則自赤書起止帝君書十六字以白木剌黒書若北方則自北山起止滅摧書二十四字以黒木剌白書凢念咒皆向東北若東方九次南方三次中央十二次西方七次北方五次並叩齒三十六通閉息炁九口而仰念呪曰三元開明回轉天常運推數終百六乗剛大劫交㑹萬妖爭行北酆不拘放逸思宗群魔聳肆祅用天光上帝有命普告十方演明天度法教開張正道治民掃除不祥有何小妖群聚爲塲赤書玉文擒攝鬼郷北酆三官逃命傳行千魔束爽萬鬼送形流鈴交煥激炁太陽金虎四邀天丁輔亡大小齊到不得匿藏元始所告列奏上蒼召龍天水神止水度水等式九天地間大劫之災洪水四出此符可以穰止或使蛟龍爲通路開水逕以度身若書東方則自下制起止無間計三十二字以青紙黄書投水中若書南方則自南河起止不從計四十八字若中央則自中山起止普聞計四十八字若西方則自西山起止驛傳計四十八字若北方則自九河起止風馳計二十四字皆如東方式用時叩齒五通閉炁二十五息存身内心中生火出頂上燒四方山林草木及巳身皆爲灰燼一道飛翔入青煙之上無所復遺思大水浩蕩除天下巳身化爲蛟龍隨水而流因又叩齒二十五通呪曰上始回靈開明九元天推地轉三炁流傳五行相促運度機關隂陽否激結成災衝大劫傾訖蕩除妖氛九河受對洪流激川水母徘徊鳥烏合群日月冥㑹三景停關上選種臣排較玉文棄惡貴善清濁永分我系帝簡名列九天大災四㑹赤書所蠲是日告命萬神咸聞日月五星照明我魂五嶽靈山浮度我身无河水府溟泠大神開除水逕通利河津蛟龍映符攝山送雲負我度我驚馳四奔丹書赤字元始眞文金龍驛程時刻無聞玄須奏御上對帝君右咒畢引炁二十五嚥須㬰自有水神開道在山則曰山浮在水則曰自開可謂臨厄而自濟倐歘之頃也若郡國有水災之時亦可建齋精思行之矣天尊於億劫之始運元炁眞晶化生靈文以制御劫運保國安民宿有善縁得遇斯文上古之人淳和抱朴與道混同不伺齋戒行之立應未代時澆人心散壞宗正者寡違眞者多欲行其法須依三元簡文立齋行道精心思念冥契上聖乃感通矣或不然者則魔試來干徒爲之耳可選精㓗之士於絶塵之地名山靈跡以祈通應以彰大道濟度之慈太上救物之澤弘化之士其勉之哉三十二天靈章寳文師曰三十二天玉字乃雲篆大梵之炁結空成文即元始靈書中篇大梵隱語是也大梵者天中之天也隱語者諸天祕音也自太皇天爲始一天八字皆隱祕眞諱之旨今冒禁畧明其奥謂如觀音乃皇曽天内諱也無惒者乃日月出入之門名也縁邅者乃南北二斗君諱也洞浮者赤帝君諱也廓奕者乃神公北帝諱也陀羅者乃斗中二童名也吁貟者乃日月二童名也霐者可韓丈人諱也渺莽北天鬼帝之内諱也餘名三十二天帝中及神王諱也乃太上王晨大道君授元始天尊祕訣修行之微妙故按六十四卦而成其句以象中黄之數凢修錬之士當擇丙丁火旺之日面東南設香几再拜以黄素書之或鎭或佩則萬靈振伏召集眞元以和三田更於本命庚申甲子八節太歳吉辰服之招眞致靈日生智慧神光百神昭感飛眞太虚萬災不干神靈擁護坐役朝謁所謂無所不辟無所不禳也如禳鎭濟度存亡以青素朱書安鎭五方再以黄素緫書安中央於散壇之日安五方焚青煙中風散十方則所召所治無不克應是謂大梵無量之音也先當朝奏三天請降内誦洞章隨事行用立彰玄感矣東方八天玉字毎一句配合一卦乃豫隨蠱臨觀噬嗑賁剥復無妄大畜頥大過坎离咸一十六卦書時搯震文取東方八天之炁吹身中面東咒曰眩昺煥落耿蘭幽芳澮蒲標竺載札猷元皇醜攝南方八天玉字毎一句配合一卦乃𢘆遁大壯晉明夷家人睽蹇解損益夫姤萃升困一十六卦書時搯午文取南方八天之炁面南咒曰中寂虚一混華仙宗和暉陽堂赫胥耀同晶虚瞿吞攝西方八天玉字毎一句配合一卦乃井革鼎震艮漸歸妹豐旅巽兊渙節中孚小過旣濟一十六卦書時搯兊文取西方八大之炁面西咒曰游惠照蘇陀伽含羅𡵨俱渺郁台映盧摩畢淑少都攝北方八天玉字毎一句配合一卦乃未濟乾坤屯蒙需訟師比小畜履泰否同人大有謙等一十六卦書時搯子文取北方八天之炁面北咒曰元皇寳耀延靈鬰單榑桑敬禦御晨緫玄洞妙宗明攝安鎭玉文首尾題式維某年太歳某甲子某月某朔某日某伏爲某人謹齎法信詣靈寳大法司乞開建無上黄籙大齋幾晝夜滿散修設謝恩清醮㡬分位謹以本方鎭信請法施行太上靈寳東方八天自然玉字靑帝九炁天文空眞文東方八天自然玉字安鎭齋壇明露天地拔贖罪苦開度超生一如太玄女青符命律令具法位臣姓某告行右玉字並用青紙朱書隨方篆文只於中間攺云南方玉字赤帝三炁天文西方玉字白帝七炁天文北方玉字黒帝五炁天文中央大羅之天自然玉字黄帝一炁天文其餘並隨方攺之起敷眞文自有科儀兹不再述所有各方祝語今具于左五方安鎭祝辭謹召東方靑靈宫中南丹西皓北玄中黄靑靈童子丹皓玄黄捧領東方眞文南西北中央直詣本方九炁天中三七五十二無極世界東方地獄之中南北中央西救度亡過某使長夜光明死魂快樂無爲自在隨願徃生齋主歸命稽首再拜次隨方啓祝衆皆同聲誦本方隱語如式起眞文緫祝呪無上至眞上聖髙尊布化運炁三十二天八㑹九光自然成文安鎭天地保制劫年元始符命普告三元下敕九地上關諸天中告海嶽名山大川今日上告萬神咸聞修齋行道拔度幽魂三官九府削滅罪根永度三塗五苦之源世世受福紀名丹篇神生天堂錬化自然生死開度億劫長存九天吿命風火驛傳凢起眞文先如式啓奏隨方禮謝收歸中央捧香上叩齒一十二通祝之又啓奏納之次以眞文繒彩隨黄素表焚之禳災祈福亦同用耳中央八威龍文章黄中理炁統攝無窮鎭星吐輝流錬神宫巳上一十六字太上書於鬱羅蕭臺主召萬神上淸靈寳大法卷之十六
