front:
  text: 上清靈寳大法卷之十九觀四
  hash: sha256:97035ecd682416c9bb4cd42fd7bb3a2d78a50d88d3c51e4f715b10b836fc2039
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5g0030_HFL_019-001a, image: hfl/0948/0948-004.png}
body:
  text: 洞微髙士開光救苦真人𡩋全真授上清三洞弟子靈寳領教嗣師王契真纂經句符書門髙上清靈爽悲歌朗太空惟願仙道成不欲人道窮北都泉曲府中有萬鬼羣但欲過人筭斷截入命門阿人歌洞章以攝北羅酆束送妖魔精斬馘六鬼鋒諸天氣蕩蕩我道日興隆右七十字能驅妖拯厄凡人家被強邪作害累遣不去者掐酉文黄𥿄一幅朱書如文或作十方神王牒連粘此符於牒前并劄牒嶽瀆係勑典祀祠廟城隍將吏併力收擒移文量所用輕重行遣如係宗親眷屬及有𡨚家求對者更行斟酌不可輕用神王牒式靈寳大法司某方飛天神王合屬吏兵據入詞意契勘事情委有下邪作禍除巳奏聞上帝告行靈章須至專牒者牒請詳事理即今統帶天兵一合下臨俓到地頭根捕逆天不道爲禍下邪母論髙下攝赴天獄准律治罪庶使皇民安泰道法興行牒至疾速奉行謹牒太歳年月日牒具師銜五方守吏符右東方青帝守天文吏九人青書黒上右南方赤帝守天文吏三人丹書青上右西方白帝守天文吏七人白書黄上右北方黒帝守天文吏五人黒書白上中央黄帝守天文吏十二人黄書赤上右五符納九節神通䇿杖中直日天吏每天三十二人東方九炁天文吏飛天奏事吏傳言奏事吏飛龍騎吏南方三炁天文吏飛天奏事吏傳言奏事吏飛龍騎吏西方七炁天文吏飛天奏事吏傳言奏事吏飛龍騎吏北方五炁天文吏飛天奏事吏傳言奏事吏飛龍騎吏巳上各隨直日召降謂如太黄皇曽天以亥日也支若先召則用干也干若先召却用支也師曰又以二十八宿直日召降毎大事同用一梵天耳謂東方九炁南方三炁西方七炁北方五炁四維一炁是也師曰十方飛天神王威德最大聖化難量於赤明劫𥘉在浮黎國中開圖校録之日奉欽元始之命掌三界十方一切籙籍校量罪福紀録功過量品度人各有使者吏兵凡朝元皆神王開道引之於前遇大事則召神王若小事只用使者兆能尊崇遇濟生度死遣飛天使者吏兵奏告神王乞行救度仍以朱書名號隨事注其下佩服燒鎮皆獲神應所召所服别有祕旨若召用各有直日自𥘉一至𥘉十毎方各直一日至十一又如前輪以𥘉一日起東方周而復始如小盡則以二十九日併用上下二方次月又如前起當擇吉日採古楓木作九宫盤面方六寸畫九宫八卦立上下方於中宫以三素色綵繪又以栢木作神王位牌圖面一寸自𥘉一日爲始隨日直召之凡有所度則朱書其言擲直日之方其響應立至則無所不治無所不服無召不至無所不度也召役法東方神王忽震文南方神王飛离文西方神王菩兊文北方神王雲上坎文西南神王滌色坤文東南神王元鏡巽文西北神王那育乾文東北神王度仙艮文上方神王稷无中指甲下下方神王瑛中指中十神王直日下降東方𥘉一十一二十一南方𥘉八十八二十八西方𥘉四十四二十四北方𥘉五十五二十五東南𥘉三十三二十三西南𥘉六十六二十六西北𥘉七十七二十七上方𥘉九十九二十九下方𥘉十二十三十東北𥘉二十二二十二飛天寳臺式右召神王並依下降直日用之并所主之方凡召降自有符呪具降眞召靈門經句主符治諸項雜病鎮壓諸項妖精鬼恠或佩或鎮或吞或服自隨宜用下能更生右符縛顚鬼吞三道神明門右符㫁勞蟲吞三道萬災不干右符能鎮壓諸邪獨歩玉京右符服之昇玄巍巍大梵右符服之能户解辟山精德難可勝右符解灾鎮厭河海静黙右符治水恠蜃毒山嶽藏雲右符治山瘴毒氣日月停景右符佩服耳目聦明鬼精滅爽右符佩之殺鬼璇璣不行右符鎮墓災群魔束形右符鎮降魔鬼廻尸起死右符斷尸鬼安卒中人手得生白骨成人右符佩之辟瘟治病五帝侍衛右符佩服辟瘟治病體未洞真右符佩服生智慧三界稽首右符佩鎮伏魔通玄究微右符吞佩能生智慧魔精䘮眼右符佩鎮令鬼目不明鬼妖滅爽右符佩鎮滅鬼威未制天政右符佩帶邪病不侵伏御地祇右符安井通水脉治水黒功滿德就右符佩帶和合道炁皆得神仙右符佩之延年却鬼飛昇金闕右符乆服能換骨遊宴玉京右符乆服長肌三色雲炁右符佩服去尸蟲内外蓊冥右符浸水洗目能視鬼神青龍白虎右符鎮散官事朱雀玄武右符鎮治火災獅子白鶴右符佩服入山辟虎狼去三尸日月照明右符佩服治身厭邪洞煥室内右符鎮心治顚項生圖象右符佩服利見大人三五功曹右符佩服神靈左右官使者右符佩服夢靈侍香金童右符佩服玉女執事傳言玉女右符佩帶能和合五帝直符右符佩服去五藏病直日香官右符佩服奏言皆通天今日吉慶右符鎮散官事長齋清堂右符佩服清心安五臟元始洞玄右符鎮宅祛魔靈寳本章右符佩服無邪夢離合自然右符佩鎮離散混沌赤文右符佩服解𡨚元始祖劫右符治玄獸恠化生諸天右符佩帶焚鎮能解𡨚開明三景右符治作犯安土無文不光右符佩服食禄遷轉無文不明右符佩服聰明無文不立右符鎮生貴子是爲天根右符治葬犯山林無文不成右符鎮四方主富天中之天右符治土瘟土箭鬱羅簫臺右符治鳥鳴恠大羅玉清右符治鷄不時鳴渺渺劫刃右符佩鎮治盗若亡若存右符治水鬼三華離便右符治䑕恠大有妙庭右符吞服佩帶利益不死金闕玉房右符專落胎森羅淨霐右符治木神山精大行梵炁右符治隂鬼解呪詛中有南上延壽益筭度厄尊神右符佩服解厄延壽中有南極長生之君右符求子嗣佩用中有度世司馬大神右符求子佩服中有好生韓君丈人右符佩服生貴子中有南上司命司録右符佩服解厄延生廻骸起死右符能奪胎成男无量度人右符吞服去蟲五老啓途右符鎮大水仙翼轅右符鎮大災諸天丞相右符治舊宅災監生大神右符催生下死胎執籙把籍右符同上服用齊到帝前右符鎮安五方土隨所應度右符治五方蟲炁嚴校諸天右符佩服治隂小生瘡北都羅酆右符鎮殺鬼三官九暑右符辟三尸十二河源右符起龍治水恠上解祖考右符鎮解先亡禍億劫種親右符解七丗𡨚疾除罪簿右符落惡籍落滅惡根右符解呪詛不得拘留右符遣鬼祟逼合鬼群右符書鎮貼辟瘟氣元始符命右符吞服安心定神時刻昇遷右符治肺病北都寒池右符吞服治腎病部衛形魂右符治脾病死魂受鍊右符貼卒死心上仙化成人右符焚召萬神生身受度右符帶佩護身保命劫劫長存右符召役萬神隨劫輪轉右符安土用與天齊年右符佩服治命短永度三途右符治穢上清靈寳大法卷之十九
