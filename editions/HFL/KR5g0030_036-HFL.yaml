front:
  text: 上清靈寳大法卷之三十六驚三
  hash: sha256:efbb1d9068b1fedc12fc5ca3ca976e80cac4da278f634a8b47eae0277f7231a6
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5g0030_HFL_036-001a, image: hfl/0952/0952-080.png}
body:
  text: 洞微髙士開光救苦真人𡩋全真授上清三洞弟子靈寳領教嗣師王契真纂神虎玄範門召將行持式師曰凡行召役之法先須内煉方可存神握固歩斗集神或書玊札符命或發玉札或建隂陽二壇或召攝亡䰟並當先行此事惟此變通庶可昭格法曰召將之初先如常式淨心口身了次存身爲枯木左右手搯玉清訣發心火炎炎焚木爲灰左午文右子文义腰存腎中真火如車運轉與心火交接起巽風吹灰去盡叩齒一十二通面天門吸混元祖炁一十二口閉息小時存天門降紫雲來入頂門存我中宫有黄白纒繞而出與紫雲交接想自身爲元始再想太一從空來至兆前坐九頭獅座再吸太一頂中青玄之炁合元始之炁化作百寳光𦋇身存天門有紫雲碧霞其炁散處見神吏虎賁童女符吏並執節捧符兆乃拂袂於耳目後彈畢次通炁進前焚香叩齒一十二通以舌拄上腭兩運華池次引肺炁歩提䰟虎跡靈罡丁歩一十三歩兩手小指二指相交大指並搯中指中節念嘯命靈罡祕呪呪曰玄範北魁掌死生至道呼吸根蔕昌我行玉札金虎文萬神敬聽靡不從如有違吾大道者汝須黜職道不成急急如北魁紫微夫人歌章律令攝金輝斡旋齊七衡飛罡神虎開幽關廻運天常履玄剛廻素扶嬰定淑蘭泓遐扶盈映帝阿陵昌乗明盤兆羅和㑹七辰作一家離合自然有玉葩急急如中斗大聖勑右存神虎官將隨香煙乗紫雲之炁俱入印中祭畢絳袋盛之旋身面北呪曰唵俱賖魯析容吒盧𠰢攝左斗印按心前右劒訣义腰存身爲青玄玉相叩齒三通髙聲召云北魁玄範府焚香關石日直功曹火急到來宻呪存至如常式功曹既到爲吾齎此寳香關召某將逐一關召召呪金門皓華太白七非庚辛祖炁化應自然召炁呼隂承飄素微元聿𩲸星飛澤返歩幽𡨋萬神奉命急速奔馳急急如内真夫人敕命疾速律令寅文北炁一召玄天玉札神虎符吏混元真晶與符合𢍆太一玄冥通真合制追䰟攝𩲸隂陽開閉萬神潜聽敢不侍衛急急如神虎大聖敕二召神虎玉札神伯主吏神虎大聖夫人内諱追䰟使者攝𩲸兵吏禀受符命一呼速至宣告寒庭不得拘滯追䰟攝𩲸形影顯現靈曹大聖來臨法㑹急急如上帝敕三宫訣北炁三召上靈大魔大定神光急急如令行神虎一到速若電光急急如上帝敕子午斗斗炁此三呪凡焚符召將祝發玉札符檄悉皆用之總呪玄天玉札神虎符文寅卯混元合𢍆辰太一玄冥巳追䰟攝𩲸午開陽起隂萬神敬聽敢不奉迎神虎玉女神虎大聖酉追䰟使者戌攝𩲸吏兵亥一召速至子不得稽停丑秉受符命中中宣告寒庭追䰟攝𩲸視影現形來臨法㑹功奏午玉宸謹請某將速降玉清訣北炁行嘯命之道法曰三部使者居淵源宫二隂之首府總分召隂之炁神虎居三焦之首七玉女居七竅之穴陽耀隂靈在左右目下左右二聖在雙鼻孔下清冷㝷䰟神將在兩腎神虎使者等俱在華池之内以靈根七轉呼吸分炁散布升化而出壇前與法部神虎官吏合爲一相隨意指揮但以一炁引接乗炁而來且嘯命者乃發心肺之炁結合作隂風玄霧飛發呼召神虎則心感形通神吏皆吟嘯而臨發玉札式召將如前入科三獻文見齋法啓祝門三酌了祝云領符度籙咸遵太上之科攝𩲸召䰟並按玄師之㫖願馳飛馭快展脩程具有太一玄冥混元玉札謹當宣吿宣玉札宣關再念前諸呪祝玉札祝遣玉札呪太一紫元君天一北祚敕神虎㦸飛運招揺一統隨玉札所至處神虎所到處十方精光都一吸急急如律令右呪七遍吸十方精炁一口吹之元始符命總告玄冥玉女大聖隂𩲸降靈三䰟急至七𩲸無停隂炁潜奔陽炁速程三官北酆明檢鬼營超陵三界逍遥上清急急如元始上帝敕右呪中文北炁握玉札遣將髙聲祝云咨示神虎大聖七司玉女三部使者攝䰟靈曹諦聽吾言當職躬膺帝命掌握印章體太上而賛化度人統神虎而追䰟攝𩲸今則按金凾之祕典領玉札之隱書令岀惟行時不可失繄爾靈通變化故憑齎捧宣傳即冀整轡浮空通天入地奉上玄之命令遍無極之神郷𢍆勘姓名追㝷䰟𩲸不論髙深逺近毋容沮遏拘留期頃刻之不移感彷徨而來赴分明顯現警悟愚迷俾齊進於齋壇得親承於睿澤仰希昭報幸勿稽延玄憲彰彰火令疾疾右歩斗入斗口面東南念太一紫元君呪七次取東南炁入水仗劒呷水噀去立隂陽二壇行持式召將亦如前了存至請聖次髙聲祝曰諸將既臨聽吾懇祝當職叨行大教濫厠仙階專南昌受煉之權領北魁追攝之局司存所係昭吿爲先昨據某人投詞云云今者齋事扣期玄綱將舉巳屢伸於敷奏爲開泰於幽沉所合建陽耀隂靈之壇召男䰟女𩲸之衆兹按玄科而敷蕆故邀神馭以來臨惟仗神威專行追攝願遵承於付囑大振起於宗風少駐神光爲歆微禮次入科三獻文見齋法啓祝門諷經宣狀次左手六皇訣右手玉清訣以中指依壇式就土上畫之畫陽耀壇念陽斗章五行所造𠔃復歸於五行三指下四大假合𠔃却歸於太空或隂或陽𠔃任天地之根宗四中天地冥𠔃萬鬼潜四上天地動𠔃萬鬼爽中中隂陽運𠔃神鬼亨二下感此彷徨赴我壇二中賜汝靈書歸上清四下急急如太一玄冥律令攝中上午出畫畢取鬼戸炁吹九口彈訣畫隂靈壇念隂斗章隂陽推運𠔃劫數更遷五指中生死周流𠔃孰愚孰賢離輪轉無窮𠔃上玄造化未出三界𠔃拘於神變寅魁𩲁東斗𠔃酉𩳐魒西轉卯𩵄向南𠔃子魓行北面午隂靈𠔃茫茫没没子陽䰟𠔃碌碌悠悠子天地𡨋𠔃萬鬼潜順至寅天地動𠔃萬鬼爽順至巳隂陽運𠔃神鬼亨順至中太一召𠔃何遲遲辰先至後至律有常順至亥夭一北祚神虎敕卯太一紫玄䰟𩲸彰感此彷徨赴我壇坤賜汝靈書歸上清急急如太一玄冥神虎夫人攝引申上離畫畢取鬼戸炁九口吹之彈訣次仗劒面兩壇呪曰陽耀返䰟不受死經隂精攝𩲸回尸度厄急急如律令攝䰟𩲸雙行赴壇現跡呪胎光不昧爽靈䰟營幽精復生尸狗去奸伏尸除邪雀隂無垢吞賊開明蜚毒無滯除穢非干臭肺閉塞陽䰟復故天地正炁再聚汝形此是五行造化真精五臟萬神永保安寧陽䰟隂𩲸無外迯形一呼一吸速至變真靈符一攝壇現䰟靈急急如太一玄𡨋神虎律令召地獄罪䰟都呪黄老三寳君紫雲上天炁攝制九幽䰟太玄無邊際皆成自然人地獄無拘閉開通光明門悟真道自㑹急急如律令神虎七真內經玉真萬華宫髙仙藏帝經主圖九天表洞觀元中尊七轉召萬神五岳𩓑來迎青龍左顧衛朱雀奮幽𡨋三宫招魔王司録較所呈白虎左扶助玄武解纒縈拔度重泉曲記仙書上清悉仇釋解對夙仇靡不清七世解𡨚結精血失沉零返胎朱火室更受洞中生百史衞神區令兆保黄寧急急如律令此經行持朝謁誦念解散𡨚執分離男女徃生一誦七遍左右剔隂陽斗召䰟赴壇式如前畫壇了次焚神虎諸符或兼用别法並於此施用指揮官將速攝合㑹亡䰟幽爽赴壇現跡召䰟呪陽神返風生隂靈逐我幡䰟𩲸承符召急速赴靈旛壇陽神返汝殘隂靈來我幡北斗天蓬敕玄武開幽關三䰟無散失七𩲸莫傾殘乗此金符力攝汝赴靈旛壇願承無上道證汝升仙班歌陽章五行所造𠔃復歸於五行見畫陽耀壇祕呪三官北酆明檢鬼營不得容隱金馬驛程普告無窮萬神咸聽三界五帝列言上清急急如神虎律令歌隂章隂陽推運𠔃劫數更遷見畫隂靈壇秘呪元始符命時刻昇遷死䰟受煉仙化成人不得容隱金馬驛程超陵三界逍遥上清急急如神虎律令總祝上來遵洞玄上道建神虎靈司既敷落於神真巳頒行於玉札伏請大聖使者玉女吏兵法部仙兵諸司官將俓徃生方死府直通隂境陽庭極校量拘録之曹遍水火風刀之治根尋係薦亡爽追取合㑹幽䰟不移時於反瞬之間並現跡於二壇之内仍仰監獄使者聚䰟功曹各與部集整齊毋使喧爭紊亂若𠾑𡨚負債爲隨事以解分俾易慮回心免他生而執對庶可臨壇受度證果升遷實資輔賛之功共闡玄元之教領吾懇祝切在遵行毋或稽違有妨開度功成之日如律褒崇疾疾三召請亡䰟依式安旛及諸符命閉神虎堂門逐日焚誦發符檄督促追䰟盡數到壇現跡仍嘱令入夢影響明彰嘉應至開壇日開門只就堂中攝召依前式再行關召次第而行混元玉札師曰混元玉札乃玉清神虎之合𢍆三皇召靈之秘㫖是元始親降札文有廻骸起死度人之道自漢時三天太玄都主飛玄之後遺神文於龍虎山璧魯洞因唐時葉靖能天師遇太一元君指曰北魁玄範在龍虎得者當尋西璧魯致䰟召靈昇髙清神功可作帝王師後葉靖能依銘得之況上真劉真人諱根及仙人孫登天師劉剛皆遇之夫行持之士若不得玉札則亡䰟不能聚其䰟𩲸卒難超度可謂受財於罪網種禍於福田者也凡吿下隂曹可以白繒長三尺六寸或七尺髙一尺二寸以白紙背過朱書玉札併檄文於前以墨書吿文於後仍以墨書正度亡人姓名生死因依於已者本命所属星符之下如普度名數至多止於正度名下添一等字其餘皆具在甲帳連黏札前用太章昊回明大帝玉魁司主之印外使青紙作内外封凾以朱題之又曰以總監鬼神印印之以彩畫三使者褁之同關牒一併發遣焚於青煙之中非玄壇普度不可妄用則地司俓白三官速奏上玄削職罰功可以立待矣法曰書時向東設玄𡨋夫人位左手搯神虎訣二指三指以大指押倒却以大指搯小指二節叩齒九通依前法召將指揮取西北炁入筆書之陽日玉札散形吾奉北魁君急召六甲神雄左追䰟吏統制百節形手持玉札符禀勅徃幽𡨋真精降一炁善惡悉分明星元爲鬼律萬神咸敬聽不問有無罪不問踈與親黑律夫人攝䰟𩲸返歸嬰攝䰟赴壇來主伯速施靈何受命火急施行急急攝化元聿白一字一塗星飛澤陽日七星所屬符第一子生第二丑亥生第三寅戌生第四卯酉生第五辰申生第六己未生第七午生右七符可隨正薦亡人本命所属書一符於本命星之下却以墨寫生死年月日時或殯葬或化作兩行寫之隂日玉札散形禀勅玄夫人吾召六丁神雌右武鸞吏倒生玄司君遵奉玉札劵徑徃隂關生天一北祚炁生死路分明三界何敢違十方盡皆迎億劫𡨚仇對符到悉皆停萬神咸敬聽死䰟返故根攝䰟赴壇來主吏速感靈奉命火急施行急急攝採嬰兆盤蘭定淑一字一塗隂日七星所属符第一子生第二丑亥生第三寅戌生第四卯酉生第五辰申生第六己未生第七午生右七符亦隨亡人本命書於所屬星下並如前式玉札檄文太上混元玉札急追索劵内三界九州亡靈入正薦姓名某人䓁急急依帝敕命奉行毋令怠慢神虎官吏火急捧符告下主司玉札全式北斗太一玄冥神虎混元玉札書玉札篆天一北祚太一紫元北魁玄範混元玉札告下三界十方天曹地府山川海岳泉曲冥關北都羅酆六洞十宫三元九府百二十曹鬱絶之郷幽隂之境諸大地獄九州分野城隍社令里域坵墟黄泉蒿里主宰䰟𩲸應干合屬去處追取上件亡過某等徑離所部速到玄壇朝謁上帝領受殊㤙神虎奉命萬神敬聽一如吿命風火驛傳太歳年月朔日時告下法位臣姓某承玉札奉行北斗太一玄𡨋神虎内真夫人内封皮式北斗太一玄𡨋神虎混元玉札具位臣某奉行謹封封皮背腰書追取某人等䰟外函式神虎混元玉札告下三界十方主罪主獄萬神具位某謹重封太上混元玉札追䰟鐵劵師曰凡欲普庭横死之者須用追䰟鐵劵以攝之劵内所謂扶嬰兆盤蘭定淑乃七元真君隂名也化元聿白星飛澤乃斗中夫人内諱也是以北斗之精斡運隂陽聚其䰟𩲸成其形影之象然後攝之盖横死者隂氣迷纒心神倒錯妄失真元至卒之後陽䰟俱消隂氣隔障不覩光明䰟離𩲸䘮故太上慈悲立此劵以攝之是謂靈寳無量度人也法用雌黄合朱砂篆之各於所屬星下書亡人姓名生死年月日時併殯葬火化何地若普度名數多則於玉札下書或不記年月日時亦須子細開說亦同信帛符併玉札三使者真形關牒一處發遣焚之鐵劵散形無量扶盖神纓自宫飛生自騫業覩盆基翠字九蘭婆泥咎通易邈無寂碧落浮𥠖形攝上玄緫監上天惡奕無品景蔚蕭嵎飛天幽寂扶嬰兆盤蘭定大醜度人淑一半一圈子至午逆輪化元聿白星飛澤午至子逆輪鐵劵聚形玉札文太上混元玉札急追劵章符文中合度一切幽䰟苦爽生方死普咸從帝命神虎官將攝到如令不得怠縦敕告文式靈寳大法司本司今據入意除已飛奏天廷取㫖外今依法式奉行太一混元追䰟玉札付追䰟使者前去𡨋曹追取亡過某人等䰟赴壇受度今具亡人姓名下項書玉札篆文右天一北祚太一紫元北斗玄𡨋混元玉札神虎符命徑下十方三界生方死府追取上件亡䰟等來赴玄壇朝謁上帝領受天恩主者萬神開關啓路疾速奉行毋輙稽延一如告命太歳年月日時告下法位璧魯龍章天一北祚神虎書太一紫元寳章符北魁玄範在龍虎得者當尋西璧魯提䰟攝𩲸乃玄司生死去留職付汝告文右追取亡過某人享年歳月日時生於年月日時身故及附薦男女亡䰟九州分野十𩔖河沙孤䰟滯𩲸於今月某日速赴靈壇分明報應冥曹主者准此奉行太歳年月日時告下法位封皮式攝召靈符吿下九幽掌宰冥曹主者具位姓某封右用黄紙朱書髙一尺二寸召攝二聖飛符召呪上靈天蒼中有甲英混芒一吸東有伏藏天帝所獲玄爀天章今日書符作我天航急急如律令又念北帝呪取東南炁三口入筆君之呪曰北帝靈靈天帝歆欣唵召神虎豁落紛紜天飛羅明日月星營混炁有成急急如律令雄左大力符雌右武鸞符左大聖符右大聖符前二符黄紙朱書召二聖用之後二符用紅素各長四尺九寸以粉書貼關前又二聖符玉曹仙伯追䰟符三清玉帝敕召神伯何金虎前奔玉札符令下急敕元君魁都曹火令敕破酆泉幽壘遵依疾速施行右符三清敕神虎元書敕幽字武鸞主吏追䰟符三皇君敕召玉札玄範魁司覆主吏喬荀受命隂關敕取亡䰟破制酆都幽都禀令疾速奉行右符三清敕玉札吏受敕破幽字並用黄紙朱書斗訣北魁炁先用符召到壇啓祝事因方發此符追䰟指揮焚之三部追䰟使者符召呪天帝神虎斗中靈神侯魏張𧪵等速降威靈吾今召汝助我真形聽吾驅使立現蹤形急急如律令上部使者符天地合德日月合明乾以覆運坤以載靈隂陽一炁與符合并追䰟使者侯准敕奉行中部使者符隂陽合炁䰟𩲸合形天垂元象帝以運靈生關死户符廓通津追䰟使者魏准敕奉行下部使者符天日合炁陽帝炎精飛符昭灼攝𩲸聚䰟追䰟使者張𧪵准敕奉行右三符以黄繒九尺分作三絶先用綵畫三使者真形半身依服色繪飾却於半身之下各書一符用朱書同玉札遣發祝使者持符遍詣十方三界天牢地獄追取亡䰟赴壇現跡報應當先朝奏内誦歩虎跡罡行嘯命之道呪七遍祝使者速行此符昔西山真人劉根遇太一玉女授之功成遺龍虎山璧魯洞中三部使者符檄神虎使者受領札劵追取亡䰟某人䓁速降來如律令吿文式靈寳大法司本司據某人云云入神虎追䰟事書三符書檄文太歳年月曰時告下法位北斗太一玄冥神虎内真夫人右檄文乃玄範府曲赦疾行萬里以黄紙朱書不可妄用上清靈寳大法卷之三十六
