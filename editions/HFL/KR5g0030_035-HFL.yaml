front:
  text: 上清靈寳大法卷之三十五驚二
  hash: sha256:2ec03b2555a95e184fc8c32da1b408eebee10f2ed9b5392ff16b3d131e87a67b
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5g0030_HFL_035-001a, image: hfl/0952/0952-040.png}
body:
  text: 洞微髙士開光救苦真人𡩋全真授上清三洞弟子靈寳領教嗣師王𢍆真纂神虎玄範門師曰夫靈寳至道皆以濟㧞幽𡨋爲先積功累行體元始慈悲無量度人之要且追攝之門最爲上法夫隂尸沉淪幽夜永劫未覩陽光須修薦㧞之齋行此大法元始祖炁混沌赤文玉札金符先聚其隂陽合和四象以雌䧺坎離之媾以分男女使清升濁凝悟明至理然後以北魁之炁運轉五行方詣玄壇澄定本源了無所著升度南天以三天祖炁合煉以化成人者也天一北祚太一紫文有中斗大魁府玄𡨋夫人七元主之亦曰玄丹太乙之神主之位尊九天總監衆靈爲大法攝召𡨋曹之都司凡在九地群生䰟𩲸生死莫不由也下元濁世命禄將絶之人玄𡨋所属斗中夫人付符嶽府方可追取是主死樞曹也下有玉女七人各主生死因依生時所定主其簿書一切𡨚䰟横𩲸玉女其總司主令有神虎雌䧺二大聖主天下王侯官庶䰟𩲸各有攝䰟吏一萬二千人從其所使内有追䰟使者三人通逹太一命令齎持玄𡨋玉札太一合同上通諸天下及三元一切真司水火曹局考治幽獄追取䰟𩲸此道不示凡才自璧魯洞一出皆劉真人得上道葉靖能得中也故兹宣傳非比中斗大魁大道追攝䰟神萬無一至内有召役普攝内誦坐可立至之道若行神虎之品當精求大法毋使誤幽𡨋矣序分玄範五斗師曰夫東斗注筭君者乃青陽生炁之府係青靈始老九炁天君主之西斗記名者乃皓靈養素之府係皓靈素老主之南斗上生者乃赤炎丹靈太淵府係丹靈真老主之北斗落死者乃鬱絶中和之府係五靈玄老主之中斗大魁者乃總監衆靈之府係黄靈皇老主之且東斗注筭者但人禀一炁而生取五帝監生司命定筭主録勒籍大而爲壽少而爲筭人生於世並注一百二十壽以三日爲筭筭一年計一百二十筭爲一壽一紀一十二年爲一千二百筭如司命定察功德髙大則爲奏主以増其筭大則三百六十筭少則一百二十筭如司命定察罪惡貫盈則爲奪筭罪惡未除則爲㓕筭降年増促年齡各有等殊未有差之毫釐者也東斗注筭之君貪狼星之所總如司馬命章男女分形善惡功過皆西斗記名君記其名乎属巨門星之所總分神降炁分定貧富貴賤化生中國皆南斗上生君之所掌属禄存文曲星之所總主平生功過罪業年齡夭促至命禄永絶死歸長夜皆北斗落死君主之属武曲星之所掌總此生及死記名注筭上生落死莫不總監中斗大魁也属破軍天罡星之所主掌盖五帝玄司主定十方世界四生六道䰟識故元始天尊於玄範之府有七元星君宫各有神虎將吏并太一夫人掌管䰟元神虎雌䧺之印主其職焉下有玉女夫人掌管簿録司其生死統領䰟𩲸之事或有違慢其太一夫人奏于斗府飛奏玉帝賞罰至公無有小私行持之士不可不明矣神虎主司北斗太一玄冥七隂夫人玄冥内妃夫人太一紫元夫人天一北祚夫人神虎玉札夫人混元神虎夫人神虎大聖二員䧺左玉曹統制三䰟百節主䰟主伯大聖何雌右武鸞部衞七𩲸血氣主𩲸主吏大聖喬二聖並緋衣面棗色執圭躡履如王者狀專管天上星宿及王侯士庶之䰟名神虎者謂天帝掌䰟之司也即神虎大聖也具左右有飛符攝𩲸使者一十五員玉女七員第一提䰟攝𩲸倒生玄司玉女蔣仁貴第二掌正病身亡之䰟玉女蔣仁喜第三掌瘟疫瘴癘死䰟玉女王真卿第四掌勞瘵風癎癩病業玉女翟普卿第五掌水火刀兵投河落井自縊王法横亡玉女黄文第六掌墮胎産死傷折血光之䰟玉女萇道仁第七掌隂暗不明雷伐𡨚枉鬼惑之䰟玉女董希卿巳上並魚袂鳯冠朱履羽裙玎珮手執生死簿書掌生民死亡順逆之䰟追䰟使者一十五員上部使者侯紫綉袍朝天幞頭紅綉抺額面紫黒色碧玉束帶腰佩魚尾刀一手執金槌一手執符緑靴中部使者魏紅綉袍面赤色碧玉束帶魚尾刀緑靴一手執鉞斧黄抹額下部使者張𧪵緑綉袍紫抺額面紫色碧玉束帶佩魚尾刀緑靴一手執金槌餘並同上部此三員主子午生人丁胡卓申之此三員主丑亥生人王滸王劉子和此三員主寅戌生人仔天任曽元此三員主卯巳未生人邵公權淩飛真孔𩳍此三員主辰申酉生人巳上使者並緋衣朝天幞頭七道功曹天道功曹郜天真地道功曹冉文魅人道功曹胡仙道功曹索忠鬼道功曹翟魑神道功曹祖公弼業道功曹葛𩴤右功曹各有一百二十員所大法用者七員主之童子二員玉府監䰟童子徐迢具玉府引䰟童子孔萬卿右童子各有一百二十員此二員主之監獄使者二員陽耀通關壇使者劉㘂㘂隂靈攝䰟壇使者明追攝神將四門追䰟神將宋杜張馬天大收䰟將王開地大攝䰟將鄭欲一呼使者張海一吸使者劉青監䰟使者賀弼引䰟真人王精追䰟大將張記追䰟童子雷震清清泠泠天洞天真使者彭大年鐵跡臺光使者許昌追䰟捷疾使者王精普現通目大將軍袁照青黒二神王許提䰟攝𩲸一司官衆一百二十五人霹靂迷䰟昏遁使者一百二十人降真召靈符使一百二十人五道大神六甲開導使者泰山沿路土地監守亡䰟去來使者察命靈童司命童子神虎印章師曰凡行神虎玉文符札各有印章須當祭而用之若有符而無印則是有兵無將若有印而無符則是有將無兵符印炁訣歩罡召役闕一不真故靈寳法中貴於十全未聞有違戾而行之者應矣諸印北魁玄範府印䧺左印雌右印神虎玉札印神虎總攝印大魁總監印巳上並見印篆軌範門祭印法法曰用茶酒時菓九分於九告日置靖室中供養依法祭之祭印呪天一北祚太一紫元北魁玄範神虎玄伯斗中大聖玉女追䰟十方精光隨我降靈一呼一吸入我印中隨炁而出隨炁而行變化億千元亨利貞急急如神虎勑右呪面北念十四遍吸炁一十二口吹之想北魁下有紫玄之炁九道降入印中存諸將隨香煙乗紫玄之炁俱入印中再拜呪之呪畢以酒沃印覆於淨盆中化金錢四分在印上次收於淨處用絳囊盛之勿令人見見則不靈後十二年方再刋申奏換之以舊印棄於岩洞無人之處建隂陽二壇式師曰凡建大齋於艮戸卜一室立神虎之堂向南設官將几案香花一一具備次以淨土就堂中立陽耀通關壇於左畔立隂靈攝䰟壇於右畔各方圓三尺六寸打今平正各立壇牌及左右監獄使者之牌一室周回並以白素作幕使不染塵埃之色當先如法祭混元玉札次方立壇備茶酒果蓏祭設神虎官將依式變神歩罡關召次第行持以劒就土上畫之安䧺左印於陽壇之心雌右印於隂壇之心中間几案止然一炬明燈并安監引童子符及神虎諸符又以二器盛水浸神虎追䰟符各一道亦安壇心牌下祝官將一面追䰟赴壇現形次以現形符三道内一道同關牒𡨋財數分燒之一道沈水中一道法師自服之將符水左手托定右手仗劒念天一北祚呪七次吸鬼門炁入水中噀洒二壇訖餘水留几案上即簾幕遮護宻封堂門禁人來徃至期召䰟方捲簾幕將旛安於二壇之左右仍用通現幽釋通語通目等符焚水中洒之及童子身上次令童子指其端良乆髣髴窺其蹤若孝子忠孝慈義意切必覩形神可交言語歴歴可扣如生人悲泣驚䰟飛揚即逺矣若生人歡喜盡現其形尤忌嗔怒莫私心妄召餘無所戒也建八門召䰟壇式師曰欲召䰟現形當於神虎堂中間立八門召䰟壇相去八尺一仞地又云於曠野淨處空地立用黄細土平鋪闊四尺九寸四圍開八門以紅綵左紐長九尺或一丈五尺量地圍之八門共用鐵纂十六枚各長六寸下以白牌書八門之號及篆八符分布入門以一淨盆貯仙藥湯安於壇心内浸鐵跡臺寳光章次以淨蒭縳作人形依生前外飾衣冠服中安大梵隱語頭上戴升天大劵懸掛於秤架鈎上令蒭人空立離地三五寸許預於前期以白繒七尺二寸造召䰟旛男一首女亦一首各長三尺六寸以竹竿長八尺四寸繫旛於竿頭男旛立於壇左女旛立右男旛書鐵跡臺字女旛書寳光章字中心立召䰟諸旛如期行攝召儀令童男室女執二旛立法師之左右依法召祭官將依式召請亡䰟法師右手執旛左手搯召䰟訣叩齒九通左嘯三聲右呼三聲次歌召䰟呪隂陽斗章再念召䰟呪追䰟呪存用行持以旛蒙蒭身若隂䰟來赴其旛重墜則竹竿勢曲與蒭身秤重着地方迎引就浴更衣朝真受度况煉度日逺恐亡者怕生人陽炁散亂隂䰟再以旛引歸聚䰟壇開死門入復閉之次取壇中水以柳枝洒壇内十方蒙者生形全𩲸視影現形遇引靈煉度却開生門引出至壇此法如太隂煉度方用又曰凡建神虎壇須用敷落五篇鎮五方乃上帝大浮𥠖土之圖立於中召之立至如無此文則神吏無合𢍆之光不能到矣行持之時當誦魔王三章併焚赤書玉字八威龍文二章於室内盖神吏非天元祖炁真文玉字不能召之二章乃玄都至禁元始召諸天上帝三界萬靈亦用此章其文萬聖見之咸覩玉光而至夫行靈寳上道全在煉炁存神如元始真身與元始同惠方能洞逹如或昧此徒勞形爾反遭譴罰慎之敷落五篇赤書玉字八威龍文章並見鎮禳攝制門陽耀通關壇圖此獄主攝所薦亡人併億曽萬祖逺化近亡一切䰟識隂靈攝䰟壇圖此獄主攝病死横夭自傷被殺囚禁繫滯乆沉𡨋司一切九幽䰟識八門召䰟壇如召到䰟𩲸開鬼門於人門入閉之八門牌符人道𥼶道仙道地道業道神道鬼道畜道右符用黄紙牌書各髙一尺四寸亡人沾此符乃䰟𩲸入壇人人皆可見現跡也鐵跡臺光寳章日月之光照耀八方鐵跡金晃光寳臺章威光爍爏蕩隂易陽䰟𩲸返嬰神炁貫常八門通幽勿過死傷䰟靈召到不得隱藏右符以黄絹二寸用丹砂書仍以伏苓伏神天門冬人參地黄各一分煎湯用盆浸符安八門壇中召䰟訖以水洒壇十方黄者生形全𩲸視影現形乃鬼神之寳也又云以青素朱書長七寸闊二寸四分召無間罪䰟壇幡二符鐵跡臺寳光章右二符用雌黄和辰沙書二旛上立八門壇左右如陽人以鐵跡招之隂人以寳光招之玉皇訣北炁召亡旛太一返真攝䰟符太上元君紫炁通津攝精聚䰟使者來呈真符一召䰟合䰟靈爽靈伏矢蜚毒胎光尸狗吞賊臭肺幽精雀隂除穢太上玉敕合符通幽攝䰟使者還聚拘制風火本形鄷都無停無爲自化大道功深祝呪北帝幸神丹諸仙謁聖顔願降鄷都録善惡報輪環忽開地獄苦罪鬼離刀山請問何縁業曽不間幽關憫念迷亡子無岸可依攀故演真符要宣行救世間急急如律令右符北帝訣北炁大魁總監召靈符台光爽靈幽精扶嬰兆盤蘭定㳤化元聿𩲸星飛澤旛頂符天靈地精人英鬼爽爽靈台光幽精尸狗伏矢雀隂吞賊蜚毒除穢臭肺三炁化生三䰟返靈三召速到不受死經陽降隂消耳目開聦東山度化元亨利貞師曰召䰟旛可用白絹夾造長三尺六寸正面頂上書符旛身墨篆太一返真符以朱書合符盖之用玉魁司玉印符下寫亡人姓名兩足寫生死年月日時三䰟俱赴七𩲸俱來兩手寫遷神寳旛引導而行合符䰟善念不更背面頂上書日月斗形身篆大魁總監符兩手分寫二聖用朱塗其諱中用大魁總監印印之兩手寫胎光延命爽靈益禄幽精絶死尸狗伏尸雀隂吞賊蜚毒除穢臭肺左手云䧺左玉曹統制三䰟百節主䰟主伯大聖何右手云雌右武鸞部衞七𩲸血氣主𩲸主吏大聖喬陽耀壇男旛符隂靈壇女旛符神虎召䰟宻呪陽神返汝殘隂靈來我旛北斗天蓬敕玄武開幽關三䰟無散失七𩲸莫傾殘承此金符力攝汝附靈旛願乗無上道證汝升仙班急急如律令上清靈寳大法卷之三十五
