front:
  text: 上清靈寳大法卷之十七觀二
  hash: sha256:4a5161fa95ffabb9edc48ebfd8d5a4f2f89c0046a81a1d1dfaee981bec710b70
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5g0030_HFL_017-001a, image: hfl/0947/0947-050.png}
body:
  text: 洞微髙士開光救苦真人𡩋全真授上清三洞弟子靈寳領教嗣師王契真纂鎮禳攝制門大梵正音章師曰大梵正音乃元始自然飛輪之炁結成誦詠者可以制伏萬靈超度五苦行法之士能於六丙日面東以黄素朱書佩負兆身則祛制羣魔消却萬災當存身爲靈寳天尊掐上清訣取元始祖炁入筆書之書篆祕呪元始祖輪結梵彌羅自然靈妙無始無終洞杳菩猷捉渠廓崇爽邈神靈峯道達聰超冀無窮急急如靈寳上首律令東方正音廣生髙映覺元洞虚應玄九眞化交肇圖文靈運搆宗範玄都咸變總括威昭自成緑岑遷景皇道含明天林耀權炁精育魂融羅負立圎英隱旻期巨神色洪綱告寧南方正音章炎通泛竪敷澄宗虚象玄華龍陽舞穹微正霄艶淵太凝冲玄關三紐大梵飛空隱覺隆益天倫慶呈神户纒絡眞元散精淨握明照徊合升遷導騫宴雲靈應騰天西方正音剛譯微控隂峻孤儀貫炁冥素宸洞開微周化幽應澄輝帝臺平遐挹虚恢茂童池結飈臨育麓無散開陽通百六沈芒隱階幽廓冥黙真風宴靈堅不順道告命騫林北方正音龍安洞變純陽隱玄方本還炁象伏髙貟神變東凡解鍊靈根赤精純道成號威尊利雲友當億仞中丘鬱城瓊壘謡音慶流受位玉室天憲道幽玄章煥落綱輪廼周流金演玉鳯炁龍文之譜一百六十六畫師曰龍文鳯炁之書皆三天錬玉流金之文可以集而成符或聚而作字旣司眞階靡事不究呪符書矣不得輙將他用三官司察事同泄漏天禁祕之一又二三四五六七八九十百千萬曰月年時刻金木水火土從金從木從水從火下土撒火從土門女從女草頭竹頭山穴厂又走疒上彳亻言犭幸頁日音大太辛見阝丸广口寸王生豆大才下上夭山土九木立卒鬼申兀白黄易开斤𠕋勿彡夕力百又止尹車又回皿召癶王玉聿七刂昇丹舟者耂南韋台日水古直真不亟力無極亟介幽广立巾帝也巨臣衣司同命度非離張夜光余畢乗心惠必堂巳弄籙録靈羊夌宫馬丑尊奠日骨亥監東紫之五嶽山眞形圖太極眞人曰元始禁書云凡授靈寳靈虚骨髓之要須識五嶽山形若不知則學道無成不能希仙魂神沉昧難造上道學道當圖其形置於淨室則魔試不生萬鬼滅爽幽原開泰此文載在法籙以正人天之分野也師曰黒者山形赤者乃水之源黄㸃洞穴口也畫小則丘陵微穴則隴岫宗形謂髙下隨形長短取像家有此圖者亦有善人守護邪鬼災患皆自滅也若上士佩之則萬神朝禮矣東嶽泰山周回二千里在琅琊界所領仙官九萬衆南嶽衡山周回二千里在長沙界東所領仙官七千七百人中嶽嵩山周回一千里在洛陽界所領神童仙女三萬人西嶽華山周回四千里南北長在長平東界所領仙人玊女七千人北嶽𢘆山周回三千里在常州界所領仙童玊女二萬人山蹠泉脉源流上下昔王母授漢武帝武帝傳授禁限其科嚴重不可輕泄也上五嶽眞形東嶽靈威仰西嶽白招矩南嶽赤熛怒北嶽叶光紀中嶽含樞紐下五嶽眞形東嶽泰山眞形西嶽華山眞形南嶽衡山眞形北嶽𢘆山眞形中嶽嵩山眞形酆都山眞形謹按元始六天制魔經凡授上清大洞之道及三洞三眞大法之要而不知酆都山之眞形七祖不得長謝鬼官尸血不得蕩穢於胎門也又曰六天玊册文以石刻玄堂臺基之宫苦䰟受度朱陵學士佩之及置於靖室中萬鬼滅爽幽原開泰此文書在上清北闕以正六天之紐分也若度亡可以丹書眞形墨書誥文及亡人姓名火化揚煙於風中則北帝解縳三官釋結上升北堂矣度亡燒灰呪元始符命制魔奉行保舉亡魂度品南宫酆山消燼三官解形散縳閉業受化更生隨品錬度上登福庭右呪訖以舌拄上腭存身爲元始意誦隱語一遍思金光滿口𩀱手玉清訣吹往東北方放訣其䰟立得上升朱宫隨品受鍊返生福庭酆都山眞形圖度亡告文右給付亡過某人永爲身寳伏願敬受之後苦䰟受度簡記朱陵一如告命風火驛傳上清靈寳大法卷之十七
