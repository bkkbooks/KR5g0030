front:
  text: 上清靈寳大法卷之五十七寫六
  hash: sha256:66fc19542873456c4b50c4777627ffe44b3cf4aa02f5e45b65c86fc4ad494a43
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5g0030_HFL_057-001a, image: hfl/0959/0959-132.png}
body:
  text: 洞㣲髙士開光救苦眞人𡩋全眞授上清三洞弟子靈寳領教嗣師王契眞纂齋法宗㫖門三朝夫三朝取法於玉清天中玄都玉京金闕七寳玄臺紫微上宫毎日寅午戌三時鳴法鼓諸天上帝天真大神上朝元始自清微天已下悉皆上朝今日三朝之禮基於此也行朝行朝之序先則髙功上香寓敬逹誠也繼以發爐關白齋意出身中神而召里社以宣謄也各稱法位與衆官通職位姓名也同誠上啓祈告列聖敷露受詞行齋之由也次宣青詞以露齋官之心愫也朝修功德先當上祝君王普福天下關升九祖次及見存是乃三捻上香之意也薦亡則慮其生存積諸罪咎保見存則慮其平昔作諸愆尤倘不眚結於十方三界辠縁於天曹地府雖勤勤祈恩惡籍何從而銷玄澤何從而降於是爲之禮十方天尊分方懴謝以致日月星辰山川河嶽皆乞原除愆犯削落罪書也而三界有司關係考察者不過與齋衆聖而巳節次精思堂序立兆同齋官上香三禮真師出三謁六幕玄師幕上香三拜跪奏告齋唱導旋繞上廊幕香都門外序立升外壇入地戸升中壇早入戸呪午同四明功曹通真使者傳言玉童侍靖玉女爲臣通逹道室正神上元生炁入臣身中當令所啓必逹上聞右立地戸之左宻呪剔玉清訣存香官使者龍虎二君侍香諸靈官四明功曹通真使者各一人侍靖玉童傳言玉女各二人羅列左右晚入戸呪四上功曹龍虎使者正一生炁侍靖素女夜有啓請願得開明童子上玄少女爲臣俱入黄房之裏通逹所啓皆使上門右如前式兼存四上功曹素女童子少女各一人昇天門入内壇上十方香以東爲始逐方持謁簡通名銜躬謁夜則以北爲始午則以南爲始早朝存思夫清旦夜氣方收陽光未照木德正盛青炁自生也上應玄炁宗㫖曰清旦行道當思天中青雲之炁自上垂下却運肝炁自頂出交合布滿齋壇青龍四頭在前獅子四頭在後居青炁中備守前後與經中存思之義一同青龍獅子合八頭俠髙座處巳未丑亥之方三朝緫存思次思仙童侍香左立東玉女待香右立西天仙從官兵馬衣飛衣處夭門之東地仙從官兵馬衣軍隊之衣處於地戸飛仙從官兵馬衣羽衣處天門之西日宫官兵衣紅衣處日門月宫官兵衣淺黄衣處月門星宿官兵衣隨方各色之衣處四方四孟四季之方五帝官兵衣五方五色之衣各處其方中央處王建之方已上兵馬各九億萬騎監齋直事三界官屬羅列左右前後匝覆壇中及建齋之所内外人物之形次暝目内思五臓肺七葉白色在喉嚨下心如未開蓮花上大下小紫赤色在肺下肝五葉紫蒼色在心下脾混黄如泥金色掩太倉上腎有兩紫黒色當臍俠腎五嶽五山各居本域遥存見之次思南火星在額上中土星在心前北水星在兩膝間東木星在左肘西金星在右肘五星煥明五方存五方五帝各居其方中央居王建之方並帝王冠冕隨方色衣備守身中映盖一禮體作金色運五炁從肺後俠腎中擁從鼻出如雲上騰頂上而屈四臓之炁次仰昇周覆身形彌滿一壇内外項生圎象如曰月光明照徹十方身中了然洞見内外而我身隨炁之輕浮不復血尸穢質遍身成金色也前所謂天仙地仙飛仙即請降仙真兵馬也五帝乃五方五帝也司五方之正炁旺四時之候序緫統兵馬翊衛齋壇是其職事故章官有道上二玄三元四始皆節候之神與此相爲表裏所思五臓五嶽五帝不在外而在内也乃身中五臓所配丹經中有圖前所謂五嶽兵馬則嶽瀆之神遣兵來衛壇場此在外而不在内也凡行用悉是内外相應此所謂五帝乃身中五臓之炁炁靈則生神如洞經中有五帝見於存思者是也今以洞經屬天寳此法屬靈寳故不牽引也五臓則見於黄庭内景宜詳攷之登壇行齋未免從簡易之法宗㫖曰登壇之後先存太上三尊在玄都玉京山天寳臺中左有三十六部尊經右有玄中大法師儼然如對十真五帝群仙翊衛如朝㑹之儀次存太上三尊乗雲下降如黍珠說經之時存十方无極无量品至真大神無鞅之衆浮空而至左右龍虎監齋直事三界真靈千乗萬騎環侍三尊萬神備守已成玄靈仙局以次行事三朝皆然惟所思之炁不同耳午朝存思夫午朝曰景將中陽炁方盛脾土分旺四時而乘離乃生於南也上應元炁之下孚不可過午時中炁以已時至午四刻後下壇宗㫖曰臨午行道當思天中赤雲之炁金色自上垂下却運心中赤炁自舌出如雲交合匝覆玄壇上徹泥丸光炁交結朱雀四頭在内鳯凰四頭在外萬籟鈞天奏鳴居赤炁中朱雀鳳凰俠髙座合八頭處寅辰戌申之方次思天仙地仙飛仙日月星宿五帝兵馬仙童玉女並如早存思之式晚朝存思夫晚朝却當日未入時登壇使炁未全隂白炁方盛上應始炁以合存思也然始炁在身則屬下丹田而肺乃水之母肺炁盛於昏時是水將生也故肺白炁上應而混合耳宗㫖曰落景行道當思天中白雲素靄之炁自上垂下却運肺中白炁自鼻出如雲合之布滿玄壇白虎四頭在内麒麟四頭在外居白炁中備守四方二獸合八頭處子午卯酉之方次思仙童玉女諸兵馬官屬並如早朝存思之法上御案主爐香宗㫖曰入壇正中乃金闕下先進左足雙歩星珠熠燿罡至主爐前放玉清訣罡歩行罡呪玉清赤素大梵分流元綱流演星珠貫周急急如元始上帝命左手子文直中文午出微動雙目日月略開上香呪玉華散景九炁凝煙香雲宻羅徑御九天侍香金童傳言玉女上聞帝前令臣長生世爲神仙所啓所願咸乞如言存玉女金童龍虎在爐邊三捻香呪一捻香上逹玉清境二捻香上逹上清境三捻香上逹太清境靈光梵炁下注臣身飛香逹御合道帝庭急急如元始上帝命左手剔三宫訣焚玉字真文一道於主爐中祝呪元始祖炁緫合靈章無文不度無文不光赤書玉笈龍篆垂𦬆臣今焚變上朝玉房急急如元始上帝命雙手玉清訣運化七寳金樓上下内外明瑩如晶玉中有虚皇至尊端坐玉房之内以兆一炁引接祖炁吐散玄壇仙凡交接一境如水晶琉璃之状金光迸布滿壇焚降真召靈符於主爐中祝呪元始符命緫召萬靈靈光普照三界通明玉符飛降合契帝庭令臣奏啓上朝玉清雲霞飛奏時刻無停徑升玉闕與道合真急急如元始上帝命上清靈寳玉虚召靈神光妙化億萬齊臨急急如元始上帝命十天訣剔出再周匝自中文上清剔午文出爐中想符煙飛化霞綵錦紋之狀透徹三天上下爲七寳金樓玉殿懸映目前再剔三宫訣存生化萬神億乗齊臨拱朝至尊至尊布一炁金光如日色撲落直下主爐之前爲一條黄道金階如欲朝謁自此運神飛奏跪爐上香黙朝上帝兆歸本位三拜跪執手爐三上香宻呪道由心學心假香傳手執玉爐心存帝前真靈下盻仙斾臨軒令臣關告俓御九天凡宻呪不聞聲兆運身爲元始叩齒三通咽液三過以舌鼓華池再咽液下發丹宫一炁上衝舌根透十二重樓升泥丸徹于項上運丹宫真人乗一炁升重樓上至泥九端朝萬寳之尊以我身一炁如金光毫竅百絲迸布如九色彌羅之光次於黄道金階之上朝謁至尊心奏所陳不動華池不得出聲奏畢遥瞻元始慈顔懽恱布金光梵炁下注兆身方鼓華池咽夜納真丹宫閉炁藏神方開目瞻視玄壇興身三拜行事各禮師存念如法先存經師所在之方心禮三拜祝曰願師得仙道上登髙靈爲我超㧞一切皆成道真我身昇度次存籍師所在之方心禮三拜祝曰願師得飛仙上登髙真爲我開度七祖父母早生天堂我得真道升入無形次存度師所在之方心禮三拜祝曰願師得升度上登髙仙爲我開度五苦八難名入仙籙永成真人次存上天三師乃三真人自天門隨青黄白三炁下降壇場五方呪閉目内思五臓五星五帝備衛身中次存青黄白二炁徧布玄壇四靈翊衛萬神森列内視金光映盖一體作金色先自肺中出至頂上生圎光照耀十方身中了然盡見内外詳細具載建壇中鳴法鼔中建法鼓三八二十四數召身中三部八景二十四神敷落神真外滅魔靈也存神炁清肅徹逹玉清運身中青黄白三炁經歷五臓上至泥丸合天門玄元始三炁結成琉璃寳殿上聖居中侍真羅列詳細見前發爐出神焚敷落神真符出神諸符存身在三炁雲中内外蓊冥搯中指中文宣无上三天玄元始三炁至臣等身中丑寅至申下三五卯辰左右巳午左右捧香未申侍香傳言酉戌五帝亥直日日辰輪至午至各三十六人出存騎吏赤衣皂幘并功曹童子香官等自天門下出身中驛吏騎吏自腦出合神侍立左右放訣至土地正神搯戌歸中文至御前剔訣存騎吏等受詞語捧香而去宻呪内有光明外有所向内外朗然了無餘象靜以待之即其顯相第一朝出官兆與衆官各三拜長跪叩齒二十四通出吏兵行事先存額中朱門闊一尺八寸即腦門也吏兵從朱門出入先出四靈神三將軍導從前後左右日月五星覆頭北斗𦋇身岀肝中青炁布滿玄壇光如曰月搯斗訣歸上帝訣宣謹出臣身中至天丁力士逐一存身中神出羅列左右次從中文歷至根廵二指根歸巳上彈之以聞次伏地呪曰一體虚寂何出何入以之爲儀呼吸是及再鳴法鼓三通咽液三過建齋止第一日早朝出官餘皆不必此外或拜章詞亦當依法出官行事若拜九朝詞當於第九朝再一出官謝恩醮詞則於醮科發爐後出之建壇欲拜詞亦可於建壇科出之拜章别有科儀存用之法此不相關宣科行事兆端圭正立存身爲真人宣法位按科行事宣詞假謂七日七夜爲率毎日三朝所宣之詞乃致詞之詞非青詞也若陽醮爲生人謝罪禳灾隂醮爲亡者懴滌愆尤若爲國家祈禱雨暘雪蝕旱蝗不測之危爲長吏首露罪愆也兆上香三朝長跪黙奏齋官跪爐詞懴三人或五人或九人出班長跪御前宣致詞宣至上帝御銜悉當設拜三捻上香凡朝修按科當上祝君王普福天下開昇九祖次及見存是此意也侍香同齋官隨科三次上香各三拜禮十方懴悔禮方之式按科云薦亡則恐其生存積罪陽醮則慮生人平昔作過倘其眚結於十方三界𤽮録於天曹地府雖勤勤祈恩惡籍何從而銷玄澤何從而降故禮十方天尊分方懴謝以至日月星辰山川海嶽皆乞原除愆犯削落罪書也宗㫖曰壇衆引髙功逐方上香三拜長跪黙奏爲亡者懴滌愆尤詞懴依科懴悔齋官執爐長跪毎方如式命魔廣成曰歩虚十首出於靈寳玄都玉京山經乃十天衆聖旋遶王京之山歌詠修眞之詞也經曰建齋行道四天帝王駕飛雲緑軿八景玉輿真人玉女手執花旛前導鳳歌後從鈞天白鶴獅子嘯歌嗈嗈燒香散花浮空而來瞻禮行道觀聽法音此則不問文移請降之不及皆當歩虚旋遶之時天真大神不間遐邇浮空下臨故先當命魔澄清寰宇也其法在髙功宻運神光恭宣道㫖以太上令而召北帝俾宣魔王察制强精斷絶邪源玉文就降則三天運明正化流行而仙道隆矣鬼道消亡隂炁零墜六天運歇六合之内道炁充盈上極九霄旁周萬寓無鞅衆聖悉皆浮空而來觀聽法音所以能致此應者惟在髙功吐納内錬胎息真靜泥丸洞明於是一想而神光照煥更藉之太上呪令則魔王受事奉承帝命掃清寰宇衆聖浮空以聽歩虚也是以不止於一壇之内不拘於預壇衆聖而已也此其所以用於禮方懴悔之後而居於散花歩虚之前切謂命魔古齋法巳載陸簡寂杜廣成諸君不編皆遵古科三朝命魔盡歩虚經十首旋遶無可疑矣蔣氏立成儀謂趙道昇黄籙儀只午朝命魔乃本於政和金籙且宣和御製金籙道場科儀乃是三朝皆命魔歩虚而設醮後方行散壇科此盖楊傑所撰者當時教門正盛考訂科法大爲詳宻故科文多從古法也蔣氏又引張清都曰天尊未說經之前諸天魔王遊觀太空行威縱毒天尊說經之後魔王從化衆魔既仗聖化便爲諸天尊上聖妙行真人䇿駕前驅掃塵啓路所以衆聖將行先命諸魔前驅䇿駕也經云魔王敬受事故能朝諸天所以道場中歩虚先存思命魔也今詳此一節其張清都謂說經之後魔王奉化神公受命普掃不祥凡天帝將遊則命魔前驅此固一說今直以此意而引證命魔在歩虚之前殊未盡理若夫天帝將遊先當命魔然則上十方香時巳存三尊居寳臺中况啓聖宣詞禮方懴謝悉對上帝存諸壇中乆矣魔王當於上帝臨壇之初清塵效職何獨謂將歩虚而方命魔其義盖不如此又如趙道昇軰以命魔專意於内景是太上不出於泥丸矣且其以衆真居於身内命魔作用於體中亦猶黙朝上帝啓告齋意於上田皆不逹經㫖錯認本原差謬甚矣夫泥丸九宫身備百神此豈無之自天寳靈寳神寳三乗之教莫不皆有身中修用亦有專意於内者有内外相應者夫入室端坐内錬形神内也登壇朝謁蕆事敷齋此以凡誠而格于上帝外也上章拜表飛神謁帝此出身神而升髙穹也朝真懴謝行道燒香降五炁以肅壇場合三素而存大道以至命魔王而清六合法玉京而詠歩虚皆内外相應感激之道也豈得以命魔全用功於身中乎又有云陽生於子隂生於午而終於子以已時爲六陽之極午時爲一隂之生一隂侵陽魔王干試壇場惱亂法身日當離宫離中虚純陽之炁隂故干陽於隂陽交錯之際故午朝命魔此又全無按據亦以其執泥於身内而爲此說耳果使三清玉帝不出我身千真萬靈悉居體内又何必昇壇建齋謄詞列欵但只令齋官致詞於我已知則泥丸亦知矣章詞齋設一切可罷是與聖師垂科濟世之意大相反矣二十七品之齋四十二等之醮各有等差互分品格豈專力於内功而遺經籙齋修耶若夫比金木匹配坎離汞結鉛凝龍降虎伏此則在内而非在外也然又非宏科應世修齋設醮之事也學者於内修外錬當知其源流奉教行科合明其宗本庻免指東爲西顛倒錯謬若云命魔皆作内功魔王衆神悉居我體理實難通使魔王不離於身中諸天止居於頭上則魔王受事於丹田朝謁天帝於泥丸以是成功而數盡之時乃一守尸之鬼耳非仙也此等朝泥丸之功用凡修存之始者終焉不如此也夫升陟玄宫臣事三境方爲真仙成功於身中輕舉於天中方是歩虚經之意也如歩虚經第四篇曰俯仰存太上華景秀丹田左顧提欝儀右盻携結璘六度冠梵行道徳隨日新此言常存太上而行日月之上法以至於道徳日新此功成於内而效見於外也又曰天挺超世才樂誦希夷篇此言非超世之才不足以知希夷之㫖能悉其章方洞逹妙理也又曰冲虚太和炁吐納流霞津胎息靜百關寥寥究三便泥丸洞明景遂成金華仙此言悟經誥之深機以吐納而施用行胎息之祕訣遂致泥丸洞明與道爲一此盖内錬以成仙在我而不在外也自成功若此則天中魔王亦敬而受事豈止保舉哉遂得上朝諸天矣因之曰魔王敬受事故能朝諸天也凡所以得至此者皆由齋戒累功而成是以終之曰皆從齋戒起累功結宿縁飛行凌太空提携髙上仙也夫飛行乃輕舉矣非止於身内事也今齋壇命魔而先存日月入鼻然後洞房光煥者以自身泥丸之景未能自明故假存念以行事而我身尚非真仙豈能遽役魔王受事故假太上之命以役耳其事與歩虚一章理極相貫如第十章曰散花陳我願握節徴魔王亦此義也經中乃言成仙而自然者也臨壇行事而假之也倘胎息之道既就而泥丸之景巳明則不存日月而光映十方不宣宻呪而魔王受事矣得至此者必不自踐齋壇名彰世俗此之科條乃齋法也故詳陳之大凡朝真謁聖惟在精思若不正心則入妄想外魔生焉惟存正心破彼妄想如湯沃雪似炬燭明庻可存神朝謁矣命魔元皇訣青黒黄赤白緑絳碧玄光從一至於九服食飡元皇日與正炁合七竅生華芒九年功行滿入侍九晨房又訣一三三一百分光九宫離宫赫太陽不問根宗求帝一六魔笑你亂思量始爲青光上生於天元爲白光中生於人玄爲黄光下生於地乃爲天地人三炁分布三田此乃一生三是一三也下丹田玄炁升中丹田白炁合爲一中丹田白炁升上丹田青炁合爲一玄元始三炁聚於泥丸大如黍米非色非相化生九炁是三一玄分光也生九炁是九炁位離宫赫太陽也行持上士須知九炁生根若不由祖宗求帝命是不知九炁之生何以發輝九色玄象宜乎六魔所笑請自思量九天蒼赤青緑黄白紫碧玄光九色圎象一曰赤洞二曰白章三曰青皓四曰緑昺五曰黄素六曰蒼混七曰紫融八曰碧英九曰黑演右從内至外自一至九五炁變化九炁圖諸法只載五炁按五方五帝却有九色圎象在頭而不分剖出入變化之法則不能通真召靈今以圖指𩔖乙庚合成緑金丁壬合成蒼木甲已合成黄土戊癸合成紫火丙辛合成紅水宗㫖曰凡當命魔髙功旋左遶至鬼門望西立都講至天門望東立唱各思九色圎象光映十方咽液命魔宻呪兆三叩齒咽液三過存左日右月對面少仰去面九尺日紫赤光九芒月白黄光十芒直射面上從鼻入洞房金華宫兩眉却入三分爲雙丹田更入骨際三分爲臺闕正深入七分左有青戸右有紫戸眉間入三寸丹田宫亦名泥丸宫又入四寸爲流珠宫又入五寸爲玉帝宫又曰金華宫在洞房之南也當中直上一寸爲天廷宫洞陽房直上一寸爲極真宫丹田宫直上一寸爲玄丹宫流珠宫直上一寸爲太皇宫此乃大洞真經中所列也務成子引九宫訣云五寸爲玉帝宫又曰金華宫九宫皆闢方一寸存思之法運九炁升上薄入玉枕自腦後大椎骨發出項上光明煥然作九色圎象存炁色在前腦後二穴光布九炁一如元始上帝項後圎光徘徊周匝照徹十方一身羅上下也隨我旋回而行我身真元始上帝次心布真人乗炁而出歩玄珠星斗拱朝上帝次叩齒三通咽液三過心持宻呪焚命魔符詠玉京歩虚丁罡旋遶想五帝部領天兵前驅斥魔王受事命魔宻呪黄中䇿炁斬滅妖宗制伏强魔斬絶邪蹤太上有敕付我身中急召北帝朝謁玄宫山林社鬼形狀悉同奉承威令宣告魔王五炁蓊欝與符命衝祕藏玉文方就云隆三天運明六天運終賢者㦲焚命魔王符先存元始降空玄之中次宻呪存元始降金光自頂而入兆身至絳宫結成金液之丹光充八極内外瑩明萬神敬禮三界廓然次剔中文禮經三啓科式之初因經立教歩虚旋遶已畢義當禮經所謂天魔並敬護世世受大福者乃因經持戒念道遣欲而致此故嘆其功而禮之次則云經道興行家國隆盛進修不巳入于大乗既使七祖登升身乃超舉於是再禮夫愛經而味道終至於與道爲徒固錬形質超三界難度地獄苦成功之自悉因於經故三禮以終之此禮經三啓之義也宗㫖曰兆存心王上揖而三禮之大謝今齋官懴罪於十方祈恩於上境嘆功而禮經於是禮謝三寳然後恭對天闕普行懴謝故謂之大謝方願念復爐其理曉然矣宗㫖曰兆當具位長跪宣念畢三拜興身復爐入神焚傾光回駕符宗㫖曰兆執手爐宣香官使者至諸靈官從子輪至亥玉訣局定宣御前了存神入吸炁咽納丹田宻呪曰向來召出臣身中五體真官功曹將吏從衆妙門而入在左還左在右還右後召復到一如故事存上帝天真三界官屬齊昇霄漢唯有五帝吏兵等守衛壇場集神自腦門入納歸三宫混合爲一也降天門出地戸早出戸呪午朝同出隂入陽萬神開張關啓事畢請閉黄房侍靖玉女明閟神宫晚出戸呪玄上太隂八䆫開明向來啓奏少女通靈隨心啓化安鎮黄庭畢事復位萬神安寧存官吏玉女傳送齋誠各各散去次出壇謁玄師幕兆上香三拜跪奏謝恩三拜興身監齋紏過如式回靖兆回靖上香拜真師衆官復位上清靈寳大法卷之五十七
