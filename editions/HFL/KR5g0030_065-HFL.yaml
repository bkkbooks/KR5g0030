body:
  text: 洞微髙士開光救苦眞人𡩋全眞授上清三洞弟子靈寳領教嗣師王契眞纂雜用牒劄帖關門請當境監壇靈寳大法司牒當境某侯王本司剋取某月某日爲齋主某人崇建無上黄籙大齋幾晝夜追悼亡過某等䰟巳備牒貴司照應今者齋事扣期切慮下愚不移輙犯壇禁仰惟某侯王功著彼蒼廟食斯境英風動地廣惠澤民自是曰聦曰明莫不起敬起慕欲祈神造俯翊齋修須至牒者牒請提兵整甲鞭騎戒塗進玉陛以停驂立油幢而行令張氣焰鎮護壇場燭幽微察姦去穢屏斥人物禽畜之厭驅遣伏尸邪氣之干葷酒觸犯大赫厥靈火盗不祥須嚴其禁散天香而帀地邀帝駕以臨軒導引亡䰟彈壓幽爽仍提綱於庶務使盡合於齋儀期惠始終普覃幽顯願闡揚大教當旌賞言功顒伺圎成敢忘攀餞謹牒年月日牒借地築壇起土牒靈寳大法司牒土府太嵗皇君五土尊神四靈神君禁忌百神當司今據齋主某乞取某月某日崇建無上黄籙大齋追悼亡過某等䰟上生仙界事本司巳飛奏天廷祈恩開度今者齋修日近科範將陳欲借中宫隙地築立玄壇延奉帝真聿嚴昭事須至專牒者牒請上体齋功暫離方位青龍東去朱雀南翔白虎西行玄武北去勾陳中退凶殺深藏應干百千萬神各去二十五歩髙際三天之表下通九壘之間界定八方壇崇三級像清都之寥廓延玉輅以來臨依黄籙簡文度泉扃䰟爽或有伏尸故炁不正妖氛輙干禁忌之嚴攝赴魁罡之下克成乃事當復攸司依應奉行安居不撓謹牒年月日牒解壇復土牒無上黄籙大齋壇牒土府同前本壇昨爲齋官某追薦亡過某等䰟恭依科式借地築壇朝元治事今者巳行滿散所合召集中宫萬神復還土府須至牒者牒請同禀玄科各還厥位黄黒碧緑而九宫常靜東西南北而八卦奠安咸底緬平無復欹䧟死䰟蒙度願永脫於泉扃齋主承休兾留題於土簡人天胥慶動植懐生用以奉安敢希照㑹謹牒年月日牒敕水解穢牒無上黄籙大齋壇本壇恭依玄格崇建大齋尚慮塵凡汙濁之區兼有惡毒厭穢之炁今憑劒水用潔壇場須至牒者右牒請五方解穢吏兵四門神將八卦大神四靈神君直壇土地防禦神祇恭承帝㫖同赴玄壇普召天兵廓施神化驅五龍而噀水激濁揚清命九鳯以㗸符除氛蕩穢攝化塵凡之境變爲清淨之居内外肅嚴天人胥㑹其輙興於魔魅並攝赴於魁罡使夤奉合冝顯幽蒙惠牒至准女青律令奉行謹牒年月日牒辟非牒無上黄籙大齋壇牒辟非大將軍本壇恭依寳格宣演瓊科先振金鍾上開陽道須至牒者牒請下臨玄墠斡運乾元大叩大鳴冝合九陽之韻若隱若顯妙開三景之光齋悃潜通玄綱肇舉謹牒年月日牒禁壇牒無上黄籙大齋壇牒禁壇大將軍本壇恭按典儀祗崇齋直次鳴玉磬用集隂神須至牒者牒請潜敷神化開闢坤輿梵響交傳召洞隂之妙炁元陽允契判太極之先天凡聖同居風雲慶㑹謹牒年月日牒繳赦劄無上黄籙大齋壇今准泰玄都省降到赦書一通頭連在前右本壇除巳遵依奉行外請合屬主宰看詳前件赦文速爲施行年月日劄發赦牒無上黄籙大齋壇牒日直功曹地道曹泰山沿路土地本壇今准三天門下降到曲赦一道泰玄都省降到赦書詔一道告下東嶽酆都十方道主者及應千幽隂地獄等處赦宥亡過某等及六道苦爽出離冥關赴壇受度須至專牒者右牒仰准此火急承受前去徑詣三界十方無極世界遍告主者咸准赦恩施行不得揩磨損失有滯驛程如律奉行故牒年月日牒破地獄牒如用合同牒則用小字無上黄籙大齋壇牒九獄都司主者本壇奉爲齋官某崇建黄籙大齋追悼亡過某等䰟及下元苦爽同登仙界巳節次飛奏天廷依科開度所有合同符牒巳預發各獄主者照應今則將行召攝猶恐隂扃未啓䰟尚拘留恭准玉清寳籙破地獄真符及降下泰玄童子一百二十人各持諸天寳器合同符契下開幽獄須至隨符轉牒者牒請遵奉玉清詔命伺各方童子到獄徑以元符合同速開關軌赦放罪䰟准令奉行謹牒年月日牒催召牒無上黄籙大齋壇本壇檢㑹今月某日爲齋官某崇建黄籙大齋追悼亡過某等䰟同登道岸事本壇已節次飛奏天廷祈恩開度及備牒承行官將先次根攝上件亡䰟今則見行召攝尚慮冥道艱危未即遣發須至再牒催督者右牒請神虎追䰟官典法部天神將吏地道鬼道功曹本處土地五道尊神速戒征途直通冥路催召亡過某及在會男女等親䰟正𩲸依時引附靈旛現形報應赴室就浴入壇朝參躬承開度驛程有限不得稽延在路或有遏截仰攝赴近獄依律治罪星火奉行立待昭報謹牒年月日牒普召六道孤䰟牒無上黄籙大齋壇本壇檢㑹今月某曰爲齋官某崇建黄籙大齋追悼亡過某等䰟及下元苦爽同遂生方事本壇巳節次飛奏三天請命頒行依科開度剋取今宵普施無礙夜齋廣資六道幽靈九泉孤滯除巳先具牒委神威遍行根刷外今依律普召遍十方際盡玄虚界自昔至今一切天仙道人倫道神祇道地獄道餓鬼道畜生道幽靈之衆乃至九州分野十道九幽一切軍陣殺傷之衆劫掠闘殺之衆王法屠戮之衆牢獄枷鎖囚繫之衆徒流逺竄之衆游宦身亡之衆投河落井覆舟赴水溺死之衆登髙墜體登車墜馬摧殘之衆農工商賈僧道尼姑岩棲谷隱流亡之衆路岐藝術游手巫覡盜賊傭身客死之衆雷嗔虎啖水火漂焚之衆自刎自縊中毒䧟穽枉死之衆疾疫飢荒暴露尸骸之衆蠱蛀傳尸邪妖拘執之衆墮胎懷孕産死女流之衆盲聾喑跛拳攣癱瘓沈痾致死之衆鳏寡孤獨乞丐困窮無依之衆依草附木作精作怪遊蕩之衆𡨚讎呪詛貧命欠財執對之衆胎生卵生濕生化生異類之衆含靈抱識蠢動飛潜有情之衆他方此界新死故亡若女若男有主無主一切孤䰟滯𩲸等衆猶恐冥程阻隔未即到壇須至專牒催攝者右牒請神虎三部追䰟使者天道地道人道仙道神道鬼道業道功曹監壇承受官吏本處城隍土地五道大神太歳尊神六甲開導使者引䰟童子即今引領上件六道含靈河沙鬼衆隨旛指示次第入壇躬承開度仍請鈐束母令妄起邪心以干生氣前途或有攔截仰照天律施行時刻不移立伺昭報謹牒年月日牒化冥衣牒無上黄籙大齋壇本壇檢㑹今月某日爲齋主某崇建黄籙大齋追悼亡過某等䰟超昇仙界事本壇見攝召上件亡䰟到壇巳新盥沐今來所化冥衣切恐名數繁多遞相壞奪欲勞神造親爲監視須至專牒者右牒請黄籙院掌冥衣使者監壇承受威神當處土地廟食正神法部當畨神吏親督焚化願仗三寳威力攝化無限皆成百色流霞之服表裏光明㸃勘名數次第分俵不得縱令恃衆恃強相親相奪務在周遍使十分披帶内外装嚴毋致遺缺不均有妨受度牒至准玄科律令奉行謹牒年月日牒煉度牒無上黄籙大齋壇本壇爲齋官某崇建黄籙大齋追悼亡過某等䰟巳請命頒行依科開度今則仰遵科範受煉亡䰟欲仗神功宣行妙用除巳具奏諸天上帝乞降恩光下臨外須至專牒者右牒請南昌受煉司主職神將丹天左右衞上將軍主水火將軍火鈴將軍火鈴童子九光童子開光童子水池火沼二大神將水火二池童子監生大神十方龍威大神丹靈大神皓華大神玄英大神煉尸大神返生大神聚形大神監度大神遷化大神聚𩲸大神引䰟大神變化大神煉度大神超度大神變身大神復相大神正精大神火府大神返形大神超化大神煉度童子混元一十二生炁大將軍九天生化合干仙吏南昌上宫朱陵火府南陵樞府煉度合干仙吏靈寳水火二司煉度官君童女神兵等衆引煉仙曹靈官功曹使者吏兵合干仙宰分靈應化奉命下臨召日月之真晶請乾坤之正炁左化冶煉之沼右爲流汨之霐匹配坎離抽添鉛汞引導亡爽陶育枯骸使隂翳銷鎔陽光洞徹餔五芽而孕秀聚九氣以生神嬰兒忽歌咸囘靈於十轉制魔保舉皆度品於丹天敢冀慈仁俯垂彰感謹牒年月日牒煉度天醫牒無上黄籙大齋壇本壇奉爲齋官某追薦亡過某等䰟崇建黄籙大齋巳請命頒行祈恩開度修奉周圓今則祗按玄科恭行大煉尚慮死䰟帶疾受煉無由必仗天醫以令生化除巳行符布炁依法全形外須至專牒者右牒請天醫仙吏尚藥敷藥靈官治病三五功曹太醫博士主者針砭小吏收毒將軍天醫執職官衆靈寳局中聚形功曹合炁功曹補炁續炁功曹聚神功曹全骸全形續骨功曹返形復相大神主生産功曹取死胎功曹下死胎功曹合干官宰上體好生同垂善救契勘見則受度應係死䰟其有三十六種傷亡一十八等惡死請分科而專局先探本以窮原或灼艾握針或行符用藥隨其證候淺深之則斡以君臣佐使之功布五靈真炁調理百關使萬種沈䰟消除衆疾産孕者斬根解結摧残者續首全形完聚本真復還舊相仗離坎甄陶而變化證形神俱妙以昇遷敢冀慈悲俯垂護度謹牒年月日牒發劵牒無上黄籙大齋壇牒上三界天門守衞諸神本壇今月某日爲齋主某崇建黄籙大齋追悼亡過某等䰟今則受煉巳周謹按法式分破靈寳昇天左右合同契劵超度上升除將各劵一半付亡過某等收執外一半入方函重封印全所合發上三界天門請行照㑹須至牒上者牒請照㑹交管伺候上件亡䰟齎持半劵前到即與辨驗合同應期超度使魔王保舉無拘天門牒至准玄科律令奉行謹牒年月日牒生天案牒無上黄籙大齋壇牒生天案主者本壇今月某曰爲齋官某崇建黄籙大齋追悼亡過某等䰟巳節次飛奏天廷依科開度所有上件亡䰟受煉巳畢所合津發前往生天案受生除出給合同文牒付壇首亡過某收執爲據須至牒者牒候到請照㑹辨驗合同印押隨期功果各與注生母令稽滯幽沉有妨開度牒至准玄科依應奉行謹牒年月日牒防送牒無上黄籙大齋壇本壇檢㑹今月某日爲齋主某崇建黄籙大齋開度亡過某等䰟今則巳詣煉度所合委差神吏管領前去地府生天案聽候注生須至隨牒遣發者右牒黄籙院地道功曹同承受官吏將上件巳受度亡䰟交管前去并所給合同文牒敕赦誥籙各合齎執俓詣生天案交卸即與計功贖罪隨果注生在路或有遏截仰攝赴近獄明示憲章准令火急奉行不請違滯謹牒年月日牒焚燎護送牒無上黄籙大齋壇本壇奉爲齋官某崇建黄籙大齋追薦亡過某等䰟及下元苦爽今則依科煉度巳遂周圓除已岀給符籙牒據執證受生外所有焚燎經財切恐遞相侵凌合委神吏專一督視及管送前去托生須至牒者右牒監壇受事合𨽻神祇法院當畨神吏當處土地五道大神黄籙院承宣一切官吏仰躬親監視焚燎之所將所給籙符牒據經財㸃照姓名逐一俵付各令收執母致違缺不均以相侵奪仍希管領前去黄籙院生天案交卸計㑹直日典吏遵依敕赦大㑹齋功特與削落罪簿隨其品格注受生方前塗或有非道邀阻請便冝照律施行時刻不移幸勿違滯謹牒年月日牒山簡牒靈寳大法司牒上某處洞天仙宫主宰照對今月某日爲某郷貫某追薦亡過某等䰟崇建無上黄籙大齋幾晝夜謹爲依科開度保舉超昇以今功果圓成解壇散席遵依法式投簡䇿勛敬齎持龍簡璧鈕投送某處洞天摽紀善功刻名仙籍須至專牒者牒候到伏請照㑹依准玄都舊典奉行謹牒年月日牒土簡牒靈寳大法司牒上中宫土府太歳九壘土皇靈官主宰照對今月某日爲某郷貫某追薦亡過某等䰟崇建無上黄籙大齋幾晝夜謹爲依科開度保舉超昇以今功果圓成解壇散席遵依法式投簡䇿勛敬齎持龍簡璧鈕投送某處福地摽紀善功刻名仙籍須至專牒者牒候到伏請照㑹依唯玄都舊典奉行謹牒年月日牒水簡牒靈寳大法司牒上某處靈澤潭洞靈