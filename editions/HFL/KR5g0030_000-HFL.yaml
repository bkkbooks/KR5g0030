front:
  text: 上清靈寳大法序欝一
  hash: sha256:4135e793978841ca66db2cbcb3353fa1a9c3d8570e7d9de120c15a9ffffd9937
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5g0030_HFL_000-001a, image: hfl/0942/0942-004.png}
body:
  text: 古序昔我祖師元始天尊大慈悲憫廣濟羣生歴劫度人先天立教隨方應物不狗於三境九泉布化流形豈限於人間象外自龍漢淳古之世教之以大乗逮延康朴散之時授之以中法大乗則無爲無事任物自然中法則有怠有勤因機善誘洎開皇以後赤明乃還俗變澆漓人隳眞素忘縁棄本溺性迷情背妙有之玄功失自然之奥旨由是方諸闕下多虚青簡之名酆都臺中益盛黒書之目淪謝者崇朝接轂升騰者千載比肩大軫聖慈遽兹開度所以三元品誡四極明科三洞四輔之經隱地藏天之籙女青玄都之律八瓊九鼎之文金眞八極之書鳯炁龍章之篆柔金水玉之法開明震靈之符五老䇿精之文八海登眞之篆大劫洪眞之札靈寳召龍之篇正一救世之章洞神開山之印上清八景之訣玄眞曲素之辭太平左右之圖洞玄智慧之品乗蹻躡虚之術攀魁據斗之罡或檢制身心或蠲消罪垢或吞芒餌景或錬氣胎元或封山召雲或坐忘遺照開萬塗而汲引垂衆法以提携欲令抱識懷生皆登道岸豈止簮星佩月獨詣仙庭乃出三五章儀河圖醮法拜表上章之訣罡風驛騎之司凡居世間有所謄奏即日月主者里域眞官乗彼驛龍聞于天闕雖上天夐逺下土卑凡感而遂通靡踰瞬息矣斯則大道救物巨細無遺請福祈眞齋法爲大齋有二十七等備在三洞經中則三洞各九品齋也内黄籙齋者遐福羣有廣救三塗報應之期影隨響答古今所驗實繁其人然以精專爲先龍綵爲上香煙處潔抑又次之苟有一缺亦齋之瑕玷也修奉之士得不慎哉且黄籙之法拯度旣多君臣通修人天普福隨其所爲理趣多門又經云三洞布化遍滿人間行道修齋因宜立教人間天上久矣流行若帝王國主人民土地一切衆生有諸災厄應當消却召諸道士及以女官或多或寡廣立瑶壇懸諸旛蓋散花燒香然燈照夜行道禮懴晝夜六時勤勤不息克獲靈應福德普臻經曰黄籙者開度億曽萬祖先亡後化處在三塗沉淪萬劫超凌地獄離苦升天救㧞幽魂最爲第一此經隨世所求即可修設或三日或七日一時九時奏簡馳誠上天無不御逹且靈寳者是大道之根宗元始之妙化虚無挺秀劫化自然隲配隂陽區分造化保安帝祚鎮護天民握運璇璣恢弘妙旨總五帝大魔之法召萬天合元之司濟度存亡統隷三界按梵炁而爲符篆敷奥義而作隱章秘在蘂珠之宫禁於華堂神府諸天至重萬劫一傳遵奉明科俯仰有格非宿生之大慶豈造次以能聞得遇進修實爲際㑹可以召靈炁於三關靄寳華於九戸功滿德就位列仙翁起死廻骸歸眞返本人天欽仰變用無方招眞召靈洞該三道所謂巍巍大梵萬法度人之上品者也謹序玄序元始祖劫為天地之根宗靈寳開圖總隂陽之樞紐推曰月變通之理統星罡𨇠度之機妙集璇綱提携子午還五行之造化追三炁之魒魁進退乾坤飛旋離坎擒龍伏虎控鳯乗鸞朝飱紫府之英暮食青華之液煉形流火灌質東池六龍飛蹈於層霄九炁攅烹於玉鼎道之生我物無定爲棄物流形則氣神交而眞自徹釋情養浩則精血通而氣自凝眞火髙奔飛扶丘之皎日水金拘制旺玉闕之蟾蜍八鸞同鳴讃空歌之雅韻九鳯齊唱揚十絶之玄音俯仰靈阿十方之天眞自集朝叅太上萬靈之羽衞飛軒黍米髙懸變通莫測包含虚昧則無鞅數衆咸歸濁競奔趨則萬炁千眞盡散集炁爲寳聚神爲靈乾徤純陽坤柔隂質自然之炁無形無名上極九清以炁假名爲號下徹九地以形别號為名是知杳杳𡨋𡨋恍恍愡愡寂然不動感而遂通二炁回旋隨天地應時而動三田通妙感隂陽運轉而爲靡在他施何勞自逸存神叩齒警初眞入道之門鍊氣書符明學士守䂓之式欲餌吞於九轉當造物於四時回運周天交媾水火烹金鑄鼎錬石𥙷玄盜日月之英華結神眞之鉛汞先明子午次辯水金進退抽𣸸知時適候温調養育烹錬無差勿殺善以欲貪勿嫉妬以淫盗逺憎去𡜍異骨成親濟度天人闡教凡世通玄究微悉章洞慧束魔卻惱斷六根障塞之源捨妄從眞滅五苦輪廻之戸拘魂制魄養炁藏神身有光明形無影響開明三景離合自然髙晏鬱羅萬劫蕭臺聳冠飛升金闕玉山絶境逍遥飛駕瓊輪十炁飛天自現控乗緑輦諸天五老傾光疾除罪簿之因落滅惡根之道妙乎兹法故品諸經提悟迷荒救携未悟吾昔遇清微丈人授以二氣吐納次遇於玄皇玉帝賜以金丹訣言明天地權輿之數了隂陽生殺之機衆卉百花盡守根而固蔕竒禽異獸咸抱一以含元故知顛倒五行飜覆四象盗元一飛玄之炁守眞精妙體之英建寳鼎於崆峒飛金晶於靈洞媾内外之水火合上下之刀圭元炁周流感元黄而玄珠光耀包藏宇宙含金丹而資用無窮是知天地之獨尊變化之無形無質乾坤之妙道生死之無始無終道勿逺求不出戸牗親之者鮮逺之者多棄本妄眞甘樂忘於泉壤入邪於正徒度夏以經冬靜以生强安而思極七情鼓扇陽絶隂化而性命危六慾觸耽精散形離而神氣泯五臟揺蕩九竅開關靡知性命之端竒偶相配何明造化豈辯玄機吾啓大慈願提仙子將兹神氣集號玄章故名靈寳之筌蹄以應眞經之内法付于妙行出世度人化現十方名號非一編諸經典遍滿恒沙句句爲玄頭頭是道悟兹妙理則出生入死而與道俱存了此眞機則離合自然而去來無碍遇之者夙生仙骨行之者累世慶縁誤謫人天慮差覺路指明圎定證悟法門行道秘藏了眞可度謹序
