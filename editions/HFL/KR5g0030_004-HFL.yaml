front:
  text: 上清靈寳大法卷之四欎四
  hash: sha256:d0664d8295b82d5b31cdfeff77a5cc2afc88188245d6083630bf242b87155755
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5g0030_HFL_004-001a, image: hfl/0942/0942-152.png}
body:
  text: 洞微髙士開光救苦眞人𡩋全眞授上清三洞弟子靈寳領教嗣師王契眞纂十玄修用門十玄修用師曰十玄者所謂十奥也一曰太定神光二曰黍珠入妙三曰中理五炁四曰十轉回靈此四玄之旨各有衆眞頌譯五曰吐納正炁六曰玄眞隱諱以元炁結秀胎宫尺寸明呼吸巳叙開圖之旨七曰胎化法質明洞陽之火候周天之大數内錬玉字生化胎仙八曰本始神通應感功德九曰隂丹陽丹流精玉光也巳有成䂓十曰大行梵炁乃巳之元炁也洞其奥則升騰有限明其旨則神仙有自矣神光大定經曰七日七夜諸天日月星宿璇璣玉衡一時停輪神風靜黙山海藏雲天無浮翳四炁朗清一國地土山川林木緬平一等無復髙下土皆作碧玉無有異色衆眞侍座元始天尊懸座空浮五色獅子之上師曰此說元始天尊妙用神道化機運感之所致旣言七日七夜日月星宿一時停輪何以分其晝夜七日七夜之數又非止是玉清有浮𥠖土有如比威神妙化道君所言諸天也一時是應三界諸方萬天皆如是也此之微妙聖應天尊外化日月不行星宿不運璇璣玉衡停輪不顯晝夜其實内運主宰功用未嘗暫停故玉晨明七日七衣之數又非玉清玉京說經比人世七日七夜之理言一國則諸天諸地皆統言之則云一國地土也緬平一等則普同萬彚神化無不遍及故云無復髙下以内言之諸天日月則目不瞬星宿則炁不運也璇璣玉衡則運脉不息也神風靜黙無出入息也山海藏雲隂陽無朝交也天無浮翳内外無物也四炁朗清内外上下一同也一國地土猶一身也山川林木猶四肢百脉毛髮九竅肌膚營衛神空骨節也土皆作碧玉入於道定之境也師曰以内言之乃大定神光湛然見玉清境有七日七夜之功七晝七夜日月停輪二目不瞬即非暝目亦非内視亦非臨目是七日七夜久視停其目瞬照明三部内外洞然其一身炁朝運於百節經絡隂陽營衛皆係於三部息脉其息脉乃人之一身璇璣玉衝也四至爲璇璣三部應玉衡旣是璇璣不運則日月駐景星宿停輪四至不至則三部不息一身氣血俱不運轉先要在神風靜黙無吹嘘出入之聲山岳藏雲無蔽明妄想之境清明湛寂天無浮翳自然温涼寒燠四炁朗清萬物皆同一色況一身内外皆如碧玉無一毫之塵漸至百眞守死戸萬眞朝身形可以舉身昇空百日神合道妙千日白晝騰飛上昇其天尊空浮乃自巳神居玉清宫又曰玉帝宫經云自已有天尊何勞上望天又元眞讃曰天尊雖逺妙近降泥丸宫宫室皆七寳牎牖自然分是也五炁朝絳宫威神之妙化結而成獅子天尊坐而乗之下入丹田左青右白前赤後黒中黄故有五色之稱玄座空浮有無化應虚實信感七日七夜湛然見玉清天尊是時太定神光上乗至妙功圎㑹遇立致輕舉可以力取定中魔試水火刀兵王法萬種報於絲芒之實皆不得其道旨七日七夜之外所是見者皆未來之事或言之外則前功並喪無望仙冀豈不慎口耶太乙眞人頌曰蓊𡨋無心太淵潜形蒼色混同存化凝靈鴻毛不動内外含貞龜啖紅虺結秀眞精日月朦朧璇璣不升白霓青霧徃復交并七日神通自見王清璇璣王衡圖一呼一吸三寸四至共得六寸一至得一十五分經緯天地縱横十五故上帝付黄帝即河圖數也一呼脉再動一吸脉再勤呼吸定息脉五動閏以太息則六寸一動一寸一息脉行六寸夫大定之法惟先於定心心者百神之舍五官之府也心君湛然則聲色貨利皆不可得而撓之以此心而推則進道不逺矣時人慕道雖多達道則少始志雖勤終心或怠者皆由於心不定也定心之法貴斬三尸去六賊命魔以伐其害道之端息炁以造其入神之妙靜而定定而應神光内發日月洞明一炁常存萬神不散湛然見玉清境矣法曰兆絶慮澄心凝神思道運絳宫赤炁下降玄泉上升心血腎精二炁交合放丹田中孕生嬰兒漸長如眞人形次運肝中青炁如雲下𦋇眞人被青衣青玉冠青圭懽顔和恱次運心火池中有火龍一條躍出乗載眞人乗五色雲炁自夾脊大度橋直上泥丸與元始天尊合爲一體金樓玉殿法座寳幢一一周備須㬰元始運化生一一生二二生三之道化百寳光化生諸天童女官君森然環列元始寂定復放寳光一條洞照北隂之處並化爲碧玉色自上而下光明洞達元始勑飛天神吏天丁力士持金玉簡金書勑字徑到北酆十二河源去處蕩除穢濁請滅三惡斬絶地根自坤至艮自艮至坤自辰至戌㸃戌亥子兌中中震卯存肝出青炁一條蕩絶諸根飛度五戸再㸃申酉寅巳亥隨訣召靈官以開五戸慾色愛情貪皆令清淨元始存洞煥一身皆如赤明境元始再勑諸魔王天丁力士飛天神王徑下北酆呼三尸名見三人出即有擲火大神放烈穴燒滅蕩然清淨亦呼七魄名有白衣七人從肺出𠕂呼三魂名青衣三人從肝出同入火池一煅即化爲嬰兒玉體光瑩内具五色有赤文羅絡形體各鎮其宫元始即下居赤明之境端靜而坐諸官君隨光而散了然無物一身照徹内想不出外想不入眞造道之境也守而行之則大定神光之道可得而造矣兆於毎日清旦靜坐寂定存心端謹無内外想先淨身口想念如前一叚了次叩齒三十六通鼓動華池灌錬五芽生靈液一口咽入淵元宫以左手剔起十二辰訣飛子午斗上升泥丸以右手剔十二辰目飛子午斗於大丹氣枕一穴飛芒過擡頭兩目髙奔日月正取太陽之炁咽入絳宫平一炁不升降定目不瞬諸天日月停景混沌一炁子中名星宿則炁不運行兩手十指交叉平心運脉不息以舌拄上腭合齒生津神風靜黙咽氣下歸丹田山海藏雲瞑目不顧外想内外無物天無浮翳再行一炁周匝四體内外上下一同四炁朗清端坐一身不側一國地土以一身鼓運體節上下内外更不妄想山川林木緬平一等無復髙下平坐一心朝念觀相一身已土皆作碧玉入道定之境也運用巳周偃息下座大定神光之圖人端坐圓光中身上有五色光訣曰以耳對肩以鼻對臍收其六根專神於目非外非内觀其神光三日之外宻室之中見神光一㸃孜孜定神四日之外漸明漸大神光滿室定中百物皆爲未然七日之外見一切眞靈鬼物方入洞觀徹視之道各主用旺四十五日各主一分凡行大定徹視之道須持二品戒行大定三年面朝三清天尊賜劵白日飛昇位補天眞若不持戒德智慧不生難入大乗之路妙能體合至妙升入玉清此道不問開度濟生伐惡朝修保身護命消災去痼須行此道惟每日眛爽子午之時實可行之是時神清氣爽萬神同集洞達幽明此一身晝夜運化之妙乃宗師授於玄師皇人口口傳授度人若不坐應虚負仙階天曹地司並無仙籍黍珠入妙經曰十遍周竟十方無極天眞大神一時同至一國男女傾心皈仰來者有如細雨宻霧迮國一半土皆偏陷非可禁止於是元始懸一寳珠大如黍米在空玄之中去地五丈元始登引天眞大神上聖高尊妙行眞人无鞅數衆俱入寳珠之中天人仰看惟見勃勃從珠口中入旣入珠口不知所在國人廓散地還平正無復欹陷師曰謂十遍說經巳竟十方無極大神并天眞一時同至感召十品慧力經澤祥應一國皆獲護度咸得長生故傾心皈仰傾國來赴說經之所謂如細雨宻霧不可稱量其數所言无鞅之衆萬天普言一國一國並㑹大浮黎土其地不能厚載天尊經力重德及無鞅廣衆則地窄偏陷來者之衆雖巳迮國一半尚自不可禁止是以天尊施玄妙大化懸一寳珠大如黍米在空玄之中莫測所懸之系去地五丈離於濁色之表登引天眞大神上元之眞九品之眞上聖髙尊中元聖尊九品之聖妙行眞人下元仙眞九品眞人千乗萬騎隨天尊登引俱入寳珠之中其一切天人非天眞上聖眞人故難隨無爲化機不能同入空懸黍珠之妙止仰看而巳見勃勃從珠口中入旣入珠口不知所在且如下格小仙有芥納須彌之妙懸壷天地之境何況大聖天尊敷宣大教示現神變也所言寳珠大如黍米巳是微妙更去地五丈能寳珠在空玄之中者非天神亦無此明慧又況見其珠口者實天尊登引聖眞入妙有虚無之境當時隨天尊入於寳珠之時天人仰看即見珠口旣俱入寳珠之中即天人不能見寳珠之内玄妙之化是以國人廓散地還平正無復欹陷此當時說經之境即天尊寳珠之妙也以至道言之大道神通大無不包細無不入聚則成變億萬无鞅之衆俱成毫芥之妙聚則如是散則從無生有遍及萬天諸國分形兆億無所不遍無所不入散則如是也去地五丈則離其五慾五塵五聚五色五香五聲五濁在五行數外故能入空懸之妙黍米者五穀之長一國者一身之比欹陷者道有傾迮未全一體難稱重玄之妙化天人則萬神也上聖天眞妙行眞人則三元之神也天尊則一身之主也以内境妙道言之乃玉清寳珠神化胎仙之訣以大法言之却粒愈疾之法以修誦言之威神玄化之儀蠲災召福之品師曰九轉十遍功用旣周即證從有入無空玄黍珠之妙先召陽精後呼隂華比細雨宻霧而入一身周盈祖炁十回神化元谷祖炁一歸衆炁同隨化黍珠之玄丹鎮黄庭之靈府丹成貫日餌之立駕雲輿上升玉清位為眞人太玄眞人頌曰靈盻比天上應太玄三日陽合七朝隂全十三坤位十八運乾望朔帶符八八為弦二十三夕隂陽宗元名曰常道此㑹三田一塵有染失於綿聮黍珠人妙之圖天尊妙化之圖中理五炁經曰元洞玉暦龍漢延康渺渺億劫混沌之中上無復色下無復淵風澤洞虚金剛乗天天上天下無幽無𡨋無形無影無極無窮溟涬大梵寥廓無光赤明開圖運度自然元始安鎮敷落五篇赤書玉字八威龍文保制劫運使天長存梵炁彌羅萬範開張元綱流演三十二天輪轉無色周廻十方旋斗歷箕廻度五常三十五分總炁上元八景冥合炁入玄玄玄中太皇上帝髙眞汎景太霞嘯詠洞章金眞朗郁流響雲營玉音攝炁靈風聚煙紫虚鬰秀輔翼萬仙千和萬合自然成眞眞中有神長生大君无英公子白元尊神太一司命桃康合延執符把籙保命生根上游上清出入華房八𡨋之内細微之中下鎮人身泥丸絳宫中理五炁混合百神師曰此天尊說造道開天之本五劫生成之始也經曰天上天下無幽無冥無形無影無極無窮溟涬大梵寥廓無光師曰此明大道本末之體也經曰赤明開圖運度自然元始安鎮敷落五篇赤書玉字八威龍文保制劫運使天長存師曰自天尊五劫開化之後運洞陽之火冶錬成文劫號赤明安鎮五方保天長存是五帝育物之道付之五老諸眞乃中品之道也經曰萬範開張元綱流演三十二天輪轉無色周廻十方旋斗歷箕回度五常三十五分總炁上元師曰開劫之後惟立萬法之範功用造化總於上元經曰八景𡨋合炁入玄玄玄中太皇上帝髙眞汎景太霞嘯詠洞章金眞朗郁流響雲營玉音攝炁靈風聚煙紫虚鬱秀輔翼萬仙師曰前明天地大道之本次說人身内景之道上清八景三部二十四神乃萬仙之首衆神之主玄中太皇者西元金毋此混合大洞玄中之玄妙中之妙上上之道明者神仙修之成上眞經曰千和萬合自然成眞眞中有神長生大君无英公子白元尊神太乙司命桃康合延執符把籙保命生根上遊上清師曰正是混合五神大洞萬化之道是付之玉晨上品者是也經曰出入華房八𡨋之内細微之中下鎮人身泥丸絳宫中理五炁混合百神師曰太乙含華如蓮八𡨋細微比經緯五炁皆由三宫混合百神主於五神因化訣曰此二章之一章也乃靈中之寳上品之道正所謂玉晨道君云受元始無量度人上品是斯也造化即非身外根本比於三天上皇三十九帝九霄无上髙眞普天萬帝无極髙眞咸皆宗仰朝於紫微上宫金闕七寳瓊臺之内靈妃侍香眞人典守四萬劫一傳妄泄此道削名玉清九祖沉於火毒之獄一身永受風刀之考永劫不原七玄世世蟲癩之報非巳成眞人無科可授誤泄一言永獲考殃非上玄聖師下教天眞小仙豈可得明乎妙行眞人頌曰一炁朝宗入於八𡨋天門地户啓閉塞通生本太微明梁祖炁天入作陽天開於隂地泄爲眞納與邪功水火同來百神回東歸於谷室妄泄傾崩太乙含華之圖心胞八脉上通九色内含五彩太乙含華如白蓮旁通九鼎乙庚合成緑丁壬合成蒼戊癸合成紫丙辛合淺紅五神混合圖十轉回靈經云十轉回靈萬炁齊仙師曰十轉之道乃五行生成之道十轉之法是天尊十過說經神化者是其理矣經云衆眞侍座師曰一身眞集可議斯言經云元始天尊說經一遍諸天大聖同時稱善是時一國男女聾病耳皆開聰師曰眞集常善水數生一普天蒙恩水生上朝遍流山谷沐腎増智聾耳得開病耳得聰至道言之迷者不知音外眞病耳不聽無聲火聰亦曰聾得水之眞一流智昇慧開時並耳聽也經云說經二遍盲者目明師曰一身光明之主日月精華之根者目也爲尋眞之户牖見道之靈宗上道禁經日月爲首光明者火也中主之瞳熒惑之本日月分暉也火二生數天一眞水浴生本始之根上玄眞火騰飛於心故復光返明接景三光是盲者目眀況生化之本甲坼兩腎戌亥之元系水朝元三瞳上凝心生火視三光合并二瞳主目光曰吁貟是也至道色盲亦由其𩔖矣經云說經三遍喑者能言師曰木之生數也以至道言之物生五行一色有五彩隂陽互相反覆藏其用其喑者以常道言之肺王音者以五常明之言生金也金主聲即天尊三遍木之生數神化理在西方正金之體以木召金返復神變故喑者能言是也經云說經四遍跛痾積逮皆能起行師曰金之生數也跛痾者偏枯肌血四肢攣曲癃痾跛蹇也積逮之疾者世傳逮及積沉不愈是也此正是筋脉舒蹤血絡澁流屬於木脉肝氣羅絡之至即四數神仙正所謂返復五行生成之法也以至道言之法身之病金木互用則昌金木正用則亡正是水火互相須金木互相愛故四遍金之生數而成木之神變此之謂也經云說經五遍久病痼疾一時復形師曰土之生數也一身肌血形體皆屬於土五遍復形全於五行之體故盲聾喑啞跛痾積逮久病痼疾一時痊愈復形全質是五行生數也經云說經六遍髪白返黒齒落更生師曰水之成數經云說經七遍老者返壯少者皆強師曰火之成數一身光内生五臓之華外改老者返壯少者得之顔貌益強皆水火之功也經云說經八遍婦人懷姙鳥獸含胎已生未生皆得生成師曰木之成數生炁育物皆得生成聖胎凝靈八炁秀結分形胎化無諸耗損木之生炁所主也經云說經九遍地藏發泄金玉露形師曰聖胎九轉金之成數形難隱諱金光玉華照耀一身所謂金容玉貌瓊肌瑶醴沐溉一身嘘呵萬物立生金玉吹炁成金唾地成寳百光千彩映絡内外皆由五行成用金玉發胎聖胎分形也經云說經十遍枯骨更生皆起成人師曰土之成數所謂十轉回靈萬炁齊仙回骸起死朽骨變仙更生成人此十遍之道祖於五行生數終於五行成數明此道則長生修其道則神仙脫殻飛升止於此矣若功成行滿位登髙眞八十一日一轉八百日小乗三千日大乗不離斯言應出産一切神仙萬法路徑殊途事歸一揆眞師曰口訣盡於文焉是下品之道付諸眞者是也法空眞人頌曰自一至十五行爲本隂陽周回出入聖閫日上扶桑月沉玄衮萬神朝眞得同大混急急如律令吐納正炁經云引炁三十二過師曰靈寳正炁即三十二天正眞道炁若不採納此炁内修無功成之基外施無感應之驗則空尸行上道下鬼誦靈章徒用施爲耳太黄天黄炁太明天緑炁清明天青炁玄胎天赤炁元明天蒼炁上明天黒炁虚无天碧炁太極天紫炁師曰歩斗牛女虚危室壁之罡取炁則八天天君遣眞仙侍衞洞觀八天之事所適無礙赤明天白炁玄明天緑炁耀明天黄炁竺落天青炁虚无天赤炁觀明天蒼炁玄明天黒炁太煥天碧炁師曰歩角亢氐房心尾箕之罡依色取炁則八天天君遣眞仙侍衛能洞觀八天之事所適無礙元載天紫炁太安天白炁顯定天黄炁始黄天緑炁太皇天青炁无思天赤炁上揲天蒼炁无極天黒炁師曰歩井鬼柳星張翼軫之罡依色取炁則八天天君遣眞仙侍衞能洞觀八天之事所適無礙皓庭天碧炁淵通天紫炁太文天白炁太素天黄炁太虚天緑炁太釋天青炁龍變天赤炁太極天蒼炁師曰歩奎婁胃昴畢觜參之罡依色取炁則八天天君遣眞仙侍衞能洞觀八天之事所適無礙服炁訣曰凡服三十二天之炁並先叩齒九通自天門入上元綱流演圖至二十八宿分歩之每天存金樓玉殿天帝端坐冠冕衣服隨本天之色口降本色炁如絲芒鬱鬱然布於兆身各從其數吸歸身中凡有祈奏依帝玄治罡風中黙奏立伺感通四維梵天中斗罡皆取直宿日服兼於四天並行玄眞隱諱亶婁阿薈丁丑豫無惒觀音戊寅隨須延明首已卯蠱法攬菩曇庚辰臨稼那阿奕辛已觀忽訶流吟壬午噬嗑華都曲麗癸未賁鮮菩育臻甲申剥答落大𣑽乙酉復散煙慶雲丙戌无妄飛灑玉都丁亥大畜明魔上門戊子頥无行上首巳丑大過回蹠流玄庚寅坎阿陁龍羅辛卯離四象吁貟壬辰咸南閻洞浮癸已恒玉眸詵詵甲午遯梵形落空乙未大壯九靈推前丙申晉澤洛菩臺丁酉明夷緑羅大千戊戌家人眇莽九醜巳亥暌韶謡縁邅庚子蹇雲上九都解飛生自騫損那育郁馥辛丑益摩羅法輪壬寅夬霐持无鏡癸卯姤攬姿運容甲辰萃馥朗廓奕乙已升神纓自宫丙午困刀利禪猷丁未井婆泥咎通戊由革宛藪滌色巳酉鼎太眇之堂庚戌震流羅梵萌辛亥艮景蔚簫嵎壬子漸易邈无寂癸丑歸妹宛首少都甲寅豐阿繿郁竺乙卯旅華莫延由丙辰巽九開自辯丁已兊阿那品首戊午渙无量扶蓋已未節浮羅合神庚申旣濟玉誕長桑辛酉小過栢空度仙壬戌中孚玃无自育癸亥末濟九日導乾乾坤毋東覆坤形攝上玄甲子屯陁羅育邈乙丑蒙眇炁合雲丙寅需飛天大醜丁卯訟總監上天戊辰師沙陁劫量己巳比龍漢瑛鮮庚午小畜碧落浮黎辛未履空歌寳珍壬申泰惡奕无品癸酉否洞妙自眞甲戌同人元梵恢漠乙亥大有幽寂度人丙子謙師曰此道乃元始所開之圖是玉女玄眞隱諱之道自甲子日屯卦爲首水雷坎上震下陽爻三十六息隂爻二十四息一呼三寸一吸三寸乃爲一息也脉來四至一至寸有五分四至六寸眞炁老陽重呼隂重吸三十二數二十八數促功六十時以元炁結絡眞文於丹谷自然玉文秀瓊龍章八芒以洞陽眞火冶煉成赤書欲知此道龜山元皇之圖此乃白日上昇之法未明至理依修誦品吞服一年自然通神以待玄眞降格指叙矣胎化法質皇人訓曰元始聖胎有十月生形之數有七首五根之道經曰上品妙首十五歳无行上首二十五𡻕阿那品首三十五𡻕須延明首四十五𡻕宛首五十五𡻕三界稽首六十五𡻕群魔束首七十五歳師曰上品妙首不待九年之功无行上首七年可以成眞阿那品首九年指日飛昇須延明首一紀功滿神具宛首十八年尸解得道六十五歳地水之仙名注天府故三界稽首七十五歳長生度世無諸魔試故群魔束首巳下延壽天年群魔束首也經曰上無色根是爲天根斬絶地根保命生根落滅惡根師曰上無色根諸塵漏淨入於無相無爲之品是爲天根未達此根先斬絶地根無諸業累苦債即得保命生根二道並以落滅惡根爲首又云上法天根中法地根除於色根落滅惡根師曰旣知聖胎七首五根之道方可入元始胎化也元始聖胎生於赤文之後碧落之先産於大浮黎土心胞八脉外應九色錬於九鼎七首五根之先赤文碧落之初天地起於有數要在口之呼吸之先旣有呼吸之炁運於出入之息晝夜三千五百息一息脉朝四至在呼吸之間一呼三寸一吸三寸呼吸之炁六寸出入一至之脉一寸五分是十五分隂陽大數天地之體天三地二三也其眞炁入九鼎運汞攝鉛造化元始聖胎每一時炁長六千七百五十寸十二時通長八萬一千寸共計八千一百尺爲八百一十丈眞炁是十二時也每一時權機八刻二十分十二時計九十六刻内乾坤艮巽占四刻通一百刻每一時定一千一百五十息十二時定一萬三千八百息每一息定火一銖二十四銖乃定一兩三百八十四銖定火一斤一萬三千五百息計眞火三百十五斤二兩半八隂八陽故天地運度定人炁血周流一晝夜百刻中每一刻六十分一時八刻二十分得三百六十息一呼一吸天地運行有六十里一晝一夜運行九十六萬一千五百里周天三百六十五度二十五分半周天一百八十二度七十五分七十五杪度一千四百六十四里六寸二十八宿運行皆隨天地旋斗歴箕進之毎刻天地運一萬八百里毎一刻六十分一分六息一時天地運行八萬四千四里一時炁長六千七百五十寸十二時炁行共七十萬八百九十寸天地行而炁血行隂陽運而營衞行日月交而内炁交内炁交而産至寳至寳聚而成大丹圎成凝聖胎其走漏之道八邪所攻造化丹之基十干之合配於九鼎合於九色成於九轉也元始内觀心胞八脉圖乾坎艮震巽離坤兊本始神通經曰通玄究微能悉其章至學之士誦之學士誦之凡二條供養尊禮凡誦是經十過凡二條上學之士修誦世人受誦凡二條正月長齋誦詠七月長齋誦詠十月長齋誦詠凡三條八節之日誦詠本命之日誦詠凡二條誦之百遍誦之千遍誦之萬遍凡三條六時行香十遍轉經天地否終日月虧盈至聖休否末學疾傷凡四條行香誦經十過凡一條亦當修齋行香誦經天地運終星宿錯度四時失度國主有災疫毒流行師友命過凡六條齋戒誦經上消天災保鎮帝王下禳毒害以度兆民生死受頼凡六條發心修齋燒香誦經十過凡一條有知其音能齋而誦之故誦之凡二條師曰巳上三十八條皆元始本行神通功德不可思議凡闕一條所感無應不得爲眞人矣修誦玄感師曰誦經欲知其功德合於上玄有一百五十種玄感旣有玄感則去仙登空有日若無玄感更宜懴謝端潔一志以玄感昭應爲禎祥諸天遥唱萬帝設禮河海靜黙山嶽藏雲日月停景璇璣不行群魔束形鬼精滅爽廻尸起死白骨成人上聖十種禎祥五帝侍衞三界稽首魔精喪眼鬼妖滅爽濟度垂死絶而得生志學六種禎祥伏御地祇束縛魔靈却死而巳學士三種禎祥門户興隆世世昌熾與善因縁萬災不干神明護門供奉五種禎祥諸天齊到億曽萬祖幽魂苦爽皆即受度上昇朱宫格皆九年受化更生得爲貴人而好學至經功滿德就皆得神仙飛昇金闕遊宴玉京也上學之士修誦是經皆即受度飛昇南宫世人受誦則延壽長年後皆得作尸解之道魂神暫滅不經地獄即得返形遊行太空凡誦者十種禎祥斷地逮役度上南宫正月誦之二種禎祥身得神仙諸天書名黄籙白簡削死上生七月誦之三種禎祥安鎮國祚保天長存世世不絶常爲人君安鎮其方民稱太平十月誦之六種禎祥九宫眞人八節誦之一種禎祥魂神澄正萬炁長存不經苦惱身有光明三界侍衞五帝司迎萬神朝禮名書上天功滿德就飛昇上清本命議之十種禎祥閉目靜思身坐青黄白三色雲炁之中内外蓊𡨋有青龍白虎朱雀玄武獅子白鶴羅列左右日月照明洞煥室内項生圎象光映十方入室誦經九種禎祥三五功曹左右官使者侍香金童傳言玉女五帝直符直日香官玄局召使六種禎祥洞章萬遍十四種禎祥天地運度亦有否終日月五星亦有虧盈至聖神人亦有休否末學之夫亦有疾傷祈禳四種禎祥末學道淺或仙品未充運應滅度身經太隂臨過之時同學至人爲其行香誦經十過以度尸形如法魂神徑上南宫隨其學功計日而得更生轉輪不滅便得神仙太隂錬尸三種禎祥天地運終亦當修齋行香誦經星宿錯度日月失昏亦當修齋行香誦經四時失度隂陽不調亦當修齋行香誦經國主有災兵革四興亦當修齋行香誦經疫毒流行兆民死傷亦當修齋行香誦經師友命過亦當修齋行香誦經修齋行道十種禎祥諸天記名萬神侍衞右别至人尅得爲聖君金闕之臣諸天記人功過毫分無失天中魔王亦保舉爾身得道行功五種禎祥飛天神王下觀其身書其功勤上奏諸天萬神朝禮地祇侍門大勲魔王保舉上仙知音誦之六種禎祥无所不辟无所不禳无所不度无所不成天眞自然之音也故誦之致飛天下觀上帝遥唱萬神朝禮三界侍軒羣妖束首鬼精自亡琳琅振響十方肅清河海靜黙山嶽吞煙萬靈振伏招集羣仙天無氛穢地無妖塵𡨋慧洞清大量玄玄也二十四種禎祥說經一遍諸天大聖同時稱善一國男女聾病耳皆開聰說經二遍盲者目明說經三遍瘖者能言說經四遍跛痾積逮皆能起行說經五遍久病痼疾一時復形說經六遍髮白返黒齒落更生說經七遍老者返壯少者皆強說經八遍婦人懷姙鳥獸含胎巳生未生皆得生成說經九遍地藏發泄金玉露形說經十遍枯骨更生皆起成人内誦十種生元始聖胎禎祥隂丹陽丹經曰流精玉光五色鬱勃經曰身有光明經曰上品妙首十回度人百魔隱韻離合自然混洞赤文无无上眞元始祖劫化生諸天開明三景是爲天根上无復祖唯道爲身五文開廓普殖神靈无文不光无文不明无文不立无文不成无文不度无文不生經曰玉誕長桑栢空度仙師曰流精玉光者天之靈寳也可以修錬餌之通眞故天眞皇人云太空未有一物元始天尊挺生三炁之中混洞赤文冶煉方成玉字開明三景普殖神靈不知今日有此比擬元始之先化生靈寳之炁復採此炁錬而成丹餌之成眞訣曰於髙山懸崖之上人跡不及四顧日月通處之照營宻一所上圎下方面相去八尺四方一丈離地五尺穿三十二竅布二十八宿之形如牕牖使日光注照於日直角宿之日起首用七寳之器圎面五寸貯西流之水令迎日光下降四十五日之外水中結成五色流精之砂取而餌之面生流精紫光通神致眞欲成靈寳大丹於三十二竅之下置三十二器於直宿之日取其方水投以天華四泉四泉者雨露霜雪合之使日照月耀水中四十五日水面生浮砂光明嗇嗇然常須護淨勿令塵翳即安置壇爐八門進火以金十二兩作鼎以鐵二十四兩作釡用陽燧取火晝夜煎之四十五日一開開時以月華灌潤下凝白華取之及一斤即用河上姹女丹山白魂絳陵朱兒各二十四銖置鼎中上以靈丹蔽之隂陽煉火七時飛於蓋之上増及一斤即入九轉九年自然飛凝結胎胞中有絳實朱柯一粒吞之立化飛仙四十五日一沐浴也如金丹之道火煉玉字在於丹谷於本命日依法循竅吞餌日月之華具正炁品中功滿内外感化指日而朝玉清玉誕則玉光之精降育於扶桑栢空度仙於空界亦大洞内三景妙旨丹成濟世後可服之師曰赤文飛落太乙含華似蓮花爲祖百花爲次亦曰靈寳珠光丹可愈百病起死尸久服長於丙丁戌亥辰巳日時左手採未開白蓮花右手採紅蓮花各三十二朶火焙纔乾烈火化成灰次於三月三日七月七日九月九日採百花各一斤同伴次入九節菖蒲人參地黄天門冬蒼术乾姜巨勝各五兩同治下篩以百花醴和如膏丸如大豆大以無灰酒下五七粒採和有祝具修誦品兆日服一粒百日逺知一年無疾永不得死千日五神足立致長生矣大行𣑽炁經曰八景𡨋合炁入玄玄玄中太皇上帝髙眞師曰此西元王母八景玄妙之祖炁也亦曰丹皇君此元始上品至道三界眞仙莫不因此人身大梵上應於天度故呼吸之炁息至炁行身中合於太陽煉成大藥斯實修眞之路進道之階經曰大行梵炁梵炁彌羅溟涬大梵无色之境梵行師曰人自溟涬大梵而生却自溟涬大梵而死若知大行梵炁先修一十二種梵行後别梵炁梵炁之祖者王母也比亦大洞之上道也夫人禀炁而生亦有數之始呼吸之息見於三部四至之脉一呼三寸一吸三寸以尺丈於璣衡合於太陽一日一夜一百刻計六千分每一刻六十分每一時八刻二十分共計一百四十分晝夜計一萬三千五百息毎一刻三百六十息一呼一吸脉行六寸定太陽行六十里一晝夜太陽共行九千六萬一千五百里隨天周行照度三百六十五度二十五分半一日得一度半周天是一百八十二度六十二分七十五杪一度計一千四百六十四里六寸四分二十八宿行次𨇠度大道梵炁流演無窮旋斗歴箕回度五常每一刻太陽之眞炁流行一萬八百里毎一刻六十分三百六十二息定太陽流光毎一分得六息而流光三百六十里毎一時太陽行流眞光八萬六千四里毎一時炁侵六千七百五十寸十二時炁血總行七十萬八百九十寸曰月交而隂陽交日月行而營衞行而大藥成於此矣右古鼎九炁炁中集有一小兒楚炁一曰一夜上朝若稍有塵心則失大行梵炁不能彌羅一身則死矣乃死户之首也此乃九炁之根眞土之淵府在西北之角戌亥之間與玉清連界通於泥丸也南接通陽絳宮上通肺炁下通肉户日月之門丹房金舍北在内腎方三寸傍穿十二神室中有梵炁之主雌一眞母居焉西龜山圖西龜之山一曰龍山言木之道也金毋居之言金之體也乃九天之根本人之九宮之根也紐黄炁之淵府乃梵炁之宫土之正府也在天西北亥子之地嬰孩之生根也周回千萬里是不知其極出常數之量度外也髙與玉清連界上通腦也脉通玉帝宫東南接神虎之門接通肺炁也又與大胃交通矣西北交寒穴與腎宫便穴交炁也南極洞陽恊於心北指勾陳踐中皇宫也上充玉京二十四節重樓十二也平三萬里三炁之㑹也湧金爲墻結玉爲門眞土玉液之闕也金臺王殿同前議也十二神室七政九宮三田十二神室也餘云上有流精紫闕金華之堂傍通五穴即是集五臟之精㑹門也有自然紫炁之雲交帶鳯文九色落練四肢八脉五臟六腑赤華紫英是内生五炁也其崖生紫桂嶺秀瓊林結瑚爲條植玉爲根騫林含實赤子白環炁行無疵而生此寳也三華耀葩於朱景反香流芳於太玄內視接三明五香生五炁也八炁蓊飈玉籟空唱内之無器之音也元綱流演師曰元綱則元炁之路九天之根以天言之在西北之角與玉清連界東南則接通陽之霞上承清宫神虎之門西北則寒谷之野上通金闕神仙之庭南極於大丹浮黎之郷炁恊洞陽之光北則正於勾陳交關華蓋炁踐廣陵中央直充玉京八達交風即西龜之山乃天之靈根也師曰考詳元綱者乃天之根紐炁之經𨇠道源未判元綱巳肇此乃天地之大體妙炁之靈樞羅絡乎三十二天之中貫通二十八宿之分形而上者謂之道流於末者謂之教行之内則配合於身施之用則旋回有法此乃因天地之自然象人身之體用也且人之幻身結形穢濁受質胚胎一髮三毛無用塵有之物獨我之一靈與天地相爲終始是均禀祖炁也故頭圎似天足方似地目如日月體象乾坤炁息周流宻應天度人能修此以應彼則可以與天長存超然不泯矣昧者不悟其眞不考其用乃曰身中備有天地不假外求非也内煉之法散而三千六百傍門要有金丹正訣其始也追二炁於黄道㑹三性於元宫而其成也隂魄消蹤陽神契道随其功業之重輕第其資品之崇卑効職仙曹受書洞府終不謂我身有天地而外無天地内有神形而外無鬼神得一末術便以爲有内而無外何其謬哉近者亦有如此論之非者矣所恨不逢師旨揣量莫得其要旣不全内又不專外乃自爲之說曰謂之不内不外是又去理逺矣且蒼蒼在上天也日月星辰天之文也博厚無根地也山川河嶽地之理也人之一身四肢五體乃天地間之一物而性靈於萬物爾戴天履地而言外無天地可乎所叙元綱之體乃天之經常也次則叙人一身取法天地配合隂陽言其象也天以剛徤而不息故天地以長存也人能會道而澄神人亦可以不泯也此非身中自爲天亦不内不外未免誤天下後世矣故不得不明辯之元綱者昇神之要諸天階之絶景道源旣判神天居崆峒之上非言可盡非見聞可窮悟其眞者因眞修眞而外眞自應識其妙者因妙得妙而外妙自臻惟天神之象則元綱之位其逺其近舉可知也人之有元綱炁開通骨脉𩨨空達於頂上一如天上元綱之路人之魂魄在身一如炁在天中知出入則長生飛騰不知則庸愚之夫不學術業未知仕宦官䏈之次而求見君也夫元炁融聚魂魄所養爰有眞精眞精而本根於右腎右腎爲命門在脊骨之窮其下有一大骨骨中之髓透尻骨其穴名龜尾其神爲王母面南而治事因帝所向而言之則謂之西龜之山道家託喻爲名也又爲之金闕以其居西也右爲金闕左爲玉房言玉在山木潤之居東方也又玉水之所本陽精之化精之所著名曰淨霐此元網之炁根本之所發也寳圖之設髙臺起於此鬱羅蕭臺之中尊直當於心所謂靈臺也上清之境太清之上際則心之下也心之懸垂其下爲肝肝之下二分北斗七星居之其炁達心其原上通舌下名曰湧泉其炁下逹右腎炁腎之炁泄者湧泉炁不禁謂之交鋒交鋒者言斗之罡星太魒所照之地其性肅殺其神即欲界也如知其道者以舌柱上腭直運其炁循脊而上以脊通頭頭上者玉京之要路所謂西龜與玉京爲鄰界也今人不知便以爲西龜在腦後然西龜去玉京之炁四千萬重居中炁直逹在天則火星最低炁先及也又心屬火言上達而相感夫日月與火星齊故遊日月參諸一身則兩乳與心齊兩乳者眼之根源也人之二乳藏精以養目也故年老炁衰目昏而乳無汁腎無精箕斗在天之東北爲天關鍵艮之故也於人則右手肩井穴也人之血氣脉以右爲始天道之行以西北爲始由西行而至牛宿則天事畢矣然未有發生故造化於此起矣言重入火星也人炁雖一周而消息係焉言重入心中心也由火木水金而行者大廢也由心肝腎肺者氣腧也即背脊之穴也取脊穴而觀則上下左右見矣求其妙而推之其喉環通於頂門所以爲玄玄之妙難以言而殫不可指而名也无色之界在心之下崆峒之中斗魁之左也復自斗口則以舌拄上腭名曰天橋則超上清而至玉清矣如此則玉清之境頭也上清之境絳宫也太清之境丹田也心爲靈臺則靈臺之說可見矣於是而守守之在心於是而朝朝之在頭此三華離便大有妙庭也故天中之天无英白元之會心也自然成眞㑹於頭也修靈寳之道於身中至此而事畢矣不可得而容聲矣切謂元綱流演之於天巳叙於前體合於人身荐録于此學者宜深知此身之所以貴重者可以配天地可以煉形神可以㑹神妙乃道家因物象以設比喻法天地以立名稱如已育之身而立有爲之法自有爲而至於無爲以有形而升入於無形然後壽齊天地與道合眞其事始於身中而不止於身中也元綱流演圖按眞誥中諸眞論五星圖所布常南向也以太白在西歳星在東按而施之所以爾者五星隱伏縱横無常不如北斗列象常在故一以定位於五方不得隨星之所在也二十八宿罡式計一百七十八歩訣曰先須存已之神自黄庭乗五色之雲徑從玉樓直上泥丸中飛歩七星節節隨星歩上覺得身離地上極逺在天雲炁中將身横歩七星旋身入斗口累步六歩存身背北面南行到火星存紅色過火星向東行存過日宫紅色過日宫西行存過月宫白色過月宫向西南行左轉七遍却從北出循歴東南方天星到東北角却折歩循歴北西南東四方天星訖再到東北角却望東直從魁星巡一遍徑出向火星上行過西方見金星白色過金星向北行至水星黒色自水星過東方木星青色却從木星再回水宫復西自金星過直向中宫土星位黄色再從土星復向金星水星到木星宫望西北角乗雲直上望見金闕訣曰謁三十二天自太黄皇曽天爲始至平育賈奕天而終然後回謁二十八宿毎宿一斗自箕起而斗宿旋身回至箕却望斗魒而去謁五星如式升神上境入北斗之中三台六星蓋頂而行歩斗一座次六歩應三台而出左環四十九歩犯火星又東行八十一歩至太陽謁孝道仙王復右行六十四歩自北入斗至太隂謁孝道明王左旋而出左行復右行七返无色界中定想見諸眞仙來徃周歴十方二十八宿三十二天毎宿丁罡十二歩次回共三百三十六歩至箕之罡直還望北斗大魒之次右旋南嚮四十九歩重入火星經於太隂三十六歩謁水星東行至于太陽之側右行六十四歩成木東向謁木星再回而行借水星罡復出太隂之傍八十一歩成全西向謁金星東行達于斗口三十五歩而入中謁土星反行再入金水之宿直望北方玉京金闕乃入歩而進再拜長跪祝曰具位臣姓某幸因宿慶獲際眞風入靖凝神恭朝天闕身外之身冒抵玉京臣無任瞻天望聖惶懼屏營之至再拜重啓曰臣凡骨堅頑理難升舉幸因師授使遂飛神不避誅夷敢披丹悃入事云云臣無任祈恩俟命之至謹言再拜退復元路還神入頂門祝曰吾今朝眞上謁青雲欲使神人閉債封形舉爾以去祕訣靈靈右元綱流演之圖乃梵行諸天之妙也始於飛神躡斗終於謁帝朝元若能精思按行出入旣熟證對不亂可以上章奏事役使鬼神以致脫殻升眞混合萬炁煉形之術朝元之方莫先乎此毎於三元八節甲子庚申之日入靖焚香面北平坐臨目靜思凝神定想炁息綿綿神風不鼓聳身出頂如蟬之蛻殻升陟空玄如法行事自微至著由想念而成眞則在乎其人矣上清靈寳大法卷之四
