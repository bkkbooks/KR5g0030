front:
  text: 上清靈寳大法卷之三欝三
  hash: sha256:ceb4e5c1a2231ade8932d641863b72911310b8c1fa66d23410f7e2bc68730ca0
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5g0030_HFL_003-001a, image: hfl/0942/0942-102.png}
body:
  text: 洞微髙士開光救苦真人𡩋全眞授上清三洞弟子靈寳領教嗣師王契眞纂經緯修用門洞視式入局謂定息入重堂坐謂已坐案机面前懸鏡於壇上鏡面水盆陽神在鏡隂神在水靈寳眞人仰某神於此速現形急急如律令局榜式神虎洞視局仰本局應干吏兵功曹使者玉女伺當朝元罷常切於此祗候分明現形衞集聽候本局使喚右以牌一面兩面寫之今日入局今日不入局洞視黙表式具法位臣姓某稽首再拜上言伏念臣生居下土夙植良縁叨佩靈文獲親道域濫司三洞法職誓以濟死度生洗滌塵根精思至道終始修錬遵守戒條況以穢質凡軀未達玄元至理耳目閉塞身心昏蒙何由徹視鬼神罔能洞達幽顯昨蒙度師某傳授靈寳大法混元玉札洞視隱文臣今者恭遇某日之辰依法吞服内諱徹視眞靈伏望祖師上帝三寳眞靈赦原瀆犯之愆迄遂陶成之妙特降正眞生炁大道慧光三寳法澤六通眞炁流入臣身田之中内滌心鏡塵障外除耳目穢氛開通臟腑之光明銷鍊百關之隂滯摧伏妖魔罪厄斷除結節胎根令臣吞服内諱神文立照萬方坐觀三界洞明幽顯徹視鬼神度死濟人修眞學道所欲所向無願不從期賛眞風上禆玄化不敢輕泄漏慢叛道背師如負盟誓甘依玄憲臣謹伏地宻奏心章一通上詣三天門下三寳上帝至尊几前臣無任祈恩激切屏營之至内鑄六丁師曰於每月上六日午時以黄素丹篆六丁眞諱六字面當旬之方者爲首以次從之各吸炁布之毎二字作一符共爲三符至上七日五更丑初時睡覺披衣面丁立方取一符九之次况其名以淨水吞下候其時聞初有人作聲時急望本方吸炁六口咽之至中七日下七日三旬並同此法一月受持足後自此凡有一切事面本旬方祝名吸炁咽之暝日良久六丁告於心神知意中所起所出言語皆是未來之事無不應者或有邪鬼纒惑之者亦同上法其六神即告以鬼神作禍之由至於服色人數一一皆合其驗外直六甲師曰於毎月六甲日卯時以白素朱書六甲名面本旬方以西流水吞下或不見三光以井水吞訖雙手握固端坐嗚天鼓三十六通叩齒二十四下兩手相义鶴啄六度揺轉三關九次手分項水心存丹田有日光赫赫一身洞然如火内外通赤祝名三十六度吸炁吹身常存六神侍之六甲定日未然之事萝中告詣六甲常衛其形久久可見役召任意凡小小妖魔作過朱書其符同金錢火化其邪立被六將遣出海中通章合契師曰於每年除日預於前一日沐浴更衣至來日平旦於宻室中端坐面天門持誦三天隱諱霐䨜至十二時足滿三十萬遍來日元正曰不語一日自此之後應章詞表奏念法一遍取東炁吹文字上立致通達自有玄報又曰常於晦日要誦十萬遍奏章立達三天矣急厄救護師曰自八節日清齋於戌末亥初入靖端坐持念三天内諱防中表德盘累及十萬遍毎遇虎狼毒物閉炁七息念三十二遍萬毒潜伏不爲害矣又曰於月朔曰要誦一萬遍三月應一切災一切急厄黙念三十二遍某災厄自然解五岳持身師曰於立春後九日立夏後三日立秋後七日立冬後五曰毎土旺一日後面逐方於子午卯酉寅申已玄時叩齒如方數存東岳領四岳君官吏面前掐五岳訣念五岳諱吸五方炁咽之一年功足遇求事或恐懼急厄謂賁入山度水也先叩齒五通祝名吸五方炁咽次又吹身又布方即脫厄所向元言如願洞明萬慧師曰於五月五曰朱書北斗諱不計其數以朱臈丸之置青竹筒中重紙封固安抱雛鷄栖中同成取之服一日誦萬言洞明智慧也或於上七日以黄索朱書用臈袞丸之七粒一日一服清心淨水吞下七七日外百事預知智慧通神日誦萬言開口不忘又曰於上七日夜用乳香一粒朱砂一粒如豆大以西流水或井水一盞浸香朱於中并朱書斗名入水中面東念青童奉命况取香砂細嚼以水送下次面北念斗名并况曰北斗太一靈童一吸百應念七遍取斗符九之以水送下次又念呪曰青童靈明神光玄明念九遍東炁吹餘水中洗目來曰是八日不用香砂止可用斗名并念前三呪呪水洗目凡有人投詞只用前三况取東炁咽了閉門少時心中自覺巳意所起信口所言並皆合其來意祕之行持逐曰吞符師曰以黄紙朱書一寳字計二十一畫念欽敬全收墨漆黒魁至魒食至破計二十一字呪一畫一呪書之逐日吞服想靈字在心寳字在頭師曰應毒物所傷并癰腫丹瘤五臓大小之疾書四直隂陽諱於病所或内吞外貼不過三字即安師曰凡一切疾病書南斗諱服之黄上朱書五岳安鎮符籙師曰凡書符先念魁罡呪掐辰文取魁罡炁吹硯中次念乾元呪入筆又念太一况吹墨上良乆左右研墨四十九匝東南炁吹硯中次念五岳持身况掐中指中吹紙上以朱書籙黙呪一次取西北炁放訣籙中如法封印了令病人將籙焚香禱祝焚烈焰中即有報應其有輔正籙行持一同上清妙行眞人歳破籙天地諱曰月諱五星諱四直諱陽日六丁隂日六甲諱道寳法寳及眞武聖勑攝羅天大將奉請某神依勑攝太歳年月日時告下法位姓某奉行五岳安鎮符師曰應一切兇邪精恠壇席邪廟復連惡地水魈蛟螭朱書於大石上沈之或安埋之五岳安五方天塗西北地塗西南人塗東南功都東北書時掐五岳三塗訣取五岳三塗炁吹之九宫洞視鬼神師曰兆未有定力見一切無道鬼神可依九宫法男起離宫一歳順行初不用二宫入於坎宫起一歳逆行不用艮並一歳一陽宫至何宫分於年中起月月中起日日中起時又於時上起得病作過鬼神發作歳支月支日支及方即知鬼神情狀乾象主頭沉舉體重難任兩足俱冷痛祟是一陽人惡病纒身死西北是沉淪旛香有願誓皂衣乃邪魂坎宫身悶亂懶語腹腸鳴水蠱或肢滿溺死語難伸正北因遊走怪夢足悲吟一鬼隂陽祟細問見其因艮方心脅滿喉中哽塞傷狂言并怪行悲笑罔難量群鬼須八數廟社行不臧更有石金怪東北審形光震位瘟黄病寒熱傳四肢食厭并况罵犯罪天使之刑傷疫死鬼青碧死魂隨紅黄女鬼現三日有傾危巽宫顛狂語盲謎不能明家先爲隂語外厭是女人魂魄拘鬼手晝夜使呻吟潔齋求大道方始保康寧離禍正南地癰癤火燒瘡上熱多黄疸血鬼産傷亡緋紫横死客占親魂是陽正向火位討邪鬼見行藏坤郷脾胃疾痢下體尫羸久須難治療西南有伏尸動土傷歲煞光怪顯其時勾引家先母淹廷死魂隨兊意勞尸疰喘𠻳足迍遭葬埋生不利刑傷有復連橫天求功德古器在宅邊鬼邪三人伴同共致𡨚愆師曰此法齋戒吞服尅日成眞周而復始洞視之訣定目如暗窻之中穿度䑕穴百歩之外視霧之中物瞑目久而視之一意稍失目神引視則靈光不現初如簿霧次如亂色輝照四七之外如影五七日漸明七七曰外有形容服象九十日可聽語音百日外可以役使仙靈尤務清靜如不及行此當行内觀中藏法夫靈寳之道有三上則有帝一徊風之道中則有中理五炁混合之法付於五帝下則有十轉回靈之文付於諸眞三品之外餘緒之者以濟生度死爲功以招眞致靈之法夫學上道希慕神仙者莫不載於斯文内視中藏師曰未能百曰入室於六甲曰平明面南端坐以白素黒書玉札内諱置淨瓶中仍取旬中六旬方土各六合亦覆於瓶内玉札之上置瓶於甲方封閉如法次端坐雙手巡五岳三塗訣一遍念况一吹吸六方炁咽之次又祝一遍取甲方炁咽之午時滌滓乃驗十日定至次甲日取前玉札火化用青玄水調服之以前旬之土棄長流水中再書玉札復如前取土置瓶中然後廵訣誦况滿六十甲日内視見五臓瞑目可以通神洞靈如犯色淫炁則前功並喪促壽一百二十存神參斗師曰參斗之法檡不經生死穢地取青竹作棚架之貌其上置曲尺象布斗罡形於曲尺之要處懸明鏡八面使光照下隨斗罡建以時指方地下以白堊土𥁞斗形於星上明置其燈在地隨鏡光相照鏡以赤繒七尺晝七星内名抺於額下服淨衣仗劒依圖式排列師眞擇天色清明兩霽之後爲妙凡參斗自斗罡交乾而歩毎一星㸃况四十九次覷三光相合吸炁咽之以水送下擲盞吸水噀鬼門喝攝以劔斫盞如四十九次况畢方歩第二星至七星每星皆如此畢歸斗口存伏良久定神七拜視斗口中有二星得見一星即得割移死籍也是夜天眞二界萬神並臨於席上卧斗待報參斗符右此符以緋繒七尺丹書參斗時抺於額腦後繫符向外參斗呪俗居小人好道求靈常見尊儀願賜長生髙上玉皇紫微帝君三台生我來三台養我來三台護我來魁𩲃𩵄䰢魓𩳐魒急急如律令又呪中斗大魁總監衆靈中有髙聖尊帝二星臣今參斗願見真形除落死籍斷滅惡根飛度五戸名注玉清衰病墓絶不干二身北都勾罪録南曹書長生百魔來受事功畢朝至尊大帝付之功玉帝令施行急急如上三天玄都律令勑存神參斗師曰如女子及炁血弱懦不能久立即飛神二眞存魂參斗或不及運身歩斗當於月三七日亥末入靖面北設席端以香置頂中存神意隨香煙徑朝斗中思七星煥明北斗一時久即叩齒七通依星誦呪一如參斗遍數畢寢於靖中席上再存斗中尊帝二星明輝照朗即已是夕有異報如未見感格次候更遇一吉日依訣朝斗以待報應方可行持餘經七次不明其報更不許參斗乃罪業重大不得割移死籍兆宜端潔精確以伺感通方爲効信此法乃召靈之經緯修誦之訣法宜在閉口奉行參斗畢七日勿返凡室使人口恐懼以分化凡之炁也參斗訖方擇日朝元朝元師曰朝元之法定其魂去思慮入於玄妙微化之境方可朝元先用明鏡七寸或四寸九分以新法銅錬九火陶冶鑄之於每日六陽之時面東整肅衣冠端坐靖中以鏡照之存思巳形如此七日形存照巳明爽無别夜半即思己形在泥丸日中存居心中晡時存居下丹田七晝夜上下分明即至其夜關告天門及奏三天玉帝東西二炁王母青君方始朝元其法於夜半子時入靖祝運神㑹道功曹十天承受玉女飛天傳言上吏二官直使正一功曹左右官使者隂陽神決吏科車赤符吏罡風騎置吏驛馬上章吏飛龍騎吏收神食神吏收炁食炁吏收邪食邪吏三十二天傳奏吏甲子官君玉文功曹辯魔玉女捧香玉女天騶甲卒天丁力士治中仙曹執職玉女金童驛吏龍騎鳯車紫羽芝蓋天丁恊佐羅列在前一一分明即手握昇度罡風符身佩玉清朝元符頂戴昇天合同大劵次端坐以舌抵上腭存三元正宫中有三炁三炁中有眞人一如已形先閉炁十二息存下元白炁中眞人昇入心中與黄炁中眞人混合爲一又閉炁九息存中黄白炁中眞人并炁上昇泥丸與青炁中眞人混合爲一眞人青衣皂襈帔有五岳四瀆次左眼出紅炁右眼出白炁二炁交合作一團眞炁化爲車見前有丹瓊羽輦如大車之狀又閉炁三九息存眞人自頂門出登車忘形如夢寐之間乗紫炁金光漸漸而上神眞引從至罡風界見罡風吏乗天獸執器仗兆以罡風符畫車前良久罡風車神引車度罡風如雲炁翁鬱旋回九次而出罡風至星界有日月黄道光明如長虹之狀兩邊多有琪花寳樹如松杉青葉黄赤之花碧枝絳實風動自然成金玉之音逺望四方金樓玉闕在寳雲之中皆星宫仙府也時有乗軒乗車乗鳯乗鶴駕龍麟乗雲皆仙眞之子也須掩面避道半時覺車登盡萬里長虹之路見紫雲隱隱中有天門侍䘙天人止是門内威神守衞甚威天門相對乃欲界魔王之境乃太清欲界天也自此後分大劵付守䘙之神入進天門適意而朝昇度罡風符三天朝元符碧繪朱書黃囊九寸佩之昇天合同大劵分神治事師曰朝元巳畢即知所領仙職曹局預於前三日關告所治之神尅取某日分神治事參謁之禮稍同世務版剌名位一一預告至期一如朝元之禮㸃檢神眞儀䘙以印置面前并劵簡亦同良久見所治之所神靈迎引方始如前法混合出神自然乗車至治所判領職務凡每日朝元畢須徃治事如有凡事不便者宜申三天及治局方許不赴若有責即三天呵阻治曹神歸或未能治領玄局即仙曹建邸焚修立靖分神治事仙曹建邸師曰受行大法宜崇靖所立名靖局前建仙曹後崇髙聖名曰靖局每日朝元罷㑹仙曹入靖治事凡有所治即於靖内施行凡係靈寳洞玄仙官皆屬西元王毋内禁靈虚宫兆旣司仙階即申天機都省於此中建邸仍立司儀司麾司衞左右府給賜仙衣並服三十二條青帔皂朱履冠三辰交泰冠帔用五色彩畫五岳眞形但王母宫中皆服此衣也非朝元治事不許輙用功滿迎神上登仙邸下謁童初受書而成三界仙眞之官矣超度玄祖師曰前之五經旣備方許超度祖玄寄治南昌具有靈寳黄籙齋法更不重叙若能於上元長齋五臈專行㧞度誦經告符其功最重不必伺大齋功德也若一身大惡故作重愆則祖考墮落復入鬼趣有功更昇入青陽仙境兆宜審思之選應玄舉師曰玄舉之道有二十四品大道正法乃上帝玉司皆南司火府天機内省主之内有主者乃元明文舉天帝平育舉清左相靈虚玉嬰大君中央黄老教主主之上帝司舉語詔曰元景丹天三界之教我司主之孰能志髙萬類堪授中主者惟中和獨曹億司舉靈虚大君化元廣教授二十四庭仙品若非立成功德無以應眞師曰旣有凡質神任眞階無功乏行不能名録丹臺升降不㝎賞罰不時夫舉一選便得位封眞人二十四階玉司太清玉司上院正法中央黄老君主之天童經爲司舉治經髙上玉清太極院正司正法髙上老君主之消災經爲司舉長生保命元生府玉司正法長生保命天尊主之護命經爲司舉五帝育物天皇玉司正法天皇上帝主之祕授經爲司舉青羅消災玉司正法青羅眞人主之十一曜消災經爲司舉上清護命玉司正法後聖玄元教主主之通神護身經爲司舉靈寳延壽益筭玉司正法延壽益筭天尊主之益筭經爲司舉青玄左府玉司正法太一救苦天尊主之救苦經爲司舉三元寳簡玉司正法太一救苦天尊主之九幽㧞罪經爲司舉太一神局玉司正法中皇帝君主之太元真經爲司舉太清伏魔天寳壇玉司正法五靈玄老君主之伏魔經爲司舉大平護國壇王司正法太平護國天尊主之五老眞文經爲司舉上清洞淵内院玉司正法洞淵天尊主之洞淵龍帝經爲司舉上清天樞院玉司正法南斗六司眞君主之南斗經爲司舉上清天機内院玉司正法北極紫微大帝主之北魁玄樞經爲司舉治經紫微訣金玄羽章是也太清八威治魔玉司正法中央黄老君主之老君伏魔經爲司舉治經乃化胡經祕訣是文始尹先生集次也靈寳保運玉司正法佑聖眞武大神主之玄武經爲司舉上清九天生神大混玉司正法飛天神王主之九天生神章經爲司舉靈寳度厄天仙内院王司正法靈寳天尊主之度厄經爲司舉九老仙都府玉司正法九老仙都君主之九眞眞經爲司舉元始制魔玉司正法元始天尊主之元始制魔經爲司舉靈寳昇玄玉司正法元始天尊主之昇玄消災經爲司舉靈寳天仙玉司正法上清道君主之三皇金紫元神經爲司舉太清枕中延壽玉司正法中央黄老君主之枕中經爲司舉師曰巳上二十四階玉司有經法俱降於世者有經法俱未降於世者有以法降而經未降者有經巳降而法不降於世者但洞視參斗朝元分神治事仙曹建邸超度玄祖之後須當選應玄舉奏詣三天乞降眞授經法兆巳攝領王司上天委任治職實有大功冠絶方得位登眞人之品修誦八緯師曰修誦之科有八緯宻旨泄之一緯餘俱不神倘因輕慢永無仙冀豈惟一身立致蟲癩玄祖速送火官兆宜内緘於心斧鑚湯火所臨寧甘赴蹈瘖黙勿言雖適其禍身太一五老百神立化景雲迎神赴上清也若無信吾言兆試泄之看上玄之影響邈邇災害于泄緯者滅族百世受風刀立可得也第一寳珠玄化緯師曰寳珠玄化緯者太一含華玉露凝珠是也兆存之誦之不待萬徧而登眞矣心中元始天尊露珠中自巳形如華含露第二獅子威神緯師曰獅子威神緯曰司命化生降而復升是也兆存之誦之萬遍馳雲駕龍白日上升太空頂中元始天尊心中獅子己乗獅子在心中立下五色丹田第三上宫妙乗緯師曰上宫妙乗緯者帝宫分身三元功成是也兆存之誦之萬遍足備舉身升仙頂中九宫上四宫下五宫上四宫中第二宫内有己形四千遍功滿第四中禁證眞緯師曰中禁證眞緯者丹臺内坐中禁成眞六十積功德同九眞者是也心中丹房内有巳形誦三千遍第五下元初學緯師曰下元初學緯者丹谷潜志神炁俱存三千之行名籍玉眞者是也下丹谷中内有已形誦三千遍第六立應神通緯師曰立應神通緯者三炁生三上合三天造兆一身分形十天形同大帥儀範自然坐御獅子在於空玄日光寳珠五丈宗元十過周回應通玄變是也三炁中有十方天尊元始坐獅子居日中去地五丈也第七玉音萬靈緯内服外誦二十二音心存玉尊泥丸帝君神誦玉章俯仰元君萬遍巳畢無所不功四方三十二天泥丸宫元始天尊心中自己之形朝仰也第八三界招靈緯師曰三界招靈緯者三界三元百千萬遍三界可度仙合雲軿是也上界青雲炁上丹田己形五千遍上元中界黄雲天谷炁中丹田己形千遍中元下界白雲神各炁下丹田己形百遍下元丹谷師曰八緯眞科得一緯而成仙必待如掌運指泄一緯而望飛不及返沈非道兆宜詳悟通究勿妄議泄勤而行之三天至眞待子登仙也上清靈寳大法卷之三
