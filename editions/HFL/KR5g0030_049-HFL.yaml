body:
  text: 洞微髙士開光救苦眞人𡩋全眞授上清三洞弟子靈寳領教嗣師王契眞纂大煉符篆門師曰夫幽冥之郷苦魂滯魄身形穢濁執滯泉扄若非得天地正氣煉度之功何能超化是以太上慈悲傳流火冶煉之文黃華灌沐之法使行持之士體元始化身集隂陽玄元之炁和合三田之炁假南方三炁火昇降清濁斬絶鬼戸滌除穢垢使内外瑩徹百骸流光然後始證无爲之道故追魂先用北斗之書聚魂魄去其死户而後以南極之篆監簿上生故知南辰北斗陶魂鑄魄即得返形遊行太空此靈寳之上道也三光錬化寳壇左九牌書大洞生化符九道十二牌書混元十二大將軍符右九牌書太洞生化符九道南昌錬度寳壇九錬生尸寳壇左九牌書九火符右九牌書九水符靈寳生仙錬度壇飛昇錬度門式師曰飛昇錬度壇錬度水池須縛一門立池之側上書五字次用符於門度過水門其火池亦用一門立池之側上書五字亦以符度過火門水門符右符青繒黃書子文北炁如度過門受錬可召本司靈通有感南昌上宫水錬池守衞吏項志莊字直失身長六尺二寸紫絲中青繡袍執斧立水門召呪曰三天有敕大神敬聽毀門度魄承濟水門玉清嚴令急錬幽靈神吏奉符不得留停急急如上帝敕火門符右符紅繒黒書午文南炁如度門時可呼本司變形雄猛復體還生火錬池守護天吏盧存中字臣字身長六尺二寸黃巾紅繡袍仗劔立火門召呪曰大帝有命使者須聽超魂火門度魄南堤開門啓道毀鎖張扉玉清敕命敢有故違神吏奉符昇度無爲急急如上帝敕水池火沼式師曰凡立水池用壬癸日以石造成内方外圓下中心成坎卦方圓五尺内鑿符上立牌號流汨沼安東北角上凡立火池用丙丁日命工以石刻成内方外圓下中心成離卦方圓闊三尺上立牌號冶錬池池中鑿符文安東南角上二池上並懸旛伺引魂至法師依式建立流汨沼水沼符元始符命萬炁長存冶錬池火池符死魂受鍊仙化成人水沼旙符太上三眞合炁交并天河灌溉九魂錬形月晶黄華三靈流雲神魂眞魄往來玉京九龍拔度離合上清運度太隂右水沼旛用黃絹造身書此符頂上朱書天河東井君兩手分寫呪四句玉女灌五香聖母慶萬年三界並歡樂稽首禮天尊火池旛符三天太上上應台眞寳輝太華太極金鈴紫炁遊往丹天度魂晶靈奔衝瑩星内明神歸大道應運太陽右火池旛以紅絹造身中書此符頂上以粉書朱陵火府君兩手分寫呪四句炁錬元臓府紫戸自生仙數周衆眞㑹啓陽應感繁金木二旛師曰二旛玉符乃木公之祖炁金母之元華自天地肇分二儀配合運化成形故以混變魂爽結胎成梵木公用青旛金母用黃旛二旛安於帝垣東西二天東華木公扶桑太眞元陽大帝符西極龜臺玉眞金母玄晶聖后符建水池錬度玉符呪曰元始符命錬胎返眞黃華蕩形仙化成人魂昇東井逍遥上清急急如元始上帝敕告文太隂水帝五炁靈君水錬童子東井夫人一合下降錬度亡魂百骸九竅五臟萬神蕩形去穢入道昇眞一如告命羣靈敬聽錬度亡過某等魂黃華蕩形仙化成人太歳年月日時告下法位臣姓某承誥奉行建火池錬度玉符呪曰眞王梵炁玉眸錬質流火大錬丹境生神魂昇朱府三景陶形急急如元始上帝敕告文南方之君赤炁之精熒惑使者丙丁將軍朱雀炎神赫赫陽晶五行造化萬物發生天帝有敕使者須聽攝召亡魂錬度眞形上生天堂昇入無形錬度亡過某等魂玉眸錬質仙化成人太歳年月日時告下法位臣姓某承誥奉行建錬度壇召諸神將符告文謹召南昌錬度司水池火沼神將玉女金童功曹將吏黃籙院合干官吏一合下降赴壇錬度亡魂咸遂超昇一如告命太歳年月日時告下法位臣姓某承誥奉行右三符並黄紙朱書外用可漏封之髙上丹天符命告文丹天召眞符檄急召丹天火官飛仙錬魂神吏龍火飛奔風雲速降上准符命告行書前符於此眞符翻帝命龍火驛飛旋丹霄横赤道朱火飛炎煙流火散凌虚廻耀照重泉火官億萬衆秉令降瑶天蒼威大神君歌唱消魔篇靈靈開夜臺幽爽獲昇遷落落大梵布玄化育坤乾錬變長夜魂桃康合精延一如告命太歳年月日時於錬度玉壇告行法位臣姓某承誥奉行眞師可韓司丈人眞君總統九天保運神霄上相右符黃紙朱書告文墨書於召神之際宣告焚於火池左手結普召萬神印向丹天彈之其官將隨符下降矣召錬度官將符召錬度官君符巳具降眞召靈門洞玄元明三炁成眞五行所運三天敕行急召急至萬神咸聽召十方飛天神王符大梵億劫星宿元始无上化身停關演化无量度人敕召飛天受事神王速降召神王呪洞玄宗先靈枝之元太乙左史御炁飛煙雍雍侃侃衮臘飛仙一瞬十極總御萬天阿繿那奕婆歩曇延逺落那顧厥淪孛連乘命玉晨付令侍壇爲宣化度如律如編遣呪阿繿那易孛連婆歩逺落曇延厥淪那顧齎章飛馳如雲如霧龍召寳環削簡正誤錯字爲攺脫字爲注母令上官典者遣去召地道功曹符呪曰玄曹玉文立功之官主治玉清奏報三天上帝有敕疾速降臨聚魂符呪曰上清符命攝召亡魂前來壇所聽受功德拔度往生急急如律令召攝亡魂錬度符上錬度表符右符上表時焚主爐中催攝度魂符三台煌煌帝君急召三天正炁攝魂攝魄召魂招魄君急攝現追魂攝魄君急攝現九天瞿曇君急急度元炁陽晶君急急度三天正炁君急急度魂神開度身入光明神霄訣已炁九水符東一呪曰太隂眞水梵炁自生灌錬亡魂流英上昇普錬大神錬魂錬眞急急如上帝敕南二呪曰水府大帝北子之神普錬罪魂咸濯眞形元炁下降昇入仙都急急如上帝敕西三呪曰天一運化水帝之尊元君恊順七炁齊并五行運數周流水神炁錬魂魄普昇帝庭急急如上帝敕北四呪曰水官神君普庭苦魂罪𡨚蠲釋得昇眞庭石景眞水流錬無窮急急如上帝敕巽五呪曰虚皇上命永度鬼魂乘水咸度皆得生靈敕赦滯魄咸覩慈尊急急如上帝敕坤六呪曰靈寳符命普度幽靈死魂返生脫離北扄水帝有㫖普昇帝庭急急如上帝敕亥七呪曰天神示靈水神示靈水將速應驅水錬魂魂受水錬上昇帝庭急急如上帝敕艮八呪曰水沼元神水山之精持水錬魄驅水錬魂魂魄受錬得上帝庭急急如上帝敕中九呪曰九天大神河瀆元君攝水錬魄持水錬魂錬魂錬魄返生南宫急急如上帝敕九火符東一呪曰眞王元命敕下九天火錬魂神天一含生太陽俱照隂魄易形急急如上帝敕南二呪曰九天眞聖元府錬魂火帝降敕鬼羣出離天皇眞人速降威靈生尸生魄觸向利貞急急如上帝敕西三呪曰司命聖眞帝命之靈三皇有道錬魄錬魂度死南宫北都落名三炁始下濯錬生神急急如上帝敕北四呪曰九天太玄帝都運旋陽明錬魂日耀易形四炁降布錬度神庭急急如上帝敕巽五呪曰南閻浮生流火之神玉眸尊靈八威洞明魂魄併錬死返成眞五音普化沉滯長生急急如上帝敕坤六呪曰皇天眞命九度元明上道玄育陽和大通錬魂度魄與道合眞六炁普錬神識上生急急如上帝敕亥七呪曰九天符命普鍊魂魄隂尸上度超脫北扄七炁元化幽滯咸昇急急如上帝敕艮八呪曰靈寳符命普攝魂靈天眞化道拔濟無邊酆都開釋六道咸臻八炁普錬魂神返生急急如上帝敕中九中九呪曰九天統攝八威吐精元靈降炁普度罪魂北都咸赦滯爽俱停眞王洞照魂識登昇九炁合化魂魄登眞急急如上帝敕右九水符青素朱書九火符黃素朱書建水沼符名水錬返生符淸微天禹餘天大赤天玉皇上帝紫微大帝中元地官下元水官酆都大帝扶桑大帝北斗七元星君左陽右隂拔度亡魂昇入水池天地人東震西兊南離北坎上帝符命水錬眞仙急急如律令呪曰太玄水神壬癸之精水錬經絡隂陽相成承今大道超登上清急急如上帝敕建火池符名火錬上仙符火德帝君火令將軍火令童子五星眞君九炁丈人五方五帝五嶽眞人天火地火熒惑星火太上符命南昌大神火府錬質普度沈淪隨願往生上帝符命敕到奉行呪曰火令火池炎炎之威錬質成眞五臟圓備經絡周全魂神變遷承今大道證果登仙急急如上帝敕變水池符呪曰太玄含化八景齊臨五老祕諱太隂通名璇璣運轉招靈致眞隂光降炁變錬神魂天漿下注流濯利貞急急如太隂北帝敕降眞水符太上眞水祖炁之精天元流布廣化源亭天池寳漿變沼清澄廣曠萬丈濯錬形魂化元廣度天沼天池攝魂攝魄齊入天庭上願普度咸向利貞右符青素朱書子文北炁三口吹之變火池符呪曰南方之君火府之神降炁變易流火神庭亡魂錬質逍遥太清金光煥落玉眸易形急急如南極長生大帝敕降眞火符南昌上府廣化大庭司命司録錬炁轉眞普度鬼俗速使錬魂丙丁大道熒惑降臨南昌眞火攝降不停火池宣布火錬亡魂敕攝鬼魂鬼魂錬眞天火敕降錬度隂魂敕攝右符紅紙朱書午文南炁三口呵之十二河源符一炁歸天二炁歸人隂陽合炁二炁合并天清地寧四方合人黄華蕩形天清地廣鍊度亡魂斬絶地戸加元洞人鬼合形玉曆呪右符黒紙墨書子文北炁呪曰隂炁錬化景物詵仙壬癸濯質月魄度形大道宣炁天地合并水變上元魄度南陵急急如太隂北帝敕擲火萬里符右符紅紙丹書巳文南炁呪曰易炁濯魂金晶通明四象成蓋丙丁錬神日魂普照廣度亡魂景物宣化與道合眞金液上錬仙變化人急急如元始上帝敕水錬合同符右符青紙朱書東方生炁入呪曰太上眞水五行之數合同普錬魂魄超昇罪殃去除離苦登眞天帝有敕普錬齊昇急急如上帝敕火錬合同符右符紅上朱書南方旺炁入呪曰天帝釋章陽光日行璇璣運轉八極齊臨合同火錬玉眸上生急急如律令正水錬符呪曰霐持無鏡神龍之淵運東并華以濯幽魂攬姿運容元和玉女太玄之精濯之于神急急如律令正火錬符呪曰刀利禪猷婆泥咎通流火錬質玉眸眞容昇入福堂洞陽之宫急急如律令請降眞火日魂符呪曰日魂朱景照韜緑英回霞赤童玄炎飈象急急如律令請降眞水月魄符呪曰月魄靄蕭芬艶翳寥宛虚靈蘭鬱華結翹淳金精瑩炅容臺標急急如律令主水大將軍符玉清玄元三炁君敕左陽右隂貪巨禄文廉武破度北魁玄範君度北魁玄冥君度玉兎呈形徊水隂精丹景圓明髙奔結璘祖母元君居子交中分炁陶鎔幽都長夜咸覩慈容玉醴金津流潤坎宫主火大將軍符玉清玉帝北極敕左有日君右有月君天府天相天同天樞天機天梁度南極長生大帝度南極注生君度金烏降彩黃炁陽晶日景圓明停午居中融和萬彚鮮吁育童火龍奔衝炎烈离宫太陽火錬符三景流輝召眞洞明韶遥魑魅九炁列正隂陽凝靈光彩合璧乾象回旋玄景曜衢萬炁齊仙太隂水錬符三炁尊神育胎結形太隂純化魁𩲃旋輪錬形返質九炁齊并龍漢瑛鮮枯朽發煙幽魂開度育邈合延日宫火龍眞符呪曰赤爐丹炁圓天育精剛以受柔炎水隂英日辰元景號曰大明九陽齊化二象俱生凝魂和魄五炁之精中生五帝重光御形採飛以虚掇根以盈首巾龍華披朱帶青㘘烏飛玄霞映上清賜書玉簡金閣刻名服食朝華與眞合靈飛仙太微上昇紫庭急急如律令右符青索朱書搯離光散輝訣東炁凡變火池誦火龍洞章取炁焚符于火池中月府玄鳯眞符呪曰黃精啓暉玄隂上炁散鬱寥飈條靈歛胃虚波瀾頴挺耀淳器月精夜景玄宫上貴五宫夫人各保母位赤子飛入嬰兒續至回隂三台光玄萬方和魂制魄五胎流通乘霞飛精逸虚於東首結靈雲景華拈風左帶靈符右腰虎章鳯羽朱帔玉珮金璫騫𣗳結阿號曰木王神蟇控根有舒有光明精内映玄水吐梁賜書王礼刻石雲房服食月華與眞合同飛仙紫霞上朝太皇急急如上帝敕右符黃紙丹書搯玄一生水訣取西炁凡變水沼誦玄鳯洞章取西炁焚于沼内日君鬱儀符呪曰鬱儀之神離宫眞晶灌服九芒乾元利貞太微丹書名曰開明致日朱魂表化某形平旦嚴裝發自圓庭飛華少母日根隂精紫映流光號曰五靈急急如上帝敕月君結璘符呪曰結璘夫人坎位眞晶圓耀八芒吉利元亨紫微黄書名曰太玄取月華水養魄和魂方中嚴淨發自玄關藏天隱月五靈夫人飛光九道映朗泥丸急急如上帝敕日君玉字符赫赤太霞陽精度魂八字呪曰赫赤太霞輝耀鬱儀眞精陽炁滌垢華池天中火光日中晶靈太眀火鈴金剛之晶髙陽明魁日中太皇不負天元寳輝太空玄中兵戰夭彗熒星火星火輪太乙元君平火大聖金童帝君太極大帝皓兇流鈴太極上帝敕命金剛火山律令右符書時先叩齒三十六通運心火自𩀱目出接天光中有火𤔵𤔵中有日君赤色引赤炁入鼻合心火自口岀吹符中月君玉字符玉光玄暉眞精度魂八字呪曰素圓三光飛玄結璘輝耀混隂育魄澡形藏炁包光黃炁鬱散結精合凝水芒朗映瑩飾黄華石景陶灌潤光霄漢普天受潤登明晨旦駕景登空得昇帝舘長離下世超度八難與日齊輝與月同榦急急如律令右符書時先叩齒三十六通瞑目運腎水自脊上頂岀接月光光中有白炁内見月君白色以鼻引炁下丹田出與腎炁合作一圑吹符中存白光纏符上天罡符日月星敕合眞虚无正飈曜明宗飄紫極回旋帝運上玄帝招眞童曲育九昌總監上天明梵菩薩威制天政浮羅合神那育醜英天中之尊右符書時面罡方念三光一字呪三遍吸炁三口入筆書之瞑目仰頭想罡在頂上黙念唵吽吒三遍取蒼炁存炁中官君童子次分作六炁吹符中天罡玉字符呪曰罡星正炁纏身纏骨上透泥丸開陽崷崪祖道玄眞煥赫正神鬱儀孕質熒惑澡形赤明和陽理禁威靈耀明宗飄帝重光明戊己芒英中央鎭星排蕩邪炁破滅淫精海逢之沸山逢之鎔木逢之燼火逢之空長離之主統攝飛踪迷離奴那唵唵吽吽迷離奴那東海青童總括張羅迷離奴那唵唵吽吽急急如上帝律令右符書時叩齒三十六通瞑目運脾黄氣自兩鼻出接黃炁内見天罡披髪三目白道衣左手背結斗印右手丈三昧火鈴劔丁立引蒼炁入鼻合脾炁再運自脾中吹符中右此三光玉字乃答惒天帝書於朱陵上宫瓊臺之上以受錬亡魂也上清靈寳大法卷之四十九
