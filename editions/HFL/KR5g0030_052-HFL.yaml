front:
  text: 上清靈寳大法卷之五十二寫一
  hash: sha256:2c26571277dc7c7c7b7e3171e395e927552fe93fc0c3e14ed14bcf09a529eaf9
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5g0030_HFL_052-001a, image: hfl/0958/0958-004.png}
body:
  text: 洞微髙士開光救苦眞人𡩋全眞授上清三洞弟子靈寳領教嗣師王契眞纂大煉符篆門玉清大洞生化一十八符生腦符右符白地黒書辰文上方炁呪曰腦君泥九赤文混洞君字嘘嘘吾奉玉清敕速降元炁成攝生眼目符右符白地青書中指上文引搯二指中巽炁七斗陽生訣七斗隂生訣呪曰目君目神通光君字玄真吾奉玉清敕速降元炁成攝真王有命日月無停帝君宣化煉生萬神光輝帝陛玄映萬生混合自然上升玉庭生舌神符右符黄地朱書辰文巽炁赤靈訣中炁呪曰舌君告神騰陽君字正生吾奉玉清敕速降炁炁成攝玉清靈章普化丹元舌神騰陽萬寳宣祥玉清寳篆煉化正生死䰟受度上升福堂生心符右符青地朱書中指上文東南炁呪曰心君心神玄珠君字玄玄吾奉玉清敕速降元炁成攝生肝符右符素地青書卯文旺方炁天門訣呪曰肝君肝神青帝君字孟先吾奉玉清敕速降元炁成攝玉清玉符生化自然䰟神生炁上升玉天升度煉化億劫無邊肝府萬神與天齊年生脾符右符白地黄書中文中炁玉訣呪曰脾君脾神紫庭君字延年吾奉玉清敕速降元炁成攝髙上玉文生化紫庭表裏洞徹煉質返仙玉符宣召安坐中元萬神敬聽風火驛傅生肺符右符黒地白書四指中文呪曰肺君肺神皓洞君字李成吾奉玉清敕速降元炁成攝生腎符右符白地黒書中指根北玄炁玄宫訣戌辰局呪曰腎君腎神太淵君字永都吾奉玉清敕速降元炁成攝大明萬寳鍊化生身死䰟受化腎神太淵神生命舍永都萬全永保安寧生化自然上歩玄天一如告命生隂符右符黒地朱書中指根引搯中中西北炁呪曰隂君隂神續命君字伯強吾奉玉清敕速降元炁成攝生胞符右符白地朱中指中東南炁十二經訣呪曰胞君胞神元常君字秋夫吾奉玉清敕速降元炁成攝真王有命煉化重泉胞元宣通與道自然根元適徹下鎮淵元百神守舍保命延年生胎符右符青地白書辰文元神炁八景訣呪曰胎君胎神含生君字寅和吾奉玉清敕速降元炁成攝五帝宣符煉化胎元洞陽五炁永鎮靈仙混元洞真紫戸升仙解結符右符朱地黒書三陽訣五炁呪曰結君結神九華君字彦遐吾奉玉清敕速降元炁成攝玉清寳篆盟告十天𣑕度隂尸解結无邊胎絡分散穢累反生靈光下灌保命生根三華勃秀流芳自然解節符右符青地白書中指根西北炁呪曰節君節神杳皓君字空猷吾奉玉清敕速降元炁成攝靈寳三十二天解結節大洞三十六天斬故根生血符右符青地朱書中指根西北炁呪曰血君血神中幽君字良弼吾奉玉清敕速降元炁成攝髙上玉文化煉生尸黒帝流行禀質中幽脉絡遍布滋運神通元始有命生化丹虚與道无窮上歩天衢生精符右符青地朱書子文北玄炁呪曰精君精神元隂君字祝祝吾奉玉清敕速降元炁成攝玉清洞陽生化元除内外充溢表裏洞虚永劫長存安鎮君居精神明朗榮固无虞上天玉符萬寳金書混成帝一中元不除生炁符右符黄地白書中指上文引至下文辰炁呪曰炁君炁神无英君字毳毳吾奉玉清敕連降元炁成攝髙上玉清道化生三炁形神具與天安神萬梵長存反覆天真无英祖炁毳毳化顚功圓道備上升玉輿生神符右符青地朱書中指根引至上節巽炁又已午未文中元炁呪曰神君神神天生君字靈父吾奉玉清敕速降元炁成攝玉清寳符混合萬神生化神真天生萬靈永保長生上升帝廷生元命符右符白地青書中指根引至上節巽炁呪曰命君命神正中君字長生吾奉玉清敕速降元炁成攝髙上大帝玉符生命命神天冲景炁長存使形受化煉保天根䰟神内守永鎮天居玉清梵炁上升福堂告文玉清大洞金玄羽章飛空秘符書符右符告下腦神泥丸赤文混洞君目神通光君晨嬰君舌神騰陽君心神玄珠君肝神青帝君脾神紫庭君肺神皓洞君腎神太淵君隂神續命君胞神元帝君胎神含生君結神九華君節神杳皓君血神中幽君精神元徐君炁神无英君神神天生君命神正中君速降真炁煉化亡過某等委炁聚形全神復性一如玄科律令上部符上天虚無元洞九五太上阿房緫御靈户王衡攝炁腦華元覩統御上部通神逹古中部符赤明開真三炁洞和洞納陽光五藏不怙三炁所保朱宫莊蘇納凉流泉生兀無徂下部符黄中理炁無生自尊胃管幽通六府俱存白炁公挑桃康命淳養育朱丹洞神徃還上部八景符腦符髪符皮膚符目符項髓符躬符舌符鼻符中部八景符喉符肺符心符肝符膽符左腎符右腎符脾符下部八景符胃符窮腸符大小腸符司中符胷臆符兩脇符左陽符右隂符三尸符上尸符中尸符下尸符上尸符呪曰上尸愛慾自號彭琚受化九種鳥頭蛇軀混沌无心或沉或浮貪慾滋味華色自居走人魂魄司人過咎斷人命根氣散神遊放蕩三宫小蟲無劬真人甲乙書篆靈符色慾巳斷死路巳除元始有命請滅尸頭三台監形速岀无留滅根絶種勿使餘遺亡者煉真三宫清虚五帝監映太乙定書吉日沐浴冠帶行疇飛度天界流景玉輿逐景上清乗空遨遊一如告命上升玉京中尸符呪曰中尸彭瓆號曰中黄愛慾自居倚腹逃藏沉浮變化形無常方執人䰟𩲸走作三宫赤子馳騁使人發狂慾性䘮神罪由小蟲真人甲乙上帝巳徴身佩玉符玉文金章列名元圖三慾巳亡元始符命斬㓕尸形斷根絶種勿使飛揚亡䰟受煉五府清涼真仙安鎮臓内生光五帝監映太一列行中元沐浴冠帶衣裳解形變景流景玉光飛升上清食息太空長保自然天地无窮一如告命上升玉京下尸符呪曰下尸彭矯貪慾自榮白色混沌骵無常形依人兩足恱動人情言我得失走作䰟靈三宫攪亂赤子不寧貪慾小蟲假備幽冥真人甲乙三煉巳清慾門閉塞不受邪精元始急令三台臨庭速岀无隱及爾弟兄九種子孫一時斬形五帝度真太一記名下元沐浴冠帶羽青去度三界上飲元精解形遁變流景上清飛玄步虚三界齊明一如告命上升玉京九煉生尸符章師曰夫九煉生尸法最爲上道人始受生皆從虚无中來莫不資其昔業㑹遇今縁取象乾坤含懷日月變化隂陽神識徃來萬化之中三焦潜凝九天𡨋運皆以九天生神之炁合和爲生一月爲胞欝單天炁降爲之二月爲胎禪善天炁降爲之三月䰟具梵監天炁降爲之四月魄成寂然天炁降爲之五月化膽波羅尼宻不驕樂天炁降爲之六月化腑洞玄天炁降爲之七月明竅靈化天炁降爲之八月景附髙虚天炁降爲之九月降神无想无結无愛天炁降爲之身中神萬八千内外相合三萬六千神一時生身金樓玉室紫戸靈布匝繞身中表裏相應聲尚神具三元養育九炁結形晝夜不停布化轉變黄神受質故入在胞胎中人之受生莫不禀九天之炁而生今將九天之炁攝化布在於八方則死骸返生枯朽發煙罪累蕩除九天混合萬神具全神識瞭然則䰟獨超於三天法天象地含隂吐陽生神布化各有法訣累行煉化可以升入无爲九煉生尸法者按百單八數三十六天三十六混元將三十六亡人身中一元二儀三光四象五行六律七政九宫共百八數乃陽九百六之數聚天地之炁更生成人以天之炁生神以九神之炁生九竅上通天門聲尚神具上應九天九炁出乎太空之先隱乎空洞之中無光無象無形無名九炁列正日月星宿隂陽五行人民品𩔖並受主成天地萬化自非三元所育九炁結形是故九月神布炁滿五神備具則成人身化生三十六上應三十六天下有三十六地莫不備焉除日月二炁覃照萬國是一百單六數乃應陽九百六之灾甲申大期也九天煉度陽符欝單無量天䰟精開陽上符混合元炁胞源宣通大道通玄惡根化消灌溉命門隂陽炁交元君遏户司馬洞謡滅度轉輪形與神同書混合空洞炁章右謹上請帝真胞命元元一黄演之炁九重奉爲亡過某等纏其胞使胞元宣通上徹於天以生成一如告命太歳年月日法位臣姓某承誥奉行上上禪善无量壽天䰟精明陽上符洞𡨋紫戸開度飛玄結胎黄房斷死斬根禪善靈炁精煉成容務玄尚生列備明堂混合相和胎結解根書無量結紫戸章右謹上請帝真胎命元洞𡨋紫戸之炁九重奉爲亡過某等䰟纒其胎使胎結解根下響於地以固靈一如告命梵監須延天䰟精始陽上符須延三雲玄玄炁分坤儀定位乾象著分炁炁反根九開禄道胎生炁元䰟生攝炁九轉成仙書須延緫三雲章右謹上請帝真䰟命元長靈明仙之炁九重奉爲亡過某等䰟纒其三䰟使䰟門通神以逹真一如告命寂然兠術天䰟精太陽上符寂然无色靈化景分碭尸演由空洞生神騫爽合成九轉景靈魄户閉關嬰児歘歌書寂然无色宗章右謹上請帝真魄命元碭尸𡨋演由之炁九重奉爲亡過某等魂纒其七魄使魄戸閉關天王降仙以安寧一如告命波羅尼宻不驕樂天䰟精上陽上符採集空景回黄命靈緫録具形開度生䰟炁錬元藏紫戸生仙衆真交㑹聖毋慶年章洞幽靈天地始分五帝朝真書翻翻五帝駕章右謹上請帝真臓腑命元五仙中靈之炁九重奉爲亡過某等魂纒其五臓使五臓清凉五帝朝真以存神一如告命洞玄化應聲天䰟精元陽上符回化无影三炁冲融伐胞馳滯心超上京煉胎反𥘉混混魄壯䰟化元一伏諾魔王書應聲无色界章右謹上請帝真靈府命元髙真冲融之炁九重奉爲亡過某等䰟纒其六腑使胃管生津以納和一如告命靈化梵輔天䰟精正陽上符玄炁混梵列序真仙務猷運靈瓊房妙韻冲心自怡遨翫五神爽䰟返根星宿朗明書玄㑹統无涯章右謹上請帝真元府命元髙仙洞笈之炁九重奉爲亡過某等魂纒其七竅使孔竅開聦星宿朗明以開通一如告命髙虚清明天䰟精通陽上符清明重霄真靈化凝煥落景霞空洞振音去留解帶明識生神超神方外整具形神書清明重霄上章右謹上請帝真華府命元真靈化凝之炁九重奉爲亡過某等䰟纒其八景整具形神使幽夜開光以全身一如告命無想无結无愛天䰟精明陽上符玄玄虚中冥心清神靈感太虚潜凝神登内外无形稱爲真人書無結固無情章右謹上請帝真岳府命元自然玄照之炁九重奉爲亡過某等䰟纒共身使三關五臓六腑九宫金樓玉室十二重門紫戸玉閤三萬六千機關根源本始一時生神全神布炁炁滿能聲聲尚神具毛髪生身諸天下臨以保其生一如告命右九陽符並以黄紙朱書符墨書文外作封函上清靈寳大法卷之五十二
