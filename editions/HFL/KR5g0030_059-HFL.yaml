body:
  text: 洞微髙士開光救苦真人𡩋全真授上清三洞弟子靈寳領教嗣師王契真纂齋法宗㫖門呪食師於呪食之所執水盂焚變食符於内存真炁入水次念三光呪取三光炁入水又念青玄寳號取青玄之炁入水又念隱語取五方正炁入水次又念青玄號八十一遍存太一慈尊居于東方雲炁吸炁歸身化爲太一慈尊啓召溟涬大變神王下降變食次以枝水洒食如攝召不經下幕醫治則先當與亡靈開通咽喉胃管生津變化法食皆是雲廚甘靈異品珎餚果是交梨火棗丹柰蟠桃之𩔖品味香美遍滿無邉餒腹皆充食之無盡傳戒宗㫖曰兆先於上帝前三禮長跪黙奏請降披黄受道誥救苦真符長生靈符官君護戒神王童子茭龍金龍驛吏天道功曹畢引靈至戒座之前兆陞座祝香焚召十方飛天神王符念呪剔訣焚召十方天真大神符迎請證明監度依科說法爲亡者懴滌罪愆傳授披黄受道誥發十方善願說因果證戒法請戒師三皈依焚授戒香符告簡傳符香符宣救苦長生符提綱給登真度命誥祝龍宣寳籙施食請降凡欲至晚施食此日先須錬形存神發真依法朝奏三天金闕存玉皇在紫庭之左青玄在紫庭之右此二宫乃左右目上出日入月之所真道所居也三宫腦上乃捷神之府也兆早朝黙奏先請降玉皇慈悲𠮷祥甘露下降變錬斛食自請降之後舉心運意行住坐卧皆是大獻管要心機歸一不可妄想開通鬼路兆行持施食先依法請水遍洒斛筵次以金錢二貼焚於艮方呪曰上天度人至列言上清急急如靈寳度人律令左手搯鬼目右手劒訣面艮戸丁行三歩向前以劒訣虚書攝召長夜府五字祝曰引領鬼魂使者地道鬼道功曹當界土地五道諸神疾速爲吾監引牒内所薦亡魂及六道幽靈等衆赴壇受食鍊度吾奉上帝敕祝畢再以劒訣向艮方書一開字存此處黒暗方上香召魂召孤魂焚追衆魂符祝城隍太歳當處土地五道諸神祇神虎攝召靈司天神將吏引魂赴壇先想聚魂方黑霧罩暗陞座宗㫖曰兆瞑目對座前焚香運變爲自然五帝之境雙手發三天五帝訣於崑崙上撒開左右運璇璣靈根舌一炁吹噴于外星斗光芒無數廣布浮虚畧動左右目光運化二儀日月分照次存法座髙懸日月之下如世九層雲臺上垂寳盖華旛旌幢羅列次以身頂一元之炁散布于上盤結空浮青玄上帝端坐其上左手執琉璃水鍾右手執空青寳枝次畧動崑崙左右月戸運化真人分形分布左右玉女金童侍衛森列上帝口吐金光如圎鏡似月出雲之狀上下四方皆見金光瑩玉之精照徹無邊至於斛筵悉皆隨炁升化叅于雲漢之表上接光炁方左旋升座舉身頃然登寳座之上兆身與至尊混合一身左右侍真並如所想瞑目一心再如前思運龍燭鳳燈星散十方上下萬神億乗齊臨班列雲界證明接引方按科行事宣天皇寳誥召六道焚天道符子文存天道仙衆自天門乗寳光馭飛雲羅列旌𣄢彩仗浮空而至于上焚神道符丑文存神道眷屬自地戸乗焚炁白華接引駕風馬雲車浮空而來至于左焚人道符寅文存人道眷屬自人門乗寳光洞煥引導欣顔攺志來至于右運化祕呪玉清大獻廣布酥酡髙際九霄香環十極咸令濟化普受法食此天道神道人道謂之三善道並班列朝禮上帝聞法受食焚地道符鬼道符畜道符地申鬼酉畜戌一心運念布出靈炁雙手玉清訣引炁如河路之狀鼻出二炁交合却運青玄圓象之光自上而下同布于三惡道之中燭破各道隂冥之炁其三道幽魂徐徐乗光炁來至壇下形影並無隂翳舉手朝禮跪立普攝三惡道赴筵朝上帝呪玉清萬化解宣惡對善道升仙業道開通玉皇降命急召時升受沾供養上朝帝廷中文東炁召亡魂焚召亡魂符存元始圎象之光洞燭十方照破幽隂俱成皎日孤魂等類俱乗寳光齊赴斛筵搯提魂訣分班變食先焚符念啓請呪手結五嶽印請五方無入水中三光炁日魂朱景照韜緑映回霞赤童玄炎飈象引左目邊日光九芒吹食上月魄靄霄芬𤔵翳寥苑虎靈蘭欝華結翹淳金清瑩炅容臺摽引右目邊月光十芒吹食上魁𩲃𩵄䰢魓𩳐魒引黄芒之炁吹食上又念三尊號取三天炁吹食上焚變食諸符祝呪食滿十方通關充虚食之無盡飛升玉都急急如律令左右手玉清訣存身爲元始引天門三炁降接兆身以炁吹符焚水盂中以楊枝洒水誦諸祕呪旋遶依法存變焚符誦呪呪獻兆運發丹宫真人上香叩齒面天門請降金光道炁百千萬重布前瞑目運日月之光交接金光下臨似雲靄蒸布法食異香豐盈炁滿十方無不沾旣先以供養千真萬聖呪施之後然沾溉衆魂祝曰天仙沾供神明沾享人倫享味善道升遷祕呪溜溜崑崙泉泛泛王清炁青玄居左右幽香徹天地玉女灌真漿仙真降祥瑞食之億萬年體身悉如意㧞度亡過媿永離大報地急急如元始上帝律令灌化焚溟涬大梵神王符祝呪玉字普告百飽通虚溟涬生晶永絶飢虚食之無盡味冠天廚上帝訣祖炁焚水盂中請降玉皇慈悲吉祥甘露下哺官君一百二十人沾洒行用兆滅燈一心端嚴左手掐辰文剔去次左右手威徳印搯玉清訣左仰右覆雙手玉清八指相合升起存想變録運玉皇至尊浮虚宣降溟涬大梵神王身長萬丈狀若龍虎君四目五色雲炁擁盤手足尖皆出毫光化現靈官一百一十人乗黒雲自天門浮空而下各持枝水遍洒甘露法雨一如細雨宻霧四合沾溉一洒一滴其斛廣大豐盈次運淨霐之府出一真光雙手玉訣左右瞬目升降上下心祝玉字大呪一念不動秉如清明之府並無一慮引五方之炁交接結爲一圑瑩如寳鑑照徹無碍自圓鑑之中道生一一生二二生三三生九九化八十一次化無窮遍滿十方其斛自下升髙參于天表廣化益大有虚炁靈煙周旋丹界洞煥靈壇所施斛食隨心隨化無遮無碍異香周回十極法味充塞世界斛食虚懸其中致於斛筵内外郊野山川溪谷遍世滿然悉是斛食次發十天訣引玉女童君數若沙塵哺咍接引衆魂受食五廚經夫五厨經之㫖則令五臟充滿五神正五臟充則滋味足五神靜則嗜慾除則此經是五臟之所治如求衣食於廚故曰五廚耳長生祕章卯文青炁一炁和太和得一道皆太和乃無一和玄理同玄際不飢祕章離文赤炁不以意思意亦不求無思意而不復意是法如是持不熱祕章中文黄炁諸食炁結炁非諸久定結炁歸諸本炁隨取當隨世不寒祕章酉文白炁修理志離志積修不符離志而不修志已業無已知不渇祕章坎文黒炁莫將心縁心還莫住絶縁心在莫存心真則守真淵三天無量食充滿法界中濟汝飢渇者清淨無色身三麽三麽麽呢麽呢帝敕帝敕麽呪三天敕麽三天敕麽三天咈唵敕吽搯中文念青玄寳號九九八十一遍取炁入身化身爲太一慈尊坐于玄局之上旌幢華旛懸覆左手水鐘右手執寳杖遍洒甘露仍存太一乗青雲在空玄之中同洒甘澍四合飛虚法雨慈雲沾沛無極悉皆滿溢次誦中篇存四方三十二天並降光炁灌注斛食遍滿無極世界三惡道衆及亡魂孤魂等俱享飽飫沾足圎成再𡨋心運化溟涬符以玉皇慈悲吉祥甘露沾溉六道幽魂等形貌並洗顔攺相懽忻稽首擎拳瞻望慈顔返生朝禮次以左右手接引訣運光炁引衆魂分列十方咸有光明相皈依三寳跪受符戒尚慮幽靈生前𡨚對殁後𡨚尤未能解釋當以符誥開諭和𡨚釋對俾歸善道焚解𡨚結諸符解十傷符命關三十二天燈告歷關諸天誥關三十二天燈請太上三尊三十二天帝君三界髙真十方衆聖无極飛天神王三界大魔王五帝魔王神仙玉女等衆真監度燈壇作三層上層爲無色界四天立無色界魔王位十方飛天神王旛中層一十八天立色界魔王位下層欲界六天立慾界魔王位靈寳大錬齋法莫難於錬度乃超凡入聖脫胎換質之道苦魂沈九夜乗晨希陽翹得其理則水火交濟隂尸穢質一時生神不得其法則依科讀誦徒負幽𡨋此髙功第一事也師登錬度壇存用洒凈霞光五彩欝遶上下先立水池亥文北炁至申上發訣飛北斗罡念靈書攪水念十二河源三十二遍取北方炁天河水入池焚真水符主水將軍符水錬符存官君環遶次立火池午文南炁飛南斗罡念靈書布火又念擲火萬里三十二遍取南方火炁入池焚真火符主火將軍符火錬符存官君環遶化景如丹天世界存定師化身充天塞地泥丸存三天境額上九天三十二天境各有臺殿左眼日宫右眼月宫七竅皆星斗頸後爲𣡡羅蕭臺口爲天河項爲十二重樓心爲朱陵火府脊骨為天階左腎水池出玉水右腎爲火池出玉火尾閭爲隂關一身變化與天地同身囿于天地之内天地囿于一身之中不知自巳形相只心中丹元君承元炁上昇泥丸化爲元始天尊端坐洞房施化上道左右官君王童玉女侍衛各處皆有官君元始放大光明下燭隂關豁開無限鬼魂盡入包荒之内師運天河之水灌下東井注下左腎水池之中右目月光直注水池水光明皎次運丹天之火注下右腎火沼之内左目日光直注火沼火光炎炎水火交光瑩潔明白指揮主水大將軍水池官吏引魂入水池所謂水者乃真一之精隂靈入水滌蕩塵垢童顔玉光次焚水錬諸符再命主火大將軍火沼官吏引魂入火沼冶錬所謂火者乃真陽之炁隂魂一入火沼魂如火棗融化隂尸反胎易質次焚火錬諸符誦隱語取四方炁生成又焚五帝全形符使五臟六腑一時生神再存童女各持生天淨衣授與亡魂想其魂各着衣服容貌光彩官吏引魂自脊骨天階而上登朱陵火府師焚度橋符存諸魂度橋而去再爲陽光所錬骨相不凡火沼中有無限火龍各乗載嬰兒上昇欝羅蕭臺隨品受生師咽液納所出水火真炁各還本宫畢下座焚化九天錬度師定息凝神取生炁一口直入胞元命門運九天之炁灌溉融聚化嬰兒與已形相似内外握固餘光遍覆天地再運五臟五色之炁如雲自下而昇戴嬰兒自天階而上至泥丸化爲元始天尊五臟真炁結成師子元始放慧光圎如寳珠元始懸坐五色獅子之上百寳光芒洞煥諸天諸地明徹内外左日右月玉童玉女侍衛元始召錬度官君行錬庭事無限鬼魂悉屯于隂關之内次存水火二池内外相映錬度官君分列左右次第引魂入錬魂入火沼真陽融化魂如火棗次引魂入水池蕩滌凡麈身有光明此乃玉眸錬質黄華蕩形水火錬畢行九章錬元始誦章一過運脾一黄之炁灌胞命元以生胞使胞元宣通誦章二過運心中二赤之炁灌胎命元以生胎使胎結解根誦章三過運小腸中三淡紅炁灌魂命元以生魂使魂門錬仙誦章四過運肺四白之炁灌魄命元以生魄使魄戸閉關誦章五過運肝五碧之炁灌臟府命元以生臟使臟腑清涼誦章六過運膀胱六蒼之炁灌靈府命元以生靈府使胃管生津誦章七過運腎七黒之炁灌元府命元以生元府使孔竅開聦誦章八過運大腸八緑之炁灌華府命元以生華府使三部八景整具形神誦章九過運胃九紫之炁灌嶽府命元以生嶽府使三關五臟六府九宫金樓玉室十二重門紫戸玉門三萬六千骨節根原本始一時生神錬畢應諸罪魂凡塵盡蕩本性昭然解結除𡨚超凡入聖官童各與生天淨衣飄香楚楚師存水火二池結爲流火之庭在心府官君次第引魂上登流火之庭運化無限火龍此乃龍負長庚瓶各載嬰兒上昇欝羅蕭臺乗光髙舉隨品受化事畢歸真元宫定息咽液下座書符存用更不贅述明錬度生尸生神之本源夫行錬度之法須明採納吞服三光正炁日精月華吐故納新自身集召陽神錬除隂翳方可明錬度亡䰟之法且人壽至三萬六千日神盡歸太隂則曰鬼鬼曰歸也而生前罪咎損炁抛神自取死懷故有不滿天年而亡襁褓者神炁不全而形不固死者至隂之魄渺渺冥冥何縁得生陽世故假真水真火日精月華聚九陽之炁混合亡者五神返本生尸古法以九師各立一天錬一炁行九錬變錬生神聚靈於太一之庭錬質於朱陵之境徃徃行持之士不識修煉祕文止假朱砂好篆符形徒用水火不識朱陵之炁取用之方東井黄華之位全無存想黙運五府混合成真一夜錬在甚處成人明真水夫真水者是隂中之一炁是爲天一生水乃號皇極何耶盖太極以一象中其一則爲元炁一炁既萌形質巳具太素又變而成以滌隂垢以爲黄華乃太隂之真精此爲真水流入天河却運天河之水入東井須降黄華入於東井是爲水泛於木以水流通水上火下之功此乃殺水其色黒濁何能溉育嬰兒長養百神混𠔃闢𠔃其無窮耶清陽之炁升浮則爲天焉元隂之炁降下則爲地焉天地本於隂陽而天地動靜之理是爲運黄華於東井之上聚天一之靈生地二之火故爲水上火下流入三宫也取真水法訣曰凡取東井黄華神水以月内井宿之日用月將加臨宿直之上逆數看井宿在何方便於本方上取之以亥爲正月月將戌爲二月月將逆轉看當井宿直日假如正月井宿在卯以月將亥加卯上順數至未上得卯字乃井宿之方是天河灌東井取此中水用之法曰取水候天拂明曰方離榑桑時於東井中人未汲者先以青紙用雌黄書請水符化於井中搯乾文西北炁入執燭垂光照耀下入水中次汲水入淨器内盛之兩手乾文右瞬目三次運兩腎炁自夾脊升上至頂取西北炁自兩鼻入頂交媾運出水内想水上火下此是真水也明真火夫明真火者是陽中之火也其火能辟除隂滓冶錬成嬰然後運自已之炁化合次求外真而運内真混合爲一是爲陽中之陽天之一元真炁納入丹田運内炁而錬成一團是爲紫金假如南方火殺火北方水黒濁之水二物焉能生化且南炁紅北炁黒皆殺炁何以育養今之行錬度之士以訛傳訛殊無治善之心考究今南炁以東南炁北炁以西北炁東南乃朱陵宫此火能育物可以生化也西北乃天門故天一生此水能育物乃天帝之治所號曰雨露雨露既沾則枯骨重榮天炁澄清則日炁可取隂晦中夜方錬度焼符取炁取真火法訣曰凡欲取陽精真火先以楊柴炭用苦竹當日午面日截竹取火下用印香引之俟火着却以緋紙朱書請火符搯巳文取東南炁入以符引火燒炭用之法曰兆回視左肩想心中赤龍自左耳出右眼流火光肩背龍乗火飛上入火中此是真火耶用水火法至晚行錬度立壇火池用圎爐盛真火水池用方器盛真水立水池火沼二牌火池用緋幡水池用黄幡五方用五色幡書五帝符于上水火錬度壇法兆先於上帝前跪奏㸃三十二天燈南斗口安火沼北斗口安水池後列南極大帝九天生神上帝中列三十二天燈左日右月十方飛天神王天道功曹十方天真大神黄籙院官童直日受事官屬天醫六職十方飛天使者金龍茭龍驛吏方起靈陞座祝香召十方飛天神王十方天真大神請三十二天帝君官童下臨壇所此是衆真監度十方臨軒也次引魂受錬按科行事明五劫開化凡遷㧞亡魂第一次建齋立功贖罪名曰㧞度第二次曰昇度第三次曰超度第四次曰増崇品格第五次曰濟度夫㧞度者亡人乍入隂府罪累纒縛㧞出地戸隨品受生行三光錬夫昇度者慮亡魂生存之日功少業重人道有三十六品類恐生於貧窮下賤是故作諸功徳用資昇度行南昌錬夫超度者恐亡人生於中品孝心哀切建立普度廣濟六道四生集兹殊勲超昇髙品行生尸九錬夫増崇品格者或亡人受生人中不皈正化是故増崇品格行靈寳錬夫濟度者恐亡人三生七世𡨚家債主負命欠財雖承太上符命受生恐𡨚家執對未遂逍遥故名濟度行廣度沈淪飛昇冶錬是爲五劫開化也三光錬夫三光者天之正炁日月星也乃是天三竒日月星地三竒乙丙丁人三竒精炁神三合成九陽數也謝恩醮廣成曰醮者祭之别名也牲牷血食謂之祭蔬果精修謂之醮皆可延真降靈河圖經品三洞之中凡有四十二等與齋法相類并諸雜醮法凡五十六門皆前哲後賢隨機所感普㑹降真祈福濟物利人輔佐王化孕育群品咸以太上爲主次以北斗爲宗苟能禮物精豐心誠丹罄何善不降何惡不除但延請乖儀俯仰失度不能感降耳由此言之則三洞既有二十七品之齋復有四十二等之醮近世庸妄之流乃謂靈寳立齋而正一有醮却於齋後散壇攺正一銜易正一服而後設醮何其謬矣夫醮則三洞皆有之况散壇之醮乃齋事告終酬謝真靈豈宜改銜易服别作一式行之其爲鹵莽好竒敗亂科典可勝言哉此實古今之正理天下之通論也安可以私意亂之耶是致近來散壇送師了畢却再請上真重行設醮謂之專醮如此則可爲齋後醮之義則大失本意矣若從古法大㮣相逺如古者未有排列道塲之儀止於壇上行事若設醮則於壇外用青巾絳座時果醮饌不用請醮状只於拜表投龍之後便請聖設醮今世雖立壇行事而復設像立位鋪置道場是以設醮竟就道場若遵古式則於壇上行事拜表之後便當設醮却於壇上行科道場内三獻行禮亦可却送師徹席事簡而理通不違古來之典格不然或於拜表投龍之後復爐出戸退靖少息然後再入户陞壇行科請聖設醮還戒納職送師徹席三塗五苦頌旋壇出戸散諸壇陛司治次却解壇散席亦可如醮儀輦馬之類聊以寓誠却專狀獻之可也古者拜章之外文移尚少自上帝以至列真随宜修設故醮位不多後世文狀關牒干渉既衆凡文檄所至之曹並當醮謝天子則用三千六百分位公侯則二千四百分位一千二百分位已下庶人則三百六十分位二百四十分位一百二十分位隨事大小輕重設之盖下此則不能盡故也有如世人將上真緫位數而作一分極爲碍理以致九天上帝作一位三十二天作一位似此之𩔖大爲䙝瀆今上真並合專設諸法中將吏貟數難計未免以𩔖相從稍加緫括更能於將吏前廣鋪酒果普行醮謝則不必計尤善也切在詳度行之近又有三塗五苦頌旋壇門牓大非儀也然立纂舒壇法天象地立門列榜以示儀式齋終醮畢并壇徹去何獨急於下榜哉混亂威儀交雜進止實爲非便况三塗五苦之辭無非陳罪福以崇經教而已又非下門榜之義幸深詳之投龍進簡科曰夫大道以一炁化生三才陶鈞萬有故分三元之曹以主張罪福即天地水三官寔司於三元也人之生死壽天罪福吉㐫莫不係焉三籙文亦三元典格也按下元黄籙簡文靈仙品曰㧞度罪根威儀修齋事畢當依赤書玉訣投三簡以告三元山簡者丹書玉札副以金龍一條金紐九枚以青絲纒之封投於靈山諸天洞府絶崖之中以關靈山五嶽爲昇度之信奏天官上元也土簡者丹書玉札亦以金龍金紐青絲纒之埋於壇宅廣成曰投於壇天井之上或埋於月辰方位上爲昇度之信以告盟地官中元也水簡者丹書玉札副以金龍金紐青絲纒之投於三江靈泉潭洞水府爲昇度之信告盟水官下元也三簡之法各用金紐九枚共用二十七鈕毎簡仍附以金龍一條玉璧一封之外以青絲纒之而後投也今按盟真科格逐一開陳所以告盟天地水三官使監證齋功缺者考屬地官九都曹簡者告也札者紀也紀世之善吿於上真法長一尺二寸闊二寸四分法二十四炁厚二分法二儀也上下方正法日之方景正真通逹無所避讓國家以玉爲之夫玉有九德可以爲禮天地神明之信故用玉焉公侯士庶只用槿木爲之法則一同以槿木潔白纎致可以比玉矣所以明尊卑之殊也龍者乗雲炁御隂陽合則成體散則成章變化不測入地升天故三天極陽之境可以驛信傳命通逹玄虚者其龍乎龍乃陽畜故天用龍是以天上以龍爲驛傳騎往來人間法以上金鑄成各重一兩國家用上金公侯大臣用次金士庻以銀鍍金也上金者五金之最剛不渝天地所寳通靈合神故也取法龍形投之洞府告盟三元也洞府冥官所司僚屬吿龍信簡文録其善功以奏言於上聖感應之報猶影之隨形修尚之士不可闕之璧者禮天地山川之寳也山簡用蒼璧爲九天之信以法天也以蒼玉圓形徑二寸虚其中土簡用黄璧爲九地之信以法土之色也方其形徑三寸虚其中方者乃法地之形也水簡者用玄璧爲之爲水官之信水之色也法以黒色玉六出之形徑三寸虚其中鈕者以代㰱血也國家用金臣庻以銀鍍金鈕徑九分其外如鐶之形也青絲者以代割髮通盟逹誠最爲重也投三簡之法按廣成科云齋主出簡言功之後宣讀巳訖明早便可埋於壇中不伺别行關告今以張承先齋儀中三簡啓奏真位不同巳載投簡科中明叙之矣今修齋壇只於言功解壇時便告土簡即時埋瘗之其山簡水简雖巳宣吿當卜日或齋辰備醮饌儀物法師率衆官或泛舟以詣水洞或梯陸以登名山於洞府之外薙草洒掃潔淨敷陳醮席酒果湯茶當鹿脯等國家用六十分臣庻二十四分一如醮儀乃盛服澡漱朝謁法事依科設醮次第投之庻爲周備則所在地司靈官監齋將吏當爲關啓洞府仙曹通逹告齋之簡如此則福善立應不可以壇中吿了都無關啓直爾投於洞中則所在真靈恐不關領善功不逹獲罪深矣所失尤多若山水之洞稍逺師衆不可俱行者當選法職者二人與齋主齎簡俓詣洞所設醮關告投奠亦可不得蔵匿簡文因循遲久則所在地司録奏獲罪不輕切宜慎之所有投簡關啓科書悉從廣成本科但其書流布日久傳寫之間多行减節只存啓祝之辭今巳詳訂具見别冊上爲國王官僚下及人民九祖父毋長夜三塗修建大齋並當告盟九天投簡三元福利廣大不可勝言諦聽奉行勿生懈怠魔壞爾身也若國家投龍具有金籙科式與此常禮繁簡不同詳度行之又曰若有至士欲度諸天人民善信男女咸使得離三塗五苦八難之中得過三惡世世與道相值當取八節甲子之日投三元玉簡除宿置之簿言名上天事過諸天三官九府更相關告上天友别萬神敬護五帝侍衛三界司迎門户清肅天神地祇日月來朝千魔萬精不敢妄干至願堅固觸向咸令七祖父母即得解脫三塗五苦上升天堂生死罪福影響相酬三官九署書人功過其理甚明世世因縁毫分無遺也又曰張承先云凡學士受佩中盟求仙削罪依自然經科投金鈕十枚放龍清泉爲求仙之道再登壇受五老赤書二籙策杖思微定志劵等依盟真科文投三龍二十七鈕於山水宅三處爲求仙之信然後依玉訣别以九龍二十七鎮以八節日投山水宅三所求除罪簿言名上天也拜通天救苦表䄂内䄂九龍符九道次歩罡存伏如拜章法同至慾界魔王之境次見色界之境次見無色界之境入青道不入黄道次見四天之境次見三天金闕之門自此將昇天契劵付天門守衛之神法師下車留侍從之神在門外惟有青衣童子二人捧表入金闕之東次見一朱衣靈官一青衣童子接表引詣太一元生府及東極宫見救苦真人便殿將表中情意陳白次真人引見青玄上帝坐殿上有九頭獅子左右二真人兆殿下九拜躬身口奏進表畢出太一元生府入金闕見太上在御座上朝禮如儀兆口奏跪進想侍仙玉郎接表進呈上判𠃔字布祥光於符命上兆復進符命亦有祥光侍仙玉郎傳表頒行符命兆受禮謝出闕復入太一元生府見青玄上帝兆再拜口奏進呈符命亦市祥光宣救苦真人青玄靈童九龍使者至殿下頒符命付使者禮辭同真人靈童使者出太一元生府至三天門復取契劵同向來侍從諸神歷三界度罡風回壇興身稱以聞不離本位宣九龍符命九道畢法師望東想東極慈尊坐九頭獅子在百寳光中祥雲之上左右真人侍從洒枝水於十方吐祥光於幢上兆九拜以左手拽起禮謝十方納官復爐次預告掛門迎天榜回靖此是通天救苦預告十方停囚罷對如陽間停决之義也拜素車白馬章䄂普告三界誥變神飛歩存伏同拜章法至三天門下見天師對讀引詣金闕朝見並在存想法想見覽章判從字侍仙玉郎傳接付右階曹官青腰玉女頒降天曹宣素車白馬大將軍一人官吏一百二十人至殿下兆進呈普告三界誥想侍仙玉郎接進呈上覽布祥光於誥上侍仙玉郎接下付兆兆禮謝辭退同向來所宣素車白馬大將軍從官同出如儀至壇興身稱以聞不離位宣誥回壇納官復爐拜酆都開業道章袖酆都㧞贖誥元始符命誥敕赦歩罡存伏如前至金闕兆想朝禮上允判依字兆進誥命赦文想侍仙玉郎上呈上稱善布祥光於上侍仙玉郎逓下兆受禮辭出闕復詣泰玄都省見四相各於銜下書名兆受之出三天門下復如舊路興身稱以聞不離位宣赦元始符命誥酆都誥祝龍禮謝十方回壇納官復爐拜開通道路章袖玉皇寳誥敕制地祇誥歩罡存伏如前至殿下朝禮想上覽判允字頒付官曹宣太一使者五帝真符驛吏各持太一符命紫陽寳節五方生炁靈符兆跪奏玉皇誥地祇誥想侍仙玉郎上進上布祥光頒下兆受畢禮辭同太一使者等回出三天門下興身稱以聞不離位宣誥禮謝十方回壇納官復爐拜沐浴錬度章袖金液錬形誥雷文誥生天寳籙歩罡存伏如式至殿下朝禮如儀想上覽判允字侍仙玉郎逓付直日宫曹宣浣濯夫人五方解穢童子丹天左右衛大將軍持東井黄華水一器五方童子各齎五靈之炁至壇下朝兆跪進誥籙侍仙玉郎進呈上覽布祥光於上頒付與兆兆受辭謝出闕詣泰玄都省謁四相如儀呈寳籙想四相各於銜下書名辭省出同所宣官將等出三天門下回程如儀至壇興身稱以聞回壇納官復炉誥籙留上帝前候鍊度時奏請宣告上清靈寳大法卷之五十九
