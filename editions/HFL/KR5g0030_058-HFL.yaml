front:
  text: 上清靈寳大法卷之五十八寫七
  hash: sha256:6337377f942a62fee79c59ed2f1113e6d1b3306657a39d8c10ace548c6827559
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5g0030_HFL_058-001a, image: hfl/0960/0960-004.png}
body:
  text: 洞微髙士開光救苦眞人𡩋全眞授上清三洞弟子靈寳領教嗣師王契眞纂齋法宗㫖門九巵九壘燈按上元簡文曰然燈之法是法解真人啓請元始天尊天尊答曰遷㧞之格救度之門三洞衆經具有成典今當爲汝宣說要言濟苦㧞亡然燈爲上五方八極地獄幽牢在極隂之郷長夜之境死魂囚閉不覩三光冥暗之間經諸考掠宜如法造燈樹其下立天地輪以圎象天以方象地天上地下内外洞明朔獄幽牢無不煥輝分三輝而照九壘列八極以居中皇自初終亡至于七七燈光相續苦魂覩此光明即得解脫乃金口所宣依科建立然懴用救無間矣建燈法法用梓木作一燈樹上分九巵毎巵安一燈下用淨土作壇三級上圎下方法天象地上層安燈樹懸旛九首旛上書九天隂符兩手寫誥文中層團團安九盞燈立九炁牌下層安九壘燈九盞立九壘土皇君位牌三層共三九二十七盞外立八門然燈八盞立八卦上照九天調泰正炁鎮運星宿中照九野以掃九土灾殃下照九幽重隂九壘通光九道破暗燭幽外八門以映八極周回十方計三十五盞乃三十五分緫炁上玄八景冥合炁入玄玄㧞度苦魂功莫大矣然燈宗㫖曰凡然燈自東北爲始艮戸乃鬼戸故假九天陽光之炁下臨地戸兆於然懴時詣上帝前請降九霄之炁三拜以請光符作火炬蘸油於上帝燈中㸃之以次將符炬然九巵燈自東北起依科然懴宣九天寳誥凡宣一章告九天陽符同九章誥焚之逐巵焚九炁旛凡懴一壘焚九壘符告三陽開光真符同赤明丹光玉曆寳章焚之逐巵請降本炁下照九巵開廓重隂又曰然燈畢便分東北巵燈光㸃九獄燈生三炁乃一生二二生三之道陽光下徹照破隂翳諸獄皆覩光明明九幽夫九幽者按八卦中宫按九州分野各係社令主守在天爲九天在地爲九宫化形爲九幽獄其名有九皆一炁所化一念所感凡亡人一念之惡其獄即現其獄隨之故太上垂慈拯濟立此齋法㧞度苦爽當如其式一曰幽冥乃東方震卦九炁所化凡發生蠢動莫不待風雷之所驚故號風雷地獄二曰幽隂乃南方離卦三炁所化凡火數至午爲陽極隂生之道故號火翳地獄三曰幽夜乃西方兊卦七炁所化凡一日之光没於酉地爲金方殺伐至剛之道故號金剛地獄四曰幽酆乃北方坎卦五炁所化凡炁候水數至於子爲隂極陽生水旺於子故號溟泠地獄五曰幽都乃東北艮卦梵炁所化凡炁候至寅艮爲温柔發施之理木炁所生故號鑊湯地獄六曰幽治乃東南巽卦梵炁所化凡火至巳爲至旺之郷莫不爍爍鎔銅之熾故號銅柱地獄七曰幽關乃西南坤卦梵炁所化凡金炁爲西南肅殺之候故至人門之郷多生貪殺之心故號屠割地獄八曰幽府乃西北乾卦梵炁所化爲天輪運轉之象故號火車地獄九曰幽獄乃中央一炁所化是中宫土皇所掌爲中央緫制之治故號普掠地獄建獄法按太一真科凡立九獄於地戸上以土砂砌壇九所方闊二寸九壇如一羅緫方六尺以法地之隂極二六之象毎獄作四角三曲毎獄㸃三炬安獄牌上懸旛九首書各方天尊號背書十方天尊符旛頂書九獄符兩手寫破獄符呪告文足上寫某符告某獄以竹九莖標之又式以黄旛九首書九天生神炁符於破獄焚獄旛了却以此九旛掛其位中置大旛一首書青玄號任風吹揚萬罪俱滅依式建獄所以法象地九幽隂曹主罪憲職羅酆東南已地是其所也獄式别載論建獄凡建九幽之獄本爲普度沈淪之設凡建小縁上不祝君王而及寰區下不度九祖而及六道用心窄隘專意薦一二位之亡魂則上帝不爲一人而能特降符命悉開九獄必無是理地獄未必可盡破孤䰟未必皆可度而我之立意無一毫及物之功豈本科之意儻若專荐只宜然燈宣讃或建九巵神燈而破獄之科不必舉行庶不僣瀆然孝子薦㧞祖宗無非盡此一誠蕩滌宿愆足矣豈可自以上祖隨地獄而行此法理之所在也儻欲行之自合隨宜備置斛食廣度三塗五苦滯魄沈魂不拘多寡隨力建功以恢善意則破獄一節斯可施設盖以無量罪䰟沈迷有無一念既差終墮其獄若不啓告上玄行符破獄然燈何由開度故當行之自宜斟酌重輕庶不礙科法也當先立遷神寳旛於壇之東論破獄凡建大齋臨告召之時破獄深爲謬矣且八獄皆破惟中央不破何耶又不知罪䰟在何方獄中設使在中央獄中然既不破何縁得出更若亡人無罪不入獄中却於何處追攝行持吁不明此事正謂自瞞且普天之下一日之中有多少去處修齋薦㧞若一一都破獄有罪之人如在獄中何拘囚呵呵且如陽間官司不收無罪之人何况幽冥乎盖縁亡人身死之時魂留厚土魄滯九隂一身有三業六根之罪凝滓隂垢不能蠲除故假陽光廓然隂翳消散以一獄然三燈者故召玄元始三炁也九獄九炁化生二十七炁共爲三十六陽光下照三十六地照破亡人三業六根之罪累所以中央獄不破者中屬脾脾神乃命門也恐散亂神識不能更生故爾論身中九獄師曰夫九獄處重隂之下何法可施破耶但兆身中自有九獄未能破蕩焉敢破重隂之獄若能自破何患地獄乎且人之一身一切皆從心起心由君王也施之勇銳亦可行之善道亦可心安則安神定舍心怒則亂神動舍若心安體安而忿怒一作則所養䘮矣心蓮花之府君王居尊肺華盖之府輔相居之肝將帥之府腎作强之官脾倉廪之官中黄守舍夫一念皆從心起心安則蓮花之境現惡則火坑火翳之獄現氣怒不靜則風雷普掠獄現氣亂不安肺則金剛獄現氣强則溟泠獄現三陽在手銅柱獄現三隂在足鑊湯獄現百事相五心躁並不安靜則火車周匝氣血精神俱有不仁則屠割獄現節體不安金槌考罰之獄隨炁而現中央普掠獄處此乃法師中黄帝一之尊本命臓府小腸是心通周匝一身大腸是下方九壘重隂羅山苦穴三宫五臓乃三途五苦之穴况一身獄穴日時沈穢尚不能破豈能破冥曹幽獄乎無非畫地之戯耳須心中自焚之刀山方可破刀山之獄也宗㫖曰凡是夜欲破獄此日自朝至晚當調平其炁安定心神自上玄之府九宫各分布九炁升降心君則心王安靜群僚守舍真炁内養流充一身運一炁入九曲回腸之獄萬穢俱消善境隨念而現方可破冥曹之獄也至晚於上帝前請䇿杖符誥依法破之其金光誥命注下獄中自然停因罷對隂靈得出獄昇化矣請策杖夫破獄開幽須假天尊无量度人靈寳策杖策役五帝守吏按卦炁之方剔訣行事先具威儀詣三寳前跪奏請杖次不離位焚符召吏依科行事宗㫖曰兆詣三寳前上香三拜跪奏青玄上帝具陳齋悃請降五帝策杖破獄符命開破幽獄心運青玄上帝端浮虚皇之前左右侍真玉童玉女各執旌幢芝盖華旛羅列左右真中有圎光煥照十方映于兆身上帝允奏以口眼鼻分吐慧光注于杖上化䇿杖爲芝憧龍頭虎尾之狀龍身光耀口含華旛靈風慶雲盤結于上光煥无極敕玉女玉童捧瓊匣金光閃爍開紫陽玉笈頒示破獄符誥及淨鍾法水付兆開破地獄請策杖呪五老策杖天尊惠符金闕玄籙通幽破塗大慈悲憫罪苦咸除靈寳无量取救愚迷勑符一下含識咸虚次以符誥策杖水鍾香上度過付左右執兆謝恩三拜凝神引青玄睿相慧光徐徐升降于兆上玄之宫交合一相左右童君侍衛即咽液興身策杖飛雲歩虚隨意運動至建獄之所旋歩一匝四維燈光皆是慧相金光遍照悉成朗耀之所依科然懴破九獄宣破地獄誥祝遣呪普告三界至逍遥上清玉清訣東炁同錢馬焚於獄前焚毀鎻符張門符右以手擎符灰吹布於九獄内次自東北起逐方破之先上香叩齒九通歩罡一座東九歩南三歩西七歩北五歩四維各五歩中央十二歩左手搯中文存玄元始青黄白三炁𦋇覆已身爲本方天尊次以符杖破了取本方炁吹彈以水洒之焚本方符於本獄中祝呪玉清祖炁罷對幽堂三星熠燿元始開光有霏無霏得赦其方寳光煥映普登天堂急急如元始上帝令搯玉訣本方炁吹彈入獄存金光透徹内外洞明次携杖虚書符引光下注以杖頭畫敕字存想破之破獄超生符陽日隂日玉清道炁緫破重泉囚關苦爽離苦昇天急急如元始太一青玄上帝律令左玉清訣彈以杖頭引下虚書一敕字破之又當念後破獄宻呪天地交光日月合明上衝牛斗下徹幽冥左扶六甲右衛六丁神杖破獄萬𩔖超昇急急如上帝敕破獄祕呪唵俱祗知帝阿勒薩曇波伽婁伐夜婆吒吽訶左玉訣右執杖存玉女金童左右各一十二人手執寳旛旛上有金書玉皇赦霏天尊其逐方各存鐵城萬丈羅網交加黒炁沈沈穢炁蓬勃銅蛇鐵犬噴吐煙熖鬼卒夜又各守門鎖以杖一書劃破雲篆寳光祥風鼓蕩化北身在百寳光中上接玄元始三炁俓衝其城見鐵城摧毀力山斷刃劒化騫林火山息熖氷池靜波吞火食炭變成甘露鑊湯停沸金槌鐵杖變成蓮花獄中罪人隨旛所指得覩陽光枷鎻自落罪苦咸原俱悟本真𡨚仇和釋冥官鬼吏悉皆擎拳朝禮稱善洒水祝呪元始符命至逍遥上清存慈尊洒布法雨沾遍幽狴盡化青紅蓮花清凉之境内外異香飄馥燈光散迸一如星斗光芒流霞飛爍獄吏盡承慧光仙化成人同獄罪魂永離隂治得覩光明其所立燈獄之處悉爲異境破普掠獄時搯靈寳訣取中祖炁黙念化形呪吾師救苦天中尊常善化形十方界以此威神興大慈救彼衆生無量苦九夜重昏幽暗府普令擴照生光明牛頭獄卒盡升仙萬苦沈魂俱觧釋三途五苦諸囚繋萬苦停閑上紫清見聞有識及無情感此皆成無上道次焚青玄救苦破酆都符同回光符於中獄之内再念心呪敕吘吒哩現光明右呪三遍暝目存燈光化成百寳祥光上逹九天下徹九地存前符化無量天尊遍詣獄中救㧞一切罪魂俱得原赦而出又焚酆都真形一道吹灰九獄之中念十方救苦天尊三聲次誦淨酆都開業道等呪洒水旋遶存用在前納杖凡破獄事畢當詣三寳前納杖威禁至重不可超越違則考筭致恭謝恩納于上帝之前宗㫖曰兆納杖詣上帝前上香設拜跪奏謝恩以策杖水鍾納于元所大㮣與請杖存用一同良時運頂上青玄上帝漸漸而升再歸空浮兆瞻仰慈尊心拜而退廻耀輪燈按真人二十四戒經云凡人生前造二十四種之罪以致身亡之後歷二十四報化爲二十四獄三途五苦八難之場八獄共二十四獄按人身中三部八景二十四神之數在生之時貪着情愛設心邪境結節凝滓不能開通故盟真科典有廻耀降光之格假陽光所照蕩除五累之苦開生死之業道破黒暗之罪庭此科乃洞玄禁典若非妙行啓請玉清宣示則下世豈得𥨸聞能回三景之耀曲降九泉之戸使水火消滅毒苦金刃摧剉惡鋒鐵城鎔解鬼官罷停㓕萬劫之罪對㧞億世之𡨚魂覩此三光俓生人天此法乃普廣開度孤魂用之集兹功徳以薦亡魂㝷常不必建也建獄法凡建此獄先立回耀靈旛方用梓木作輪如車軸作三層中立一柱上層安燈十二盞中層十六盞下層二十一盞共四十九盞中央立五累五門各立牌寫獄名於上仍造小旛四十九首黄白之色互相交間旛上書天尊號有武上書破酆都符依廻耀燈儀回耀旛立於燈壇之東南又有二十四獄圖武别載懴燈宗㫖曰先請策杖符命水鍾至燈壇之所依科行事宣㧞幽魂符宻呪普吿三界至逍遥上清玉訣東炁再南炁吹同錢馬焚于燈壇之上兆發腦後大椎骨九色神光出項上作圎象如日月之輪煥映十方照破諸獄至行科懴燈逐獄上香焚符以杖破之洒水焚三途符祝遣呪玉清上帝敕赦上清上帝敕赦太清大帝教赦敕命十方靈寳救苦天尊朱陵上帝未陵火府神君南極長生大君九天監生大神受度亡過某等魂玉皇有敕上奉道君敕赦十方三界罪魂先散九幽流香滿庭唵吽吟嚧嘔婆娑諦薩訶急急如太上道君敕赦律令三塗訣子己酉三文焚五苦符祝遣呪玉清寳符元始妙章𨼆玄幽象妙逺群陽變隂作晝廓翳停殃消除王累飛度南昌五苦訣五方文焚八難符祝遣呪靈寳玉符超陵八難度脫窮幽得證彼岸大道幽微陽光燦熳獲人道中發大讃嘆三途五苦入難超凌魔王隂官稽首送迎王清元符一如奉行急急如玉清上帝敕剔訣存變凡每獄焚符畢左玉清訣右執䇿杖隨方於獄中撃一下念大梵𨼆語一遍洒水念玉清流輝塗苦秘呪三途五苦魂四生六道衆受苦諸衆生普生安樂土急急如元始上帝命洒水就燈化小旛逐方一同如此則諸獄罪魂乗此陽光應時解脫諸苦五累煩惱惡障塵勞業根悉皆斷除覩此三光俓生人天緫破諸獄呪風雷火翳銅柱溟泠普掠屠割火車不停鑊湯煎煑焦爛身形萬死萬生受罪不輕飛天大聖妙行真人誦念靈章㧞離幽冥九幽地獄除苦停辛執天符命列名上清唵三摩呢滅罪律令唵三摩呢急急如太上玄科律令懴酆都燈宣淨酆都開幽夜寳誥祝遣呪然酆都燈行持秘呪寳笈𨼆靈書玄都演開度巍巍北都土黒暗無朝暮寒池波水深㦸樹多哀楚巍巍鐵义扄壯𠔃炎烈戸無限衆隂魂晝夜受萬苦天尊降靈章光明諸隂府罷對囚關庭咸赴朱陵府玉清真帝命悉皆焚罪簿承領無上道禀令無停阻狴惡諸鬼吏拱拜真王父急急如元始上帝命黙呪三次逐方各一呪次逐方上香焚符運用洒水焚五方符諸大地獄符上下方符用隨方祝呪運開宣之道玉清元命緫破寒泉地獄開朗酆山摧傾罪魂解結惡道消平天王律令稽首送迎急急如元始上帝命宗㫖曰兆凝神黙運誦破蕩酆山開業道呪三遍了叩齒五通咽液一口運元真一炁升上重樓以舌捲三匝微以口噴出如白霧交合漸漸長大圎如月光運轉髙目少望太陽之光取炁吸光一口下注與月象交合日運月轉徐徐涵浸兆一身光明在内次以口微引鼻息一轉金光百絲迸體注入兆一身毛竅五内之中悉皆朗明燭破下淵元宫水光黒炁如煙分散而出如日月光華輪轉融照無邊洞煥上下内外等處悉爲蓮房異香之境又化自身爲太一寳相有侍真玉女童君在于左右懸坐空浮廣布慈雲慶煙鼓蕩周徧隂關鬼吏皆大懽忻方叩齒三通咽液三口飛斗存星光入體而行此爲破蕩羅酆銷鎔穢濁使幽關無荆𣗥之悲地獄變蓮花之境血湖獄夫人生天地間萬物緫隂陽之化離中男坎中女皆有漏之色身孰能免於愛境凡人有懷胎育孕子毋未分因此致䘮者莫不前世故犯今生𡨚執受報也血湖有五獄王法及戰陣殺戮癰疽癤毒墮在三獄罪尤可赦魂有出期惟已産未産罪魂各有一獄生生執對血穢腥膻滔滔血湖飲浸形體動經億劫不覩光明亦有婦人墮落胎孕母䘮子存子䘮毋存毋子俱䘮或肢體不完或敗血世血癩病血痢皆屬血湖地獄所囚非黄籙大齋盟天告地頒告符籙作諸功徳何以薦㧞故天尊大慈悲憫弘濟多門流傳下士廣開濟度拜血湖章上血湖表破血湖獄行血湖錬符檄官將與靈寳錬度皆不同師當體而行之於破獄之頃冥心端坐内想不出外想不入存左腎有血湖硤石之獄右腎有北都寒池之獄左獄流血波浪腥穢囚繋罪苦萬劫不原當思青玄上帝手執楊枝法水居于妙堂之上師引天門金光道炁一口微微嚥下丹田過尾閭關至命宂自夾脊而昇直透泥丸宫衝開八門中有一宂號曰衆妙門化爲九色蓮花天尊端坐於内次見丹元真人與兆形貌一同歩九鳳破穢罡廵邏下方自脾宫至尾閭金井中引起飛過二十四節背脊上至重樓以舌拄上㬽作撟至妙堂朝禮天尊跪奏事由乞頒敕赦天尊俞允宣告敕命宣付血湖使者咸使知聞丹元真人與天尊合而爲一端坐妙堂宣召救苦真人無鞅數衆各誦靈寳㫖元始符命止上清唵吽吒唎天尊頂放金光注下幽獄咸覩慈光寳光真人手執寳珠金光燦然直透丹田徹破幽獄天尊以枝水遍洒硤石之獄化爲寳臺亡者斯有出期祕之祕之此乃内外相應之道師當於建獄之所同道衆振鈴吟偈旋遶三匝念隠語以淨水洒獄中如細雨宻霧紛紛而下請真炁灌注獄内燒解穢符及中篇同玉清破蕩血湖符念破五方穢獄祕呪以杖頭如流光飛霞之狀注下燭破開宣表白吟一偈破一獄焚青玄天尊救苦破酆都真符黙誦靈寳㫖三遍五獄皆然畢道衆圍遶念茫茫酆都中寒庭多悲苦功德金色光各三遍念元始符命呪三遍化獄光明清淨獄吏擎拳冥宫稽首罪魂出離建獄之所化爲蓮池之境凡破獄時兆當存身爲救苦天尊道衆皆爲侍真並在雲端之上獄在于下只以慧光符命燭破重隂法雨慈雲祥風解除穢暗一如陽治承赦釋放罪囚次運官吏部衛赴壇承恩託化監生司夫召到亡魂其中或有産亡之者當先引赴監生司依法行持當先請聖㸃酌召監生大神呪髙上之天玉清爲主道合乾坤主制生魂送生神吏來赴生門急急如元始上帝敕九宫訣東北炁存至焚巳生未生符監生諸符祝曰謹上請九天監生大神衛房聖毋治病天醫君等衆只今引過血湖未分娩産魂等衆各入幕以遂分娩託化人天急急如律令玉訣想亡人入幕再呪謹上請雙保之母速賜真炁救鬼魂生天搯中文靈寳祖炁吹旛上次念監真度生七遍又念中篇一過取東南炁吹布次念巳生未生皆得生成三十二過取一炁吹布存亡人身形青色光明滿室若未生者焚分誕産孕符雙手子午斗分隂陽剔去噀水一口于旛奮發五内之炁衮衮升至絳宫自重樓出運兩腎丹田雷火相擊作霹靈奮迅而出化生一身開解子母分形此爲激震之聲錬胞生育分形蛻胎呪五行之炁周流三光之炁飛浮靈漿下灌玉液蕩幽魂神澄正歸上天㑹合萬神玉京遊急急如律令天醫院夫産魂監生解胞既畢當請天醫神吏救度成全又有亡人生存受疾而殂隨魂有病十相不完又况亡人三魂幽幽𡨋𡨋不過三寸既無形無身如何更衣朝真受食今人多不究此一節止以歌聲吟詠惑亂世人凡召到亡魂當請天醫拯治引魂赴幕請聖㸃酌以符呪存用行五府内事復本來形體既有形質次開咽喉次運兆自身五芽玉液運五府祕法吹之成人始得咽喉開通方可更衣受食焚召天醫符次念召呪天醫大聖地醫大聖金丹仙藥普救群生降臨真炁聞召速至一時復形急急如律令先存日月星斗三光覆定天醫院焚天醫諸符於水盂内沾洒行持玉訣正炁存天官五人着五色繡衣自五方降下各持符藥布炁醫療亡魂次化五方真炁匝覆天醫院作一團真火月輪天醫拯治焚五帝全形符行五府内事夫五府者一爲泉曲之府是腎宫主天一水位之精二爲陽明之府是心宫屬地火位之精天三生木木屬肝宫是爲發生之府以象乎春之生物也地四生金屬肺宫是爲崐崘之府以象乎秋之收成也然春屬肝爲木主青龍秋屬肺爲金主白虎夏屬心爲火主朱雀冬屬腎爲水主玄武四象既備萬神俱歸於中黄之庭黙行五府之事當存脾神在於中宫爲黄庭之府能生長萬物五行周備則萬神咸亨矣然後亡魂形體悉具可以沐浴更衣朝真聴法受錬更生也存五帝諱功都成中切角正子興生轉卯可韓明午獨𨽻遷酉對魂聚魂功都聚魂攝搯卯文黙念紅杏存青帝自東駕青龍至兆運肝炁自眼出合之嘘去搯酉文黙念磨真存白帝自西駕白龍至兆運肺炁自鼻出合之呬去搯午文黙念墨黒存赤帝自南駕赤龍至兆運心炁自口出合之呵去搯子文黙念襪臘存黒帝自北駕黒龍至兆運腎炁自耳出合之吹去搯中文黙念靈寳存黄帝自中宫駕黄龍至兆運脾炁自唇出合之呼去存亡魂環列在前天醫六職醫療完全形體五方五帝降五色真炁灌溉亡人頂門而入全形呪玄元始炁孕育三元胚腪肇啓二景回旋隂陽藴秀凝結胞原形容世象積業無邉五宫六府結塞三田百關九竅累滓成愆形消炁㪚魂繫九泉隨魂帶疾求脫何縁天醫尚藥拯濟痾纒首斷爲續筋斷爲聮蠱癩爲剥水腹爲寛胎留爲下孕育發生拳攣伸縮喑啞能言手足不具俱得完全聾盲視聽顛狂復元老劣返壯執對和𡨚飢饉充實沈痾悉蠲風勞頓絶咸得完痊魄戸開關魂門錬仙存亡魂形體完具取西南炁布之想亡者魂來乗真炁焚解十傷符命沐浴夫亡人身没之後魂滯重隂或入九幽𡨋淦隂炁凝結尸穢未除既召到壇天醫巳畢次以日月精華天河東井之水五星之光沐錬魂魄消蕩隂翳焚變浴室符男堂女室符運化浴室爲月景波光之相結華之炁欝欝蕩蕩雙手剔子文乃隂陽之炁焚沐浴諸符宣科誦呪化月景隂白之光如雨沾濡次以水洒淨三匝化玉童玉女二人手執香巾長帛布寳光之炁引導隂魂而入又存一玉童手執玉瓶瓶内甘泉白體如傾雨之狀噴洒于上五星斗光亦自上煒燁灌注於寳瓶之内亡人澡沐洗滌薫濛之炁逼結其形身相光瑩變衣夫亡人滯於𡨋昧衣乃隂炁纒結構合造衣焚之依法變用焚變衣諸符念變呪唵欣欣嗚伐夷帝明都變錬有形攝以水洒之存錬霞綵之光交錯透衣想仙童玉女自天門捧至取青黄白三炁吹之再想衣上有五色雲炁纒絡朝禮存亡人着仙衣楚楚左右童子隨旛引入壇三禮太上慈尊然後享食受戒上清靈寳大法卷之五十八
