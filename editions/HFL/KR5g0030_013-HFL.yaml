front:
  text: 上清靈寳大法卷之十三樓五
  hash: sha256:59c705e3318f9a7ac462e1c7d4a5404ccd5f9cdbc3daf784a14239a4eda82e4d
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5g0030_HFL_013-001a, image: hfl/0945/0945-122.png}
body:
  text: 洞㣲髙士開光救苦真人𡩋全真授上清三洞弟子靈寳領教嗣師王契真纂制魔伏神門師曰夫靈寳大法乃天地之根宗元始之妙炁鳯篆龍章結爲真文靈音梵唱而爲呪元始上帝現無相之理傳要機於道君濟救群迷敷揚至道非世上常辭皆諸天之隱諱上士行之可以飛躡玉京中士行之可以遷居仙室下士行之可以住世延年盖下世愚俗福淺之徒豈能窺奥且宗祖傳文皆神仙修煉大丹之士積功累行之者遇其要妙遭際真師印訣符圖無不具述皆夢境得其筌蹄或神人傳其要㫖即使心開神悟智慧日新觀其妙音通幽逹理呼神召將皆駐目前三界敬從諸天欽仰所謂道而化生德而度死者矣後之學者多不遇其師或傳之於片紙文字或得之於詠誦經訣思存求值要文便言畢竟矜誇巳是執着迷津盖縁行淺德微福凉縁簿或得之文辭華麗或傳之於符篆篇圖呪訣不全符形靡辯行持差悮呼想不真以致將吏天真不能輔佐皆去真就僞衆魔有試其怨道者多矣殊不知靈寳祕文法法有倫序符有訣竅呪有祕章有制魔伏邪之祕文有出死入生之心印佩符肘印謁簡劵符誥帖環圖降魔誓戒得之者超登上道飛謁玄元度亡䰟於時刻之中濟枯骨於吹嘘之内城隍社令悉歸掌握之中風雨雷霆盡属指揮之部行道之士先明於制禦之法其魔有十故具如篇學者深而造之勿爲魔之所試斯道方能成也得者祕之辯制十魔一曰天魔二曰地魔三曰人魔四曰鬼魔五曰神魔六曰陽魔七曰隂魔八曰病魔九曰妖魔十曰境魔天魔者山林修煉之士一念纎塵而被魔敗不能成真何者正煉大丹行持入靖或目見顯現形影幢盖幡花異香祥雲耳聞仙樂此乃天魔之所試也當焚香佩三皇内文及五帝消魔玉符置於案前左手搯中指中右手執五帝大魔印變神爲元始以印照之其魔自退地魔者凡行持之士變神歩罡書符呪水起念不正皆地魔之所試何者正欲思存而心生擬議歩罡搯訣書符誦呪或亂其心或照形而不辯其姓名或附身而不通其言語抵抗道法毀辱靈文皆非邪鬼之所依即是地魔之所試當以神霄玉清真王五方衛靈呪併焚之人魔者行持之士皆有之或居山入室書符誦呪搯訣行持方欲行用一念有異或被言語穢喧雞犬婦女師僧尼俗衝突以致惑亂法身思存不正符水不應此皆人魔之所試當以混合百神印安於壇中急書束縳魔靈四字以印印之焚於香中左右子亥文持念魔王三品之音其魔自退矣鬼魔者行持之士出入郊野之中建壇於伏尸之地一念稍誤即夜多夢寐屋宇虚鳴禽畜現形蟲蛇顯恠惑亂正法恣壞靈壇皆鬼魔之所試也當以淨明法主印安壇上以元始安鎮四字以印印之貼於壇所次誦淨明靈書二篇其魔自退神魔者行持之士因驅邪破廟一念恣狂多爲神魔之所試或現形抛石嘆泣多端盗法壇供具𥨸丹藥祕文惑惱法身無有休息皆神魔所試也當以嚴攝北酆二印佩於肘上召玄範衆真以攝之仍書神公受命普掃不祥八字貼於壇之四面次以三十二天隱諱章焚室前而遣之其魔自退陽魔者行持之士正欲内行以濟生死則一念不真情慾四起愛着存懷是非錯亂此陽魔之所試也當正心黙念降魔滅惡天尊九聲叩齒三通書八景𡨋合炁入玄玄八字焚服佩五方制魔玉文誦五方制魔呪行旋斗歷箕罡訣其魔自退在浄明法中隂魔者居山之士修習祕文存思之際一念或差即聞四野悲歌冷風亂作心生倒見及出道路逢僧尼厭穢亂我神光皆隂魔之所試也當叩齒七通搯午文存玄元炁灌注身中服五老啓塗群仙翼轅八字以五帝大魔印印之及佩童𥘉五府玉册誦靈書下篇及焚龍章鳯炁之文其魔自退病魔者行持之士一念乖殊四大失理飲食差殊寒暑失調多生疾患損害行持此病魔之所試也當以消魔五符置於室中用五帝大魔印誦淨明靈書二篇服八景𡨋合炁入玄玄八字并淨明延生一符佩元洞玉曆章叩齒集神首罪焚香宣雲籖寳笈科品召集隂陽二神以和合其魔自退妖魔者山林多有之凡入靖修煉一念不真多招狐狸山精石恠妖魅恐人成道化作妖艶以求宿食或歌艶麗詩詞以現形行大法之士多忌之持志金石誦魔王三章輪搯十方飛天神王訣以天寳君印照之焚五帝大魔符於室前次焚香陞座宣靈寳三洞法語其魔自退永不至矣其或更施斛與之尤妙境魔者行持之際或於道路别室之中見一切物而一念起貪癡之心耳聽惡聲目視非色或入室如此者皆境魔之所試也當正念存神使其含太虚之真内外澄徹無所染着存空中有一寳珠光明煥耀十方來朝仍吞服諸天祕諱誦浄明寳經一過佩上清九老伏魔印其魔自退金闕玄元道君㓕九十六種外道一百八十天魔智慧神呪天地雜炁生諸妖邪常以正道除去氛祲第一思惟我無主簿諸法皆空不可轉相一實境界飛魔鬼神知所住處實知方便假空有故法性理性湛然常住無有來去一知實故二知魔故三除相故四分别空元亨利貞邪不干正臨兵闘者皆列陣前急急如律令右法先叩齒一十二通宻誦不拘遍數其魔應時皆發善念並來座下稽首若欲除滅則廣持遍數其餘皆遁隨呪消滅矣神霄真王消魔衛靈呪東方蕭仞扶桑方諸鬱羅元皇列真凝結雲芽明耀九芒含炁三華钁天振劒神虎辟邪安陽太帝攝禦群魔上升神霄濯形天河南方炎炁浮煙運升赤明長生元聖髙居玉京降妙圎羅散品六冥元天大誥普齊群生消珍魔試奔飛火鈴保衛正炁億劫長存西方皓景金華長庚洞光大梵流布轉輪元綱蔚明交變騰化十方七關安鎮回合隂陽席炁蕩蕩我亨嘉祥玉文敷告至道延昌北方太隂朔單上連帝君流𤔵騰晶化形玉虚輔衛三境簡閱元圖真符煥發定籍清都標名金籙宿釁咸除形神碧落超登太无中央元始虚皇祖土居中三炁洞元肇生太空七轉八變混合回風散化萬神天地開通吉日行事億天所宗願保劫年享福無窮天皇君召韓君司馬制魔符諸天遥唱萬帝設禮中中群魔束形鬼精㓕爽中中廻骸起死白骨成人中中韓君丈人坎執符把籙至巽上召制十方卯酉伏御地祇坤萬灾不干神明護門子亥幽䰟苦爽皆得受生四指上中下三節天皇君召命諸天齊到咸遵玉敕中中右符混元炁用青帛書用黄色於甲子日子時篆用赤書玉字印印之佩於兆身若煉度隂尸佩於心𦚾之上黙告韓君下臨監度矣天皇君召十方神王制魔符始青浮黎中中洞煥太空午魔王内諱百靈隱名子司命司録司功司殺回骸起死卯文飛天神王制魔合靈䰟神澄正萬炁長存丑亥炁入玄玄寅廵十二官衆真監度全其本年收入中指中入掌心吹彈右符紅帛白書庚申目寅時書用八威龍文印印之佩兆身召十方神王隨其方搯訣召之地皇君召三界大魔制魔符五帝大魔萬神之宗子自號赫爽諸天齊功午金真朗郁酉輔翼萬仙卯至道无敵降伏衆魔寅大道之宗從有入旡申至道之樞從无入有我位上王匡御衆魔亥右符緑帛素書六丁日午時篆用印印之佩身上凡飛神謁帝只誦三界大魔無拘天門地皇君召三界星宿璇璣制魔符混洞赤文老五无无上真啓途大行梵炁周回十方戌三官九署亥十二河源子文三官北酆明檢鬼營丑金馬驛程萬神咸聽寅混合回風天地開通卯吉日行事祖土居中辰巳吹彈右符黄帛朱書六丙日辰時篆印之佩身上如禳灾度厄召諸星宿皆可用人皇君束縛魔靈符赤靈尊神統神丹天離千和萬合自然成真坎太一司命桃康合延乾上開八門混合百神坤文束送妖魔精斬馘六鬼鋒諸天炁蕩蕩我道日興隆中指中右符素帛黒書六辛日酉時篆印之佩身上可以威制群魔人皇君却死更生符太清九真凝曜神郷卯九隂赤字敷映生明坎精芒晃燁混沌黄元辰飛英玉化虎嘯龍吟巳文萬帝玄真威制天文却死延年受化更生酉離文右符青帛朱書壬癸日子時篆印之佩身中延年益筭巳上符文並出天皇下篇如欲知未然吉凶當以丹書方三寸清水吞之靜卧則預知矣服時間曰用五方消魔王呪東方青帝消魔王呪洞耀育元晶青華開太明布育九天炁始生荐无英扶陽適攝御丹林合緫真積霄始暉上欝壘明霞晨靈光煥羅絡衛育保形䰟混化合玄景仁慧消魔群萬遍道巳超功當書上清南方赤帝消魔王呪三炁靄靈關明虚煥玉丹朱陵有帝真華雲飛絳軿統御萬界中撫運超億千執䇿按簡籙洞章敷神篇解結散禍根流金摧凶奸志能成此道魔試俱不前保度冥劫津宴盻无窮年西方白帝消魔王呪西靈徊七度太眇欝明華白元維我神皇真御景霞皎皎三素暉昭昭破百邪攝音延至炁金晶育三田煉胎固玉質寳耀映瓊軒魔精當滅試逮地元沈連逸轡髙清舘齊輪太上仙北方黒帝消魔王呪北玄三秀靄太上紫皇居緫炁攝幽機造化敷靈綱下緫虚危精寳育天元房靈通太妙神纒羅衛百關豁落滅魔試凶灾永不干大道保白然壽命无虧殘萬劫享慶㑹白日登雲軿中央黄帝消魔王呪混化俱冲妙元皇緫帝靈真老閉黄闕回御齊玄鈞圎華太張上同携堅玉君結津固有骸瓊耀擁胎仙晨暉注明景魔殃自滅形萬道保無窮返老回童嬰五㑹合一炁飛馭超雲京威制伏御威未制天政德可伏御地祇右中指中念靈書三遍書之普掃不祥神公受命普掃不祥右中指中念三十二天隱諱書之冥合八景冥合炁入玄玄右中指中誦魔王三章書之啓塗群仙五老啓塗群仙翊轅右子至亥戌酉申念三官北酆至金馬驛程書之上清靈寳大法卷之十三
