front:
  text: 上清靈寳大法卷之一
  hash: sha256:5dc2f7e26d72c767878b7cdaa4ea435f21a7e3f56e98814876bec19bc29ce619
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5g0030_HFL_001-001a, image: hfl/0942/0942-016.png}
body:
  text: 洞微髙士開光救苦眞人𡩋全眞授上清三洞弟子靈寳領教嗣師王契眞纂開宗明義門總叙師曰靈寳大法者貫通三洞總備萬法是旡上大羅天元始天尊所說玉晨道君五老上帝髙眞上聖妙行眞人十方神王至眞大神所授後聖玄元金闕李眞天帝降世行教化度凡間得而聞之乃三十六部尊經總計萬八千篇衆道之宗玄淵隱奥與萬法一貫且天眞皇人有八明五譯七經八緯十奥四十七章總成一部究其微妙皆曲盡其理夫八明者以法天開八聰以明其幽五譯者法五劫開化生五行是氣方成世書七經者汲引大道之徑路八緯者範圍教法之閫域十奥者是謂十玄四十七章訓說始末紀綱總成一部盡闡玄奥之旨其於詳微分品立門樞貫爲一八明一則明元始祖炁從何先化玉字按靈寳王字内音經云自三炁之先溟涬之後其中眞精歘化後生元炁元炁之内有神曰元始天王其炁混凝與元始同生流化結芬非色非相或舒或張至延康開劫一炁分形而爲二炁虚无自然而生始炁二炁交結凝相太空彌覆無極字方一丈八角垂芒莫知其理一炁混凝包藏玉字至龍漢開劫元始天王分隷二炁混沌開光炁清髙澄成天炁降積滯成地二炁分合中有和炁名曰玄炁亦曰大梵之炁至赤明劫元始開圖中有眞陽之炁化爲洞陽之火元始運洞陽之火冶錬三炁混和玉字而成赤文因而劫號赤明文號赤書玉字是兹理矣二則明生育混沌陶冶萬範自混沌開拆三炁成文火鍊爲赤書光明之炁陽光之精成日靈光之精成月餘光布散分爲三象三炁之神分爲三清之聖自此之後萬範皆出莫非玄元始三炁也三則明靈寳大法自然生成圖書總括萬象爲三才樞紐至開皇劫分隷三元化生諸聖至上皇劫王劫周啓五行全形化生諸眞諸仙應五劫之内産生玄中之眞精精中之神皆名上皇故劫號上皇也於五劫之中五行正炁流方布形或聚或散或捲或舒或體應雲煙火霧或象類星斗金玉成形分蟲魚龍鳥皆出於赤書玉字分形自然生形成三洞四輔之文龍胎石景億萬符書三部千條圖局命天眞皇人太眞玉妃悉書其文録爲簡籙以正生化之本總括萬象之元陶鑄羣品之機出産仙眞之紐是兹理矣四則明大法爲三洞祖教出生一切聖人自五劫開化之後上清洞玄玉清洞眞太清洞神三洞之經四輔符籙皆因赤書玉字而化禀受靈寳之炁而成昔自元始天尊命上皇三十九帝九霄天帝各紀經呪而成大洞三十九章明五劫開化混洞之體述和合三炁歸一之法付王晨道君次於諸天說三十六部尊經後自三皇之代金闕後聖玄元老君下化於神農時下化爲郁黙子說嘗百藥分五穀而說長生經伏羲時下化爲田野子正八方演隂陽說靈寳元陽經祝融時下化爲鬱華子訣修三綱齊亡政說靈寳五星混常經黄帝時下化爲廣成子說靈寳道誡經少昊時下化爲隨應子說靈寳元藏經髙辛時號元陽子說靈寳微言經帝尭時號務成子說靈寳政事經帝舜時號尹壽子說太清經靈寳赤書經夏禹時號眞𡩋子說五篇眞文經龍蹻經周時號郭叔子說靈寳赤精經道德二篇靈寳八威治魔經呉時號太極左仙翁說靈寳祭鬼經業報經漢世名赤松子說三一經至桓帝時永壽元年正一太清洞神之教下降人間武帝時名河上公說道德篇章西王母奉元始之命說靈寳三十六部尊經成世書至晉永和十一年玉清洞眞之教下降人間方成三洞皆岀因靈寳大法生化一切聖人也五則明人身體法元始造立混沌而生聖胎法身父母交精一㸃含和二炁分坼先生其腎三炁分肇而生神府神府者心也四炁合并華蓋成形五炁開光如花五葉即五内備矣如三炁至五劫之象也二炁分判上生泥丸而下生玄谷玄谷水府也三炁火煉上生曰月如同二目一身光明如爲萬象也人身正同其理夫身外分形須知靈寳祖炁是也入沙成金入石成玉禽生鸞鳯獸生玄龍草木生靈芝五榖含嘉瑞炁散成和風炁升如慶雲炁降爲甘露入水生夜光在人生聖賢以此爲祖炁乃至和太一之精衆靈之首太寳旣有此物如人之分形入大浮黎土丹谷中央也成行九轉分形五變而成法身乃元始十遍枯骨更生是也六則明元始祖炁無形之先比擬降質成炁化生萬寳今世作何體狀復採此炁餌之登眞正所謂靈寳之炁如萬𩔖亦有之謂龍珠虎寳牛黄鵶丹之屬也今流精玉光丹亦是也所謂靈寳之炁天地者日月對炁日中之時身中者神炁㑹合之初也故太乙眞人曰常於太極握樞機動靜神珠降幌幃自有靈寳生玄谷黍珠空歌嘯詠時是也得此餌之必登眞人之位故下仙莫能階此髣髴矣七則明大法中大洞育物回靈之道則白曰登晨次誦詠長生度世尸解得道及經中備有萬法所是靈寳經述天中元始天尊說經之旨趣則常理矣上有修眞内錬骨肉同飛之道中有長生度世尸解之法下有昇祖度玄之教大則保鎮天地正天宿度愈災却魔之格小則有治療沉痾回尸起死之功明則有嘯詠風雷變化自然之靈幽則有䇿役鬼神徹視十天之文故曰備有萬法八則明大法有三品必成聖眞仙遒如通玄究微行諸十品上道功德合備則白日飛昇若其餘𥙷修得一法救一長生度世爲地界洞天仙人之首或朝夕朝禮尊敬奉事供養必獲尸解之仙十洲三島散仙之民矣師曰八明可以開聰而五譯始成世書第一譯譯曰王字生於虚无之先隱乎空洞之中名大梵玉字至赤明開圖火煉成文爲赤書玉字元始以大通神威之力開廓五文而生神靈宣緯演秘而成大法也第二譯譯曰火煉成文赤書之後字方一丈八角垂芒覆於諸天下䕃於西元九天之根流雲之勢玉光金精之明煥耀太空元始命天眞皇人悉書其文名八威龍文亦曰諸天八㑹之書秘於上清玄都金闕七寳瓊臺及紫微上宫蘭房金室東西華堂九天太霞之府也第三譯譯曰元始天尊爲道法宗主玉晨道君爲靈寳教主撰此靈書五篇眞文三十二天玉字成經名雲篆光明之章西王母授黄帝龍威丈人授大禹靈寳五符之法并太上後聖授百代帝王靈寳尊經並在三十六部尊經之内更不稱譯黄帝問道峨嵋親見皇人再蒙授旨及呉左仙翁於太極徐眞人降授流布亦更不重叙爲譯第四譯譯曰漢元封元年七月七日西王母下降以此經法授漢武帝帝不曉大梵之言王母曰元始是大羅天人道君是西那玉國天人亦與神洲之言不同況大梵之言乎遂以筆書之改天書玉字爲今文以大梵之言威儀服御宫名圖書名色宫闕甲子卦炁壇式大法之内諸品行用三十六部尊經並從漢制世文之語爲古今之法言也第五譯譯曰自天眞皇人悉書其文以爲正音妙行眞人撰集符書大法修用眞定光眞人鬱羅翹眞人光妙音眞人集三十六部尊經符圖爲中盟寳籙以三十六部眞經之文爲靈寳大法因此流傳呉左仙翁授經籙法訣於太極徐眞人也仙翁遺於上清眞人楊君總其上清洞玄玉清洞眞二品之法後世漸有神文見也上清靈寳大法卷之一
