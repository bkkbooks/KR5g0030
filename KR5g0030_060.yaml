續行公文差神虎官吏前來追取即望交付母或拘留牒請依應施行謹牒年月日牒牒酆都掌亡人案牒地府十宫掌亡人案牒水府掌亡人案此三牒並同上文牒五嶽諸獄靈寳大法司牒上五嶽諸獄主者當司今據入意當司據詞難抑恭伺至期依科關奏謹取今月某日先颺寳旛上聞齋意除巳具奏天廷請旨頒下外先行開赦所薦亡魂須至牒者牒候到請詳備去事理火急互相關報知委咸遵敕命先次停囚啓獄根刷亡過某等及囚徒苦爽母問新舊有無罪愆例該赦免切待承差官吏前來追取即望依時交付來領薦修勿請拘滯牒到准令奉行謹牒年月日牒牒酆都九幽諸獄主者並同上文劄司命靈寳大法司據入意本司據詞難抑伺至期依科關奏取今月某日先颺寳旙上聞齋意仰祈恩霈普濟幽明除巳飛奏天廷請㫖頒行外仰照應前項事理會合承行官吏及本境廟食神司郷井里社等神一合同心恊力預期掃蕩妖氛肅清禁界應合干局務營辨措置並須潜加衞護不得縱令雞犬䑕葷酒不仁輒有侵犯其火盜不祥之事亦合屏於未前庶使魔障不干善功克就仍希接引所薦亡過某等預送齊居顯現形儀以伺上帝光臨顯受開度母或故違上干青律右劄付某人家司命土地五道禁忌等神準此年月日劄申發總關靈寳大法司今發預告公文具逐處通放下項一奏狀六函申狀一函重封印全上詣三天門下上清天樞院請進一申狀九函重封印全上詣靈寳五位聖師門下玉清太玄天機天樞上相眞君聖前北斗九皇星宮三官大帝府三元眞君聖前東嶽泰山府北隂酆都大帝宫地府十王眞君聖前東霞榑桑丹林大帝宫請進一公牒劄共一十七道摺角封印全前詣天下都大城隍司某府城隍司某州城隍司某縣城隍司九州社令之神前當境廟貌係祀正神前當處土地之神前飛龍騎吏前虚空鑒察靈司直日眞官前本司承受玉女仙官將吏前神虎何喬二大聖前東嶽掌亡人案酆都掌亡人案地府十宫掌亡人案水府掌亡人案五嶽諸獄主者前酆都九幽諸獄主者前某人家司命土地五道禁忌等神前巳上並請逐處投達須至關發者右關四直功曹使者三界直符使者本司當番神吏當處承受土地泰山府諸處城隍司沿路土地仰齎管前去逐處分明投進勿請揩摩損失淹滯脩程或有魔道阻遏攝赴近獄治罪准令火急奉行立伺回報故關年月日關印法階姓押支錢馬狀單靈寳大法司今據齋主某備到金錢幾分從馬幾騎右謹奉獻四直功曹使者三界直符使者諸法部承受官吏當處受事土地正神諸處城隍司下土地泰山沿路土地伏惟鑒納謹狀今月日常司支錢馬狀上清靈寳大法卷之六十
