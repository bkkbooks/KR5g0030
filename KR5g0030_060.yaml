body:
  text: 洞微髙士開光救苦真人寧全真授上清三洞弟子靈寶領教嗣師王契真纂齋法章奏門師曰齋法之設專以文移為急務但世之所行每有不同或繁或簡似難稽以古式故往往多任書生自為之耳是故顚倒錯謬不可勝計既不識三界朝班尊卑之序又不審所司關係之處但一時移東就西勉短塞白若此類者猝難槩舉況一或差訛動是罪福所係為髙功者可不謹諸切觀蔣氏立成儀所載章奏格式亦甚盡善但其間措辭重復頗覺繁瀆若筆之於書示之後人必展轉憚勞棄於無用今則去繁就簡類為章泰一門以便施用惟理所在亦不暇文飾若夫哲匠能循經法之旨撰述成文亦弘教之一端也或增或減當自取焉預告門奏三清具位臣姓某臣不避誅夷冒天聽臣謹據入意臣據詞難抑恭伺至期依科關奏預取今月某日先揚寶旙上聞齋意仰祈恩霈開泰幽冥除巳録詞告盟合屬真司咸使知聞外謹具狀奏聞者右臣謹謹具狀上奏玉清上帝元始天尊上清上帝靈寶天尊太清大帝道德天尊陛下恭望道慈允臣所奏特降敕旨頒下三界十方合屬去處預期遵稟權停考對原宥亡過某等及下元苦爽萬劫深愆疾除罪簿伺臣續行符檄到日發遣赴壇承恩開度冒犯天威臣某下情無任俟恩之至謹奏年月日具位臣姓某狀奏奏玉帝具位臣姓某臣不避誅夷冒干天聽臣謹據入意臣據詞難抑恭伺至期依料關奏預取今月某日先揚寶旙上聞齋意仰祈恩霈開泰幽冥除巳具奏三天金闕請旨頒行外謹具狀奏聞者右巨謹謹具狀上奏太上開天執符御曆含真體道昊天玉皇上帝陛下恭望天慈允臣所奏特降敕旨頒下三界十方合屬去處預期遵稟權停考對原宥亡過某等及下元苦爽萬劫深愆疾除罪簿伺臣續行符檄到日發遣赴壇承恩開度冒犯天威臣某下情無任俟恩之至謹奏年月日具位臣姓某狀奏奏聖祖具位臣姓某臣不避誅夷冒干天聽巨謹據入意臣據詞難抑恭伺至期依科關奏預取今月某日先揚寶幡上聞齋意仰祈恩霈開泰幽冥除巳具奏三天金闕請旨頒行外謹具狀奏聞者右臣謹謹具狀上奏聖祖上靈高道九天司命保生天尊大帝御前恭望道慈允臣所奏特降敕旨頒下三界十方合屬去處預期遵稟權停考對原宥亡過某等及下元苦爽萬劫深愆疾除罪簿伺臣續行符檄刲日發遣赴壇承恩開度冒犯天威臣某下情無任俟恩之至謹奏年月日具位臣姓某狀奏奏天皇具位臣姓某臣不避誅夷冒干天聽臣謹據入意臣據詞難抑恭伺至期依科關奏預取今月某日先揚寶旙上聞齋意仰祈恩霈開泰幽冥除巳具奏三天金闕請旨頒行外謹具狀奏聞者右臣謹謹具狀上奏勾陳星宫天皇大帝御前恭望天慈允巨所奏特降敕旨頒下三界十方合屬去處預期遵稟權停考對原宥亡過某等及下元苦爽萬劫深愆疾除罪簿伺臣續行符檄到日發遣赴壇承恩開度冒犯天威臣某下情無任俟恩之至謹奏年月日具位臣姓某狀奏奏北極具位臣姓某臣不避誅夷冒干天聽臣謹據入意臣據詞難抑恭伺至期依科關奏預取今月某日先揚寶旙上聞齋意仰祈恩霈開泰幽冥除巳具奏三天金闕請旨頒行外謹具狀奏聞者右臣謹謹具狀上奏紫微中天北極大帝御前恭望天慈允臣所奏特降敕旨頒下三界十方合屬去處預期遵稟權停考對原宥亡過某等及下元苦爽萬劫深愆疾除罪簿伺臣續行符檄到日發遣赴壇承恩開度冒犯天威臣某下情無任俟恩之至謹奏年月日具位臣姓某狀奏奏東極具位臣姓某臣不避誅夷冒干天聽臣謹據入意臣據詞難抑恭伺至期依科關奏預取今月某日具録齋誠啓聞穹厚謹依法式建立青玄寶幢或旙告行青玄九龍符命告盟三界咸使聞知除巳具奏三天請旨外謹具狀奏聞者右臣謹謹具狀上奏東極宫中大慈仁者尋聲赴感太一救苦天尊御前恭望道慈允臣所奏普弘誓願曲軫慈悲特賜頒降青宫救苦九龍符命大慈徽號容臣按式奉行敕命救苦真人九龍使者神王童子齎持告下三界十方天牢地獄合屬去處咸乘慧光洞開幽夜預期停酸息苦原赦亡過某等及下元苦爽萬劫深愆疾除罪簿伺臣續行符檄到日發遣赴壇承恩開度冒犯天威臣某下情無任俟恩之至謹奏年月日具位臣姓某狀奏申五師具位姓某今據入意某領詞難抑恭伺至期依科關奏預取今月某日先揚寶旙上聞齋意仰祈恩霈開泰幽冥除巳具奏三天請旨頒行外須至申聞者右謹具狀上申玄中教主上清靈寶聖師真君三天大法天師正一靜應真君靈寶經師真君靈寶籍師真君靈寶度師真君聖前伏望師慈俯垂省覽先乞敷謄齋悃上達宸廷次祈宣布玉音下聞三界咸使停囚罷考釋放罪魂以伺臨期赴壇受度某於預告之後次第入靖書篆太上諸真符籙宣演應干科範並冀道氣浹洽慧力潛扶庶得修用合儀關行無障冒犯師嚴某下情無任惶懼之至謹狀年月日具位姓某狀申申天省具位姓某今據入意某領詞難抑恭伺至期依科關奏預取今月某日先揚寶旙上聞齋意仰祈恩霈開泰幽冥除巳具奏三天請旨頒行外須至申聞者右謹具狀上申玉清上相大羅無極神公泰玄上相天機上相天機內相天樞左相天樞右相聖前伏望真慈俯垂省覽特賜指揮日直玄曹謄某齋誠上奏三天取伺敕命頒下三界十方隂陽曹局冥司幽治應干合屬去處預期遵稟權停考對原宥亡過某等及下元苦爽萬劫深愆疾除罪簿伺某續行符檄到日發遣前來躬受開度冒犯師嚴某下情撫任惶懼之至謹狀年月日具位姓某狀申申北斗具位姓某今據入意某頌詞難抑恭伺至期依科關奏預取今日某日先揚寶幡上聞齋意仰祈恩霈開泰幽冥除巳具奏三天請旨頒行外須至申聞者右謹具狀上申大聖北斗九皇尊帝星君聖